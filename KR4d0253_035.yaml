front:
  text: 象山先生語録三十五卷
  hash: sha256:f8035019cd0b136e5055ed10c27cb897feee2bda2f2bb72a0d727dc5e391fa92
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_035-1a}
body:
  text: 語録曆家所謂朔虛氣盈者蓋以三十日為凖朔虛者自前合朔至後合朔不滿三十日其不滿之分曰朔虛氣盈者一節一氣共三十日有餘分為中分中即氣也堯典所載惟命羲和一事蓋人君代天理物不敢不重後世乃委之星翁曆官至于推步迎䇿又各執已見以為定法其他未暇舉如唐一行所造大衍曆亦可取疑若可以久用無差然未十年而已變是知不可不明其理也夫天左旋日月星緯右轉日夜不止豈可執一故漢唐之曆屢變本朝二百餘年曆亦十二三變聖人作易于革卦言治曆明時觀革之義其不可執一明矣四嶽舉鯀九載績用弗成而遜位之咨首及四嶽堯不以舉鯀之非而疑其黨姦也比之後世罪舉主之義甚異後生看經書須著看注疏及先儒解釋不然執已見議論恐入自是之域便輕視古人至漢唐間名臣議論反之吾心有甚悖道處亦須自家有徴諸庶民而不謬底道理然後别白言之尚書一部只是説德而知德者實難遜志小心是兩般讀書固不可不曉文義然只以曉文義為是只是兒童之學須看意旨所在孝經十八章孔子于曽子踐履實地中説出來非虛言也惟天下之至一為能處天下之至變惟天下之至安為能處天下之至危大禹謨一篇要領只在克艱兩字上學者須是有志讀書只理會文義便是無志善學者如關津不可胡亂放人過聖人教人只是就人日用處開端如孟子言徐行後長可為堯舜不成在長者後行便是堯舜怎生做得堯舜樣事須是就上面著工夫聖人所謂吾無隱乎爾誰能出不由户直截是如此士不可不弘毅譬如一箇擔子盡力擔去前面不奈何却住無怪今自不近前却説道擔不起豈有此理故曰力不足者中道而廢今女畫讀書之法須是平平淡淡去看子細玩味不可草草所謂優而柔之厭而飫之自然有渙然氷釋怡然理順底道理處家遇事須著去做若是褪頭便不是子弟之職已缺何以謂學燕昭王之于樂毅漢髙帝之于蕭何蜀先主之于孔明符秦之于王猛相知之深相信之篤這般處所不可不理會讀其書不知其人可乎燕昭之封樂毅漢髙之械繫蕭何當大利害處未免搖動此心但有深淺人品之説直截是有只如臯陶九德便有數等就中即一德論之如剛而塞者便自有幾般古今人物同處直截是同異處直截是異然論異處極多同處却約作德便心逸日休作偽便心勞日拙作善便降之百祥作不善便降之百殃孟子言道二仁與不仁而已同處甚約人莫先于自知不在大綱上須是細膩求學者不長進只是好已勝出一言做一事便道全是豈有此理古人惟貴知過則改見善則遷今各自執已是𬒳人點破便愕然所以不如古人主于道則欲消而藝亦可進主于藝則欲熾而道亡藝亦不進仁自夫子發之不可自暴自棄自屈志小不可以語大人事千古聖賢只是辦一件事無兩件事言必信行必果硜硜然小人哉宜自考察退步思量不要􅕽外共工方鳩僝功與如川之方至此方字不可作且字看堯之知共工丹朱不是于形迹間見之直是見他心術吕正字館職䇿直是失了眼目只是術然孟子亦激作却不離正道楊子雲好論中實不知中大雅是綱小雅是目尚書綱目皆具觀書到文侯之命道已湮沒春秋所以作有所忿懥則不足以服人有所恐懼則不足以自立志道據德依仁學者之大端須是信得及乃可王文中中説與楊子雲相若雖有不同其歸一也道在天下加之不可損之不可取之不可舍之不可要人自理會大綱提掇來細細聖會去如魚龍逰于江海之中沛然無礙據要會以觀方來觀春秋易詩書經聖人手則知編論語者亦有病中庸言鬼神之為德也其盛矣乎夫子發明判然甚白俗諺云心堅石穿既是一箇人如何不打疊教靈利今之學者譬如行路偶然撞著一好處便且止覺時已不如前人所以乍出乍入乍明乍昏學者不自著實理會只𬋩看人口頭言語所以不能進且如做一文字須是反覆窮究去不得又換思量皆要窮到窮處項項分明他日或問人或聽人言或觀一物自有觸長底道理失了頭緒不是助長便是忘了所以做主不得記言后稷其辭恭其欲儉只是説末論語言伯夷叔齊求仁得仁泰伯三以天下讓殷有三仁却從血脈上説來利害毁譽稱譏苦樂能動搖人釋氏謂之八風七重鐡城私心也私心所隔雖思非正小兒亦有私思心官不可曠職太陽當天太隂五緯猶自放光芒不得那有魑魅魍魎來小德川流大德敦化小德即大德大德即小德發強剛毅齊莊中正皆川流也敦厚化變化皇極之君斂時五福錫厥庶民福如何錫得只是此理充塞乎宇宙溺于俗見則聽正言不入知道則末即是本枝即是葉又曰有根則自有枝葉上逹下逹即是喻義喻利人情物理上做工夫老子曰大道甚夷而民好徑辨便有進須是下及物工夫則隨大隨小有濟天下若無著實師友不是各執已見便是恣情縱欲三百篇之詩有出于婦人女子而後世老師宿儒且不能注解得分明豈其智有所不若只為當時道行道明韓退之言軻死不得其傳固不敢誣後世無賢者然直是至伊洛諸公得千載不傳之學但草創未為光明到今日若不大假光明更幹當甚事大衍之數五十其用四十有九分而為二以象兩挂一以象三揲之以四以象四時歸竒于扐以象閠五嵗再閠故再扐而後挂既分為二乃挂其一于前挂别也非置之指間也既别其一却以四揲之餘者謂之竒然後歸之扐扐指間也故一揲之餘不四則八再揲三揲之餘亦不四則八四竒也八偶也故三揲而皆竒則四四四有乾之象三揲而皆偶則八八八有坤之象三揲而得兩偶一竒則四八八有艮之象八四八有坎之象八八四有震之象三揲而得兩竒一偶則八四四有兊之象四八四有離之象四四八有巽之象故三竒為老陽三隅為老隂兩偶一竒為少陽兩竒一偶為少隂老隂老陽變少隂少陽不變分挂揲歸竒是四節故曰四營而成易卦有六爻每爻三揲三六十八故曰十有八變而成卦右揲蓍説右門人周清叟亷夫所録先生語伯敏云近日向學者多一則以喜一則以懼夫人勇于為學豈不可喜然此道本日用常行近日學者却把作一事張大虛聲名過于實起人不平之心是以為道學之説者必為人深排力詆此風一長豈不可懼某之取人喜其忠信誠慤言似不能出口者談論風生他人所取者某深惡之因論輔試得失先生云今之人易為利害所動只為利害之心重且如應舉視得失為分定者能幾人往往得之則喜失之則悲惟曹立之萬正淳鄭學古庶幾可不為利害所動故學者須當有所立免得臨時為利害所動朱季繹云如敬肆義利之説乃學者持已處事所不可無者先生云不曾行得説這般間言長語則甚如此不已恐將來客勝主以辭為勝然使至此非學者之過乃師承之過也朱云近日異端邪説害道使人不知本先生云如何朱云如禪家之學人皆以為不可無者又以謂形而上者所以害道使人不知本先生云吾友且道甚底是本又害了吾友甚底來自不知巳之害又烏知人之害包顯道常云人皆謂禪是人不可無者今吾友又云害道兩箇却好縳作一束今之所以害道者却是這間言語曹立之天資甚髙因讀書用心之過成疾其後疾與學相為消長𥘉來見某時亦是有許多間言語某與之蕩滌則胸中快活明白病亦隨減逮一聞人言語又復昏蔽所以昏蔽者緣與某相聚日淺然其人能自知每昏蔽則復相過某又與之蕩滌其心下又復明白與講解隨聽即解某問比或有疑否立之云無疑每常自讀書亦見得到這般田地只是不能無疑往往自變其説某云讀書不可曉處何須苦思力索如立之天資思之至固有一箇安排處但恐心下昏蔽不得其正不若且放下時復􅉼泳似不去理會而理會所謂優而柔之使自求之厭而飫之使自趣之若江海之寖膏澤之潤渙然氷釋怡然理順然後為得也如此相聚一兩旬而歸其病頓減其後因秋試聞人間言語又復昏惑又適有告之以某乃釋氏之學渠平生惡釋老如仇讐于是盡叛某之説却湊合得元晦説話後不相見以至于死因問伯敏云曽聞此等語否伯敏云未也先生語朱云他却未有許多間言語且莫要壞了李敏求且聽某與他説大凡為學須要有所立語云已欲立而立人卓然不為流俗所移乃為有立須思量天之所以與我者是甚底為復是要做人否理會得這箇明白然後方可謂之學問故孟子云學問之道求其放心而已矣如慱學審問明辨謹思篤行亦謂此也此須是有志方可孔子曰吾十有五而志于學是這箇志伯敏云伯敏于此心能剛制其非只是持之不久耳先生云只剛制于外而不內思其本􅉼飬之功不至若得心下明白正當何須剛制且如在此説話使忽有美色在前老兄必無恱色之心若心常似如今何須剛制先生語繆文子云近日學者無師法往往𬒳邪説所惑異端能惑人自吾儒敗績故能入使在唐虞之時道在天下愚夫愚婦亦皆有渾厚氣象是時便使活佛活老子莊列出來也開口不得惟陋儒不能行道如人家子孫敗壞父祖家風故釋老却倒來點檢你如莊子云以智治國國之賊惟是陋儒不能行所無事故𬒳他如此説若知者行其所無事如何是國之賊今之攻異端者但以其名攻之𥘉不知自家自𬒳他點檢在他下面如何得他服你須是先理會了我底是得有以使之服方可學者先須不可陷溺其心又不當以學問誇人誇人者必為人所攻只當如常人見人不是必推惻隱之心委曲勸諭之不可則止若説道我底學問如此你底不是必為人所攻兼且所謂學問者自承當不住某見幾箇自主張學問某問他你了得也未他心下不穩如此則是學亂説實無所知如此之人謂之痼疾不可治寧是縱情肆欲之人猶容易與他説話最是學一副亂説底沒奈他何此只有兩路利欲道義不之此則之彼人須是間時大綱思量宇宙之間如此廣闊吾身立于其中須大做一箇人文子云某嘗思量我是一箇人豈可不為人却為草木禽獸先生云如此便又細了只要大綱思且如天命之謂性天之所以命我者不殊乎天須是放教規模廣大若尋常思量得臨事時自省力不到得𬒳陷溺了文子云某始𥘉來見先生若發蒙然再見先生覺心下快活凡事亦自持只恐到昏時自理會不得先生云見得明時何持之有人之于耳要聽即聽不要聽則否于目亦然何獨于心而不由我乎先生語伯敏云人惟患無志有志無有不成者然資稟厚者必竟有志吾友每聽某之言如何伯敏曰每聞先生之言茫然不知所入幼者聽而弗問又不敢躐等先生云若果有志且須分别勢利道義兩途某之所言皆吾友所固有且如聖賢垂教亦是人固有豈是外面把一件物事來贈吾友但能悉為發明天之所以豫我者如此其厚如此其貴不失其所以為人者耳伯敏問云日用常行去甚處下工夫先生云能知天之所以豫我者至貴至厚自然逺非僻惟正是守且要知我之所固有者伯敏云非僻未嘗敢為先生云不過是硬制在這裏其間有不可制者如此將來亦費力所以要得知天之豫我者看吾友似可進緣未曾𬒳人間言語所惑從頭理會故易入蓋先入者為主如一器皿虛則能受物若垢汙先入後雖欲加以好水亦費力如季繹之學駁雜自主張學問却無奈何伯敏問云以今年校之去年殊無寸進先生云如何要長進若當為者有時而不能為不當為者有時乎為之這箇却是不長進不恁地理會泛然求長進不過欲以已先人此是勝心伯敏云無箇下手處先生云古之欲明明德于天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物格物是下手處伯敏云如何樣格物先生云研究物理伯敏云天下萬物不勝其繁如何盡研究得先生云萬物皆備于我只要明理然理不解自明須是隆師親友伯敏云此間賴有季繹時相勉勵先生云季繹與顯道一般所至皆勉勵人但無根者多其意似欲私立門户其學為外不為已世之人所以攻道學者亦未可全責他蓋自家驕其聲色立門户與之為敵嘵嘵勝口實有所未孚自然起人不平之心某平日未嘗為流俗所攻攻者却是讀語録精義者程士南最攻道學人或語之以某程云道學如陸某無可攻者又如學中諸公義均骨肉蓋某𥘉無勝心日用常行自有使他一箇敬信處某舊日伊洛文字不曽看近日方看見其間多有不是今人讀書平易處不理會有可以起人羡慕者則著力研究古先聖人何嘗有起人羡慕者只是此道不行見有竒特處便生羡慕自周末文弊便有此風如唐虞之時人人如此又何羡慕所以莊周云臧與穀共牧羊而俱亡其羊問臧奚事曰慱塞以逰問穀奚事曰挾䇿讀書其為亡羊一也某讀書只看古注聖人之言自明白且如弟子入則孝出則弟是分明説與你入便孝出便弟何須得傳注學者疲精神于此是以簷子越重到某這裏只是與他減簷只此便是格物伯敏云每讀書始者心甚專三五遍後往往心不在此知其如此必欲使心在書上則又别生一心卒之方寸擾擾先生云此是聽某言不入若聽得入自無此患某之言打做一處吾友二三其心了如今讀書且平平讀未曉處且放過不必太殢繆文子資質亦費力慕外尤殢每見他退去一似不能脫羅網者天之所以豫我者至大至剛至直至平至公如此私小做甚底人須是放教此心公平正直無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直某今日作包顯道書云古人之學不求聲名不較勝負不恃才智不矜功能今人之學正坐反此耳讀介甫書見其凡事歸之法度此是介甫敗壞天下處堯舜三代雖有法度亦何嘗專恃此又未知户馬青苗等法果合堯舜三代否當時闢介甫者無一人就介甫法度中言其失但云喜人同已祖宗之法不可變夫堯之法舜嘗變之舜之法禹嘗變之祖宗法自有當變者使其所變果善何嫌于同古者道德一風俗同至當歸一精義無二同古者適所以為美惜乎無以此闢之但云祖宗法不可變介甫才髙如何便伏惟韓魏公論青苗法云將欲利民反以害民甚切當或言介甫不當言利夫周官一書理財者居半冡宰制國用理財正辭古人何嘗不理會利但恐三司等事非古人所謂利耳不論此而以言利遏之彼豈無辭所以率至于無奈他何處或問介甫比商鞅何如先生云商鞅是腳踏實地他亦不問王霸只要事成却是先定規模介甫慕堯舜三代之名不曾踏得實處故所成就者王不成霸不就本原皆因不能格物模索形似便以為堯舜三代如此而巳所以學者先要窮理後生自立最難一人力抵當流俗不去須是髙著眼看破流俗方可要之此豈小亷曲謹所能為哉必也豪傑之士胡丈因舉䀲翁語云豪傑而不聖人者有之未有聖人而不豪傑者也先生云是問作文法先生云讀漢史韓柳歐蘇尹師魯李淇水文不誤後生惟讀書一路所謂讀書須當明物理揣事情論事勢且如讀史須看他所以成所以敗所以是所以非處優遊涵泳久自得力若如此讀得三五卷勝看三萬卷問伯敏云作文如何伯敏云近日讀得原道等書猶未成誦但茫然無入處先生云左傳深于韓柳未易入且讀蘇文可也此外别有進否吾友之志要如何伯敏云所望成人目今未嘗敢廢防間先生云如何樣防間伯敏云為其所當為先生云雖聖人不過如是但吾友近來精神都死却無向來亹亹之意不是懈怠便是𬒳異説壞了夫人學問當有日新之功死却便不是邵堯夫詩云當煆錬時分徑挺到磨礲處發光輝磨礲煆錬方得此理明如川之增如木之茂自然日進無已今吾友死守定如何會為所當為慱學審問謹思明辨篤行慱學在先力行在後吾友學未慱焉知所行者是當為是不當為防間古人亦有之但他底防間與吾友别吾友是硬把捉告子硬把捉直到不動心處豈非難事只是依舊不是某平日與兄説話從天而下從肝肺中流出是自家有底物事何常硬把捉吾兄中間亦云有快活時如今何故如此伯敏云固有適意時亦知自家固有根本元不待把捉只是不能久防間稍寬便為物欲所害先生云此則罪在不常久上却如何硬把捉種種費力便是有時得意亦是偶然伯敏云却常思量不把捉無下手處先生云何不早問只此一事是當為不當為當為底一件大事不肯做更説甚底某平日與老兄説底話想都忘了伯敏云先生常語以求放心立志皆歷歷可記先生云如今正是放其心而不知求也若果能立如何到這般田地伯敏云如何立先生云立是你立却問我如何立若立得住何須把捉吾友分明是先曾知此理來後更異端壞了異端非佛老之謂異乎此理如季繹之徒便是異端孔門惟顔曾傳道他未有聞蓋顔曾從裏面出來他人外面入去今所傳者乃子夏子張之徒外入之學曾子所傳至孟子不復傳矣吾友却不理會根本只理會文字實大聲宏若根本壯怕不會做文字今吾友文字自文字學問自學問若此不已豈止兩假將百碎問近日日用常行覺精健否胸中快活否伯敏云近日别事不𬋩只理會我亦有適意時先生云此便是學問根源也若能無懈怠暗室屋漏亦如此造次必于是顛沛必于是何患不成故云君子以自昭明德古之欲明明德于天下者在致其知致知在格物古之學者為巳所以自昭其明德已之德已明然後推其明以及天下鼓鍾于宫聲聞于外鶴鳴于九臯聲聞于天在我者既盡亦自不能掩今之學者只用心于枝葉不求實處孟子云盡其心者知其性知其性則知天矣心只是一箇心某之心吾友之心上而千百載聖賢之心下而千百載復有一聖賢其心亦只如此心之體甚大若能盡我之心便與天同為學只是理會此誠者自成也而道自道也何嘗騰口説伯敏云如何是盡心性才心情如何分别先生云如吾友此言又是枝葉雖然此非吾友之過蓋舉世之弊今之學者讀書只是解字更不求血脈且如情性心才都只是一般物事言偶不同耳伯敏云莫是同出而異名否先生曰不須得説説著便不是將來只是騰口説為人不為已若理會得自家實處他日自明若必欲説時則在天者為性在人者為心此蓋隨吾友而言其實不須如此只是要盡去為心之纍者如吾友適意時即今便是牛山之木一假血脈只在仁義上以為未嘗有材焉此豈山之性也哉此豈人之情也哉是偶然説及𥘉不須分别所以令吾友讀此者蓋欲吾友知斧斤之害其材有以警戒其心日夜之所息息者歇也又曰生息蓋人之良心為斧斤所害夜間方得歇息若夜間得息時則平旦好惡與常人甚相逺惟旦晝所為梏亡不止到後來夜間亦不能得息夢寐顛倒思慮紛亂以致淪為禽獸人見其如此以為未嘗有才焉此豈人之情也哉只與理會實處就心上理會俗諺云癡人面前不得説夢又曰獅子咬人狂狗逐塊以土打獅子便徑來咬人若打狗狗狂只去理會土聖賢急于教人故以情以性以心以才説與人如何泥得若老兄與别人説定是説如何樣是心如何樣是性情與才如此分明説得好剗地不干我事須是血脈骨髓理會實處始得凡讀書皆如此又問飬氣一假先生云此尤當求血脈只要理會我善飬吾浩然之氣當吾友適意時别事不理會時便是浩然飬而無害則塞乎天地之間是集義所生者非義襲而取之也蓋孟子當時與告子説告子之意不得于言勿求于心是外面硬把捉的要之亦是孔門别派將來也會成只是終不自然孟子出于子思則是涵飬成就者故曰是集義所生者集義只是積善行有不慊于心則餒矣若行事不當于心如何得浩然此言皆所以闢告子又問飬勇異同先生云此只是比並北宫用心在外正如告子不得于言勿求于心施舍用心在內正如孟子行有不慊于心則餒矣而施舍又似曾子北宫又似子夏謂之似者蓋用心內外相似非真可及也孟子之言大抵皆因當時之人處已太卑而視聖人太髙不惟處已太卑而亦以此處人如是何足與言仁義也之語可見不知天之豫我者其𥘉未嘗不同如未嘗有才焉之類皆以謂才乃聖賢所有我之所無不敢承當著故孟子説此乃人人都有自為斧斤所害所以淪胥為禽獸若能涵飬此心便是聖賢讀孟子須當理會他所以立言之意血脈不明沉溺章句何益伯敏嘗有詩云紛紛枝葉謾推尋到底根株只此心莫笑無弦陶靖節箇中三嘆有遺音先生首肯之呈所編語録先生云編得也是但言語微有病不可以示人自存之可也兼一時説話有不必録者蓋急于曉人或未能一一無病時朱季繹楊子直程敦蒙先在坐先生問子直學問何所據云信聖人之言先生云且如一部禮記凡子曰皆聖人言也子直將盡信乎抑其間有揀擇子直無語先生云若使其都信如何都信得若使其揀擇却非信聖人之言也人謂某不教人讀書如敏求前日來問某下手處某教他讀旅􅋙太甲告子牛山之木以下何嘗不讀書來只是比他人讀得别些子右門人李伯敏敏求所録學者須是弘毅小家相底得人憎小者他起你亦起他看你亦看安得寬弘沉靜者一切包容因論爭名之流皆不濟事因論傅聖謨無志甘與草木俱腐曰他甘得如此你還能否因言居士極不喜狂者云最敗風俗只喜狷者故自號又次居士先生云此言亦有味因論子才不才事曰居移氣飬移體今之學者出世俗籠絡亦不得况能居天下之廣居尋常懈怠起時或讀書史或誦詩歌或理會一事或整肅几案筆硯借此以助精彩然此是慿物須要識破因問去懈怠曰要須知道不可須臾離乃可此是大丈夫事么麼小家相者不足以承當問楊云多時有退步之説不知曾果退否若不退絲毫許牽得住前輩大量的人看有甚大小大事他見如不見聞如不聞今人略有些氣𦦨者多只是附物元非自立也若某則不識一箇字亦須還我堂堂地做箇人諸處論學者次第只是責人不能行去老夫無所能只是識病天民如伊尹之類問作書攻王順伯也不是言釋也不是言儒惟理是從否曰然楊敬仲不可説他有禪只是尚有氣習未盡因説薛象先不可令于外面觀人能知其底裏了外面略可觀驗唐虞之間不如洙泗此語不是輪對第一劄讀太宗起頭處上曰君臣之間須當如此答陛下云云天下幸甚讀不存形迹處上曰賴得有所悔連説不患無過貴改過之意甚多答此為堯為舜為禹湯為文武血脈骨髓仰見聖學讀入本日處先乞奏云臣愚蠢如此便讀疆土未復生聚教訓處上曰此有時辭色甚壯答如十年生聚十年教訓此有甚時今日天下貧甚州貧縣貧民貧其説甚詳上無説讀第二劄論道上曰自秦漢而下無人主知道甚有自負之意其説甚多説禪答臣不敢奉詔臣之道不如此生聚教訓處便是道讀第三劄論知人上曰人才用後見答要見之于前意思志其辭上又曰人才用後見後又説此中有人云云答天下未知云云天下無人才執政大臣未稱陛下使令上默然讀第四劄上贊歎甚多第五劄所陳甚多下殿五六步上曰朕不在詳處做工夫只在要處秉笏立聽不容更轉對後王謙仲云渠每常轉對恐小官不比渠侍從也事有難易定夫𥘉來恐難説話後却聽得入覺得顯道昆仲説話難豫力辨之先生曰顯道隱藏在然豫于此一路亦時起疑以為人在一處理在一處後又解云只是未相合然終是疑才聞先生説即悟得大意曰道遍滿天下無些小空闕四端萬善皆天之所豫不勞人粧點但是人自有病與他間隔了又云只一些子重便是病又云只一些輕亦是病豫于此深有省見道後須見得前時小陋君子所貴乎道者三説得道字好動容貌出辭氣正顔色其道如此須是暴慢自逺鄙倍自逺人之所以病道者一資稟二漸習道大人自小之道公人自私之道廣人自狹之豫因説道難學今人才來理會此便是也不是何故以其便以此在胸中作病了豫却能知得這些子見識議論作病亦能自説先生曰又添得一場間説話一實了萬虛皆碎尚追惟論量前此所見便是此見未去豫舉荀子解蔽逺為蔽近為蔽輕為蔽重為蔽之類説好先生曰是好只是他無主人有主人時近亦不蔽逺亦不蔽輕重皆然其他體盡有形惟心無形然何故能攝制人如此之甚若是聖人亦逞一些子精彩不得平生所説未嘗有一説廓然昭然坦然廣居正位大道安宅正路是甚次第却反曠而弗居舍而弗由哀哉舊罪不妨誅責愈見得不好新得不妨發揚愈見得牢固因説定夫舊習未易消若一處消了百處盡可消豫謂晦庵逐事為他消不得先生曰不可將此相比他是添大世界不享却要占箇小蹊小徑子大人不做却要為小兒態可惜小心翼翼昭事上帝上帝臨汝無二爾心戰戰兢兢那有間管時候典常也憲法也皆天也要常踐道踐道則精明一不踐道便不精明便失枝落節如何容人力做樂循理謂之君子小心翼翼心小而道大大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶吾有知乎哉晦庵言謙辭又來這裏做箇道理今一切去了許多繆妄勞攘磨礲去圭角寖潤著光精與天地合其德云云豈不樂哉成孝敬厚人倫美教化移風俗存飬是主人檢斂是奴僕家兄所聞考索是奴僕如今人只是去些子凡情不得相識還如不相識云云始是道人心詳道書好文字亦好純人專不中不遠汲黯秉彛厚黃老學不能汨上是天下是地人居其間須是做得人方不枉道大豈是淺丈夫所能勝任敏道言資稟因舉君子不謂命也一假今且未須去理會其他且分别小大輕重行狀貶剝贊歎人須要有道班固不如馬遷人為學甚難天覆地載春生夏長秋斂冬肅俱此理人居其間要靈識此理如何解得人不辨箇小大輕重無鑒識些小事便引得動心至于天來大事却放下著不愛教小人以藝常教君子以藝蓋君子得之不以為驕不得不以為歉小人得以為吝敗常亂教吾十有五而志于學今千百年無一人有志也是怪他不得志箇甚底須是有智識然後有志願人要有大志常人汩沒于聲色富貴間良心善性都蒙蔽了今人如何便解有志須先有智識始得有一假血氣便有一假精神有此精神却不能用反以害之非是精神能害之但以此精神居廣居立正位行大道見一文字未可輕易問是如何何患不曉守規矩孜孜持守規行矩步不妄言語鐡劔利則倡優拙有理會不得處沉思痛省一時間如此後來思得明時便有亨泰處今人欠箇精專不得人精神千種萬般夫道一而巳矣有懶病也是其道有以致之我治其大而不治其小一正則百正恰如坐得不是我不責他坐得不是便是心不在道若心在道時顛沛必于是造次必于是豈解坐得不是只在勤與惰為與不為之間人之資質不同有沉滯者有輕揚者古人有韋弦之義固當自覺不待人言但有恣縱而不能自克者有能自克而用功不深者人當先理會所以為人深思痛省枉自汩沒虗過日月朋友講學未説到這裏若不知人之所以為人而與之講學遺其大而言其細便是放飯流啜而問無齒決若能知其大雖輕自然反輕歸厚因舉一人恣情縱欲一知尊德樂道便明潔白直商君所説帝王皆是破説因循亦好因其事循其理見理未明寧是放過去不要起爐作竈正言正論要使長明于天下古之君子知固貴于慱然知盡天下事只是此理所以慱覽者但是貴精熟知與不知元無加損于此理若以不知為慊便是鄙陋以不知為歉則以知為泰今日之歉乃他日之泰君子雖多聞慱識不以此自負要當軒昻奮發莫恁他沉埋在卑陋凡下處此理在宇宙間何常有所礙是你自沉埋自蒙蔽隂隂地在箇陷穽中更不知所謂髙逺底要決裂破陷穽窺測破箇羅網誅鋤蕩滌慨然興發激厲奮迅決破羅網焚燒荆棘蕩夷汙澤世不辨箇小大輕重既是埋沒在小處于大處如何理會得志于聲色利逹者固是小勦摸人言語的與他一般是小若能自立後論汲黯便是如此論論董仲舒便是如此論自得自成自道不倚師友載籍理只在眼前只是𬒳人自蔽了因一向誤證他日逐只是教他做工夫云不得只如此見在無事須是事事物物不放過磨考其理且天下事事物物只有一理無有二理須要到其至一處傅聖謨説一人啓事有云見室而髙下異共天而寒暑殊先生稱意思好聖謨言文字體面大不小家先生云某只是見此好聖謨有許多説話問子路死之非只合責當時不合事輒曰此是去册子上看得來底亂道之書成屋今都滯在其間後云子路死是甚次第你既亂道了如何更為你解説泥裏洗土塊須是江漢以濯之居移氣飬移體今其氣一切不好云云這裏是刀鋸鼎鑊底學問人須是力量寬洪作主宰習氣識見凡下奔名逐利造次盡歡樂在其中詠歸履氷問顔魯公又不曾學如何死節如此好曰便是今人將學將道看得太過了人皆有秉彛包犧氏至黃帝方有人文以至堯舜三代今自秦一切壞了至今吾輩盍當整理先生與李尉曼卿言今人多𬒳科舉之習壞又舉與湯監言風俗成敗係君子小人窮逹亦係幸不幸皆天也然亦由在上之人人無不知愛親敬兄及為利欲所昏便不然欲發明其事止就彼利欲昏處指出便愛敬自在此是唐虞三代實學與後世異處在此人精神在外至死也勞攘須收拾作主宰收得精神在內時當惻隱即惻隱當羞惡即羞惡誰欺得你誰瞞得你見得端的後常􅉼飬是甚次第勿無事生事警戒無虞罔失法度罔逰于逸罔淫于樂至哉真聖人學也把捉二字不佳不如説固執克已三年克之顔子又不是如今人之病要克只是一些子未釋然處要知尊德樂道若某不知尊德樂道亦𬒳驅將去諸子百家説得世人之病好只是他立處未是佛老亦然邑中講説聞者無不感發獨朱益伯鶻突來問答曰益伯過求以利心聽故所求在新竒玄妙積思勉之功舊習自除擇善固執人舊習多少如何不固執得知非則本心即復人心只愛去泊著事教他棄事時如鶻孫失了樹更無住處既知自立此心無事時須要涵飬不可便去理會事如子路使子羔為費宰聖人謂賊夫人之子學而優則仕蓋未可也𥘉學者能完聚得幾多精神才一霍便散了某平日如何樣完飬故有許多精神難散豫因隨衆略説些子間話先生少頃曰顯道今知非否某答曰略知先生曰須要深知略知不得顯道每常愛説間話學者要知所好此道甚淡人多不知好之只愛事骨董君子之道淡而不厭朋友之相資須助其知所好者若引其逐外即非也人皆可以為堯舜此性此道與堯舜元不異若其才則有不同學者當量力度德𥘉教董元息自立收拾精神不得間説話漸漸好後𬒳教授教解論語却反壞了人不肯心間無事居天下之廣居須要去逐外著一事印一説方有精神惟精惟一須要如此涵飬無事時不可忘小心翼翼昭事上帝老子為學為道之説非是如某説只云著是而去非捨邪而適正有道無道之人有才無才與才之髙下為道之幸不幸皆天也我無事時只似一箇全無知無能底人及事至方出來又却似箇無所不知無所不能之人朱濟道説前尚勇決無遲疑做得事後因見先生了臨事即疑恐不是做事不得今日中只管悔過懲艾皆無好處先生曰請尊兄即今自立正坐拱手收拾精神自作主宰萬物皆備于我有何欠闕當惻隱時自然惻隱當羞惡時自然羞惡當寬𥙿溫柔時自然寬𥙿溫柔當發強剛毅時自然發強剛毅無思無為寂然不動感而遂通天下之故惡能害心善亦能害心如濟道是為善所害心不可汩一事只自立心人心本來無事胡亂𬒳事物牽將去若是有精神即時便出便好若一向去便壞了人不肯只如此須要有箇説話今時朋友盡須要箇説話去講後生有甚事但遇讀書不曉便問遇事物理會不得時便問并與人商量其他有甚事自家表裏內外如一因説金溪蘇知縣資質好亦甚知尊敬然只是與他説得大綱話大緊要處説不得何故蓋為他三四十年父兄師友之教履歷之事幾多今胸中自有主張了如何掇動得他須是一切掇動剗除了方得如格君亦須如此然如吏部格法如何動得他朱濟道説臨川從學之盛亦可喜先生曰某豈不愛人人能自立人人居天下之廣居立天下之正位立乎其大者而小者弗能奪然豈能保任得朝日許多人在此相處一日新教授堂試許多人皆往只是𬒳勢驅得如此若如今去了科舉用鄉舉里選法便不如此如某却愛人試也好不試也好得也好不得也好今如何得人盡如此某所以憂之過于濟道所憫小民𬒳官吏苦者以彼所病者在形某之所憂人之所病者在心與濟道言風俗驅人之甚如人心不明如何作得主宰吾人正當障百川而東之先生曰某間説話皆有落著處若無謂間説話是謂不敬某與濟道同事濟道亦有不喜某處以某見衆人説好某説不好衆人説不好某解取之某與人理會事便是格君心之非事舉徐子宜云與晦庵月餘説話都不討落著與先生説話一句即討落著説濟道滯形泥迹不能識人𬒳人瞞濟道問智者術之原是否曰不是伏羲畫卦文王重之孔子繫之天下之理無一違者聖人無不照燭此智也豈是術因説舊曾與一人處事後皆效彼云察見淵魚不祥如何曰我這裏制于未亂保于未危反禍為福而彼為之者不知如何為不祥因舉許昌朝集朱吕學規在金溪教學一册月令人一觀固好然亦未是某平時未嘗立學規但常就本上理會有本自然有末若全去末上理會非惟無益今既于本上有所知可略略地順風吹火隨時建立但莫去起爐作竈做得工夫實則所説即實事不話間話所指人病即實病因舉午間一人問虜使善兩國講和先生因贊歎不用兵全得幾多生靈是好然吾人皆士人曾讀春秋知中國夷狄之辨二聖之讐豈可不復所欲有甚于生所惡有甚于死今吾人髙居無事優遊以食亦可為耻乃懷安非懷義也此皆是實理實説事外無道道外無事臯陶求禹言禹只舉治水所行之事外此無事禹優入聖域不是不能言然須以歸之臯陶如疑知人之類必假臯陶言之顯仲問云某何故多昏先生曰人氣稟清濁不同只自完飬不逐物即隨清明才一逐物便昏眩了顯仲好懸斷都是妄意人心有病須是剝落剝落得一畨即一畨清明後隨起來又剝落又清明須是剝落得淨盡方是人心有消殺不得處便是私意便去引文牽義牽枝引蔓牽今引古為證為靠既無病時好讀書但莫去引起來慥姪問乍寬乍緊乍明乍昏如何曰不要緊但莫懈怠緊便不是寬便是昏便不是明便是今日十件昏明日九件後日又只八件便是進語顯仲云風恬浪靜中滋味深長人資性長短雖不同然同進一步則皆失同退一步則皆得問傅季魯如何而通如何而塞因曰某明時直是明只是懈怠時即塞若長鞭䇿不懈怠豈解有塞然某才遇塞時即不少安即求出若更藉朋友切磋求出亦鈍甚矣所以淹沒人只朋友説間話之類亦能淹人某適𬒳顯仲説間話某亦隨流不長進亦甚然通時説事亦通塞時皆塞寫字須一點是一點一畫是一畫不可苟彘雞終日縈縈無超然之意須是一刀兩斷何故縈縈如此縈縈底討箇甚麼仰首攀南斗翻身倚北辰舉頭天外望無我這般人今有難説處不近前來底又有病近前來底又有病世俗情欲底人病却不妨只指教他去彼就此最是于道理中鶻突不分明人難理會某平生怕此等人世俗之過却不怕舊橫截人太甚如截周成之後當不得無成今皆不然以次第進之有大力量者然後足以當其橫截即有出路教小兒須發其自重之意豫問能辨朱事曰如何辨豫曰不得受用曰如此説便不得彼亦可受用只是信此心未及又曰只今明白時便不須更推如何如何又曰凡事只過了更不須滯滯泥泥子淵却不如此過了便了無凝滯區處得多少事并應對人手中亦讀得書問二兄恐不知先生學問旨脈曰固是前日亦嘗與朱濟道説須是自克却方見得自家舊相信時亦只是虛信不是實得見我只是不説一若説一公便愛平常看人説甚事只是隨他説却只似箇東説西説底人我不説一楊敬仲説一嘗與敬仲説針它凡事莫如此滯滯泥泥某平生于此有長都不去著他事凡事纍自家一毫不得每理會一事時血脈骨髓都在自家手中然我此中却似箇間間散散全不理會事底人不陷事中詳道如昨日言定夫時宏大磊落常常如此時好但莫𬒳枝葉纍倒了須是工夫孜孜不懈乃得若稍懈舊習又來君子之道淡而不厭淡味長有滋味便是欲人不愛淡却只愛閙熱人須要用不肯不用須要為不肯不為蓋器有大小有大大器底人自别算穩底人好然又無病生病勇往底人好然又一概去了然勇往底人較好算穩底人有難救者定夫舉禪説正人説邪説邪説亦是正邪人説正説正説亦是邪先生曰此邪説也正則皆正邪則皆邪正人豈有邪説邪人豈有正説此儒釋之分也古人朴實頭明播種者主播種明樂者主樂欲學者却學他然長者為主又其為主者自為主其為副者自為副一切皆有一定不易不爭宿無靈骨在師友處有所聞又不踐履去是謂無靈骨又云人皆可以為堯舜謂無靈骨是謂厚誣後生隨身規矩不可失道可謂尊可謂重可謂明可謂髙可謂大人却不自重才有毫髮恣縱便是私欲與此全不相似法語正如雷陽巽語正如風隂人能于法語有省時好于巽語有省未得其正須思繹詩雅正變風便是巽意離騷又其次也變風無騷意此又是屈原立此出于有所礙不得已後世作詩雅不得只學騷兵書邪説道塞乎天地以正伐邪何用此須别邪正小心翼翼昭事上帝上帝臨汝無二爾心此理塞宇宙如何由人杜撰得文王敬忌若不知此敬忌箇甚麼見季尉因説大率人多為舉業所壞渠建寧人尤溺于此取人當先行義考試當先理致毋以舉業之靡者為上大丈夫事豈當兒戲自立自重不可隨人腳跟學人言語四端皆我固有全無增添説本朝官制蔡元通所論亂道江泰之問某每懲忿窒欲求其放心然能暫而不能久請教答曰但懲忿窒欲未是學問事便懲窒得全無後也未是學學者須是明理須是知學然後説得懲窒知學後懲窒與常人懲窒不同常人懲窒只是就事就末孟子言學問之道求放心是發明當時人當時未有此説便説得孟子既説了下面更注腳便不得今上重明節九月四日早先生就精舍庭前朱衣象笏向北四拜歸精舍坐四拜問之答曰必有所尊非有已也太守上任拜廳學者大率有四樣一雖知學路而恣情縱欲不肯為一畏其事大且難而不為一求而不得其路一未知路而自謂能知學能變化氣質大人凝然不動不如此小家相先生云某每見人一見即知其是不是後又疑其恐不然最後終不出𥘉一見道塞天地人以自私之身與道不相入人能退步自省自然相入唐虞三代教化行習俗美人無由自私得后以裁成天地之道輔相天地之宜以左右民今都相背了説不得髙底人不取物下人取物粘于物資稟好底人闊大不小家相不造作間引惹他都不起不動自然與道相近資稟好底人須見一面自然識取資稟與道相近資稟不好底人自與道相逺却去煆煉東坡論嗣征甚好自五子之歌推來顧命陳設是因成王即位流言所致此召公之非不任道流俗之情也周之道微此其一也又爾有嘉謀嘉猷則入告爾后于內爾乃順之于外曰斯謀斯猷惟我后之德此二也舊嘗通張于湖書于建康誤解了中庸謂魏公能致廣大而不能盡精微極髙明而不能道中庸乃成兩截去了又嘗作髙祖無可無不可論誤解了書謂人心人偽也道心天理也非是人心只是説大凡人之心惟微是精微才粗便不精微謂人欲天理非是人亦有善有惡天亦有善有惡日月蝕惡星之類豈可以善皆歸之天惡皆歸之人此説出于樂記此説不是聖人之言與小後生説話雖極髙極微無不聼得與一輩老成説便不然以此見道無巧只是那心不平底人揣度便失了學者須是打疊田地淨潔然後令他奮發植立若田地不淨潔則奮發植立不得古人為學即讀書然後為學可見然田地不淨潔亦讀書不得若讀書則是假冦兵資盜糧凡所謂不識不知順帝之則晏然太平殊無一事然却有説擒搦人不下不能立事却要有理會處某于顯道恐不能久處此間且令涵飬大處如此樣處未敢發然某皆是逐事逐物考究練磨積日纍月以至如今不是自會亦不是别有一竅子亦不是等間理會一理會便會但是理會與他人别某從來勤理會長兄每四更一點起時只見某在看書或檢書或默坐常説與子姪以為勤他人莫及今人却言某懶不曽去理會好笑侍登鬼谷山先生行泥塗二三十里云平日極惜精力不輕用以留有用處所以如今如是健諸人皆困不堪觀山云佳處草木皆異無俗物觀此亦可知學天地人之才等耳人豈可輕人字又豈可輕有中説無無中説有之類非儒説因提宫昨晚所論事只是勝心風平浪靜時都不如此先生説數説揲蓍云蓍法後人皆誤了吾得之矣一行數妙甚聰明之極吾甚服之却自僧中出僧持世有曆法八卷君子役物小人役于物夫權皆在我若在物即為物役矣舉栁文乎歟邪之類説乎歟是疑又是贊歎不亦説乎是贊歎其諸異乎人之求之歟是贊歎孟子杞柳章一歟一也皆疑我説一貫彼亦説一貫只是不然天秩天敘天命天討皆是實理彼豈有此後生全無所知底似全無知一與説却透得為他中虛無事彼有這般意思底一切𬒳這些子隔了全透不得此虗妄最害人過不及有兩種人胸中無他只一味懈怠沉埋底人一向昏俗去若起得他却好只是難起此屬不及若好妄作人一切隔了此校不好此屬過人凝重闊大底好輕薄小相底不好槐云著意重便驚疑答有所重便不得舉孟子勿忘勿助長優裕寬平即所存多思慮亦正求索太過即存少思慮亦不正重滯者難得輕清刋了又重須是久在師側久久教他輕清去若自重滯如何輕清得人黃百七哥今甚平夷間雅無營求無造作甚好其資與其所習似不然今却如此非學力而何人之精爽負于血氣其發露于五官者安得皆正不得明師良友剖剝如何得去其浮偽而歸于真實又如何得能自省自覺自剝落數即理也人不明理如何明數神以知來智以藏往神蓍也智卦也此是人一身之蓍某自來非由乎學自然與一種人氣相忤才見一造作營求底人便不喜有一種沖然淡然底人便使人喜以至一樣衰底人心亦喜之年來為不了事底方習得稍不喜見退淡底人只一向起發他某從來不尚人起爐作竈多尚平因見衆人所為亦多因他然亦有心知其為非不以為是有二三年不説破者如此不為則已一為必中此雖非中然與彼好生事不中底人相去懸絶于事則如此多不為至于文章必某自為之文章豈有太過人只是得箇恰好他人未有倫敘便做得好只是偶然又云文章要煆煉詩小序解詩者所為天下蕩蕩乃因蕩蕩上帝序此尤謬可見者曾參髙柴漆雕開之徒是不及之好者曾晢是過之好者師過商不及是過不及之不好者人而不為周南召南其猶正牆面而立也學者第一義古之欲明明德于天下者此是第二孔子志學便是志此然須要有入處周南召南便是入處後生無志難説此與秦誓其心休休一章相應周南召南好善不厭關雎鵲巢皆然人無好善之心便皆自私有好善之心便無私便人之有技若巳有之今人未必有他心只是無志便不好善樂正子好善孟子喜而不寐又不是私于樂正子因曽見一大雞凝然自重不與小雞同因得關雎之意雎鳩在河之洲幽間自重以比興君子美人如此之美文以理為主荀子于理有蔽所以文不雅馴風以動之教以化之風是血脈教是條目夫子曰由知德者鮮矣要知德臯陶言亦行有九德然後乃言曰載采采事固不可不觀然畢竟是末自飬者亦須飬德飬人亦然自知者亦須知德知人亦然不于其德而徒繩檢于其外行與事之間將使人作偽韓文有作文蹊徑尚書亦成篇不如此後生精讀古書文漢書食貨志後生可先讀又著讀周官考工記又云後生好看繫辭皆贊歎聖人作易後生好看子虗上林賦皆以字數多後來好工夫不及此文才上二字一句便要有出處使六經句不謂之偷使學者不可翻然即改是私意此不長進五日畫一水十日畫一松石不如此胡亂做某觀人不在言行上不在功過上直截是雕出心肝人生天地間如何不植立窮究磨煉一朝自省因問黎師侯詩不是理明義精只是揩磨得之所以不能言與人曰此便是平生愛圗度樣子只是他不能言你又豈知得他是如此定夫挾一物不放胡做荆公求必他人不必求佛老髙一世人只是道偏不是周康叔來問學先生曰公且説扶渡子訟事來曾充之來問學先生曰公且説為誰打關節來只此是學又無事尚解忘今當機對境乃不能明小人儒為善之小人士誠小人哉謹致念大凡多隨資稟一致思便能出因説詳道舊問云心都起了不知如何在求道德成而上藝成而下行成而先事成而後今人之性命只在事藝末上彭世昌云只是不識輕重大小先生笑曰打入廖家牛隊裏去了因吳顯道與諸公説風水禪家話頭不説破之類後世之謬繼之者善也謂一隂一陽相繼精讀書著精采警語處凡事皆然某今亦教人做時文亦教人去試亦愛好人發解之類要曉此意是為公不是私凡事只看其理如何不要看其人是誰説晦翁云莫教心病最難醫內無所纍外無所纍自然自在才有一些子意便沉重了徹骨徹髓見得超然于一身自然輕清自然靈大凡文字才髙超然底多須要逐字逐句檢點他才穩文整底議論見識低却以古人髙文拔之本分事熟後日用中事全不離此後生只管令就本分事用工猶自救不暇難難教他只就本分事便就日用中事又一切忘了本分事難難精神全要在內不要在外若在外一生無是處但如奬一小人亦不可謂今要將些子意思奬他怒一小人亦不可謂今要將些子意思怒他都無事此只要當奬即奬當怒即怒吾亦不自知若有意為之便是私感畏人都不得我這裏有扶持有保飬有摧抑有擯挫韓文章多見于墓志祭文洞庭汗漫粘天無壁柳祭吕化光文章妙古人精神不間用不做則已一做便不徒然所以做得事成須要一切蕩滌莫留一些方得某平生有一節過人他人要會某不會他人要做某不做莫厭辛苦此學脈也不是見理明信得及便安不得因隂晴不常言人之開塞若無事時有塞亦未害忽有故而塞須理會方得不可戲謔不可作鄉談人欲起不肖破敗意必先借此二者發之某七八嵗時常得鄉譽只是莊敬自持心不愛戲故小年時皆無侣襪不破指爪長後年十五六覺與人無徒遂稍放開及讀三國六朝史見夷狄亂華乃一切剪了指爪學弓馬然胸中與人異未嘗失了後見人收拾者又一切古執去了又不免教他稍放開此處難不收拾又不得收拾又執這般要處要人自理會得截然無議論詞説蹊徑一説又一就説節不是此事極分明若遲疑則猶未大凡文字寧得人惡得人怒不可得人羞得人耻與晦菴書不是須是直湊道在邇而求諸逺事在易而求諸難只就近易處著著就實無尚虗見無貪髙務逺隨身規矩是後生切要莫看先生長者他老練但只他人看你莫看他人笑你莫笑所謂非禮勿視非禮勿聼管仲學老子亦然老衰而後佛入不專論事論末專就心上説論嚴泰伯云只是一箇好勝見一好事做近前便做得亦不是事好心却不好老氏見周衰名勝故專攻此處而申其説亡羊一也一是即皆是一明即皆明指顯仲剩語多曰須斬釘截鐡因看諸人下象棋曰凡事不得胡亂輕易了又不得與低底下後遇敵手便慣了即敗獅子捉象捉兔皆用全力其發若機括其司是非之謂也其留如詛盟其守勝之謂也莊子勢阻則謀計得則斷先生舊嘗作小經云意似莊子王遇子合問學問之道何先曰親師友去已之不美也人資質有美惡得師友琢磨知已之不美而改之子合曰是請益不答先生曰子合要某説性善性惡伊洛釋老此等話不副其求故曰是而已吾欲其理會此説所以不答右包揚顯道所録阜民癸卯十二月𥘉見先生不能盡記所言大旨云凡欲為學當先識義利公私之辨今所學果為何事人生天地間為人自當盡人道學者所以為學學為人而已非有為也又云孔門弟子如子夏子遊宰我子貢雖不遇聖人亦足號名學者為萬世師然卒得聖人之傳者柴之愚參之魯蓋病後世學者溺于文義知見繳繞蔽惑愈甚不可入道耳阜民既還邸遂盡屏諸書及後來疑其不可又問先生曰某何嘗不教人讀書不知此後煞有甚事某方侍坐先生遽起某亦起先生曰還用安排否先生舉公都子問鈞是人也一章云人有五官官有其職某因思是便收此心然惟有照物而已他日侍坐無所問先生謂曰學者能常閉目亦佳某因此無事則安坐瞑目用力操存夜以繼日如此者半月一日下樓忽覺此心巳復澄瑩中立竊異之遂見先生先生目逆而視之曰此理已顯也某問先生何以知之曰占之眸子而巳因謂某道果在邇乎某曰然昔者嘗以南軒張先生所類洙泗言仁書考察之終不知仁今始解矣先生曰是即知也勇也某因言而通對曰不惟知勇萬善皆是物也先生曰然更當為説存飬一節先生曰讀書不必窮索平易讀之識其可識者久將自明母耻不知子亦見今之讀書談經者乎歷敘數十家之旨而以巳見終之開闢反覆自謂究竟精微然試探其實固未之得也則何益哉乙巳十二月再入都見先生坐定曰子何以束縳如此因自吟曰翼乎如鴻毛遇順風沛乎若巨魚縱大壑豈不快哉既而以所記管窺諸語請益一二日再造先生曰夜來與朋友同看來却不是無根據説得出來自此幸勿輟録他日亦可自驗某嘗問先生之學亦有所受乎曰因讀孟子而自得之右門人詹阜民子南所録昔者先生來自金邑率僚友講道于白鹿洞發明君子喻于義小人喻于利一章之旨且喻人之所喻由其所習所習由其所志甚中學者之病義利之説一明君子小人相去一間豈不嚴乎苟不切巳觀省與聖賢之書背馳則雖有此文特紙上之陳言耳括蒼髙先生有言曰先生之文如黃鍾大吕發逹九地真啓洙泗鄒魯之祕其可不傳耶黃元吉荆州日録為學患無疑疑則有進孔門如子貢即無所疑所以不至于道孔子曰女以豫為多學而識之者歟子貢曰然往往孔子未然之孔子復有非與之問顔子仰之彌髙末由也已其疑非細甚不自安所以其殆庶幾乎學問須論是非不論效驗如告子先孟子不動心其效先于孟子然畢竟告子不是君子賢其賢而親其親小人樂其樂而利其利俱是一義皆主不忘而言仁者見之謂之仁智者見之謂之智之義人道敏政言果能盡人道則政必敏矣洪範有猷是知道者有為是力行者有守是守而不去者曰豫攸好德是大有感發者三德六德九德是通計其德多少三德可以為大夫六德可以為諸侯九德可以王天下翕受即是九德咸事敷施乃大施于天下履德之基是人心貪欲恣縱履卦之君子以辨上下定民志其志既定則各安其分方得尊德樂道謙德之柄謂染習深重則物我之心熾然謙始能受人以虗而有入德之道矣九疇之數一六在北水得其正三八在東木得其正惟金火易位謂金在火鄉火在金鄉而木生火自三上生至九自二會生于九正得二數故火在南自四至七亦得四數故金在西一變而為七七變而為九謂一與一為二一與二為三一與三為四一與四為五一與五為六五者數之祖既見五則變矣二與五為七三與五為八四與五為九九復變而為一卦隂蓍陽八八六十四七七四十九終萬物始萬物而不與乃是隂事將終陽事復始艮鼓萬物而不與聖人同憂道何嘗有憂既是人則必有憂樂矣精神不運則愚血氣不運則病孟氏沒吾道不得其傳而老氏之學始于周末盛于漢逮晉而衰矣老氏衰而佛氏之學出焉佛氏始于梁逹磨盛于唐至今而衰矣有大賢者出吾道其興矣夫獨漢武帝不用黃老于用人尚可與湯放桀武王伐紂丘民為貴社稷次之君為輕之義孔子作春秋之言亦如此王沂公曾論丁謂似出私意然志在退小人其脈則正矣迹雖如此于心何愧焉學問不得其綱則是二君一民等是恭敬若不得其綱則恭敬是君此心是民若得其綱則恭敬者乃保飬此心也蓍用七七少陽也卦用八八少隂也少陽少隂變而用之棋所以長吾之精神瑟所以飬吾之德性藝即是道道即是藝豈惟二物于此可見矣有已則忘理明理則忘已艮其背不見其身行其庭不見其人則是任理而不以已與人參也事父孝故事天明事母孝故事地察是學已到田地自然如此非是欲去明此而察此也明于庶物察于人倫亦然復小而辨于物小謂心不粗也在明明德在親民皆主于在止于至善臯陶謨洪範吕刑乃傳道之書四嶽舉丹朱舉鯀等于知人之明雖有不足畢竟有德故堯欲遜位之時必首曰汝能庸命遜朕位臯陶明道故歷述知人之事孟子曰我知言夫子曰不知言無以知人也誠則明明則誠此非有次第也其理自如此可欲之謂善知至而意誠亦同有志于道者當造次必于是顛沛必于是凡動容周旋應事接物讀書考古或動或靜莫不在時此理塞宇宙所謂道外無事事外無道捨此而别有商量别有趨向别有規模别有形迹别有行業别有事功則與道不相干則是異端則是利欲為之陷溺為之窠舊説即是邪説見即是邪見君子之道費而隱費散也釋氏謂此一物非他物故也然與吾儒不同吾儒無不該備無不管攝釋氏了此一身皆無餘事公私義利于此而分矣繫辭卦有大小隂小陽大言天下之至賾而不可惡也雖詭怪闔闢然實有此理且亦不可惡也言天下之至動而不可亂也天下有不可易之理故也吉凶者正勝者也易使人趨吉避凶人之所為當正而勝凶也必也使無訟乎至明然後知人情物理使民無訟之義如此天理人欲之分論極有病自禮記有此言而後人襲之記曰人生而靜天之性也感于物而動性之欲也若是則動亦是靜亦是豈有天理物欲之分若不是則靜亦不是豈有動靜之間哉磯釣磯也不可磯謂無所措足之地也無所措手足之義可坐而致也是疑辭與邪字同義人各有所長就其所長而成就之亦是一事此非拘儒曲士之所能知惟明道君子無所陷溺者能逹此耳斫之類如學為士者必能作文隨其才雖有工拙然亦各極其至而已與朋友切磋貴乎中的不貴泛説亦須有手勢必使其人去災病解大病灑然豁然若沉痾之去體而濯清風也若我泛而言之彼泛而聽之其猶前所謂杜撰名目使之持循是也鳶飛戾天魚躍于淵言其上下察也只緣理明義精所以于天地之間一事一物無不著察仰以觀象于天及萬物之宜惟聖者然後察之如此其精也孔門髙弟顔淵閔子騫冉伯牛仲弓曾參之外惟南宫適宓子賤漆雕開近之以敏逹捷給才智慧巧論之安能望宰我子貢冉有季路子遊子夏也哉惟其質實誠朴所以去道不逺如南宫適問禹稷躬稼而有天下最是朴實孔子不答以其默當于此心可外無言耳所以括出贊之云語大天下莫能載焉道大無外若能載則有分限矣語小天下莫能破焉一事一物纎悉微末未嘗與道相離天地之大也人猶有所憾蓋天之不能盡地所以為地不能盡天之所職自形而上者言之謂之道自形而下者言之謂之器天地亦是器其生覆形載必有理六十而耳順知見到矣七十而從心所欲不踰矩踐行到矣顔子未見其止乃未能臻此也生知蓋謂有生以來渾無陷溺無傷害良知具存非天降之才爾殊也漢唐近道者趙充國黃憲楊綰假秀實顔真卿王肅鄭康成謂論語乃子貢子遊所編亦有可考者如學而篇子曰次章便載有若一章又子曰而下載曽子一章皆不名而以子稱之蓋子夏輩平昔所尊者此二人耳不踐迹謂已知血脈之人不拘形著迹然亦未造閫奧樂正子在此地位人能明矣然乍縱乍警驟明忽暗必至于有諸己然後為得也孔子十五而志于學是已知道時矣雖有所知未免乍出乍入乍明乍晦或警或縱或作或輟至三十而立則無出入明晦警縱作輟之分矣然于事物之間未能灼然分明見得至四十始不惑不惑矣未必能洞然融通乎天理矣然未必純熟至六十而所知已到七十而所行已到事不師古率由舊章學于古訓古訓是式所法者皆此理也非徇其迹倣其事慱學審問謹思明辨始條理也如金聲而髙下隆殺疾徐疏數自有許多節奏到力行處則無説矣如玉振然純一而巳知至知終皆必由學然後能至之終之所以孔子學不厭發憤忘食易與天地凖至神無方而易無體皆是贊易之妙用如此一隂一陽之謂道乃泛言天地萬物皆具此隂陽也繼之者善也乃獨歸之于人成之者性也又復歸之于天天命之謂性也切磋之道有受得盡言者有受不得者彼有顯過大惡苟非能受盡言之人不必件件指摘他反無生意王道蕩蕩平平無偏無倚伯夷伊尹柳下惠聖則聖矣終未底于蕩蕩平平之域重卦而為六十四分三才𥘉二地也𥘉地下二地上三四人也三人下四人上五六天也五天下六天上一生二二生三三生萬物先儒謂屯之𥘉九如髙貴鄉公得之矣蒙再三瀆瀆則不告非發之人不以告于蒙者也為蒙者未能專意相向乃至再三以相試探如禪家云盜法之人終不成器一有此意則志不相應是自瀆亂雖與之言終不通解與不告同也八卦之中惟乾坤坎離不變倒而觀之亦是此卦外四卦則不然學問若有一毫夾帶便屬私小而不正大與道不相似矣仁之于父子固也然以舜而有瞽叟命安在哉故舜不委之于命必使底豫允若則有性焉豈不于此而驗元吉自謂智昧而心粗先生曰病固在此本是骨凡學問不實與朋友切磋不能中的每發一論無非泛説內無益于已外無益于人此皆已之不實不知要領所在遇一精識便𬒳他胡言漢語壓倒皆是不實吾人可不自勉哉格物者格此者也伏羲仰象俯法亦先于此盡力焉耳不然所謂格物末而已矣顔子仰髙鑽堅之時乃知枝葉之堅髙者也畢竟只是枝葉學問于大本既正而萬微不可不察規矩嚴整為助不少象山先生全集卷三十五終
