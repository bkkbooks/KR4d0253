  text: 象山先生全集卷之三
  hash: sha256:401f96e1e263986b310d9eb41808f2ae80964750b83e51e6d0cde07e38a146b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_003-1a}
body:
  text: 書與童伯虞某秋試幸不為考官所取得與諸兄諸姪切磨于聖賢之道以滓昔非日有所警易荆棘陷穽以康莊之衢反羈旅乞食而居之于安宅有足自慰者足下往年心期于豫兄子夀今年又與僕相處趨向固不凡近環吾居數百里間前此蓋不多若足下者然僕處足下之館幾半載而不能回足下眷眷聲利之心此誠僕淺陋之罪曽子曰視其庭可以搏鼠烏能與我歌乎仲尼顔子之所樂宗廟之美百官之富金革百萬之衆在其中此豈可以二用其心而期與富貴利逹兼得之者哉記曰富潤屋德潤身孟子曰趙孟之所貴趙孟能賤之又曰仁義忠信樂善不倦此天爵也公卿大夫此人爵也孟子之時求人爵者尚必修其天爵後世之求人爵蓋無所事于天爵矣捨此而從事于彼何啻養一指而失其肩背况又求之有道得之有命非人力所可必致者而反營營汲汲于其間以得喪為欣戚惑亦甚矣子思曰人皆曰豫知驅而納諸罟擭陷穽之中而莫之知辟也來書謂無我笑此僕之所憫惜非所笑也足下雖不言僕固知之深矣向僕既不能舉聞足下鎖試亦不中甚欲即書一紙為足下言之因循不遂比來此念尤切方此圖之竟為來書所先輒布此為復與劉深甫來書示以方册所疑足見為學不苟簡然其理皆甚明白本無可疑若于此未能通曉則是進學工夫不甚純一未免滯于言語爾今欲一一為深父解釋又恐只成言語議論無益于深父之身之心非徒無益未必不反害之也大抵為學但當孜孜進德修業使此心于日用間戕賊日少光潤日著則聖賢垂訓向以為盤根錯節未可遽解者將渙然冰釋怡然理順有不加思而淂之者矣書曰思曰睿睿作聖孟子曰思則得之學固不可以不思然思之為道貴切近而優遊切近則不失巳優遊則不滯物易曰擬之而後言議之而後動孟子曰權然後知輕重度然後知長短物皆然心為甚記曰心誠求之雖不中不逺矣日用之間何適而非思也如是而思安得不切近安得不優遊至于聖賢格言切近的當昭晣明白𥘉不難曉而吾之權度其則不逺非假于外物開卷讀書時整冠肅容平心定氣詁訓章句苟能從容勿迫而諷詠之其理當自有彰彰者縱有滯礙此心未充未明猶有所滯而然耳姑舍之以俟他日可也不必苦思之苦思則方寸自亂自蹶其本失已滯物終不明白但能于其所已通曉者有鞭䇿之力涵養之功使德日以進業日以修而此心日充日明則今日滯礙者他日必有冰釋理順時矣如此則讀書之次亦何適而非思也如是而思安得不切近安得不優遊若固滯于言語之間欲以失巳滯物之智強探而力索之非吾之所敢知也某銓曹再黜來歲又未免一來深父勉之謹無以言語議論妨進修之路使此心之良無斧斤之伐牛羊之牧而有雨露之霑滋雷風之鼓舞日以暢茂條逹則來示數章不求解于他人矣與張輔之來書纍纍及巳事辭復而意切讀之甚喜慰苟如是誰不欲相告者况如某之直而多言者耶今此子夀兄入邑此事政可面論第恐事罷不復能留至邑又有謁見應接之煩雖相見有不暇及此耳故略寓此言之蒙諭針膏肓之説且師友切磋之言孰不欲各中其病顧恐學未至識未明不能知人之病耳又恐言或中病而聽者不自以為病不能受耳又子方求吾言但當盡子受言之道不當教我告子之方使我告子而無其方則其言不足求矣子豈可教之使如何而告子耶必欲教人告已是何異教玉人雕琢玉哉至引孔子答弟子問仁問政問孝之説此尤非所宜言孟子于孔子特曰願學而巳吾于孔子弟子方且師仰敬畏之不暇如顔子曾子固不待論平時讀書至子夏子遊子張蘧伯玉南宮適諸賢言行未嘗不惕焉愧畏欽服而師承之而子遽可以孔子望我邪且子既能究觀聖人答弟子之言知其無不盡處擴而充之聖人亦只如此是已已知教人之方則吾當北面矣尚何以針子膏肓邪雖然庸詎知此言之非針子膏肓也寫至此欲止恐子未能深悟試更為詳言之學者大病在于師心自用師心自用則不能克已不能聽言雖使羲皇唐虞以來群聖人之言畢聞于耳畢熟于口畢記于心秪益其私增其病耳為過益大去道愈逺非徒無益而又害之來書謂備嘗險阻辛苦而無操心危慮患深之效此亦非也子之能特然自立異于流俗趣舍必求是而施設不苟人之所為有所不敢為人所不能為已或能為之人之所知有所不敢知人所不能知已或能知之凡此豈非操心危慮患深之效歟雖然至于師心自用學植不進未必不由此也古之所謂曲學詖行者不必淫邪放僻顯顯狼狽如流俗人不肖子者也蓋皆放古先聖賢言行依仁義道德之意如楊墨鄊原之類是也此等不遇聖賢知道者則皆自負其有道有德人亦以為有道有德豈不甚可畏哉曾子曰尊其所聞則髙明行其所知則光大尊所聞行所知要須本正其本不正而尊所聞行所知只成得箇簷板自沉溺于曲學詖行正道之所詆斥纍百世而不赦豈不甚可畏哉若與流俗人同過其過尚小簷版沉溺之過其過甚大真所謂膏肓之病也來書舉程明道先生靜亦定動亦定之語此非子之所知也定之于動靜非有二也來書自謂靜而定亦恐未能果如是也是處靜處動不同矣子之意豈不自謂靜時尚或能定獨難于動而定耶凡子之所謂定者非果定也豈有定于靜而不能定于動邪至又謂近雖未能不動而于動中之定頗庶幾焉此正是簷版處見子夀兄可面扣之若已悟得亦不妨驗過如意有未平而子夀處或冗未暇言無惜以片𥿄見問切磋之益政有所望非所敢憚也二前嘗論子為學之病及得二十一日報帖又知子尚未深曉特然自立之節較之流俗人則為賢者在子之身則為深病吾非不知子之踐履尚未能不自愧顧以為踐履未至此節已常在胸中耿耿然為拒善之藩籬而不能以自知况踐履既至自無愧于心其為病可勝言哉凡子之病皆性之不純理之不明而外之勢又有以增其病而無以藥之者子之病非獨子有之也人皆有之顧在流俗人而或有之是則可喜非可責也至于知學者有此病則其觀聖賢之訓聽師友之言必當惕焉愧悔改革不如是謂之不知學可也子欲問大學之道而不知此病雖于特然自立處一向加功將必不能至于無所愧縱不自知自謂無愧識者觀之正是一場大簷版耳吾之所望于子者非以流俗人望子也如以流俗人望子則子流俗人賢者矣勉而進之誠流俗中大賢者矣望之以聖賢之門乃始為一膏肓之病人也此病去自能改過遷善服聖賢之訓得師友之益如動亦定靜亦定之説亦不必苦心而自明也見此書如未深省但當以此書于讀書應事暇時常常提省久當自知之如疑欲辨無惜詳列三兩書所言踐履之説皆未曉劣者之意前書所謂踐履不説聖賢踐履只説輔之之所踐履君子有君子踐履小人有小人踐履聖賢有聖賢踐履拘儒瞽生有拘儒瞽生踐履若果是聖賢踐履更有甚病雖未至未純亦只要一向踐履去久則至于聖賢矣只為輔之踐履差了正如適越北轅愈􅕽而愈逺前書分明與子説是拒善之藩籬既是拒善之藩籬又豈可與聖賢踐履同日而語凡所與子言者皆只是入頭處何謂不教以入頭處也如中庸戒謹恐懼之言子正不能如是充子之踐履識者觀之正有可愧可耻不能戒謹不能恐懼莫甚焉二十五日書至發讀之見其頗無條理諸兄皆以為此必輔之氣未平時所言使少遲半日必不如是答書也某以為須是深省其病深生愧恐改革自新然後能所言中理如不知其過則雖心平氣定辭不悖謬亦未必能中理也如所謂𥘉不容以口舌辨之説此正師心自用拒善不能改過之明驗尚何戒謹恐懼之有與曹挺之挺之氣質徑直本無他病𥘉謂肯篤志學問自應日進來書氣象甚覺齟齬至有一貫多學之辨此似無謂大抵學者且當大綱思省平時雖號為士人雖讀聖賢書其實何曾篤志于聖賢事業往往從俗浮沉與時俯仰徇情縱欲汩沒而不能以自振日月逾邁而有泯然與草木俱腐之耻到此能有愧懼大決之志乃求涵養磨礪之方若有事役未得讀書未得親師亦可隨處自家用力檢點見善則遷有過則改所謂心誠求之不中不遠若事役有暇便可親書册所讀書亦可隨意自擇亦可啇量程度無不有益者看挺之殊未曾如此著實作工夫何遽論到一貫多學之處此等議論可且放下且本分隨自已日用中猛省自知愧怍自知下手處矣既著實作工夫後來遇師友却有日用中著實事可商量不至為此等虗論也與曹立之某駑劣之資禍患之中筋力氣血甚覺衰憊非復向時之比然更嘗之多愈覺欲速助長之病故講授處又差省力耳所謂趙學古書甚有直氣然于理致則不為甚明正使立之之言盡當于理亦未可必彼人之聼從但據今立之之學則正宜有以自反未遽可以責彼之難曉也承欲某詳指其非非惟不暇亦恐不在此蒙問致知知止正心誠意知至至之知終終之次序深切慨歎不知立之許多時在幹當甚事觀如此問文字一似夢中起來相似立之尚如此又何怪淂趙學古也知至至之知終終之一段程先生説得多少分明立之不應不曉文義恐是用意過當翻有如此疑惑隱窒之説已是當時病語然亦無難曉者只是説每事上便有知與不知者有知淂到底者有知不到底者縱令知得到底亦須是奉以周旋弗敢失墜乃始能卒終其事其意亦𥘉無深奧然用此解易則不可蓋易言知至知終是總説不是説每事蒙問謾及之不必滯泥大抵讀古人書若自滯泥則坦然之理翻成窒礙疑惑若滯泥既解還觀向之窒礙疑惑者却自昭然坦然當是時但恐不能力行以終之耳二得書乃知周丞處書未逹其間大槩論立之果于自是其説而不能盡人之説所述敏道正甫之言以示二公皆謂立之殊失其某往在都下與四方朋友講辨當其失辭處必徐謂之曰恐老兄未能自逹其意必使審思而善其辭彼或未能自申則代之為説必使其人本旨明白言足以盡其意然後與之論是非是非本在理當求諸其理不當求諸其辭辭失而非其意尤不當據况又非其辭而可據乎若各以言語占道理其敘述他人處必如法吏之文致則只成是必欲其説之勝非所以求至當也大抵人之所見所學固必自以為是與異已者辨固當各伸其説相與講求其至期歸乎一是之地固不可苟合強同然至其未能盡他人之説而果于自是則其勢必歸于欲已説之勝無復能求其至當矣公孫丑管仲晏子之功可復許乎之問其見至陋孟子斥之之辭亦甚峻切然丑不但巳難之至再至三故孟子之意愈白而丑之惑亦解景丑尹士充虞之問亦然問辨如此雖甚堅而不可屈益為明理者之願無他惟各獻其所疑以盡人之説非以自是之意必之于其先也至于夫子對陽貨則遜辭以適其意而不與之辨答子路何必讀書之説則厲辭以斥其過而不容其辨又如孟子排告子夷之陳相之説亦皆先有自必之意此則聖賢洞照彼巳所見甚明巳臻其至而不復有可改易者也若此則不可與學者請益決疑講道求是之時同年而語矣恐立之所見巳如聖賢之臻其至不復可以改易方將解他人之惑以明其道則又不可以前説議立之矣然區區之見以為立之今日所到去聖賢尚遠未可遽尸此任想立之亦未遽如此但失于講究墮常人之通患爾由前之説乃今日講辨者之通患也然遂此而不改則是人各是其所是而非其所非至當一是之地不復可至矣立之鄊與趙學古往復書病正坐此聲色臭味富貴利逹流俗之所汩沒者在此立之自少有志度越此等非出于勉強道之不明不行佛老之徒遍天下其説皆足以動人士大夫鮮不溺焉立之儒雅自將未嘗一入其樊懈怠縱弛人之通患知之非艱行之惟艱靡不有𥘉鮮克有終人所同戒立之志力堅固踐行有常苟有所知自許不畔人之質性有賢善者多病于庸立之自少開爽文義洽通凡有血氣皆有爭心苟有所長必自介恃當其蔽時雖甚不足道者猶將挾以傲人豈可望其以能問于不能以多問于寡也立之平日所積不為不多然聞有談道義者必屈已納交降心叩問原其設心本以審是求理非直為名而巳也凡此皆立之之實非有所譽若立之者可謂士矣然求之中行狂狷則當立于狷者之列固有所強矣而不免于弱固有所明矣而不免于暗弱病固不能免而所大患者尤在于不明必欲天下之理無所不明必至夫子耳順之年而後可言然學而不厭發憤忘食回非助我啓豫者商則雖夫子之聖亦非有天下之理皆已盡明而無復有可明之理今謂立之不明者非固責其不能盡明天下之理蓋謂其有不自知之處也人各有能有不能有明有不明若能為能不能為不能明為明不明為不明乃所謂明也狂者進取狷者有所不為立之疇昔乃狷者之體至其皇皇于求善汲汲于取益而不敢自安自棄固有不終狷之勢比來言論果決不復有不自安之意自信篤確不復有求善取益之實如得崑崙之竹協以鳯鳴校以秬黍方將同律度量衡以齊一天下則與前所謂狷者之體大不侔矣誠使立之之學果至此地固不可泛議其超躐也陳后山有曰醉酒者亂操刀者割則有以使之也某雖淺陋然留意學問之日久更嘗頗多若所以使立之至此者頗能知其本末今立之但能以有言逆于汝心必求諸道之法試思之當亦有自知者矣以為有序其實失序以為有證其實無證以為廣大其實小狹以為公平其實偏側將為通儒乃為拘儒將為正學乃為曲學以是主張吾道恐非吾道之幸姑隨所見其號不侈小心退遜以聼他日之進則小可大狹可廣拘可通曲可直便不至失序便不至無證苟能自省雖才質下于立之者可免此病苟不自省雖才質髙于立之者亦或有此病子夏孔門之髙弟百世之師表其才質豈易得哉當時夫子告之曰汝為君子儒無為小人儒夫所謂小人者豈險賊不正之謂哉果險賊不正則又安得謂之儒雖曰儒矣然而有所謂小人儒言必信行必果硜硜然小人哉雖曰小人哉然不可不謂之士尹士所疑于孟子者非險賊不正之謂也然聞孟子之言則曰士誠小人也今智識未能及尹士而其號則侈于孟子立之能于此自省則庶乎能免于不明之患矣承欲雜説謾録近一二書併論學一段去論學一段雖是舊所説然恐立之不及見亦欲立之更留心考之橫渠先生云見識長得一格看得又别此語誠是與黃日新執别彌年比復得一見目足下之貌耳足下之言知足下之學甚稱其所以為名欣喜踴躍不以今日之同舉送而以其同心志也善惡邪正君子小人之各以氣類相從蓋如此雖然此有大可畏者以夫子之聖孟子之賢猶不免叔孫臧倉之毁僕與足下蓋所謂志乎善與正而君子之徒者也繩之以聖賢之事固有不勝其任者然聖賢之所與也亦聖賢之所責也若志夫邪惡之小人則固與我薰蕕矣盜憎主人犬吠希見僕與足下之所與殆憎吠之招也吁可畏哉彼狃于習俗蔽于聞見以陷于惡而失于本心者不可遽謂之小人聞善而慕知過而懼皆君子之徒也若乃親善人聞善言見善行而狼狽自若無所忌憚慧黠姦慝常有毀傷善類之心此所謂志夫邪惡之小人而聖人所用發蒙之道以説其桎梏者也其甚者亦獨能使之革面而已喜憎吠者蓋此流也天將降大任于是人必先苦其心志行拂亂其所為所以動心忍性增益其所不能足下其識之僕之言將若左契安其身而後動易其心而後語定其交而後求行有不得者反求諸其身此僕之所聞所知而未能者願與足下共講而共由之與黃元吉道廣大學之無窮古人親師求友之心亦無有窮巳以夫子之聖猶曰學不厭况在常人其求師友之心豈可不汲汲也然師友會聚不可必得有如未得會聚則隨巳智識隨巳力量親書册就事物豈皆蒙然懵然略無毫髮開明處曽子曰尊其所聞則髙明行其所知則光大非欺人也今元吉縱未有聞所未聞見所未見處且隨前日所已聞巳知者尊之行之亦當隨分有日新處莫未至全然為冥行也學者未得親師友時要當隨分用力隨分考察使與汲汲求師友之心不相妨害乃為善也此二者一有偏勝便入私小即是不得其正非徒無益而害之也與喬德占某時下粗遣無足道者披讀來示情文煥然如昔者之見德占未之有改不唯不改抑似有益甚者教以為學日知其難過失日覺其多朝夕恐懼非不鄙無似以為可語安肯及此愚見所及用不敢自外于左右所謂知難覺過者蓋未知其難未覺其過而恐懼者非所以為恐懼也誠能知難知過知恐懼則雖無此言千里之外人書之間當必有其驗矣潛雖伏矣亦孔之昭誠之不可掩固如此此過不除學者大患不然則如所云者適足以增其驕益其疾焉而巳矣將有窮年卒歲愈􅕽愈逺而不自知者甚可懼也與諸葛受之某自承父師之訓平日與朋友切磋輒未嘗少避為善之任非敢奮一旦之決信不遜之意徒為無顧忌大言誠以疇昔親炙師友之次實深切自反灼見善非外鑠徒以交物有蔽淪胥以亡大發愧耻自此鞭䇿駑蹇不敢自棄今契丈之賢乃復猶豫于此無乃反巳未切省巳未深見善未明以不能自奮也儻一旦幡然沛然誰得而禦孟子曰自謂不能者自賊者也幸無久自屈抑愚見如此若有未安幸詳見教象山先生全集卷之三
