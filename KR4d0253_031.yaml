front:
  text: 象山先生全集卷之三十一外集
  hash: sha256:621770adf4adca3a015d6e5ffa4f2c9bfeb52ca8e97f20371da7e882c99fabc8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_031-1a}
body:
  text: 程文問制科解試對制科不可以有法制科而有法吾不知制科之所取者何人也以蝸蛭之餌垂海而冀吞舟之魚唐賈至猶以為諸科之病今制科者天子所自詔以待非常之才也孰謂非常之才而可以區區之法制束而取之乎然是科始于漢盛于唐至于我宋其為法益密而其得人之盛視漢唐有優焉何哉愚嘗論之漢病于經唐病于文長才異能之士類多淪溺于訓詁聲律之間故漢唐之制舉不可以罪法我宋之盛莫盛于仁宗蓋其承三朝涵養天下之久和氣浹洽人才衆多學術雅正經不病漢文不病唐而天聖復科之詔又其圖治之心鋭而求才之意切天下之士雷動雲合欲振聳于天子之庭者心洋洋而冠峩峩也是以一舉而得富鄭公再舉而得張文定其餘如何張蘇錢之流亦往往可稱數號為得人之盛然未幾而范文正公且言曰朝廷命試之際或將訪以不急之務雜以非聖之書欲伺其所未知誤其所熟習適足以誤多士之心非勸學育材之意也嘉祐之末蘇文忠公制䇿之對且曰陛下所為親䇿賢良之士者以應故事而巳豈以臣言為真足有感于陛下耶愚以為仁宗英特之主好賢之誠蓋不後于堯舜三王而乃使當時大臣有誤多士之論制科之人有應故事之説者是蓋其法之罪也故天聖之法不可以不變恭惟主上臨御以來十年三詔鋭意方聞之彥凡記誦傳注之僻識知侍從之艱咸汛掃而新之則夫范文正所謂誤多士者蓋革之矣乃秋九月實試賢良之士執事大人下教諸生以試之之時有可變而通之之理謂今歲列郡不雨者非一則成湯之自責宣王之憂民寧莊子之知天意臧文仲之知人事其所先所宜可用可為者冝有得于大廷之對誠如是則蘇文忠所謂應故事者又革之矣雖然慶曆六年監察御史唐詢嘗請如漢故事俟有災異然後舉之親䇿當世要務罷試祕閣六篇參政吳育執以為不可愚嘗交譏其齷齪庸陋蓋詢之意非知待賢之體而能勉君以盡其禮顧患應科者之衆而欲設術以抑其進為育者正當誅其意而取其説從而廣之若曰思未治則舉之思遺逸則舉之有缺政則舉之有災異則舉之有大謀議則舉之惟人君之所欲舉欲問毋拘以法毋限以時則是科之設庶乎其有輔而是科之名庶乎其無愧矣不知出此而猥曰法不可變嗚呼待賢良而有若待胥吏徒隸者存焉是尚為不可變乎齷齪庸陋之臣不知待賢者之禮適以蕪纍明君之政如是哉故曰天聖制科之法不可不變若夫漢唐之時則未始有定法也所謂舉之以五者惟眺錯為然當時特詔有司諸侯王及三公九卿主郡吏舉賢良而舉眺錯者適有五人耳若乃公孫弘董仲舒谷永杜欽之流而推之選之舉之皆不必其五也故彼之以五者非有定法而我之以二則法之一定者也問之以三者惟董仲舒為然當時固以對䇿者條貫靡竟統紀未終辭不别白旨不分明故至于再至于三耳若乃眺錯谷永杜欽皆止于一篇而公孫弘止于復問𥘉不必其三也故彼之以三者𥘉非定法而我之以一者則法之一定者也至于應者之多寡尤不可概論漢之應者以百數而唐永昌之𥘉對䇿者至千餘當時張柬之為第一此狄仁傑之所謂宰相材而成誅二張之功者也固不可謂其應者之多而所得之非才也故曰漢唐之制科不可以罪法若夫比方之事非承學之任故愚不復為執事道謹對料敵解試曹操能注兵法而不能諭于其子趙括能讀父書而不見許于其父兵家之變又豈可以言傳而迹窺也哉李靖佐李孝恭平蕭銑靖請乘水傳壘以為必擒及叩夷陵銑以惶駭而其敗軍之將適屯清溪靖乃以為不可擊孝恭擊之果以敗還賊委舟散掠靖視其亂擊而破之孝恭繼進銑遂以降夫圖銑一事也始而曰必擒中而曰不可擊終而擊其説三變而無一不酬知此則韓安國淮南王之説可得而判矣李德𥙿之在劒南也追咎韋臯招徠群蠻之䇿以為召冦之端撫納蕃將悉怛維州之降以為制敵之要夫劒南一方也群蠻之來悉怛之至大略相類一以為召冦一以為制敵而君子兩是其説審乎此則耿國柳渾之説可得而知矣故孫武以兵為書而曰兵家之勝不可先傳霍去病以兵為事而曰何至學古兵法誠以兵家之變在于機緘識略之相符非可以言傳而迹窺也然則髙祖之前料子房之決勝夫豈偶然而已哉嘗觀石勒素不知書聼讀漢書至食其立六國事摶手驚曰此法當失何以得天下及至張良借箸之説則曰賴有此人耳以是知髙祖輟飯吐哺之時豈無見乎其事之機而惟良之為信者後世書生以陳迹臆見斷天下之成敗者豈不貽笑矣哉若夫宣帝之使單于慕義郭子儀之使回紇下拜此其誠之所感則又進乎兵矣問賑濟解試對賑濟之䇿前人之迹可求也然無得乎其本而惟末之求則其䇿有時而窮文潞公之在成都也米價騰貴因就諸城門相近院凡十八處減價而糶仍不限其數張榜通衢異日米價遂減此蓋劉晏之遺意然公廩無儲私囷且竭則其䇿窮矣趙清獻之守越米價踊貴傍州皆榜衢路禁增米價清獻獨榜衢路令有米者任增價糶之于是諸路米商輻輳詣越米價更賤民無餓莩此蓋盧坦之舊䇿然商路不通鄰境無粟則其䇿窮矣舍是二䇿獨可取之冨民而冨民之囷廩盈虛穀粟有無不得而知就令知之而閉糶如𥘉又誠如明問所慮以公家之勢發民之私藏以濟賑食不為無義顧其間尚多他利害故愚請舍其末而論其本可乎漢倪寬以租不辦居殿當去官百姓思之大家牛車小家負擔乃更居最夫寬于科斂之方略亦踈矣而能旦暮之間以殿為最則愛民之心孚乎其下故也誠使今之縣令有倪寬愛民之心感動乎其下則富民之粟出而邇臣散給之䇿可得而施矣方略之未至利害之未悉皆可次第而講求若監司郡守不能以是心為明主謹擇縣令或憚于有所按發而務為因循舍貸則吾末如之何也巳矣問唐取民制兵建官省試對古之是非得失常易論今之施設措置常難言論古之是非得失而不及今之施設措置吾未見其為果知古也然則古亦豈可以易言乎哉取民制兵建官之法蓋莫良于三代遭秦變古先王之制掃地而盡由漢以來因循苟簡視三代之法幾以為不可復行蓋不知大冬之寒可以推而為大夏之暑毫末之小可以進而為合抱之大顧當為之以漸而不可以驟反之也唐因魏隋之舊而成租調府衛之制官約以六典而省之至于七百三十此可以為復三代之漸而唐之所以為可稱者也至于貧無以葬者許鬻永業自狹鄉徙寬鄉者併鬻口分啓兼并之端開避地之釁此固失在于其法省官之𥘉自謂吾以此待天下賢才足矣既而增員外置寖廣而不復除此固失在于其身居重御輕之説在唐固不能無蔽而府兵之廢實出于版圖隳而不可考閲習弛而不可用其源蓋與授田相表裏皆其立法之遺恨也彍騎兩稅雖皆一時可喜之事而壞經常簡易之法馴致巨創大蠧而不能救承良法之弊不知修而後之苟且變更以偷一時之利而不顧其後此尤君子之所深惡不可諉前人之失而逭其誅至于斜封墨敕之濫則誠無足深責大抵君子之望于唐者欲其等而上之而唐愈下欲其推而進之而唐愈退其是非得失豈不較然甚明哉至推之于今日則又有難言者唐租調之法固可以為復井田什一之漸矣然連阡陌者難于行削奪之法厭糟粳者無以為播種之資削奪之法不行則田畝孰給播種之資既乏則租課孰供况今之取于民者斗斛之數定而輸再倍和市之名存而直不給殊名異例不可殫舉而州縣遑遑有乏須負課之憂大農汲汲為支柱權冝之計于此而議復租調之法誰曰為通世務者唐府兵之法固可為復軍旅卒伍之漸矣然授田之制不行則府衛之制不可復論况邇者兩淮流徙之民朝廷欲因賑救之粟使耕荒棄之地以成屯田之業而議者猶懼資儲之乏事弗克究列營而居負米而㸑者或者猶懼拊循之未至居處之未安習勤之未集而遽欲望𬒳堅跖徑于田畝捨鋤釋耒之人亦已難矣于此而言府衛之制蓋索商舶于北𬈑之涯者也唐虞官百夏商官倍周官三百六十而唐承隋後官不勝衆驟而約之七百有竒則復古建官亦莫近于唐矣今之內而府寺埸局外而參幕佐二可以罷而省之者蓋不為少天下莫不知之而朝廷之憚為此者則懼夫衣裳之流離而無以生也今雖不省而受任者或數千里需次者或八九年奪園夫紅女之利不復可以責士大夫為省官之説則又不可無以處此故曰論古之是非得失者易言今之施設措置者難然則三代之法其終不可復矣乎曰大夏之暑大冬之推也合抱之木毫末之進也况夫修已以安百姓篤恭而天下平仲尼謂期月而可三年有成有包荒之量有馮河之勇有不遐遺之明有朋亡之公于復三代乎何有愚不佞他日執事大人論思之次願與聞焉問德仁功利對仲尼屢歎管仲之功而遊于其門者五尺童子羞稱焉曽西有所不為孟子有所不願威公由莒轉戰而入齊管仲釋囚拘而相之其學焉而後臣之也孟子至與成湯伊尹同稱然觀其始志不過欲立功名于天下以自尊榮其身而已豈有匹夫匹婦有不與𬒳堯舜之澤者若已推而納之溝中之心哉召陵之役反未及國而陳轅濤塗之執驕恣之迹已形其視成湯之慙德為如何嗚呼此功利德仁之所從分歟唐太宗與裴寂劉文靜謀動髙祖時其志無異於威公管仲之事及其有天下之後致正觀之治而論者以為庶幾三代之王吾獨于其聼魏徴之言而見之宇文士及稱南衙群臣靣折庭爭陛下不得舉手蓋當時輔拂鯁挺之臣不獨徴而已顧獨徴之言為尤詳且切取徴之言而讀之蓋有冨翁貴仕之所不能堪者而太宗富有天下貴為天子功業皆其所自致而能俯首抑意聽拂逆之辭于疇昔所惡之臣嗚呼此其所以致正觀之治庶幾于三代之王者乎恭惟主上盛德至仁其學蓋出于五帝三王而俯取唐太宗德仁功利之問與魏徴之所以對者發于奎書形于詔旨詢及侍臣一何其德之盛仁之熟勉勉亹亹而無有窮已也實天下萬世之幸執事大人仰取而俯用之䇿諸生于旅試之場甚大惠也設功利德仁之疑于魏徴之辭愚既以齊威管仲之事決之于前矣至于帝王之德之仁豈但如匹夫見于修身齊家而己之説愚竊以為不然夫所謂修身齊家者非夫飾小亷矜小行以自託于鄉黨者然也顔子視聽言動之間曾子容貌辭氣顔色之際而五帝三王臯夔稷契伊吕周召之功勳德業在焉故大學言明明德于天下者取必于格物致知正心誠意之間愚不敏姑誦所聞執事大人幸恕其狂斐問漢文武之治對嘗讀洪範至于沉潛剛克髙明柔克之辭未嘗不反覆深考而敬思之以為古先帝王之所以未嘗不學而求警戒磨勵之心未嘗不切也執事教諸生以漢文帝武帝之事愚獨以學而斷二君之失夫文帝之為君固寬仁之君也然其質不能不偏於柔故其承高惠之後天下無事不知上古聖人弦弧剡矢重門擊柝之義安于嫁胡之恥不能飾邉備講武練兵以戒不虞而胸奴大舉入邉者數四甚至候騎逹于雍甘泉僅嚴細柳灞上棘門之屯雖拊髀求將御鞍講武而志終不遂使其有學以輔之而知髙明之義必不至於此矣武帝之為君固英明之君也然其質不能不偏于剛故其承文帝冨庶之後貫朽粟腐憤然欲犂胸奴之庭以刷前世之恥然不知舞干格苗因壘降崇之事不止衛青霍去病之師而窮二師之兵至於海內虛耗戶口減半雖下輪臺哀痛之詔亦無及矣飄風不終朝驟雨不終日執事謂始作者有以基之信其然乎使其有學以輔之而知沉潛之義不至于此矣嗚呼冨庶之效雖遼于虛耗之報而拊髀之歎有不如輪臺之哀堯舜三王之心吾於漢武帝末年之詔而知之此吾所以重惜其無學以輔之
