front:
  text: 象山先生全集卷之十九記
  hash: sha256:836d73e1d3d50bee06d61858fb435d6a2e29fd821dc05c83b714df5c59f87806
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_019-1a}
body:
  text: 敬齋記古之人自其身逹之家國天下而無愧焉者不失其本心而巳凡今為縣者豈顧其心有不若是乎哉然或者遏于勢而狃于習則是心殆不可考吏縱弗肅則曰事倚以辦民困弗蘇則曰公取以足貴勢富疆雖姦弗治貧羸孤弱雖直弗信習為故常天子有勤恤之詔迎宣拜伏不為動心曰奚獨我責吏縱弗肅民困弗蘇姦弗治而直弗信天子勤恤之意不宣于民是豈其本心也哉勢或使之然也方其流之未逺平居靜慮或有感觸豈能不忸怩于其心至其同利相挺同波相激視已所行為天下逹道訕侮正言仇讐正士則是心或幾乎泯矣人之所以異于禽獸幾希庶民去之君子存之是心或幾乎泯吾為懼矣天地鬼神不可誣也愚夫愚婦不可欺也是心或幾乎泯吾為懼矣黃鍾大吕施宣于內能生之物莫不萌芽奏以大簇助以夾鍾則雖瓦石所壓重屋所蔽猶將必逹是心之存苟得其飬勢豈能遏之哉貴溪信之大縣綿地過百里民繁務劇暨陽吳公為宰于兹吏肅矣而事未始不辦民蘇矣而公未始不足姦治直信民莫不説而惴惴焉惟恐不能宣天子勤恤之意是其本心之所發而不遏于其勢者耶然公之始至則修學校延師儒致禮甚恭余屢辱其禮不敢受今為齋于其治之東偏名之以敬請記于余文至于再三望道之重若不可及者某聞諸父兄師友道未有外乎其心者自可欲之善至于大而化之之聖聖而不可知之神皆吾心也心之所為猶之能生之物得黃鍾大吕之氣能飬之至于必逹使瓦石有所不能壓重屋有所不能蔽則自有諸己至于大而化之者敬其本也豈獨為縣而已雖然不可以不知其害也是心之稂莠萌于交物之𥘉有滋而無芟根固于怠忽末蔓于馳􅕽深蒙密覆良苗為之不殖實著者易拔形濳者難察從事于敬者尤不可不致其辨公其謹之某雖不敏它日周旋函丈願有所請公名慱古字敏叔淳熙二年十有二月望日迪功郎新隆興府靖安縣主簿陸某記宜章縣學記大訓有之天聰明自我民聰明天明畏自我民明威蓋斯民之衷惟上帝實降之作之君師惟其承助上帝故曰天子內建朝廷由公卿至于百司庶府外部邦邑由牧伯至于子男附庸則亦惟天子是承是助故周公以徽言告成王曰克知三有宅心灼見三有俊心以敬事上帝立民長伯成王之誥康叔誕陳民常且曰外庶子訓人正人至于小臣諸節皆所以使之分别乎此而播敷之以造民大譽漢董生曰今之郡守縣令民之師帥所使承流而宣化也是故任斯民之責于天者君也分君之責者吏也民之弗率吏之責也吏之不良君之責也書曰萬方有罪罪在朕躬又曰百姓有過在豫一人此君任其責者也可以為吏而不任其責乎今為吏而相與言曰某土之民不可治也某土之俗不可化也嗚呼弗思甚矣夷狄之國正朔所不加民俗各繫其君長無天子之吏在焉宜其有不可治化者矣然或病九夷之陋而夫子曰君子居之何陋之有况非夷狄未常不有天子之吏在焉而謂民不可治俗不可化是將誰欺春秋之時去成周未遠也曽子且曰上失其道民散久矣如得其情則哀矜而弗喜春秋而來至于今幾年矣覩民之罪視俗之惡顧不于其上之人而致其責而惟民是尤則斯人之為吏可知也孟子曰飢者易為食渴者易為飮孔子曰德之流行速于置郵而傳命吾于其所謂不可治者有以知其甚易治也于其所謂不可化者有以知其甚易化也郴據嶺為荆湖南徼宜章又郴之南徼逺于衣冠商賈之都會其民宜淳願忠朴顓蒙悍徑而不能為詐欺不才之吏不能教訓拊循其民又重侵漁之民不堪命則應之以不肖其勢然也夫淳願忠朴顓蒙悍徑而不能為詐欺此侵漁者之易以逞志而其積之已甚有所不堪則不肖之心勇發而無所還忌亦其勢然也不數十年間盜孽屢起宜章以是負惡聲有自來矣淳熙十有二年吳矦鎰抵行都諸公貴人倒屣迎之咸稱其才將有論薦于是宜章闕宰顧吏之視仕宜章若蹈豺虎之區無敢往者帥府嗜吳矦之賢辟書東馳吳矦欣然就之至則務去民之所惡而致其所欲勉之使為學以雪惡聲大葺學宫輔弟子員淳熙五年始建今學八年朝廷殊其令優其數以奬誘入學之士部使者各求其所隸間田以廩之士之廪于學者五十人自食而學于其間者又數十人句讀訓詁旨義辭章少長分曹皆經講授士勸其業豈惟學官異時鬪爭􅐁攘惰力侈費之習廓然為變忠敬輯睦尊君親上之風靄然為興牒訴希闊岸獄屢空旦晝為求簿書期會之事僅費數刻吳矦䇿勳文史優于里居間則益發泉石之祕徜徉詠歌以致其適自謂兹土之樂中州殆不如也方其始至解除煩苛布宣天子德意為條教以曉其父兄興學校以育其子弟而其民鼓舞踴躍回心異鄉惟恐居後曾不淹久而效見明著暇𥙿若此然則致治施化誠莫易于此矣雖然周道之行群黎好德武夫之節優于干城遊女之操竦于喬木忠厚純積洽于庶類敦彼行葦牛羊勿踐履當此之時民日遷善逺罪而不知為之者如雍容康莊而忘其夷優遊厦屋而忘其安也及道之衰王澤寖竭綱弛倫斁獄訟滋而干戈起民墜塗炭由是霸圖迭興異端並作徼其困極窘至而歸之若出荆棘而蹈邪蹊脫塗淖而棲茇舍喜幸之浮康莊厦屋平居緩帶所無有也至于會載籍以自藩飾害義崇私不知紀極則其為荆棘塗淖抑益深矣矌安宅而弗居舍正路而弗由豈得罪彼民哉吳矦其亦有憂于是乎僕夫效駕必命所之千里雖逺首途發軔燕越可辨此學之興敢問所向為辭章從事場屋今所未免苟志于道是安能害之哉所欲有甚于生所惡有甚于死是心之存上帝臨女先民垂訓昭若日星呻其占畢覆用敝之責有在矣夫不遠千里屬記于豫而豈徒哉三晉分國齊秦圖帝衍儀伏軾説士蜂起兵強國富是為良臣功利之習入于骨髓楊朱墨翟告子許行之徒又各以其説從而誣之帝降之衷茅塞甚矣自暴者既不足與有言而自棄者又曰吾身不能居仁由義故孟子道性善發四端曰人之有是而自謂不能者自賊者也謂其君不能者賊其君者也唐韓愈謂桞當中州清淑之氣蜿蟺扶輿磅礴而鬱積必有魁竒忠信材德之民生其間而今而後吾有望于宜章矣淳熙十有四年十有一月甲子臨川陸某記荆國王文公祠堂記唐虞三代之時道行乎天下夏商叔葉去治未逺公卿之間猶有典刑伊尹適夏三仁在商此道之所存也周歷之季迹熄澤竭人私其身士私其學橫議蜂起老氏以善成其私長雄于百家竊其遺意者猶皆逞于天下至漢而其術益行子房之師實維黃石曹參避堂以舍蓋公髙惠收其成績波及文景者二公之餘也自夫子之皇皇沮溺接輿之徒固已竊議其後孟子言必稱堯舜聽者為之藐然不絶如線未足以喻斯道之微也陵夷數千百載而卓然復見斯義顧不偉哉𥙿陵之得公問唐太宗何如主公對曰陛下每事當以堯舜為法太宗所知不逺所為未盡合法度𥙿陵曰卿可謂責難于君然朕自視眇然恐無以副此意卿宜悉意輔朕庶同濟此道自是君臣議論未嘗不以堯舜相期及委之以政則曰有以助朕勿惜盡言又曰須督責朕使大有為又曰天生俊明之才可以覆庇生民義當與之戮力若虛捐歲月是自棄也秦漢而下南面之君亦嘗有知斯義者乎後之好議論者之聞斯言也亦嘗隱之于心以揆斯志乎曽魯公曰聖知如此安石殺身以報亦其宜也公曰君臣相與各欲致其義耳為君則自欲盡君道為臣則欲自盡臣道非相為賜也秦漢而下當塗之士亦嘗有知斯義者乎後之好議論者之聞斯言也亦嘗隱之于心以揆斯志乎惜哉公之學不足以遂斯志而卒以負斯志不足以究斯義而卒以蔽斯義也昭陵之日使還獻書指陳時事剖析弊端枝葉扶踈往往切當然核其綱領則曰當今之法度不合乎先王之法度公之不能究斯義而卒以自蔽者固見于此矣其告𥙿陵蓋無異旨勉其君以法堯舜是也而謂每事當以為法此豈足以法堯舜者乎謂太宗不足法可也而謂其所為未盡合法度此豈足以度越太宗者乎不知言無以知人也公疇昔之學問熙饛之事業舉不遁乎使還之書而排公者或謂容恱或謂迎合或謂變其所守或謂乖其所學是尚得為知公者乎氣之相忤而不相恱則必有相訾之言此人之私也公之未用固有素訾公如張公安道吕公獻可蘇公明允者夫三公者之不恱于公蓋生于其氣之所忤公之所蔽則有之矣何至如三公之言哉英特邁往不屑于流俗聲色利逹之習介然無毫毛得以入于其心潔白之操寒于氷霜公之質也掃俗學之凡陋振弊法之因循道術必為孔孟勳績必為伊周公之志也不蘄人之知而聲光燁奕一時巨公名賢為之左次公之得此豈偶然哉用逢其時君不世出學焉而後臣之無愧成湯髙宗君或致疑謝病求去君為責躬始復視事公之得君可謂專矣新法之議舉朝歡譁行之未幾天下恟恟公方秉執周禮精白言之自信所學確乎不疑君子力爭繼之以去小人投機密贊其決忠撲屏伏憸狡得志曾不為悟公之蔽也典禮爵刑莫非天理洪範九疇帝實錫之古所謂憲章法度典則者皆此理也公之所謂法度者豈其然乎獻納未幾𥙿陵出諫院疏與公評之至簡易之説曰今未可為簡易修立法度乃所以簡易也熙寧之政粹于是矣釋此弗論尚何以費辭于其建置之末哉為政在人取人以身修身以道修道以仁仁人心也人者政之本也身者人之本也心者身之本也不造其本而從事其末末不可得而治矣大學不傳古道榛塞其來已久隨世而就功名者淵源又類出于老氏世之君子天常之厚師尊載籍以輔其質者行于天下隨其分量有所輔益然而不究其義不能大有所為其于當時之弊有不能正則依違其間稍加潤飾以幸無禍公方耻斯世不為唐虞其肯安于是乎蔽于其末而不究其義世之君子未始不與公同而犯害則異者彼依違其間而公取必焉故也熙寧排公者大抵極詆訾之言而不折之以至理平者未一二而激者居八九上不足以取信于𥙿陵下不足以解公之蔽反以固其意成其事新法之罪諸君子固分之矣元祐大臣一切更張豈所謂無偏無黨者哉所貴乎玉者瑕瑜不相掩也古之信史直書其事是非善惡靡不畢見勸懲鑑戒後世所賴抑揚損益以附巳好惡用夫情實小人得以藉口而激怒豈所望于君子哉紹聖之變寧得而獨委罪于公乎熙寧之𥘉公固逆知巳説之行人所不樂既指為流俗又斥以小人及諸賢排公已甚之辭亦復稱是兩下相激事愈戾而理益不明元祐諸公可易轍矣又益甚之六藝之正可文姦言小人附託何所不至紹聖用事之人如彼其傑新法不作豈將遂無所竄其巧以逞其志乎反復其手以導崇寧之姦者實元祐三館之儲元豐之末附麗匪人自為定䇿至造詐以誣首相則疇昔從容問學慷慨陳義而諸君子之所深與者也格君之學克知灼見之道不知自勉而戞戞于事為之末以分異人為快使小人得間順投逆逞其致一也近世學者雷同一律發言盈庭豈善學前輩者哉公世居臨川罷政徙于金陵宣和間故廬丘墟鄉貴人屬縣立祠其上紹興𥘉常加葺焉逮今餘四十年墮圯已甚過者咨嘆今怪力之祠綿綿不絶而公以蓋世之英絶俗之操山川炳靈殆不世有其廟貌弗嚴邦人無所致敬無乃議論之不公人心之畏疑使至是耶郡矦錢公期月政成人用輯和繕學之既慨然撤而新之視舊加壯為之管鑰掌于學官以時祠焉余𥘉聞之竊所敬嘆既又屬記于余余固悼此學之不講士心不明隨聲是非無所折衷公為使時舍人曾公復書切磋有曰足下于今最能取于人以為善而比聞有相曉者足下皆不足之必其理未有以奪足下之見也竊不自揆得從郡矦敬以所聞薦于祠下必公之所樂聞也淳熙十有五年歲次戊申正月𥘉吉邦人陸某記經德堂記堂名取諸孟子經德不回非以干祿也經也者常也德也者人之得于天者也不回者是德之固不回撓也無是則無以為人為人臣而無是則無以事其君為人子而無是則無以事其父禹之疏鑿稷之播種契之敷教臯陶之明刑益驅禽獸垂備器用伯夷典禮后夔典樂龍出納帝言尹自耕莘相成湯説由築巖佐武丁太公以磻溪釣漁為文武師皆是德也關龍逢誅死王子比干剖心箕子為囚奴孔子削迹伐木窮于陳蔡毁于叔孫貽譏于微生畝楚狂接輿晨門耦耕負蕢植杖之流孟子見沮于臧倉受嗤于優髠見疑于尹士充虞者同是德也武王纘太王王季文王之緒以有天下周公成文武之業追王太王王季宗祀文王于明堂盡繼述之善為天下逹孝曾子受經于仲尼以孝聞天下而名後世皆是德也舜小杖則受大杖則走妻帝二女不待瞽䏂之命繕廪而焚捍笠以下浚井而掩鑿旁以出太伯虞仲將致位乎季歷斷髮文身逃之荆蠻太子申生使人辭于狐突再拜稽首而死同是德也治古盛時黎民于變比屋可封漢上遊女如彼喬木中林武夫可為腹心所欲有甚于生所惡有甚于死證驗之著在于塗巷况士大夫乎逮德下衰此心不競豪傑不興皇極不建賢智迷于會歸庶民無所歸命學者文煩訟者辭勝文公實私賓義主利陵夷不救橫流不隄天常民彛所不可泯絶者如漢獻在許聽命于蜮操而已舊章先典格言至訓櫝存珠亡轉為藻繢邪釋繆解正漫真渝又轉而給寇兵充盜糧矣疽潰蛆肆賊民猖獗狷狂之士方不勝憤悶矛義介節出嬰其鋒猶或憑天藉聖因其不遂泯絶者足為且吾以聳觀聽然如孤豚之咋虎者常十八九總其實火不啻一車薪而水未必盈杯也信乎終亦必亡而已矣夫子生于周季當極文之弊王者之迹熄書訖詩亡亦已久矣載贄之輿方羊海岱江淮河濟之間莫能用者歸而講道洙泗賢顔氏之樂大林放之問嘆曾點之志稱重南宫適禹稷躬稼之言眷眷于柴參之愚魯而終不能使子賜偃商由求之徒進于知德先入之難拔積習之錮人乃至于此夫子既沒百家並興儒名者皆曰自孔氏顔淵之死無疑于夫子之道者僅有曾子自子夏子遊子張猶欲強之以事有若他何言哉章甫其冠逢掖其衣以詩書禮樂之辭為口實者其果真為自孔氏者乎老𣆀蒙莊之徒恣睢其間摹寫其短以靳病周孔􅏳籍詩禮其勢然也戰國嬴秦無足復道漢髙帝鋤項籍其要領在為義帝發喪一事天常民彛莫大于此新城三老蓋深于老氏者也彼知取天下之大計在此耳豈有匹夫匹婦不與𬒳堯舜之澤若已推而納諸溝中之心哉莊子譏田常盜仁義以竊國乃不知其學自有盜仁義以竊天下之計也雖然君子反經而已矣經正則庶民興庶民興斯無邪慝矣雲錦吳生紹古而來從余遊求名其讀書之堂余既名而書之且為其説使歸而求之孟子曰古之人修其天爵而人爵從之今之人修其天爵以要人爵既得人爵而棄其天爵則惑之甚者也後世發䇿決科而髙第可以文藝取積資纍考而大官可以歲月致則又有不必修其天爵者矣生其早辨而謹思之紹熙元年五月望日象山翁記貴溪重修縣學記風俗之所由來非一日也或覩其壞而欲齊諸其末禁諸其外此後世政刑之所以益弊至無如之何則寖而歸于苟且玩歲月習掩著便文飾説以規責偷譽謂理不過如是其視書傳所記治古之俗若必不可復至以為未必然者有矣孩提之童無不知愛其親及其長也無不知敬其兄先王之時庠序之教抑申斯義以致其知使不失其本心而已堯舜之道不過如此此非有甚髙難行之事何至遼視古俗自絶于聖賢哉物之所蔽説之所迷欲之所制意之所羈獨不可研極考竟圖所以去之而顧安之乎取士之科久渝古制馴致其弊于今已劇稍有識者必知患之然不徇流俗而正學以言者豈皆有司之所棄天命之所遺先逹之士由場屋而進者既有大證矣是固制時御俗者之責為士而託焉以自恕安在其為士也二帝三王之書先聖先師之訓炳如日星傳注益繁論説益多無能發揮而秪以為蔽家藏其帙人誦其言而所汲汲者顧非其事父兄之所願欲師友之所期向實背而馳焉而舉世不以為非顧以為常士而有識是可以察其故得其情而知所去就矣退不溺其俗而有以自立進不負所學而有以自逹使千載之弊一旦而反諸其正此豈非明時所宜有聖君所願得而為士者所當然乎何所悼懼何所維縶而顧不擇所安決所鄉哉福唐陳君顯公之為貴溪視前政則優焉視比縣則優焉民言士論固巳胥輯而陳君自視欿然鄉學問道之誠如恐不及此其所以為民師帥者大矣縣學久不葺于是撤講堂直舍而新之祠屋士廬門廡庖湢繕治加壯創表其坊扁曰申義遣學職事致請記于豫陳君所鄉明著如此斯邑之士可不自拔于流俗而勉所以立所以逹者以無負陳君之意哉紹熙元年歲次庚戌八月二十有六日戊申象山陸某記武陵縣學記彛倫在人維天所命良知之端形于愛敬擴而充之聖哲之所以為聖哲也先知者知此而巳先覺者覺此而已氣有所蒙物有所蔽勢有所遷習有所移往而不返迷而不解于是為愚為不肖彛倫于是而斁天命于是而悖此君師之所以作政事之所以立是故先王之時風教之流行典刑之昭著無非所以寵綏四方左右斯民使之若有常性克安其道者也是故鄉舉里選月書季考三年而大比以興賢能蓋所以陶成髦俊將與共斯政同斯事也學校庠序之間所謂切磋講明者何以捨是而他求哉所謂格物致知者格此物致此知也故能明明德于天下易之窮理窮此理也故能盡性至命孟子之盡心盡此心也故能知性知天學者誠知所先後則如木有根如水有源增加馴積月異而歲不同誰得而禦之若迷其端緒易物之本末謬事之終始雜施而不遜是謂異端是謂邪説非以致明秪以纍明非以去蔽秪以為蔽後世之士有志于古不肯甘心流俗然而苦心勞身窮年卒歲不為之日休而為之日拙者非學之罪也學絶道喪不遇先覺迷其端緒操末為本其所從事者非古人之學也古人之學其時習必恱其朋來必樂其理易知其事易從不二于異説不牽于私欲造次于是顛沛于是則其久大可必孟子曰原泉混混不舍晝夜盈科而後進放乎四海此古人之學也武陵舊無縣學縣傍有勝地地有故築基蓋往時有欲遷府學于是而不遂者今縣宰林君夢英出故基于蕪穢之中而創學焉士民之有力者皆爭出財以相其役林君不事官府之威凡學之百役無異民家之為者既成規模宏麗氣象雄威遂為武陵壯觀先是倉臺薛公伯宣助成講堂今憲臺丁公逢倉臺趙公不迂郡侯蔣公行簡皆助錢買田以飬士林君之創兹學而上下翕然助成其美如此則林君之政可知矣余于是敬誦所聞以記之紹熙二年歲次辛亥六月上浣象山陸某記本齋記唐虞之朝禹治水臯陶明刑稷降播種契敷五教益作虞垂作工伯夷典禮夔典樂龍作納言各共其職各敦其功以成雍熙之治夫豈嘗試為之者哉蓋其所以自信與人之所以信之者皆在其疇昔之所學後世之為士者鹵莾泛濫口耳之間無不涉獵其實未嘗有一事之知其至者人才之不足為天下用固無足怪雖然是又未可以泛責于天下天之生斯民也以先知覺後知先覺覺後覺要當有任其責者大學曰物有本末事有終始知所先後則近道矣原泉混混不舍晝夜盈科而後進放乎四海有本者如是孟子之言乃知所先後之驗成都郭震醇仁以本名齋求言于余余嘉其志告以所聞後日當有以觀其驗臨川簿廳壁記壁記書前任人姓名尚矣然今官府不皆有亦視官府事力其人志向才具與所遭之時如何不可一槩論也臨川簿廳舊無壁記鄱陽張瀛季海蒞事既久謂不可缺于是搜求前任姓名至今制置四川京公其上不復可考余嘗至簿廳見其𪠘宇乃京所置新令張君所考適首于京異哉張君春秋鼎盛而老練忠謹臨事不苟攝縣宰攝郡幕皆舉其職今又攝宰金溪百姓安焉是記乃未攝金溪時諉余既諾之矣余迫荆門之役且抱拙疾念不可食言力疾記之象山先生全集卷十九
