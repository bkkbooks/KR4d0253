front:
  text: 象山先生全集卷之二十七
  hash: sha256:73ae2dbfbf790850b3f36045c6fa69fc5eb1f955d6a2e19f3697f4419e1a730b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_027-1a}
body:
  text: 行狀全州教授陸先生行狀先生名九齡字子夀其先嬀姓田敬仲裔孫齊宣王少子通封於平原般縣陸鄕即陸終故地因以為氏通曾孫烈爲吳令豫章都尉旣卒吳人思之迎其䘮葬于胥屏亭子孫遂為吳郡吳縣人自烈三十九世至唐末為希聲論著甚多後仕不偶去􅀮義興晚􅀊相昭宗未㡬罷邠隴華三叛兵犯京師輿疾避難卒謚曰文文公六子次子崇生徳遷徳晟以五代末避地于撫之金谿解槖中装買田治生貲髙閭里徳晟之後散徙不復可知徳遷遂為金谿陸氏之祖六子髙祖有程為第四子慱學扵書無所不觀三子曾祖演為第三子能世其業寛厚有容四子祖戬為第四子再從兄弟蓋四十人先祖最㓜好釋老言不治生産四子先考居士君賀為次子生有異禀端重不伐究心典籍見扵躬行酌先儒冠昏䘮祭之禮行之家家道之整著聞州里六子先生為第五子生而頴悟䏻歩趍則容止有法五􅀊入學同學年長踰倍者所為盡能為之讀書因析義趣十嵗丁母憂居䘮哀毁如成人十三應進士舉為文優贍有理致老成歎異年十六遊郡庠毎課試必居上㳺時方擯程氏學先生獨尊其􅀃郡慱士徐君嘉言髙年好脩留意學校間日獨行訪諸齋先生侍諸兄衣冠講論未嘗懈弛由是徐君雅相禮敬明年徐君物故又明年新慱士􅀅至先生聞其嗜黄老言脫畧儀檢慨嘆不樂賦詩見志歸葺茅齋從父兄讀書講古間出見故老先逹所咨叩皆不苟時居士君欲悉傳家政平日紀綱儀節更加櫽括使後可乆先生多與裁評弱冠造吏部外􅀰許公忻許公居閒乆故知少見先生如舊相識明年許公守邵陽欲先生來居士君亦啓其四方之志先生扵是游湖湘抵邵陽乆之而東至臨江郡守鄧君予延先生于學臨江士人皆樂親之居半􅀊乃歸越數年郡慱士苗君昌言復延先生於學從遊者益衆苗自謂平生所尊賞者不苟至其所以禮先生者特異人亦以是信之其與先生啓有云文辭近古有退之子厚之風道學造㣲得子思孟軻之㫖推尊蓋如此先生覧書無􅆡礙繙閱百家晝夜無倦於隂陽星曆五行卜筮靡不通曉性周謹不肯苟簡渉獵所習必極精詳􅀊在己􅆗始與舉送同郡官中都者適有二人皆先進知名士閱貢籍見先生姓名相顧喜曰吾州今乃可謂得人庚辰春官試不利辛已􅀘入大學故端明汪公實為司業月試輙居上游塲屋之文大抵追時好拘程度不復求至當惟先生之文據經明理未甞屈其意嘗有先進以是病之先生曰是不可改先生寛􅁉平直人皆樂親乆愈敬愛學校知名士無不師尊之明年丁居士君憂乙酉升􅀘内舎丙戌為學録學校綱紀日肅弊無巨細皆次第革之人不駭異嘗有小戻規矩者先生以正䋲之無假借後或以先生問其人頋稱先生之德不以為怨丁亥升􅀘上舎戊子館于婺女之張氏先生授其子以中庸大學其父老矣毎隅坐拱手與聼講授且曰不自意晚得聞此張君之死其子䘮以古禮不用浮屠氏已丑登進士第授迪功􅀰桂陽軍軍學教授壬辰當赴迓吏且至時太孺人間親藥餌先生以桂陽道逺風物不􅀋江鄉難於迎侍陳乞不赴甲午受興國軍軍學教授明年夏湖之南有冦侵軼􅀅及郡境先是建炎虜冦之至先生族子諤甞起義應募是後冦攘相次犯州境諤皆􅀍檄保聚捍禦往往能􅁍敵州里頼焉至是諤已死舊部伍願先生主之以請于郡時先生適在信之鈆山聞警報亟歸抵家請者以盈門􅁍之不去日益衆先生與兄弟門人論􅀁以宜從之義甚悉㑹郡符已下先生􅀅許之或者不恱謂先生曰先生海内儒宗蹈履規矩講授經術一旦乃欲爲武夫􅀁爲衛靈公問陳於孔子孔子不荅今先生欲身爲之乎先生曰男子生以弧矢長不能射則辭以疾文事武備􅀄不可析古者有征討公卿即與􅀅帥比閭之長則五兩之長也衛靈公家國無道三綱􅀅淪旣見夫子非哲人是尊社稷是計而猥至問陣其顛荒甚矣故夫子荅以爼豆而遂行夾谷之㑹三都之堕討齊之請夫子豈不知兵者其為委吏乗田則㑹計當牛羊茁壮長使靈公捨戰陣而問㑹計牧養之事則􅀅遂言之乎執此而謂夫子誠不知軍旅之事則亦難與言理矣或者又曰禮别嫌疑事有宜稱使先生當方靣受邉􅀉誰復敢議此閭里猥事何足以累先生今鄕黨自好者不願尸此尸此者必豪俠武㫁者也今先生尸之人其謂何先生曰子之心殆未廣也使自好者不尸此而豪俠武㫁者卒尸此是時之不幸也子亦􅀅願之乎事之宜稱當觀其實假令冦終不至郡縣防虞之計亦不可已是社之􅀄倉卒應募非有成法令備禦文移􅀋以軍興從事郡縣欲事之集􅀔必假借主者或非其人乗是取必於閭里何所不至是其爲􅃤蓋不必冦之來也有如冦至是等皆不可用無􅀘守禦因爲剽刼仁者忍視之㢤彼之所以必諉我者爲其有以易此也吾固以許之爲宜或者又曰曾子之在魯冦至則先去冦退則曰修我墻屋我􅀅反爲其爲師也今先生居於鄕有師儒之素命於朝爲師儒之官而又欲尸此無乃與曾子異乎先生曰吾居鄕講授自窮約之分吾求仕爲禄養今之官乃吏按銓格而與之耳異乎曾子之為師也今又遲次居郷老母年且八十家累過百人冦未至先去固今郡縣所禁比至而去必不逹剽刼踐蹂狼狽流離之禍徃往不可免去固不可藉令可去扶八九十老者從以千餘指去􅀅焉之子欲使吾自附扵分位不同之曾子而甘家之禍忍郷之毒縮手於所可得為之事此奚啻嫂溺不援者哉或者乃謝不及先生於是始報郡符許之已而調度有方備禦有實冦雖不至而郡縣􅀝以為重丙申夏四月到任先生於事無大小處之未嘗不盡其誠於人無衆寡待之未嘗不盡其敬冨川單僻絃誦希闊士人在學校者無㡬先生蒞職舉措謹重規模雅正誠意孚逹士人莫不感動興起先生方􅀅􅀵拾茂異而逺近願來親依者且衆冨川學􅅒素薄而又􅀒逋不輸􅀊入僅六百石而比年不輸者乃七八百石民未必盡􅀒姦吏􅃛徒乾沒其間簿書縁絶莫可稽證先生為覈實催理受輸之法甚簡而便白郡行之扵是無文移之䌓無追督之擾簿書以正􅀒者樂輸儲􅅒􅂶􅁉士人至者日衆不滿􅀊丁太孺人憂去職在富川者莫不惋惜已亥四月服闋冬末到選庚子春授全州州學敎授夏中得寒􅀬之疾􅁇以脾泄屢止屢作竟不可療九月二十有九日卒享年四十有九先生雖卧病見賔客必衣冠舉動纎悉皆有節法卒之日晨興坐于牀問疾者必留與語㓜者人人有􅀁訓誨談笑歡如也先生未嘗不以天下學術人才為念病中言論毎毎在此是日言之􅀹詳夜稍乆則正卧整衣衾理􅂡髯疊手腹間不復言笑又數刻而逝先生道徳之粹繫天下之望曾未及施一疾不起識與不識莫不痛惜先生少有大志而深純浩慱無涯涘可見親之者無智愚賢否皆不覺敬愛慰釋稱其善者往往各以􅀁見未嘗同也不區區撫摩而藹然􅄌祥愷悌之風有以消爭融􅂩不㫁㫁刻畫而昭然脩潔清白之實足以澄汙律慢趣尚髙古而能䖏俗辯析精㣲而能容愚一行之善一言之得雖在巫醫卜祝農圃臧􅀗亦加重敬珍愛自少以聖賢爲師其於釋老之學辯之嚴矣然其徒苟有一善亦􅀁不廢故先生無棄人而於先生亦鮮有不􅀗自盡者與人言未嘗迫遽從容敷析本末洞徹質疑請益者莫不得所欲而去於人言行之失度未可與語則不􅀤或者疑之先生曰人之惑固有難以口舌爭者言之激適以固其意少需之未必不自悟也扞格忤狠之氣當消之不當起之責善固朋友之道聖人猶曰不可則止况泛然之交者乎又况有親愛之情者乎雖朋友商􅃀至不可必通䖏非大害義理與其求伸而傷交道不若姑待以全交道且事有輕重小大吾懼所益者小􅀁傷者大所爭者輕所䘮者重故也然有時而遽言之盡言之力言之者蓋權之以其事權之以其人權之以其時也母饒氏􅁇母鄧氏淳熈三年以慶夀恩封太孺人娶王氏魏公曽孫通州使君瑊之長女也通州君亦以是年八月卒先生卧病聞訃制服成禮逮遣祭纎悉皆自經畫子艮之年十三女人皆㓜先生未及著書若塲屋之文與朋友往來論學之書則傳録者頗衆其餘雜著古律詩墓誌書啓序䟦等門人方且編次􅀅以十二月乙酉葬于鄕萬石塘謹書其行實之大槩以求誌於當世之君子淳熈七年十一月旣望弟某狀吳公行狀公諱漸字徳進姓吳氏舊名興仁字茂榮以舊字行其先自金陵徙家臨川今㡬百年矣曾大父嗣宗大父景章父萬右迪功􅀰致仕兄弟三人公居次少隨伯氏從學於江公匯江為鄕先生從㳺多老成􅀫學一時英異如李公浩曾公季貍皆在公以童㓜居其間愿慤恭遜得子弟禮有􅀁未解人樂告之年十有五䘮母髙氏服除致仕公使之治生公雅好文學重違致仕公意服勤數􅀊一日從容言其志致仕公大恱之更使從學未㡬㑹新教官至試􅀘弟子員郡之士大集公居第一自是毎試輙居上游人服其藝異時同事江公者與為執友公毎自挹損事之如子弟紹興癸酉始與舉送人謂公一第固可俯拾明年省試不偶公不以罪有司曰吾殆業不精丙子再舉壬午三舉省試皆報罷自是仕進之意衰矣其後雖屢到省皆以其子姪或門人與舉送願公表率親舊敦勉以行公往來超然殊不以得失介意或以特奏名留之公曰吾來此􅂓復爾耳不䏻乆也謝之竟歸日率諸子讀書以自娛樂其聲洋洋踵門者未及見已為之起淳熈十年六月朔以疾卒享年六十鄉閭莫不惋惜公性孝事親左右無違見老者雖賤必敬慈祥愛物力􅀁及者螻蟻蛙蚓之難亦必免之其謙恭不競人皆以為不可及至有不當其心引義正色堅勇亦不可奪家甚貧自奉甚薄唯祭祀賔客則致其豐鮮公在郡庠以行藝推為前廊居無何輙逡廵辭去乾道庚寅許君及之蘇君􅄣􅀛爲教官􅀹留意學校聞公學行信於鄕里造廬敦請至于再三不得已就之公雅爲許所知許方欲盡去宿弊事無巨細皆以委公公爲區䖏條畫如指諸掌許毎歎曰於是見君後日之施設矣事有緒即辭去其後合郡之士屢請延公入學教官郡守各致其禮公皆固辭不復出矣郷里先逹皆期公以有用乃竟不三試而死悲夫公娶黄氏子五人顒若厚若誠若皆世其業厚嘗與丁酉舉送女四人長歸某次甫笄而死次許胥訓次未許嫁孫男女各一人尚㓜卒之年秋九月壬申葬于金谿縣歸徳鄕金石源祖塋之側葬之日送車塞􅂗祖奠于道者相望不絶行過者莫不齎咨涕夷某在童穉時為公􅀁知後又妻以其女知公之平生可謂深且詳矣如公之徳不可不表顯于後謹覈書以告當世之君子淳熈十一年九月旣望壻承奉􅀰充詳定一司敕令所刪定官陸某狀象山先生全集卷之二十七
