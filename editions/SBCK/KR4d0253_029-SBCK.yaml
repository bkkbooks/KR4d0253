  text: 􅁚山先生全集卷之二十九
  hash: sha256:0c1568cf5230f8a2d8cd611f458a228722ff1e457fed6205d9efa041b1369085
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_029-1a}
body:
  text: 程文庸言之信庸行之謹閑邪存其誠善世而不伐徳慱而化解試知􅀁以成已而無非僻之侵則誠之在已者不期而自存知􅀁以成物而無驕盈之累則徳之及物者不期而自化乾之九一何其誠之至而徳之慱也庸言之必信庸行之必謹是知􅀁以成已矣知􅀁以成已則誠豈有外乎此㢤又懼夫邪之為吾害而閑之也嚴使無一毫非僻之習以侵之則誠日益至而在已者不期存而自存矣反而誠其身推以善斯世是知􅀁以成物矣知􅀁以成物則德豈有外乎此㢤又懼夫伐之為吾病而去之也盡使無一毫驕盈之氣以累之則徳日益慱而及物者不期化而自化矣誠之在已者不期存而自存而其端特在扵閑邪徳之及物者不期化而自化而其機特在扵不伐則天理人欲之相為消長其間可謂不容髮矣庸言之信庸行之謹閑邪存其誠善世而不伐徳慱而化此􅀁以為君徳歟中庸之言誠曰非自成已而已也􅀁以成物也然則成已成物一出扵誠彼其􅀁以成巳者乃其􅀁以成物者也非扵成已之外復有􅀁謂成物也又曰性之徳也合内外之道也然則曰誠曰徳一本乎性彼其􅀁謂誠者乃其􅀁以為徳者也非扵誠之外復有􅀁謂徳也明乎中庸之􅀃則乾九二之君徳可得而議矣言行之信謹二之􅀁以成巳者也善世而不伐二之􅀁以成物者也彼其􅀁謂信謹者乃其􅀁以不伐者也舎言行而求其􅀁以善世者則乖矣閑邪存其誠誠之存諸已者也徳慱而化徳之及乎物者也彼其􅀁以閑而存者乃其􅀁以慱而化者也外乎誠之存而求其􅀁謂徳之慱則惑矣若夫朝謀夕訪求􅀁以治乎人而不知反求諸其身安知夫大人正巳而物正而二之善世者特在乎言行之間而巳也小惠小信欲以為巳之徳而不知誠之不可掩安知夫明明徳扵天下者蓋本扵正心誠意而二之徳慱者由乎其誠之存也至矣㢤誠之在天下也一言之細一行之㣲固常人之􅀁忽然言出乎身加乎民行􅀤乎邇見乎逺言行君子之􅀁以動天地也君子喘言蠕動皆足法造次顛沛必扵是庸言之信而莫不可以為天下則庸行之謹而莫不可以為天下法知至乎吾之誠而不知夫言行之細也然邪之與正猶明魄之相爲生死隂陽之相爲消長非僻之習一毫焉侵之則言隨以不信而行隨以不謹矣尚何有扵誠之至故爲冠以莊其首爲履以重其足在車聞和鸞之音行歩聞佩玉之聲盤盂有銘几杖有戒􅀁以防閑其邪而使非僻無自而至者備矣則凡見乎吾身而充乎天地者何徃而非誠㢤茲不曰不期而自存者乎大矣㢤徳之見扵天下也推吾􅀁有兼善天下此固人之􅀁甚欲然有諸已而後求諸人無諸已而後非諸人􅀁藏乎身不恕而􅀎喻諸人者未之有也故君子正身以正四方修已以安百姓且日麗必照物雲濃必雨苗和順積中英華􅀤外極吾之善斯足以善天下矣然伐之害徳猶木之有蠧苗之有􅑺驕盈之氣一毫焉間之則善隨以䘮而害旋至矣尚何有扵徳之慱故有焉而若無實焉而若虚功賛化育而不居智恊天地而若愚消彼人欲而天焉與徒謙冲不伐而使驕盈之氣無自而作則凡不言而信不怒而威者乃􅀁以為徳也茲不曰不期而自化者乎嗚呼由乎言行之細而至扵善世由乎已之誠存而至扵民之化徳則經綸天下之大經者信乎其在扵至誠而知夫誠者信乎非聦明􅐶知逹天徳者有不䏻也以經考之乾之六爻􅀮而未見行之未成者􅀄之潜也貴而無位髙而無民者上之亢也三則以危而進徳四則以疑而自試惟五以飛龍在天而二以見龍在田皆有利見大人之羙夫君位旣已在五則夫君徳者非人之龍徳而正中其孰足以當之聖人扵是􅀤成已成物之道存誠慱徳之要使後之人君䏻明聖人之言以全九二之徳則天下有不足為矣切嘗稽之扵舜好問而好察邇言􅀮惡而􅀭善則庸言之信庸行之謹為如何納伯益儆戒之辭則罔有忌諱詳伯禹股肱之命則使之弼違閑邪存誠可見扵此矣巍巍乎有天下而不與則善世不伐為如何考其民之心則天下同戴稽其民之俗則比屋可封徳慱而化可見扵此矣九二之徳大舜其盡之矣􅀃易者以為九二之爻蓋舜之田漁時也今槩以為帝之事可乎曰以位而言則田漁時也以徳而言則夫子匹夫也或曰祖述堯舜或曰賢扵堯舜孰謂乾之九二而不足以言舜乎不然則何以謂之君徳黄裳元吉黄離元吉用中者雖異其時􅀗吉者皆極其大中之為徳言其無適而不宜也黄中色也坤中在五而有黄裳之義裳下裳也黄裳者守中而居下也在上者患不䏻居下䏻守中而居下安得而不大吉㢤離中在二而有黄離之義離麗也黄離者􅀁麗得中正也附麗者患不得中正如􅀁麗之中正安徃而不大吉㢤位有二五之殊辭有裳離之異其居下附麗雖因時而不同而其為大吉則一而已非中之為徳疇克爾㢤坤之六五曰黄裳元吉離之六二曰黄離元吉嘗謂中之為道大矣世嘗玩扵其􅀃而莫之省也夫以堯舜禹三聖人相授受而同出扵一辭則道宜莫大扵此矣而不過曰􅁢執厥中故子思之書反覆乎大中之􅀃丁寜乎時中之論而世之喜事者不明乎中之􅀃欲為驚人可喜之行是非獨得罪扵聖人而其􅀁以速戾取禍者蓋亦不旋踵矣嘗試告之以大吉之可願則莫不願至告之以大中之道則又玩而不知省嗚呼安知所願者乃出扵其􅀁玩者歟然子思之言中不獨有大中之􅀃而又有時中之論蓋中而非其時則烏在其為中也時乎坤之六五則疑乎隂之在上疑乎其上則居下之為中矣守中而居下則以貴而下賤以尊而下卑以䏻而下扵不能以多而下扵寡夫守中而居下如此則天道之􅀁益地道之􅀁流人道之􅀁好􅀑神之􅀁福其吉豈不亦大矣乎黄裳元吉坤之六五􅀁以為中也時乎離之六二則以隂而麗扵兩陽之間麗扵兩陽之間則麗之中正者也􅀁麗者中正之道􅀁附者中正之人以下而附乎上則在上者中正也以上而附乎下則在下者中正也夫􅀁麗之中正如此則上交不謟下交不瀆建諸天地而不悖質諸􅀑神而無疑其吉豈不亦大矣㢤黄離元吉離之六二􅀁以為中也坤離之五二其居下附麗之義雖殊而其􅀗吉則咸底乎大信乎無適而不冝也􅀼嘗求之有周之臣周公以叔父之親師保之任而握髪吐哺下扵白屋之夫終以周致太平魯疆以啓黄裳元吉周公以之太公抱鷹􅀭之䇿垂釣乎磻溪之涯年且八十矣一旦聞文王作興曰盍歸乎來終以大告武成齊國以建黄離元吉太公以之雖然古之聖賢未有不中者夫子之聖而卒扵旅人顔子之賢而終於陋巷則􅀁謂元吉者果安在㢤曰孔顔萬世稱聖賢吉孰大焉若乃險賊而崇軒列􅂦吾見其益疾而已未見其吉也使民宜之民不可使知吾道之義而可使享吾道之宜使道而不宜扵天下則聖人亦烏取乎道㢤聖人出而有為扵天下變而通之神而化之而天下之民鼓舞踴躍莫不以為宜而安之者亦盡其道而已矣大傳曰使民宜之以此夫子曰民可使由之不可使知之非聖人固不使之知也若道之義則彼民之愚蓋有􅀁不􅀎知也若乃其道之宜則聖人固與天下之民共由而共享之方民未知佃漁也聖人作為網􅅈而民宜扵網􅅈矣方民未知耕稼也聖人作為耒耜而民宜扵耒耜矣以至舟楫弧矢杵臼莫不皆宜扵民雖其以􅁚以義取諸離益之諸卦而其􅀁以使民宜之者蓋無以異扵黄帝堯舜之乾坤也當黄帝堯舜氏之作其備物制用立成噐以為天下利者前聖已備之矣故其使民由之者獨見扵垂裳之治黄帝之事扵六藝無􅀁攷信而堯舜之事則載之典謨彰彰可攷如明五刑典三禮䟽江河驅虎豹凡建法立制都俞咨詢以宜其民者蓋不為少矣而夫子特稱其蕩蕩無名無為而治則其􅀁以宜之者一出扵道而已故曰堯以是傳之舜聖人以此洗心退藏扵宻吉凶與民同患神以知來知以藏徃省試滌人之妄則復乎天者自爾㣲盡己之心則交乎物者無或累蓍卦之徳六爻之義聖人􅀁以復乎天交乎物者何其至耶以此洗心則人為之妄滌之而無餘人妄旣滌天理自全退藏扵宻㣲之地復乎天而已由是而吉凶之患與民同之而已之心無不盡心旣盡則事物之交來以神知徃以知藏復何累之有㢤妄滌而復乎天者自爾㣲心盡而交乎物者無或累則夫蓍卦六爻之用又豈可以形迹􅆡而神知之􅀃又豈可以荒唐窺也㢤聖人以此洗心退藏扵宻吉凶與民同患神以知來知以藏徃其意如此中庸言君子之道費而􅀮夫婦之愚可以與知焉及其至也雖聖人有􅀁不知焉夫婦之不肖可以䏻行焉及其至也雖聖人有􅀁不能焉夫聖人有􅀁不知不䏻則可謂􅀮宻精㣲之地矣而不外乎夫婦之􅀁可知􅀁可䏻盖道之費者未嘗不􅀮而􅀮者未嘗不費内外合體用備非人之􅀁可毫末加而斯須去也聖人洗心扵蓍卦六爻之間退藏扵􅀮宻精㣲之地而同乎民交乎物者雖吉凶徃來之紛紛而吾之心未嘗不退藏扵宻此堯之􅀁以無名舜之􅀁以無為文王之􅀁以不識不知而易之書􅀁以不可以􅁚數泥而浮虗􅀃也狎海上之鷗游吕梁之水可以謂之無心不可以謂之道心以是而洗心退藏吾見其過焉而溺矣濟溱洧之車移河東之粟可以謂之仁術不可以謂之仁道以是而同乎民交乎物吾見其淺焉而膠矣聖人懼夫道之不明也舉而掲之蓍卦六爻之間反覆而􅀤明之使知夫妄滌而復乎天者自㣲心盡而交乎物者無累夫其􅀁以暁天下者亦云至矣大衍之數五十其用四十有九則由􅄛以生蓍四營而成易十有八變而成卦則由蓍以立卦蓍生卦立剛柔相推吉凶以告爻在其中矣人為之妄尚安得而與扵其間㢤以此洗心信乎其復扵天矣雖六七八九之錯綜無窮乾坤六子之摩盪不息而五十之數􅀁謂不用之一者實扵是乎見之則聖人退藏之地豈􅀁謂過而溺焉者㢤得失之􅁚形悔吝之情著則爻之􅀁以為吉凶者吾之􅀁以與民同患者也至誠如神受命如響事物之來神以知之無以異扵蓍之圎也物各付物􅀁過者化事物之徃知以藏之無以異扵卦之方也夫聖人之同乎民交乎物者亦異扵不及而膠焉者矣由是觀之蓍卦六爻之用其諸以執其兩端用其中扵民也歟嘗考扵咸之卦而得聖人洗心之妙扵咸之􅂏􅀤天地萬物之情扵咸之􅁚􅀤以虗受人之義此固可以滌人妄而復天理觀乎同民交物之道也至扵九四一爻聖人以其當心之位其言感通為􅀹至曰正吉悔亡而􅁚以為未感害也蓋未為私感􅀁害則心之本然無適而不至無感而不通曰憧憧往來朋從爾思而􅁚以為未光大也蓋憧憧往來之私心其􅀁感必狹從其思者獨其私朋而已聖人之洗心其諸以滌去憧憧徃來之私而全其本然之正也歟此􅀁以退藏扵宻而䏻同乎民交乎物而不墮扵溺焉膠焉之一偏者也或曰聖人生知安行彼其心之酬酢萬變者蓋不思而得不勉而中而何以洗為蓋不知堯舜不􅀎忘危㣲之戒而當時大臣有􅁋逸遊樂之辭有慢遊傲虐之辭君亦不以為輕已且樂聞而願聼之嗚呼此其􅀁以為生知安行不思不勉者歟扵洗心乎何疑天地設位聖人成􅀎人謀􅀑謀百姓與􅀎天地有待乎聖人而天地為不可及聖人有待乎天下而聖人亦為不可及大㢤天地聖人之不可及乎位乎上而􅀎覆物者天也位乎下而􅀎載物者地也天地􅀎覆載萬物而成其􅀎者則有待乎聖人天地未嘗專之也而覆載之功卒歸之天地此天地之􅀁以為不可及也聖人參天地而立成天地之􅀎其智􅀎非天下之敵也然人焉謀之卿士􅀑焉謀之蓍􅀛雖百姓之愚且賤亦不謂其不􅀎而與之焉則聖人之有待扵天下者亦云衆矣然成􅀎之功卒歸之聖人此聖人之􅀁以為不可及也然則恃一已之智􅀎而謂人莫已若者豈可與論天地聖人之事㢤天地設位聖人成􅀎人謀􅀑謀百姓與􅀎以此嘗觀箕子為武王陳洪範其七稽疑曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮蓋與易言聖人􅀁以成天地之􅀎者異經同㫖天􅃬之洪範出扵温洛之水則天地之心扵此甚白而道之大原吾扵此而見之矣大㢤天地聖人之􅀁以為不可及者乎天之髙也日月星辰繫焉隂陽寒暑運焉萬物覆焉地之厚也載華嶽而不重振河海而不􅂥萬物載焉天地之間何物而非天地之為者然而覆載萬物之􅀎猶有待扵聖人聖人之政有以當天地之心則諸福百祥以嘉慶之有以失天地之心則妖孽災異以警懼之彼其望扵聖人以成其􅀎者何其至耶無它無私焉而極天下之大也聖人膺裁成輔相之任秉參賛爕理之權道奚而可與天地殊心奚而可與天地異朝焉卿士善責汝進違責汝弼余愆是䋲余繆是紏廟焉蓍􅀛揲枯鑚朽余不敢不敬有行有疑余不敢不問人謀􅀑謀猶以為未也懼夫百姓之䏻吾不與謀焉工誦箴諫士傳民語庶人謗扵道商旅議扵市雖芻蕘之賤未嘗不詢焉則聖人􅀁以有待扵天下者亦何其至耶無他無私焉而與天地同其大也天地有待扵聖人而覆載之功歸焉聖人有待扵天下而成天地之䏻者歸焉嗚呼此天地聖人之􅀁以為不可及也夫子頌堯曰惟天為大唯堯則之而其􅀁以為大者民無䏻名焉孟子頌舜曰大舜有大焉而其􅀁以為大者亦不過舎已從人樂取諸人以為善廟堂之上都焉而吁咈焉而俞昆命之􅀛恊從之筮罔有不敬闢四門明四目而芻蕘之賤咸得上逹吾扵此見其􅀁以成天地之䏻者歟嗚呼匹夫匹婦不􅀗自盡民主罔與成厥功君天下者可不勉􅀁以與天地相似者乎首出庶物萬國咸寜聖人有兼覆之道天下無難辦之功庶物之多萬國之衆聖人欲首出而使之咸寜可謂難辦之功矣然聖人體兼覆之乾以是首出庶物則萬國咸寜不足多也首出庶物萬國咸寜聖人􅀁以得乾元之用固大矣非天下之􅀁可得而易言也大而言之何物而不備何􅀁而不該然品物之形旣流洪纎髙下毫􅁵之間而各有􅀁宜六位之成則潜見飛躍其道各異欲體是道以首庶物而寜萬國非夫學之超乎天下之上吾未見其䏻也方其潜也􅀮而未見行而未成則學固不可以已也及見而在田則庸言之信庸行之謹閑邪存誠是學果可以已乎三之厲四之疑固進徳修業不可懈也至扵五之與天地合徳上而知進退存亡而不失其正非學果何以致之首出庶物蓋在扵乗六龍而聖人扵乾之六位莫不反復乎學使其學􅀎超乎天下之上則天下有不足為而萬國咸寜信乎其不足多也用九之辭曰天徳不可為首而乃以首出庶物何耶嗚呼不為首蓋􅀁以首出庶物而愚􅀁以謂不可以無學者也象山先生全集卷之二十九
