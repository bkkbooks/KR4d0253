body:
  text: 與傅全羙比領教劄禮意謙勤感佩固深然非所以望扵左右者􅁇此凡有可以警誨幸無愛言仙里年来向學者甚衆風習可尚正頼長者不憚告敎使後生晚學得知前軰風采謙冲就實無徒長虚誕使他日反指向學者以為戒幸甚二南城朋舊至此未甞不詢動静比来扵包顯道處􅀹知其詳􅀼聞甞以追惟徃事自咎過深至扵成疾此殆失扵講究用心之過也古之學者本非為人遷善改過莫不由巳善在所當遷吾自遷之非為人而遷也過在所當改吾自改之非為人而改也故其聞過則喜知過不諱改過不憚顔氏有不善未甞不知知之未甞復行豈為人㢤一聞為仁由巳之言請問其目不少後旣得視聼言動之目請事斯語不少遜某􅀼甞謂若顔子者可謂天下之大勇矣故其言曰舜何人也予何人也有為者亦若是聖人所貴扵訟過者以其知之必明而改之必勇也今訟其過而至扵消沮摧縮奪其志氣而蝕其神明則亦非聖人訟過之㫖矣鈞是人也雖愚可使必明雖柔可使必強困學可使必至扵知勉行可使必至扵安聖人不我欺也扵是而曰我不䏻其為自棄也果矣常人有是皆可責也若夫質之過人者而至扵有是是豈得而逭其責㢤今如全羙之頴悟俊偉蓋造物者之所嗇而時一見焉者也聞見該洽詞藻贍蔚乃其餘事公方之操闊逹之度交㳺推服聞者莫不敬仰又謙謙若不足片言之善一行之羙雖在晚進後出樂推先焉此人所難䏻而全羙優為之古人之學非全羙之望而誰望若乃比者致疾之故則又殆扵不䏻自㧞者矣由前之責非全羙之責而誰責不肖之人悖逆犯上死有餘罪而何敢見其靈響今全羙乃悔其􅀄不有以厭不肖者之欲而以致彼之死爲巳罪則亦惑矣夫厭不肖者之欲以遂其悖逆之謀䋲以春秋之法不免扵首􅁖矣惠姦奨逆以細人之姑息爲羙行以全羙之明豈得不知此之爲非是而反悔其旣徃之不爲邪祟之􅀃稍剛正者不得而行焉而全羙乃惑之乎是殆生扵悔所不當悔而侵尋以溺扵是耳夫以不爲細人之姑息以恵姦奨逆爲悔以死有餘罪之􅀑决不敢見其靈響者為祟則全羙之不􅀎自㧞甚矣夫不能自㧞之過在今日所宜勇改者悔其所不當悔惑其所不當惑其理旣明願速更之毋遅遅也君子之過也如日月之食焉過也人皆見之更也人皆仰之過者雖古之聖賢有所不免而聖賢之所以為聖賢者惟其改之而巳不勇扵改而徒追咎懊悔者非某之所聞也人之所以為人者惟此心而巳一有不得其正則當如救焦溺而求所以正之者今邪正是非之理旣已昭白豈可安扵所惑恬扵所溺而緩扵適正也㢤今人所患在扵以巳為是歸非他人雖有顯過猶悍然自遂未甞略有自咎自責之意今全羙扵所不當自咎者尚以自咎扵所不當自責者尚以自責與所謂不知其非悍然自逐者相千萬也今豈不䏻扵所當改者而勇改之願益勵學不為人之志勉致為仁由巳之實思顔子之大勇􅁬然自㧞蕩滌摧傷湮沒之意不使有毫毛得以宿留扵庭宇光芒所射豈止在斗牛間正大之氣當塞宇宙則吾道有望與傅子淵三復来書義利之辯可謂明矣夫子言君子喻扵義小人喻扵利孟子謂􅁒知舜與跖之分無他利與善之間也讀書者多忽此謂為易曉故躐等凌節所談益高而無􅀘扵實行今子淵知致辨扵此可謂有其序矣大端旣明趍向旣定則明善喻義當使日進徳當日新業當日富易之學聚問辨寛居仁行中庸之愽學審問謹思明辨篤行皆聖人之明訓苟􅀎遵之當隨其分量有所増益凡此皆某之所願從事而願與朋友共之者是後新工與見南軒所得願悉以見警書尾善則速遷過則速改之語固應如是然善與過恐非一旦所􅀎盡知賢如蘧伯玉猶欲寡其過而未􅀎聖如夫子猶曰加我數年五十以學易可以無大過矣論語載夫子穪顔子好學易大傳穪其有不善未甞不知知之未甞復行顔子有不善未甞不知知之未甞復行乃自其好學而􅀎然今子淵所謂遷善改過雖無一旦盡知之心然觀其辭意亦微傷䡖易矣愚見如此子淵以為何如二子淵判别得義利甚明白從此加工宜其日進但不可他有眩惑耳如来書集義之􅀃巳似有少眩惑蓋孟子所謂集義者乃積善耳易曰善不積不足以成名荀卿積善成徳之􅀃亦不悖理若如近来腐儒所謂集義者乃是邪􅀃誣民充塞仁義者也諸非􅁓筆可盡當遅面剖三日遅從者之来想失賢郎家事未易區處建昌問學者雖多亦多繆妄近符生叙者輙以書肆其無知之談此軰庸妄無知無足多恠獨恠其敢爾恣肆無忌憚耳吾甞謂一種無知庸人難扵鐫鑿徃徃累人事楊朱則鈍置楊朱事墨翟則鈍置墨翟不明者徃徃歸咎其師不知其為師者亦誠寛也此等固不足道然義亦不當容其恣肆耳吾子淵不得不任其責與傅聖謨不假推尋擬度之說殆病扵向者椎尋擬度之妄巳而知其非遂安之以爲道在扵是必謂不假推尋爲道則仰而思之夜以􅁇日探􅄨索􅀮鈎深致遠者爲非道邪必謂不假擬度爲道則是擬之而後言議之而後動擬議以成其變化者爲非道邪謂即身是道則是有身者皆爲有道邪是殆未得夫道之正也謂悠悠日復一日不􅀎堪任重道逺之􅀉此非道也貧寠不􅀎不爲累此非道也學如不及學如不厭憂之如何如舜而巳者道當如是故也簞食瓢飲不改其樂肘見纓絶不以為病者道當如是故也耕歷山漁雷澤陶河濵與夫耕莘築岩釣渭者此所以糊其口也夫子絶糧曽子七日不火食而匡坐絃􅁔􅁔聲若出金石夫何累之有㢤子路結纓曾子易簀乃在垂死而從容如此貧孰與死而云為累無乃未得為聞道者乎以聖謨之英敏而不知此無乃未之思乎無乃向之所謂道者反所以為道之蔽而然乎二得書喜聞所學之進然前書所欲致區區者終未蒙省録聖謨誠􅀎就前書所論者有實省處則今日之病不待繁言而自解吾道當自此而明矣作文特吾人餘事從事其間而又鹵莾是謂執事不敬若如来書之意則㡬扵陋矣孔子讀易􅅊編三絶周公思兼三王以施四事顔淵問為􅀖夫子告以四代之事孟子闢楊墨自比扵禹之抑洪水此皆聖謨所宜以為標的者文字間又何足以汩沒聖謨乎三聖謨䏻知始志之非正極可喜縁患故而有其志固宜未得其正旣就學問豈可不知其非大抵學者且當論志不必遽論所到所志之正不正如二人居荆楊一人聞南海之富􅁚犀其志欲徃一人聞京華之羙風敎其志欲徃則他日之問途啟行窮日之力者所郷已分扵此時矣若其所到則􅀊月有乆近工力有勤怠緩急氣禀有厚薄昏明強柔利鈍之殊特未可遽論也近來學者多有虗見虗􅀃􅄀迷􅄅茫不肯就實原其所以皆是學無師授聞見雜駁而條貫統紀之不明凡所傳習秪成惑亂此一節又不與其志來書意識之􅀃天地相似之問皆坐此也讀書須是章分句斷方可尋其意㫖與天地相似之語出扵易繋自易與天地凖至神無方而易無體是一大叚湏明其章句大約知此段本言何事方可理㑹觀今人之用其語者皆是斷章取義難以啇確試因聖謨從心所欲不踰矩之說略言聖人賢人衆人有當致疑之處如至誠無息而顔淵三月不違仁其餘則日月至焉而巳矣不知日月至者其所至之地與不違之地同乎不同不違之地與無息之地同乎不同誠者不思而得不勉而中從容中道聖人也若思誠者但是未􅀎不思不勉耳豈皆不得皆不中但未􅀎盡誠未可以擅誠之名耳豈是皆不誠誠者物之終始不誠無物凡此皆泛言誠不專指聖人也今之學者豈皆不誠不知思誠時所得所中者與聖人同乎不同若其果同則是濫觴與􅈚渤皆水也則大小廣狹淺深之辨亦自不害其為同第未知所謂同者其果同乎故甞謂其不同處古人分明􅀃定等級差次不可淆亂亦不難曉亦無可疑獨其所謂同者須是真實分明見得是同乃可不然却當致疑而求明也􅀂如此理㑹則巳明白與未明白者不應致疑與合致疑者兩處不相淆雜學問自得要領不為泛然無端之言所惑巳知者則力行以終之未知者學問思辨以求之如此則誰得而禦之聖謨非特其志之病亦坐聞見之陋條貫統紀之未明故某前數書多毎處解釋如授小兒以聖謨之聦明夫豈少此蓋亦漸扵陋習膠扵繆說不􅀎不惑亂而至此也若明知向來聞見之陋從頭據實理㑹則古人之訓吾心之靈當㑹通處多矣今此之言殆為芻狗耳􅀤諸書畢後寫此書體倦殊草率試罷􅀎一來乎與包詳道人生天地間氣有清濁心有智愚行有賢不肖必以二􅂗總之則宜賢者心必智氣必清不肖者心必愚氣必濁而乃有大不然者乖爭陵犯汙􅁾邪􅁋之行常情之所羞所􅁖者乃或縱情甘心而為之此所謂行之不肖者也扵此有所不敢為有所不􅃘為有所不肯為而毎求其是者正者善者而為之雖未􅀎必是必正必善而其志則然日􅂂之間蓋與向所謂不肖者背而馳也是亦可謂行之賢者也行之不肖固為愚矣謂不肖者為愚則反是者亦可謂之智然行之不肖者則或耳目聰明心意慧巧習技藝則易􅀎語理致則易曉人情世態多所通逹其習扵書史者雖使之論道術之邪正語政治之得失啇人品之高下决天下國家之成敗安危亦􅀎得其髣髴彼固不􅀎知其真得其實詣其精微臻其底藴而其揣摩傅㑹之巧亦足以熒惑人之耳目而欺未明者之心玩之而有味稽之而有證非知言之人殆未可謂不難辨也至其行之賢者則或智慮短淺精神昏昧重以聞見之狹陋漸習之庸鄙則其扵慧巧者之所辯渾然曾不䏻知甚至扵如荀卿所謂門庭之間猶可誣欺焉道術之邪正政治之得失人品之高下天下國家之成敗安危尚何所復望其判白黒扵其間㢤利誘而害怵刑驅而􅀔迫雖使之如啇丘開之赴水火蓋未必不可也理不可以泥言而求而非言亦無以喻理道不可以執說而取而非說亦無以明道理之衆多則言不可以一方指道之廣大則說不可以一體觀昔人著述之說當世講習之言雖以英傑明敏之資盤旋厭飫扵其間尚患是非之莫辯邪正之莫分亂真之似失實之名一有所蔽而天地為之易位差之毫􅁵繆以千里其扵聖賢之言一失其指則倒行逆施􅁦有不可勝言者况扵短淺之智慮昏昧之精神狹陋之聞見庸鄙之漸習一旦駭扵荒唐繆悠之說驚扵詭譎恠誕之辭則其顛頓狼狽之状可勝言㢤正使與之誦唐虞之書詠啇周之詩殆亦未必不指汙沱爲滄海謂丘垤爲嵩華况又雜之以不正之言亦安得而不狼狽哉當其猖狂惶駭之時蓋不必明者而後知其繆也由是而言則所謂清濁智愚者殆不可以其行之賢不肖論也觀詳道之素亦可謂行之賢者也然某之􅀼所憂者蓋以其氣之不得爲清而心之不得爲智聞見之不愽而漸習之未洪一有所駭而莫克自定止之者不一二而驅之者八九其所當論者蓋在清濁智愚之間而不在扵道術之際也不論其始之謬以求復其常而悉精殫力扵道術是非之際此其所以愈騖而愈逺也詳道始至此其說蓋甚恠然某觀詳道之質本甚淳朴非􅀎自為此恠􅀃也使生治古盛時康衢撃壤之謡中林肅肅之行未必不優為之也一溺扵流俗再眩扵恠􅀃狼狽可憐之状遂至扵此凡所以相告者不過明恠說之妄欲詳道之知其非而復其常也所慮者通䟽曉了之人少狂妄迷惑之人多則其相與推激而至扵風波荆􅁄䧟穽之地者必衆詳道氣之未清心之未智則殆􅀅鼓舞倡和扵其間又安􅀎知其非而自免扵此􅁘今詳道日􅂂之間所謂行之賢者固未甞自失獨不幸悉心畢力以講術業而不䏻自免扵迷惑今但􅀎退而論扵智愚清濁之間則是惑庶㡬乎自解矣道術之是非邪正徐而論之未晚也當局者迷旁觀者審用心急者多不曉了用心平者多曉了英爽者用心一緊亦且顛倒眩惑况昏鈍者豈可緊用心􅁘昆仲向學之志甚勤所甚病者是不合相推激得用心太緊耳㡬先嘗􅀃諸公所謂退歩乃是進歩耳此公却胸􅁭曉了儘不狂妄其疇昔之所患在扵狥俗自安不向進耳使其聞正言而知懼知勉却不至扵繆戾也二承諭爲學日益良愜所望鄊來清濁智愚之說願無棄鄙言時一閱之或有所啟也人之省過不可激烈激烈者必非深至多是虗作一塲節目殊無長味所謂非徒無益而又害之乆後㸔来當亦自知其未始有異扵􅀄徒自生枝節耳若是平淡中實省則自然優㳺寛􅁉體脉自活矣三學問日進甚善甚善爲學固無窮也然病之大端不可不講常人之病多在扵􅃛逐利縱欲不郷理道或附託以售其姦或訕侮以逞其意皆􅃛之病也求諸癡者固無是矣然眩扵所聼而不明乎擇苟扵所隨而不審扵思覬覦扵非所可得僣妄扵非所􅀎至失常犯分貽笑召侮則癡之為病又可勝言㢤詳道之病想巳自知其大槩第未可自謂巳知之矣當扵日用出言措意之間精觀宻考使有日改月化之效或庶㡬其可瘳也如自謂吾巳知之矣則是癡自若也來書云方􅀗自知之審若使某代言必曰僅􅀎自知言心聲也不可託之以立詞之不善當知是本根之病能扵此有感則自可觸􅀋而長矣四爲學日進􅀹以爲喜詳道天質淳真但不爲夸詐者所惑亦自有過人處文采縱不足亦非大患况學之不巳豈有不􅀎者獨恐無益友相􅂇耳秋試後􅀎相過當叩所得某年來氣血殊憊頗務飬息然亦不遂所志五月來敎授兄一病殊可畏近乃向安此數日􅀹加强可喜家間聚指之衆尊㓜中不䏻不時有疾病令人動念耳其貧窘又益甚幸諸兄相聚所講皆其所以處此者故氣􅁚和􅁉人亦不知其如此耳得諸公書開益良多第倦甚作復不􅀎宣究所懐要之􅁓筆所傳豈如面承也五垂諭新工以是未􅀎寛􅁉所以費力處多優而柔之使自求之饜而飫之使自趨之􅀂江海之浸膏澤之􅃳此數語不可不熟味扵巳扵人皆當如此􅀂􅀎􅀂此靜處應事讀書接人皆當有益優㳺寛容却不是委靡廢放此中至徤至嚴自不費力恐詳道所為􅁬迅者或不免􅂇長之患愚見如此不識以為如何六近甞得李季遠書盛陳别後為學工夫大抵以為朝夕不懈涵泳甚有日新之意又以詳道力以本無事之􅀃排之渠又論不可無事之故某復書云所示與詳道議論不合之處皆是講學不明人持所見以為說用相切磋殆如兒戲今此得信又有與敏道異同之論要亦是兒􅃧耳精勤不懈有涵泳玩索之處此亦是平常本分事豈可必􅀅無事之􅀃排之如讀書接事間見有理㑹不得處却加窮究理㑹亦是本分事亦豈可敎他莫要窮究理㑹若他持此􅀃者元無着實但是虗意駕􅀃立議論􅀄無益扵事實亦湏窮見其底藴只就他虚意無實處理㑹豈可以一􅀃攻一􅀃如詳道來書甚見巳學不明但執虚􅀃之病所與敏道書前一截叙述工夫處却自分明及至豈有要尋方略踐一行之語此病又見如敏道所論亦嘗至此間言之某但與敏道􅀃此皆是閑􅀃話皆縁不自就身巳着實做工夫所以一向好閑議論閑議論實無益扵巳亦豈解有明白處須是自知此等􅀃話是閑議論方有就巳向實工夫涵飬講究却是本分事七朋友自仙里來者皆云蒙子淵啓􅀤無不推服但頗有言其酒後言動殆不可考吾家長上亦罪其顛狂又有詩偈􅀋釋子語不可以訓要之瑕瑜功罪各不相掩今亦不及作渠書或相聚得以此書示之爲幸某未得差勑未及入城聞子淵欲來及今爲一來􅀹佳與包顯道南軒物故何痛如之吾道失􅂇不細近方欲通渠書頗有所論今遂抱恨矣某今􅀊與朋友讀書滋灡在敝居之南五里許宻邇毛坊大路諸况明甫必􅀎言之寫至此方記得曽與顯道一到其下議事來但當時未有滋灡之名耳二得曹立之書云晦菴報渠云包顯道猶有讀書親師友是充塞仁義之􅀃註云乃楊丞在南豊親聞其語故晦菴與某書亦云包顯道尚持􅀄說深所未喻某答書云此公平時好立虚論湏相聚時稍减其性近􅁍不曾通書不知今如何也來書云叩楊丞所學只是躬行踐􅂂讀聖賢書如此而巳觀如此而已之辭則立之所報殆不妄矣不知旣􅀎躬行踐􅂂讀聖賢書又有甚不得處今顯道之學可謂竒恠矣與包敏道昆仲為學不患無志患在好進欲速反以自病聞􅀃日來愈更􅀵歛定帖甚為之喜若􅀎定帖自􅀎量力隨分循循以進儻是吾力之所不􅀎及而强進焉亦安􅀎有進徒取折傷困吝而巳二小家兄疾􅎳驟作殊令人驚今幸安愈滋灡朋友相聚為况不减疇昔元明綜家務時到槐堂亦不甚得作文字然氣宇超邁殊不湮沒差强人意但恐乆不就學則不􅀎成其噐耳諸姪節前常作文節後殊不及作亦是事多世昌敎諸小子又自有道理諸子亦亹亹不厭就中春弟伎倆􅀹進制子四月間來滋灡住得旬日歸後又加進􅀄時與春弟棊春弟頗不􅀎及今年乃反出春弟之下近旬日棊甚進春弟又少不逮矣凡此只在其精神之盛衰耳逢子常出讀書亦頗識字百七姪近歸其文亦進遇事愈有力今巳如館矣試罷􅀎一來否聞諸公定帖可喜但恐來年尚有新條在惱亂春風卒未休書詞亦尚虚驕未甚穩實􅂂徳之基謙徳之柄復徳之本得罪扵􅂂得罪扵謙難以言復矣三向嘗得敏道一書書中雖無他􅀃然詞語多不平穩未􅀎不以為􅁨及得今書開讀之却覺全與舊時所得書不同大抵昆仲之病皆在銳進之處畢竟退讓安詳之人自然識羞處多今為學不長進未為大患因其銳進而至扵狂妄不識羞則為惑深而為累大所謂非徒無益而又害之者也别有一種人安詳遲鈍則只消勉之使進徃徃不至有狂妄之患至如昆仲則最貴退讓若不知此則病生難救見詳道􅀃欲得回字凌遽遣此承秋凉有肯顧之意儻不差遲當得靣叩也四敏道之歸諸書悉未及復㡬未督過貴溪桂店桂氏一族甚盛皆尊尚禮法徃年新闢書院欲延賢師其子弟徳輝者今夏處茅堂稍乆志向甚正今其長上遣德輝詣仙里屈顯道以主新書院來此求書應天山書堂巳就某來􅀊携二子滋灡其上渠家書院宻邇應天顯道肯來亦可時時過從聞其書院甚宏敞景趣亦不惡或有高弟彼中亦儘可相處得從所請甚幸敏道歸後三家兄嘗語及以爲向來澆薄乖戾之氣頓無自非深懲痛省何以至此屢加歎賞雖姪軰議論亦然乃知在彼無惡在此無斁固然之理也與呉伯顒比得報字喜聞日新之功作事業固當隨分有程凖若着實下手處未易泛言只如八哥在此朝夕有師友講切反有倦志不䏻進前然此在八哥亦未易遽責蓋此事論到着實處極是苦澁除是實有終身之大念近到此間却儘有堅實朋友與之切磋皆輙望風畏怯不肯近前每每尋軟弱浮泛之人與之閑話以為有益及至􅀍人指摘卽有埀頭闒耳之状近日雖稍鮮蘇終是不􅀎􅁬㧞近見其資庸腐亦但涵飬之耳俟其更徤乃堪爐錘也此扵八哥亦未足深訝如四哥但未曾到此間耳遇着真實朋友切磋之間實有苦澁處但是良藥苦口利扵病湏是如此方􅀎有益不可不知也與呉仲詩鄉主文所言質論偶七哥扵故書中忽得之其文信羙今錄去其人似多讀曾南豊陳后山文却是好時文秀才觀此人之才似亦有可用終是氣格卑小研覈事情處却甚謹切有可法者若論財用處似不甚知其實然其􅀃大綱亦好謾録去曾南豊論􅀅二篇以見它蹈襲分明處亦可以見曾之議論自然與他别處大抵天下事湏是無塲屋之累無富貴之念而實是平居要研覈天下治亂古今得失底人方􅀃得來有筋力五哥心志精神儘好但不要􅀍塲屋富貴之念覊絆直截􅀅他天下事如吾家事相似就實論量却隨他地歩自有可觀他人文字議論但謾作公案事實我却自出精神與他披判不要與他牽絆我却㑹斡旋運用得他方始是自巳胸􅁭途間除㸔文字外不妨以天下事逐一自題評研覈庶㡬觀它人之文自有所􅀤所㸔之文所討論之事不在必用􅀂􅀎曉得血脉則為可佳若胸􅁭如此縱不得巳用人之􅀃亦自與只要用人之􅀃者不同若㸔文字時有合意或緊要事節不妨熟讀讀得文字熟底雖少亦勝鹵莾而多者與呉叔有近來所學如何嘗思􅀄至此時感􅀤甚盛但當時以信向之篤心誠感通如草木遇春而生蓋有不自知其所以然者有如唐虞三代之民由而不知然舊習深固少緩爐錘則所感宻消唯存虚氣而實皆舊習矣臨歸數日頗知其首尾知處雖大與舊不同而純誠專一乃反不及是以乍昏乍明未必􅀎日新也徃事要不必論直便自即今􅁬㧞乃是即今􅁬㧞何復論前日也然旣已􅁬㧞則其智必明其智苟明則前日所為亦􅀎自知首尾故寫此以為驗爾切不可强附㑹吾言信至但欵曲深思實者有不合處寫來力辨乃見足下長進處若但隨人言語轉却是自家更無主人何以為學觀至此或巳失了精彩却湏且放下此信整冠肅容自振迅精神從實端的自省湏要清徤明白却再取此信觀之有不合處不可强合湏精思熟考寫來辨之乃善象山先生全集卷之六
