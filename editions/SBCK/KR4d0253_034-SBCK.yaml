front:
  text: 􅁚山先生全集卷之三十四
  hash: sha256:2e6ab5d1b356e52db3e8ea2996f67a46d297eca9c30d5f76d3ca60cf7b02ce4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_034-1a}
body:
  text: 語録上道外無事事外無道先生常言之道在宇宙間何甞有病但人自有病千古聖賢只去人病如何増損得道道理只是眼前道理雖見到聖人田地亦只是眼前道理唐虞之際道在臯陶商周之際道在箕子天之生人必有䏻尸明道之責者臯陶箕子是也箕子􅀁以徉狂不死者正爲欲傳其道既爲武王陳洪範則居扵夷狄不食周粟論語中多有無頭柄的􅀃話如知及之仁不䏻守之之􅀋不知􅀁及􅀁守者何事如學而時習之不知時習者何事非學有本領未易讀也苟學有本領則知之􅀁及者及此也仁之􅀁守者守此也時習之習此也􅀃者􅀃此樂者樂此如髙屋之上建瓴水矣學苟知本六經皆我註脚天理人欲之言亦自不是至論若天是理人是欲則是天人不同矣此其原盖出扵老氏樂記曰人生而静天之性也感扵物而動性之欲也物至知知而後好惡形焉不䏻反躬天理㓕矣天理人欲之言盖出扵此樂記之言亦根扵老氏且如專言静是天性則動獨不是天性耶書云人心惟危道心惟㣲解者多指人心為人欲道心為天理此􅀃非是心一也人安有二心自人而言則曰惟危自道而言則曰惟㣲罔念作狂克念作聖非危乎無聲無臭無形無體非㣲乎因言荘子云􅆌乎小哉以屬諸人謷乎大哉獨逰扵天又曰天道之與人道也相逺矣是分明裂天人而為二也動容周旋中禮此盛徳之至􅀁以常有先後言語必信非以正行􅂊有正其行之心已自不是了古人皆是明實理做實事近來論學者言擴而充之須扵四端上逐一充焉有此理孟子當來只是􅀤出人有是四端以明人性之善不可自􅁀自棄苟此心之存則此理自明當惻􅀮處自惻􅀮當羞惡當辭遜是非在前自䏻辨之又云當寛􅁉温柔自寛􅁉温柔當􅀤强剛毅自􅀤强剛毅􅀁謂溥博淵泉而時出之夫子問子貢曰汝與囬也孰愈子貢曰賜也何敢望囬囬也聞一以知十賜也聞一以知二此又是白著了夫子氣力故夫子復語之曰弗如也時有姓吳者在坐􅃍曰爲是尚嫌少在先生因語坐間有志者曰此􅀃與天下士人語未必䏻通暁而吳君通敏如此雖諸君有志然扵此不䏻及也吳遜謝謂偶然子貢在夫子之門其才最髙夫子􅀁以屬望磨礲之者甚至如予一以貫之獨以語子貢與曽子二人夫子既沒三年門人歸子貢反築室扵􅂣獨居三年然後歸盖夫子􅀁以磨礲子貢者極其力故子貢獨留三年報夫子深恩也當時若磨礲得子貢就則其材豈曽子之比顔子既亡而曽子以魯得之盖子貢反為聦明􅀁累卒不􅀎知徳也子貢言性與天道不可得而聞此是子貢後來有􅀁見䖏然謂之不可得而聞非實見也如曰予欲無言即是言了天下之理無窮若以吾平生􅀁經歴者言之真􅀁謂伐南山之竹不足以受我辭然其㑹歸緫在扵此顔子為人最有精神然用力甚難仲弓精神不及顔子然用力􅁍易顔子當􅀄仰髙鑚堅瞻前忽後愽文約禮遍求力索既竭其才方如有􅀁立卓爾逮至問仁之時夫子語之猶下克已二字曰克已復禮為仁又􅀤露其㫖曰一日克巳復禮天下歸仁焉既又復告之曰為仁由已而由人乎哉吾甞謂此三節乃三鞭也至扵仲弓之為人則或人甞謂雍也仁而不佞仁者静不佞無口才也想其為人冲静寡思日用之間自然合道至其問仁夫子但荅以出門如見大賔使民如承大祭已􅀁不欲勿施扵人只此便是也然顔子精神髙既磨礲得就實則非仲弓􅀁􅀎及也顔子問仁之後夫子許多事業皆分付顔子了故曰用之則行舎之則藏惟我與爾有是顔子沒夫子哭之曰天䘮予盖夫子事業自是無傳矣曽子雖􅀎傳其脉然參也魯豈􅀎望顔子之素蓄幸曽子傳之子思子思傳之孟子夫子之道至孟子而一光然夫子􅀁分付顔子事業亦竟不復傳也學有本末顔子聞夫子三轉語其綱既明然後請問其目夫子對以非禮勿視勿聽勿言勿動顔子扵此洞然無疑故曰囬雖不敏請事斯語矣本末之序盖如此今世論學者本末先後一時顛倒錯亂曽不知詳細處未可􅃍責扵人如非禮勿視聽言動顔子已知道夫子乃語之以此今先以此責人正是躐等視㕔言動勿非禮不可扵這上面看顔子須看請事斯語直是承當得過天之一字是臯陶􅀃起夫子以仁􅀤明斯道其言渾無罅縫孟子十字打開更無􅀮遁盖時不同也自古聖賢􅀤明此理不必盡同如箕子􅀁言有臯陶之􅀁未言夫子􅀁言有文王周公之􅀁未言孟子􅀁言有吾夫子之􅀁未言理之無窮如此然譬之奕然先是這般等第國手下棊後來又是這般國手下棊雖􅀁下子不同然均是這般手叚始得故曰其或􅁇周者雖百世可知也古人視道只如家常茶飯故漆雕開曰吾斯之未􅀎信斯此也此道與溺扵利欲之人言猶易與溺扵意見之人言􅁍難㳙㳙之流積成江河泉源方動雖只有㳙㳙之㣲去江河尚逺􅁍有成江河之理若􅀎混混不􅃕晝夜如今雖未盈科􅀅來自盈科如今雖未放乎四海􅀅來自放乎四海如今雖未㑹其有極歸其有極􅀅來自㑹其有極歸其有極然學者不􅀎自信見夫標末之盛者便自荒忙舎其㳙㳙而趋之􅁍自壊了曽不知我之㳙㳙雖㣲􅁍是真彼之標末雖多􅁍是偽恰似檐水來相似其涸可立而待也故吾甞舉俗諺教學者云一錢做單客兩錢做􅀟客傅子淵自此歸其家陳正巳問之曰陸先生教人何先對曰辨志正巳復問曰何辨對曰義利之辨若子淵之對可謂切要此道非争競務進者􅀎知惟静退者可入又云學者不可用心太緊今之學者大抵多是好事未必有切已之志夫子曰古之學者爲已今之學者爲人須自省察夫民合而聽之則神離而聽之則愚故天下萬世自有公論先生與晦翁辯論或諌其不必辯者先生曰女曽知否建安亦無朱晦翁青田亦無陸子静不曽過得私意一關終難入徳未􅀎入徳則典則法度何以知之居􅁚山多告學者云女耳自聦目自明事父自􅀎孝事兄自􅀎弟本無欠闕不必他求在自立而已生扵末世故與學者言費許多氣力盖為他有許多病痛若在上世只是與他􅀃入則孝出則弟􅀄無許多事千虗不博一實吾平生學問無他只是一實或問先生何不著書對曰六經註我我註六經韓退之是倒做盖欲因學文而學道歐公極似韓其聦明皆過人然不合􅀄頭俗了或問如何俗了曰符讀書城南三上宰相書是已至二程方不俗然聦明􅁍有􅀁不及正人之本難正其末則易今有人在此與之言汝適某言未是某處坐立舉動未是其人必樂從若去動他根本􅀁在他便不肯釋氏立教本欲脫離生死惟主扵成其私耳此其病根也且如世界如此忽然生一箇謂之禪已自是無風起浪平地起􅁟堆了無它利與善之間也此是孟子見得透故如此􅀃或問先生之學當來自何處入曰不過切已自反改過遷善有善必有惡真如反覆手然善􅁍自本然惡􅁍是反了方有人品在宇宙間逈然不同諸處方嘵嘵然談學問時吾在此多與後生􅀃人品此道之明如太陽當空羣隂畢伏典憲二字甚大惟知道者􅀎明之後世乃指其􅀁撰苛法名之曰典憲此正􅀁謂無忌憚朱元晦曽作書與學者云陸子静專以尊徳性誨人故㳺其門者多踐􅂂之士然扵道問學處欠了某教人豈不是道問學處多了些子故㳺某之門者踐􅂂多不及之􅀚此則是元晦欲去兩短合兩長然吾以為不可既不知尊徳性焉有􅀁謂道問學吾之學問與諸處異者只是在我全無杜撰雖千言萬語只是覺得他底在我不曽添一些近有議吾者云除了先立乎其大者一句全無伎倆吾聞之曰誠然復齋家兄一日見問云吾弟今在何處做工夫某荅云在人情事􅀔物理上做些工夫復齋應而已若知物價之低昂與夫辨物之美惡真偽則吾不可不謂之䏻然吾之􅀁謂做工夫非此之謂也後世言學者須要立箇門户此理􅀁在安有門户可立學者又要各護門户此􅀹鄙陋人共生乎天地之間無非同氣扶其善而沮其惡義􅀁當然安得有彼我之意又安得有自為之意二程見周茂叔後吟風弄月而歸有吾與􅀧也之意後來明道此意􅁍存伊川已失此意吾與常人言無不感動與談學問者或至為􅄷舉世人大抵就私意建立做事專以做得多者為先吾􅁍欲殄其私而㑹扵理此􅀁以為􅄷吾與人言多就血脉上感移它故人之聴之者易非若法令者之為也如孟子與齊君言只就與民同䖏轉移它其餘自正今之論學者只務添人底自家只是减他底此􅀁以不同宇宙不曽限隔人人自限隔宇宙乾以易知坤以簡䏻先生常言之云吾知此理即乾行此理即坤知之在先故曰乾知太始行之在後故曰坤作成物夫子平生􅀁言豈止如論語􅀁載特當時弟子􅀁載止此爾今􅀚有子曽子獨稱子或多是有若曽子門人然吾讀論語至夫子曽子之言便無疑至有子之言便不喜先生問學者云夫子自言我學不厭及子貢言多學而識之又􅁍以為非何也因自代對云夫子只言我學不厭若子貢言多學而識之便是蔽􅀃學者須先立志志既立􅁍要遇明師攻乎異端斯害也已今世􅀋指佛老為異端孔子時佛教未入中國雖有老子其􅀃未著􅁍指那箇為異端盖異與同對雖同師尭舜而􅀁學之端緒與尭舜不同即是異端何止佛老㢤有人問吾異端者吾對曰子先理㑹得同底一端則凡異此者皆異端子不語怪力亂神夫子只是不語非謂無也若力與亂分明是有神怪豈獨無之人以變瞳之㣲􅀁瞩甚逺亦怪矣苟不明道則一身之間無非怪但玩而不察耳可與適道未可與立可與立未可與􅁠棠棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有上面是􅀃階級不同夫子因舉詩中室是逺而之語因以掃上面階級盖雖有階級未有逺而不可進者也因言李清臣云夫子刪詩固有刪去一二語者如棠棣之詩今逸此兩句乃夫子刪去也清臣又言碩人之詩無素以為絢􅀆一語亦是夫子刪去其􅀃皆是當時子夏之言謂繪事以素為後乃是以禮為後乎言不可也夫子盖因子夏之言而刪之子夏當時亦有見乎本末無間之理然後來􅁍有􅀁泥故其學傳之後世􅀹有害繪事後素若周禮言繪􅀞之事後素功謂既􅀞之後以素間别之盖以記其目之黒白分也謂先以素為地非柴愚參魯夫子􅀁愛故子路使子羔為費宰子曰賊夫人之子以此見夫子欲子羔來磨礲就其逺者大者後來子羔早卒故屬意扵曽子叩其兩端而竭焉言極其􅀄終始末竭盡無留藏也江漢以濯之秋陽以􅁀之皜皜乎不可尚已此數語自曽子胷中流出咸有一徳之書言惟尹躬暨湯咸有一徳以此見當時只有尹湯二人可當一徳臯陶論知人之道曰亦行有九徳亦言其人有徳乃言曰載采采乃是謂必先言其人之有是徳然後乃言曰某人有某事有某事盖徳則根乎其中逹乎其氣不可偽為若事則有才智之小人可偽為之故行有九徳必言其人有徳乃言曰載采采然後人不可得而廋也後世言伏羲畫八卦文王始重之為六十四卦其􅀃不然且如周禮雖未可盡信如筮人言三易其經卦皆八其别皆六十有四􅀛筮恊從亦見扵虞書必非偽􅀃如此則卦之重乆矣盖伏羲既畫八卦即從而重之然後􅀎通神明之徳􅀋萬物之情而扶持天下之理文王盖因其繇辭而加詳以盡其變爾繫辭首篇二句可疑盖近扵推測之辭吾之深信者書然易繫言黙而成之不言而信存乎徳行此等䖏深可信伊川觧比卦原筮作占决卜度非也一陽當世之大人其不寧方來乃自然之理􅀔豈在它占决卜度之中原筮乃􅂪􅀄筮之義原􅀄也古人字多通用因云伊川學問未免占决卜度之失富貴不􅀎􅁋貧賤不􅀎移威武不􅀎屈非知道者不􅀎楊子謂文王乆幽而不改其操文王居羑里而賛易夫子厄扵陳蔡而弦歌豈乆幽而不改其操之謂耶自周衰以來人主之職分不明尭典命羲和敬授人時是爲政首後世乃付之星官暦翁盖縁人主職分不明􅀁致孟子曰民爲貴社稷次之君爲輕此􅁍知人主職分詩大雅多是言道小雅多是言事大雅雖是言小事亦主扵道小雅雖是言大事亦主扵事此􅀁以爲大雅小雅之辨秦不曾壊了道脉至漢而大壊盖秦之失甚明至漢則迹似情非故正理愈壊漢文帝藹然善意然不可與入尭舜之道僅以鄉原諸公上殿多好􅀃格物且如人主在上便可就他身上理㑹何必别言格物楊子黙而好深沉之思他平生為此深沉之思􅀁誤韓退之原性􅁍􅀅氣質做性􅀃了近日舉及荀子解蔽篇􅀃得人之蔽䖏好梭山兄云後世之人病正在此都􅀍荀子荘子軰壊了荅云今世人之通病恐不在此大槩人之通病在扵居茅茨則慕棟宇衣敝衣則慕華好食麄糲則慕甘肥此乃是世人之通病春秋北杏之㑹獨扵齊桓公稱爵盖當時倡斯義者惟桓公管仲二人春秋扵諸國稱人責之也古者風俗醇厚人雖有虗底精神自然消了後世風俗不如古故􅀍此一叚精神為害難與語道因嘆學者之難得云我與學者􅀃話精神稍髙者或走了低者至塌了吾只是如此吾􅀄不知手􅀔如此之甚然吾亦只有此一路人方􅁬立巳有消蝕則議者不罪其消蝕而􅀹其􅁬立之太過舉其進銳者其退速以為證扵是併懲其􅀄曾不知孟子之意自不在此聖人作春秋􅀄非有意扵二百四十二年行事又云春秋大槩是存此理又云春秋之亡乆矣􅀃春秋之繆􅀹甚扵諸經也甞閱春秋纂例謂學者曰啖趙􅀃得有好䖏故人謂啖趙有功扵春秋又云人謂唐無理學然反有不可厚誣者後世之論春秋者多如法令非聖人之㫖也千古聖賢若同堂合席必無盡合之理然此心此理萬世一揆也銖銖而稱之至石必繆寸寸而度之至丈必差石稱丈量徑而寡失此可為論人之法且如其人大槩論之在扵為國為民為道義此則君子人矣大槩論之在扵為私已為權􅀔而非忠扵國狥扵義者則是小人矣若銖稱寸量校其一二節目而違其大綱則小人或得為欺君子反􅀍猜疑邪正賢否未免倒置矣有學者聽言有省以書來云自聽先生之言越千里如歴塊因云吾􅀁􅀤明為學端緒乃是第一歩􅀁謂升髙自下陟遐自邇􅁍不知指何䖏為千里若以為今日捨私小而就廣大為千里非也此只可謂之第一歩不可遽謂千里吾扵人情研究得到或曰察見淵中魚不祥然吾非苛察之謂研究得到有扶持之方耳後世􅀅譲職作一禮數古人推譲皆是實情唐虞之朝可見非尚虚文以譲為美名也甞聞王順伯云本朝百事不及唐然人物議論逺過之此議論甚闊可取甞問王順伯曰聞尊兄精扵論字畫敢問字果有定論否順伯曰有定論曰何以信此􅀃順伯曰有一畫一拐扵此使天下有兩三人暁書問之此人曰是此等第則彼二人之言亦同如此知其有定因問字畫孰為貴順伯曰本朝不及唐唐不及漢漢不及先秦古書曰如此則大抵是古得些子者為貴順伯曰大抵古人作事不苟簡尊兄試􅀚古器與後來者異矣此論極是傅子淵請教乞簡省一語荅曰艮其背不􅀗其身行其庭不見其人後見其與陳君舉書中云是則全掩其非非則全掩其是此是語病中又云闊節而䟽目㫖髙而􅃐深㫖髙而􅃐深甚佳闊節而䟽目子淵好䖏在此病亦在此又云子淵弘大文範細宻子淵䏻兼文範之細宻文範䏻兼子淵之弘大則非細也朱濟道力稱賛文王謂曰文王不可輕賛須是識得文王方可稱賛濟道云文王聖人誠非某􅀁䏻識曰識得朱濟道便是文王一學者自晦翁處來其拜跪語言頗怪毎日出齋此學者必有陳論應之亦無他語至四日此學者􅀁言已罄力請誨語荅曰吾亦未暇詳論然此間大綱有一箇規模􅀃與人今世人淺之為聲色臭味進之為富貴利逹又進之為文章技藝又有一般人都不理㑹􅁍談學問吾緫以一言㫁之曰勝心此學者黙然後數日其舉動言語頗復常一學者從㳺閱數月一日問之云聽􅀃話如何曰􅀄來時疑先生之顛倒既如此􅀃了後又如彼􅀃及至聽得兩月後方始貫通無顛倒之疑三百篇之詩周南為首周南之詩關雎為首關雎之詩好善而已興扵詩人之為學貴扵有􅀁興起洙泗門人其間自有與老氏之徒相通者故記禮之書其言多原老氏之意先生在勑局日或問曰先生如見用以何藥方醫國先生曰吾有四物湯亦謂之四君子湯或問如何曰任賢使䏻賞功罰罪先生云後世言道理者終是粘牙嚼舌吾之言道坦然明白全無粘牙嚼舌䖏此􅀁以易知易行或問先生如此談道恐人􅀅意見來㑹不及釋子談禪使人無􅀁措其意見先生云吾雖如此談道然凡有虗見虗􅀃皆來這裏使不得􅀁謂徳行常易以知險恒簡以知阻也今之談禪者雖為艱難之􅀃其實反可􅀉託其意見吾扵百衆人前開口見膽先生云凡物必有本末且如就樹木􅀚之則其根本必差大吾之教人大槩使其本常重不為末􅀁累然今世論學者􅁍不恱此有一士大夫云陸丈與他人不同􅁍許人改過先生甞問一學者若事多放過有寛大氣􅁚若動輙别白似若􅄶隘不知孰是學者云若不别白則無長進䖏先生曰然先生云學者讀書先扵易暁䖏沉􅆂熟復切已致思則他難暁者渙然氷釋矣若先看難暁䖏終不􅀎達舉一學者詩云讀書切戒在荒忙􅆂泳工夫興味長未暁莫妨權放過切身須要急思量自家主宰常精徤逐外精神徒損傷􅀉語同逰二三子莫􅀅言語壊天常先生歸自臨安子雲問近來學者先生云有一人近來有省云一蔽既徹群疑盡亡先生云歐公本論固好然亦只􅀃得皮膚看唐鑑令讀一叚子雲因請曰終是􅀃骨髓不出先生云後世亦無人知得骨髓去處劉淳叟參禪其友周姓者問之曰淳叟何故捨吾儒之道而參禪淳叟荅曰譬之扵手釋氏是把鋤頭儒者把斧頭􅀁把雖不同然􅁍皆是這手我而今只要就他明此手友荅云若如淳叟􅀁言我只就把斧頭䖏明此手不願就他把鋤頭䖏明此手先生云淳叟亦善喻周亦可謂善對先生云子夏之學傳之後世􅀹有害先生居􅁚山多告學者云汝耳自聦目自明事父自􅀎孝事兄自􅀎弟本無少缺不必他求在乎自立而已學者扵此亦多興起有立議論者先生云此是虗􅀃或云此是時文之見學者遂云孟子闢楊墨韓子闢佛老陸先生闢時文先生云此􅀃也好然闢楊墨佛老者猶有些氣道吾􅁍只闢得時文因一笑先生作貴溪學記云尭舜之道不過如此此亦非有甚髙難行之事甞舉以語學者云吾之道真􅀁謂夫婦之愚可以與知或問讀六經當先看何人解註先生云須先精看古註如讀左傳則杜預註不可不精看大槩先須理㑹文義分明則讀之其理自明白然古註惟趙岐解孟子文義多略有一後生欲䖏郡庠先生訓之曰一擇交二隨身規矩三讀古書論語之屬程先生解易爻辭多得之􅂏辭􅁍有鶻突處人之文章多似其氣質杜子美詩乃其氣質如此三代之時逺近上下皆講明扶持此理其有不然者衆從而斥之後世逺近上下皆無有及此者有一人務此衆反以為怪故古之時比屋至扵可封後世雖􅀎自立然寡固不可以敵衆非英才不􅀎􅁬興有學者因事上一官員書云遏惡􅀭善沮姦佑良此天地之正理也此理明則治不明則亂存之則為仁不存則為不仁先生擊節稱賞先生云吾自應舉未甞以得失為念塲屋之文只是直寫胸􅁭故作貴溪縣學記云不狥流俗而正學以言者豈皆有司之􅀁棄天命之􅀁遺有學者曽看南軒文字􅁇從先生㳺自謂有省及作書陳􅀁見有一語云與太極同體先生復書云此語極似南軒學者不可用心太􅂃深山有寳無心扵寳者得之有學者上執政書中間有云閣下作而待漏扵金門朝而議政扵黼座退而平章扵中書歸而咨訪扵府第不識是心􅀎如晝日之昭晣而無薄蝕之者乎􅀎如砥柱之屹立而無淪胥之者乎先生云此亦可以警學者曹立之有書扵先生曰願先生且􅀅孝弟忠信誨人先生云立之之謬如此孝弟忠信如何􅀃且􅀅惟温故而後􅀎知新惟敦厚而後􅀎崇禮易繫上下篇緫是賛易只􅀅賛易看便自分明凡吾論世事皆如此必要挈其緫要去處後世言易數者多只是昡惑人之􅀃夫人㓜而學之壮而欲行之今之論學者􅀁用非􅀁學􅀁學非􅀁用或有譏先生之教人專欲管歸一路者先生曰吾亦只有此一路孟子曰言人之不善當如後患何今人多失其㫖盖孟子道性善故言人無有不善今若言人之不善彼將甘為不善而以不善向汝汝􅀅何以待之故曰當如後患何見到孟子道性善䖏方是見得盡退之言軻死不得其傳荀與楊擇焉而不精語焉而不詳何其􅀃得如此端的程先生解頻復厲言過在失不在復極好先生在勑局日或􅂆以小人闖伺宜乞退省先生曰吾之未去以君也不遇則去豈可以彼為去就耶李白杜甫陶淵明皆有志扵吾道資禀之髙者義之􅀁在順而行之􅀄無留難其次義利交戰而利終不勝義故自立吾自㓜時聽人議論似好而其實不如此者心不肯安必要求其實而後已吾扵踐􅂂未䏻純一然􅂊自警䇿便與天地相似後世言寛仁者􅀋出扵姑息殊不知苟不出扵文致而當其情是乃寛仁也故吾甞曰虞舜孔子之寛仁吾扵四裔兩觀之間見之有士人上詩云手抉浮翳開東明先生頗取其語因云吾與學者言真􅀁謂取日虞淵洗光咸池右門人傅子雲季魯編録冉子退朝子曰何晏也對曰有政子曰其事也魯國無政􅀁行者亦其事而巳政者正也志壹動氣此不待論獨氣壹動志未䏻使人無疑孟子復以蹶趨動心明之則可以無疑矣壹者專一也志固為氣之帥然至扵氣之專一則亦䏻動志故不但言持其志又戒之以無􅁀其氣也居䖏飲食適節宣之宜視聽言動嚴邪正之辨皆無􅁀其氣之工也古者十五而入大學大學之道在明明徳在親民在止扵至善此言大學指歸欲明明徳扵天下是入大學標的格物致知是下手䖏中庸言􅀶學審問謹思明辨是格物之方讀書親師友是學思則在巳問與辨皆須即人自古聖人亦因徃哲之言師友之言乃䏻有進况非聖人豈有任私智而䏻進學者然徃哲之言因時乘理其指不一方冊􅀁載又有正偽純疵若不䏻擇則是泛觀欲取决扵師友師友之言亦不一又有是非當否若不䏻擇則是泛從泛􅀚泛從何􅀁至止如彼作室于道謀是用不潰于成欲取其一而從之則又安知非私意偏􅀃子莫執中孟子尚以為執一廢百豈為善學後之學者顧何以䖏此學者規模多係其聞見孩提之童未有傳習豈䏻有是規模是故􅀁習不可不謹䖏乎其中而䏻自㧞者非豪傑不䏻刼扵事􅀔而為之趨向者多不得其正亦理之常也古者􅀔與道合後世􅀔與道離何謂􅀔與道合盖徳之宜為諸侯者為諸侯宜為大夫者為大夫宜為士者為士此之謂􅀔與道合後世反此賢者居下不肖者居上夫是之謂􅀔與道離􅀔與道合則是治世􅀔與道離則是亂世如切如磋者道學也如琢如磨者自修也骨􅁚脆切磋之工精細玉石堅琢磨之工麄大學問貴細宻自修貴勇猛世人只􅃹理㑹利害皆自謂惺惺及他已分上事又􅁍只是放過争知道名利如錦覆䧟穽使人貪而墮其中到頭只嬴得一箇大不惺惺去陽一君而二民君子之道也隂二君而一民小人之道也陽竒隂偶陽以竒為君一也隂以偶為君二也有一則有二第􅀁主在一彼小人之事豈􅃍絶其一哉􅀁主非是耳故君子以理制事以理􅀚􅁚故曰變動不居周流六虗上下無常剛柔相易不可為典要唯變􅀁適書䟽云周天三百六十五度四分度之一天體圓如彈丸北髙南下北極出地上三十六度南極入地下三十六度南極去北極直徑一百八十二度强天體􅂭曲正當天之中央南北二極中等之䖏謂之赤道去南北極各九十一度春分日行赤道從此漸北夏至行赤道之北二十四度去北極六十七度去南極一百一十五度從夏至以後日漸南至秋分還行赤道與春分同冬至行赤道之南去南極六十七度去北極一百一十五度其日之行處謂之黄道又有月行之道與日相近交路而過半在日道之裏半在日道之表其當交則兩道相合去極逺䖏兩道相去六度此其日月行道之大略也黄道者日􅀁行也冬至在斗出赤道南二十四度夏至在井出赤道北二十四度秋分交扵角春分交扵奎月有九道其出入黄道不過六度當交則合故曰交蝕交蝕者月道與黄道交也孟子登東山而小魯一章紬繹誦詠五六過始云皆是言學之充廣如水之有瀾日月之有光皆是本原上􅀤得如此牛山之木甞美矣以下常宜諷詠元晦似伊川欽夫似明道伊川蔽固深明道􅁍通䟽九疇之數一六在北水得其正三八在東木得其正唯金火易位而木生火自三上生至九自一數至扵九正得二數故火在南自四數至七亦得四數故金在西一變而為七七變而為九九復變而為一者一與一為二一與二為三一與三為四一與四為五一與五為六五數之祖故至七則為二與五矣是一變也至九而極故曰七變而爲九數至九則必變故至十則變爲一十百爲一百千爲一千萬爲一萬是九復變而爲一也或問賈􅁩陸贄言論如何曰賈􅁩是就事上􅀃仁義陸贄是就仁義上􅀃事臨安四聖觀六月間傾城士女咸出禱祠或問何以致人歸鄉如此荅曰只是賞罰不明一夕歩月喟然而嘆包敏道侍問曰先生何嘆曰朱元晦泰山喬嶽可惜學不見道枉費精神遂自擔閣柰何包曰􅀔既如此莫若各自著書以待天下後世之自擇忽正色厲聲曰敏道敏道恁地沒長進乃作這般見解且道天地間有箇朱元晦陸子静便添得些子無了後便减得些子歸自臨安湯倉因言風俗不美曰乍歸方欲與後生􅀃些好話然此事亦由天亦由人湯云如何由天曰且如三年一次科舉萬一中者篤厚之人多浮薄之人少則風俗自此而厚不然只得一半篤厚之人或三四箇篤厚之人風俗猶自庶㡬不幸篤厚之人無㡬或全是浮薄之人則後生從而視傚風俗日以敗壊湯云如何亦由人曰監司守令便是風俗之宗主只如院判在此毋只惟位髙爵重旗旌導前􅀐卒擁後者是崇是敬陋巷茅茨之間有篤敬忠信好學之士不以其㣲賤而知崇敬之則風俗庶㡬可囬矣湯再三稱善次日謂幕僚曰陸丈近至城何不去聽􅀃話幕僚云恐陸丈門户髙峻議論非某軰􅀁􅀎喻湯云陸丈􅀃話甚平正試徃聽看某扵張吕諸公皆相識然陸丈􅀃話自是不同須知人情之無常方料理得人孝經十八章孔子扵踐履實地上􅀃出非虗言也莫知其苗之碩謂葉幹髼鬆而亡實者也天下之言性也則故而已矣此叚人多不明首尾文義中間􅀁惡扵智者至智亦大矣文義亦自明不失孟子本㫖據某􅀁見當以荘子去故與智解之􅀚荘子中有此故字則知古人言語文字必常有此字易雜卦中隨無故也即是此故字當孟子時天下無􅀎知其性者其言性者大抵㩀陳迹言之實非知性之本徃徃以利害推􅀃耳是反以利爲本也夫子賛易治暦明時在革之􅁚盖暦本測􅀱常須改法􅀚革之義則千嵗之日至無可坐致之理明矣孟子言千􅀊之日至可坐而致也正是言不可坐而致以此明不可求其故也帝出乎震帝者天也震居東春也震雷也萬物得雷而萌動焉故曰出乎震齊乎巽巽是東南春夏之交也巽風也萬物得風而滋長焉新生之物齊潔精明故曰萬物之潔齊也相見乎離離南方之卦也夏也生物之形至是畢露文物粲然故曰相見致役乎坤萬物皆得地之飬􅀅遂妊實六七月之交也萬物扵是而胎實焉故曰致役乎坤􅀃言乎兊兊正秋也八月之時萬物既已成實得雨澤而􅀃懌故曰萬物之􅀁􅀃也戰乎乾乾是西北方之卦也舊榖之事􅀅始乾不得不君乎此也十月之時隂極陽生隂陽交戰之時也龍戰乎野是也勞乎坎坎者水也至勞者也隂退陽生之時萬物之􅀁歸也隂陽未定之時萬物歸藏之始其事獨勞故曰勞乎坎成言乎艮隂陽至是而定矣舊榖之事扵是而終新榖之事扵是而始故曰萬物之􅀁成終成始也易之為書也不可逺為道也屢遷變動不居周流六虚上下無常剛柔相易不可為典要唯變􅀁適臨深􅂂薄參前􅀝衡儆戒無虞小心翼翼道不可須􅁷離也五典天叙五禮天秩洪範九疇帝用錫禹傳在箕子武王訪之三代攸興罔不克敬典不有斯人孰足以語不可逺之書而論屢遷之道也其為道也屢遷不遷處變動不居居處周流六虗實處上下無常常處剛柔相易不易處不可為典要要處惟變􅀁適不變處􅂂徳之基也謙徳之柄也復徳之本也恒徳之固也損徳之修也益徳之􅁉也困徳之辨也井徳之地也巽徳之制也易之興也其扵中古乎作易者其有憂患乎上古淳朴人情物態未至多變易雖不作未有闕也逮乎中古情態日開詐偽日萌非明易道以示之則質之美者無以成其徳天下之衆無以感而化生民之禍有不可勝言者聖人之憂患如此不得不因時而作易也易道既著則使君子身修而天下治矣是故􅂂徳之基也雜卦曰􅂂不處也不處者行也上天下澤尊卑之義禮之本也經禮三百曲禮三千皆本諸此常行之道􅂂徳之基謂以行為徳之基也基始也徳自行而進也不行則徳何由而積謙徳之柄也有而不居為謙謙者不盈也盈則其徳䘮矣常執不盈之心則徳乃日積故曰徳之柄既䏻謙然後䏻復復者陽復為復善之義人性本善其不善者遷扵物也知物之為害而䏻自反則知善者乃吾性之固有循吾固有而進徳則沛然無他適矣故曰復徳之本也知復則内外合矣然而不常則其徳不固􅀁謂雖得之必失之故曰恒徳之固也君子之修徳必去其害徳者則徳日進矣故曰損徳之修也善日積則寛􅁉故曰益徳之􅁉也不臨患難難處之地未足以見其徳故曰困徳之辨也井以飬人利物為事君子之徳亦猶是也故曰井徳之地也夫然可以有為有為者常順時制宜不順時制宜者一方一曲之士非盛徳之事也順時制宜非隨俗合汚如禹稷顔子是已故曰巽徳之制也􅂂和而至兊以柔恱承乾之剛徤故和天在上澤處下理之極至不可易故至君子􅀁行體􅂂之義故和而至謙尊而光不謙則必自尊自耀自尊則人必賤之自耀則徳䘮䏻謙則自卑自晦自卑則人尊之自晦則徳益光顯復小而辨扵物復貴不逺言動之㣲念慮之􅀮必察其為物􅀁誘與否不辨扵小則􅀅致悔咎矣恒雜而不厭人之生動用酢酧事變非一人情扵此多至厭倦是不恒其徳者也䏻恒者雖雜而不厭損先難而後易人情逆之則難順之則易凡損抑其過必逆乎情故先難既損抑以歸扵善則順乎本心故後易益長􅁉而不設益者遷善以益巳之徳故其徳長進而寛􅁉設者侈張也有侈大不誠實之意如是則非􅀁以爲益也困窮而通不修徳者遇窮困則隕穫䘮亡而已君子遇窮困則徳益進道益通井居其􅀁而遷如君子不以道狥人故曰居其􅀁而􅀶施濟衆無有不及故曰遷巽稱而􅀮巽順扵理故動稱宜其􅀁以稱宜者非有形迹可見故􅀮􅂂以和行行有不和以不由禮故也䏻由禮則和矣謙以制禮自尊大則不䏻由禮卑以自牧乃䏻自節制以禮復以自知自克乃䏻復善他人無與焉恒以一徳不常則二三常則一終始惟一時乃日新損以逺害如忿慾之􅀋為徳之害損者損其害徳而巳􅀎損其害徳者則吾身之害固有可逺之道特君子不取必乎此也益以興利有益扵已者為利天下之有益扵已者莫如善君子􅀚易之􅁚而遷善故曰興利䏻遷善則福慶之利固有自致之理在君子無加損焉有不足言者困以寡怨君子扵困厄之時必推致其命吾遂吾之志何怨之有推困之義不必窮厄患難及已也凡有道而有􅀁不可行皆困也君子扵此自反而已未甞有􅀁怨也井以辨義君子之義在扵濟物扵井之義人可以明君子之義巽以行􅁠巽順扵理如􅁠之扵物隨輕重而應則動静稱宜不以一定而悖理也九卦之列君子修身之要其序如此缺一不可也故詳復賛之􅀁謂誠其意者無自欺也一叚緫是修身齊家治國平天下之要故反覆言之如惡惡臭如好好色乃是性􅀁好惡非出扵勉强也自欺是欺其心謹獨即不自欺誠者自成而道自道也自欺不可謂無人知十目􅀁視十手􅀁指其嚴若此惟器與名不可以假人只當􅀃繁纓非諸侯􅀁當用不可以與此人左氏也􅀃差􅁍名了是非孔子之言如孟子謂聞誅一夫紂矣乃是正名孔子扵蒯瞶􅂺之事乃是正名至扵温公謂名者何諸侯卿大夫是也則失之矣事不可以逆料聖賢未甞預料由也不得其死然死矣盆成括其㣲言如此此理塞宇宙誰􅀎迯之順之則吉違之則㓙其􅂪蔽則爲昏愚通徹則爲明知昏愚者不見是理故多逆以致㓙明知者見是理故􅀎順以致吉􅀃易者謂陽貴而隂賤剛明而柔暗是固然矣今晋之卦上離以六五一隂為明之主下坤以三隂順從扵離明是以致吉二陽爻反皆不善盖離之􅀁以為明者明是理也坤之三隂􅀎順從其明宜其吉無不利此以明理順理而善則其不盡然者亦宜其不盡善也不明此理而泥扵爻畫名言之末豈可以言易哉陽貴隂賤剛明柔暗之􅀃有時而不可泥也屯隂陽始交一索而得長男再索而得中男六三即鹿無虞惟入扵林中指下卦之漸入上卦坎險之地上六乘馬班如泣血漣如正孔子曰吾末如之何也已矣雖然人當止邪扵未形絶惡扵未萌致治扵未亂保􅀖扵未危􅂪九二一爻爲􅀤􅂪之主不應更論與九五相得與否包􅂪納婦即克家之事束書不􅀚㳺談無根染習深者難得净潔自明然後􅀎明人復齋看伊川易傳解艮其背問某伊川􅀃得如何某云􅀃得鶻突遂命某􅀃某云艮其背不􅀗其身無我行其庭不見其人無物或謂先生之學是道徳性命形而上者晦翁之學是名物度數形而下者學者當兼二先生之學先生云足下如此􅀃晦翁晦翁未伏晦翁之學自謂一貫但其見道不明終不足以一貫耳吾甞與晦翁書云揣量模寫之工依放假借之似其條畫足以自信其節目足以自安此言切中晦翁之膏肓學者荅堂試䇿先生云諸公荅䇿皆是隨問走荅䇿當如堂上人部勒堂下吏卒乃不為䇿題􅀁􅅶先生扵門人最属意者唯傅子淵􅀄子淵請教先生有艮背行庭無我無物之􅀃後子淵謂某舊登南軒晦翁之門為二􅀃􅀁礙十年不可先生之􅀃及分教衡陽三年乃始信先生屢稱子淵之賢因言比陳君舉自湖南漕臺遣書幣下問來書云某老矣不復見諸事功但欲結果身分耳先生略舉荅書因􅀃近得子淵與君舉書煞好若子淵切磋不已君舉當有可望也但子淵書中有兩句云是則全掩其非非則全掩其是亦為抹出後聞先生臨終前數日有自衡陽來呈子淵與周益公論道五書先生手不釋歎曰子淵擒龍打鳳底手叚邵武丘元夀聽話累日自言少時獨喜看伊川語録先生曰一見足下知留意學問且從事伊川學者既好古如此居鄉與誰遊處元夀對以賦性冷淡與人寡合先生云莫有令嗣延師否元夀對以延師亦不相契止是託之二子耳先生云既是如此平生懐抱欲􅀃底話分付與誰元夀對以無分付處有時按視田園老農老圃雖不識字喜其真情四時之間與之相忘酬酢居多耳先生顧學者笑曰以邵武許多士人而不􅀎有以契元夀之心契心者乃出于農圃之人如此是士大夫儒者視農圃間人不䏻無媿矣先生因言世間一種恣情縱欲之人雖大狼狽其過易扵拯救􅁍是好人剗地難理㑹松云如丘丈之賢先生還有力及之否先生云元夀甚佳但恐其不大耳人皆可以爲尭舜尭舜與人同耳但恐不􅀎爲尭舜之大也元夀連日聽教方自慶快且云天下之樂無以加扵此至是忽局蹴變色而荅曰荷先生教愛之篤但某自度無此力量誠不敢僣易先生云元夀道無此力量錯􅀃了元夀平日之力量乃尭舜之力量元夀自不知耳元夀黙然愈惑退松别之元夀自􅄒自聽教扵先生甚樂今胸中忽如有物梗之者姑抄先生文集歸而求之再來承教先生與學者􅀃及智聖始終條理一章忽問松云智聖是如何松曰知此之謂智盡此之謂聖先生曰智聖有優劣否松曰無優劣先生曰好無優劣然孟子云其至爾力也其中非力如此􅀃似歸重于智松曰其至爾力也其中非爾力也巧也行文自當如此孟子不成道其至爾力也其中爾巧也先生曰是松又曰智聖雖無優劣􅁍有先後畢竟致知在先力行在後故曰始終先生曰是先生因爲子持之改􅀁吟鶯詩云百喙吟春不暫停長疑春意未丁寧數聲緑樹黄􅕢暁始笑從來着意聽遶梁餘韻散南柯争柰無如春色何剰化玉巢金綽約深春到䖏為人歌先生言鶯巢以他羽成之至貼近金羽䖏以白鷴羽藉之􅀁以飬其金羽也有客論詩先生誦昌黎調張籍一篇云李杜文章在光􅆋萬丈長不知羣兒愚那用故譏傷蚍蜉撼大樹可笑不自量云云乞君飛霞佩與我髙頡頏且曰讀書不到此不必言詩中心斯須不和不樂而鄙詐之心入之外貌斯須不荘不敬而慢易之心入之與告子不動心是操持堅執做孟子不動心是明道之力有行古禮扵其家而其父不恱乃至父子相非不已遂來請教先生云以禮言之吾子扵行古禮其名甚正以實言之則去古既逺禮文不逺吾子􅀁行未必盡契古禮而且先得罪扵尊君矣䘮禮與其哀不足而禮有餘也不若禮不足而哀有餘也如世俗甚不經裁之可也其餘且可從舊有縣丞問先生赴任尚何時先生曰此來為得疾速之任之命方欲單􅀐即行縣丞因言及虜人有南牧之意先生􅃍云如此則荆門乃次邉之地某當挈家以行未免少遲若以單􅀐􅁍似某有􅀁畏避也臨川張次房于曆子賦歸去來辭棄官而歸杜門經􅀊來見先生先生云近聞諸公以王謙仲故推輓次房一出是否次房云極荷諸公此意愧無以當之先生曰何荷之云君子之愛人也以徳細人之愛人也以姑息凡諸公欲相推輓者姑息之愛也次房􅀄歸時一二年間正氣甚盛後來寖弱先生教授極力推輓是後正氣復振比年又寖衰次房莫未至無飯喫否若今諸公此舉事􅀔恐亦難行反自取辱耳某今有一官不􅀎脫去得今又令去荆門某只得去若􅇡去南海某便着去次房幸而無官了而今更要出來做甚麽次房云恨聞言之晚不􅀎早謝絶之也松問先生今之學者爲誰先生屈指數之以傅子淵居其首鄧文範居次傅季魯黄元吉又次之且云浙間煞有人有得之深者有得之淺者有一見而得之者有乆而後得之者廣中陳去華省􅀤偉特惜乎此人亡矣有傳黄元吉别長沙陳君舉有詩送行云荷君來意固非輕曾未深交意便傾􅀃到七篇無欠少學從三畫已分明毎嗟自昔傷標致頗欲從今近老成爲謝荆門三益友何時尊酒話平生先生切聞子淵與君舉切磋又起君舉之疑得黄元吉君舉方信子淵之學松曰元吉之學􅁍在子淵之上先生曰元吉得老夫鍜煉之力元吉從老夫十五年前數年病在逐外中間數年換入一意見窼窟去又數年換入一安樂窼窟去這一二年老夫痛加鍜煉似覺壁立無由近傍元吉善學不敢􅀤問遂誘致諸䖏後生來授學􅁍教諸生致問老夫一一為之問剥元吉一旦從傍忽有􅀁省此元吉之善學先生云今世儒者􅀋指佛老為異端孔子曰攻乎異端孔子時佛教未入中􅀦雖有老子其􅀃未著􅁍指那箇為異端盖異字與同字為對雖同師尭舜而􅀁學異緒與尭舜不同此􅀁以為異端也先生因儆學者攻異端曰天下之理􅀅從其簡且易者而學之乎􅀅欲其繁且難者而學之乎若繁且難者果足以為道勞苦而為之可也其實本不足以為道學者何苦扵繁難之􅀃簡且易者又易知易從又信足以為道學者何憚而不為簡易之從乎先生言萬物森然扵方寸之間滿心而􅀤充塞宇宙無非此理孟子就四端上指示人豈是人心只有這四端而已又就乍見孺子入井皆有􅇶惕惻􅀮之心一端指示人又得此心昭然但􅀎充此心足矣乃誦誠者自成也而道自道也誠者物之終始云云天地之道可一言而盡也先生言胡季隨從學晦翁晦翁使讀孟子他日問季隨如何解至于心獨無􅀁同然乎一句季隨以􅀁見解晦翁以為非且謂季隨讀書鹵莾不思後季隨思之既苦因以致疾晦翁乃言之曰然讀如雍之言然之然對上同聽同美同嗜􅀃先生因笑曰只是如此何不早􅀃與他先生言吾家治田毎用長大钁頭兩次鋤至二尺許深一尺半許外方容秧一頭乆旱時田肉深獨得不旱以他䖏禾穂數之毎穂榖多不過八九十粒少者三五十粒而已以此中禾穂數之毎穂少者尚百二十粒多者至二百餘粒毎一畆􅀁􅀵比他䖏一畆不啻數倍盖深耕易耨之法如此凡事獨不然乎時因論及士人專事速化不根之文故及之荅曾宅之一書甚詳梭山一日對學者言曰文􅀁以明道辭逹足矣意有􅀁属也先生正色而言曰道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉㓙生焉昔者聖人之作易也幽賛于神明而生蓍叅天兩地而􅀝數􅀚變于隂陽而立卦􅀤揮于剛柔而生爻和順于道徳而理于義窮理盡性以至于命這方是文文不到這裏􅀃甚文松甞問梭山云有問松孟子􅀃諸侯以王道是行王道以尊周室行王道以得天位當如何對梭山云得天位松曰􅁍如何解後世疑孟子教諸侯􅆲奪之罪梭山云民為貴社稷次之君為輕先生再三稱嘆曰家兄平日無此議論良乆曰曠古以來無此議論松曰伯夷不見此理先生亦云松又云武王見得此理先生曰伏羲以來皆見此理或勸先生之荆門為委曲行道之計荅云仲虺言湯之徳曰以義制事以禮制心古人通體純是道義後世賢者䖏心䖏事亦非盡無禮義特其心先主乎利害而以禮義行之耳後世􅀁以大異于古人者正在扵此古人理㑹利害便是禮義後世理㑹禮義􅁍只是利害先生言吳君玉自􅀒明敏至槐堂處五日毎舉書句為問隨其􅀁問解釋其疑然後從其􅀁曉敷廣其􅀃毎毎如此其人再三稱嘆云天下皆􅀃先生是禪學獨某見得先生是聖學然退省其私又􅁍都無事了此人明敏只是不得乆與之切磋先生言重華論荘子不及老子者三孟子不及孔子三其一不合以人比禽獸晦翁亦有此論松曰孟子言人之􅀁以異于禽獸者㡬希惟恐人之入于禽獸是禽獸也為其無君父也則其違禽獸不逺矣為其夜氣不足以存也晦翁但在氣􅁚上理㑹此其􅀁以錙銖聖人之言徃徃皆不可得而同也先生曰使尭舜禹湯文武周公孔子七八聖人合堂同席而居其氣􅁚豈䏻盡同我這裏也􅀃氣􅁚但不是就外面􅀃乃曰隂陽一大氣乾坤一大􅁚因􅀃孟子之言如孟施舎之守氣不如曽子之守約也此兩句􅁍贅了人生而静天之性也感物而動性之欲也是為不識艮背行庭之㫖舜􅀮惡而􅀭善􅀃者曰􅀮藏也此􅀃非是􅀮伏也伏絶其惡而善自􅀭耳在巳在人一也為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使䏻植則善者信矣故君子以遏惡􅀭善順天休命也成湯放桀于南巢惟有慙徳湯到這􅂻􅁍生一疑此是湯之過也故仲虺作誥曰惟天生民有欲無主乃亂惟天生聦明時乂嗚呼謹厥終惟其始殖有禮覆昏􅁀欽崇天道永保天命學者問荆門之政何先對曰必也正人心乎人之其􅀁親愛而辟焉之其􅀁賤惡而辟焉之其􅀁畏敬而辟焉之其􅀁哀矜而辟焉之其􅀁敖惰而辟焉辟比量也家中以次之人以我親愛賤惡而比量之或效之或議之其弊無窮不可悉究要其終實不足以齊其家告子與孟子並駕其􅀃于天下孟子􅀅破其􅀃不得不就他􅀁見處細與他研磨一次􅀅􅂎柳來論便就他􅂎柳上破其􅀃一次􅀅湍水來論便就他湍水上破其􅀃一次􅀅生之謂性來論又就他生之謂性上破其􅀃一次􅀅仁内義外來論又就他義外上破其􅀃窮究異端要得恁地使他無語始得枚卜功臣之遜遜出于誠漢文帝即位之遜遜出于偽云云及修代來功詔稱朕狐疑唯宋昌􅂆朕朕已得保宗廟尊昌為衛􅀅軍云云後世人主不知學人欲横流安知天位非人君􅀁可得而私夫子沒老氏之􅀃出至漢而其術益行曹參相齊盡召長老諸先生問􅀁以安集百姓而齊故儒以百數言人人殊參未知􅀁定聞膠西有盖公善治黄老言使人厚幣請之既見盖公公為言治道貴清静而民自定推此􅀋具言之參扵是避正堂舎盖公焉其治要用黄老術故相齊九年齊國安集大稱賢相此見老氏之脉在此也蕭何薨參入相壹遵何為之約束擇郡縣吏長木訥扵文辭謹厚長者即召除為丞相史吏言文刻深欲聲名輙斥去之日夜飲酒不事事見人有細過掩匿覆盖之府中無事漢家之治血脉在此邵尭夫詩一物其來有一身一身還有一乾坤不如聖人􅀃乾知太始因曰尭夫只是箇閑道人聖人之道有用無用便非聖人之道先生一日自歌與姪孫濬書云道之􅀅廢自孔孟之生不􅀎囬天而易命云云又歌栢舟詩松為之涕泗沾􅁭少間又歌東皇太一雲中君見松悲泣不堪又歌曰蕭蕭馬鳴悠悠斾旌乃曰蕭蕭馬鳴静中有動矣悠悠斾旌動中有静也誠者自誠也而道自道也君子以自昭明徳人之有是四端而自謂不􅀎者自賊者也􅁀謂自􅁀棄謂自棄侮謂自侮反謂自反得謂自得禍福無不自巳求之者聖賢道一箇自字煞好嘗言年十三時復齋因看論語命某近前問云看有子一章如何某云此有子之言非夫子之言先兄云孔門除􅁍曽子便到有子未可輕議更思之如何某曰夫子之言簡易有子之言支離吕伯恭為鵝湖之集先兄復齋謂某曰伯恭約元晦為此集正為學術異同某兄弟先自不同何以望鵝湖之同先兄遂與某議論致辯又令某自􅀃至晩罷先兄云子静之􅀃是次早某請先兄􅀃先兄云某無􅀃夜來思之子静之􅀃極是方得一詩云提孩知愛長知欽古聖相傳只此心大抵有基方築室未聞無址忽成岑留情傳註翻蓁塞着意精㣲轉陸沉珍重友朋相切琢須知至樂在于今某云詩甚佳但第二句㣲有未安先兄云􅀃得恁地又道未安更要如何某云不妨一面起行某沿途􅁍和此詩及至鵝湖伯恭首問先兄别後新功先兄舉詩􅂊四句元晦顧伯恭曰子夀早已上子静舡了也舉詩罷遂致辯扵先兄某云途中某和得家兄此詩云􅇕墓興哀宗廟欽斯人千古不磨心涓流滴到滄􅈚水拳石崇成泰華岑易簡工夫終乆大支離事業竟浮沉舉詩至此元晦失色至欲知自下升髙處真偽先須辨只今元晦大不懌扵是各休息翌日二公商量數十折議論來莫不悉破其􅀃􅁇日凡致辯其􅀃隨屈伯恭甚有虗心相聽之意竟為元晦􅀁尼後徃南康元晦延入白鹿講􅀃因講君子喻扵義一章元晦再三云某在此不曾􅀃到這􅂻􅀒愧何言先兄復齋臨終云比來見得子静之學甚明恨不得相與切磋見此道之大明耳吾家合族而食毎輪差子弟掌庫三年某適當其職􅀁學大進這方是執事敬徐仲誠請教使思孟子萬物皆備于我矣反身而誠樂莫大焉一章仲誠䖏槐堂一月一日問之云仲誠思得孟子如何仲誠荅曰如鏡中􅀚花荅云見得仲誠也是如此顧左右曰仲誠真善自述者因􅀃與云此事不在他求只在仲誠身上既又㣲笑而言曰已是分明􅀃了也少間仲誠因問中庸以何為要語荅曰我與汝􅀃内汝只管􅀃外良乆曰句句是要語梭山曰􅀶學之審問之謹思之明辯之篤行之此是要語荅曰未知學􅀶學箇什麽審問箇什麽明辯箇什麽篤行箇什麽有學者終日聽話忽請問曰如何是窮理盡性以至扵命荅曰吾友是泛然問老夫􅁍不是泛然荅老夫凡今􅀁與吾友􅀃皆是理也窮理是窮這箇理盡性是盡這箇性至命是至這箇命稱嘆趙子新羙質謂人莫不有夸示已􅀎之心子新為人稱􅀭反生羞媿人莫不有好進之心子新恬淡雖推之不前人皆惡人言已之短子新惟恐人不以其失為告群居終日黙然端坐隂有以律夫氣習之澆薄者多矣可謂人中之一瑞但不􅀎進學可憂耳或云年亦未壮荅云莫道未也二十嵗來一日子新至語之曰莫堆堆地須􅀤􅀭車前不􅀎令人軒車後不􅀎令人輊何不􅀤􅀭廣中一學者陳去華省􅀤偉特某因問吾與􅀧也一叚尋常如何理㑹屢問之去華終以爲理㑹不得一日又問之去華又謂理㑹未得某云且以去華􅀁見言之莫也未至全然暁不得去華遂謂據某􅀁見三子只是事上着到曽􅀧􅁍在這裏着到某詰之曰向道理㑹不得今又􅁍理㑹得去華頓有省自叙聽話一月前十日聽得􅀁言皆同後十日􅀁言大異又後十日與前􅀁言皆同因有十詩别後謂人曰某方是一學者在待歸後率南方之士師北方之學盖廣中􅂪欽夫之教故以此為北方耳臨川一學者􅀄見問曰毎日如何􅀚書學者曰守規矩歡然問曰如何守規矩學者曰伊川易傳胡氏春秋上蔡論語范氏唐鑑忽呵之曰陋􅀃良乆復問曰何者為規又頃問曰何者為矩學者但唯唯次日復來方對學者誦乾知太始坤作成物乾以易知坤以簡􅀎一章畢乃言曰乾文言云大哉乾元坤文言云至哉坤元聖人賛易􅁍只是箇簡易字道了遍目學者曰又􅁍不是道難知也又曰道在邇而求諸逺事在易而求諸難顧學者曰這方喚作規矩公昨日來道甚規矩一學者聽言後更七夜不寢或問曰如此莫是􅂇長否荅曰非也彼盖乍有􅀁聞一旦悼平昔之非正與血氣争寨作主又顧謂學者天下之理但患不知其非既知其非便即不為君子以嚮晦入宴息也或問吾十有五而志于學三十而立既有􅀁立矣縁何未到四十尚有惑在曰志于學矣不爲富貴貧賤患難動心不為異端邪􅀃揺奪是下工夫至三十然後􅀎立既立矣然天下學術之異同人心趋向之差别其聲訛相似似是而非之處到這􅂻多少疑在是又下工夫十年然後􅀎不惑矣又下工夫十年方渾然一片故曰五十而知天命􅀃君子之道孰先傳一叚子游子夏皆非先生感嘆時俗汩沒未有䏻自㧞者因歌學者劉定夫􅁚山詩云三日觀山山愈妍錦囊􅀵拾不勝編萬山擾擾何爲者惟有雲䑓山巋然又誦少時自作大人詩云從來膽大胸膈寛虎豹億萬虬龍千從頭􅀵拾一口吞有時此軰未妥帖哮吼大嚼無毫全朝飲渤澥水暮􅀫崑崙巔連山以爲琴長河爲之絃萬古不傳音吾當爲君宣又舉歐陽公贈梅聖俞詩云黄鵠刷金衣自言􅀎逺飛擇侣異棲息終年脩羽儀朝下玉池飲暮􅀫霜桐枝徘徊且垂翼㑹有秋風時有學子閱亂先生几案間文字先生曰有先生長者在􅁍不肅容正坐􅀵歛精神謂不敬之甚光武謂吴漢差强人意强訓起右門人嚴松松年所録􅁚山先生全集語録上卷終
