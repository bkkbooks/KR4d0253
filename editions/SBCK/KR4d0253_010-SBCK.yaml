body:
  text: 與李成之某去冬距對班數日忽有匠丞之除王給事遂見繳旣而聞之有謂吾將􅀤其為首相􅀲牙者故皇懼為此抑可憐也古人所以不屑屑扵間政適人而必務有以格君心者蓋君心未格則一邪黜一邪登一弊去一弊興如循環然何有窮巳及君心旣格則規模趨郷有􅀂燕越邪正是非有􅀂蒼素大明旣升羣隂畢伏是􅃈􅃈者亦何足復汙人牙頰哉鄕來靣對粗陳梗槩明主不以為狂而條貫靡竟統紀未終所以低回之乆者欲俟再望清光輸寫忠藴以致臣子之義耳然而不遂則亦天也王氏之子焉􅀎使予不遇哉二李尉處附至三月晦日書􅀤讀慰浣之極别􅁓􅀹見情實歷述病狀可謂自知之審矣為仁由巳而由人乎哉奮㧞植立豈不在我若只管譏評因循不􅀎勇奮特立如官容奸吏家留盗虜日積憂患而不勇扵一去之决誰實為之今幸尚知其為奸盗而患苦之護惜玩愒之乆寖以習熟便安之未必不反以為忠良也任賢勿貳去邪勿疑豈獨為國而然為家為身蓋一理也願精思深察致一日克已復禮之力當有勿憂宜日中之快矣與應仲寔向自使華在江東時草草具復來貺㝷拜數字附郷里士人以行而執事移帥南服之命巳下用不果逹其時某適至隆興在翠岩洪井間得聞從者至止亟還城下則棨㦸又南矣甚為悵然屬甞扵復漕臺書中􅀉意語次亦曾及之否蒼梧舜迹所及交趾合浦九真日南為郡古矣粤自翠華南波更為近服班宣之任􅁼皆名儒重臣間者猶以簿書遺䇿米塩末務仰勤冕旒南顧之憂官人之難乃如此兹焉帥閫暫屈明賢此其加惠嶺海之民可謂至矣撫柔安輯當有餘地遠方知方興扵禮義此其時也漕臺心事犖犖伏想相得甚􅂬金蘭之􅁩於是有證徤羡徤羡某徃􅀊亦蒙誤恩卑壘荆門尚遲餘敎以迯大戾區區近况有鄙文數篇公餘過目可槩見矣去年秋冬又兩通晦翁書然前􅀃且􅀝閣矣與張季海乆欲詣謁坐此塗潦政爾未遂缺然斯懐金谿西北幷臨川處率多早田耕必三􆇠秋乃可望常􅀊及今再耜挾矣今阻寒凍曾未舉趾農者凛然有無年之憂雷先啓蟄泉源已動泉之盛一甲子而止動早則及夏淺動晚則及夏深泉與雨澤亦相表裏故動早旱徴動晚稔徵今先啓蟄而動則不及夏矣比年貨泉日縮民生日貧榖價雖亷往往乏食重以冬春仍雪積雨畦塗隴敗無所施力困亦劇矣霖􅍂未止為之柰何浦城小㓂幸已成擒警候之事􅀹非今日所􅀎堪也邑民以公事至廷者莫不􅁛頌賢德而㳺談之士徃徃以聼信百石爲疑雖其無根不足深據然形似則有以致之更惟加察二乆以道濘不遂往見旣望常作一􅁓以致區區㝷以少霽欲留靣剖又不果逹今併徃一觀新宰旣不果來吾邑遂可以乆􅀍賢者之澤向來不作乆計深爲足下不取古人扵事無小大無乆近其處之一也居一日亦當盡吾道學絶道喪所從來乆矣放利而行者滔滔也比甞與主簿論喻義喻利之􅀃語次曾及之否弊邑之陋風俗未還扵正所幸主簿意向甚美第未甚更歷耳外此不復有正人區區亦不􅀎不為左右深慮要當卓然以古人自期憫惻流俗如失心者而後􅀎無所䧟溺人患無朋友無聞見與其親不正之人聞不正之言則寜其無也若見不賢而内自省擇其不善者而改之則皆吾師也與張元􅂦比方得向來論事之書張權因造簿正其宿弊此固當然比復使君書固是之矣若創征之事此甚不可足下之辯殆􅁼冉求之辯伐顓􅁷金谿陶户大抵皆晨民扵農隙時為之事體與番易鎮中甚相懸絶今時農民率多窮困農業利薄其來乆矣當其隙時藉他業以相􅀘􅂇者殆不止此􅀖君不􅀎􅀘其不足􅂇其不給而又征其自􅀘助之業是奚可哉􅀄甚駭聞兹事繼而聞其􅀃出扵沈尉卽悟其為此謀之人豈􅀎肩􅀘扵調度若其傷􅀖君之政體不復可得而文飾矣沈生小子本無知識豈恤州郡豈愛􅀖君豈念小民獨為挾􅀻者所嗾耳所重可惜者遂使賢使君為挾􅀻之人所役而足下又代挾􅀻者為辯此人之術何其如此之高乃􅀎挾一邪􅀃以役二賢者又重可恠也今未知已如何施行正宜及其未深有以改之無為此人所笑與黃康年此道充塞宇宙天地順此而動故日月不過而四時不忒聖人順此而動故刑罰清而民服古人所以造次必扵是顛沛必扵是也斯須不順是謂不敬雖然巳􅀻之累人非大勇不􅀎克一日克巳復禮天下歸仁焉豈直推排而已哉縱使失扵警戒舊習乗之當其思之覺之復之之時亦必大勇而後􅀎得其正也願益勉之與胡無相惠書憂憫俗學傷悼邪見深中時病惟是推許過盛非所敢承劉定夫得數目之欵張誠子迫試期不及一見但得訊云回日見過定夫亦約早晚登山山間朋友近多讀尚書上古道義素明有倡斯和無感不通只是家常茶飯今人旣惑扵利禄又蔽扵邪􅀃見􅀃此理飜成特地豈不可憐哉與朱益叔區區之學不􅀎自已朋儕相課亦謂月異而􅀊不同毎觀徃年之文其大端大㫖則乆有定論至今不易􅀂其支葉條目踈漏舛錯往往有之必加删削乃可傳也向在朋友間時見所傳鄙丈亦有全偽者此􅀹不可不知也開􅀊合幷當究其􅀃學絶道喪􅀻􅀃詖論充塞彌滿朋友講貫未􅀎符合其􅀔然也然至當歸一精義無二至扵心獨無所同然乎此孟子之至言但詠歌伐木之篇緝熈其事終必有無間然者矣與路彦彬得函敎又辱以盛製文盛意勤顧何以當雖然似有未相暁者義不敢不宣逹扵左右􅀼不自揆區區之學自謂孟子之後至是而始一明也平日拳拳扵左右者豈徒以親戚之故哉古人纓絶肘見不以為病累日不火食歌聲􅀂岀金石或者未􅀎深信與信之而未濟登滋則兹當挾轅推轂以相從扵康莊也若金錢榖粟之惠遺非某之任也聚族之衆終􅀊之計未免扵飢􅀊日索公堂米無毫髪􅀘助亦以事有大扵此者未敢任此責也得時行道固吾人分内事然與世俗羡慕富貴者天淵不足諭也來詩似未免俗意􅀹非所望非高明亦不敢直言如此與涂任伯來喻勤勤大槩謂來學者未必可語而有耗氣勞體之患此誠足下愛我之心也雖然足下顧未知自愛安􅀎愛我哉比數得與足下接語此􅀖之士惑焉者甚衆進而效􅀃者亦不少矣大抵皆是何足與言仁義之意然稠人廣坐其意蓋不皆如是也其意如是者必其不知自愛者也其意不如是者必其知自愛者也今足下之言乃與其不知自愛者若合符節此吾所以甚為足下不取也素問之書乃秦漢以後醫家之書託之黃帝岐伯耳上古道純德備功利之􅀃不興醫卜之􅀃亦不如是比見足下好誦其言特素未講學不知其非耳某氣禀素弱年十四五手足未甞温煖後以稍知所向體力亦隨壮也今年過半百雖少加衰扵壮時然以足下之盛年恐未􅀎相逮也何時合并以究斯義與董元􅃬元􅃬舊常有向學之意而中自􅀞毎切念之無由奉逹今因此輙致區區幸少垂聼往訓中言小人者甚多不可一槩觀小人字雖同而其所指乃有相去天淵者論語所謂女為君子儒無為小人儒又曰言必信行必果硜硜然小人哉又如尹士旣聞孟子之言則曰士誠小人也此等則是學不至道而囿扵􅀻見不􅀎終從其大體故謂之小人易曰小人不耻不仁不畏不義不見利不勸不威不懲此則氣質乖戾姦憸凶惡之小人也治世盛時若不格靣從化則刑戮之所不貸此兩者善􅁖雅俗汙潔之辨如雲泥矣元􅃬平時喜事好修何至為由後之小人哉若由前之小人則恐非元􅃬之所􅀎及今流俗不學之人而其質不至扵不耻不仁不畏不義又不得陶冶扵先聖王之敎方憑其􅀻意自以為善此則是俗人不得謂之士不得謂之儒此軰必不􅀎如尹士自知之明也然俗人中氣質又有厚薄輕重大小平時所惜扵元􅃬者為其氣質偶不得其厚重者故不􅀎自㧞扵市井之習又輙憑之以妄議人之長短所見日陋如來書所謂讐卽陋見也知巳之􅀃亦陋然吾􅀎化陋以爲廣大請借元􅃬知巳之􅀃而言之元􅃬誠欲求知巳當今之世捨我其誰哉但恐元􅃬怕逢知巳耳元􅃬誠􅀎不安其舊惟新是圖則本心可以立復舊習可以立熄居仁由義大人之事備矣誰得而禦之與倪濟甫聞不就程試决計登山甚爲之喜壽翁􅀉示中秋分韻􅀹用嘉歎天宇澄澈月華晶瑩頻年未有如此夕者老子扵此興復不淺是夕月午啓門相半東望兹山亦念不􅀒此月者在諸賢爾自昭明德何必是夕造次顛沛莫不當然涵泳存飬計當日新山翁在此濟甫之來不當遲遲也與黃彦文寵示盛製詞典句老動有稽據非近時後生所及深用䧏歎下問求益之意如川方至此􅀹不可及然有如耆德所進當在文字之表則所謂真訣在其中矣恨行役匆匆未得從容以究其􅀃尚冀快誦屈子覽冀州􅀆有餘橫四海􅀆焉窮之句以厲益壮之志當刮目以俟與劉志甫趙仲聲還得書讀之渙然深用慰懌順伯與足下相􅁇入冊府亦前時所無求外想亦未容遽也誠者非自成巳而巳也所以成物也成巳仁也成物知也性之德也合内外之道也交㳺間氣質不至扞格者當日有麗澤之益此其為進德之驗甚著馮傳之氣禀恢然當今難得所當共愛惜之向來相聚失扵􅂴散不曾與之啓其大端去􅀊甞有一書勉之近得其書殊覺其邈然不相入深為惋惜志甫尚􅀎致力扵此乎今録向來書藁去若致力切磋庶有其端也近與春伯一書痛箴其陋習膏肓􅀎索觀之爲佳道之行不行固天也命也至扵講明則不可謂命也知言者亦何必俟其效之著而知其所到哉此心本靈此理本明至其氣禀所􅂪習尚所梏俗論邪􅀃所蔽則非加剖剥磨切則靈且明者曾無驗矣與邵叔誼敎以向來爲學本末又加詳扵前日所聞甚幸但叙述愚言處則盡失其實便須認爲已物一句􅀹害義理誠如此可謂罪人處矣前來所􅀃猶是􅀼盗此舉遂爲强盗爲强盗而不讓豈可容扵世哉􅀄一再見時頗覺左右好隨卽為數語述所聞毎乖其實旣得旬日浹之欵意必巳悟前非不謂又作此等語乃復甚扵􅀄時此卽病證之大者失今不治必為痼疾豈更可言為學哉此心苟得其正聼言􅀤言皆得其正聼人之言而不得其正乃其心之不正也一人言之衆人聼之使衆人各述其所聼則必不齊非言者之異也聼者之異也來書之至此間友朋觀之皆駭而問曰何為有此言因荅之曰是非吾言也邵機冝之言也某屢言先立乎其大者又甞申之曰誠􅀎立乎其大者必不相隨而為此言矣屢言仁以為已任又甞申之曰誠仁以為已任必不相隨而為此言矣蓋後世學者之病多好事無益之言假令記憶言辭盡無差爽猶無益而有害况大乖其㫖盡失其實邪向來造見對語移時􅀄間頗覺左右之心不􅀎無餒旣而􅀤明此理稍相切磋殊覺小快及再相見接語之間巳覺非復前日矣是後相從雖累日衆中泛語終不得獨相叩問兹得來示方知窒塞如􅀄此乃向來不得真實師友講貫傳授􅀋皆虚見空言徒增繆妄今􅀎盡棄前非務明正理則此心之靈此理之明誰得而蔽之某前書所以相勉者可謂至矣幸復熟而究切之也得元晦書其蔽殊未解然其辭氣窘束或恐可療也某復書又加明暢併録往幸精觀之與江德功􅂪示晦翁書敬領回書徑自此遣徃矣副本録在邵叔誼處可索觀之白白長長之言是古人辯論處非用工處言論不合扵理乃理未明耳非誠意之罪也與曾宅之十日朋舊書問至多向所惠書卒難㝷檢其時復書亦無草藁今皆不􅀎記憶來書謂某甞有文義溺志之戒某平時與朋舊講貫不敢泛為之􅀃大抵有所據而後言若誠有是是必據來書而言之耳亦略記得曾有一卷粘􅁓數幅寫前軰議論十數叚扵後註所見與所疑又各空其後以俟某之􅀃此豈非吾友所示􅁘記得當時㸔畢甚喜其有志扵學亦甚惜其學未知方亦甞以示一二朋友因謂之曰此人氣質志向固不碌碌但未得親師友胸中雜然殊未明本末先後之序今千里寓書􅁓筆之間豈􅀎遽解其惑且當示以讀書之法使之無徒耗其精神後日相見當有可言耳亦略記回書大意謂讀古書且當扵文義分明處誦習觀省毋忽其為易曉毋恃其為巳曉則乆乆當有實得實益至扵可疑者且當優㳺厭飫以俟之不可强探力索後日扵文義易暁處有進則所謂疑惑難暁者徃徃渙然而自解却不記得有溺志之辭此後枉問得備録前後書辭見示庶有據依也近見所在友朋多有好理㑹文義反不通者蓋不知學當有師天之生斯民也以先知覺後知以先覺覺後覺此其理也誠得其師則傳授之間自有本末先後不使學者叢然雜然費其目力耗其精神而無所至止也此􅀃要非相見不􅀎究秋凉􅀎一來乎先兄平日無甚著述惟有徃來論學之書中間編次未就後日垂訪當共讀之也與周元忠積雨遐想風練飛雪之壯甚願與諸公繙經其間以俟玉芝之茂倘有意扵此何以期為霽日媚景晴雲絢文此吾命駕時也今日平分一春羲和㑹當少出幽險緩轡天衢照臨吾徒成此盛集與詹子南日享事實之樂而無暇辨析扵言語之間則後日之明自足以識言語之病急扵辨析是學者大病雖􅀂詳明不知其累我多矣石稱丈量徑而寡失銖銖而稱至石必謬寸寸而度至丈必差今吾但􅀎造次必扵是顛沛必扵是勿忘勿􅂇長則不亦樂乎又何必紛紛爲大小之辨也二廖倅處送至四月二十四日書􅀤讀甚慰馳系用力不􅈈無他疑惑甚善甚善此心至靈此理至明要亦何疑之有然又以無疑爲疑是未􅀎無疑也事理有未明則不容不疑思索之問辨之則疑有時而釋矣疑亦豈足願哉今旣曰無疑矣乃以無疑爲疑何哉願速更之母滋其惑二包至此乆矣今皆歸其家約秋間復來顔子堅旣巳去髪胡服非吾人矣此人質性本亦虚妄故卒至扵此育王有一僧曰祖新姓趙字日新其為僧非本志質甚穏實亦有復衣冠之志曾識之否得來書亟作此託廖丈附便奉逹不􅀎多具與吴顯仲得書承比來􅂂用佳適進學不替為慰來書見喻所學仍見敏道􅀃頗以藝􅀎不如人為憂此甚非也當書論語弟子入則孝出則弟一章併子夏賢賢易色一章扵几案間朝夕觀省以改前過讀書作文之事自可隨時隨力作去才力所不及者甚不足憂甚不足耻必以才力所不可强者為憂為耻乃是喜誇好勝失其本心真所謂不依本分也㸔顯仲氣質本自質朴淳實何故如此但自依本分朴實頭作箇求正扵人有所疑不去亦且隨見在有何不可但頻頻㸔前兩章書便自不至顛倒也象山先生全集卷之十
