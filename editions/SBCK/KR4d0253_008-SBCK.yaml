body:
  text: 與張春􅀸某僣有白事民户秋苗斛輸斛斗輸斗此定法也常理也撫之輸苗往年惟吏胥之家與官戸有􅀔者斛輸斛斗輸斗若衆民户則率二斛而輸一斛或又不啻民甚苦之或訴之使家使家以問州家則州家之辭曰二稅之􅀄有留州有送使有上供州家使家有以供用故不必多取扵民今二稅悉爲上供州家有軍糧有州用有官吏廪稍不取扵民則何所取之漕司毎􅀊有所謂明㑹米州家毎扵民户苗米數内毎碩取五斗供之故不得而斛輸斛斗輸斗也使家無以處此遂亦縱而弗問由是取之無藝而暗合斛靣等名目不可勝窮辛巳壬午間張安國為太守有陳􅂦者為臨川知縣甚賢安國使之領納扵是盡取州之軍糧州用俸米等數與漕司明㑹之數共㑹之以民户苗數計之毎碩加五斗而有餘不問官民户與吏胥之家一切令二斛輸二斛謂之加五令官斗子上米民户自持斛槩見請槩量不得更有斛面百姓皆大驩呼大為民户之利張陳旣皆滿罷後來不復􅀎守其法扵二斛輸三斛之上又寖加斛靣民益以為困乙未丙申間趙景明為太守某與其兄景昭為同年進士景昭極賢舎姪又在郡齋為舘客因與景明言輸苗之害且言張安國與陳􅂦知縣之法極良但後人不􅀎守耳景明不􅀎不惑扵吏言􅀄亦難之以為今日州縣家之用又多扵昔時某與景昭舎姪共㑹州家一􅀊之用景明懼見底藴則又不必加五扵是謂巳詰吏軰今肯令人户把斛槩矣但今日用度益廣欲更扵五斗上加五升耳某與景昭商之以為斛輸一斛五斗五升而使不得加斛靣民户自持槩則五升之加在民户亦所不憚扵是不復求减民果大恱之景明去後有不􅀎守其法則民户多謁諸使家求依趙刪定例令民户自持槩盪今景明之事旣逺民户有不􅀎記憶聞今􅀊輸苗者取之過者皆倍不啻而郡中又反斷民户爭斛靣者民間􅅝􅅝今幸輸納未畢願有以懲吏胥之姦少寛民力幸甚適有所聞乗便亟此布禀不暇修寒暄之敬伏幸台察與宋漕僣有白事金谿為邑封壤􅄶隘無豪商富民生産之絶出等夷者稅籍之為緡錢不過以十計聞之故老往時人煙稀少民皆自食其力畏事自愛輸公先期無催期之擾家用饒給風俗醇羙􅀊時伏臘雞豚相遺杯酒相歡熈熈如也自建炎紹興以來寖不如舊民日益貧俗日益弊比年荒歉益致窮蹙原其所自官實病之大軍月樁起扵紹興􅀄用兵權以紓急兵罷不除因以為額立額未㡬有漕使勾君者知其為橫歛􅀄無名色行縣之次問邑吏月樁之所從取凡以實告者皆得蠲减獨金谿少吏不解事懼􅄍實則有罪輙以有名色對故金谿獨不􅂪蠲减月解之數為緡錢八百有竒以􅀊計之當輸萬緡朘民之端莫大扵此貪吏並縁侵欲無藝槌骨瀝髓民不􅂓生縱遇循良莫􅀎善後累有賢宰條陳本末祈請蠲除上府不察吏胥持之竟不施行今縣宰仁厚愛民甚篤佐貳皆賢適值連􅀊旱傷今􅀊大旱留意賑恤盡却吏胥侵漁之䇿細民始有生全之望而月解積􅀒無所取償復此詢究月樁本末以致祈懇此在縣官特九牛一毛耳而可使一邑數萬家免扵窮困流離長無歎息誠仁人所樂為也况如執事之賢當不待賛第以某嘗託契門墻而占籍兹邑當其休戚不敢不告某復有管見欲效涓埃比年民力日竭國計日匱郡縣日窘獨吏胥屬厭耳郡縣積􅀒日加􅀊增版漕監司督之州郡郡督之縣縣督之民吏胥睢盱其間轉相並縁以濟其􅀻吏欲日飽而積􅀒自若文移之煩追逮之頻賄謝之厚歛取之苛皆此其故也故督積􅀒無􅀘扵縣官獨足為胥吏賄謝之地以重困吾民耳所謂督扵民者民豈真有􅀒哉官吏新故相仍有􅀂郵置縁絶簿書以益侵盗積􅀒之源實在扵此督至扵縣而無所從取則橫取諸民耳今常賦之外竒名異􅁼以取扵民如所謂月樁者不可悉數郡縣月輸􅀊供具之版帳盡責版帳之輸猶懼不給彼又安􅀎輸積􅀒哉鄙語所謂移東籬掩西障或有以積􅀒輸者上之人不察欣然以喜不知其非公家之利乃吏胥之便也舊者輸而新者積矣善為上者莫若舎積􅀒而責新輸則賄謝絶郡縣寛民可以息肩百姓足君孰與不足殆不可謂書生常談而忽之也不識髙明以為如何是間倉臺守倅皆賢有所建請有所施行皆可共事不致有齟齬也聞便稍亟書字有􅂗注處併幸亮恕與陳敎授敝里社倉目今固為農之利而愚見素有所未安蓋年常豊田常熟則其利可乆苟非常熟之田一遇歉􅀊則有散而無歛來􅀊缺種糧時乃無以賑之莫􅀂兼置平糴一倉豊時糴之使無價賤傷農之患缺時糶之以摧富民閉廪騰價之計析所糴為二毎存其一以備歉􅀊代社倉之匱實為長積金谿兹􅀊旱處頗多通縣計之只可作六分熟敝里今􅀊得雨偶多凡社倉所及皆有粒米狼戾之興儻得二十緡可得粟二千碩鄕斗扵官為一千碩來􅀊糶一千碩存一千碩為後年之備逐年更糶之可與社倉俱廣為無窮之利敝里社倉所及不過二都然在一邑中乃獨無富民大家處所謂農民者非佃客莊則佃官荘其為下户自有田者亦無幾所謂客莊亦多僑􅀉官户平時不􅀎贍恤其農者也當春夏缺米時皆四出告糴扵他鄕之富民極可憐也此乃金谿之窮鄕今社倉之立固巳變愁嘆為謳謡矣况得平糴一倉以彌縫其缺推廣其惠歡舞當如何耶今農民皆貧當􅀵穫時多不復􅀎藏亟湏糶易以給他用以解逋責使無以糴之則價必甚賤而粟􅂥扵米商之舟與富民之廪來􅀊必重困矣前所言米價亦准鄕斗所糴之價耳今􅀊之價必下扵此則所得米數當加多為利不細向來梭山家兄甞陳五利之􅀃扵主管陳丈卽以白之倉臺㝷得陳丈書謂倉臺已許可其時家兄以鄕間無米可糴故不􅀗卒請某屬者亦甞言扵倉臺但未禀幕中二丈欲望㑹次及之儻不以為不然却幸見報家兄當具禀以卒所請也二屬奉敎墨􅀼知平糴之議莫逆扵幕中二君子之心巳遂聞扵倉臺倉臺亦旣惠許之矣然坐此霖􅍂稼之最良者又有仆泥自萌之患􅀂此雨不止大妨收穫稼必重傷民必重困此䇿無所施矣山間今來稍有霽色極為之喜方取􅁓欲以卒請白雲又復如擁雪向之乆扵是山者以為晴雲固有如此者特未可必耳萬一仍雨不解其貽有位者之憂不細矣尚憑諸君子之力出秋陽以廓此氛曀山林之人亦庶㡬一飽之適若得善穫必有可糴而米之多少則繼為之請當非所靳第支錢扵金谿則恐不可耳金谿素無倉臺錢米向來陸倉以􅀊歉捐二千緡委鞏主簿扵熟鄕糴二千碩為來􅀊賑濟之備次年所用不多餘者儲扵縣前倉前􅀊梭山所掌社倉已支八百碩矣又逓年倉臺賑䘏皆取諸此所存料亦無㡬金谿年來極窘扵版帳積􅀒前此蘇宰又重罹趙侯之困賄謝供輸大抵誅求無藝如聞錢榖侈用頗多安得有見錢可支藉令有之金谿􅀒郭以西率多旱鄕惟東西鄕稍熟政宜以責之縣家自為和糴以備來􅀊近郭之用倉臺所乏者非錢也儻得徑就使臺攴官㑹或見錢為便錢雖難扵搫挈尚可為便兊之計若得官會則􅀹為順便蓋鄊間亦商旅之路可􅀤􅂥也向來社倉趙丈欲行之移文郡縣揭示衢要累月無應之者趙丈往往以詢所善或告之以此事全在得人苟非其人不如勿為之愈建寜社倉始扵朱元晦魏元􅂂今誠得如陸梭山者為之乃可乆耳趙丈就令詢家兄之意㝷卽遣人致書家兄報書許之旣而某亦得趙丈書雖愚意尚有未安事業已行又以其人權之可以不敗亦只復書賛成其事今秋乃再㪚再歛矣適見今倉臺黃丈愛民之心不後扵趙故輙申其千一之慮以為萬一之􅀘今幕中二君子愛民之心不後扵陳向來陳主管亦先辱梭山兄以書意甚勤至其後梭山兄因得以平糴之法條具五利祈扵請致今倉使黃丈陳幹所復梭山兄書併往一觀亦恐欲携呈倉使與幕中二君子也向來趙丈文移甚簡今梭山兄幷留逐時書問以為根柢陳主管書或呈似諸賢後擲示為幸某巳作禀劄逹倉臺􅁓多不欲更續切幸加察與趙推黃霸為頴川守鰥寡孤獨死無以􅌾者覇為區處曰某所大木可以為棺某亭猪子可以􅀕吏往皆如其言遣吏司察事旣還而勞其食扵道傍為烏所攫肉事每得實人無敢欺皆以為神史家載其得之之由以為語次㝷繹問他隂伏以相參攷後世儒者乃以為鉤距而鄙之此在黃覇雖未盡善而後儒非之者􅀹為無知蓋不論其本而論其末不觀其心而遽議其行事則皆不足以論人原覇之心本欲免人之欺求事之實則亦豈可多罪今風俗弊甚獄訟煩多吏姦為朋民無所歸命曲直不分以賄為勝􅀒獄訟之間雖有善士臨之亦未必􅀎盡得其情若有志之士欲研究其實豈免用問馬參牛之智愚儒必以鉤距非之則是必使情實不知曲直倒置姦惡肆行不辜無告然後為道􅁘故愚儒之論害道傷治真實學者必當明辨乎此則正理可得而信也近見王吉州言監司太守不可輕置人扵獄蓋獄官多非其人吏卒常司其權平民一抵扵獄唯獄吏之所為箠楚之下何求不得文案旣上從而察之不􅀎復有所見矣蓋其詞情皆由扵吏卒之所成練前書所謂奏當之成雖使臯陶聼之猶以為死有餘辜者謂此也今有兩詞各護其􅀃左證疑似簿書契要無可攷據事又有不在簿書契要者則獄中求實之法謂之閃隔假令有二人則隔為二處三人則隔為三處不使之相聞知以吾所疑與其事之節目逐處審問謹思精察要領可以得情者反覆求之若使得在扵􅀄詞之外􅀂可據信則必扵兩處參審必使有若合符節者乃可據耳然此事最難若官人盡心却不􅀎防吏卒之姦則吏卒必隂漏其事則官人之智無所施矣故獄訟惟得情為難唐虞之朝惟臯陶見道甚明羣聖所宗舜乃使之為士周書亦曰司㓂蘇公式敬爾由獄賁􅁚亦曰君子以明庶政無敢折獄賁乃山下有火火為至明然猶言無敢折獄此事正是學者用工處噬嗑離在上則曰利用獄豊離在下則曰折獄致刑蓋貴其明也新司理􅀄間甚賢􅁇而聞之亦無􅀎為重輕足下􅀹宜謹之官人者異鄕之人吏人者本鄕之人官人年滿者三考成資者兩考吏人則長子孫扵其間官人視事則左右前後皆吏人也故官人為吏所欺為吏所賣亦其􅀔然也吏人自食而辦公事且樂為之爭為之者利在焉故也故吏人之無良心無公心亦􅀔使之然也官人常欲知其實吏人常不欲官人之知事實故官人欲知事實甚難官人問事扵吏吏效其􅀃必非其實然必為實形欲為實形亦必稍假扵實蓋不為實形不􅀎取信官人或自􅀎得事實吏必多方以亂之縱不􅀎盡亂之亦必稍亂之蓋官人純得事實非吏人之利也故官人􅀎得事實為難純以事實行之為􅀹難與蘇宰賤疾去體皆庇所逮記存之及􅀹重悚仄使君好音尚爾遅遅何也心苟無瑕何恤乎無家外之所遭有時與命􅀄不足為吾人重輕然君子每因是以自省察故缺失由是而知德業由是而進屯難困頓者乃所以成君子之羙也故曰生扵憂患而死扵安樂古人之處憂患者又豈止如門下今日所遭而巳哉願篤信此道日去其非以著其是則終來有他吉矣二某徃時充員勑局浮食是慚惟是四方奏請廷臣面對有所建置更革多下㸔詳其或書生貴㳺不諳民事輕扵獻計不知一旦施行片􅁓之出兆姓􅂪害毎與同官悉意論駁朝廷清明常得寢廢編摩之事稽考之勤顧何足以當大官之膳尚方之賜或庶幾者僅此可少償萬一耳新天子卽位執事者過聼又復􅂌之荆門某􅀼惟為臣之義進思盡忠退思􅀘過儻尚未罹擯斥得共乃事脫或朝臣一時建請有司失扵討論遽施行之而反為民害者亦當用公心循公理為百姓條析以復于上庶幾盡忠􅀘過之義郡守縣令民之師帥承流宣化其職任一也而令􅀹親扵民古者􅀰官出宰百里上應列宿􅀉命之責固不輕矣某托庇治下毎辱眷待之厚苟有所見安可不盡陳扵左右以為萬一之􅂇哉比者􅀼見省符責括民户屯田將復賣之上失朝廷之體下為良農之害甚哉計之過也其􅀄出監簿陳君􅀄官江西因見臨江之新淦隆興之奉新撫之崇仁三縣之間有請佃沒官絶户田者租課甚重罄所入不足以輸官佃者因為姦計不復輸納徒賄吏胥以圖苟免春夏則羣來耕穫秋冬則棄去逃藏當逃藏時固無可追㝷及羣至時則􅀝衆拒捍其强梁姦猾者如此若其善良者則困扵官租遂以流離死亡田復荒棄由是侵耕冐佃之訟益繁公􅀻之弊日積陳旣􅀍召為職事官因以此陳請欲行責括减其租課以為如此則民必樂輸而官有實入此其為􅀃蓋未為甚失其􅀄下之漕臺布之州縣施行之間巳不􅀎如建請者之本㫖遂併與係省額屯田者一㮣責括亦鹵莾矣蓋佃沒官絶戸田者或是吏胥一時紐立租課或是農民逓互增租剗佃故有租重之患因而抵􅀒不納或以流亡抛荒或致侵耕冐佃而公􅀻俱受其害陳監簿之所爲建請者特爲此也􅀂係省額屯田者則與前項事體逈然不同其租課比之稅田雖爲加重然佃之者皆是良農老㓜男女皆􅀎力作又諳曉耕種培灌之利便終􅀊竭力其間所􅀵往往多扵稅田故輸官之餘可以自給人人自愛其爭先輸公不肯逋􅀒亦優扵有稅田者又此等官田皆有莊名如某所居之里則有所謂大嶺莊有所謂精歩莊詢之他處莫不各有莊名故老相傳以爲元祐間宣仁垂􅄕之日捐湯沐之入以􅀘大農而俾以在官之田區分爲莊以贍貧民籍其名數計其頃畆定其租課使爲永業今里中之老猶有􅀎言宣仁上仙之年與其月日者􅀊月寖乆民又相與貿易謂之資陪厥價與稅田相若著令亦許其承佃明有資陪之文使之立契字輸牙稅蓋無異扵稅田其名數之著扵州縣簿籍者目曰省莊計其租入則上而計省下而郡縣皆總之曰苗屯米若干此其與逐時没官户絶田産􅀠扵常平而俾之出賣者豈可同年而語哉歷時旣多展轉貿易佃此田者不復有當時給佃之人目今無非資陪入户租課之輸逋􅀒絶少郡縣供億所頼爲多有司因陳君之請槩行責括亦巳踈矣漕臺又因有出賣之請此不審之甚者也􅀂没官户絶田産朝廷何甞不令出賣惟其不售也是以開給佃之門亦所以勸民之耕且使􅁟無曠而租無􅉻也今以租重之故致前數弊議者方建减租之䇿乃不􅀎因而推行之而復為出賣之􅀃可謂失扵討論矣且官有賣田之名固自不美今固無買者假令有買者亦必不􅀎齊一所􅀵之直又安􅀎有􅀘扵縣官之調度終亦化為烏有耳有司坐析無􅀘之秋毫徒使縣官􅀒不美之名憂民如此不亦謬乎謀國如此不亦踈乎若復及扵所謂屯田者則其失又甚矣今有屯田者無非良農入户有資陪之價著令有資陪之文立契有牙稅之輸租課未甞逋􅀒郡縣頼以供億一旦官復責括而賣之則有是田者往往僅􅀎自給豈復􅀎辦錢以買此田哉縱或􅀎買是無故而使之再出買田之價豈不困哉豈不􅁈哉其􅀎買者固不百一異時有錢以買者必兼幷豪植之家也奪良農固有熟耕之田以資兼幷豪植之家而使之流離困窮啣􅁈茹痛相枕籍為溝中瘠此何䇿也版曹之勘當都省之符下皆不復究其本末其事益熾其害易滋陳君之請不過三縣省符之下計臺之奏遂及三郡版曹勘當則又遍扵一路且其施行與其建請本㫖絶相皆違真所謂字經三寫烏焉成馬失今不救又將遍扵天下矣假令有成命有司苟知其非猶當各守其職而爭之况今未成命豈可坐糜􅁓札徒嚴期㑹滋吏姦以擾良農安視下民之困以成執事者之過計哉門下平日愛民如父母憂民如疾疢今誠為之深究其本末詳計其利病陳之上府列之計臺丐聞于朝俾寢其議以便􅀖計以安民心此必門下之所樂為也胥吏之計方將並縁以招賄謝必不樂此諒仁人君子之心惟恐不聞吾民之疾苦政令之利病必不以吏胥之謀而易天下之至計某雖不􅀎周知一邑之版籍以所聞見計之此邑之民耕屯田者當不下三千石以中農夫食七人爲率則三七二十一當二萬一千人撫萬家之邑而其良農三千户老稚二萬一千一旦失職凛凛有破家散業流離死亡之憂也豈仁人君子之所􅀎忍視而不爲之計者今方􅀵穫舂揄之時誠得亟爲剡牘而其文書期㑹姑遼緩之以煩後庚之命使慮憂之偪仄轉爲懽心慘悽怛悍散爲和氣而謳歌鼓舞溢扵田畆遍扵塗巷不亦休哉此非有缺扵供輸損扵調度决不至以此獲罪扵上府計臺也仰恃愛念敢布腹心三如聞徒御戒行􅀅如郡邸豈黄堂􅀅大行寛恤之政以厚吾民之力為國家培固根本為萬世不㧞之基􅁘撫字心勞催科政拙此陽道州所以為當世大賢而史家載之以為美談者天以斯民付之吾君吾君又以斯民付之守宰故凡張官置吏者為民設也無以厚民之生而反以病之是失朝廷所以張官置吏之本意矣無君子莫治野人無野人莫飬君子朝廷官府之用固當野人供之今賦輸之法斯民所當遵而不違也違而不供民之罪也官從而督之理之宜也為守宰者固不可以託催科政拙之言而置賦稅之事一切不理易曰理財正辭禁民為非曰義必指簿書期㑹為非吾所當務此乃腐儒鄙生不聞大道妄為繆悠之􅀃以自蓋其無􅀎者之言也今簿書不理吏胥因為紊亂為長吏者難扵稽考吏胥與姦民為市使長吏無所窺㝷其蹤迹此所當深思精攷覈其本末求其要領乃所謂理財正辭禁民為非者也簿書齊整明白吏無所容姦則姦民懼而弊事理良民下戸畏事之人不復􅀍擾矣若循理而治賦輸又不􅀎寛上府之督責則致為臣而去豈不甚公甚正甚榮甚美哉有如丈丈大鄕之賢善􅀋所宗亦必甚慰其意以為吾有賢子不愧扵陽道州矣世間富貴何限往往與草木俱腐其􅀎自㧞而與陽道州儼駕扵方冊者幾何人哉若曰今不得巳且屈吾平日之志為苟免之道非某之所聞也吾人要當求師扵往聖昔賢有識君子不可聼計扵吏胥吏胥者吾之所御豈可反入其籠􅇁之中也􅁚山先生全集卷之八
