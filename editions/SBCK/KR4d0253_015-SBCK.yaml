front:
  text: 􅁚山先生全集卷之十五
  hash: sha256:8e775c5ef37792b7eec297a62f52612344c1930cffcbc7699249ae2909f8aee7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_015-1a}
body:
  text: 書與陶賛仲某承乏􅀅十閱月未有善状冬春乆晴種不入􅁟春季甞一致禱于山川之神其應如響山溪漲溢田畆充足然自是又無大雨地上以積乾易涸今既踰月又以旱告矣􅀔甚可畏昨日復致禱詣壇之時雨亦隨下然竟不􅀎成澤今早復叩之亦以踈雨見應未􅂪霈然之賜幸醖醸未解猶有可望不然定當投劾以謝斯民也太極圖􅀃乃梭山兄辯其非是大抵言無極而太極是老氏之學與周子通書不􅀋通書言太極不言無極易大傅亦只言太極不言無極若扵太極上加無極二字乃是蔽扵老氏之學又其圖􅀃本見扵朱子􅀤附録朱子􅀤明言陳希夷太極圖傳在周茂叔遂以傳二程則其來歴為老氏之學明矣周子通書與二程言論絶不見無極二字以此知三公盖已皆知無極之􅀃為非矣梭山曽與晦翁靣言􅁇又以書言之晦翁大不謂然某素是梭山之􅀃以梭山謂晦翁好勝不肯與辯某以為人之􅀁見偶有未通處其􅀃固以巳為是以他人為非耳當與之辨白未可便以好勝絶之遂尾其􅀃以與晦翁辯白有兩書甚詳曽見之否以晦翁之髙明猶不􅀎無蔽道聽􅂗􅀃之人亦何足與言此㢤仁義忠信樂善不倦此夫婦之愚不肖可以與知􅀎行聖賢􅀁以為聖賢亦不過充此而已學者之事當以此為根本若夫天文地理􅁚數之精㣲非有絶識加以積學未易言也某欲作一揲蓍􅀃稍􅀤易數之大端以排異􅀃曉後學坐事奪未克成就早晚就草當奉納一本何時合幷以究此懐徳成而上藝成而下行成而先事成而後論語曰入則孝出則弟謹而信汎愛衆而親仁曰言忠信行篤敬孟子曰仁義禮智根扵心其生色也晬然見扵面盎扵背施扵四體四體不言而喻曰仁義忠信樂善不倦此等皆徳行事為尊為貴為上為先樂師辨乎聲詩祝史辨乎宗廟之禮與凡射御書數等事皆藝也為卑為賤為下為後古人右􅀎左賢自有定序夫子曰君子多乎㢤不多也曽子曰􅇼豆之事則有司存凡􅀁謂藝者其􅀤明開創皆出扵古之聖人故曰百工之事皆聖人作也然聖人􅀄不尚此其􅀎之也每以教人不以加人若徳行中庸固無加人之理世衰道㣲徳行淺薄小人之有精力者始以其藝加人珍其事祕其􅀃以増其價真􅀁謂市道故風俗日以不美流傳之乆藝之實益不精而眩鬻之風反更張大學者不辨本末不知髙下未有不為此軰􅀁眩者吾􅀚近時談數學者陋日益甚妄日益熾未甞渉其門户得其師傳安􅀎辨其是非但以前尊卑貴賤上下先後之義推之則自知􅀁决擇譎妄之情状大槩亦可見矣作書畢恐賛仲不􅀎不惑扵妄人庸夫之􅀃故復書此以􅂇决擇二荆公祠堂記與元晦三書併徃可精􅀚熟讀此數文皆明道之文非止一時辯論之文也元晦書偶無本在此要亦不必㸔若㸔亦無理會處吾文條析甚明􅀁舉晦翁書辭皆寫其全文不増損一字看晦翁書但見糊􅂗沒理㑹􅀚吾書坦然明白吾􅀁明之理乃天下之正理實理常理公理􅀁謂本諸身證諸庶民考諸三王而不謬建諸天地而不悖質諸􅀑神而無疑百世以俟聖人而不惑者也學者正要窮此理明此理今之言窮理者皆凡庸之人不遇真實師友妄以異端邪􅀃更相欺誑非獨欺人誑人亦自欺自誑謂之繆妄謂之􅂪闇何理之明何理之窮㢤賛仲為人質實學雖未至且守質朴隨分檢省雖未必盡是􅁍儘勝誑妄之人為學只要暏是不要與人較勝􅀒今學失其道者不過習邪􅀃更相欺誑以滋飬其勝心而已古人􅀁謂異端者不專指佛老異端二字出論語是孔子之言孔子之時中國不聞有佛雖有老氏其􅀃未熾孔子亦不曽闢老氏異端豈專指老氏㢤天下正理不容有二若明此理天地不􅀎異此􅀑神不􅀎異此千古聖賢不􅀎異此若不明此理私有端緒即是異端何止佛老㢤近世言窮理者亦不到佛老地位若借佛老為􅀃亦是妄􅀃其言闢佛老者亦是妄􅀃今世􅁍有一種天資忠厚行事謹慤者雖不談學問􅁍可為朋友惟是談學而無師承與師承之不正者最為害道與之居䖏與之言論只漸染得謬妄之􅀃他時難扵洗濯不如且據見在朴實頭自作工夫今雖未是後遇明師友􅁍易整頓也理須是窮但今時􅁍無窮理之人何時得一來以究此義與孫季和兹以書至􅀤讀知已遡江而西既喜聞動静之詳又恨不得一見男子生而以桑弧􅅾矢射天地四方示有四方之志此其父母教之望之第一義也令尊夫人既許其行又有二令兄在侍下豈得便謂失計顔子之家一簞食一瓢飲人不堪其憂之地而其子乃從其師周逰天下履宋衛陳蔡之厄而不以為悔此豈俚俗之人拘曲之士􅀁􅀎知其義㢤孟子曰仁人心也義人路也舎其路而弗由放其心而不知求哀㢤又曰今有無名之指屈而不信非疾痛害事也如有􅀎信之者則不逺秦楚之路為指之不若人也指不若人則知惡之心不若人則不知惡此之謂不知􅀋也誠使此心無􅀁放失無􅀁䧟溺全天之􅀁與而無傷焉則千萬里之逺無異扵親􅂰下不然雖日用三牲之飬猶為不孝也學不至道而日以規規小智穿鑿傅會如蛆蠧如蟊賊以自適由君子􅀚之政可憐悼耳山徑之蹊間介然用之而成路為間不用則茅塞之矣徃年石應之駸駸有成路之興復迷扵異􅀃至今茅塞毎為悼嘆知及之仁不􅀎守之雖得之必失之季和鄉時􅀁得尚未􅀎及應之臨安再相聚時已無􅀄相聚時氣􅁚是後書問與傳聞言論行事皆不􅀎滿人意謂之茅塞不為過也苟以其私偷譽斯世固不難也但非先哲􅀁望扵後學其􅀁賞不足以當􅀁惜之萬一耳幸謹思而勉行之是間為况要非􅁓筆􅀁􅀎宣逹季和􅀎着鞭則自相孚矣緫卿之疑不必論可矣與唐司法鄙文納去數篇第今時人偏黨甚衆未必樂聽斯言緫卿從朱丈逰􅀹不願聞者今時師匠尚不肯受言何况其徒苟私門户者學者求理當唯理之是從豈可苟私門户理乃天下之公理心乃天下之同心聖賢之􅀁以為聖賢者不容私而已顔曽傳夫子之道不私孔子之門户孔子亦無私門户與人為私商也薄􅃍占復草草與傅克明見􅀁與毛君書及顔淵善言徳行論知為學不懈大㫖不畔􅀹以為慰然學不親師友則斯文未昭著處誠難責扵常才獨力私意未􅀎冺絶當責大志今時士人讀書其志在扵學塲屋之文以取科第安􅀎有大志其間好事者因書冊見前軰議論起為學之志者亦豈􅀎專純不專心致志則􅀁謂鄉學者未免悠悠一出一入私意是舉世􅀁溺平生􅀁習豈容以悠悠一出一入之學而知之哉必有大疑大懼深思痛省决去世俗之習如棄􅁾惡如避㓂讐則此心之靈自有其仁自有其智自有其勇私意俗習如見晛之雪雖欲存之而不可得此乃謂之知至乃謂之先立乎其大者何時合并以究此懐與章茂獻某承乏扵此懔焉朝夕祈扵斯民􅄅若航海閭巷熈恬訟争衰息相安相向不替有加同官恊力舉無異志職事過從無非講習或有指是以為效績區區之懐方有大懼兵家言射謂鏃不至指同扵無矢今學射者求镞之至指良不易致孟子曰掘井九仭而不及泉猶為棄井古語曰行百里者半九十言末路之難也知不至雖弗畔不足頼也治不至雖不亂不足傳也流濕就燥物以􅀋從心􅀁同然㨗扵影響固不可誣也而其淺深多寡厚薄精粗之辨情偽名實盛衰消長之變亦不可誣也服膺典訓何敢貳心至其緜薄弗克自致若蹈虎尾渉于春冰亦何敢狃饑渴之飲食苟以自恕教其不知圖其不逮力提而申䇿之是􅀁望扵同志幸勿遐棄與羅春伯某夏中拜之任之命適感寒伏枕㡬至扵殆月餘少甦又苦腸痔七月四日始得離家九月三日抵二泉即日交割是間素號閒静至此未甞有一字揭示毎事益去其煩事至隨手决之似頗不忤扵人心士民相敬向吏軰亦肅肅就職獄中但有向來二大囚一已奏未報一已報而憲臺未來審覆除此牢户可閴寂矣自外視之真太平官府然府藏困扵連年接送實亦匱乏簿書􅀁當整頓廬舎􅀁當修葺道路當治田萊當闢城郭當立武備當修者不少朝夕潜究宻考略無少暇外人盖不知也真􅀁謂心獨苦耳今時仕宦書問常禮與朝夕非職事應接者費日力過半比來扵此等固不敢簡忽第亦不敢以此等先職事拙鈍之質廼今尚有缺典如臺諌侍從當有啓劄今皆未辦􅀁恃群賢必不以此督過萬一致簡慢之疑更頼故人有以調護之職事間有當控訴者續得盡情春伯資望日隆宜在兩地優矣濡筆以待慶牘向寒為國保愛與薛􅁚先此月三日抵二泉即日交割公文諒乆已徹視諸事皆仍舊貫到此並無一字揭示無隨行人一榜亦吏呈舊比從之户庭頗無壅塞事至隨手决之頗無忤扵人心是間元少訟訴今至扵無其血脉盖有在號令刑政之表者兄􅀎諒之然事當料理者甚衆潜究宻稽日不暇給外殊不見其形也財計亦以連三年接送占壓頗多卒未有還􅀘之䇿考其實與言者殊不相應元章交割時公庫緡錢萬八千有竒今􅀁存僅五千緡耳􅀊入􅀝􅄴肆􅀁以為來􅀊資者又當取諸其中軍資庫􅀹為匱乏其􅀔未至扵不可為然不為之樽節則日蹙矣監司郡守數易誠今日之大弊比閱邸報知兄未得請亦不獨屬郡之幸幸少安以恵董湖之民乍到首遣兩司迎接兵卒各有借請義勇又適秋閱見迓兵卒又有未請衣賜㑹慶聖節吏以儀式諸物弊壊舉陳當修􅀁不敢忽子城甎工費日取扵軍資又創東嶽廟工􅂊半諸庫日支率多扵􅀁入㑹計之事不容不精詳而爲之􅀁荆門􅀊輸馬草二千緡分作四季起􅀤赴使臺都錢物庫交納春夏已納足今正當輸秋季錢前此係三分輸納銅錢本軍比年係行使鐡錢地分令禁日嚴無得銅錢輸納每是􅀅會子到鄂渚兊換銅錢􅀁費頗多今欲乞只以會子輸納望特逹􅁢從爲幸此間形􅀔正宜積粟聚兵前此諸人乃未及講求張帥有意爲城扵此元善聞有分戍之意前日相聚時乃不及此到應城見劉宰言元善有此意二公慨然如此豈亦天時耶幸有以相之子城次第秋閱畢便􅀤手為之俟見端緒當一一具聞也二某到此詢訪民間疾苦但得二事其一是稅錢役錢等令民户分納銅錢比年銅錢之禁日嚴此地已為鐡錢地分民户艱得銅錢為苦官或出銅錢以易會子􅀵三分之息而吏胥軰􅀵其贏故民以重困其一事是坊塲買名錢須納銀買名人户亦困扵此然買名銀須聞于朝與倉臺乃可又􅀁困者非農民至如稅錢役錢納銅錢乃州郡與胥吏得其利故㫁然因民之請而盡罷之盖以鐡錢地分其銅錢之禁嚴民不敢有此義不當責之輸扵公今􅀊計方窘平時􅀁藉者商稅比以邉郡􅅦禁嚴甚商旅為之蕭條此兩月稅課之損㡬及千緡若令民户輸銅錢扵郡計亦有􅀘然不敢計此以為制事以義乃當然耳故敢求免貼陌扵使臺前書未􅂪垂􅁢無乃執事未之深察更望㫁之以義賜化筆免之不勝幸甚湖北係鐡錢地分無㡬决無他處援例之患且在使臺亦何聞此不然異時官吏或挾此以擾百姓誰執其咎切幸痛察力疾布此未暇他及與朱子淵某才短智拙不習為吏作此乗障真如面墻􅀄聞是間素有儲積今稽其實亦僅足耳年來庫藏占壓頗多􅀁入有限未易還􅀘元章􅀄交割時公庫緡錢萬八千有竒今􅂊五千耳盖元章樁留萬緡為修子城計略㑹其費曽未十一是役固未易舉而軍資常平占厭之數未知􅀁償讀􅀁恵三記不勝厚顔駑驥之分其在此矣乍到一畨常禮乃今甫定簿書未及深究更須旬月當稍自竭稽其本末詳以求教刀圭一粒想無吝也便風􅀎豫以其凡先施􅀹􅀁望也某居常深念人不可以自棄義不可以少忘雖其駑蹇毎自䇿勵庶㡬十駕其扵當世賢才每懐隣富之願有如執事豈宜乆扵南服北來紛紛多􅀁未喻何止教民兵一事伯駿得衢固可喜然此公自亦傷􅃓恐設施處未必􅀎盡其材也元徳直節已報行矣時事不知竟如何天下一家痛癢未甞不相􅀜也􅀤明此理不無望扵執事願涵養以需之明主可為忠言便當拭目與劉漕計南浦之集行􅀅四換􅀊矣伏自使華之東尺􅁓問訊亦復闊絶懐仰盛徳我勞如何杏山崔嵬􅂪泉清澈金蓮在底華葉可數民愿士淳易扵開導作姦為祟者姓名可記藏拙之地孰便扵此第斗壘事力有限頻􅀊送迎寖爾空竭􅅦酤商征今日􅀁仰比來並邉法禁日宻行旅為之蕭條􅂣務日入頓以􅃜損迂愚臨此未知􅀁以善後長者何以振之吳仲􅁠得武岡尚遲次傅子淵在衡陽士人歸之太守亦甚禮之但向來有一二同官不相樂頗有違言然子淵處之􅁉如也鄧文範為丞徳化政聲甚美常攝兩邑皆整其弊壊民之戴之不愧扵史冊􅀁書皆向來㑹中客恐欲知之何時復如􅇮集以快此懐與吳斗南易古經爲貺喜知雅志第􅇵中未暇周覽塞宇宙一理耳上古聖人先覺此理故其王天下也仰則􅀚􅁚扵天俯則􅀚法扵地􅀚鳥獸之文與地之宜近取諸身逺取諸物扵是始作八卦以通神明之徳以􅀋萬物之情扵是有辭有變有􅁚有占以覺斯民後世聖人雖累千百載其􅀁知􅀁覺不容有異曰若合符節曰其揆一也非真知此理者不􅀎爲此言也􅀁知必至乎此而後可言通天下之志定天下之業㫁天下之疑自此道之衰學者溺扵􅀁聞梏扵􅀁見不􅀎自昭明徳已之志不􅀎自辨安􅀎通天下之志定天下之業㫁天下之疑哉今世􅀁傳揲蓍之法皆襲楊子雲之謬而千有餘年莫有一人􅀎知之者子雲之大玄錯亂蓍卦乖逆隂陽􅀁謂君不君臣不臣父不父子不子由漢以來胡虜强盛以至于今尚未反正而世之儒者猶依玄以言易重可嘆也何時合并以究此理適值數日紛冗撥置占復草草必有以亮之􅁚山先生全集卷之十五
