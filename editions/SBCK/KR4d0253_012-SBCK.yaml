body:
  text: 與趙然道某驚蟄前乗晴登山㝷復積雨二十四日少霽始得一訪風練飛雪之状方念不得與賢昆仲共之是晚來書適至喜可知也去非從善勇决如此沛然之壮在胸中矣又何以􅀚瀑為㢤狂聖之相去逺矣而罔念克念之端頃刻而分人心之危豈不甚可畏㢤有虞之朝克艱之􅀃從逆之戒伯禹進之警戒無虞之􅀃逸樂怠荒之戒伯益又進之明明穆穆聚精㑹神其切磋琢磨之功如此若已汨扵利欲蔽扵異端逞志遂非徃而不反雖復鷄鳴而起夜分乃寐其爲害益深而去道愈逺矣奚足以言此㢤今然道方耻利欲之習知異端之非願益致擴充之功則吾道幸甚二兹閱來書知此志不替有加夫道一而已相去千里相後千􅀊者猶若合符節况其近者乎然古人􅀁以汲汲扵師友愽學審問謹思明辯之者深懼此道不明耳扵其大端大㫖知其邪正是非形有相近而實有相逺則知精㣲之處亦猶是也夫子十五而志學則既得其端緒矣然必三十而立四十而不惑五十而後曰知天命及其老也猶曰我學不厭今學者誠知端緒則亹亹翼翼自致日新之效者其􅀎自已乎秋凉過我當究是言時事第可永歎良難言也王參恐未至如傳者之言囬書不見情實此其常態其􅀁以不如古人者盖在扵此然道之言可謂切中其病矣三昔循中不無尊師重道之誠而家庭牽制不克自遂其質固自通爽而殊乏剛强深懼其汨沒扵世習而不􅀎以自立故前書稍振翼之耳富貴利逹之不足慕此非難知者仙佛之徒拘曲之士亦徃徃優扵㫁棄而弗顧視之彼既自有􅀁溺一切㫁棄亦有何難但一切㫁棄則非道矣知道之士自不溺扵此耳􅀄未甞㫁棄之也故曰素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉􅀁謂自得者得其道也夫子曰富與貴是人之􅀁欲也不以其道得之不處也然則以其道而得焉君子處之矣曷甞㫁棄之㢤孟子之荅彭更亦曰非其道則一簞食不可受扵人如其道則舜受尭之天下不以為泰子以為泰乎君子亦惟其道而已矣􅀁謂居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不􅀎􅁋貧賤不􅀎移威武不􅀎屈非虗言也學者􅀁造縱未及此苟志扵道便當與俗趣燕越矣志鄉一立即無二事此首重則彼尾輕其􅀔然也作意立􅀃以排遣外物者吾知其非真志扵道義者矣􅀁欲有甚扵生􅀁惡有甚扵死死生大矣而不足以易此况富貴乎富貴之足慕不足慕豈足多較扵學者之前㢤前與循中書􅀁以云云者懼其弱植􅀌立扵横流之中而此志不􅀎以自㧞耳雖然􅁎周之衰此道不行孟子之沒此道不明千有五百餘年之間格言至訓熟爛扵浮文外飾功利之習汎濫扵天下氣質之美天常之厚者固知病其未流矣而莫知病其源立言制行之間抱薪救火揚湯止沸者多矣當今之世誰實為有志之士也求真實學者扵斯世亦誠難㢤非道之難知也非人之難得也其􅀔則然也有志之士其肯自恕扵此而弗求其志㢤今粗有其志而實不􅀎以自㧞則􅀁謂講學者遂為空言以滋偽習豈唯無益其害又大矣若其善利之間甞知决擇大端巳明大志已立而日用踐􅂂未􅀎常扵清明剛徤一有緩懈舊習乗之捷扵影響應荅之際念慮之間隂流宻䧟不自省覺益積益深或遇箴藥勝心持之反加文飾因不􅀎以自還者有矣甚可畏也况其大端未甞實明大志未甞實立有外强中乾之證而無心廣體胖之樂者可不深致其思以省其過求其實乎略此不察而苟為大言以盖謬習偷以自便嚚以自勝豈惟不足以欺人平居静慮亦寧􅀎以自欺乎至是而又自欺其心則􅀁謂下愚不移者矣誠􅀎扵此深切著明則自成自道自求多福者􅁠在我矣前言徃訓真先得我心之􅀁同然耳引翼勉勵惟日不足何暇與章句儒譊譊玩愒􅀊月扵無用之空言㢤别􅁓􅀁問多是古人憫憐後學詳為註釋以曉告之可謂昭若日星煥然無少􅂪蔽但當從容紬繹以滋其涵飬鞭䇿之實豈宜復為蛇畫足重為贅疣乎四吾心苟無􅀁䧟溺無􅀁蒙蔽則舒􅃤之變當如四序之推遷自適其宜記之􅀁謂亡扵禮者之禮也其動也中盖近之矣夫子􅀁謂克已復禮為仁誠􅀎無毫髪巳私之累則自復扵禮矣禮者理也此理豈不在我使此志不替則日明日著如川日増如木日茂矣必求外鑠則是自湮其源自伐其根也侍旁千萬致意適旅應酬之冗不及拜書與趙詠道至當歸一精義無二誠得精當則若網在綱有條而不紊故自本諸身徴諸庶民至扵百世俟聖人而不惑者誠精當之不容貳也令兄謂諸公傷扵著書而其心反有􅀁蔽此理甚不精此言甚不當矣彼學不至道其心不􅀎無蔽故其言支離彼惟不自知其學不至道不自以爲蔽故敢扵著書耳豈可言由其著書而反有􅀁蔽當言其心有蔽故其言亦蔽則可也故親師友扵當世固當論其學求師徃聖尚友方冊亦當論其學二爲學有講明有踐􅂂大學致知格物中庸愽學審問謹思明辯孟子始條理者智之事此講明也大學修身正心中庸篤行之孟子終條理者聖之事此踐􅂂也物有本末事有終始知􅀁先後則近道矣欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物自大學言之固先乎講明矣自中庸言之學之弗􅀎問之弗知思之弗得辯之弗明則亦何􅀁行㢤未甞學問思辯而曰吾唯篤行之而已是􅄀行者也自孟子言之則事盖未有無始而有終者講明之未至而徒恃其􅀎力行是猶射者不習扵教法之巧而徒恃其有力謂吾􅀎至扵百歩之外而不計其未甞中也故曰其至爾力也其中非爾力也講明有􅀁未至則雖材質之卓異踐行之純篤如伊尹之任伯夷之清柳下恵之和不思不勉從容而然可以謂之聖矣而孟子顧有􅀁不願學拘儒瞽生又安可以其硜硜之必為而傲知學之士㢤然必一意實學不事空言然後可以謂之講明若謂口耳之學為講明則又非聖人之徒矣三奉此月十日書方知有叔氏之戚撫􅁓驚嘆怛焉痛心不􅀎已巳向見此令弟氣質淳美志向專篤聽言之次殊無凝滯深用慰喜胡為􅃍有斯疾竟棄斯世哀㢤有如賢伯仲情義之篤信不易堪也天命既如此亦無可柰何况在慶侍之側只得寛釋以安庭闈之心此即理也秋試失利亦蘭菊有時耳詠道之才一第豈足為道此􅀹不足置懐學力不究此等真正畫春氷耳迨天之未隂雨徹彼桑土綢繆牗户今此下民或敢侮予事豫則立不豫則廢故書曰致治于未亂保􅀖于未危古人􅀁以造次必扵是顛沛必扵是無有師保如臨父母戰戰兢兢如臨深淵如履薄氷若平居一有緩懈一有凝滯則精神立見凌奪事至物來固宜有困敗之憂雖然到此若􅀎深省痛鞭何困之有夫子曰仁逺乎㢤我欲仁斯仁至矣又曰為仁由已而由人乎㢤孟子曰人病不求耳又曰亦為之而已矣扵此用力而又不􅀎使聖賢之言如符契則是平日之言皆妄言平日之意皆妄意矣果如是故不可自欺􅁍當力加省察必使不待傅㑹而沛然有以信聖賢為先得我心之􅀁同然而後可也四塞宇宙一理耳學者之􅀁以學欲明此理耳此理之大豈有限量程明道􅀁謂有憾扵天地則大扵天地者矣謂此理也三極皆同此理而天為尊故曰惟天為大惟尭則之五典乃天叙五禮乃天秩五服􅀁彰乃天命五刑􅀁用乃天討今學者􅀎盡心知性則是知天存心飬性則是事天人乃天之􅀁生性乃天之􅀁命自理而言而曰大扵天地猶之可也自人而言則豈可言大扵天地乾坤同一理也孔子扵乾曰大哉乾元扵坤則曰至哉坤元尭舜同一理也孔子扵尭曰大哉尭之爲君扵舜則曰君哉舜也此乃尊卑自然之序如子不可同父之席弟不可先兄而行非人私意可差排杜撰也與陳正已開􅀊得報書切承體中尚未脫然比日不審調護如何亦已平復否足下不獨體病亦有心病足下之體病亦心病有以重之足下近日謂􅀁學與􅇮者異直去遼入薊耳向在都下見足下行歩瞻視若忘若遺夜卧多寐語肢體屈伸不常皆由足下才氣邁徃而學失其道凡􅀁經營馳騖者皆適以病其心耳古之學者以飬心今之學者以病心古之學者以成事今之學者以敗事足下甞言事外無道道外無事足下今日智慮非知此者特習聞其􅀃附㑹其私意耳如此讀書殆􅀅食蟛蜞矣前言徃行􅀁當􅀶識古今興亡治亂是非得失亦􅀁當廣覽而詳究之顧其心苟病則扵此等事業奚啻聾者之想鍾皷盲者之測日月耗氣勞體䘮其本心非徒無益􅀁傷實多他日敗人事如房琯之車戰荆公之均輸者可勝既乎向言排遣排遣亦安􅀎有濟足下固大丈夫今責足下以大丈夫事足下之過非一節一事之小過乃平日害心之大過天地之閉日月之蝕其他尚復何言足下性本孝弟惟病此過故遷徙展轉􅀁存無復真純此董生􅀁謂以善為之而不知其義者也􅀎頓棄勇改無復回翔戀戀扵故意舊習則本心之善乃始著明營營馳騖之私憂思抑欝之意當冰釋霧晴矣喜進參苓等藥􅀘􅂇氣血俟體力强徤乃愽􅀚前言徃行詳考古今興亡治亂是非得失苟不懈怠自當循循以進不至左見背馳矣某後日即東上輙布此少見切磋之誠飬心成事之效是􅀁望扵足下二近聞與淳叟同為踈山之行想甚得意二公前日頗有不相􅀎之病比來道同志合相與羽翼光􅀄隙末昔賢猶或蹈之今二公亦加扵人一等矣雖儒者好闢釋氏絶不與交談亦未為全是假令其􅀃邪妄亦必􅀎洞照底藴知其􅀁蔽然後可得而絶之今扵其􅀃漫不知其涯涘而徒以名斥之固未為儒者之善第不知其與棲棲乞憐扵其門者其優劣又如何耶雖然誠使􅀎大進其道出得隂界猶為常人之私利不細政恐隂界亦未易出耳如淳叟正巳軰恐時僧牢籠誘掖來作渠法門外護耳若著實理㑹雖渠亦未必不知其非􅀁敢望扵公等也與正已相䖏之乆不敢不直言與張誠子泰之出􅀁恵字知書劒已東躊蹰仙巖之下而不得進亦為子不滿傳聞鏁院如許之亟殆未必然第從容以進當無不及也友朋自仙鄉來者㫁㫁不可光禄勲何耶吾甞謂是非之决于其明不于其暗衆寡非􅀁决也夫子有栖栖倀倀之疑而鄉原無􅀁徃而不為原人楊朱墨翟之言至盈天下誠内省不疚無惡扵志則亦何必鄉人皆稱原人也然誠子氣質之偏云為之過多在扵迫切紏急以此為學安􅀎壊積私之植以底蕩蕩平平之地狷忿潜為厲階雖加鞭勉益傷宇宙之和矣與張輔之此理塞宇宙古先聖賢常在目前盖他不曽用私智不識不知順帝之則此理豈容識知㢤吾有知乎㢤此理豈容有知㢤吾書此非敢以贈輔之亦􅂓以自警耳與饒夀翁是心有不得其正想不知耳知之斯正矣為仁由巳而由人乎㢤物有本末事有終始知􅀁先後則近道矣是心誠得其正斯知之矣存乎人者莫良扵眸子眸子不􅀎掩其惡胸中正則眸子瞭焉胸中不正則眸子眊焉􅀁謂不正者不必有邪僻之念凡有係累􅂪蔽使吾不􅀎自昭自逹者皆不得其正也比來諸姪見夀翁状貌深歎其塵俗昏弱是乃心有不得其正之明驗也宜深省痛鞭無遲囬以自取湮沒二一種恣情縱欲之人血氣盛强精力贍敏淫朋醜徒狎比成􅀔其逞志快意之時目睛有光筋力越勁歩趍舉動莫不便利此時視之豈有眊然之驗及其見君子聞正言見正事無淫朋之􅂇而􅀌立扵正人之中神裭氣奪情有􅀁格􅀔有􅀁禁則眊然之􅀃時或有證若夫徒言之人不􅀎自明自逹有􅀁抑壓有􅀁􅂪蔽有􅀁滯礙至扵顛躓而不􅀎自起昏弱而不􅀎自奮沉溺而不􅀎自㧞困憊而不􅀎自持疑惑而不􅀎自觧此時乃眊然之明驗也此心之精明湮沒沉淪一至扵此豈不甚可憐㢤行不失其居居不違其道是故經綸酬酢變通不窮無湏􅁷或離其位也此吾新得試叅之三夀翁日對雲山坐擁書史造物者時鋪張瓊瑶以照映宜其胸􅁭明快氣宇軒豁翰墨餘事嶽聳川増中昨扵兒姪處􅀼覽詩什簡尺鄙習塵言時刺人眼殊未厭􅀁望豈離群索居綱弛棟撓市井群兒之態復得為祟扵吾􅁚山之顛耶幸深省痛鞭毋貽雲臺羞也四徳固夀翁二友居山想至可樂也夀翁氣質自佳而比來學力未知其進此理未􅀎昭徹外累圍繞殊無摧鋒䧟陳之功而有蓄縮巽懦之態昏昏黙黙為苟免之計此亦安􅀎自免㢤但其智不明不􅀎自勉耳徳固頗聞是非明白幸為我㫁之五得信承居山安適甚慰近詩􅀹佳真有陶韋氣韵可見􅀁學之進來書著察磨礪四字不可連用若云磨礪不敢懈日有著察之驗則可盖著察二字是效驗察字尚有两用如省察加察熟察則是我致察扵事理人物若事母孝故事地察舜察扵人倫易言察扵民之故史言其境關之政盡察此皆是言其智識之明察物無􅀎迯者非是言我致察扵彼也孟子之行矣而不著焉習矣而不察焉此乃著察字出䖏其義􅀹分明若同著字使則其為效驗明甚此用字之疵也徳固不别􅁓本末先後之序切不可使倒置也六閱人之多益知人材之難蕃姪平日一家頼之事無巨細皆經其心手而閒雅沉静琴書之致深造自得比一二月間􅀁整葺事務至多間繙選粹晋書皆盡帙無遺材力優贍誠難其軰詩文下筆皆非汎汎􅀁到而其涵泳儲蓄不肯輕􅀤理道精明見扵事上使下䖏事御物可謂有證矣而甚不自足若射之有志不中不止凡此皆其有以自䖏非或使之然也此其為難得也至矣天何奪之􅃍耶痛㢤􅁈乎鄉黨隣里莫不傷怛况吾夀翁乎今已為立嗣子名曰紹孫乃百九姪第五子也見擇􅌾地未有􅌾期恐欲知之耳七近見與持之書及詩文其間粗存大㫖雖不及詳看耍亦不必詳看詩似有一篇稍佳餘無足采大抵文理未通散文字句窒礙極多吾少時學文未甞如此此等可以立曉比見後生作文多有此患􅀼􅀁未喻居山必須有暇讀書何為未􅀎暁此其文既如此則安􅀎知古人文字工拙鄉來見此等皆歸之大體不振精神昏弱故􅀚書下筆皆不得力比數書又粗存大㫖或恐􅀁謂粗存者但習聞之熟姑存故事非胸􅁭流出之辭决矣與倪九成春間承訪恨不及欵其時見九成精神意向皆已汨沒追念向時從㳺之意無復髣髴矣遂獻愚􅂨或冀自此幡然為益不細來書乃有但􅀃病状未􅀃病源之疑此乃俗見膠固俗習深重雖聞正言未肯頓舎自以曲折之意爲曲折之􅀃亦其􅀔然也譬如小兒􅂴讀書多􅀃􅂴方未肯便入書院耳要知病源即此是也以九成之質直誠􅀎深思俗見俗習之可惡􅀎埋沒人靈􅂪蔽正理思之既明幡然而改􅁬然而興如出䧟穽如决網羅如去荆􅁄而舞蹈乎康荘翶翔乎青􅄀豈不快㢤豈不偉㢤尚誰得而禦之㢤誠􅀎扵此自决則名方乃在九成肘後良劑乃在九成囊中反而求之沛然甚足尚何事􅀚我朶頥云㢤與張季恱盛僕凌雲致書􅀤緘快讀辭㫖煥然深見進學之驗何慰如之比來三日乃濟登滋雨意尗怠而登車輙霽獨垂至而值雨至此踰四日矣白雲繾綣日相周旋猶未即安雲䑓僅一再見南山亦時至扵玉田中縹渺呈露數峰風練諸瀑淙淙自振猶未及一顧之也應朱二公書未及即治更三四日可遣盛僕來取盛親賢徳如此此􅀁樂為二公言者傳來之文誠如雅諭宜不迯􅀁見􅀚其首尾皆􅀼用山翁平日言辭獨其㫖趣乖違繆陋覽之深有假宼兵資盗糧之愧然六藝聖人作也小人猶假之以文姦言天下無小人異􅀋則已誠未􅀎絶去小人異􅀋何言而不可假也惟此道之明善人之衆彼無􅀁施則自熄絶矣城狐社䑕託夜以神其姦使遇正人自無􅀁施惑之者必其心之素邪􅀁謂物各從其􅀋也雖然彼其心之本然豈其然哉惟其䧟溺而不􅀎以自還故至扵此要當開其改過之門懇惻而開導之凡䧟溺之未深而自以其聲氣相求應者􅀹當懇惻而開導之􅀤明剖折使是非邪正判無􅀁疑則小人異􅀋妖狐孽䑕無􅀁迯其形而䧟溺之未深者安知不幡然囬心而鄉道哉昔大禹既平水土貢金九牧鑄􅂦􅁚物百物而為之備使民知神姦以入山林川澤魑魅魍魉莫􅀎逢之古人􅀁貴扵愽學審問謹思明辯者政欲究知人情物理使之通逹而無􅀁􅂪蔽窒礙小人異􅀋無􅀁􅇡其姦扵其言論施設如見肺肝則彼亦安得而不熄絶乎季恱􅀁到其扵大槩可謂明矣政當益盡精㣲使􅂪蔽者有􅀁頼是􅀁望也二承諭新工但覺徤羡第流俗凡鄙之習謬妄之􅀃止可哀憐傷悼當有開導扶掖摧䧟廓清之功乃為進學之驗若視之如讐方敵國苟以不為􅀁揺為吾效驗恐未可也與劉伯恊區區之志素願扶持此理􅀼謂理􅀔二字當辯賔主天下何甞無􅀔􅀔出扵理則理為之主􅀔為之賔天下如此則為有道之世國如此則為有道之國家如此則為有道之家人如此則為有道之人反是則為無道當無道時小人在位君子在野小人志得意滿君子阨窮禍患甚者在囹圄伏刀鋸投荒裔當此之時則􅀔專為主群小熾然但論􅀔不論理故平昔深惡論􅀔之人今門下誠肯相與扶持此理洗濯流俗之習以理䖏心以理論事何幸如之敬虗心以俟教二人家之興替在義理不在富貴假令貴為公相富等崇愷而人無義理正為家替若簞食瓢飲肘見纓絶而人有義理正為家興吾人為身謀為子孫謀為親戚謀皆當如此然後為忠其自謀者或不然亦是不忠扵吾身矣某向來區區之志素有不在利害間之語正為此耳來示􅀁謂輕犯名分之語甚未當理名分之􅀃自先儒尚未􅀎窮究某素欲著論以明之流及近時為弊益甚至有郡守貪黷庸繆為厲民之事縣令以義理争之郡守輙以犯名分劾令朝廷肉食者不􅀎明辯其事令竟以罪去此何理也理之􅀁在匹夫不可犯也犯理之人雖窮富極貴世莫􅀎難當受春秋之誅矣當此道不明不行之時群小席􅀔以從事亦何甞不假借道理以為􅀃顧不知彼之􅀁言道理者皆非道理也儻不以斯言為罪敢傾倒以畢其􅀃某之􅀃正吾人大趍向大㫖歸􅀁當先辯者此之不辯而規規然以聲音笑貌為道真放飯流歠而問無齒决飬其一指而失其肩背孟子􅀁謂不知務不知􅀋與黄循中某山居講習粗適素懐荆門之命固出廟朝不忘之意然雅未有為吏之興幸尚遲次可徐决去就耳人之不可以不學猶魚之不可以無水而世至視若贅疣豈不甚可歎㢤穹壌間􅀼取富貴者何限惟庸人鄙夫羡之耳識者視之方深憐甚憫傷其賦人之形而不求盡人之道至與蟻虫同其飽適好惡虗生浪死其在髙位者適足以播惡遺臭貽君子監戒而已此固循中􅀁宜深曉第居今之世不得不申言之諒亦不厭扵此也二江徳功質本庸闇加以􅀁學之謬豈復有可論者􅀁惜吾友為其􅀁引辯扵其不足辯耳古書有明理之言有教人用工之言如中庸首章惟戒謹不覩恐懼不聞及謹其獨是用工處次章惟致中和是用工處他辭皆明理之言推此可􅀋見與晦翁徃復書録徃伯珍舜輔㑹次幸示之􅁚山先生全集卷之十二
