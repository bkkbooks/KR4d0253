front:
  text: 象山先生全集卷之十六書
  hash: sha256:43472ef3eb64650a6bf13da8a3acfb4bb8d84759dc9c463d0e0cd9187718ba81
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_016-1a}
body:
  text: 與章德茂此月両拜手翰如奉談麈慰浣之劇伯兄以老病不􅀗進謁爲恨重蒙致禮之勤豈勝感戢小兒持之獲侍尊爼所以待遇者皆過其分􅀹切悚愧如聞屬有手足之戚諒􅀷追悼後時修慰不專尚幸裁恕小兒頗能道餘教萬一警䇿多矣荆州迯卒視州郡爲逆旅周流自如莫知禁戢平日若此緩急安能防閑比方稍修其籍革頂名之弊圖致請扵大府丐與隣郡爲約以絶迯逸之患適得公移甚愜下意即已行下巡尉義勇等嚴其跡捕近有襄陽迯卒投募在此捕者㝷至即令擒去矣敝邑自某入境迯卒亦不少有未􅀗者恐在府下徑差人跡捕或恐此軰群黨欲丐移文兵官巡尉義勇等爲之應援倘蒙捕􅀗亦可懲後也干冐威尊不勝惶恐二某備數屬壘倐閱半祀名雖北鄙寔帶嚴城光潤所蒙最爲親切粗謹職守未至􅘃敗無非大府之賜尺牋闕焉不干記史是猶陟嵩華而忘山泳江湖而忘水揆之常情宜􅀗罪戾比得邸吏别報乃知姓名首塵薦剡所以奨借之辭寵甚聞之惕然弗稱是懼治古公道還扵盛世前軰典刑蔚乎斯在敢不益勵素志勉竭駑朽蘄無􅀒斯言世俗私謝之禮則不敢以累門下伏冀髙明必垂洞察職事所當控聞者雖有公状亦合更具禀劄慮勤聴覽且恃照臨之密邇皆缺弗致今受知之􅀷乃如此尢不容以言謝三奉十八日手誨愛民閔雨之誠尚賢戢姦之㫖可謂両盡而兼著豈勝歎仰公道之任歸門下乆矣非適今日某區區之志粗知所擇雷同苟合􅀼亦所耻同官相與當何求哉事惟其宜理惟其當議論設施不必在已相期相勉大抵以此平居論事始有未合各獻其宜􅄷然自竭反復之乆是非已明伏義如響人得所欲殆莫知􅀄􅀃爲誰主之也仰視㓕私之訓妄謂或庶幾焉核實之命不容不以情報今茲旱􅀔可畏殊甚襄鄂之間沂漢之舟鱗積灘底曠旬淹月而不得進漢上雨晹可見扵此矣江流増减大府具知之瀕淮並江諸郡屬嘗具禀續加詢訪舉亡異辭敝邑􅀄六日致禱雖未即得霈澤壇遺之所朝莫致敬祠官未常不沾濕也惟望日終日晴徹四無纎雲既望之朝率郡官迎致上泉復冐雨而歸自是日及今隂雨無曠日境内獨襄水西鄕先得大雨七日八日之夕自城上望雨色如黛震霆爲之逹旦十二三間襄水東鄕如獨山等處亦得大雨至十七八間㳂江鄕及與安樂東鄕徃徃得大雨矣比日郡城乃始霶霈南鄕最旱處亦且得雨雨意至今未怠當陽亦十七八以來雨始加大江東西田􅁟較之此間相去甚遠江東西無曠􅁟此間曠土甚多江東西田分早晚早田者種占早禾晚田種晚大禾此間田不分早晚但分水陸陸田者只種麥豆麻粟或蒔􅂼栽桑不復種禾水田乃種禾此間陸田若在江東西十八九爲早田矣水田者大率仰泉在両山之間謂之浴田實谷字俗書從水江東西謂之源田瀦水處曰堰仰溪流者亦謂之浴蓋爲多在低下其港陂亦謂之堰江東西陂水多及髙平處此間則不能蓋其爲陂不能如江東西之多且善也惟南鄕去山既遠且近江髙平之地多又邇大府居民差衆故多不仰泉石之田此田最下􅀊入甚多白楊一鄕此田居十五以匕梨陂柘陂等鄕不下十二惟西北東鄕分則無此田矣然所謂水田者不善治堰則並髙處亦與平田相􅁼矣少者不十一多者不十三通之不過十二上泉距郡城幾三十里迎泉之日迂視其田計其􅀛坼者十一二外此皆尚有水然堰中已乾而不繼必大敗今得雨可無害也惟白楊鄕等處髙平田全未種者見施行今種晚榖及可􅂇食者今􅀊亦幸有湖北平時水浸有不可種禾者民皆種禾若復無水患又得時雨或者可􅀘未種之田耳小兒歸就試經從大府輙布此令進謁􅀼惟軫憂斯民之􅀷所欲亟聞故詳及之伏幸台察四屬奉手誨益􅀷佩服小子持之再望道德之光蒙接遇之寵爲幸厚矣家問中備述餘教􅀹􅀷感激傳有聞民有姓易者爲乏食户强以錢取去倉粟或云在長林境中及物色之乃無此事又云在當陽境内方此詢究尚未報也俟得其實續當布聞比來雨澤無不霑足但次第有過多之患十三日偶天隂與僉判教授知縣人以一馬數卒行視田間苗甚秀􅀤水皆盈溢向曾􅀛坼者今得水茂暢過扵不缺水者髙坡未揷秧者今揷已過半秧田甚多尚徃徃成群揷秧問何以能備此秧則曰年例如此若其不脩陂池不事耘耨則皆枯死此地惰習未易空言勸之今冬欲措置革此習又未知果能革否陸地耕種粟豆者却多中稔爲有餘矣前書所謂湖田者雖未及物色􅀔不能不病水耳襄陽唯南漳宜城間得雨外此皆乆無雨是間舟泊襄水灘下者􅀄七八間得信猶言水澁不能前進􅀄七日有微雨不成水十二三間自北來者却云襄陽得雨成水但未通洽未知此後如何乆傳北界旱甚河之南北至相食􅀄未敢信今東自承楚西自均房來者其言若一恐或有是􅀼惟長者愛民之心追配禹稷無間扵遠邇内外獨恨華夷首足之分未克大正皇朝德施仁風獨有限隔君子之憂未容遽釋旦晚召還両地以究設施則樂民之樂爲有日矣春間趙路分良弼來閱禁旅介然如古節士㝷有孟正將通成統領和因事相繼過此適值同官習射率然延至其間以觀其技馳射精熟議論慷慨異時所見武弁不多其比陶冶下風者人材如此推而廣之何事不可爲哉長林汪宰􅀄甚不堪姦民之訟既見某薄治其吏亦不能無疑因曉以吾人無他扵此軰行法以防微不得不爾即遂釋然奸民肆其欺罔以快私忿眞大蠧也長林具析申狀皆是事實併用備申伏幸過目昨日得公移聞二縣以酒折鋪兵糧長林斷無此矣長林鋪兵皆在軍倉請米軍庫請錢皆是一色白米好錢未嘗有折支也當陽方此詢之然以理揆之沈宰處事極有理不至如所聞或恐有疑似又當有曲折須其報即具申也近日以所􅀗刼盗中有二人是攫客稍以榜約束之兼聞此軰群黨擾寺觀與鄕村民户頗甚故不得不裁之亦不敢以禀聞也西蜀之飢淮浙之蝗皆令人不能置懷處州豪民爲盗猶可憐也此上雖雨澤粗足尚用懔懔日俟教誨以免罪戾伏幸終惠五稍踈記室之詢徒積傾仰今􅀊之旱諸鄕皆有少損而南鄕頗甚􅀄擬瀕江湖下鄕常􅀊所不種者今􅀊可種謂可以􅀘近両月間江漢之流無雨而漲溢者凡三所種之田與􅂼茄麻粟皆爲烏有同官赴試與􅀍檄而出者皆親目其事歸言其状爲之怛然比已分委同官四出檢視前數日方歸所得􅀹詳旱澇之餘米榖自少而諸處糴米之舟皆鱗次㟁下如都綂司至使人扵鄕村攔截載􅀒米者本軍今􅀊以民艱食逐時􅀤常平以賑之所糶幾二千石見樁糶過常平錢二千緡倉臺公移踵至催以此錢趂時糴米以備來年賑濟雖分差人於熟鄕収糴而來糶者絶少比數日以來米不出市民復艱食見出常平賑糶近來屢謀岀賞牓禁米舟下河而吏軰輙以恐有遏糴之嫌爲言􅀄以其有理亦與同官熟論而從之近日事􅀔􅀹逼又見郢州以百千之賞禁米舟下河此間新􅀤舉人親戚之家犯其禁用朱漕之言免其罪竟納賞錢試以問吏吏復爲遏糴之􅀃昨日同官相聚復有議􅂥米之禁因評吏言果出於公乎抑有私意乎同官皆謂此軰必有親故厚善之人商販米者故以此爲地耳豈有公心哉疑未决間忽􅀍使臺公牒􅀷恠事未施行已蒙止絶殆所謂止邪扵未形絶惡扵未萌雖然此事乃如吏軰之意敝邑元無是事不知誰敢致此􅀃扵大府疑必有交􅋐其間者有不可不察也某平時不能飾􅀃况在門下􅀹不敢不用其情鄕來襄陽遏米價米舟至者皆困不能前然卒以賂津吏有夜􅀼過者常謂法禁徃徃不足恃比年場務益艱商旅多行私路私路舊微小少所知者今皆坦途通行北境連年不熟今􅀊􅀹甚近聞米過唐鄧間多不以舟小民趍目前之急不暇爲後日計况肯爲鄕曲計爲州縣計乎使米粟有餘無禁其􅂥可也今方甚不足以坐視其􅂥恐亦未宜敝邑􅄶小今􅀊􅂊數旬不雨市輙無米鄕民素無蓋藏同官出入村塢者皆謂未常見囷倉人家多茅茨其室廬不能􅀷奥大率可窺其有者乃儋石之儲耳風俗所自来非一日今日不爲之計後將益弊今所謂􅂥米非􅂥扵南之患􅂥扵北之患也已若有餘或能粗給則推以與人乃所願也此方有旦暮之憂而不爲後日計者方累累舉所恃以􅂥恐不容坐視薄遽亟此布禀丐察言者之奸續容商議所以處之之宜别當具禀伏幸台察與張元善漕臺數有便郵其􅀤多值冗不克附問累託象先致意㑹次當必及之嚴山蓋倉其􅀃未善若謂以舟致之㐮陽則江漢湍淺曠日持乆當漲溢時風濤險悍􅁼不可行陸運則自嚴山至班竹號六十五里山路阻隘﨑嶇其實不止此數又􅁼有水隔春夏之間毎用阻絶本軍至班竹八十五里乃坦塗又嚴山非市井去處人煙踈闊儲草則可儲粟則難扵㸔守莫若葺軍倉以儲粟今子城既固如在枕上矣長林巡視小路常親歴其地叙􅀃甚詳已備在公状中幸裁之九江德化丞鄧約禮字文範階爲文林今冬當代其家世建昌乃臨川李侍􅀰德遠之壻其居舊遭回祿未赴徳化時寓居李氏今其妻兄官滿歸臨川鄧丞欲及未代前一歸建昌營居舎願丐使􅄗一檄若蒙垂􅁢但付此間旦晚即附徃也亦嘗託象先轉凂諒必無阻此公鄕里之秀端慤純正甚有宦業比年攝両邑當事之難拯其敝壞更使爲佳地民之戴之不忍其去無愧史冊所書異時真可備藥籠中物韓昌黎字戒以在得人卒章要哉言乎敝邑両令皆賢教官時有禆􅀘自簽以下皆悉心營職無有異志唯稅官頗謬近得一指使佐之其職頓舉拙者不過扶持勸勉使其善意不替有加庶幾蒙成以免戾今農賈安帖吏卒抑畏盗賊衰息作則輙􅀗訟牒之少乃至曠旬械笞塵委五刑植立試用希濶用必聚觀此豈迂拙所能坐致􅀼自幸者亦同官適逢其人耳方至此時積訟頗多非其俗惡乃不能無敗群者耳此軰遨逰城市持吏長短無理致爭期扵必勝敵不能甘遂成長訟諸司不止乃至臺部􅀄既精求案牘辯其曲直既又曉以義理使得自新能自伏義願改者固十八九至扵怙終之人雖稍柔服扵一時尚圗復逞扵他日同惡亦視此爲消長所大幸者諸司皆賢明此軰無所復逞今訟之日少俗之日厚亦正以此向來得書謂未識張監張監趍向甚正議論有典刑到任以來文移條理毎每可服張憲在九江時假道識之蒙渠約飯亦自道其政大抵亦有家法聞到常徳多病少見賔客公文亦多傳入宅書押若無所孰何引大體卧護政亦何傷雖曰德星聚可也稽之事實乃有大謬不然者今敗群之人皆走憲臺此軰不之他司而之憲臺殆必有侮而動今不問宜可動輙索案案之徃也又不知所處動輙可恠聞憲臺之吏最無禮而又能觀其文移行遣似皆出吏軰敝邑亦有數事他郡可推而知之未欲盡述其本末若欲知之後便禀聞也聞象先與之相善不知能有道以已之乎奸吏猾民託以擾郡縣害良民傷政敗俗亦不細矣官之不可非其人如此哉乆不奉問引筆輙累累如此可一􅀏也二併啓三函良佩謙眷備承作止足慰傾馳事皆得請􅀹用感服近日得雨稍大境内頗周遍唯傍江陵界上多未種此恐無及耳和糴一事得不及敝邑可謂大惠屬者不雨曾未踰月民已艱食亟􅀤常平之粟四散賑之僅免狼狽繼此雨澤霑足倘得中下熟敝邑欲自措置私糴少米貯之鄕間以爲異時之備此謀或遂皆門下之賜也修城會子甚濟空乏餘㑹􅀂便得乃幸望示其期交納銀綱䖏免苛留之患皆藉餘庇兊換㑹子二萬貫其數甚少聞之去年換㑹子時官府行之㓕裂細民又不善觀掲示誤認下文立限三月之内有不及之數並仍舊流轉交易買賣遂􅀵不損壊者不赴塲換易及至限滿既行使不得悔之無及今此懲前日之害叢凑來換官吏見􅀤到㑹子不多遂人限其數日限其人來者頗以爲病前日令其限數日換三四千緡來者原原後又將不止又以商人以㑹子難得滯留扵此所積或三四百千或七八百千官吏見其數多又是商旅又限其數不肯換與來訴淹留折閱之状􅀔不容不換與之所􅀤㑹子不供數日耳公移􅄪求五萬􅀔恐未止此數若覺未足又當上凂前日得新漕臺復書見其辭氣温厚有前軰典刑甚爲之喜第前此不相識未欲遽以片􅁓輸腹心象先書中屢言林幹之賢欲通書偶亦未及漕臺會次得借一言之重使􅀗區區牧飬之志不勝幸甚郡縣非得使家相知聞相假借則吏文之能掣肘者多矣切幸介念汪長林真愛民如子近有奸民楊汝翼方九成者嗾其黨􅁼十餘人擁帥庭訴其虐民詞中有云欲訴本軍又恐知軍刪定太􅄌若只送縣愈起讐民之意某在此􅀄未甞以姑息從事猾吏奸民爲柔良害者屢䋲治之矣單辭虚偽或不待両造而得其情㝷問根本與之反覆頃刻之間有姦露辭屈伏罪而去者區區於此自謂有一日之長訟爭之少盗賊之衰殆亦以此愚民但見械笞塵委試用希闊徃徃有􅄌仁之􅀃其姦黠駔儈者實有所憚且惡其不便扵已他未有可以中傷且倡和其間加大􅄌等語以爲媒蘖之地帥庭之訟此其驗也帥方禱雨未應此軰乗時投辭帥舊知長林方得書稱歎其羙見規某不能拈出此牒㝷至亦不能不疑觀其判辭不止扵疑遂至盛怒章文賢甚某卽以書觧之渙若氷釋此等􅀹令人敬服王謙仲在隆興時曾傳閒一事即以書告之政與此相􅁼謾錄徃一觀此等亦不可不知也後見謙仲報書云果有是事但所判甚平却不至扵長奸也此間號民淳但細民淳耳至其豪猾則􅀹陸梁扵江浙也因筆不覺忉忉􅁚山先生全集卷十六
