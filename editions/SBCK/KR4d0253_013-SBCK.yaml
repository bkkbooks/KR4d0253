  text: 􅁚山先生全集卷之十三書
  hash: sha256:e1ccf3a35ca387209cd711ba6a54fdf9be5263a1827f6f245473cf587a8eabce
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_013-1a}
body:
  text: 與郭􅀖逸專介奉書細視緘題如揖盛徳亟􅀤讀之慰浣良劇教以大對一本􅀹深降歎鑿鑿精實非泛泛塲屋之文也君子義以爲質得義則重失義則輕由義爲榮背義爲辱輕重榮辱惟義與否科甲名位何加損扵我豈足言㢤吾人􅀁學固如此然世俗之􅀁謂榮辱輕重者則異扵是薫染其間小有不辯則此義爲不精矣當使日著日察烱然不可渾亂則善矣垂示晦翁問荅良􅀁未喻聖人與我同􅀋此心此理誰􅀎異之孟子曰人皆可以為尭舜又曰至扵心獨無􅀁同然乎又曰人之有是四端而自謂不􅀎者自賊者也謂其君不􅀎者賊其君者也今謂人不􅀎非賊其人乎居仁由義大人之事備矣吾身不􅀎居仁由義則謂之自棄聖人扵此理不勉而中不思而得賢如顔子猶未至扵不思不勉曰三月不違則猶有時而違也曰有不善未甞不知知之未甞復行則言其不逺而復也然則雖未至扵不思不勉而思勉之工益㣲矣氣禀益下其工益勞此聖人賢人衆人之辯也語曰顔子三月不違仁其餘則日月至焉而已矣日月至三月不違與至誠無息則有間矣若其􅀁至􅀁不違􅀁無息者豈容有二理哉古人惟見得此理故曰予何人也舜何人也有為者亦若是道也者不可須􅁷離也可離非道也是故君子戒謹乎其􅀁不覩恐懼乎其􅀁不聞學者必已聞道然後知其不可須􅁷離知其不可須􅁷離然後􅀎戒謹不覩恐懼不聞元晦好理㑹文義是故二字也不曽理㑹得不知指何為聖賢地位又如何為留意此等語皆是胸􅁭不明故撰得如此意見非唯自惑亦且惑人盛价至此偶有姪婦之䘮又賤體中暑連日不得占復山間朋友雲集亦不可乆􅀌其望􅀔當一徃又縣宰終滿與之為别諸事紛擾亟取􅁓作復􅃍甚不􅀎倫理近有復元晦書録徃一觀及有史評一首又有書二本宜章學王文公祠二記併録呈得暇精􅀚之亦可見統紀也與郭􅀖瑞前此辱令弟􅀖逸遣人臨存復書中託拜意近亦甞得家問否今為况如何新天子登極海内屬目而風憲之地陛黜殊乖物望非細故也山林之人但以草野輿議言之耳未知修身之内其議論又何如也良心正性人􅀁均有不失其心不乖其性誰非正人縱有乖失思而復之何逺之有不然是自昧其心自誤其身耳及處華要而不知改是又􅀅誤國矣有􅀎明目張膽而紏正之者乎有􅀎惻怛豈弟以感悟之者乎區區周􅊔之心猶不􅀎無望扵左右别後遷除未足為門下言也姪孫濬處太學家書戒令求見此子近亦少進于學幸與進以子弟視之可也與李信仲兩遣府中書皆不及拜丈丈書但託邵機宜趙通判道意至今欿然前者􅂪丈丈教以病中􅀁得聽之灑然今兹書中不及寓區區之意有一􅀃煩吾友侍下逹之大抵為學不必追㝷舊見此心此理昭然宇宙之間誠􅀎得其端緒􅀁謂一日克巳復禮天下歸仁焉又非疇昔意見􅀁可比擬此真吾􅀁固有非由外鑠正不必以舊見為固有也千萬以此􅁓禀之􅀁與邵機宜書本末備矣幸復熟之與潘文叔文叔慈祥懇惻一意師慕善人服行善事友朋間􅀁共推重與一軰依憑假託以濟其驕矜者不可同年而語矣然恐懼憂驚每每過分亦由講之未明未聞君子之大道與虞書􅀁謂儆戒無虞周書􅀁謂克自抑畏中庸􅀁謂戒謹乎其􅀁不覩恐懼乎其􅀁不聞者亦不可同年而語也盖􅀁謂儆戒抑畏戒謹恐懼者粹然一出扵正與曲肱陋巷之樂舞雩詠歸之志不相悖違若彫零窮蹙弗恊于極名雖為善未得其正未離其私耳不志于學雖髙才美質愽物洽聞終亦累扵其私况下才乎尹師魯氣質固自不凡其􅀁植立可謂表表然如文叔􅀁舉荅韓資政書辭盖不免乎其私者也􅀚扵海者難為水㳺扵聖人之門者難為言文叔第未得㳺聖人之門耳今日風俗已積壊人才已積衰公儲民力皆已積耗惟新之政亦良難㢤某方此治登山倥􅘓占復莫究􅀁懐何時合并以遂傾倒與朱子淵五月間拜誨劄之辱備承入夏動息􅀹用慰沃教以調度詳細貺以上尊兼乗仰佩眷勤感戢之至某浮食周行侵㝷五六載不􅀎為有無日􅀒愧惕疇昔􅀁聞頗有本末向來面對粗陳大略明主不以為狂而條貫靡竟統紀未終􅀁以低囬之乆者思欲再望清光少自竭盡以致臣子之義耳徃年之冬去對班􅂊數日忽有匠丞之除遂為東省􅀁逐患失之人素積疑畏而又屬有憸狡設辭以嗾之故冐昧出此亦可憐已然吾人之遇不遇道之行不行固有天命是區區者安􅀎使予不遇㢤寛恩􅂌祠歸伏田畆日得與家庭尊㓜鄉里俊彦繙古書講古道舞雩詠歸不敢多遜然此心之靈此理之明周婺之憂益􅀁不􅀎忘也何時合并以請教臨楮不勝馳情二稍不訊記曹日益馳鄉廬陵積弊之餘仍以旱歉調度有方無異豐􅀊惟􅀼徤羡某屬方登山同志亦稍稍合集兹山之勝前書甞槩言之此來益􅀤其秘殆生平􅀁未見終焉之計扵是决矣唐僧有􅀁謂馬祖者甞廬于其隂鄉人因呼禪師山元豐間又有僧瑩者為寺其陽號曰應天乃今吾人居之毎惡山名出扵異教思􅀁以易之而未得從容數日得兹山之要乃向來僧軰􅀁未識也去冬􅀁為堂在寺故址未愜人意方扵要處草創一堂顧盻山形宛然鉅􅁚因名􅁚山􅂺自號􅁚山居士山面東南疊嶂駢羅近者數十里逺者數百里縹緲磊落争竒競秀飛舞扵簷間朝暮雨暘雲煙出沒之變不可窮極上憇層巔東望靈山􅀛峰特起如􅀞玉山之水盖四百里而出扵􅀛峰之下略貴溪以經兹山之左西望藐姑石鼓琵琶群峰崷崪逼人從天而下溪之源扵光澤者縈紆泓澄間見山麓如青玉版北視龍虎仙巖臺山僅如培塿東西二溪窈窕如帶二溪合處百里而近然地􅀔卑下夷曠非甚清徹目不􅀎辨常沒扵蒼茫煙靄中矣下沿清流石澗曲折分合萬状懸注數里蒼林隂翳巨石錯落盛夏不知有暑挾冊其間可以終日造物之遺予多矣執事方書外庸竚觀大用以究厥志異時厭飫緑野倘有意從吾㳺乎世昌山陽之行錢君禮之甚厚僕夫探嚢以􅇡摶手來歸甚哉其窮也此公趍尚甚竒天其或者竟以是成之耶今巳息肩共耕學扵此矣因其遣還借兵草草寓此問訊三去冬逺辱記存㝷已具復駛㢤青陽行既厥事矯首南山豈勝馳遡區區之迹無異前日去臘以敝廬迫隘不得已増葺數椽然其事盡付之猶子了不相關􅀁困者獨書問賔客亦無暇日耳用是欲嗣致尺􅁓因循迨今一春積雨近清明始得至山房古松千章環布錯立白雲徃來其間逓為􅀮見彌旬未解頗盡竒變前峰藴秀深藏時扵白銀世界中㣲見一二乃知退之􅀁謂横雲時平凝􅀧􅀧露數岫天宇浮修眉濃緑畫新就盖得扵親目非臆想也數日始見根底朝陽麗景明若圖􅀞暮焼聮光爛若綺繡楮氏更端停毫注目天君已復縹緲扵薄雲踈雨間矣相望數千里憑彭澤諸君􅀤舒及此庶㡬無異扵合堂同席也與薛􅁚先閱邸報得誠心公道之章深切降歎然愛莫􅂇之柰何近得舊同官書唯劉志甫差强人意鄭􅄎之似不及前然亦難得矣馮傳之氣質恢傑吾甚愛之恨向來相聚日淺不􅀎􅀤其大端若只如此恐終不甚濟事也毎惋惜之足下尚􅀎有方略及此乎某居山雖未乆亦頗得英才臨川南城氣􅁚蔚然其興善為刀劒者亦須好鐡吾雖屏居未必不為足下出山爐也祠禄之滿儻復􅂌之似亦未為空餐也舊與馮傳之一書謾録徃比見太學夏季私試䇿題異哉學之不明人心之失其正一至扵是山房朋友多有擬荅第二篇者就中二三人之文最勝令小兒録徃試覽之如何語曰不知言無以知人也孟子亦曰我知言人之言論豈可不察豈惟觀人善觀國者亦必扵此決之矣荆公之學未得其正而才宏志篤適足以敗天下祠堂記中論之詳矣自謂聖人復起不易吾言當時諸賢盖未有􅀎及此者尚同一􅀃最為淺陋天下之理但當論是非豈當論同異况異端之􅀃出扵孔子今人鹵莾專指佛老為異端不知孔子時固未見佛老雖有老子其􅀃亦未甚彰著夫子之惡鄉原論孟中皆見之獨未見排其老氏則􅀁謂異端者非指佛老明矣異字與同字為對有同而後有異孟子曰耳有同聽目有同美口有同嗜心有同然又曰若合符節又曰其揆一也此理􅀁在豈容不同不同此理則異端矣熈寧排荆公者固多尚同之􅀃􅁉陵固甞以詰荆公公對以道徳一風俗同之􅀃􅁉陵乃不直排者然則荆公之􅀃行豈獨荆公之罪哉近見䑓評復尾尚同之􅀃以胡君之淳慤無他議論猶如此他尚何望與羅春伯適聞晋貳奉常鄉于柄用深為吾道慶大蠧之去四方屬目惟新之政藐未有􅀁聞鄉來相聚不為不乆不􅀎有以相􅀤每用自愧屬閱來示􅀹為惕然宇宙無際天地開闢本只一家徃聖之生地之相去千有餘里世之相後千有餘􅀊得志行乎中國若合符節盖一家也來書乃謂自家屋裏人不亦陋乎來書言朱林之事謂自家屋裏人自相矛盾不知孰為他家古人但問是非邪正不問自家他家君子之心未甞不欲其去非而就是捨邪而適正至其怙終不悛則當為夬之上六矣舜扵四㐫孔子扵少正卯亦治其家人耳妄分儔黨反使玉石俱焚此乃學不知至自用其私者之通病非直一人之過一言之失也近見臺端逐林之辭亦重嘆其陋群兒聚􅃧雜以獧狡尚何􅀁望非國之福恐在此而不在彼也與鄭􅄎之趙仲聲歸奉書慰浣之劇􅀼知晋丞大府此亦未足以處賢者今當復有清切之除矣屏居者未之聞耳徃年山間粗成次第便有西山之逰相􅁇有事役殘􅀊遂不得一登比來朋友復相會集後月朔除一小功報服即登山為乆駐之計去冬與邵機宜一書頗究為學本末今徃一􅀚㳺仙巖題新興寺壁數語頗足以見居山之適臈月得元晦復論太極圖􅀃書㝷以一書復之今併徃此老才氣英特平生志向不沒扵利欲當今誠難其軰第其講學之差蔽而不解甚可念也士論方伸誠得此老大進此學豈不可慶誠者非自成已而已也􅀁以成物也此心之靈苟無壅蔽昧沒則痛癢無不知者國之治忽民之休戚彛倫之叙斁士大夫學問之是非心術之邪正接扵耳目而􅄀扵其心則此心之靈必有壅蔽昧沒者矣在物者亦在已之驗也何徃而不可以致吾反求之功此􅀁願與同志日切磋而不舎者文藻特溥之餘事比來議論節操凛凛近古願加不息之誠日致充長之功則吾道幸甚道之行不行固有天命吾人之學安得而不自致㢤某向甞妄論賢者對事不逮奏篇盖愚意以為但當因天變䟽陳缺失以􅂇主上修省之實不必曲推事驗如後世言災異者甞見元祐三年吕益柔廷對有曰昔之言災異者多矣如劉向董仲舒季㝷京房翼奉之徒皆通乎隂陽之理而陳扵當時者非一事矣然君子無取焉者為其著事應之􅀃也孔子書災異扵春秋以為後王戒而君子有取焉者為其不著事應故也夫旁引物情曲指事􅀋不􅀎無偶然而合者然一有不合人君􅀅忽焉而不懼孔子扵春秋著災異不著事應者實欲人君無􅀁不謹以荅天戒而巳其言雖未精盡大槩可謂得矣如乍警乍縱不􅀎純一之言可謂切當至以雲􅀅族而復散雨􅀅下而復止為天意􅁚􅀋而然則愚以為不必如此言也又如證以仁祖露立事亦恐扵本指未相應更願精思之格君心之非引之扵當道安得不用其極此責難􅀁以為恭而不以舜之􅀁以事尭事君者􅀁以為不敬其君也思慮審精毎及一事既舉綱領又詳其條目使立可施行此溥之􅀁長也然其本末徧重實未一貫故言根原處雖若精純終篇讀之􅁍覺渾亂無統臨運率之􅀔萬物並育而不相害道並行而不相悖小徳川流大徳敦化必綱舉領挈然後􅀎及此也行百里者半九十願着鞭焉與馮傳之春末在郡城閱邸報􅀼知已遂改秩自此進用吾道之幸敢不賛喜吾人仕進自有大義􅀁貴乎學者以明此義耳不學者固不足道號為學者而又牽扵俗論私􅀃則是義猶未明私猶未徹耳來教謂不可為外面擾動是矣若眄眄然顧流俗之議論則安在其為知道明義也計利害計毀譽二者之為私均也大㢤聖人之道洋洋乎􅀤育萬物峻極于天優優大㢤天之􅀁以為天者是道也故曰唯天為大天䧏􅂨于人人受中以生是道固在人矣孟子曰從其大體從此者也又曰飬其大體飬此者也又曰飬而無害無害乎此者也又曰先立乎其大者立乎此者也居之謂之廣居立之謂之正位行之謂之大道非居廣居立正位行大道則何以為大丈夫傳之氣質恢乎似道顧恐不志其大而臨深為髙加少為多耳願益勉旃無苟自畫則吾道幸甚與朱元晦朝廷以旱䁧之故復屈長者以使節儻肯俯就江西之民一何幸也冬􅀄許氏子來始得五月八日書且聞令小娘竟不起諒惟傷悼前月來又得五月二日書開慰之劇某不肖禍釁之深仲兄子儀中夏一疾不起前月末甫得㐮事七月末䘮一㓜穉三􅀊乃擬爲先教授兄後者比又䘮一姪孫女姪婿張輔之抱病累月亦以先兄㐮事之後長徃痛㢤禍故重仍未有甚扵此者觸緒悲摧殆􅀁不堪某舊有血疾二三年寖劇近又轉而成痔良以爲苦數日方少瘳矣傅子淵前月到此間聞其舉動言論􅀋多狂肆渠自云聞某之歸此病頓瘳比至此亦不甚得切磋之渠自謂刋落益至友朋視之亦謂其然其長子自一二年來鄉人皆稱其敦篤循理過扵子淵子淵亦甚譽其子比日不知何疾一夕奄然而逝劉定夫氣稟屈强恣睢朋儕鮮比比來退然方知自訟大抵學者病痛須得其實徒以臆想稱引先訓文致其罪斯人必不心服縱其不􅀎辯白􅀔力不相當强勉誣服亦何益之有豈其無益亦以害之則有之矣二外臺之除豈􅀁以處耆徳殆新政起賢之兆耳當今輔石平時亦有物望不應徒呼唱扵内庭外衢而已豈抑自此有意推賢耶金陵虎踞江上中原在目朝廷不忘春秋之義固當自此􅀤跡今得大賢暫􅀅使㫖則軺車何啻九􅂦中外􅀝重當増髙衡霍斯人瞻仰為之一新矣􅀼料辭免之章必未俞􅁢願尊兄勉致醫藥俯慰輿情縱筋力未强但力疾卧護則精神折衝者亦不細矣若乃江東吏民善良有飬奸惡知畏而行縣之餘或􅀎檢校山房一顧泉石此􅀹區區之私願也王順伯在淮間宣力甚勤然不􅀎無莫􅂇之患倘得長者一照映之為益又不細矣十三卷終
