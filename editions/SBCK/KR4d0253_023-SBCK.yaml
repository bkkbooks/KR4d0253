front:
  text: 􅁚山先生全集卷之二十三
  hash: sha256:d92c3d063eabc57e81ed338d94b98e02c2e8158e206d784b23189f3974512eaf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_023-1a}
body:
  text: 講義白鹿洞書院講義某雖少服父兄師友之訓不敢自棄而頑鈍踈拙學不加進毎懐愧􅅥恐卒􅀒其􅀄心方將求鍼砭鐫磨扵四方師友兾􅀗開􅀤以免罪戾比來得從郡侯祕書至白鹿書堂群賢畢集瞻覩盛觀􅀼自慶幸祕書先生敎授先生不察其愚令登講席以􅄍所聞顧惟庸虚何敢當此辭避再三不得所請取論語中一章陳平日之所感以應嘉命亦幸有以敎之子曰君子喻扵義小人喻扵利此章以義利判君子小人辭㫖曉白然讀之者苟不切已觀省亦恐未􅀎有益也某平日讀此不無所感􅀼謂學者扵此當辨其志人之所喻由其所習所習由其所志志乎義則所習者必在扵義所習在義斯喻扵義矣志乎利則所習者必在扵利所習在利斯喻扵利矣故學者之志不可不辨也科舉取士乆矣名儒鉅公皆由此出今為士者固不䏻免此然塲屋之得失顧其技與有司好惡如何耳非所以為君子小人之辨也而今世以此相尚使汨沒扵此而不䏻自㧞則終日從事者雖曰聖賢之書而要其志之所鄕則有與聖賢背而馳者矣推而上之則又惟官資崇卑禄􅅒厚薄是計豈䏻悉心力扵國事民􅀮以無􅀒扵任使之者哉從事其間更歷之多講習之熟安得不有所喻顧恐不在扵義耳誠䏻深思是身不可使之為小人之歸其扵利欲之習怛焉為之痛心疾首専志乎義而日勉焉慱學審問謹思明辨而篤行之由是而進扵塲屋其文必皆道其平日之學胸中之藴而不詭扵聖人由是而仕必皆共其職勤其事心乎國心乎民而不為身計其得不謂之君子乎秘書先生起廢以新斯堂其意篤矣凡至斯堂者必不殊志願與諸君勉之以毋􅀒其志淳熈辛丑春二月陸兄子靜來自金谿其徒朱克家陸麟之周清叟熊鑑路謙亨胥訓實從十日丁亥熹率寮友諸生與俱至扵白鹿書院請得一言以警學者子靜旣不鄙而惠許之至其所以􅀤明敷暢則又懇到明白而皆有以切中學者􅀮㣲深痼之病蓋聼者莫不悚然動心焉熹猶懼其乆而或忘之也復請子靜筆之扵簡而受藏之凡我同志扵此反身而深察之則庶乎其可不迷扵入德之方矣新安朱熹識大學春秋講義淳熈九年八月十七日楚人㓕舒蓼聖人貴中國賤夷狄非􅀻中國也中國得天地中和之氣固禮義之所在貴中國者非貴中國也貴禮義也雖更衰亂先王之典刑猶存流風遺俗未盡冺然也夷狄盛强吞并小國將乘其氣力以憑陵諸夏是禮義將無所措矣此聖人之大憂也楚人㓕弦㓕黃㓕江㓕六㓕庸至是又㓕舒蓼聖人悉書不置其所以望中國者切矣秋七月甲子日有食之旣春秋日食三十六而食之旣者二日之食與食之深淺皆歷家所䏻知是蓋有數疑若不爲變也然天人之際實相感通雖有其數亦有其道昔之聖人未嘗不因天變以自治洊雷震君子以恐懼修省君子無終食之間違仁造次必扵是顛沛必扵是所以修其身者素矣然洊震之時必因以恐懼修省此君子之所以無失德而盡事天之道也况日月之眚見扵上乎遇災而懼側身脩行欲銷去之此宣王之所以中興也知天災有可銷去之理則無疑於天人之際而知所以自求多福矣日者陽也陽為君為父為夫為中國苟有食之斯為變矣食至於既變又大矣言日不言朔食不在朔也日之食必在朔食不在朔歴差也冬十月已丑葬我小君敬羸襄仲殺太子惡敬羸為之也敬羸非嫡而薨以夫人葬以小君魯君臣之責深矣春秋作而亂臣賊子懼蓋為是也雨不克葬庚寅日中而克葬葬不為雨止以其有雨備也雨不克葬是無雨備潦車載蓑笠士喪禮也諸侯葬其母而無雨備豈禮也哉城平陽平陽魯邑也冬使民時也然宣公葬母不能為雨備不易時而遽興土工罪不可逃矣楚師伐陳前年晉衛侵陳以其即楚之故至是楚始伐之是楚未能盡得志於陳也楚子陸渾之役觀兵周疆問鼎輕重是年疆舒蓼及於滑汭盟吳越而還其􅆠至矣然猶未盡得志扵陳鄭之間當是時使中國之君臣􅀎恐懼自治明其政令何遽不􅀎遏其鋒哉又十年二月七日九年春王正月公如齊公至自齊夏仲孫蔑如京師古者諸侯之扵天子比年一小聘三年一大聘五年一朝天子五年一廵狩周制六年五服一朝又六年王乃時廵考制度于四岳諸侯各朝于方岳所以考制度尊天子也故曰天子無事與諸侯相見曰朝考禮正刑一德以尊天子榖梁子以為天子無事諸侯相朝誤矣禮所謂兩君相見者不䏻無是事耳非定制也比年小聘三年大聘諸侯交相聘問則有定制矣故曰朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也是故一不朝則貶其爵再不朝則削其地三不朝則六師移之三王之通制也義之所在非由外鑠根諸人心逹之天下先王為之節文著為典訓苟不狂惑其誰䏻渝之宣公即位九年兩朝于齊乃一使其大夫聘于周室王迹旣熄綱常淪斁逆施倒置恬不為異春秋之作其得巳哉直書于䇿比而讀之而無懼心者吾不知矣齊侯伐萊萊㣲國也三年之間兩勤兵扵萊齊侯之志可見扵此矣秋取根牟魯侯之志猶齊侯也八月􅅬子卒名不登載書簡牘則不名九月􅀳侯宋公衞侯鄭伯曹伯㑹于扈􅀳荀林父帥師伐陳􅀳自靈公不君之後浸不競扵楚楚之政令日修兵力日强然聖人之情常拳拳有望扵􅀳非􅀻之也華夷之辨當如是也前年陳受楚伐勢必向楚扈之㑹乃為陳也陳不卽􅀳荀林父䏻併將諸侯之師以伐陳春秋蓋善之辛酉􅀳侯黒臀卒于扈冬十月癸酉衞侯鄭卒書地不卒于國都也不書葬魯不㑹也宋人圍􅅬􅅬雖小國圍之則非將卑師少也􅅬子卒未數月興兵圍之書人之為貶明矣楚子伐鄭􅀳郤缺帥師救鄭伐陳救鄭􅀳之諸臣猶未忘文公之霸業春秋蓋善之陳殺其大夫􅂥冶稱國以殺罪累上也􅂥冶以直諌見殺名之陳罪著矣又七月十七日六月宋師伐􅅬宋大國也􅅬小國也􅅬安􅀎害宋宋之伐􅅬陵蔑小弱以逞所欲耳左氏謂􅅬人恃􅀳而不事宋然􅀳之伯業方不競􅅬固㣲國何恃之有或者事􅀳之故而有􅆣扵宋故歟宋亦何義而責􅅬之事已大當字小恤其不及焉可也去年因其喪而圍之今年又興師而伐之其為陵蔑小弱以逞所欲明矣陳常弑其君孔子朝魯侯而請討之前月陳方以弑君告宋為鄰􅀖不知此何時耶而牟牟焉興師伐􅅬以逞所欲尚得為有人心者乎公孫歸父如齊葬齊惠公宣公為弑君者所立懼齊見討故事齊以求免齊恱其事巳而定其位自是齊魯之交厚而魯之事齊甚謹齊侯之卒宣公旣身奔其喪及其葬也又使其貴􅀸徃㑹直書于䇿亂臣賊子得無懼乎歸父仲遂之子貴而有寵弑君者仲遂也􅀳人宋人衛人曹人伐鄭左氏謂鄭及楚平諸侯伐鄭取成而還諸侯伐鄭而稱人貶也􅀳楚爭鄭爲日乆矣春秋常欲􅀳之得鄭而不欲楚之得鄭與鄭之從􅀳而不與鄭之從楚是貴􅀳而賤楚也􅀳之所以可貴者以其爲中國也中國之所以可貴者以其有禮義也鄭介居二大國之間而從扵强令亦其􅀔然也今􅀳不䏻芘鄭致其從楚陳又有弑君之賊􅀳不䏻告之天王聲罪致討而乃汲汲扵爭鄭是所謂禮義者㓕矣其罪可勝誅哉書人以貶聖人扵是絶􅀳望矣秋天王使王季子來聘宣公即位十年屢朝于齊而未嘗一朝于周䏻奔諸侯之喪而不䏻奔天王之喪􅀎使其貴􅀸㑹齊侯之葬而不䏻使人㑹天王之葬如是而天王猶使王季子來聘則冠􅂂倒置君臣之倫汨喪殆盡矣公孫歸父帥師伐邾取繹魯之伐邾無以異扵宋之伐􅅬特書取繹罪益重矣又十一月二十二日大水太極判而為隂陽隂陽播而為五行天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生􅁟地十成之五竒天數陽也五偶地數隂也隂陽竒偶相與配合而五行生成備矣故太極判而為隂陽隂陽即太極也隂陽播而為五行五行即隂陽也塞宇宙之間何徃而非五行水火金木􅁟榖謂之六府􅁟爰稼穡榖即􅁟也以其民命所係别為一府總之則五行也洪範九章􅀄一曰五行此其在天之本也次二曰敬用五事次三曰農用八政次四曰恊用五紀次五曰建用皇極次六曰乂用三徳次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極者此其在人之用而所以爕理隂陽者也日月五緯謂之七政四時行焉歷數興焉人君代天理物歷數在躬財成輔相參賛爕理之任扵是乎在故堯命羲和舜在璿璣皆二典大政夫金穰水毀木饑火旱天之行也堯有九年之水則曰浲水警予蓋以為已責也昔之聖人小心翼翼臨深􅂂氷參前􅀝衡疇昔之所以事天敬天畏天者蓋無所不用其極而菑變之來亦未甞不以為巳之責周道之衰王迹旣熄諸侯放肆代天之任其誰尸之春秋之書災異非明乎易之太極書之洪範者孰足以知夫子之心哉漢儒專門之學流為術數推􅀋求騐旁引曲取狥流忘源古道榛塞後人覺其附㑹之失反滋怠忽之過董仲舒劉向猶不􅀎免吁可歎哉是年之水仲舒以為伐邾之故而向則以為殺子赤之咎是奚足以知天道而見聖人之心哉季孫行父如齊冬公孫歸父如齊齊侯使國佐來聘宣公是年身如齊者二使其臣如齊者三聞天王使王季子來聘矣未聞身如京師與使其臣如京師也不待詳攷其事而罪巳著矣左氏載行父出莒僕之事陳􅁩甚高且曰先大夫􅆇文仲敎行父事君之禮行父奉以周旋弗敢失墜齊惠公之卒公旣親奔其喪矣王季子之聘魯未易時而行父僕僕徃聘于齊知事君之禮而奉以周旋者果如是乎歸父之徃則以取繹之故齊惠公卒未踰年而國佐寔來狥􅀻棄禮見利而不顧義安然行之不畏于天不愧于人人心之冺㓕一至扵此吁可畏哉饑作之君師所以􅂇上帝寵綏四方故君者所以為民也書曰天視自我民視天聼自我民聼孟子曰民為貴社稷次之君為輕􅀊之饑穰百姓之命係焉天下之事孰重扵此春秋書饑蓋始扵是聖人之意豈特以責魯之君哉楚子伐鄭當是時晋伯旣不復可望齊魯之間熟爛如此楚子之肆行其誰遏之伐鄭之書聖人所傷深矣左氏所載士㑹逐楚師于頴北不見扵經縱或有之亦不足為輕重也荆門軍上元設􅆹講義五皇極皇建其有極歛時五福用敷􅃬厥庶民惟時厥庶民于汝極􅃬汝保極皇大也極中也洪範九疇五居其中故謂之極是極之大充塞宇宙天地以此而位萬物以此而育古先聖王皇建其極故䏻參天地賛化育當此之時凡厥庶民皆䏻保極比屋可封人人有士君子之行叶氣嘉生薰為太平嚮用五福此之謂也皇建其有極即是歛此五福以􅃬庶民捨極而言福是虗言也是妄言也是不明理也惟皇上帝䧏􅂨于下民􅂨􅀰極也凡民之生均有是極但其氣禀有清濁智識有開塞天之生斯民也使先知覺後知先覺覺後覺古先聖賢與民同􅀋所謂天民之先覺者也以斯道覺斯民者即皇建其有極也即歛時五福用敷􅃬厥庶民也今聖天子重明于上代天理物承天從事皇建其極是彛是訓于帝其訓無非歛此五福以􅃬爾庶民郡守縣令承流宣化即是承宣此福為聖天子以􅃬爾庶民也凡爾庶民知愛其親知敬其兄者即惟皇上帝所䧏之􅂨今聖天子所􅃬之福也若䏻保有是心即為保極宜得其壽宜得其福宜得康寜是謂攸好德是謂考終命凡爾庶民知有君臣知有上下知有中國夷狄知有善惡知有是非父知慈子知孝兄知友弟知恭夫義婦順朋友有信即惟皇上帝所䧏之􅂨今聖天子所􅃬之福也身或不壽此心實壽家或不富此心實富縱有患難心實康寜或為國死事殺身成仁亦為考終命實論五福但當論人一心此心若正無不是福此心若邪無不是禍世俗不曉只􅀅目前富貴為福目前患難為禍不知富貴之人若其心邪其事惡是逆天地逆􅀑神悖聖賢之訓畔君師之教天地􅀑神所不宥聖賢君師所不與忝辱父祖自害其身靜時回思亦有不可自欺自瞞者若扵此時更復自欺自瞞是直欲自絶㓕其本心也縱是目前富貴正人觀之無異在囹圄糞􅁾之中也患難之人其心若正其事若善是不逆天地不逆􅀑神不悖聖賢之訓不畔君師之敎天地􅀑神所當佑聖賢君師所當與不辱父祖不􅀒其身仰無所愧俯無所怍雖在貧賤患難中心自亨通正人逹者觀之即是福德作善䧏之百祥作不善䧏之百殃積善之家必有餘慶但自考其心則知福祥殃咎之至如影隨形如響應聲必然之理也愚人不䏻遷善遠罪但貪求富貴却祈神佛以求福不知神佛在何處何縁得福以與不善之人也皇極在洪範九疇之中乃洪範根本經曰天乃􅃬禹洪範九疇聖天子建用皇極亦是受天所􅃬歛時五福􅃬爾庶民者即是以此心敷于敎化政事以􅀤明爾庶民天䧏之􅂨不令䧟溺爾庶民􅀎保全此心不䧟邪惡即為保極可以報聖天子敎育之恩長享五福更不必别求神佛也洪範一篇著在尚書今人多讀未必􅀎曉大義若其心正其事善雖不曾識字亦自有讀書之功其心不正其事不善雖多讀書有何所用用之不善反增罪惡耳常􅀊以是日建醮扵設􅆹為民祈福􅀼惟聖天子建用皇極以臨天洪範九疇􅀄一曰五行次二曰敬用五事次三曰農用八政次四曰恊用五紀次五曰建用皇極次六曰乂用三德次七曰明用稽疑次八曰念用庶徴次九曰嚮用五福威用六極載九􅂂一左三右七二四為肩六八為足縱橫數之皆十五􅁚山先生全集卷二十三
