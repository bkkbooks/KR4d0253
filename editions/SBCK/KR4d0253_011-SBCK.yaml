body:
  text: 與朱濟道此理在宇宙間未甞有􅀁􅀮遁天地之􅀁以爲天地者順此理而無私焉耳人與天地並立而爲三極安得自私而不順此理㢤孟子曰先立乎大者則其小者不􅀎奪也人惟不立乎大者故爲小者􅀁奪以叛乎此理而與天地不相似誠􅀎立乎其大者則區區時文之習何足以汨沒尊兄乎賢郎志向極可嘉向来供課想甚富此非不足也得勉之讀古書以涵飬此志幸甚二向辱恵書諸兄諸姪傳玩賛歎不􅀎去手比之今此書辭反如二人甚愧前日簡忽不􅀎悉意盡誠以相推挽遂使尊兄不􅀎勇去餘習尚此遲囬然詩􅁍甚佳詩意書辭亦不相似詩只两句便􅀃盡了後两句􅁍成剰語文理頗不相紹續今欲易後两句兼易前二字固不􅀎出尊兄之意但稍次其文耳此理扵人無間然昏明何亊異天淵自従斷􅁍閑牽引俯仰周旋只事天尊兄平日只􅀍閑牽引􅀁以不􅀎自立今既見得此理便宜自立此理即是大者何必使他人明指大者既見此理此理無非何縁未知今是此理非可以私智揣度傅㑹若􅀎知私智之非私智廢㓕此理自明若任其私智雖髙才者亦惑若不任私智雖無才者亦明顔子之學本末甚明尊兄未湏泥此而求但自理㑹真􅀎見得此理後日徐徐􅂑論語讀之渙然冰釋矣某甞令後生讀書時且精讀文義分明事節易曉者優㳺諷詠使之浹洽與日用相恊非但空言虗􅀃則向来疑惑處自當渙然冰釋矣縦有未觧固當候之不可强探力索乆當自通􅀁通必真實與私識揣度者天淵不足諭其逺也不在多言勉旃是望三示教日用工夫甚善尊兄氣質忠厚得扵天者加人數等但向来累外䖏多得日剥落之以全吾天則吾道幸甚􅀁謂心誠求之雖不中不逺矣平居不與事接時切湏鞭䇿得烱然不可昧沒對越上帝則過事時自省力矣與吴子嗣䘮禮與其哀不足而禮有餘也不若禮不足而哀有餘也此聖人之格言非天子不議禮禮亦未可輕議也欲去其不經鄙俗之甚者而略近扵古則有先文正公書儀在何必他求二不以前􅀁復書為罪又下問之不肯苟狥流俗孜孜禮法以求依據吾子之志善矣然事有輕重本末當知􅀁先後禮文隳闕其来乆矣􅅬文公􅀁問孟子􅀁荅皆其大端儀節之末去其鄙俗不􅀴者可也来書謂定之僕手此􅀹未宜吾子在衰絰之中不得巳次序以授執事者可也安可謂之定栢人者乃巫覡􅀁為不􅀴甚矣吾家未甞用也祝稱卜􅌾虞子與夫異辭􅀚二孤之過可以􅀋見䘮􅀕當論􅀁主不可言同也儀中除此三節諸皆無害三徃􅀊蒙致書見問以䘮禮如生年少􅀎不狥流俗求古制又其文用字造語皆慕竒異不肯碌碌以為窮鄉下邑乃有後生􅀎如此亦不易得故生之書辭不合律度者雖多皆不暇責獨荅􅀁以問之要務誘掖之庶㡬其進既而聞生詭異其服為巫覡事深用駭怛亦頗悔初不知生而􅃍相對荅有失言之罪兹奉書乃有悔過自訟之辭人誰無過過而不改是爲過矣過而􅀎改善莫大焉今生誠􅀎幡然自新何幸如之雖然生家相距百里而近乃有不亟扵求見長者而徒數以書來則改過之言亦未敢深信然吾今猶云云若此者望扵生厚矣生其謹思之四文字之及條理􅙾然弗畔扵道􅀹以爲慶第當勉致其實毋􅀝扵文辭不言而信存乎徳行有徳者必有言誠有其實必有其文實者本也文者末也今人之習􅀁重在末豈惟䘮本終􅀅併其末而失之矣陳教授舊亦曽略相從惟其無本故其學日謬書末􅀁紏三條屬意精切但前􅀁􅂑數語亦皆非是學無端緒雖依放聖賢而爲言要其㫖歸實已悖戾龎雜膚淺何足爲據若􅀁謂致其譽聞不冺冺碌碌者􅀹不可不辯人有實徳則知疾沒世而名不稱者非疾無名疾無徳也令聞廣譽施扵身者實徳之􅀤固如是也庶㡬夙夜以永終譽者欲其徳之常乆而不已也彼未甞深致自克之功私意自爲主宰方懵扵知徳則斯言殆適以附益其好名求勝之習耳此􅀹不可不辯五前書致其聞譽之􅀃乃後世學者大病不􅀎深知此病力改敝習則古人實學未易言也吾友更當深扵此處􅀚省使舉動云為判然與􅇮者異轍則吾道有望矣復前書時亦欲相勉未須與陳教授徃復後偶忘之至今不滿近歸自象山諸事冗擾文字亦不曽􅀅歸旦晚亦須便登山儻􅀎一來諸當面盡六録示仙郡首篇䇿問大㫖􅀼􅀁未諭新君即位曾未期月而遽曰責成無效何課效之速如此㢤以夫子之聖不過曰三年有成唐虞之朝雖三載考績必三考而後黜陟幽明羽山之殛盖在九載之後伯禹作司空猶八年扵外兖州之賦作十有三載乃同古今難易縦有不同亦安有扵半年之間而遽責其成效之理㢤又古􅀁謂責成者謂人君委任之道當專一不疑貳而後其臣得以展布四體以任君之事悉其心力盡其才智而無不以之怨人主髙拱扵上不參以已意不間以小人不維制之以區區之繩約使其臣無掣肘之患然後可以責其成功故既已任之則不苛察其􅀁為但責其成耳此古人用責成二字之本㫖也今泛課功效而用此二字則用字亦未愜當且古􅀁謂賞罰者亦非為欲人趋亊赴功而設也天命有徳五脤五章㢤天討有罪五刑五用㢤其賞罰皆天理􅀁以納斯民扵大中躋斯世扵大和者也此與後世功利之習燕越異鄉矣何時登山當究其􅀃明日欲登雲臺瞰􅀑谷究南山之􅀁自來􅁍扁舟浮梅潭㳂醹口以歸度旬日而後可反山房也七承巳登山結茅深用嘉歎近得周元忠書謂幹伯伯珍諸人有意遣輿夫相迎且問期日吾荅以霽日䴡景晴雲絢文即吾就道時也是日正春分明日即大開徹輿夫至今未來豈其俟后􅁟之乾又窘隂雨故耶昨日光風頗還舊􅀚乃今祁雲漫天寒颷先雨又復凄然似秋矣遐想雲臺領䄂諸峰儲英育秀以相料理老子扵此興復不淺行止乆速在天與人而巳若此雨未止􅀎冐之一來􅀹見嗜學八此理充塞宇宙天地􅀑神且不􅀎違異况扵人乎誠知此理當無彼已之私善之在人猶在已也故人之有善若已有之人之彦聖其心好之不啻若自其口出胥訓告胥保恵胥教誨此人之情也理之􅀁當然也亦何嫌何疑誠者非自成已而巳也􅀁以成物也成已仁也成物智也性之徳也合内外之道也顧恐未􅀎成巳耳若私淑二字則出扵孟子當深明其㫖不當􅁿用扵此此用字之疵不足以逹理而􅀎為理之累五代史政湏􅀧對來本極佳草廬在二池之間欲名以濯纓湏来此當為書之與傅季魯二十四日􅀤敝廬晚宿資􅀦二十五日􅀚半山瀑由新蹊抵方丈已亭午山木益稠蝉聲益清白雲髙屯疊嶂畢露踈雨逓􅎈清風漻然不知其為夏也何時来此共之適欲􅀦紀􅀧對一事或未􅀎来可先遣至與陳宰伐松之盗仰見嚴明不容逭戮比至山間具伏其罪祈免窮究論其􅀄心乖戾殊甚至以雀角之詞煩溷官府牽率縣僚喧動隣里重費賢大夫之神明此豈可貸然斯人素狃􅁖習乆為鄉里之害今兹適逢令尹之賢乃肯悔過效順幡然改圖亦有可喜來此自訴其悔艾遷改之意甚力儻其自此囬心易慮以歸扵善諒扵豈弟之懐亦必喜之前日亦以周䖏之事反復勉之矣斯人有公状首伏未敢自前併用封納二無似之蹤屏處是適諸公過聽録其姓名􅃍叨乗障之命進退惟谷荆門在重湖之北有道院之號事力優衍異時造物􅀁以䖏貴㳺者􅀹非枯稿之􅀁宜得然蒙泉之與飛雪金蓮之與玉芝未知孰愈同志之士方此盍簮紬繹簡編商略終古粗有可樂雖品質不齊昏明異趣未􅀎純一而開􅀤之驗變化之證亦不可謂無其涯也儻得乆扵是山以既厥事是􅀁願幸彌縫其闕而終恵撫之則惟賢大夫是望與李宰教以學記􅀁施足認不鄙然此文之作豈為陳君設比之墓銘不有間乎貴溪安仁金谿三邑最為比隣十餘年間不聞有賢令尹吏胥猖獗姦民以嚚訟射利者與吏相表裏公為交闘肆行無忌柔良不得安迹陳宰􅀁為固多未滿人意至其使此軰縮首屏迹柔良隂受其恵則亦其􅀁長也三邑十餘年間誠未見有此視前政則優視比縣則優似未為過許甞􅂪渠見訪一聞大義誠有愧恧自失之實使此心不冺㓕復遇箴藥亦安知其不􅀎幡然也在門下􅀹宜略扵録其罪而詳扵求其長恃髙明與契愛之厚不敢有􅀮諒不督過也二來教謂容心立異不若平心任理其􅀃固美矣然容心二字不􅀴見獨列子有吾何容心㢤之言平心二字亦不􅀴見其原出扵荘子平者水停之盛也其可以為法也内保之而外不蕩也其􅀃雖託之孔子實非夫子之言也彼固自謂寓言十九其書道夫子言行者徃徃以致其靳侮之意不然則借尊其師不然則因以逹其􅀃皆非事實後人據之者陋矣又韓昌􅀺與李翊論文書有曰平心而察之自韓文盛行後學士大夫言語文章間用平心字寖多究極其理二􅀃皆非至言吾何容心之􅀃即無心之􅀃也故無心二字亦不􅀴見人非木石安得無心心扵五官最尊大洪範曰思曰睿睿作聖孟子曰心之官則思思則得之不思則不得也又曰存乎人者豈無仁義之心㢤又曰至扵心獨無􅀁同然乎又曰君子之􅀁以異扵人者以其存心也又曰非獨賢者有是心也人皆有之賢者􅀎勿䘮耳又曰人之􅀁以異扵禽獸者㡬希庶民去之君子存之去之者去此心也故曰此之謂失其本心存之者存此心也故曰大人者不失其赤子之心四端者即此心也天之􅀁以與我者即此心也人皆有是心心皆具是理心即理也故曰理義之恱我心猶芻豢之恱我口􅀁貴乎學者為其欲窮此理盡此心也有􅀁􅂪蔽有􅀁移奪有􅀁䧟溺則此心為之不靈此理為之不明是謂不得其正其見乃邪見其􅀃乃邪􅀃一溺扵此不由講學無自而復故心當論邪正不可無也以為吾無心此即邪􅀃矣若愚不肖之不及固未得其正賢者智者之過失亦未得其正溺扵聲色貨利狃扵譎詐姦宄牿扵末節細行流扵髙論浮􅀃其智愚賢不肖固有間矣若是心之未得其正蔽扵其私而使此道之不明不行則其為病一也周道之衰文貌日勝良心正理日就蕪没其為吾道害者豈特聲色貨利而巳㢤楊墨皆當世之英人􅀁稱賢孟子之􅀁排斥拒絶者其為力勞扵斥儀衍軰多矣􅀁自許以承三聖者盖在楊墨而不在衍儀也故正理在人心乃􅀁謂固有易而易知簡而易從􅀄非甚髙難行之事然自失正者言之必由正學以􅂶其私而後可言也此心未正此理未明而曰平心不知􅀁平者何心也大學言欲正其心者先誠其意欲誠其意者先致其知致知在格物物果巳格則知自至􅀁知既至則意自誠意誠則心自正必然之􅀔非强致也孟子曰我亦欲正人心息邪􅀃詎詖行放􅁋辭以承三聖者當是時天下之言者不歸楊則歸墨楊朱墨翟之言盈天下自孟子出後天下方指楊墨爲異端然孟子既沒其道不傳天下之尊信者抑尊信其名耳不知其實也指楊墨爲異端者亦指其名耳不知其實也徃徃口闢楊墨而身爲其道者衆矣自周衰此道不行孟子沒此道不明今天下士皆溺扵科舉之習􅀚其言徃徃稱道詩書論孟綜其實特借以為科舉之文耳誰實為真知其道者口誦孔孟之言身蹈楊墨之行者盖其髙者也其下則徃徃為楊墨之罪人尚何言㢤孟子沒此道不傳斯言不可忽也諸人交口稱道門下之賢不覺􅄍露至此病方起不暇櫽括其辭亦惟通人有以亮之儻有未相孚信處當遲後便與趙景昭新除極為賛喜􅀖之司直非兄其誰歸刑官古人􅀁重臯陶尸陳謨論道之任而舜命作士今司直之名猶在大理又適為賢者進用之階殊令久増慕古之懐今日法制有未容人􅃍實其名耳然珠藏淵媚兄其必有以處之矣與王順伯某祠秩之滿􅀄欲復丐之適一二士友郵致諸公之意來促此文謂欲因是圖􅀁以相處自度屏棄之人豈宜上累當􅂗遂絶此念且甘貧餒以迯罪戾不謂竟􅂪荆門之除官閑境勝事力自贍無匱乏之憂又假以遲次使得既泉石之事究問學之樂為幸多矣非出推轂之素餘論之􅂇何以逮兹敢不知自教以罷屯田􅀵羡鑄之詳可謂恩威並立調度有方徤羡徤羡然在尊兄分上直餘事耳旦暮賜環入儀禁掖雍容宻勿以究忠嘉使至理昭明隂氛澄廓群疑消釋衆善敷榮在位在職莫不恊力同心以終大義此豈非長者之任而君子之􅀁欲乎來教謂若要稍展􅀁學為國為民日見難如一日此固已然之成􅀔然􅀁以致此者亦人為之耳􅀎救此者􅀅不在人乎孟子曰責難扵君謂之恭吾人平日􅀁以自勵與朋友􅀁以相勉者素由斯道而後􅀎責難扵君大禹􅀁謂后克艱厥后臣克艱厥臣夫子􅀁謂為君難為臣不易者皆欲思其艱以圖其易耳非懼其難而不為與知其難而謂其必不可為也天下固有不可為之時矣而君子之心君子之論則未甞必之以不可為春秋􅀾國何如時也而夫子則曰如有用我者吾其為東周乎又曰如有用我者期月而已可也三年有成孟子則曰以齊王猶反手也又曰飢者易為食渇者易為飲故事半古之人功必倍之惟此時為然曰王猶足用為善王如用予則豈徒齊民安天下之民舉安王庶㡬改之予日望之曰千里而見王是予􅀁欲也不遇故去豈予􅀁欲㢤人之遇不遇道之行不行固有天命而難易之論非􅀁以施扵此也􅇮者尸位之人固為朝廷之大祟群小之根柢而徃年天去之今年天殺之則天之􅀁以愛吾君而相斯人者為力宏矣有官君子豈可不永肩一心相與勵翼以􅂇佐吾君仰承天意乎人之才智各有分限當官守職惟力是視商之三仁亦人自獻于先王不容一槩至扵此心此徳則不容有不同耳沮溺接輿豈是庸人凡士然􅀁以異乎聖人者未免自私耳來教謂既非以此要官職只是利國利民處隨力為之不敢必朝廷之從與事功之成此真長者之本心也誠􅀎廓而充之推而廣之則髙明廣大誰得而禦由前之􅀃􅀅自昭白有不待區區之言者矣二使節在淮間時甞復書薦區區㡬有萬一之􅂇後包敏道自浙歸乃知其時方得啓􅀚􅂪復書謂為至論今三復來貺與􅀁傳聞議論乃知實未􅂪省察疇昔相與非徒親戚理有未安義不容嘿尊兄清修寡欲與物不競與人處似不􅀎言者人莫不愛之獨有志之士徃徃有不快扵尊兄向來永嘉諸人甚敬尊兄政績而又議其嚴酷無儒者氣􅁚此固是謬論某甞深排之矣是不足道又其間􅁍有疑尊兄􅀁為不免流俗或謂是鄉原之􅀋尊兄以抗志古人為非有何以是嘐嘐之意此一論則近是向來伯兄因與尊兄論及監司之職見尊兄􅀃不應求事但當因其至前而處之退甚不􅀃以為如此作監司民亦何頼某亦甞稍辯之然衆咸謂未免俗元晦又謂尊兄壊人已成之功以奉執政此乃復書未及與辯以某􅀚之尊兄天資極有過人處而大志不立未免同乎汙世合乎流俗獨其質剛而内明故有從善服義之長向來家庭議論與尊兄􅀄至西百官宅時窮冬踰月之集火爐中劇談皆始疑而終釋始辯而終息始之􅀁甚不可而終乃有切當之稱此必有以當尊兄之心而以為切事合理故疑釋辯息而稱之尊兄必非苟從而見䛕者自為奏邸居雖相邇而尊兄之情巳寖異扵前日盖相聚劇談時少切磋徃復研覈之工不􅁇尊兄之心復歸于毫矣况今相踈如是之乆固宜不相亮之甚日與㳺處議論者豈􅀎啓尊兄之意其庸陋無知牽引尊兄相與淪胥則有之矣如謂輟育英才之真樂親朱墨之塵冗想非􅀁好此是話作两截好與不好此在某之心不可誣也尊兄政如老氏􅀁譏夫子􅀁謂明乎禮義而陋扵知人心又引陳君舉之在福唐晦翁之在浙東以相警至謂親家􅀹更誠實不以小人待人尊兄昧扵知人一至扵此㢤某平日誠不以小人待人但非如尊兄􅀁謂盖人受天地之中以生其本心無有不善吾未甞不以其本心望之乃孟子人皆可以爲尭舜齊王可以保民之義即非以爲其人􅀁爲已徃者皆君子也至其見人之肺肝􅀎曲盡其情則自謂有一日之長向來火爐中與尊兄論人物􅀁以得切當之稱者皆以此别後三生作國王來總忘之也馮傳之至今未相符合然􅀁以相敬服者多在論人物處盖其人與傳之甚稔而與某甚生或不相識而但見其言論事節便􅀎知其心曲傳之以此相敬近福建一士人在此因言其鄉人事行某屢折之其人始力辯之而終屈服今其人扵吾道雖未甚有得而决其相從之意者實在此也此人亦晦翁處學者某平時􅀁望扵尊兄者甚厚若以此相扞格則是無復可言矣義不應只如此姑以此為請教之端未即合併更惟節抑以遂揚名之孝與􅀹延之違逺三席出入五年其為傾依何可云喻退然耆儒乆滯朝著當人之難晋掌奉常䖏事之變獨裁大典􅃡懐疇昔秪増慨嘆越自夀皇種椿重華聖上􅄃圖丹極而西掖北門髙文大冊􅁢屬椽筆山林之人矯首盛事欲賛一辭何可得㢤講讀論思固已甚晚有識之士咸謂未足以究盛藴日遲柄用㧞茅連茹使野無遺賢為吾君立太平之基而􅃈􅃈者自以薫蕕之不同輙肆媒蘖使人重為駭歎兹焉􅅯藩近甸公道其復信乎某􅇮者之歸得山房扵龍虎山之上㳺泉石之勝雲山之竒平生􅀁鮮見其略亦屢見扵朋舊書中尚欲稍記其詳亦以探討未遍猶未及也荆門之除良出望表豈推轂之賜有以致之耶幸尚遲次猶可畢草堂之役耳第私門禍故重仍五年之間尊㓜之䘮多扵年數妻家亦復多事妻母甫及大祥昨日又聞妻弟之訃乃鄉年至都下相見乞銘者薾然之軀殆無以堪長姪煥之徑徃求見􅀅過浙東迎先兄教授家嫂與姪女歸成呉正字婚禮諸事當􅀎面禀與豐宅之比年山居頗有泉石之趣朋來之樂每恨不得與吾宅之共此承需鄙文乏筆吏不􅀎多録謾徃數篇亦足以知山野况味逰仙巖題壁之末二姪其一名槱之者乃梭山兄之子賦質純雅少賛家政事上使下真無間言又愽通􅀴史射御筆札皆絶出等夷琴􅀹髙平時業此者皆在下風今年二十有六春末無疾一夕談􅀏間奄然長逝極為痛心亦恐欲知使人到山間又值持之疾作老夫亦苦頭痛登山未乆友朋踵至應酬殊役役作復莫究􅀁懐􅁚山先生全集卷之十一
