front:
  text: 􅁚山先生全集卷之二十二
  hash: sha256:5910c90e89ad745fa2bd71e6c77dd3414600b5155f63f676345595ba5b6ceed7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_022-1a}
body:
  text: 雜著武帝謂汲黯無學汲黯進積薪之言武帝為之黙然是必有所中矣已而曰人果不可以無學觀黯之言也日益甚人將求勝乎人以自信何患無辭謂黯無學未必不可武帝亦安取學而議人哉太史氏推原其故謂黯􅄶心不䏻無少望果足以知黯之心乎始遷榮陽令病歸田里後拜淮陽太守伏謝不受印及召見則曰臣願為中􅀰出入禁闥􅀘過拾遺卒不得請過李息曰黯棄居郡不得與朝廷議勉息早言張湯後之人誰實爲知黯者必信􅄶心之言此與兒童之見何異使視東越相攻不至而還曰不足以辱天子之使使視河内失火曰家人失火比屋延焼不足憂河南貧民傷水旱便宜持節􅀤粟以賑之請歸節伏矯制之罪天子招文學儒者告廷臣以所欲爲則對曰陛下内多欲而外施仁義柰何欲效唐虞之治乎上黙然怒變色而罷朝群臣或數黯黯曰天子置公卿輔弼之臣寜令從䛕承意䧟主扵不義乎且已在其位縱愛身柰辱朝廷何渾邪䧏漢漢􅀤車二千乘從民貰馬民匿馬馬不具欲斬長安令則爭之渾邪至賈人與市者坐當死五百人則爭之弊中國以事夷狄庇其葉而傷其枝之言誰䏻易之謂公孫弘徒懐詐飾智以阿人主取容謂張湯深文巧詆䧟人扵罪使不得反其真以勝為功淮南謀反􅀃公孫弘等如􅀤􅂪振落耳獨憚黯好直諌守節死義難惑以非卒以不敢若黯雖曰未學吾必謂之學矣雖然張湯更定律令可斥也何必曰高皇帝約束為哉武帝之事四夷非也何必曰與胡和親為哉此等皆黃老言誤之也學絶道喪老氏之􅀃盛行扵漢黯不幸生乎其時亦沒扵是雖然學老氏者多矣如黯之質固自有老氏所不䏻沒者惜哉其生弗逢時也放飯流歠而問無齒决是之謂不知務末哉武帝之所以求勝扵黯者乎帝自為太子時固巳憚其嚴矣即位旣乆大將軍青侍中帝踞厠而視之丞相弘燕見或時不冠至黯見不冠不見也甞坐武帳不冠黯奏事避而使人可之莊􅂇為黯請告論黯之長帝然之且曰古有社稷臣黯近之矣為中大夫固以切諌不得乆留出守東海大治帝聞而召之列扵九卿湯敗帝聞黯與息言則抵息罪令以諸侯相秩居淮陽其卒也官其弟至九卿官其子至諸侯相武帝之不䏻自克不樂扵黯之切直固也然其心之靈不䏻掩沒有以知黯者未必不愈扵後世吠聲之人也及其遂非而求勝則是心之靈或幾乎熄矣此孟子所謂終亦必亡而巳者也然則生弗逢時者豈不大可惜過而求勝者豈不大可畏哉張釋之謂今法如是張廷尉當渭橋下驚乘輿馬者以罰金文帝怒張廷尉爭以為不可更重是也然謂法者天子所與天下公共也今法如是而更重之是法不信扵民也方其時上使立誅之則巳今旣下廷尉廷尉天下平也一傾天下用法皆為輕重則非也廷尉固天下平也天子獨可不平乎法固所與天下公共也苟法有不當為廷尉者豈可不請之天子而修之而獨曰今法如是可乎虞書曰宥過無大周書曰乃有大罪非終乃為􅌌災適爾旣道極厥辜時乃不可殺縣人聞蹕匿橋下乆謂乘輿巳過而出至扵驚馬假令有敗傷亦所謂有大罪非終乃為􅌌災適爾是固不可殺釋之不䏻推明此義以祛文帝之惑乃徒曰法如是此後世所以有任法之弊而三代政刑所從而亡也雜􅀃皇極之建􅃔倫之叙反是則非終古不易是極是彛根乎人心而塞乎天地居其室出其言善則千里之外應之出其言不善則千里之外違之是非之致其可誣哉雖然苗民之弗用靈當堯之時則然矣逮舜受終而未有格心乃竄之于三危又數十載而禹始受命爰有徂征之師夫以堯舜之聖相繼而臨天下可謂盛矣蕭韶九成鳯凰來儀而蠢兹有苗侮慢自若不要諸舞干七旬之後而論扵其不恭自賢之日則違應之理殆無證扵此矣周自后稷積仁修德其來遠矣武王纉太王王季文王之緒以有天下而商之頑民乃至三世而弗化天之所以與人者豈獨缺扵是乎苗頑之扵唐虞商頑之扵成周可諉曰寡鄕原夫子所惡也而人皆恱之楊墨孟子所闢也而言者歸之夫子受徒乆矣而顔淵獨為好學其後無疑扵夫子之道者僅有曾子夫子沒而子夏子㳺子張乃欲强之以事有若自夫子不䏻喻之扵其徒曾子不䏻喻之扵其友則道之所存亦􅀌矣嗚呼是非之决于其明不于其暗衆寡非所决也苗民之未格商民之未化鄕原之未知其非楊墨之未歸扵儒子夏子㳺子張之徒未􅀎克巳而復禮彼其􅀻􅀃詖論可勝聼哉揆之至理則是所謂不善者也是所謂不明者也是其所以爲非者也苗民之格商民之化鄕原而知其非楊墨而歸扵儒子夏子㳺子張之徒一日克巳而復禮則是非之辨判然明矣是理之在天下無間然也然非先知先覺爲之開導則人固未免扵暗故惟至明而後可以言理學未至扵明而臆决天下之是非多見其不知量也純乎其善純乎其不善夫人而䏻知之也人非至聖至愚時非至㤗至否固有所不純有所不純則其大小本末輕重多寡表裏􅀮顯始卒乆近劇易幸不幸之變非至明誰䏻辨之有善扵此至大至重宜在所師宜在所尊而以其有不善焉而其善不遂其事不濟舉世莫辨而反以爲非反以爲懲豈不甚可歎哉念慮之正不正在頃刻之間念慮之不正者頃刻而知之卽可以正念慮之正者頃刻而失之卽是不正此事皆在其心書曰惟聖罔念作狂惟狂克念作聖然心念之過有可以形迹指者有不可以形迹指者今人有慢侮人之心則有慢侮之容慢侮之色慢侮之言此可以形迹指者也又有慢侮人之心而偽爲恭敬容色言語反若莊重此則不可以形迹指者也深情厚貌色厲而内荏者是也可以形迹指者其淺者也不可以形迹指者其深者也必以形迹觀人則不足以知人必以形迹䋲人則不足以救人非惟念慮之不正者有著扵形迹有不著扵形迹雖念慮之正者亦有著有不著亦有事理之變而不可以形迹觀者亦有善不善雜出者如比干之忠則可見如箕子佯狂㣲子適周不可謂之不忠如曾子之孝則可見如舜不告而娶不可謂之不孝此是事理之變而不可以形迹觀者如匡章之得罪扵其父乃在扵責善此是善不善雜出者通國皆稱不孝則便見匡章不得孟子乃見得他善不善處分明故與之遊又從而禮貌之常人不䏻知此等處又未足論世固有兩賢相值而不相知者亦是此處如老泉之扵王臨川東坡之扵伊川先生是也堯舜文王孔子四聖人聖之盛者也二典之形容堯舜詩書之形容文王論語中庸之形容孔子辭各不同誠使聖人者並時而生同堂而學同朝而用其氣禀德性所造所飬亦豈䏻盡同至其同者則禹益湯武亦同也夫子之門惟顔曾得其傳以顔子之賢夫子猶曰未見其止孟子曰具體而㣲曾子則又不敢望顔子然顔曾之道固與聖人同也非特顔曾與聖人同雖其他門弟子亦固有與聖人同者不獨當時之門弟子雖後世之賢固有與聖人同者非獨士大夫之明有與聖人同者雖田畆之人良心之不冺􅀤見扵事親從兄應事接物之際亦固有與聖人同者指其同者而言之則不容强異然道之廣大悉備悠乆不息而人之得扵道者有多寡乆暫之殊而長短之代勝得失之互居此小大廣狹淺深高卑優劣之所從分而流軰等級之所由辨也書䟽云周天三百六十五度四分度之一天體圎如彈丸北高南下北極出地上三十六度南極入地下三十六度南極去北極直徑一百八十二度强天體隆曲正當天之中央南北二極中等之處謂之赤道去南北極各九十一度春分日行赤道從此漸北夏至行赤道之北二十四度去北極六十七度去南極一百一十五度從夏至以後日漸南至秋分還行赤道與春分同冬至行赤道之南二十四度去南極六十七度去北極一百一十五度其日之行處謂之黃道又有月行之道與日相近交路而過半在日道之裏半在日道之表其當交則兩道相合去極逺處兩道相去六度此其日月行道之大畧也黃道者日所行也冬至在斗出赤道南二十四度夏至在井出赤道北二十四度秋分交扵角春分交扵奎月有九道其岀入黃道不過六度當交則合故曰交蝕交蝕者月道與黃道交也苟無所蔽必無所窮苟有所蔽必有所窮學必無所蔽而後可學不親師友則太玄可使勝易主扵道則欲消而藝亦可進主扵藝則欲熾而道亡藝亦不進以道制欲則樂而不厭以欲忘道則惑而不樂有有志有無志有同志有異志觀雞與􅇾可以辨志縶猿檻虎可以論志謹㣲不務小志大堅強有力沉重善思四方上下曰宇徃古來今曰宙宇宙便是吾心吾心即是宇宙千萬世之前有聖人出焉同此心同此理也千萬世之後有聖人出焉同此心同此理也東南西北海有聖人出焉同此心同此理也近世尚同之􅀃甚非理之所在安得不同古之聖賢道同志合成有一德乃可共事然所不同者以理之所在有不䏻盡見雖夫子之聖而曰回非􅂇我啓予者商又曰我學不厭舜曰予違汝弼其稱堯曰舎巳從人惟帝時克故不惟都俞而有吁咈誠君子也不䏻不害為君子誠小人也雖䏻不失為小人宇宙内事是巳分内事已分内事是宇宙内事人心至靈此理至明人皆有是心心皆具是理聖人固言仁矣天下之言仁者毎不􅀋聖人之言仁聖人固言義矣天下之言義者毎不􅀋聖人之言義聖人之言知道之言也天下之言不知道之言也知道之言無所䧟溺不知道之言斯䧟溺矣右賢而左䏻德成而上藝成而下道行道明則耻尚得所不行不明則耻尚失所耻得所者本心也耻失所者非本心也聖賢所貴乎耻者得所耻者也耻存則心存耻忘則心忘于寳晋論有耻尚失所之說求處情求處厚求下賢欲行浮扵名耻名浮扵行先生因讀表記書此語邪正純雜係念慮清濁强弱係血氣朱均管蔡志不變也非質不可變也苗格崇䧏聖人有以變其志也後世知有事而不知有政知責詳扵法而不知責詳扵人學者規模多係其聞見孩提之童未有傳習豈􅀎有是規模是故所習不可不謹處乎其中而䏻自㧞者非豪傑不䏻刼扵事􅀔而為之趨向者多不得其正亦理之常也道譬則水人之扵道譬則蹄涔汚沱百川江海也海至大矣而四海之廣狹深淺不必齊也至其為水則蹄涔亦水也常人所欲在富君子所貴在德士庶人有德䏻保其身卿大夫有德䏻保其家諸侯有徳䏻保其國天子有德䏻保其天下無德而富徒增其過惡重後日之禍患今日雖富豈䏻長保又况天生民而立之君使司牧之故君者所以為民也書曰徳惟善政政在飬民行仁政者所以飬民君不行仁政而反為之聚歛以富之是􅂇君虐民也宜為君子之所棄絶當戰國之時皆矜富國强兵以相侵伐爭城以戰殺人盈城爭地以戰殺人盈野故孟子推明孔子之言以為率􅁟地而食人肉罪不容扵死推論旣明又斷之曰人臣善戰者服上刑連諸侯者次之辟草萊任􅁟地者次之孟子在當時所陳者皆堯舜之道勉其君修德行仁勸之以閒暇之時明其政刑自謂以齊王猶反手耳使孟子得用必䏻使天下仕者皆欲立扵其朝耕者皆欲耕扵其野商賈皆欲藏扵其市行旅皆欲出扵其塗天下之民盡歸之則無敵扵天下矣此理甚明效可必至當時之君狥俗自安不䏻聼用其􅀃乃反謂之迂闊可謂不明之甚也􅁚山先生全集卷之二十二
