front:
  text: 象山先生全集卷之二十五
  hash: sha256:225c25f938fc64b8cb30abe1f83e97290eda5d2a03edb5df43add6b7258404f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_025-1a}
body:
  text: 詩少時作從來膽大胸膈寛虎豹億萬虬龍千從頭收拾一口吞有時此軰未妥帖哮吼大嚼無毫全朝飲渤澥水暮宿崑崙巔連山以為琴長河為之弦萬古不傳音吾當為君宣聞鸎百喙吟春不暫停長疑春意未丁寜數聲緑􅀣黃􅕢曉始􅀏從前着意聼鸎六言巧囀風臺急筦清逾石澗回溪好去枝枝驚夣無人心到遼西晚春出箭溪二首晴雲冉冉薄斜暉春靜衡門半掩扉風入墻頭丹杏晚高枝頻颭亂花飛又長蹊窈窕晴沙㬉緑􅀣交加細草香歸去不縁吾興盡月明􅀿得更褰裳子規六言柳院竹齋茅店雲蕪風􅀣煙溪聼徹殘陽曉月不論巴蜀東西蟬風露枯腸裏宫商兩翼頭壯號森木晚清嘯茂林秋贈化主學佛居山林徃徃儀狀野道人翩然來禮節何爾雅職事方惛惛言論飜灑灑安得冠其顛公材豈云寡踈山道中村靜蛙聲幽林芳鳥語警山樊紛皓葩隴麥揺青頴離懐付西江歸心薄東嶺忽忘飢歉憂飜令􅀤深省鵝湖和敎授兄韻墟墓興哀宗廟欽斯人千古不磨心㳙流積至滄􅈚水拳石崇成㤗華岑易簡工夫終乆大支離事業竟浮沉欲知自下升高處真偽先須辯只今挽石子重古重百里長􅀉命謀託􅀌今以京秩授麋至無賢愚州家督版帳殿最視所輸况乃積弊乆􅀫􅀒堆文符老姦乘倉皇隂拱為師模民窮歛愈急吏飽官自癯天子為焦勞宵旰思良圖高選部使者庶使德意敷石君在薦剡聞者皆懽愉不知何方民凋瘵遲君蘇君丞同安日􅀊旱當蠲租縣白如故事守怒牢睢旴頼君爭之力意得所請俞揭數授里正俾後不可渝又嘗宰􅀹溪吏軰􅀄闚􅎿首以財匱告欲闢侵民途君乃治稅籍􅁦蠧窮根株簡易以便民上下交相孚民自不忍􅀒豈復煩催驅􅀜征且損數孰謂儒術迂使家得此人黃屋何憂虞惜哉不及用重使吾嗟吁挽張正􅀿海門晝夜吼奔雷却立吳山亦壮哉前殿神僊三島邃正陽閶闔九天開玉階恭授太官賜􅁚簡親承御墨回多少簞瓢蓬甕士輸君留􅀫兩宫來和黄司業喜雪疇昔詩嚢未破慳􅌦瑰益自倍枵然才華甘落諸公後誠實徒居野老前臘雪晚成春雪早梅花靜對雪花妍從今長作豊登瑞廩􅁃家家贍九年遊湖分韻得西字命駕不辭春逕泥少􅅾高㑹帝城西物非我軰終無頼書􅀏􅂪莊只强齊天入湖光隨廣狹山藏雲氣互高低誰憐極目茭芻裏􅀮􅀮蒼龍卧古堤和楊廷秀送行學粗知方耻為人敢崇文貌蝕誠真義難阿世非忘世志不謀身豈誤身逐遇寛恩猶得禄歸衝臘雪自生春君詩正似清風快及我征㠶故起蘋送德麟監院歸天童和楊廷秀韻二首盡道吾廬登陟難上人得得到相㸔莫言無物堪延待也有茶澆舌本乾又聞􅀃淮民未免飢春頭巳掘草根歸羡君稇載還山去更挾星􅀰大字詩送勾熈載赴浙西塩平分浙江流東境浮海角其民仰魚塩乆巳困征槯麥禾與桑麻耕鋤到磽确徃􅀊比不登􅂣圃幾濯濯荒政勞廟謀賑廩聞數數飢羸不待飽共感君澤渥仁哉覆育恩所惡吏齷齪敎詔彌諄諄聼受祗藐藐何知國與民足已肆貪濁流離且未還已復事椎剥按察殊未曾聖主獨先覺重貽宵旰憂顧盻求卓犖君固岷峨英懐抱富荆璞邇來奏對語朝陽鳴鷟鸑鏘然歷帝聦簡記諒巳􅃀外臺適虗席妙選出親擢此節豈輕授委􅀉重山嶽除音九天下衆論靡瑕駁􅄃轡首越山青萍方在握送君無雜言當不􅀒所學題慧照寺春日重來慧照山經年詩債不曾還請君細數題名客更有何人似我頑贈畫梅王文顯子作寒稍巳逼真不須向上更稱神由來絶藝知音少只恐今人過古人簡朱幹叔諸友利名風浪日相催青眼難扵世上開何事諸君冐艱險杖藜來入白雲堆書劉定夫詩軸人生不更渉何由知險艱觀君一巨軸奚啻百廬山玉芝歌靈華􅀆英英芝質􅀆蘭形􅌦葩􅀆瑶實氷葉􅀆雪莖石室􅀆宛宛苔茵􅀆菁菁䕃長松之􅅯蹇帶飛瀑之琮琤實青端而黄表􅆌中藏而不矜匪自昭其明徳羗無愧􅀆疇䏻淳熈戊申余居是山夏􅀄與二三子相羊瀑流間得芝草三偶相比如卦畫成華如蘭玉明氷瑩洞徹照眼乃悟芝蘭者非二物也巳酉上已復覩瑶芽迫歸拜掃不及見其華是日訪風練飛雪始得一華方掇至案間時雲庵僧適至且求余言為鄕道余方作是歌因謂之曰當為子書之第持此以徃㑹當有賞音者紹熈元年三月二十六日象山翁書􅁚山先生全集卷之二十五
