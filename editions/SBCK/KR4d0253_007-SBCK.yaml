front:
  text: 􅁚山先生全集卷之七書
  hash: sha256:f8cd0f36d3fd1b0225cbe3a34d45de4217778cd5ce628d9b783a2d93573c2ac1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_007-1a}
body:
  text: 與勾熈載􅀄聞臺評相及固已恠駭然其餘二三人又頗當人心亟欲一見全文以覈厥㫖及得而觀之亦良可笑如論呉洪王恕人亦孰以為非然呉洪章中乃為唐仲友雪屈波及朱元晦謂以洪醖釀竟成大獄致仲友以曖昧去議者􅁈之此􅀹可笑吾人所安者義理義理所在雖刀鋸􅂦鑊有所不避豈與患得患失之人同其欣戚扵一陞黜之間哉顧所深念者道之消長治亂攸分羣徒比周至理鬰塞遏絶齊語楚咻盈庭聚蚊成雷明主􅀌矣雖然他山之石可以攻玉今之賢者亦加少爲多臨深爲高耳揆之古人豈􅀎無愧息肩王事一意自省尚友方冊勉所未至則是悠悠者蓋有􅀒扵國有􅀒扵民有􅀒扵公道而獨無􅀒扵我矣向日解舟不得靣别乗便寓此臨風依然與彭子壽垂示所疑􅀹見撝謙之德聖賢敎人固句句實頭但不可專指操存之􅀃操則存只是孔子一句孟子引在牛山之木常羙矣一章後試取孟子全章讀之㫖意自明白血脉自流通古人實頭處今人蓋木必知也楊子雲再下注脚便􅀃得不是此無足恠子雲亦未得為知道者也言固難以盡意而逹之以書問􅀹難蓋學之不講物未格知未至則其扵聖賢之言必未􅀎昭晣如辯蒼素數竒耦之審也凡所引用徃徃失其本㫖千里附書徃復動經􅀊時豈如㑹靣隨問隨荅一日之間更互酬酢無不可以剖析且如來示謂此心本體雖未嘗不存而舊習蔽錮亦未易遽去􅀂言雖未嘗不存則與操存捨亡之􅀃亦不相似矣大抵講明存飬自是兩節易言知至至之可與㡬也知終終之可與存義也大學言物格而後知至知至而後意誠意誠而後心正心正而後身脩孟子言始條理者智之事也終條理者聖之事也皆是聖賢敎人使之知有講學豈有一句不實頭今講學之路未通而以巳意附㑹徃訓立為成􅀃則恐反成心之蟊賊道之榛􅁄日復一日而不見其進志與事乖􅀃與行違首尾衡决本末舛逆未可歸之禀賦罪其懈怠也與邵中孚所示進學證驗此乃吾友天資朴茂立志堅篤故􅀎如此可喜可􅂟居天下之廣居立天下之正位行天下之大道乃吾分内事耳若不親師友汨沒扵流俗驅而納諸􅅈擭䧟穽之中而莫之知辟豈不可憐哉孟子曰苟得其飬無物不長苟失其飬無物不消今吾友旣得其本心矣􅁇此􅀎飬之而無害則誰得而禦之如木有根苟有培浸而無傷􅆷則枝葉當日益暢茂如水有源苟有䟽浚而無壅窒則波流當日益充積所謂源泉混混不舎晝夜盈科而後進放乎四海有本者如是大抵讀書詁訓旣通之後但平心讀之不必强加揣量則無非浸灌培益鞭䇿磨勵之功或有未通曉處姑缺之無害且以其明白昭晣者日加涵泳則自然日充日明後日本原深厚則向來未曉者􅀅亦有渙然冰釋者矣告子一篇自牛山之木嘗羙矣以下可常讀之其浸灌培植之益當日深日固也其卷首與告子論性處却不必深考恐其力量未到則反惑亂精神後日不患不通解也此最是讀書良法其他非相見莫􅀎盡尚書臯陶益稷大禹謨太甲􅀃命旅􅋙洪範無逸等篇可常讀之其餘少緩何時得相見諸當靣盡未聞千萬勉旃以卒賢業與顔子堅向在八石時當納區區之忠旣而子堅曾用節父諸人推轂遂變儒服端謂迂拙之言必􅂪見棄屬者屢􅂪見過每扵鄙言謂有所啟追念疇昔為之慨然乃知高明終當遠到豈遽不􅀎明衆人所同知之過哉承欲鄙語辭情懇至非苟然者聖哲之言布在方冊何所不備傳註之家汗牛充棟譬之藥籠方書搜求儲蓄殆無遺􅁼良醫所用不必竒異唯足以愈疾而巳苟厭其常忽其賤則非求醫之本意也向來不求名聲不較勝􅀒之語更願加察道非口舌所􅀎辨子細向脚跟下􅀧檢豈􅀎自謾日新歸山草草布此與張季忠聞元忠􅀃友朋間唯季忠篤志不懈甚為之喜人苟有志扵學自應隋分有所長益所可患者有􅂇長之病耳雖古聖賢尚不􅀎無過所貴􅀎改耳易稱顔子之賢曰有不善未嘗不知知之未嘗復行也由是觀之則顔子亦不􅀎無不善處今人便欲言行無一不善恐無是理徃徃只是好勝毎事要强人要人􅀧檢不得不知此意巳與古人背馳矣若無此意但寛平隨分去縱有過亦湏易覺易改便未覺未改其過亦湏輕故􅂇長之病甚扵忘季忠之意忘病自少所患有􅂇長之病雖未加益亦自平穩况必不􅀎不有益􅁘與胥必先近得呉伯顒書云麟之姪言必先治生甚進而學植荒落豈信然耶吾坐此三逕就荒吾之三逕如足下之六經也近有朋友褁糧十里而至者皆勤勤不相捨毎念足下去我之决何人性相反如此哉呉察丁母憂足下知之否向者嘗道先文勉勵足下勤學之言想亦復置度外不復問矣士别三日刮目相觀吾猶以故意待足下則誠有罪然足下果􅀎勉扵此乎伯顒以親愛之情扵足下不􅀎無所惜故復爲此言然在某亦可謂愚矣古人舉一隅不以三隅反則不復也者果如是乎􅁇自今願足下與改是與朱元晦勑局見編􅁼隆興以來寛恤詔令書鄉成矣去留之間亦可致力建請蕪纇多所刪削詔㫖則直録之著令縱有未安非􅀍㫖不得脩惟諸處申陳疑似必下本所或有不便乃可修改局中同官皆可人機仲􅀹相向元善以殊局近少得相欵謙仲屹然特立如故若向上事要亦難責比一再見以座客多魚鱗而至未得逹尊意俟從容當致之也淳叟事此中􅀄傳殊駭人聼徐覈其實乃知多小人􅀓㑹之辭要之後生客氣如此足見無學力也近見剡章全用金谿三胥之詞􅀹可笑彭仲剛子復者永嘉人為國子監丞近亦遭論此人性質不至淳羙然亦願自附扵君子徃􅀊求言詔下越次上封言時事甚衆其辨天台事􅀹力自此巳有睥睨之者矣近者省塲檢􅀧試卷官以主張道學其去取與􅃽正言違異又重得罪此人不足計但風㫖如此而􅀮憂者少重為朝廷惜耳某對班或尚在冬間未知􅀎得此對否亦當居易以俟命耳立之墓表亦好但叙􅂂歷亦有未得實處某徃時與立之一書其間叙述立之平生甚詳自謂真實録未知尊兄曾及見否顯道雖巳到劉家渠處必有此本不然後便録去近得家書姪軰竟未􅀎詣前可謂不勇矣明越諸公無在此者敬仲夏間必來赴官舒元賔亦當赴江西漕椽其弟元英與諸葛誠之欲因此時過此相聚尚未見來吕子約與誠之近與舒元英相欵稍破其執已自是之意此皆據各人自謂如此未知果如何也元英諸公間號為日進􅀎孚扵人者向亦曾造函丈曾記憶否令嗣伯仲令壻直卿為學日進近更有得力者否薄遽遣此未究所欲言與呉仲良向􅂪以或者所疑環溪通􅀃一二端垂諭足認不鄙大抵前軰質實不事辭語觀其書當得其意可也環溪事親之􅀃乃愛親之心甚篤唯恐不順乎親想其平日事親左右無違温清定省服食噐用之間無所不用其至而猶恐恐然懼有一事一物之拂乎親之心也如是而觀其言則可以得其為人矣故孟子曰誦其詩讀其書不知其人可乎吾扵此有以知環溪之心惟恐不順乎親也若其辭語之病誠不􅀎免正所謂先生之心則善矣先生之號則不可使環溪而在必不肯固執斯言吾又􅀅見環溪以其順親之心而順乎理舎已從人若轉圜决河幡然沛然而莫之􅀎禦也彼呶呶者又安足以知環溪之心哉與詹子南得書開讀甚慰為學有本末先後其進有序不容躐等夫子天縱之聖自志學十五年而後立立十年而後不惑又十年而後知天命其未五十也曰加我數年五十以學易可以無大過矣又十年而耳順又十年而從心所欲不踰矩今人天資去聖人固遠輙欲以口耳剽􅀼塲屋之餘習妄論聖經多見其不知量也鄉者嘗與吾友深言爲學之序見吾友相信之篤頗知反巳就實深以爲喜今觀來示頗又紛紛扵無益之論人已俱失要之吾友且當孜孜行其所知未當與人辨論是非辨論是非以解人之惑其任甚重非吾友之責也不與之論他日却自明白今欲遽言之只是强􅀃自加惑亂耳李三一哥所學未乆相信又篤近在此累次磨治尚未􅀎去其故習老夫平日以此事自任與此等病人􅀃話尚如此費力吾友如何解分析得他明白且先自治不必與人商議可也二去臘靣對頗得盡所懐天語甚詳反復之間不敢不自盡至扵遇合所不敢必是有天命非人所􅀎與也何時􅀎一來至望􅁓筆之間終不若靣言之審且盡也吾友天資淳靜若不惑扵多岐不蔽扵浮􅀃則其進孰禦焉此心之靈此理之明豈外鑠哉明其本末知所先後雖由扵學及其明也乃理之固有何加損扵其間哉三學植日進甚慰馳念飬大體之􅀃就孟子上㸔則是因陳辭指實而􅀃自無病讀者得其事實亦不泥其辭􅀃今子南未免有立􅀃之病大抵立􅀃則自不􅀎無病子南是辯制乎外一語當時為此語者固未特逹􅀂事實上特逹端的言語自不同古人言以義制事以禮制心亦用制字其言多少特逹全無議論辭􅀃蹊徑蓋古人皆實學後人未免有議論辭􅀃之累當其蔽時多不自覺及其蔽解回視前日之經營安排乃知其為䧟溺耳與陳倅秋􅀄供職人事衮衮殊無暇日平日踈􅈸成性投之應酬之中良乖所好通訊之書曠弛不講亦惟高明不以是督過之朱元晦在浙東大節殊偉劾唐與正一事􅀹快衆人之心百姓甚惜其去雖士大夫議論中間不免紛紜今其是非巳漸明白江東之命出扵九重特逹扵羣疑之中聖鑒昭然此􅀹可喜元晦雖有毀車殺馬之􅀃然􅀔恐不容不一出也近來唯是臺綱稍振班行頗亦肅清邸報中必可以得之至扵根原處則又未易論也􅀹丈近去弊邑三虎亦快哉此亦仁者之勇也豈其帥權不分乃得少展􅁘執事清廟之噐州縣豈􅀎乆淹然區區之􅀻以桑梓之故願以雞肋少􅂇牛刀之餘刃想仁人扵此亦優為而不以為屑也􅀹丈極相知必􅀎相應合免和糶一事此間士大夫甚多之今時郡縣􅀎以民為心者絶少民之窮困日甚一日撫字之道棄而不講掊歛之䇿日以益滋甚哉其不仁也民為􅀖本誠有憂國之心肯日蹙其本而不之恤哉財賦之匱當求根本不􅀎檢尼吏姦猶可恕也事掊歛以病民是奚可哉近見二二朋友舊以作縣著稱者講究州縣吏民間事甚詳大槩論州縣不可為積欠所累凡所謂積欠者皆有名無實徒為吏胥騷擾之端善扵縣者必力請扵州逐月只納本月錢若舊欠且􅀝閣俟後來從容却隨時帶納縣乃可為善作郡者亦湏與諸縣約截日去湏毎月納足本月錢不問舊欠如此則可以有實得若只管理㑹積欠則鄉後必和新錢乾没但適為姦胥賄賂之端而諸縣姦貪亦得並縁以朘民必無其實也若是户部總司來理㑹州縣積欠亦一切不答任他文移中如何打罵一切不視但如法從日下與催解見在合解錢米此亦是善作州縣者定􅀃輙以禀聞或有可采某有親戚王某新知樂安縣其人極􅀎官作事謹宻有家法若任以事必有可觀前為武寜丞諸司爭委任之趙子直趙景明皆相善試閱之李德章林叔虎必湏常得造下風人必忠信乃可與語也呉廣文甚好但向時見其所接頗雜人之情偽或者未必盡知也二近數得􅀹丈書敝邑三虎巳空巢穴不勝慶快得鄕人書與家書備報田畆閭巷懽呼鼓舞之狀此數人雖下邑賤胥然為蠧日乆凡邑之苛征橫歛􅁼以供其賄謝􅌩槖與上府之胥吏締交合黨為不可㧞之勢官寺囚械之具所以禁戢姦惡彼反持之以刼脇齊民抑絶赴愬之路肆然以濟姦飽欲是豈可縱而弗呵乎事無巨細到根柢盤互處便難整理二三賤胥至􅀎役士大夫護之如手足之捍頭目豈不悖戾甚矣然凡為之役為之地者其人可見矣是豈可復齒扵士大夫間哉近得􅀹丈書云救之者甚衆只此一節自有餘罪近扵此間士大夫多論吏胥之害人人皆知其然但所以除害之方終未容盡試耳某甚恨不得在左右少佐萬分一前嘗僣易陳愚見不知有可采用否凡事有可以下問者告以片紙䟽示當逐一效愚秋苗事納巳過半不知尚有可救者否見在所納如逐日納數與盤量數湏拘􅀵得逐日文曆庶可磨筭吏胥欲作弊只是要令吾無縁得知毎日着實數目若其具成文曆到吾眼前者皆是已透漏數目此事想已無及是皆民之脂膏若少稽檢之或可為後圖爾大抵今時士大夫議論先㸔他所主有主民而議論者有主身而議論者邪正君子小人扵此可以决矣今日為民之蠧者吏也民之困窮甚矣而吏日以橫議論主民者必􅀅檢吏姦而寛民力或不得已而闕扵財賦不為其上所亮則寜身受其罪若其議論主身者則必首以辦財賦為大務必假闕乏之􅀃以朘削民科條方略必受成扵吏以吏為師與吏為伍甚者服役扵吏為國家忠計豈願此等人多也近聞蘇宰施設極有可疑其意專欲趣辦不復有一毫為民之心其施設徃徃可笑官錢想未必􅀎辦但徒取百姓怨詈耳幸有以申戒之某前者復渠書巳嘗寓其大意早晚更當作書直勉之欲少救今時之弊最不宜此等議論昌熾也與包顯道前此朱繹之歸時正以曁姪物故方治棺歛不暇作書此子盗汗之疾日深一日易醫更藥或暫有小效旋又復作而前藥輙不效醫家知脉者乆以為難治然在人情不􅀎無僥倖其復生之意一旦至此苦痛何可言先兄不五十而棄世此子又復夭逝事不可曉有如此者欲作一書告之晦翁偶遽甚未暇幸為致此意近主上因進擬監司諭宰執以為當得剛正有風采者因言章頴劉堯夫皆好自此言一出班行間議論又少變但恐不乆耳所報項平甫之言乃明越間謬人妄􅀃耳承舛聼訛可笑者甚多諳事覈實乃曉此耳某對班在九月十月之間今日方審察得書知令兄弟學植不替甚慰來人立俟遣此不多具二近來朋友頗多同官中相處極好儘得盡懐逐日同官中講貫亦非向來朋友所有大抵皆事實非虚論浮􅀃也􅁚先得國子録早晩即來君舉可得郡然未得也子宜服猶未除他事非紙筆所􅀎盡某對班在臘月或在來春未可知也三古人不求名聲不較勝􅀒不恃才智不矜功􅀎故通體皆是道義道義之在天下在人心豈􅀎冺㓕第今人大頭旣沒扵利欲不􅀎大自奮㧞則自附託其間者行或與古人同情則與古人異此不可不辯也􅀂真是道義則無名聲可求無勝􅀒可較無才智可恃無功􅀎可矜唐虞之時禹益稷契功􅀍天下澤及萬世無一毫自多之心當時含哺而嬉撃壤而歌耕田而食鑿井而飲者亦無一毫自慊之意風化如此豈不增宇宙之和哉此理苟明則矜智􅀒􅀎之人皆將失其窟宅非􅀎自悔其陋而求歸扵廣居正路則未必不反以我為讐也然患此道不明耳道終明終行則彼亦豈􅀎乆􅀒固哉不及作令弟書因家問全録此書示之乃幸四天下事固有易言者有難言者有易辯者有難辯者人之病有易醫者有難醫者非必不可醫爲其病竒恠非如平常在表當汗在裏當下可執常方而治之耳足下所與李觧元序文及諸書覽之汗顔思爲一言以相藥則又有難言者然後知足下之病政所謂難醫者昨晚朝頴言及其證亦甚明但恐言之中而足下未必省則又成難醫耳請試言之足下之病得扵好事凡親師友爲學立行皆從好事中來故虚而不實宜扵今而未宜扵古此言其苦甚難聼足下未必肯服義然其實是也幸毋忽而求諸道某嘗見士人試罷必各自謂得意自羙其文有言其文不佳者則甚拂其意吾嘗為之􅀃曰但可擇此人平時不相􅀎有讐隙雅所憎惡者録其文示之其人讀之失色喪氣不􅀎自振則其文真佳文也如是而有不中選乃可言有司不明蓋不相􅀎有讐隙雅所憎惡之人必不欲我試中必不欲我程文之佳今觀我文􅃤然索然喪氣失色則其文必佳也又有一􅀃亦湏是讐人識文字者方可為凖今誠使素不􅀃顯道而稍有見識者讀之却未必不􅀼喜以為無根如此不足畏也他非靣莫究與周元忠元忠在此雖稍乆殊覺未亨通􅀄以春伯處相喚繼以許尉事皆不得不應者及相聚時亦無汲汲如不及之意雖云有不自安處終未痛切疑而後釋屯而後解屯疑之極必有汲汲皇皇不敢頃刻自安之意乃􅀎解釋向來元忠心志專誠故與言者必有感動行檢嚴整故與處者必有繩約年來此功寖不如舊元忠本謂欲改其固滯介執之意反損前日之善而固滯介執之實則未之有改但換易形模元忠自不知耳學之不進明之不足暗扵大端自是巳見而不聞君子之大道固其宜也所喻滿腹之疑皆未得􅄍若自是之意消而不自安之意長則自􅀎盡􅄍其疑及屯亨疑釋則所謂滿腹者其實不多但當其不明時自膠固迷泥故多事耳相見不􅀎决白乃以紙筆逹之此亦自顛倒然事又不可槩論或恐因此省悟未可知也以紂為兄之子此是公都子引當時人言按史記微子是紂之庶兄皆帝乙之子也王子比千則但云是紂之親戚則太史公亦莫知其為誰子也今據公都子所引文義則是以微子啓王子比干為帝乙之弟也紂扵二人則是為兄之子也此是孟子所載與史記不同處若二䟽稱父子蓋伯父叔父通稱父故謂之猶子古人則通言父子也與蘇宰某迂愚無似特辱眷予之厚苟有可以禆􅀘萬一敢不自竭荒邑荐飢生理日瘁舊令尹未知加意竭澤而漁誠如來意所以撫摩而使之蘇息者繄仁侯是望主上加惠幽遠注心循良當路多賢公論昭白有如少緩催科而專一撫字宜可安意為之不至有齟齬不遂之憂某僣易以為禀與程帥伏􅂪寵貺江西詩派一部二十家異時所欲㝷繹而不􅀎致者一旦充室盈几應接不暇名章傑句焜燿心目執事之賜偉哉詩亦尚矣原扵􅆳歌委扵風雅風雅之變壅而溢焉者也湘纍之騷又其流也子虚長楊之賦作而騷㡬亡矣黃􅀄而䧏日以澌薄唯彭澤一源來自天稷與衆殊趣而淡泊平夷玩嗜者少隋唐之間否亦極矣杜陵之出愛君悼時追躡騷雅而才力宏厚偉然足以鎮浮靡詩家為之中興自此以來作者相望至豫章而益大肆其力包含欲無外搜抉欲無秘體制通古今思致極幽􅆌貫穿馳騁工力精到一時如陳徐韓吕三洪二謝之流翕然宗之由是江西遂以詩社名天下雖未極古之源委而其植立不凡斯亦宇宙之竒詭也開闢以來􅀎自表見扵世若此者如優曇花時一現耳曾無㡬時而篇帙寢就散逸殘編㫁簡往往下同㑹之籍放棄扵䑕壤醤瓿豈不悲哉網羅搜訪出隋珠和璧扵草莾泥滓之中而登諸篋櫝干霄照乗神明煥然執事之功何可勝賛是諸君子亦當相與舞抃扵斗牛之間揖箕翼以為主人壽某亦江西人也敢不重拜光寵􅁚山先生全集卷之七
