body:
  text: 卷之一書與邵叔誼與曽宅之與胡季隨二與趙監一與鄧文範三與姪孫濬與李省幹二卷之二書與王順伯二與朱元晦三與吳顯仲二卷之三書與童伯虞與劉深父與張輔之三與曹梃之三與曹立之二與黄日新與黄元吉與喬得占與諸􅁑受之卷之四書與李徳逺得觧見提舉得觧見權郡得觧見通判與諸􅁑誠之二與王徳修與劉淳叟二與趙宰與胡逹材二與潘文叔與彭世昌與曽敬之與符舜功三與符復仲與周亷夫卷之五書與吕伯恭與吕子約與戴少望與舒西羙與高應朝與楊敬仲與項平父與舒元賔與徐子誼二與趙子直與辛㓜安卷之六書與傅全羙二與傅子淵三與傅聖謨二與包詳道七與包顯道二與包敏道四與吳伯顒與呉仲時與吴叔有卷之七書與勾熈載與彭子夀與邵中孚與顔子堅與張季忠與胥必先與朱元晦與吴仲良與詹子南三與陳倅二與包顯道四與周元忠與蘇宰與程帥卷之八書與張春卿與宋漕與陳教授二與趙推與蘇宰卷之九書與王謙仲二與錢伯同二與楊守三與黄監與林叔虎與陳君舉卷之十書與李成之二與應仲寔與張季海二與張元􅂦與黄康年與胡無相與朱益叔與路彦彬與涂任伯與董元􅃬與倪濟甫與黄彦文與劉志甫與邵叔誼與江徳功與曽宅之與周元忠與詹子南二與吳顯仲卷之十一書與朱濟道三與吳子嗣八與傅季魯與陳宰二與李宰二與趙景昭與王順伯二與􅀹延之與豐宅之卷之十二書與趙然道四與趙詠道四與陳正已二與張誠子與張輔之與饒夀翁七與倪九成與張季恱二與劉伯恊二與黄循中二卷之十三書與郭􅀖逸與郭􅀖瑞與李信仲與潘文叔與朱子淵三與薛與羅春伯與鄭溥之與馮傳之與朱元晦二卷之十四書與包詳道與包敏道二與嚴㤗伯三與傅子淵與羅章夫與廖㓜卿與傅齊賢與胥必先三與蔡公辯與張徳清與髙應朝與姪孫濬四卷之十五書與陶賛仲二與孫季和與唐司法與傅克明與章茂獻與羅春伯與薛象先二與朱子淵與劉漕與吳斗南卷之十六書與章徳茂五與張元善二卷之十七書與張監二與豐叔賈與鄧文範與致政兄與張伯信與似清與沈宰二卷之十八奏表刪定官輪對劄子荆門到任謝表與廟堂乞築城劄子卷之十九記敬齋記宜章縣學記荆公祠堂記經徳堂記貴溪重脩縣學記武陵縣學記本齋記臨川簿􅆹壁記卷之二十序贈送毛元善序送宜黄何尉序送彭子夀序送楊通老贈吳叔有贈俞文學贈二趙贈僧􅁢懷一贈曽友文贈汪堅老贈丁潤父贈黄舜咨贈汪彦常贈陳晋卿示象山學者贈金谿砌街者贈湯謨舉贈陸唐卿贈踈山益侍者贈劉季蒙題新興寺壁題翠雲寺壁朱氏子更名字􅀃二張名字􅀃格矯齋􅀃䟦資國寺雄石鎮帖記祚徳廟始末鄧文􅁐求言徃中都卷之二十一雜著易􅀃四易數一張叔權書一連叔廣書三五以變錯綜其數學􅀃論語􅀃孟子􅀃卷之二十二雜著史評二雜􅀃卷之二十三雜著白鹿書院論語講義大學春秋講義荆門軍皇極講義卷之二十四雜著䇿問十六卷之二十五詩少時作聞鸎鸎六言晚春出箭溪二首子規六言蟬贈化主踈山道中鵝湖和教授兄韻挽石子重挽張正應和黄司業喜雪㳺湖分韻得西字和楊廷秀送行送徳麟監院歸天童和楊廷秀韻二首送勾熈載赴浙西監題慧照寺贈畫梅王文顯簡朱􅆬叔諸友書劉定夫詩軸玉芝􅁔卷之二十六文祭吕伯恭文代致政祭姪槱之文代教授祭神文石灣祈雨文謝雨文荆門祈雨文望壇謝雨文二東山禱雨文東山刑鵝禱雨文上泉龍潭取水禱雨文卷之二十七行狀教授陸公行狀宋故吳公行狀卷之二十八誌銘黄氏墓誌銘張公墓誌銘陸公墓誌銘黄公墓誌銘黄夫人墓誌銘􅁑致政墓誌銘吳伯顒墓誌銘陸修職墓表卷之二十九程文庸言之信庸行之謹閑邪存其誠善世而不伐徳慱而化觧試黄裳元吉黄離元吉使民宜之聖人以此洗心退藏扵宻吉凶與民同患神以知來知以藏徃省試天地設位聖人成􅀎人謀􅀑謀百姓與䏻首出庶物萬國咸寕卷之三十程文孝文大功數十論天地之性人為貴論智者術之原論房杜謀斷如何論劉晏知取予論政之寛猛孰先論常勝之道曰柔卷之三十一程文制科觧試料敵觧試賑濟觧試唐取民制兵建官省試徳仁功利省試漢文武之治省試卷之三十二拾遺好學近乎智學問求放心主忠信母友不如巳者人不可以無耻二思則得之君子喻扵義求則得之里仁為羙則以學文人心惟危道心惟㣲惟精惟一􅁢執厥中學古入官議事以制政乃不迷汝分猷念以相從各設中于乃心養心莫善扵寡欲取二三䇿而已矣保民而正續書何始於漢䇿卷之三十三文安謚議孔煒撰覆謚丁端祖撰象山先生行狀楊簡􅄒卷之三十四語録卷之三十五語録卷之三十六年譜象山先生全集目録附録少湖徐先生學則辯華亭少湖徐階著學則辯某旣編學則成朋友之相詰難者或引存養格致以為尊徳性道問學不可合為一事或引學問思辯篤行以爲必先道問學而後可及於尊徳性又或謂晦庵象山兩夫子均之爲聖人之徒但其入門則有不可強而同者其􅀃雖殊然要皆不究夫學之􅀁以爲學故必認以為二而不能信其一也夫學尊徳性而巳矣問也者問此者也學也者學此者也遺此之謂禪離此之謂訓詁故尊徳性者君子之􅀁主以爲問學者也問學者君子之􅀁由以尊徳性者也舎問學而求尊徳性則徳性不可得而尊舎尊徳性而求道問學則亦不復有􅀁謂問學之事此尊徳性道問學所以為一而非可以存養格致分屬並言者也且存養非他也存其􅀁格之理焉耳格致非他也格其􅀁存之理焉耳存也格也其功無二用也是乃􅀁謂問學而君子所由以尊徳性者也如必析尊徳性以屬存養析道問學以屬格致而謂尊徳性之功别有出乎問學之外則中庸首章之獨言戒懼扵義旣不免有所遺而大學之格物致知乃徒爲愽物洽聞之具而非所以致誠正修齊之實矣此豈獨不知尊徳性道問學亦豈識􅀁謂存養格致㢤乃若學問思辯篤行其所謂慱學者非闊畧扵踐􅂂而徒務慱其見聞及其旣慱然後漸次収拾以付之扵行也蓋君子脩身踐行旣無􅀁不用其學矣其或學而有疑則問之之審問而未有得則思之之慎思而猶未能了然於其心則辯之之明辯之旣明則益敦行之而弗怠是所謂篤行者乃取慱與篤兩義相對而言非所以為先後之次也然則道問學尊徳性不可以分先後明矣至謂両夫子入門異而均之為聖人之徒則又有可言者夫君子由學以入聖猶人由門以入室今指尊徳性道問學為兩門矣然而聖之所以為聖踐形盡性之外無他事也則尊徳性道問學室一而巳門亦一而巳安得有異入乎凡某所以斷両夫子之同者固􅁣夫世之人舉其訓話之陋妄自托扵朱子而詆陸爲禪舉其空寂之謬妄自托扵陸子而詆朱為俗也今曰均之為聖人之徒則某之所爭者固巳得矣又何異之足言㢤大抵子思此章其辭旨本自暁白蓋不徒曰尊徳性而必􅁇之以道問學則可見功夫之有在而為尊徳性者所不􅀎遺不徒曰道問學而必先之以尊徳性則可見主本之有定而為道問學者所不􅀎外不徒曰尊徳性道問學而必合之以而之一字則可見其為一事而非耦立並行者之可倫是故尊徳性道問學一也朱子世以為專道問學而其言必主扵尊徳性陸子世以為專尊徳性而其言不遺夫問學此兩夫子􅀁以同也學者苟反身以究夫學之不容二而又虗心以觀兩夫子之言則可無疑扵紛紛之􅀃矣右學則辯華亭少湖徐公所作也辯朱陸二夫子之學同歸一致不容有毫髮之疑矣今因補刻象山全集附刻是辯俾求象山之學者則焉荆門州儒學正閩􅀹溪廖恕謹識嘉靖己未秋九月吉旦象山先生全集叙聖人之學心學也堯舜禹之相授受曰人心惟危道心惟㣲惟精惟一􅁢執厥中此心學之源也中也者道心之謂也道心精一之謂仁所謂中也孔孟之學惟務求仁蓋精一之傳也而當時之弊固已有外求之者故子貢致疑扵多學而識而以􅀶施濟衆為仁夫子告之以一貫而教以能近取譬蓋使之求諸其心也迨扵孟氏之時墨氏之言仁至扵摩頂放踵而告子之徒又有仁内義外之􅀃心學大壊孟子闢義外之􅀃而曰仁人心也學問之道無他求其放心而已矣又曰仁義禮智非由外鑠我也我固有之弗思耳矣蓋王道息而伯術行功利之徒外假天理之近似以濟其私而以欺扵人曰天理固如是不知旣無其心矣而尚何有所謂天理者乎自是而後析心與理而為二而精一之學亡世儒之支離外索扵刑名噐數之末以求明其所謂物理者而不知吾心即物理􅀄無假扵外也佛老之空虗遺棄其人倫事物之常以求明其所謂吾心者而不知物理即吾心不可得而遺也至宋周程二子始復追尋孔孟之宗而有無極而太極定之以仁義中正而主静之􅀃動亦定静亦定無内外無􅀅迎之論庶㡬精一之㫖矣自是而後有象山陸氏雖其純粹和平􅀂不逮扵二子而簡易直截真有以接孟氏之傳其議論開闔時有異者乃其氣質意見之殊而要其學之必求諸心則一而已故吾嘗斷以陸氏之學孟氏之學也而世之議者以其嘗與晦翁之有同異而遂詆以為禪夫禪之􅀃棄人倫遺物理而要其歸極不可以為天下國家苟陸氏之學而果􅀂是也乃所以為禪也今禪之􅀃與陸氏之􅀃孟氏之􅀃其書具存學者苟取而觀之其是非同異當有不待扵辯􅀃者而顧一倡羣和剿􅀃雷同如矮人之觀塲莫知悲􅀏之所自豈非貴耳賤目不得扵言而勿求諸心者之過歟夫是非同異毎起扵人持勝心便舊習而是已見故勝心舊習之為患賢者不免焉撫守李茂元􅀅重刻象山之文集而請予一言為之序予何所容言㢤惟讀先生之文者務求諸心而無以舊習已見先焉則糠粃精鑿之羙惡入口而知之矣正徳辛巳七月朔陽明山人王守仁書象山先生文集序天有北辰而衆星共焉地有㤗岳而衆山宗焉人有師表而後學歸焉􅁚山先生其學者之北辰㤗岳與自始知學講求大道弗得弗措乆而寖明又乆而大明此心此理貫通融㑹羙在其中不勞外索掲諸當世曰學問之要得其本心而已心之本真未嘗不善有不善者非其􅀄然也孟子嘗言之矣鄉爲身死而不受今爲宫室之羙妻妾之奉􅀁識窮乏得我而爲之此之謂失其本心其言昭晣如是而學者不􅀎深信謂道爲􅀮而不知其著謂道爲邈而不知其近求之愈過愈湮欎至先生始大􅀤之如指迷􅂗如藥乆病迷者晤病者愈不越扵日用之間而本心在是矣學者親承師訓向也跂望聖賢􅀂千萬里之隔今乃知與我同本培之漑之皆足以敷榮茂遂豈不深可慶㢤嗚呼先生之惠後學弘矣先生之言悉由此出上而啓沃君心下而切磨同志又下而開曉􅀺庶及其他雜然著述皆此心也儒釋之所以分義利之所由别剖析至精如辨白黒遏俗學之横流援天下於旣溺吾道之統盟不在茲乎爕識先生於行都親愽約者屢矣或竟日以至夜分未嘗見其少有昏怠之色表裏清明神采照映得諸觀感鄙吝已消矧復警䇿之言字字切已與先生之殁餘二十年遺言炳炳精神猶在敬而觀之心形俱肅􅀂親炙然臨汝嘗刋行矣尚多缺畧先生之子持之伯㣲裒而益之合三十二卷今為刋于倉司流布寖廣書滿天下而精神亦無不徧言近而指逺雖使古人復生莫之􅀎易嗚呼茲其所以為後學之師表與先生諱九淵字子静撫州金谿人嘗講學於貴溪象山學者尊為象山先生云嘉定五年九月戊申門人四明􅀽爕書有宋撫州金谿陸先生字子静嘗居貴溪之象山四方學者畢至尊稱之曰􅁚山先生先生􅃁嗣持之字伯㣲集先生遺言為二十八卷又外集六卷命簡為之序簡自主富陽簿時已受教於先生因言忽覺澄然清明應用無方動静一體乃知此心本靈本神本明本廣大本變化無方奚獨簡心如此舉天下萬世人心皆如此易曰百姓日用而不知孔子曰二三子以我為􅀮乎吾無􅀮乎爾吾無行而不與二三子者大戴記孔子之言謂忠信為大道忠者忠實信者誠信不詐偽而先儒求之過求諸幽深故反不知道孔子又名大道曰中庸庸者常也日用平常也孟子亦謂徐行後長即堯舜之道又謂以羊易牛之心足以王先生諄諄為學者剖白斯㫖深切著明而學子領㑹者寡簡不自揆度敢少致輔翼之力專叙如右開禧元年夏六月乙􅆗門人四明楊簡敬書象山集序聖人之言心淵然無朕其涵也而有觸即動其應也佛氏語其涵者圓明㣲妙而秘之以爲竒俗學即其應者粧綴繳繞而離之以爲愽要之不􅀎無所近而亦卒不可入何者其不􅀎無所近者縁扵心而卒不可入者逺扵體也聖人者不獨語其涵懼人之求扵㣲而不獨語其應懼人之求扵迹故哀與欽者心之體也見廟與墓而興者其應也體無所不具則無所不感無所不感則無所不應因其應而為之文扵是乎有􅂘擗衰素之等爼豆璧帛之儀儀立而其心逹而儀非心也此所以為聖人之學也佛氏則從其應而逆之以歸扵無曰墓與廟哀與敬皆妄也而性則離是而亦不離扵是者也俗學者非之曰此有也則從而煩其名數深其辨愽而以為非是則無循也然不知冺感與應者旣以玄逺空􅄫為性而其溺扵名數辨愽者又詳其末而忘其所以然予故曰禪與俗卒不可入者皆逺扵體也聖人之言心詳扵宋儒最後􅁚山陸氏出盡去世之所謂繳繞者而直指吾人之應心曰見虗墓哀而宗廟欽者心也辨此心之真偽而聖學在是矣其扵致力之功雖為稍徑而扵感應之全則指之甚明而俗學以為是禪也其所未及者名數辨愽也嗟乎􅁚山指其應者使人求其涵也佛氏逆其應扵無而􅁚山指其迹扵應以是為禪然則為聖人者其必在名數辨􅀶乎以儀為心予惡夫哀欽之無從也是集􅈓扵金谿而􅀊乆漫漶徳安吉陽何先生撫江西之明年丕闡理學以淑士􅀋乃改􅈓焉而命沐為序辭不􅀗因取􅁚山言之粹者據而証之世之知者果有取焉則禪俗與儒之界􅀅昭然若指掌而象山氏之學可知也已大明嘉靖四十年􅀊次辛酉五月吉賜進士出身中奉大夫江西布政司右布政使前奉勑提督江廣兩省學政刑部􅀰臨海後學王宗沐撰嘉靖癸丑三月宗沐旣刻朱子大全私抄而稍論次朱陸二氏異同之大畧以附扵書間以請扵兩廣廵按侍御王公曰朱書備矣陸氏書粤之士有終身不及見者其圖並存之已而廣西廵按侍御陳公始至以請曰並刻以示二三子吾道之幸也其亟圖之宗沐乃更録象山先生書文語録論學者􅁵為六卷冠以􅄌湖陽明二先生之序刻焉旣成進粤之士而告之曰二先生任道開來之功傳四百年于茲其㣲言奥㫖固已具扵二書苟􅀎玩味而深繹之而不惟習見則其㫖歸之􅀁在者可釋然而無疑矣夫原扵天地以立極而通扵古今以常行者道之致一而不可容或貳也貭有偏重而見有早晚當㑹其未備而銷其未融者學之相成而不可獨執也二先生偶以其一時之見相與校訂是亦不過朋友切磋之心而後世遂分别之攘斥之使不得並係扵孔氏之徒焉則夫乃采聲遺實而責之太深矣乎故自今言之以彌綸宇宙為已分而以繼徃開來為立心以沉迷訓詁為支離而以辨别義利為􅀜鑰本之扵收放心以開其端極之扵充四端以致其力由扵盡心知性而逹扵禮樂政刑此象山先生之學之大也備觀先生之書而更合之扵朱子得其􅀁以同辨其􅀁以異則知道無不合而言各有指然後指之為俗與禪者皆可得而論其㮣矣昔者子貢以孔子為多學而識而孔子教之曰非也予一以貫之比其患言之多也則他日又曰子欲無言聞見為知之次者皆孔子之家法也至扵禪學之㫖其自私為已與絶人倫􅀋以求免生死誠為異端固聖世之􅀁必誅而不以聼者但其􅀁以為教固以為實際理地不染一塵而佛事門中不舎一法心含萬象徧周法界融㑹精粗而至扵十地五乗四教三藏傳述之多亦未嘗專以着空為修證者也夫陸子之􅀁指以示人者既為孔子之􅀁嘗是而世之􅀁以怒陸子而夷之為空者又釋氏之􅀁本非然則陸子之學謂其立論容有未罃則可而􅃍埒之扵禪是何異諊獄者不見兩造不求情實而但以前人之判其牘也而遂㫁焉夫庸無有枉濫扵其間乎顧二先生之􅀁以致是者起扵無極二字之辨夫二字之輕重未足以係斯道之絶續也􅀂以為果道之􅀁在而不可不辨則孔子之書如首章時習二字其􅀁當講雖汗牛􅂶棟猶未可了而無極二字不明胡不且置而􅃍若是紛紛乎此則二先生早年未定之事而陸子不執文字之教扵此亦稍自背馳而愚猶憾其執之不固也而論者乃更以為禪乎嗟夫道非朱陸之􅀁得專即今而争焉而斥焉扵二先生無加損也而獨怪夫學絶道䘮門户之多而黨伐之衆則言多而道益晦此任道之士􅀁為懼而不敢安也六經之作本以明道然聖人扵易則曰作易者其有憂患乎孟子曰臣弑君子弑父孔子懼作春秋然則易與春秋固以憂患與亂賊爾苟無是焉易春秋不作也後之有言者其果有不得已焉者乎而後之求之文字者其果皆得夫作者之意乎訓詁馳騁之煩辯􅀃争競之衆誠可哀痛而先覺之士亦嘗有起而闢之而卒不􅀎有􅀁撲息者何㢤盖其􅀁以為此者有本有源本源之地未􅀎㧞而塞之則朱陸之㫖雖明而其沿習沉痼之蔽未􅀎或破宜其流之靡而莫或救也愚請得借禪以明之瞿曇之宗其始以生死禍福之􅀃濟其必行是以習聞其􅀃者皆抱必得之志而來雖狂夫悍卒皆能舎其舊而從扵寂寞􅀌苦之鄕甚或面壁投崖刎身燃指而不悔者其志誠切而其事誠專也而尚安暇扵言乎雖其事誠戾扵聖教而在其宗門則固為忠信篤敬之徒矣後世之言學者􅀄本非有求為聖賢之志因循前􅁍與習相成甚或姑以是而息其馳驟之倦則其心以為詞􅀃之不􅀶而記聞之不多則其言不行而其上焉者始畢其力扵訓註涉獵以求為功果朝移暮易而扵􅀁謂痛切身心者冝其畨有􅀁遺而不及矣此則立志之過也為佛者其􅀃誠􅄀莫迂逺而其為事則未嘗苟也付法傳衣登壇􅀃法號稱具眼以續其師者必其真證而自得焉而猶或不敢當也後世之言學者實則不至而急扵立􅀃則固有窺之未精而見之未定者固已遂為人人之􅀁傳矣雖其或旋覺扵未妥甚或自悔扵晚年而其書遂行已不可改則其言之多也雖其本意尚有未慊而况槩之扵聖人之道乎此則立言之過也夫佛者屏除翳障獨懼有我增慢之病比扵貪􅁋而強附宗言謂之毁謗其扵執着是巳之戒􅀂是乎其嚴也今學者之論誠有智者之失矣有愚者之得矣苟其言之是而足以相濟也則蒭蕘鄙夫固當兼取以從扵是而乃有勝心焉或原以偏􅀝而執之堅或耻扵相屈而必其勝甚或分門異户又從而藩籬焉則亦無怪乎其言之多而􅀃之激矣此則勝心之過也凡是三者相因爲病􅀁謂本原沉錮纒綿雖有特出之才一入其中足起足䧟未􅀎自㧞則文字訓解縱其燁然譬之古人􅀞蛇添足而今更爲之鱗爪也粉飾彌工去真彌逺凡若是者貭之扵禪曾有不􅀂此孟子􅀁謂五榖不如荑稗而孔子思欲居九夷也道之不明非吾黨之過而誰執其咎乎沐之庸下學不知方以嘗讀二先生之書而反思焉扵其離合異同之際稍得一二而因以知言之多者則道轉晦故今與二三子之􅀁從事者必其有求為聖賢之志而又有取善扵人之心務礪其粗務濬其壅必不得已而後言焉言以鳴道而非以闘靡也必有􅀁主而後求之文字焉文字以證其精而非以執泥也而凡其畔援之􅀃舉不得入扵其中則乆之必有舎筏濟岸之日而二先生之學庶乎可續其緒矣此則二公任道嘉惠之志粤之士其知􅀁以敬承之乎陳公諱善治蜀之巴縣人王公諱紹元楚之金谿人嘉靖癸丑十二月吉臨海後學王宗沐謹識象山先生文集序
