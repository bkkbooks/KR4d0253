body:
  text: 墓誌銘黄氏墓誌銘淳熈庚子三月八日梁君世昌以書抵予言繼室黄氏将葬以李君蟠狀來乞銘余未嘗銘墓抑銘墓非古惟孔悝鼎銘見戴記則衛侯䇿書曰予汝銘墓之有銘柳子厚謂始於公室用碑以葬其後子孫因銘徳行如此則非公侯不得有是然郭林宗不過嘗給事縣廷其葬也刻石立碑蔡邕為之銘是則東漢時銘墓已無限制今人力能辦者必銘其墓余滋不恱然黄氏余外姑之妹也舊聞其賢梁君亦惓惓於余是春之𥘉余訪梁君梁君内顧酒肴立具梁君去年嘗遊廬阜其談山水之勝誦高人逸士之文亹亹不倦余於是益知其在中饋者能安於梁君而後梁君能安於所好也嗚呼乃不知余去數日而黄氏死矣墓銘今世皆用黄氏又賢余又親戚前其死數日余又適至其家梁君又惓惓於余是以重違其請銘曰世居臨川其姓則黄曰謂之女少慧且良謂殊愛之擇配至詳爰緩其歸繼室于梁歲時祭祀潔蠲盛湘有親有賔飾具有常撫其二子成章大章與其一女藹然慈祥梁頼其相志願畢償家用益肥於前有光庚子孟春甲子遽亡年上四十夀胡不長其穴伊何靈臺之鄕桐嶺梁源舅姑塋傍三月壬申體魄以藏後有興者是不可忘張公墓誌公諱琬字禹錫姓張系出漢留侯世居信之龍虎山曾祖嗣宗賜虗白先生祖大方贈武功郎考念承信郎公生於元符二年十有一月五日癸酉卒於淳熈八年三月十有四日庚申享年八十有三公甫冠應舉不利乃去入京師宣和間應募破方臘𥙷進義副尉建炎𥘉自京師從馮獬等詣濟南府扈從至南京轉進武校尉明年以嘗從使虜轉承信郎傾側擾攘汴淮之間所志不就浩然歸休居家䖏鄕孝慈悌順無所違拂留意吐納希蹤喬松中年卜居不用世俗隂陽地理等說自得勝處家旣饒給益自燕適晩歲尊延禮法之士為子弟師變其舊俗軌範一新鄕里改觀焉寢疾且亟召子孫申戒之言訖而逝娶荘氏早卒繼室周氏子男四人崇之簡之安之明之女二人長適章如璋次適將仕郎倪安國孫男八人女七人曾孫男一人卜以十月三日丙午葬于長湖旣得卜子明之來求誌其墓公繼室余表姊也明之又嘗從予遊不可辭青田陸某誌宋故陸公墓誌公姓陸氏名九叙字子儀撫州金谿人曾大父演大父戬父賀贈承事郎母饒氏贈孺人繼母鄧氏封太孺人公生扵宣和五年七月乙卯卒於淳熈十四年五月癸亥享年六十有五以卒之年十月壬辰葬于臨川縣長夀鄕羅首峯下公氣禀恢廓公正不事形迹群居族談公在其間𥘉若無與至有疑議或正色而㫁之以一言或談笑而解之以一說往往為之渙然家素貧無田業自先世為藥肆以養生兄弟六人公居次伯叔氏皆從事塲屋公獨緫藥肆事一家之衣食百用盡出扵此子弟僕役分役其間者甚衆公未嘗屑屑扵稽檢伺察而人莫有欺之者商旅徃來咸得其懽心不任權譎計數而人各獻其便利以相禆益故䏻以此足其家而無匱乏後雖稍有田畆至今計所收僅䏻供數月之糧食指日衆其仰給藥肆者日益重公周旋其間如一日也公娶余氏先公十一年卒余氏孝順出於天性娣姒皆以為莫及當窮約時公之子女衣服敝敗特甚余氏或時及之公即正色呵止必伯叔氏為之處乃始得衣雖公之衣服噐用亦往往如此及伯季有四方游雖至窘急褁􅌩無不立具自公云亡逺方士友聞訃慰唁諸孤與公之伯季稱公徳羙悼痛傷惋無異辭子男四人望之麟之立之尚之女六人長適鄕貢進士張啇佐次適黄叔豐次適危三畏先公十七年卒次適徐翔龍周清叟熊鑑孫男三人女五人皆㓜弟宣義郎主管台州崇道觀某謹誌黄公墓誌銘南豐黄世成少事塲屋再舉不第即棄去益繙經史百家言究窮其道理結廬石僊巖有終焉之意其兄世永甫冠登科所志頴脫以出暇日憇石僊與世成劇論時事歎羙其才勉之使出堅不可奪世永益竒之名其廬曰壺隱其父南雄府君官至正郎澤及世成世成推以與弟澤再及又推以與次弟有季弟澤不及則推已田與之或惡其背馳議之曰是非人情曰矯曰好名世成處之㤗然議者浸以熄乆之逺近咸服不稱姓字但曰壷隱在童稚時嘗為横浦張公賞識及長結交皆一時名流雖絶意仕進其扵國之治忽民之休戚未嘗不關其心故舊居職任事者毎頼以有聞江西之捄荒湖廣之弭盗往往出其䇿比年移書左司楊廷秀諌議謝昌國其言尤剴切深至二公還書推重嘉歎然卒不能有所施行余不識世成而得其爲人至詳粹然其容懇然其中剸煩若易處大若細其施不匱其守不渝爲文操筆立成藻思贍蔚統紀不紊有苦心極力所不到者得諸儒言論必沉涵紬繹頗復論著訂其真偽然不自以爲是也比十數年辱余以書無曠時若所嚴事學絶道䘮斥善寸長必自介恃世成之所可挾者衆矣乃自視欿然汲汲扵求道過人亦逺矣今其亡也其子來請銘以世成之賢雖不吾屬猶将彰之况請之勤邪世成諱文晟曾祖履中康州司理參軍妣葉氏祖俯左迪功郎處州司理參軍贈左朝請大夫妣太冝人吕氏曽氏父越左朝奉大夫知南雄州妣宜人曾氏娶曾氏子男五人長曰楫先四年卒次曰柟曰槐曰椿曰棐女三人長適湛覺次適曾林宗㓜在室孫男二人燾勲女一人世成生扵紹興丁已二月已亥卒於淳熈丁未十二月壬辰享年五十有一將以戊申十一月巳酉葬于石僊巖之金鵝谷銘曰匪屋之潤于其身匪爵之尊于其仁無其責而有其言非其位而及其民孰曰余咎孰曰余咎烏乎壺隱豈其隱淪誰尚顯之在其後人象山陸某誌黄夫人墓誌余少時見墓銘日多往往縁稱羙之義不復顧其實侈言溢辭使人無取信竊念之曰苟如是不如無銘及長人或過聼俾為墓銘輙終辭之蓋不獨以才薄品卑也歲在庚子同郡梁君光逺繼室黄氏之亡乞銘於余於是銘之且具誌其故然其原大抵以其為吾外姑之妹而有以信其賢也昔者外舅吳君茂榮之葬余状其行乞銘於尤太史不敢加一辭如所謂闔郡之士願以為領袖謁諸郡慱士造廬延致至于再三乃始應命則許君深父哀詞言之尤詳深父乃當時郡慱士今年自右拾遺進貳奉常者也余比歲又銘南豐慈溪二君子之墓海内名識謂無愧辭今吾外姑之葬雖㣲諸孤之請吾敢無銘乎外姑踰笄歸于外舅尊卑内外婣戚鄰里僚友之家下與僕妾舉無間言自吾為壻未嘗見其喜怒唯見其慈祥恭謹為姑如婦祭祀賔客酒殽𦵔醢靡不躬親滌濯致潔調割致適奉承薦獻致其誠敬其勤勞中饋殆如一日諸婦祈欲逸之而不可得待子壻卑行猶孶孶若有不及然幽閒安詳不動聲色履之如素亦使人有以安之詩書傳記所稱婦徳於是有證嗚呼賢㦲享年六十有四邑氏先諱見乃妹銘章子孫男女名數具外舅行狀與尤公之誌獨子之㓜非外姑出其氣體稚弱外姑慈撫鞠育劬勞有加於疇昔莫辨其非已出也其女之季前一年卒孫則增男一人女四人卒之日維淳熈十有五年二月丁卯明年十月已酉葬于金谿東漕之龍岡銘曰龍岡之阡雲林之别旴江陳前浮霜湧雪瀦若鑑明繚若水潔旁羅諸峰麻姑就列却負書山屛隱嶻嵲靈谷後車雷公並轍維姑之賢徃訓是埒維姑之身命服不設天實酬之窆以斯穴余實知之詩之斯碣尚其子孫自致閥閱褒綸崇封奕世不缺葬月之朔壻宣義郎新權發遣荆門軍兼𬋩内勸農營田事陸某書葛致政誌余稚齒在先君侍側見客有長大靣目方整坐立聳直揖遜恭謹者心獨異之亷問左右知為葛公徳載而未䏻詳其為人及長則聞葛才羙有聲學校有業五行術者曰黄實乆遊鄕里常徃來吾家毎科詔下問此舉誰當薦名實必曰葛才羙已而不驗人皆笑實曰是獨采有能名者耳才羙竟以乾道戊子與其子同與舉送明年才羙登科余聞實言時實已老矣不知此時猶在否也才羙公仲子也公平日待之甚嚴其母嘗乗間爲才羙泣曰兒未嘗有過盍少假借之公曰此非兒女子所知吾如是猶懼其業不進德不脩可假借乎是所以成之也爾母以爲苦由是母亦喻其意才羙未第時余嘗造郡庠由東序以入有二士並立西序稍相睥睨一士容色甚少益自嵬崖靣焉以出一士低回恭謹翼翼趍庭間見即乃才羙也才羙齒出吾上逺甚而其恭如此余由是益敬重之已而聞其有嚴君焉余然後知才羙恭遜固天性亦其教有以成之也才羙與先兄復齋為同年進士自是徃來加宻余亦屢造公公年耆行尊過自謙抑如見所畏未獲從容比年客有過我道公疇昔語且及其行事余竊有慕焉因介客道意欲求疑晤以究本末因循未遂而公下世矣余徃哭公柩諸孤執䘮甚哀余亦不知涕泗之横集旣歸即束書入山房公葬有日才羙徒行匍匐登山以銘為請余雅不樂銘墓異時所辭却者衆矣或破此意而為之者皆適有所感而不䏻自巳者也余於葛公所感深矣遂次而銘之公諱𢋫葛其姓徳載其字其先五代間自番昜徙撫之金谿曾祖祈祖豐父思審皆不仕世以力田殖其家公為人剛决臨事無凝滯年十三區處家務如成人父兄異之於是付之以其政時公父年未五十為堂舎北以自燕適如遺世者凢三十餘年而後即世公有二兄仲早卒事伯兄撫仲孤敬愛飭盡人無間言遭時多故縣官倚辦扵民者㡬倍常賦公調度有方從容贍給建炎間盗賊蜂起所在為保伍以自衛郡毎𬒳冦必檄以捍禦臨川為冦衝虜騎侵軼亦嘗及城下皆頼鄕社以免公善用長戈慷慨徇義人所樂親所部皆勇敢以是見推為前鋒摧堅䧟陣未嘗有所避虜騎旣敗退王爕後軍叛卒數千尋至城下他兵遇者輙不利城中恟懼金谿鄕社旣至城中則大喜城上呼曰賊中有髯而騎者善戰宜謹備之旣陣果有髯而騎者奮刀馳突公直前以長戈擣之應手墮馬賊衆驚潰獲其告身官已正使人皆曰盍論功乎公曰今日之事本為除賊賊除足矣論功非吾事也有司亦不復有所省録公仲子旣仕凡三遇慶霈累封至承事郎賜緋魚袋今上登極加封宣義郎公功不見録於有司天則録之矣紹興乙卯歲旱明年民難糴米斗踰十錢冨民方閉廩時公先下價散其米徒手來者輙貸與之公限粟不多而里中頼之宏矣𬞞圃蒔茶為用餘者以易所乏農家往往有之嚚猾持以榷禁愚民不知所辨則可以得貨公有三貧族嘗遭此厄訟者亦公之族𬒳訟者願賂入訟者萬錢求已而未䏻得錢丐公為保公欣然保之巳而訟者迫公索錢凡三人為錢三萬公度三家者貧甚終不䏻得錢即代償之公輕財類是以是家無餘財然公處之𥙿如也柯山所客廬山公所聞皆願從容者其子丞西安令星子皆適當公意方其迎侍之官訪舊賞新窮日不倦及其興盡而返子亦不䏻留也性喜飲酒客至治具隨有無飲必至醉公生無他疾中年指間有贅天隂或痛乆者彌日而後止醫者不䏻暁自其子登科痛乃浸殺乆而失之年亦髙飲食歩移無異壮時一日出門小跌旣歸如有㣲恙後數日從容就枕如平常左右視之公則逝矣享年八十有四卒之日實紹熈改元五月庚午公娶楊氏早卒繼室余氏封宜人子男六人曰造曰逄時儒林郎知南康星子縣曰述先公五年卒曰宗允曰少良嘗從余遊曰亮女四人王通一胡溥余邦光馮文載其壻也孫男十三人俊卿即與其父同舉者玉卿有光有開如霆有為祖蒙憲卿如江冠卿三人尚㓜女五人曾孫男五人女三人卜十月已酉葬于池頭鶴叩嶺下湖隂尉朱桴濟道實狀其行銘曰捐財致身紓難去害其聲則㣲其功則大象笏昻昻朱銀煌煌公固不言天其以章前葬十日奉議郎新權發遣荆門軍兼𬋩内勸農營田事陸某撰并書吳伯顒墓誌臨川吳伯顒余妻弟也外舅五子伯顒為長孝友謹飭見扵稚齒婣娭賔朋毎所歎賞年十五𥙷入郡庠歲選嘗多許深甫蘇待問為教官時學校最盛伯顒居上游所為生財有大道論深甫極賞之謂後日當為世用𥘉為詩後為書為二禮月試皆嘗冠其倫然竟不薦名人為稱屈家甚貧外舅旣下世變故仍出歲益艱伯顒處以義理凛然不移尤人所難外姑之䘮将及大祥以㣲疾卒嗚呼痛㢤伯顒名顒居世系先諱具尤禮侍所為外舅茂榮之碑生扵紹興戊辰閏八月丁巳卒扵紹熈庚戌十一月乙亥以十有二月壬寅葬于金谿龍岡母塋之東娶周氏再娶亦其族一女尚㓜旣死以族子為嗣名繼孫生四歲矣前葬五日奉議郎新權發遣荆門軍兼𬋩内勸農營田事陸某誌陸修職墓表陸氏徙金谿年餘二百嗣見九世公居五世諱九臯字子昭同胞六人公為叔氏子羙其季也次為子夀次為某子夀下世今十有三年矣某狀其行述世系為詳當是時先君子未贈官其後某誌仲兄子儀之墓不復具世次獨載先君子贈承事郎今再贈宣教郎去年秋某迎侍伯兄子強來守荆門伯兄至甫一月旣歸歸未及家公已下世嗚呼痛㢤公少力于學日課經子文集必成誦夜閱史冊不盡帙不止嘗夜過分先君子見公猶觀書勉使寢息公後不能自已為之障燈屛息懼先君之復知之也及長𥙷郡學子弟貟一試即居上游郡慱士徐君視公文行俱優擢為齋長公與二季嘗正衣冠講誦不懈徐君毎所咨賞月試必聮名占前列徐君嘗語扵衆曰此其學皆有淵源非私之也然公年過三十始獲薦名又復不第投老乃得一官茲非命耶公持論根據經理耻穿鑿之習雖蹭蹬塲屋而人所推尊不在利逹者後授經之士或以獨歩膠庠或以擅塲南省而公之與否曾不以是一視其言行如何耳今其徒有忠信自将退然里巷庠序之間若将終焉而進修不替者公之教也先君子居約時門戸艱難之事公所當毎以條理精宻濟登平易吾家素無田𬞞圃不盈十畆而食指以千數仰藥療以生伯兄總家務仲兄治藥療公授徒家塾以束修之饋𥙷其不足先君晚歲用是得與族黨賔客優游觴詠從容琴奕𥙿然無窮匱之憂當是時公扵妻子裘葛未嘗問也杜子羙北征詩謂海圖折波濤舊繡移曲折天吳及紫鳯顛倒在短褐公妻子無海圖可折無天吳紫鳯可依然舊繡移曲折顛倒在短褐則有之矣先君子之䘮旣除公不復御講席家塾教授屬諸其季過從之隙時時杖䇿徜𦍕畦壟阡陌間檢校種刈若無意斯世者豈各以其時耶番昜許氏為書院桐嶺延師其間以處鄕之學者又自稟若干人然其季子往往從學于外亦嘗來從余游因得侍公凾丈之末公之餘論遺風或者竊有所聞矣一日父子恊謀闢廬舎儲噐用廣㑹集之堂增自稟之員介其鄕之賢者致禮以延公公却之再三請益固公為一出桐嶺學者扵是變而樂義理之言厭塲屋之陋士大夫聞風莫不願與三席自逺至者踵繫不絶興起甚衆然公年益髙頗倦酬應未㡬謝去越數歲安仁宰曾君文清孫也至則葺縣學増士稟修禮儀尊師道願公主之公不復出矣淳熈丁未江西歲旱撫為甚撫五邑金谿為甚倉臺郡守留意賑恤别駕廖君實主之廖知其說莫善扵鄕得其人莫不善扵吏與其事造廬問公計䇿且屈公為鄕官扵是鄕之所得多忠信之士而吏不得制其權以牟利明年賑糶行出粟受粟舉無異時之弊里閭熈熈不知為歉歲而俗更以善公力為多公平居混然無異扵人者而智識濬深遇事始見又其晦明之變人所不解當其晦時童子所了隷人所知公或不辨然特間見於燕閒視聼使令之間未始害事至事理之盤錯情偽之隱伏賢識趦趄或用蹉跌惟公之明如辨蒼素客有以名聞者公探衣将見之矣户間偶目其貌退而却衣曰吾不欲見斯人也已而果非佳士况此非獨人所不解公亦有不䏻自知者不以學自命而就證者類有愜志不以智自多而就謀者類有寤心公之得於天者如玉在山如珠在淵其可量㢤逆遜溺心形似蔽實㣲者過當甚者易位今之賢者未易免此惟公之明好惡不能亂形似不能蔽大學曰好而知其惡惡而知其羙者天下鮮矣故諺有之曰人莫知其子之惡莫知其苗之碩公疇昔亟誦斯言而屢歎其難公之所以自致其力者深矣是書之流行近世特甚然其靈足以造此者求諸其傑未見如公者焉公壮年以吕氏次序大學章句猶有未安扵是自為次序今逺方學者傳録浸廣吾家獨亡其藁公之子長者年將四十乃不知父嘗有是書蓋自其省事惟見公正文講授故也公見善未嘗不喜而稱道不浮其實見惡未嘗不惡而指摘不加其罪兩益之辭無所和一切之論無所取疑似之跡不輕實流傳之事不輕據故人之所稱有所未許人之所擯有所不絶衆人所决發言盈庭公毎低回以致裁抑憂世之士或病公首䑕不足以植風聲示懲勸而公隱然持之自若近年以文祭舊生徒劉堯夫頌其平日之羙責其晚節之過謂改之㝠㝠尤足為貴其辭深切著明讀者無不感動理之所存何間幽顯當疑而决當决而疑均為不明也孰謂公首䑕㢤公嘗名所居齋曰庸學者因號庸齋先生然公未嘗言其義學者亦未嘗有所請公著述頗多皆未編次生於宣和乙已十有二月十有四日辛亥卒扵紹熈辛亥十月十日乙酉享年六十有七卒之前一夕起旋小跌自是倦乏然就枕即熟睡覺時醫者視脉家人進藥雖飲之必曰吾不起矣十日之朝侍疾者忽不聞鼻息察公則已逝矣娶吳氏子四人損之益之賁之升之女二人長先公二年卒未及許嫁次許嫁貴溪張氏孫男一人女三人卜以紹熈壬子七月十有二日葬于鄕之長慶寺側公以淳熈甲辰夀聖慶恩授迪功郎監潭州南嶽廟十六年已酉上登極覃恩進修職郎某效官重湖疾不侍藥歛不撫棺葬不臨穴嗚呼痛㢤敬次序公平生以表墓某聞命之日嘗請迎侍公曰子行矣吾往時當自訪子訃前數日從公于夣自是節朔必夣見公嗚呼痛㢤東望隕涕為之銘曰如珠潜光可以照夜公之明也如玉儲潤可以賁山公之徳也表公之墳與斯銘其長存象山先生全集卷之二十八
