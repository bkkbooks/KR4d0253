body:
  text: 拾遺好學近乎知聖人之言有若不待辨而明自後世言之則有不可不辨者夫所謂智者是其識之甚明而無所不知者也夫其識之甚明而無所不知者不可以多得也然識之不明豈無可以致明之道乎有所不知豈無可以致知之道乎學也者是所以致明致知之道也向也不明吾從而學之學之不已豈有不明者哉向也不知吾從而學之學之不巳豈有不知者哉學果可以致明而致知則好學者可不謂之近智乎是所謂不待辨而明者也然大道之不明斯人之陷溺古之所謂學者後世莫之或知矣今自童子受一卷之書亦可謂之學雖學農圃技巧之業亦不可不謂之學人各隨其所欲能者而學之俗各隨其所漸誘者而學之均之為學也雖其學之也有好有不好其好之也有篤有不篤而當其篤好之也均之為好學也今學農圃技巧之業者姑不論而如童子受書如射御書數專為一藝者亦姑不論又如詭怪妖妄之人學為欺世誣人之事者亦姑不論而世蓋有人焉氣庸質腐溺于鄙陋之俗習于庸猥之説膠于卑淺零亂之見而乃勉勉而學孜孜而問茫茫而思汲汲而行聞見愈雜智識愈迷東轅則恐背于西南轅則恐違于北執一則懼為通者所笑泛從則懼為專者所非進退無守倣徨失據是其好之愈篤而自病愈深若是而學若是而好者果可謂之近于智乎此所謂自後世言之則有不可不辨焉者也學問求放心舉天下從事于其間而莫知其説理無是也而至于有是是豈可以不論其故哉學問也者是舉天下之所從事于其間者也然于其所以學問者而觀之則汙雜茫昧駁乎無以議為也古者學問之道于是而有莫知其説者矣仁人心也心之在人是人之所以為人而與禽獸草木異焉者也可放而不求哉古人之求放心不啻如飢之于食渴之于飲焦之待救溺之待援固其宜也學問之道蓋于是乎在下愚之人忽視玩聽不為動心而其所謂學問者乃轉為浮文緣飾之具甚至于假之以快其遂私縱欲之心扇之以熾其傷善敗類之𦦨豈不甚可歎哉學問之道無他求其放心而已矣孟子斯言誰為聽之不藐者主忠信人不可以無所主尤不可以主非其所主蓋人而無所主則倀倀然無所依歸將至于無所不為斯固有所不可也然至于主非其所主則念慮云為舉出于其心之所主方且陷溺于其中而自以為得雖有至言善道賢師良友亦無如之何則又不若無所主者之或能入于善也此夫子所以屢言之忠者何不欺之謂也信者何不妄之謂也人而不欺何往而非忠人而不妄何往而非信忠與信𥘉非有二也特由其不欺于中而言之則名之以忠由其不妄于外而言之則名之以信果且有忠而不信者乎果且有信而不忠者乎名雖不同總其實而言之不過良心之存誠實無偽斯可謂之忠信矣由是言之忠信之名聖人𥘉非外立其德以教天下蓋皆人之所固有心之所同然者也然人之生也不能皆上智不惑氣質偏弱則耳目之官不思而蔽于物物交物則引之而已由是向之所謂忠信者流而放僻邪侈而不能以自反矣當是時其心之所主無非物欲而已矣然則聖人所欲導還其固有舍曰主忠信其何以哉是故為人子而不主于忠信則無以事其親為人臣而不主于忠信則無以事其君兄弟而不主于忠信則傷夫婦而不主于忠信則乖朋友而不主于忠信則離視聽言動非忠信則不能以中理出處語默非忠信則不能以合宜凡文辭之學與夫禮樂射御書數之藝此皆古之聖賢所以居敬飬和周事致用備其道全其美者一不出于忠信則雖或能之亦適所以崇姦而長偽况其餘乎嗚呼忠信之于人亦大矣欲有所主捨是其可乎故夫子兩以告門人弟子而子張之問崇德亦以是告之至于贊易則又以為忠信所以進德也誠以忠信之于人如木之有本非是則無以為木也如水之有源非是則無以為水也人而不忠信果何以為人乎哉鸚鵡鸜鵒能人之言猩猩猿狙能人之技人而不忠信何以異于禽獸者乎嗚呼學者能審其所主則亦庶幾乎其可矣國以君為主則一國之事莫不由君而出軍以將為主則一軍之事莫不由將而出家以長為主則一家之事莫不由長而出人能以忠信為主則念慮云為舉一身之事莫不由忠信而出然而不能進于聖賢者吾未之信也毋友不如已者人之技能有優劣德器有小大不必齊也至于趍向之大端則不可以有二同此則是異此則非向背之間善惡之分君子小人之别于是決矣友者所以相與切磋琢磨以進乎善而為君子之歸者也其所向苟不如是惡可與之為友哉此毋友不如已者之意甚矣趨向之不可不謹而友之不可不擇也耳目之所接念慮之所及雖萬變不窮然觀其經營要其歸宿則舉係于其𥘉之所向布乎四體形乎動靜宣之于言語見之于施為醖釀陶冶涵浸長養日益日進而不自知者蓋其所向一定而勢有所必然耳彼其趨向之差而吾與之友則其朝夕逰處之間聲薰氣染波蕩風靡者豈不大可畏哉子張氏有于人何所不容如之何其拒人之説殆未知夫主忠信毋友不如已者之義也人不可以無耻人惟知所貴然後知所耻不知吾之所當貴而謂之有耻焉者吾恐其所謂耻者非所當耻矣夫人之所當貴者固天之所以與我者也而或至于戕賊陷溺顛迷于物欲而不能以自反則所可耻者亦孰甚于此哉不知乎此則其愧耻之心將有移于物欲得喪之間者矣然則其所以用其耻者不亦悖乎由君子觀之乃所謂無耻者也孟子曰人不可以無耻以此又不善之不可為非有所甚難知也人亦未必不知而至于甘為不善而不之改者是無耻也夫人之患莫大乎無耻人而無耻果何以為人哉今夫言之無常行之不軌既已昭著乃反睢睢揚揚飽食暖衣安行而自得略無愧怍之意吾不知其與鱗毛羽鬛山棲水育牢居野牧者何以異也人而至此果何以為人乎哉鈞是人也而至于有為聖為賢者獨何為而能然哉人之無耻者盍亦于是而少致其思乎人不可以無耻以此思則得之義理之在人心實天之所與而不可泯滅焉者也彼其受蔽于物而至于悖理違義蓋亦弗思焉耳誠能反而思之則是非取舍蓋有隱然而動判然而明決然而無疑者矣君子喻于義非其所志而責其習不可也非其所習而責其喻不可也義也者人之所固有也果人之所固有則夫人而喻焉可也然而喻之者少則是必有以奪之而所志所習之不在乎此也孰利于吾身孰利于吾家自聲色貨利至于名位祿秩苟有可致者莫不營營而圖之汲汲而取之夫如是求其喻于義得乎君子則不然彼常人之所志一毫不入于其心念慮之所存講切之所及唯其義而巳夫如是則亦安得而不喻乎此哉然則君子之所以喻于義者亦其所志所習之在是焉而已耳求則得之良心之在人雖或有所陷溺亦未始泯然而盡亡也下愚不肖之人所以自絶于仁人君子之域者亦特其自棄而不之求耳誠能反而求之則是非美惡將有所甚明而好惡趨舍將有不待強而自決者矣移其愚不肖之所為而為仁人君子之事殆若決江疏河而赴諸海夫孰得而禦之此無他所求者在我則未有求而不得者也求則得之孟子所以言也里仁為美自為之不若與人為之與少為之不若與衆為之此不易之理也仁人心也為仁由已而由人乎哉我欲仁斯仁至矣仁也者固人之所自為者也然吾之獨仁不若與人焉而共進乎仁與一二人焉而共進乎仁孰若與衆人而共進乎仁與衆人焉共進乎仁則其浸灌薰陶之厚規切磨礪之益吾知其與獨為之者大不侔矣故一人之仁不若一家之仁之為美一家之仁不若鄰焉皆仁之為美其鄰之仁不若里焉皆仁之為美也里仁為美夫子之言豈一人之言哉則以學文欲明夫理者不可以無其本本之不立而能以明夫理者吾未之見也宇宙之間典常之昭然倫類之燦然果何適而無其理也學者之為學固所以明是理也然其疇昔之日閨門之內所以慕望期嚮服習踐行者蓋泯然乎天理之萌蘖而物欲之蔽實豪據乎其中而為之主則其所以為學之本者固已蹶矣然而方且汲汲于明理吾不知所謂理者果可以如是而明之乎苟惟得之于天者未始泯滅而所以為學之本者見諸日用而足以怙乎人則雖其統紀條目之未詳自可以切磋窮究次第而講明之而是理亦且與吾相契而渙然釋怡然順者將不勝其衆矣則以學文夫子所以言也人心惟危道心惟微惟精惟一允執厥中知所可畏而後能致力于中知所可必而後能收效于中夫大中之道固人君之所當執也然人心之危罔念克念為狂為聖由是而分道心之微無聲無臭其得其失莫不自我曰危曰微此亦難乎其能執厥中矣是所謂可畏者也苟知夫危微之可畏也如此則亦安得而不致力于中乎毫釐之差非所以為中也知之苟精斯不差矣須臾之離非所以為中也守之苟一斯不離矣惟精惟一亦信乎其能執厥中矣是所謂可必者也苟知夫精一之可必也如此則亦安得而不收效于中乎知所可畏而致力于中知所可必而收效于中則舜禹之所以相授受者豈苟而己哉學古入官議事以制政乃不迷天下有不易之理是理有不窮之變誠得其理則變之不窮者皆理之不易者也理之所在固不外乎人也而人之生亦豈能遽明此理而盡之哉開闢以來聖神代作君臣之相與倡和彌縫前後之相與緝理更續其規恢締建之廣大深密咨詢計慮之委曲詳備證驗之著有足以折疑更嘗之多有足以破陋𬒳之載籍著為典訓則古制之所以存于後世者豈徒為故實文具而已哉以不易之理禦不窮之變于是乎在矣學之以入官操之以議事政之不迷固其所也汝分猷念以相從各設中于乃心必有所辨然後私説可得而破必有所主然後私意可得而絶道之所在固非私説之可擬中之所存固非私意之可間有道之君率由是中以圖事揆䇿其為民之意至炳炳也而不便于其私者輒持其私意倡為異説以鼓動吾民彼民之愚至怵于其私説黨于其私意相率而違上之令何理之是非至是而難見而心之權度至是而無所凖如此哉是殆其外之無所辨而異説之來不能無惑內之無所主而宅心之素不于其中而物得以奪飬心莫善于寡欲將以保吾心之良必有以去吾心之害何者吾心之良吾所固有也吾所固有而不能以自保者以其有以害之也有以害之而不知所以去其害則良心何自而存哉故欲良心之存者莫若去吾心之害吾心之害既去則心有不期存而自存者矣夫所以害吾心者何也欲也欲之多則心之存者必寡欲之寡則心之存者必多故君子不患夫心之不存而患夫欲之不寡欲去則心自存矣然則所以保吾心之良者豈不在于去吾心之害乎取二三䇿而已矣昔人之書不可以不信亦不可以必信顧于理如何耳蓋書可得而偽為也理不可得而偽為也使書之所言者理耶吾固可以理揆之使書之所言者事耶則事未始無其理也觀昔人之書而斷于理則真偽將焉逃哉苟不明于理而惟書之信幸而取其真者也如其偽而取之則其弊將有不可勝者矣孟子曰吾于武成取二三䇿而已矣非明于理者孰能與于此嘗謂言而無稽往哲以為不足聽事不師古昔賢以為非所聞堯舜之聖書以稽古稱之夫子之聖自謂好古敏而求之古訓是式詩所以稱仲山甫之賢必則古昔稱先王禮所以為學者之軌範也然則昔之聖賢蓋未嘗有不取于書者也欲求稽古昔以為師法訓式而非書之取將孰取之哉然而古者之書不能皆醇也而疵者有之不能皆然也而否者有之真偽之相錯是非之相仍使不通乎理而槩取之則安在其為取于書也昔之聖賢豈其然乎自羲皇以來至于夫子蓋所謂有道之世雖中更衰亂而聖明代興而周家又號為典章之備而職守之詳且嚴者當時載籍之傳宜其無所謂疵者否者偽者非者然而夫子之于書也于易則有八索之黜于職方則有九丘之除書必定詩必刪言夏商之禮則以為杞宋不足證武之樂未久也而聲淫及商至于老𣆀之問萇弘之問郯子之訪無非所以考核其醇疵真偽是非可否而斷之以理者也然則書之不可一槩而取也久矣雖然夫子天下後世固宜取信焉者也孟子之時去夫子為未逺而經籍皆出于夫子之筆削則雖槩而取之可也而于武成一篇所取者才二三䇿而巳無亦好髙求異之過耶嗚呼非也夫子所以取信于後世者豈徒爾哉抑以其理之所在而其一以貫之者建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑而已使書不合于理而徒以其經夫子之手而遂信之則亦安在其取信于夫子也况夫孟子雖曰去聖人之世未逺而亦百有餘歲矣言爵祿之班則曰諸侯惡其害已也而皆去其籍論堯舜之事則曰齊東野人之語而非君子之言然則于武城之篇不惟其書之信而一斷之以理又何疑焉故曰書不可以不信亦不可以必信使書而皆合于理雖非聖人之經盡取之可也况夫聖人之經又安得而不信哉如皆不合于理則雖二三䇿之寡亦不可得而取之也又可必信之乎蓋非不信之也理之所在不得而必信之也古人之于書稽求師式至于為聖為賢而後世乃有疲精神勞思慮皓首窮年以求通經學古而內無益于身外無益于人敗事之誚空言坐談之譏皆歸之者庸非不通于理而惟書之信其取之者不精而致然耶今夫藥石之儲不能皆和平也而悍毒者有之不能皆真良也而偽蠧者有之彼良醫之逰于其間也審病者之脈理知藥石之性味擇之精而用之適其宜是以百發而百中至非能醫者而以其病而遊焉槩取而試之苟其不中得無遇毒以益病而戕其身也哉不明乎理而惟書之信取之不當以至于悖理違道者得無類是乎故曰盡信書不如無書保民而王民生不能無群群不能無爭爭則亂亂則生不可以保王者之作蓋天生聰明使之統理人群息其爭治其亂而以保其生者也夫爭亂以戕其生豈人情之所欲哉彼其情驅勢激而至于此未有不思所以易之者也當此之時有能以息爭治亂之道拯斯民于水火之中豈有不翕然而歸往之者保民而王信乎其莫之能禦也續書何始于漢安于所習而絶意于古固君子之所患也以其所知而妄意于古尤君子之所大患也君臣上下之大分善惡義利之大較固天下不易之理非有隱奧而難知者也然而世衰道喪利欲之途一開而莫之或止角奔競逐相師成風如大防之一潰漶漫衍溢有不可復收之勢當是時所謂大分大較非隱奧而難知者往往顛倒錯亂廢墜湮沒而莫之或顧此後世之公患也人性之靈豈得不知其非然志銷氣腐無豪傑特立之操波流之所蕩激終淪胥而不能以自振尚何望其能軒輊于人哉然則安于所習而絶意于古者誠亦人之所深患也有人于此𬒳服儒雅師尊聖賢知大分大較之不可易隱然思以易當世志不得而攄其所有著之簡編以自附于古人此何啻去國之似人虗空之足音有識者之所宜深嘉屢嘆稱揚頌羡之不能自已者也而曰君子之所大患者何耶理之所當然而時不然有能去彼取此自拔于流俗自一言一行以往莫不有益莫不可貴然其髙下淺深大小多少雖毫釐之間不可以相踰越乘人之不然而張其殊于人者以自比于古之聖賢襲其粗迹偶其大形而侈其説以欺世而盜名則又有大不然者矣彼固出于識量之卑聞見之陋而世衰道微自為翹楚莫有豪傑之士剖其蒙開其蔽而遂至于此非固中懷譎詐而昭然有欺世盜名之心而為之也然其不知涯分偃蹇僣越自以為是人皆恱之而不可與入堯舜之道者蓋與賊德之鄉原所蔽不同而同歸于害正矣欺世盜名之號夫又焉得而避之續書何始于漢吾以為不有以治王通之罪則王道終不可得而明矣問古者言之不出耻躬之不逮也故君子欲行之浮于言不欲言之浮于行傅説告髙宗以遜志詩人稱文王小心翼翼記美后稷祿及子孫歸之于其辭恭其欲儉大言侈志固君子之所不取夫子講道洙泗之間而遊于其間者五尺童子羞稱五伯豈其五尺童子與管仲舅犯輩度長潔大舉能無所愧耶蜀諸葛孔明距今且千載更閲賢智多矣莫敢少訾而當時不過自比管樂孔門之童子豈皆度越孔明者乎不然何其言之大而志之侈也禮不苟訾學不躐等夫子之教必不其然苟以稱五伯之説為非是則孟子亦曰仲尼之徒無道桓文之事者或問曽西與管仲孰賢則曰爾何曽比豫于是然則羞稱之説信矣孟子言必稱堯舜且曰能言距楊墨者聖人之徒也楊墨亦當世所推使當時後生小子不自揆度靡然而非之豈遜志小心辭恭欲儉不苟訾不躐等之道乎諸君以孔孟為師者也願有所析其疑對東明之升群隂畢伏咸池既作窪鄭不可復陳矣康衢之謡擊壤之歌後世髙文大册不能無忝中林之夫漢上之女後世碩儒宗工不能無愧豈其智有所不足而力有所不逮哉道之不明不行而所以用其智力者病矣談中華之壯麗則夷裔之君長不如王朝之下士論滄海之汪洋則雍梁之秀民不如渤澥之庸夫理固然也道之行與不行明與不明相去逺矣傅説之遜志將以時敏厥修文王之小心所以昭事上帝其辭恭其欲儉后稷之德于是乎在矣必不苟訾而後可與言此必不躐等而後可以進此羞稱五伯能言距楊墨然後可以免于苟訾躐等之過
