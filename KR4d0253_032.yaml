body:
  text: 拾遺好學近乎知聖人之言有若不待辯而明自後世言之則有不可不辯者夫所謂智者是其識之甚明而無所不知者也夫其識之甚明而無所不知者不可以多得也然識之不明豈無可以致明之道乎有所不知豈無可以致知之道乎學也者是所以致明致知之道也向也不明吾從而學之學之不已豈有不明者㢤向也不知吾從而學之學之不巳豈有不知者㢤學果可以致明而致知則好學者可不謂之近智乎是所謂不待辯而明者也然大道之不明斯人之䧟溺古之所謂學者後世莫之或知矣今自童子受一卷之書亦可謂之學雖學農圃技巧之業亦不可不謂之學人各隨其所欲䏻者而學之俗各隨其所漸誘者而學之均之爲學也雖其學之也有好有不好其好之也有篤有不篤而當其篤好之也均之爲好學也今學農圃技巧之業者姑不論而如童子受書如射御書數專爲一藝者亦姑不論又如詭怪妖妄之人學爲欺世誣人之事者亦姑不論而世盖有人焉氣庸質腐溺扵鄙陋之俗習扵庸猥之說膠扵卑淺零亂之見而乃勉勉而學孜孜而問茫茫而思汲汲而行聞見愈雜智識愈迷東轅則恐背扵西南轅則恐違扵北執一則懼為通者所笑泛從則懼為專者所非進退無守彷徨失據是其好之愈篤而自病愈深若是而學若是而好者果可謂之近扵智乎此所謂自後世言之則有不可不辯焉者也學問求放心舉天下從事扵其間而莫知其說理無是也而至扵有是是豈可以不論其故哉學問也者是舉天下之所從事扵其間者也然于其所以學問者而觀之則汙雜茫昧駁乎無以議為也古者學問之道扵是而有莫知其說者矣仁人心也心之在人是人之所以為人而與禽獸草木異焉者也可放而不求哉古人之求放心不啻如饑之扵食渴之扵飲焦之待救溺之待援固其宜也學問之道盖扵是乎在下愚之人忽視玩聽不為動心而其所謂學問者乃轉為浮文縁飾之具甚至扵假之以快其遂私縱欲之心扇之以熾其傷善敗類之𦦨豈不甚可歎哉學問之道無他求其放心而已矣孟子斯言誰為聽之不藐者主忠信人不可以無所主尤不可以主非其所主盖人而無所主則倀倀然無所依歸将至扵無所不為斯固有所不可也然至扵主非其所主則念慮云為舉出扵其心之所主方且䧟溺扵其中而自以為得雖有至言善道賢師良友亦無如之何則又不若無所主者之或䏻入扵善也此夫子所以屢言之忠者何不欺之謂也信者何不妄之謂也人而不欺何徃而非忠人而不妄何徃而非信忠與信𥘉非有二也特由其不欺扵中而言之則名之以忠由其不妄扵外而言之則名之以信果且有忠而不信者乎果且有信而不忠者乎名雖不同緫其實而言之不過良心之存誠實無偽斯可謂之忠信矣由是言之忠信之名聖人𥘉非外立其徳以教天下盖皆人之所固有心之所同然者也然人之生也不䏻皆上智不惑氣質偏弱則耳目之官不思而蔽扵物物交物則引之而已由是向之所謂忠信者流而放僻邪侈而不能以自反矣當是時其心之所主無非物欲而已矣然則聖人所欲導還其固有舍曰主忠信其何以哉是故為人子而不主扵忠信則無以事其親為人臣而不主扵忠信則無以事其君兄弟而不主扵忠信則傷夫婦而不主扵忠信則乖朋友而不主扵忠信則離視聽言動非忠信則不能以中理出處語黙非忠信則不能以合宜凡文辭之學與夫禮樂射御書數之藝此皆古之聖賢所以居敬飬和周事致用備其道全其美者一不出扵忠信則雖或能之亦適所以崇姦而長偽况其餘乎嗚呼忠信之扵人亦大矣欲有所主捨是其可乎故夫子兩以告門人弟子而子張之問崇徳亦以是告之至扵賛易則又以為忠信所以進徳也誠以忠信之扵人如木之有本非是則無以為木也如水之有源非是則無以為水也人而不忠信果何以為人乎哉鸚鵡鸜鵒能人之言猩猩猿狙能人之技人而不忠信何以異扵禽獸者乎嗚呼學者能審其所主則亦庶㡬乎其可矣國以君為主則一國之事莫不由君而出軍以将為主則一軍之事莫不由将而出家以長為主則一家之事莫不由長而出人能以忠信為主則念慮云為舉一身之事莫不由忠信而出然而不能進扵聖賢者吾未之信也毋友不如已者人之技能有優劣徳器有小大不必齊也至扵趍向之大端則不可以有二同此則是異此則非向背之間善惡之分君子小人之别扵是决矣友者所以相與切磋琢磨以進乎善而爲君子之歸者也其所向苟不如是惡可與之爲友哉此毋友不如已者之意甚矣趋向之不可不謹而友之不可不擇也耳目之所接念慮之所及雖萬變不窮然觀其經營要其歸宿則舉係扵其𥘉之所向布乎四體形乎動静宣之扵言語見之扵施爲醖釀陶冶涵浸長養日益日進而不自知者盖其所向一定而勢有所必然耳彼其趋向之差而吾與之友則其朝夕逰處之間聲薰氣染波蕩風靡者豈不大可畏哉子張氏有扵人何所不容如之何其拒人之說殆未知夫主忠信毋友不如已者之義也人不可以無耻人惟知所貴然後知所耻不知吾之所當貴而謂之有耻焉者吾恐其所謂耻者非所當耻矣夫人之所當貴者固天之所以與我者也而或至扵戕賊䧟溺顛迷扵物欲而不能以自反則所可耻者亦孰甚扵此哉不知乎此則其愧耻之心将有移扵物欲得䘮之間者矣然則其所以用其耻者不亦悖乎由君子觀之乃所謂無耻者也孟子曰人不可以無耻以此又不善之不可為非有所甚難知也人亦未必不知而至扵甘為不善而不之改者是無耻也夫人之患莫大乎無耻人而無耻果何以為人哉今夫言之無常行之不軌既已昭著乃反睢睢揚揚飽食煖衣安行而自得畧無愧怍之意吾不知其與鱗毛羽鬛山棲水育牢居野牧者何以異也人而至此果何以為人乎哉鈞是人也而至扵有為聖為賢者獨何為而能然哉人之無耻者盍亦扵是而少致其思乎人不可以無耻以此思則得之義理之在人心實天之所與而不可冺㓕焉者也彼其受蔽扵物而至扵悖理違義盖亦弗思焉耳誠能反而思之則是非取舎盖有隱然而動判然而明决然而無疑者矣君子喻扵義非其所志而責其習不可也非其所習而責其喻不可也義也者人之所固有也果人之所固有則夫人而喻焉可也然而喻之者少則是必有以奪之而所志所習之不在乎此也孰利扵吾身孰利扵吾家自聲色貨利至扵名位禄秩苟有可致者莫不營營而圖之汲汲而取之夫如是求其喻扵義得乎君子則不然彼常人之所志一毫不入扵其心念慮之所存講切之所及唯其義而巳夫如是則亦安得而不喻乎此哉然則君子之所以喻扵義者亦其所志所習之在是焉而已耳求則得之良心之在人雖或有所䧟溺亦未始冺然而盡亡也下愚不肖之人所以自絶扵仁人君子之域者亦特其自棄而不之求耳誠䏻反而求之則是非美惡将有所甚明而好惡趋舎将有不待强而自决者矣移其愚不肖之所為而為仁人君子之事殆若决江䟽河而赴諸海夫孰得而禦之此無他所求者在我則未有求而不得者也求則得之孟子所以言也里仁為美自為之不若與人為之與少為之不若與衆為之此不易之理也仁人心也為仁由已而由人乎哉我欲仁斯仁至矣仁也者固人之所自為者也然吾之獨仁不若與人焉而共進乎仁與一二人焉而共進乎仁孰若與衆人而共進乎仁與衆人焉共進乎仁則其浸灌薫陶之厚規切磨礪之益吾知其與獨爲之者大不侔矣故一人之仁不若一家之仁之爲美一家之仁不若隣焉皆仁之爲美其隣之仁不若里焉皆仁之爲美也里仁爲美夫子之言豈一人之言㢤則以學文欲明夫理者不可以無其本本之不立而䏻以明夫理者吾未之見也宇宙之間典常之昭然倫類之燦然果何適而無其理也學者之爲學固所以明是理也然其疇昔之日閨門之内所以慕望期嚮服習踐行者盖冺然乎天理之萌蘖而物欲之蔽實豪據乎其中而為之主則其所以為學之本者固已蹷矣然而方且汲汲扵明理吾不知所謂理者果可以如是而明之乎苟惟得之扵天者未始冺㓕而所以為學之本者見諸日用而足以怙乎人則雖其統紀條目之未詳自可以切磋窮究次第而講明之而是理亦且與吾相契而渙然釋怡然順者将不勝其衆矣則以學文夫子所以言也人心惟危道心惟㣲惟精惟一允執厥中知所可畏而後能致力扵中知所可必而後能收效扵中夫大中之道固人君之所當執也然人心之危罔念克念為狂為聖由是而分道心之㣲無聲無臭其得其失莫不自我曰危曰㣲此亦難乎其能執厥中矣是所謂可畏者也苟知夫危㣲之可畏也如此則亦安得而不致力扵中乎毫釐之差非所以為中也知之苟精斯不差矣須臾之離非所以為中也守之苟一斯不離矣惟精惟一亦信乎其能執厥中矣是所謂可必者也苟知夫精一之可必也如此則亦安得而不收效扵中乎知所可畏而致力扵中知所可必而收效扵中則舜禹之所以相授受者豈苟而己哉學古入官議事以制政乃不迷天下有不易之理是理有不窮之變誠得其理則變之不窮者皆理之不易者也理之所在固不外乎人也而人之生亦豈能遽明此理而盡之哉開闢以來聖神代作君臣之相與倡和彌縫前後之相與緝理更續其規恢締建之廣大深宻咨詢計慮之委曲詳備證驗之著有足以折疑更甞之多有足以破陋𬒳之載籍著為典訓則古制之所以存扵後世者豈徒為故實文具而已㢤以不易之理禦不窮之變扵是乎在矣學之以入官操之以議事政之不迷固其所也汝分猷念以相從各設中于乃心必有所辨然後私說可得而破必有所主然後私意可得而絶道之所在固非私說之可擬中之所存固非私意之可間有道之君率由是中以圖事揆䇿其為民之意至炳炳也而不便于其私者輒持其私意倡為異說以鼓動吾民彼民之愚至怵扵其私說黨扵其私意相率而違上之令何理之是非至是而難見而心之權度至是而無所凖如此㢤是殆其外之無所辨而異說之來不能無惑内之無所主而宅心之素不于其中而物得以奪飬心莫善扵寡欲将以保吾心之良必有以去吾心之害何者吾心之良吾所固有也吾所固有而不能以自保者以其有以害之也有以害之而不知所以去其害則良心何自而存㢤故欲良心之存者莫若去吾心之害吾心之害既去則心有不期存而自存者矣夫所以害吾心者何也欲也欲之多則心之存者必寡欲之寡則心之存者必多故君子不患夫心之不存而患夫欲之不寡欲去則心自存矣然則所以保吾心之良者豈不在扵去吾心之害乎取二三䇿而已矣昔人之書不可以不信亦不可以必信顧扵理如何耳盖書可得而偽為也理不可得而偽為也使書之所言者理耶吾固可以理揆之使書之所言者事耶則事未始無其理也觀昔人之書而㫁扵理則真偽将焉迯㢤苟不明扵理而惟書之信幸而取其真者也如其偽而取之則其弊将有不可勝者矣孟子曰吾扵武成取二三䇿而已矣非明扵理者孰能與扵此甞謂言而無稽徃哲以為不足聽事不師古昔賢以為非所聞尭舜之聖書以稽古稱之夫子之聖自謂好古敏而求之古訓是式詩所以稱仲山甫之賢必則古昔稱先王禮所以為學者之軌範也然則昔之聖賢盖未甞有不取扵書者也欲求稽古昔以為師法訓式而非書之取将孰取之㢤然而古者之書不能皆醇也而疵者有之不能皆然也而否者有之真偽之相錯是非之相仍使不通乎理而槩取之則安在其為取扵書也昔之聖賢豈其然乎自羲皇以來至扵夫子盖所謂有道之世雖中更衰亂而聖明代興而周家又號為典章之備而職守之詳且嚴者當時載籍之傳宜其無所謂疵者否者偽者非者然而夫子之扵書也扵易則有八索之黜扵職方則有九丘之除書必定詩必刪言夏商之禮則以為杞宋不足証武之樂未乆也而聲淫及商至扵老𣆀之問萇弘之問郯子之訪無非所以攷覈其醇疵真偽是非可否而㫁之以理者也然則書之不可一槩而取也乆矣雖然夫子天下後世固宜取信焉者也孟子之時去夫子為未逺而經籍皆出扵夫子之筆削則雖槩而取之可也而扵武成一篇所取者纔二三䇿而巳無亦好髙求異之過耶嗚呼非也夫子所以取信扵後世者豈徒爾㢤抑以其理之所在而其一以貫之者建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑而已使書不合扵理而徒以其經夫子之手而遂信之則亦安在其取信扵夫子也况夫孟子雖曰去聖人之世未逺而亦百有餘歲矣言爵禄之班則曰諸侯惡其害已也而皆去其籍論尭舜之事則曰齊東野人之語而非君子之言然則扵武城之篇不惟其書之信而一㫁之以理又何疑焉故曰書不可以不信亦不可以必信使書而皆合扵理雖非聖人之經盡取之可也况夫聖人之經又安得而不信㢤如皆不合扵理則雖二三䇿之寡亦不可得而取之也又可必信之乎盖非不信之也理之所在不得而必信之也古人之扵書稽求師式至扵為聖為賢而後世乃有疲精神勞思慮皓首窮年以求通經學古而内無益扵身外無益扵人敗事之誚空言坐談之譏皆歸之者庸非不通扵理而惟書之信其取之者不精而致然耶今夫藥石之儲不䏻皆和平也而悍毒者有之不能皆真良也而偽蠧者有之彼良醫之逰扵其間也審病者之脉理知藥石之性味擇之精而用之適其宜是以百發而百中至非能醫者而以其病而遊焉槩取而試之苟其不中得無遇毒以益病而戕其身也㢤不明乎理而惟書之信取之不當以至扵悖理違道者得無類是乎故曰盡信書不如無書保民而王民生不䏻無群群不䏻無争争則亂亂則生不可以保王者之作盖天生聦明使之統理人群息其争治其亂而以保其生者也夫争亂以戕其生豈人情之所欲㢤彼其情驅勢激而至扵此未有不思所以易之者也當此之時有䏻以息争治亂之道拯斯民扵水火之中豈有不翕然而歸徃之者保民而王信乎其莫之䏻禦也續書何始扵漢安扵所習而絶意扵古固君子之所患也以其所知而妄意扵古尤君子之所大患也君臣上下之大分善惡義利之大較固天下不易之理非有隱奥而難知者也然而世衰道䘮利欲之途一開而莫之或止角奔競逐相師成風如大防之一潰漶漫衍溢有不可復收之勢當是時所謂大分大較非隱奥而難知者徃徃顛倒錯亂廢墜湮沒而莫之或顧此後世之公患也人性之靈豈得不知其非然志銷氣腐無豪傑特立之操波流之所蕩激終淪胥而不䏻以自振尚何望其䏻軒輊扵人㢤然則安扵所習而絶意扵古者誠亦人之所深患也有人扵此𬒳服儒雅師尊聖賢知大分大較之不可易隱然思以易當世志不得而攄其所有著之簡編以自附扵古人此何啻去國之似人虗空之足音有識者之所宜深嘉屢嘆稱揚頌羡之不能自已者也而曰君子之所大患者何耶理之所當然而時不然有䏻去彼取此自㧞扵流俗自一言一行以徃莫不有益莫不可貴然其髙下淺深大小多少雖毫釐之間不可以相踰越乗人之不然而張其殊扵人者以自比扵古之聖賢襲其粗迹偶其大形而侈其說以欺世而盗名則又有大不然者矣彼固出扵識量之卑聞見之陋而世衰道㣲自為翹楚莫有豪傑之士剖其蒙開其蔽而遂至扵此非固中懐譎詐而昭然有欺世盗名之心而為之也然其不知涯分偃蹇僣越自以為是人皆恱之而不可與入尭舜之道者盖與賊徳之鄉原所蔽不同而同歸扵害正矣欺世盗名之號夫又焉得而避之續書何始扵漢吾以為不有以治王通之罪則王道終不可得而明矣問古者言之不出耻躬之不逮也故君子欲行之浮扵言不欲言之浮扵行傅說告髙宗以遜志詩人稱文王小心翼翼記美后稷禄及子孫歸之扵其辭恭其欲儉大言侈志固君子之所不取夫子講道洙泗之間而遊扵其間者五尺童子羞稱五伯豈其五尺童子與管仲舅犯軰度長絜大舉䏻無所愧耶蜀諸葛孔明距今且千載更閱賢智多矣莫敢少訾而當時不過自比管樂孔門之童子豈皆度越孔明者乎不然何其言之大而志之侈也禮不苟訾學不躐等夫子之教必不其然苟以稱五伯之說為非是則孟子亦曰仲尼之徒無道桓文之事者或問曽西與管仲孰賢則曰爾何曽比予扵是然則羞稱之說信矣孟子言必稱尭舜且曰能言距楊墨者聖人之徒也楊墨亦當世所推使當時後生小子不自揆度靡然而非之豈遜志小心辭恭欲儉不苟訾不躐等之道乎諸君以孔孟為師者也願有所析其疑對東明之升群隂畢伏咸池既作窪鄭不可復陳矣康衢之謡擊壌之歌後世髙文大冊不能無忝中林之夫漢上之女後世碩儒宗工不能無愧豈其智有所不足而力有所不逮㢤道之不明不行而所以用其智力者病矣談中華之壮䴡則夷裔之君長不如王朝之下士論滄海之汪洋則雍梁之秀民不如渤澥之庸夫理固然也道之行與不行明與不明相去逺矣傅說之遜志将以時敏厥修文王之小心所以昭事上帝其辭恭其欲儉后稷之徳扵是乎在矣必不苟訾而後可與言此必不躐等而後可以進此羞稱五伯能言距楊墨然後可以免扵苟訾躐等之過
