front:
  text: 象山先生全集卷之十書
  hash: sha256:0a39dbd36eb1e8cb1a513c3b260af6fb0f9b98dc97fa6ee93060015d69db2cbb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_010-1a}
body:
  text: 與李成之某去冬距對班數日忽有匠丞之除王給事遂見繳既而聞之有謂吾將發其為首相瓜牙者故皇懼為此抑可憐也古人所以不屑屑于間政適人而必務有以格君心者蓋君心未格則一邪黜一邪登一弊去一弊興如循環然何有窮巳及君心既格則規模趨鄉有若燕越邪正是非有若蒼素大明既升羣隂畢伏是瑣瑣者亦何足復汙人牙頰哉鄉來靣對粗陳梗槩明主不以為狂而條貫靡竟統紀未終所以低回之久者欲俟再望清光輸寫忠藴以致臣子之義耳然而不遂則亦天也王氏之子焉能使豫不遇哉二李尉處附至三月晦日書發讀慰浣之極别𥿄尤見情實歷述病狀可謂自知之審矣為仁由巳而由人乎哉奮拔植立豈不在我若只管譏評因循不能勇奮特立如官容姦吏家留盜虜日積憂患而不勇于一去之決誰實為之今幸尚知其為姦盜而患苦之護惜玩愒之久寖以習熟便安之未必不反以為忠良也任賢勿二去邪勿疑豈獨為國而然為家為身蓋一理也願精思深察致一日克已復禮之力當有勿憂宜日中之快矣與應仲實向自使華在江東時草草具復來貺尋拜數字附鄉里士人以行而執事移帥南服之命巳下用不果逹其時某適至隆興在翠岩洪井間得聞從者至止亟還城下則棨戟又南矣甚為悵然屬嘗于復漕臺書中寄意語次亦曾及之否蒼梧舜迹所及交趾合浦九真日南為郡古矣粵自翠華南波更為近服班宣之任類皆名儒重臣間者猶以簿書遺䇿米鹽末務仰勤冕旒南顧之憂官人之難乃如此兹焉帥閫暫屈明賢此其加惠嶺海之民可謂至矣撫柔安輯當有餘地遠方知方興于禮義此其時也漕臺心事犖犖伏想相得甚歡金蘭之誼於是有證健羡健羡某往歲亦蒙誤恩卑壘荆門尚遲餘教以逃大戾區區近况有鄙文數篇公餘過目可槩見矣去年秋冬又兩通晦翁書然前説且倚閣矣與張季海久欲詣謁坐此塗潦政爾未遂缺然斯懷金溪西北並臨川處率多早田耕必三􆇠秋乃可望常歲及今再耜挾矣今阻寒凍曾未舉趾農者凛然有無年之憂雷先啓蟄泉源已動泉之盛一甲子而止動早則及夏淺動晚則及夏深泉與雨澤亦相表裏故動早旱徴動晚稔徵今先啓蟄而動則不及夏矣比年貨泉日縮民生日貧榖價雖亷往往乏食重以冬春仍雪積雨畦塗隴敗無所施力困亦劇矣霖霪未止為之奈何浦城小寇幸已成擒警候之事尤非今日所能堪也邑民以公事至廷者莫不稱頌賢德而遊談之士往往以聼信百石為疑雖其無根不足深據然形似則有以致之更惟加察二久以道濘不遂往見既望常作一𥿄以致區區尋以少霽欲留靣剖又不果逹今併往一觀新宰既不果來吾邑遂可以久𬒳賢者之澤向來不作久計深為足下不取古人于事無小大無久近其處之一也居一日亦當盡吾道學絶道喪所從來久矣放利而行者滔滔也比嘗與主簿論喻義喻利之説語次曾及之否弊邑之陋風俗未還于正所幸主簿意向甚美第未甚更歷耳外此不復有正人區區亦不能不為左右深慮要當卓然以古人自期憫惻流俗如失心者而後能無所陷溺人患無朋友無聞見與其親不正之人聞不正之言則寧其無也若見不賢而內自省擇其不善者而改之則皆吾師也與張元鼎比方得向來論事之書張權因造簿正其宿弊此固當然比復使君書固是之矣若創征之事此甚不可足下之辨殆類冉求之辨伐顓臾金溪陶户大抵皆晨民于農隙時為之事體與番易鎮中甚相懸絶今時農民率多窮困農業利薄其來久矣當其隙時藉他業以相輔助者殆不止此邦君不能輔其不足助其不給而又征其自輔助之業是奚可哉𥘉甚駭聞兹事繼而聞其説出于沈尉即悟其為此謀之人豈能肩輔于調度若其傷邦君之政體不復可得而文飾矣沈生小子本無知識豈恤州郡豈愛邦君豈念小民獨為挾私者所嗾耳所重可惜者遂使賢使君為挾私之人所役而足下又代挾私者為辨此人之術何其如此之高乃能挾一邪説以役二賢者又重可怪也今未知已如何施行正宜及其未深有以改之無為此人所笑與黃康年此道充塞宇宙天地順此而動故日月不過而四時不忒聖人順此而動故刑罰清而民服古人所以造次必于是顛沛必于是也斯須不順是謂不敬雖然巳私之纍人非大勇不能克一日克巳復禮天下歸仁焉豈直推排而已哉縱使失于警戒舊習乘之當其思之覺之復之之時亦必大勇而後能得其正也願益勉之與胡無相惠書憂憫俗學傷悼邪見深中時病惟是推許過盛非所敢承劉定夫得數目之欵張誠子迫試期不及一見但得訊云回日見過定夫亦約早晚登山山間朋友近多讀尚書上古道義素明有倡斯和無感不通只是家常茶飯今人既惑于利祿又蔽于邪説見説此理翻成特地豈不可憐哉與朱益叔區區之學不能自已朋儕相課亦謂月異而歲不同每觀往年之文其大端大旨則久有定論至今不易若其支葉條目踈漏舛錯往往有之必加刪削乃可傳也向在朋友間時見所傳鄙丈亦有全偽者此尤不可不知也開歲合並當究其説學絶道喪私説詖論充塞彌滿朋友講貫未能符合其勢然也然至當歸一精義無二至于心獨無所同然乎此孟子之至言但詠歌伐木之篇緝熙其事終必有無間然者矣與路彥彬得函教又辱以盛製文盛意勤顧何以當雖然似有未相曉者義不敢不宣逹于左右竊不自揆區區之學自謂孟子之後至是而始一明也平日拳拳于左右者豈徒以親戚之故哉古人纓絶肘見不以為病纍日不火食歌聲若出金石或者未能深信與信之而未濟登滋則兹當挾轅推轂以相從于康莊也若金錢榖粟之惠遺非某之任也聚族之衆終歲之計未免于飢歲日索公堂米無毫髮輔助亦以事有大于此者未敢任此責也得時行道固吾人分內事然與世俗羡慕富貴者天淵不足諭也來詩似未免俗意尤非所望非高明亦不敢直言如此與塗任伯來喻勤勤大槩謂來學者未必可語而有耗氣勞體之患此誠足下愛我之心也雖然足下顧未知自愛安能愛我哉比數得與足下接語此邦之士惑焉者甚衆進而效説者亦不少矣大抵皆是何足與言仁義之意然稠人廣坐其意蓋不皆如是也其意如是者必其不知自愛者也其意不如是者必其知自愛者也今足下之言乃與其不知自愛者若合符節此吾所以甚為足下不取也素問之書乃秦漢以後醫家之書託之黃帝岐伯耳上古道純德備功利之説不興醫卜之説亦不如是比見足下好誦其言特素未講學不知其非耳某氣稟素弱年十四五手足未嘗溫暖後以稍知所向體力亦隨壯也今年過半百雖少加衰于壯時然以足下之盛年恐未能相逮也何時合并以究斯義與董元錫元錫舊常有向學之意而中自畫每切念之無由奉逹今因此輒致區區幸少垂聼往訓中言小人者甚多不可一槩觀小人字雖同而其所指乃有相去天淵者論語所謂女為君子儒無為小人儒又曰言必信行必果硜硜然小人哉又如尹士既聞孟子之言則曰士誠小人也此等則是學不至道而囿于私見不能終從其大體故謂之小人易曰小人不耻不仁不畏不義不見利不勸不威不懲此則氣質乖戾姦憸凶惡之小人也治世盛時若不格靣從化則刑戮之所不貸此兩者善惡雅俗汙潔之辨如雲泥矣元錫平時喜事好修何至為由後之小人哉若由前之小人則恐非元錫之所能及今流俗不學之人而其質不至于不耻不仁不畏不義又不得陶冶于先聖王之教方憑其私意自以為善此則是俗人不得謂之士不得謂之儒此輩必不能如尹士自知之明也然俗人中氣質又有厚薄輕重大小平時所惜于元錫者為其氣質偶不得其厚重者故不能自拔于市井之習又輒憑之以妄議人之長短所見日陋如來書所謂讐即陋見也知巳之説亦陋然吾能化陋以為廣大請借元錫知巳之説而言之元錫誠欲求知巳當今之世捨我其誰哉但恐元錫怕逢知巳耳元錫誠能不安其舊惟新是圖則本心可以立復舊習可以立熄居仁由義大人之事備矣誰得而禦之與倪濟甫聞不就程試決計登山甚為之喜壽翁寄示中秋分韻尤用嘉歎天宇澄徹月華晶瑩頻年未有如此夕者老子于此興復不淺是夕月午啓門相半東望兹山亦念不負此月者在諸賢爾自昭明德何必是夕造次顛沛莫不當然涵泳存飬計當日新山翁在此濟甫之來不當遲遲也與黃彥文寵示盛製詞典句老動有稽據非近時後生所及深用降歎下問求益之意如川方至此尤不可及然有如耆德所進當在文字之表則所謂真訣在其中矣恨行役匆匆未得從容以究其説尚冀快誦屈子覽冀州兮有餘橫四海兮焉窮之句以厲益壯之志當刮目以俟與劉志甫趙仲聲還得書讀之渙然深用慰懌順伯與足下相繼入册府亦前時所無求外想亦未容遽也誠者非自成巳而巳也所以成物也成巳仁也成物知也性之德也合內外之道也交遊間氣質不至扞格者當日有麗澤之益此其為進德之驗甚著馮傳之氣稟恢然當今難得所當共愛惜之向來相聚失于懶散不曾與之啓其大端去歲嘗有一書勉之近得其書殊覺其邈然不相入深為惋惜志甫尚能致力于此乎今録向來書藁去若致力切磋庶有其端也近與春伯一書痛針其陋習膏肓能索觀之為佳道之行不行固天也命也至于講明則不可謂命也知言者亦何必俟其效之著而知其所到哉此心本靈此理本明至其氣稟所蒙習尚所梏俗論邪説所蔽則非加剖剝磨切則靈且明者曾無驗矣與邵叔誼教以向來為學本末又加詳于前日所聞甚幸但敘述愚言處則盡失其實便須認為已物一句尤害義理誠如此可謂罪人處矣前來所説猶是竊盜此舉遂為強盜為強盜而不讓豈可容于世哉𥘉一再見時頗覺左右好隨即為數語述所聞每乖其實既得旬日浹之欵意必巳悟前非不謂又作此等語乃復甚于𥘉時此即病證之大者失今不治必為痼疾豈更可言為學哉此心苟得其正聼言發言皆得其正聼人之言而不得其正乃其心之不正也一人言之衆人聼之使衆人各述其所聼則必不齊非言者之異也聼者之異也來書之至此間友朋觀之皆駭而問曰何為有此言因答之曰是非吾言也邵機冝之言也某屢言先立乎其大者又嘗申之曰誠能立乎其大者必不相隨而為此言矣屢言仁以為已任又嘗申之曰誠仁以為已任必不相隨而為此言矣蓋後世學者之病多好事無益之言假令記憶言辭盡無差爽猶無益而有害况大乖其旨盡失其實邪向來造見對語移時𥘉間頗覺左右之心不能無餒既而發明此理稍相切磋殊覺小快及再相見接語之間巳覺非復前日矣是後相從雖纍日衆中泛語終不得獨相叩問兹得來示方知窒塞如𥘉此乃向來不得真實師友講貫傳授類皆虛見空言徒增繆妄今能盡棄前非務明正理則此心之靈此理之明誰得而蔽之某前書所以相勉者可謂至矣幸復熟而究切之也得元晦書其蔽殊未解然其辭氣窘束或恐可療也某復書又加明暢併録往幸精觀之與江德功蒙示晦翁書敬領回書徑自此遣往矣副本録在邵叔誼處可索觀之白白長長之言是古人辨論處非用工處言論不合于理乃理未明耳非誠意之罪也與曾宅之十日朋舊書問至多向所惠書卒難尋檢其時復書亦無草藁今皆不能記憶來書謂某嘗有文義溺志之戒某平時與朋舊講貫不敢泛為之説大抵有所據而後言若誠有是是必據來書而言之耳亦略記得曾有一卷粘𥿄數幅寫前輩議論十數假于後注所見與所疑又各空其後以俟某之説此豈非吾友所示耶記得當時看畢甚喜其有志于學亦甚惜其學未知方亦嘗以示一二朋友因謂之曰此人氣質志向固不碌碌但未得親師友胸中雜然殊未明本末先後之序今千里寓書𥿄筆之間豈能遽解其惑且當示以讀書之法使之無徒耗其精神後日相見當有可言耳亦略記回書大意謂讀古書且當于文義分明處誦習觀省毋忽其為易曉毋恃其為巳曉則久久當有實得實益至于可疑者且當優遊厭飫以俟之不可強探力索後日于文義易曉處有進則所謂疑惑難曉者往往渙然而自解却不記得有溺志之辭此後枉問得備録前後書辭見示庶有據依也近見所在友朋多有好理會文義反不通者蓋不知學當有師天之生斯民也以先知覺後知以先覺覺後覺此其理也誠得其師則傳授之間自有本末先後不使學者叢然雜然費其目力耗其精神而無所至止也此説要非相見不能究秋涼能一來乎先兄平日無甚著述惟有往來論學之書中間編次未就後日垂訪當共讀之也與周元忠積雨遐想風練飛雪之壯甚願與諸公翻經其間以俟玉芝之茂倘有意于此何以期為霽日媚景晴雲絢文此吾命駕時也今日平分一春羲和會當少出幽險緩轡天衢照臨吾徒成此盛集與詹子南日享事實之樂而無暇辨析于言語之間則後日之明自足以識言語之病急于辨析是學者大病雖若詳明不知其纍我多矣石稱丈量徑而寡失銖銖而稱至石必謬寸寸而度至丈必差今吾但能造次必于是顛沛必于是勿忘勿助長則不亦樂乎又何必紛紛為大小之辨也二廖倅處送至四月二十四日書發讀甚慰馳系用力不懈無他疑惑甚善甚善此心至靈此理至明要亦何疑之有然又以無疑為疑是未能無疑也事理有未明則不容不疑思索之問辨之則疑有時而釋矣疑亦豈足願哉今既曰無疑矣乃以無疑為疑何哉願速更之母滋其惑二包至此久矣今皆歸其家約秋間復來顔子堅既巳去髮胡服非吾人矣此人質性本亦虛妄故卒至于此育王有一僧曰祖新姓趙字日新其為僧非本志質甚穩實亦有復衣冠之志曾識之否得來書亟作此託廖丈附便奉逹不能多具與吳顯仲得書承比來履用佳適進學不替為慰來書見喻所學仍見敏道説頗以藝能不如人為憂此甚非也當書論語弟子入則孝出則弟一章併子夏賢賢易色一章于几案間朝夕觀省以改前過讀書作文之事自可隨時隨力作去才力所不及者甚不足憂甚不足耻必以才力所不可強者為憂為耻乃是喜誇好勝失其本心真所謂不依本分也看顯仲氣質本自質朴淳實何故如此但自依本分朴實頭作箇求正于人有所疑不去亦且隨見在有何不可但頻頻看前兩章書便自不至顛倒也象山先生全集卷之十
