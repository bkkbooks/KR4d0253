body:
  text: 程文庸言之信庸行之謹間邪存其誠善世而不伐德慱而化解試知所以成已而無非僻之侵則誠之在已者不期而自存知所以成物而無驕盈之纍則德之及物者不期而自化乾之九一何其誠之至而德之慱也庸言之必信庸行之必謹是知所以成已矣知所以成已則誠豈有外乎此哉又懼夫邪之為吾害而間之也嚴使無一毫非僻之習以侵之則誠日益至而在已者不期存而自存矣反而誠其身推以善斯世是知所以成物矣知所以成物則德豈有外乎此哉又懼夫伐之為吾病而去之也盡使無一毫驕盈之氣以纍之則德日益慱而及物者不期化而自化矣誠之在已者不期存而自存而其端特在于間邪德之及物者不期化而自化而其機特在于不伐則天理人欲之相為消長其間可謂不容髮矣庸言之信庸行之謹間邪存其誠善世而不伐德慱而化此所以為君德歟中庸之言誠曰非自成已而已也所以成物也然則成已成物一出于誠彼其所以成巳者乃其所以成物者也非于成已之外復有所謂成物也又曰性之德也合內外之道也然則曰誠曰德一本乎性彼其所謂誠者乃其所以為德者也非于誠之外復有所謂德也明乎中庸之説則乾九二之君德可得而議矣言行之信謹二之所以成巳者也善世而不伐二之所以成物者也彼其所謂信謹者乃其所以不伐者也舍言行而求其所以善世者則乖矣間邪存其誠誠之存諸已者也德慱而化德之及乎物者也彼其所以間而存者乃其所以慱而化者也外乎誠之存而求其所謂德之慱則惑矣若夫朝謀夕訪求所以治乎人而不知反求諸其身安知夫大人正巳而物正而二之善世者特在乎言行之間而巳也小惠小信欲以為巳之德而不知誠之不可掩安知夫明明德于天下者蓋本于正心誠意而二之德慱者由乎其誠之存也至矣哉誠之在天下也一言之細一行之微固常人之所忽然言出乎身加乎民行發乎邇見乎逺言行君子之所以動天地也君子喘言蠕動皆足法造次顛沛必于是庸言之信而莫不可以為天下則庸行之謹而莫不可以為天下法知至乎吾之誠而不知夫言行之細也然邪之與正猶明魄之相為生死隂陽之相為消長非僻之習一毫焉侵之則言隨以不信而行隨以不謹矣尚何有于誠之至故為冠以莊其首為履以重其足在車聞和鸞之音行步聞佩玉之聲盤盂有銘几杖有戒所以防間其邪而使非僻無自而至者備矣則凡見乎吾身而充乎天地者何往而非誠哉茲不曰不期而自存者乎大矣哉德之見于天下也推吾所有兼善天下此固人之所甚欲然有諸已而後求諸人無諸已而後非諸人所藏乎身不恕而能喻諸人者未之有也故君子正身以正四方修已以安百姓且日麗必照物雲濃必雨苗和順積中英華發外極吾之善斯足以善天下矣然伐之害德猶木之有蠧苗之有螟驕盈之氣一毫焉間之則善隨以喪而害旋至矣尚何有于德之慱故有焉而若無實焉而若虛功贊化育而不居智協天地而若愚消彼人欲而天焉與徒謙沖不伐而使驕盈之氣無自而作則凡不言而信不怒而威者乃所以為德也茲不曰不期而自化者乎嗚呼由乎言行之細而至于善世由乎已之誠存而至于民之化德則經綸天下之大經者信乎其在于至誠而知夫誠者信乎非聰明􅐶知逹天德者有不能也以經考之乾之六爻隱而未見行之未成者𥘉之潛也貴而無位髙而無民者上之亢也三則以危而進德四則以疑而自試惟五以飛龍在天而二以見龍在田皆有利見大人之美夫君位既已在五則夫君德者非人之龍德而正中其孰足以當之聖人于是發成已成物之道存誠慱德之要使後之人君能明聖人之言以全九二之德則天下有不足為矣切嘗稽之于舜好問而好察邇言隱惡而揚善則庸言之信庸行之謹為如何納伯益警戒之辭則罔有忌諱詳伯禹股肱之命則使之弼違間邪存誠可見于此矣巍巍乎有天下而不與則善世不伐為如何考其民之心則天下同戴稽其民之俗則比屋可封德慱而化可見于此矣九二之德大舜其盡之矣説易者以為九二之爻蓋舜之田漁時也今槩以為帝之事可乎曰以位而言則田漁時也以德而言則夫子匹夫也或曰祖述堯舜或曰賢于堯舜孰謂乾之九二而不足以言舜乎不然則何以謂之君德黃裳元吉黃離元吉用中者雖異其時獲吉者皆極其大中之為德言其無適而不宜也黃中色也坤中在五而有黃裳之義裳下裳也黃裳者守中而居下也在上者患不能居下能守中而居下安得而不大吉哉離中在二而有黃離之義離麗也黃離者所麗得中正也附麗者患不得中正如所麗之中正安往而不大吉哉位有二五之殊辭有裳離之異其居下附麗雖因時而不同而其為大吉則一而已非中之為德疇克爾哉坤之六五曰黃裳元吉離之六二曰黃離元吉嘗謂中之為道大矣世嘗玩于其説而莫之省也夫以堯舜禹三聖人相授受而同出于一辭則道宜莫大于此矣而不過曰允執厥中故子思之書反覆乎大中之説丁寧乎時中之論而世之喜事者不明乎中之説欲為驚人可喜之行是非獨得罪于聖人而其所以速戾取禍者蓋亦不旋踵矣嘗試告之以大吉之可願則莫不願至告之以大中之道則又玩而不知省嗚呼安知所願者乃出于其所玩者歟然子思之言中不獨有大中之説而又有時中之論蓋中而非其時則烏在其為中也時乎坤之六五則疑乎隂之在上疑乎其上則居下之為中矣守中而居下則以貴而下賤以尊而下卑以能而下于不能以多而下于寡夫守中而居下如此則天道之所益地道之所流人道之所好鬼神之所福其吉豈不亦大矣乎黃裳元吉坤之六五所以為中也時乎離之六二則以隂而麗于兩陽之間麗于兩陽之間則麗之中正者也所麗者中正之道所附者中正之人以下而附乎上則在上者中正也以上而附乎下則在下者中正也夫所麗之中正如此則上交不諂下交不瀆建諸天地而不悖質諸鬼神而無疑其吉豈不亦大矣哉黃離元吉離之六二所以為中也坤離之五二其居下附麗之義雖殊而其獲吉則咸底乎大信乎無適而不冝也竊嘗求之有周之臣周公以叔父之親師保之任而握髮吐哺下于白屋之夫終以周致太平魯疆以啓黃裳元吉周公以之太公抱鷹揚之䇿垂釣乎磻溪之涯年且八十矣一旦聞文王作興曰盍歸乎來終以大告武成齊國以建黃離元吉太公以之雖然古之聖賢未有不中者夫子之聖而卒于旅人顔子之賢而終於陋巷則所謂元吉者果安在哉曰孔顔萬世稱聖賢吉孰大焉若乃險賊而崇軒列鼎吾見其益疾而已未見其吉也使民宜之民不可使知吾道之義而可使享吾道之宜使道而不宜于天下則聖人亦烏取乎道哉聖人出而有為于天下變而通之神而化之而天下之民鼓舞踴躍莫不以為宜而安之者亦盡其道而已矣大傳曰使民宜之以此夫子曰民可使由之不可使知之非聖人固不使之知也若道之義則彼民之愚蓋有所不能知也若乃其道之宜則聖人固與天下之民共由而共享之方民未知佃漁也聖人作為網罟而民宜于網罟矣方民未知耕稼也聖人作為耒耜而民宜于耒耜矣以至舟楫弧矢杵臼莫不皆宜于民雖其以象以義取諸離益之諸卦而其所以使民宜之者蓋無以異于黃帝堯舜之乾坤也當黃帝堯舜氏之作其備物制用立成器以為天下利者前聖已備之矣故其使民由之者獨見于垂裳之治黃帝之事于六藝無所考信而堯舜之事則載之典謨彰彰可考如明五刑典三禮疏江河驅虎豹凡建法立制都俞咨詢以宜其民者蓋不為少矣而夫子特稱其蕩蕩無名無為而治則其所以宜之者一出于道而已故曰堯以是傳之舜聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往省試滌人之妄則復乎天者自爾微盡己之心則交乎物者無或纍蓍卦之德六爻之義聖人所以復乎天交乎物者何其至耶以此洗心則人為之妄滌之而無餘人妄既滌天理自全退藏于密微之地復乎天而已由是而吉凶之患與民同之而已之心無不盡心既盡則事物之交來以神知往以知藏復何纍之有哉妄滌而復乎天者自爾微心盡而交乎物者無或纍則夫蓍卦六爻之用又豈可以形迹滯而神知之説又豈可以荒唐窺也哉聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往其意如此中庸言君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人有所不知焉夫婦之不肖可以能行焉及其至也雖聖人有所不能焉夫聖人有所不知不能則可謂隱密精微之地矣而不外乎夫婦之所可知所可能蓋道之費者未嘗不隱而隱者未嘗不費內外合體用備非人之所可毫末加而斯須去也聖人洗心于蓍卦六爻之間退藏于隱密精微之地而同乎民交乎物者雖吉凶往來之紛紛而吾之心未嘗不退藏于密此堯之所以無名舜之所以無為文王之所以不識不知而易之書所以不可以象數泥而浮虗説也狎海上之鷗遊吕梁之水可以謂之無心不可以謂之道心以是而洗心退藏吾見其過焉而溺矣濟溱洧之車移河東之粟可以謂之仁術不可以謂之仁道以是而同乎民交乎物吾見其淺焉而膠矣聖人懼夫道之不明也舉而揭之蓍卦六爻之間反覆而發明之使知夫妄滌而復乎天者自微心盡而交乎物者無纍夫其所以曉天下者亦云至矣大衍之數五十其用四十有九則由衍以生蓍四營而成易十有八變而成卦則由蓍以立卦蓍生卦立剛柔相推吉凶以告爻在其中矣人為之妄尚安得而與于其間哉以此洗心信乎其復于天矣雖六七八九之錯綜無窮乾坤六子之摩蕩不息而五十之數所謂不用之一者實于是乎見之則聖人退藏之地豈所謂過而溺焉者哉得失之象形悔吝之情著則爻之所以為吉凶者吾之所以與民同患者也至誠如神受命如響事物之來神以知之無以異于蓍之圎也物各付物所過者化事物之往知以藏之無以異于卦之方也夫聖人之同乎民交乎物者亦異于不及而膠焉者矣由是觀之蓍卦六爻之用其諸以執其兩端用其中于民也歟嘗考于咸之卦而得聖人洗心之妙于咸之彖發天地萬物之情于咸之象發以虗受人之義此固可以滌人妄而復天理觀乎同民交物之道也至于九四一爻聖人以其當心之位其言感通為尤至曰正吉悔亡而象以為未感害也蓋未為私感所害則心之本然無適而不至無感而不通曰憧憧往來朋從爾思而象以為未光大也蓋憧憧往來之私心其所感必狹從其思者獨其私朋而已聖人之洗心其諸以滌去憧憧往來之私而全其本然之正也歟此所以退藏于密而能同乎民交乎物而不墮于溺焉膠焉之一偏者也或曰聖人生知安行彼其心之酬酢萬變者蓋不思而得不勉而中而何以洗為蓋不知堯舜不能忘危微之戒而當時大臣有淫逸遊樂之辭有慢遊傲虐之辭君亦不以為輕已且樂聞而願聼之嗚呼此其所以為生知安行不思不勉者歟于洗心乎何疑天地設位聖人成能人謀鬼謀百姓與能天地有待乎聖人而天地為不可及聖人有待乎天下而聖人亦為不可及大哉天地聖人之不可及乎位乎上而能覆物者天也位乎下而能載物者地也天地能覆載萬物而成其能者則有待乎聖人天地未嘗專之也而覆載之功卒歸之天地此天地之所以為不可及也聖人參天地而立成天地之能其智能非天下之敵也然人焉謀之卿士鬼焉謀之蓍龜雖百姓之愚且賤亦不謂其不能而與之焉則聖人之有待于天下者亦云衆矣然成能之功卒歸之聖人此聖人之所以為不可及也然則恃一已之智能而謂人莫已若者豈可與論天地聖人之事哉天地設位聖人成能人謀鬼謀百姓與能以此嘗觀箕子為武王陳洪範其七稽疑曰汝則有大疑謀及乃心謀及卿士謀及庶人謀及卜筮蓋與易言聖人所以成天地之能者異經同旨天錫之洪範出于溫洛之水則天地之心于此甚白而道之大原吾于此而見之矣大哉天地聖人之所以為不可及者乎天之髙也日月星辰繫焉隂陽寒暑運焉萬物覆焉地之厚也載華嶽而不重振河海而不泄萬物載焉天地之間何物而非天地之為者然而覆載萬物之能猶有待于聖人聖人之政有以當天地之心則諸福百祥以嘉慶之有以失天地之心則妖孽災異以警懼之彼其望于聖人以成其能者何其至耶無它無私焉而極天下之大也聖人膺裁成輔相之任秉參贊燮理之權道奚而可與天地殊心奚而可與天地異朝焉卿士善責汝進違責汝弼余愆是繩余繆是紏廟焉蓍龜揲枯鑽朽余不敢不敬有行有疑余不敢不問人謀鬼謀猶以為未也懼夫百姓之能吾不與謀焉工誦針諫士傳民語庶人謗于道商旅議于市雖芻蕘之賤未嘗不詢焉則聖人所以有待于天下者亦何其至耶無他無私焉而與天地同其大也天地有待于聖人而覆載之功歸焉聖人有待于天下而成天地之能者歸焉嗚呼此天地聖人之所以為不可及也夫子頌堯曰惟天為大唯堯則之而其所以為大者民無能名焉孟子頌舜曰大舜有大焉而其所以為大者亦不過舍已從人樂取諸人以為善廟堂之上都焉而吁咈焉而俞昆命之龜協從之筮罔有不敬闢四門明四目而芻蕘之賤咸得上逹吾于此見其所以成天地之能者歟嗚呼匹夫匹婦不獲自盡民主罔與成厥功君天下者可不勉所以與天地相似者乎首出庶物萬國咸寧聖人有兼覆之道天下無難辦之功庶物之多萬國之衆聖人欲首出而使之咸寧可謂難辦之功矣然聖人體兼覆之乾以是首出庶物則萬國咸寧不足多也首出庶物萬國咸寧聖人所以得乾元之用固大矣非天下之所可得而易言也大而言之何物而不備何所而不該然品物之形既流洪纎髙下毫釐之間而各有所宜六位之成則潛見飛躍其道各異欲體是道以首庶物而寧萬國非夫學之超乎天下之上吾未見其能也方其潛也隱而未見行而未成則學固不可以已也及見而在田則庸言之信庸行之謹間邪存誠是學果可以已乎三之厲四之疑固進德修業不可懈也至于五之與天地合德上而知進退存亡而不失其正非學果何以致之首出庶物蓋在于乘六龍而聖人于乾之六位莫不反復乎學使其學能超乎天下之上則天下有不足為而萬國咸寧信乎其不足多也用九之辭曰天德不可為首而乃以首出庶物何耶嗚呼不為首蓋所以首出庶物而愚所以謂不可以無學者也象山先生全集卷之二十九
