body:
  text: 卷之一書與邵叔誼與曽宅之與胡季隨二與趙監一與鄧文範三與姪孫濬與李省幹二卷之二書與王順伯二與朱元晦三與吳顯仲二卷之三書與童伯虞與劉深父與張輔之三與曹梃之三與曹立之二與黃日新與黃元吉與喬得占與諸葛受之卷之四書與李德逺得解見提舉得解見權郡得解見通判與諸葛誠之二與王德修與劉淳叟二與趙宰與胡逹材二與潘文叔與彭世昌與曽敬之與符舜功三與符復仲與周亷夫卷之五書與吕伯恭與吕子約與戴少望與舒西美與高應朝與楊敬仲與項平父與舒元賔與徐子誼二與趙子直與辛幼安卷之六書與傅全美二與傅子淵三與傅聖謨二與包詳道七與包顯道二與包敏道四與吳伯顒與吳仲時與吳叔有卷之七書與勾熙載與彭子夀與邵中孚與顔子堅與張季忠與胥必先與朱元晦與吳仲良與詹子南三與陳倅二與包顯道四與周元忠與蘇宰與程帥卷之八書與張春卿與宋漕與陳教授二與趙推與蘇宰卷之九書與王謙仲二與錢伯同二與楊守三與黃監與林叔虎與陳君舉卷之十書與李成之二與應仲實與張季海二與張元鼎與黃康年與胡無相與朱益叔與路彥彬與塗任伯與董元錫與倪濟甫與黃彥文與劉志甫與邵叔誼與江德功與曽宅之與周元忠與詹子南二與吳顯仲卷之十一書與朱濟道三與吳子嗣八與傅季魯與陳宰二與李宰二與趙景昭與王順伯二與尤延之與豐宅之卷之十二書與趙然道四與趙詠道四與陳正已二與張誠子與張輔之與饒夀翁七與倪九成與張季恱二與劉伯協二與黃循中二卷之十三書與郭邦逸與郭邦瑞與李信仲與潘文叔與朱子淵三與薛與羅春伯與鄭溥之與馮傳之與朱元晦二卷之十四書與包詳道與包敏道二與嚴泰伯三與傅子淵與羅章夫與廖幼卿與傅齊賢與胥必先三與蔡公辨與張德清與髙應朝與姪孫濬四卷之十五書與陶贊仲二與孫季和與唐司法與傅克明與章茂獻與羅春伯與薛象先二與朱子淵與劉漕與吳斗南卷之十六書與章德茂五與張元善二卷之十七書與張監二與豐叔賈與鄧文範與致政兄與張伯信與似清與沈宰二卷之十八奏表刪定官輪對劄子荆門到任謝表與廟堂乞築城劄子卷之十九記敬齋記宜章縣學記荆公祠堂記經德堂記貴溪重修縣學記武陵縣學記本齋記臨川簿廳壁記卷之二十序贈送毛元善序送宜黃何尉序送彭子夀序送楊通老贈吳叔有贈俞文學贈二趙贈僧允懷一贈曽友文贈汪堅老贈丁潤父贈黃舜咨贈汪彥常贈陳晉卿示象山學者贈金溪砌街者贈湯謨舉贈陸唐卿贈踈山益侍者贈劉季蒙題新興寺壁題翠雲寺壁朱氏子更名字説二張名字説格矯齋説跋資國寺雄石鎮帖記祚德廟始末鄧文苑求言往中都卷之二十一雜著易説四易數一張叔權書一連叔廣書三五以變錯綜其數學説論語説孟子説卷之二十二雜著史評二雜説卷之二十三雜著白鹿書院論語講義大學春秋講義荆門軍皇極講義卷之二十四雜著䇿問十六卷之二十五詩少時作聞鶯鶯六言晚春出箭溪二首子規六言蟬贈化主踈山道中鵝湖和教授兄韻挽石子重挽張正應和黃司業喜雪遊湖分韻得西字和楊廷秀送行送德麟監院歸天童和楊廷秀韻二首送勾熙載赴浙西監題慧照寺贈畫梅王文顯簡朱幹叔諸友書劉定夫詩軸玉芝歌卷之二十六文祭吕伯恭文代致政祭姪槱之文代教授祭神文石灣祈雨文謝雨文荆門祈雨文望壇謝雨文二東山禱雨文東山刑鵝禱雨文上泉龍潭取水禱雨文卷之二十七行狀教授陸公行狀宋故吳公行狀卷之二十八志銘黃氏墓志銘張公墓志銘陸公墓志銘黃公墓志銘黃夫人墓志銘葛致政墓志銘吳伯顒墓志銘陸修職墓表卷之二十九程文庸言之信庸行之謹間邪存其誠善世而不伐德慱而化解試黃裳元吉黃離元吉使民宜之聖人以此洗心退藏于密吉凶與民同患神以知來知以藏往省試天地設位聖人成能人謀鬼謀百姓與能首出庶物萬國咸寧卷之三十程文孝文大功數十論天地之性人為貴論智者術之原論房杜謀斷如何論劉晏知取豫論政之寬猛孰先論常勝之道曰柔卷之三十一程文制科解試料敵解試賑濟解試唐取民制兵建官省試德仁功利省試漢文武之治省試卷之三十二拾遺好學近乎智學問求放心主忠信母友不如巳者人不可以無耻二思則得之君子喻于義求則得之里仁為美則以學文人心惟危道心惟微惟精惟一允執厥中學古入官議事以制政乃不迷汝分猷念以相從各設中于乃心養心莫善于寡欲取二三䇿而已矣保民而正續書何始於漢䇿卷之三十三文安諡議孔煒撰覆諡丁端祖撰象山先生行狀楊簡𫐠卷之三十四語録卷之三十五語録卷之三十六年譜象山先生全集目録附録少湖徐先生學則辨華亭少湖徐階著學則辨某既編學則成朋友之相詰難者或引存養格致以為尊德性道問學不可合為一事或引學問思辨篤行以為必先道問學而後可及於尊德性又或謂晦庵象山兩夫子均之為聖人之徒但其入門則有不可強而同者其説雖殊然要皆不究夫學之所以為學故必認以為二而不能信其一也夫學尊德性而巳矣問也者問此者也學也者學此者也遺此之謂禪離此之謂訓詁故尊德性者君子之所主以為問學者也問學者君子之所由以尊德性者也舍問學而求尊德性則德性不可得而尊舍尊德性而求道問學則亦不復有所謂問學之事此尊德性道問學所以為一而非可以存養格致分屬並言者也且存養非他也存其所格之理焉耳格致非他也格其所存之理焉耳存也格也其功無二用也是乃所謂問學而君子所由以尊德性者也如必析尊德性以屬存養析道問學以屬格致而謂尊德性之功别有出乎問學之外則中庸首章之獨言戒懼于義既不免有所遺而大學之格物致知乃徒為博物洽聞之具而非所以致誠正修齊之實矣此豈獨不知尊德性道問學亦豈識所謂存養格致哉乃若學問思辨篤行其所謂慱學者非闊略于踐履而徒務慱其見聞及其既慱然後漸次收拾以付之于行也蓋君子修身踐行既無所不用其學矣其或學而有疑則問之之審問而未有得則思之之慎思而猶未能了然於其心則辨之之明辨之既明則益敦行之而弗怠是所謂篤行者乃取慱與篤兩義相對而言非所以為先後之次也然則道問學尊德性不可以分先後明矣至謂兩夫子入門異而均之為聖人之徒則又有可言者夫君子由學以入聖猶人由門以入室今指尊德性道問學為兩門矣然而聖之所以為聖踐形盡性之外無他事也則尊德性道問學室一而巳門亦一而巳安得有異入乎凡某所以斷兩夫子之同者固慨夫世之人舉其訓話之陋妄自托于朱子而詆陸為禪舉其空寂之謬妄自托于陸子而詆朱為俗也今曰均之為聖人之徒則某之所爭者固巳得矣又何異之足言哉大抵子思此章其辭旨本自曉白蓋不徒曰尊德性而必繼之以道問學則可見功夫之有在而為尊德性者所不能遺不徒曰道問學而必先之以尊德性則可見主本之有定而為道問學者所不能外不徒曰尊德性道問學而必合之以而之一字則可見其為一事而非耦立並行者之可倫是故尊德性道問學一也朱子世以為專道問學而其言必主于尊德性陸子世以為專尊德性而其言不遺夫問學此兩夫子所以同也學者苟反身以究夫學之不容二而又虗心以觀兩夫子之言則可無疑于紛紛之説矣右學則辨華亭少湖徐公所作也辨朱陸二夫子之學同歸一致不容有毫髮之疑矣今因補刻象山全集附刻是辨俾求象山之學者則焉荆門州儒學正閩尤溪廖恕謹識嘉靖己未秋九月吉旦象山先生全集敘聖人之學心學也堯舜禹之相授受曰人心惟危道心惟微惟精惟一允執厥中此心學之源也中也者道心之謂也道心精一之謂仁所謂中也孔孟之學惟務求仁蓋精一之傳也而當時之弊固已有外求之者故子貢致疑于多學而識而以博施濟衆為仁夫子告之以一貫而教以能近取譬蓋使之求諸其心也逮于孟氏之時墨氏之言仁至于摩頂放踵而告子之徒又有仁內義外之説心學大壞孟子闢義外之説而曰仁人心也學問之道無他求其放心而已矣又曰仁義禮智非由外鑠我也我固有之弗思耳矣蓋王道息而伯術行功利之徒外假天理之近似以濟其私而以欺于人曰天理固如是不知既無其心矣而尚何有所謂天理者乎自是而後析心與理而為二而精一之學亡世儒之支離外索于刑名器數之末以求明其所謂物理者而不知吾心即物理𥘉無假于外也佛老之空虗遺棄其人倫事物之常以求明其所謂吾心者而不知物理即吾心不可得而遺也至宋周程二子始復追尋孔孟之宗而有無極而太極定之以仁義中正而主靜之説動亦定靜亦定無內外無將迎之論庶幾精一之旨矣自是而後有象山陸氏雖其純粹和平若不逮于二子而簡易直截真有以接孟氏之傳其議論開闔時有異者乃其氣質意見之殊而要其學之必求諸心則一而已故吾嘗斷以陸氏之學孟氏之學也而世之議者以其嘗與晦翁之有同異而遂詆以為禪夫禪之説棄人倫遺物理而要其歸極不可以為天下國家苟陸氏之學而果若是也乃所以為禪也今禪之説與陸氏之説孟氏之説其書具存學者苟取而觀之其是非同異當有不待于辨説者而顧一倡羣和剿説雷同如矮人之觀場莫知悲笑之所自豈非貴耳賤目不得于言而勿求諸心者之過歟夫是非同異每起于人持勝心便舊習而是已見故勝心舊習之為患賢者不免焉撫守李茂元將重刻象山之文集而請豫一言為之序豫何所容言哉惟讀先生之文者務求諸心而無以舊習已見先焉則粳粃精鑿之美惡入口而知之矣正德辛巳七月朔陽明山人王守仁書象山先生文集序天有北辰而衆星共焉地有泰嶽而衆山宗焉人有師表而後學歸焉象山先生其學者之北辰泰嶽與自始知學講求大道弗得弗措久而寖明又久而大明此心此理貫通融會美在其中不勞外索揭諸當世曰學問之要得其本心而已心之本真未嘗不善有不善者非其𥘉然也孟子嘗言之矣鄉為身死而不受今為宫室之美妻妾之奉所識窮乏得我而為之此之謂失其本心其言昭晣如是而學者不能深信謂道為隱而不知其著謂道為邈而不知其近求之愈過愈湮欎至先生始大發之如指迷塗如藥久病迷者晤病者愈不越于日用之間而本心在是矣學者親承師訓向也跂望聖賢若千萬里之隔今乃知與我同本培之溉之皆足以敷榮茂遂豈不深可慶哉嗚呼先生之惠後學弘矣先生之言悉由此出上而啓沃君心下而切磨同志又下而開曉黎庶及其他雜然著述皆此心也儒釋之所以分義利之所由别剖析至精如辨白黑遏俗學之橫流援天下於既溺吾道之統盟不在茲乎燮識先生於行都親博約者屢矣或竟日以至夜分未嘗見其少有昏怠之色表裏清明神采照映得諸觀感鄙吝已消矧復警䇿之言字字切已與先生之殁餘二十年遺言炳炳精神猶在敬而觀之心形俱肅若親炙然臨汝嘗刋行矣尚多缺略先生之子持之伯微裒而益之合三十二卷今為刋于倉司流布寖廣書滿天下而精神亦無不遍言近而指逺雖使古人復生莫之能易嗚呼茲其所以為後學之師表與先生諱九淵字子靜撫州金溪人嘗講學於貴溪象山學者尊為象山先生云嘉定五年九月戊申門人四明袁燮書有宋撫州金溪陸先生字子靜嘗居貴溪之象山四方學者畢至尊稱之曰象山先生先生冡嗣持之字伯微集先生遺言為二十八卷又外集六卷命簡為之序簡自主富陽簿時已受教於先生因言忽覺澄然清明應用無方動靜一體乃知此心本靈本神本明本廣大本變化無方奚獨簡心如此舉天下萬世人心皆如此易曰百姓日用而不知孔子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者大戴記孔子之言謂忠信為大道忠者忠實信者誠信不詐偽而先儒求之過求諸幽深故反不知道孔子又名大道曰中庸庸者常也日用平常也孟子亦謂徐行後長即堯舜之道又謂以羊易牛之心足以王先生諄諄為學者剖白斯旨深切著明而學子領會者寡簡不自揆度敢少致輔翼之力專敘如右開禧元年夏六月乙卯門人四明楊簡敬書象山集序聖人之言心淵然無朕其涵也而有觸即動其應也佛氏語其涵者圓明微妙而祕之以為竒俗學即其應者粧綴繳繞而離之以為博要之不能無所近而亦卒不可入何者其不能無所近者緣于心而卒不可入者逺于體也聖人者不獨語其涵懼人之求于微而不獨語其應懼人之求于迹故哀與欽者心之體也見廟與墓而興者其應也體無所不具則無所不感無所不感則無所不應因其應而為之文于是乎有哭劈衰素之等爼豆璧帛之儀儀立而其心逹而儀非心也此所以為聖人之學也佛氏則從其應而逆之以歸于無曰墓與廟哀與敬皆妄也而性則離是而亦不離于是者也俗學者非之曰此有也則從而煩其名數深其辨博而以為非是則無循也然不知泯感與應者既以玄逺空寂為性而其溺于名數辨博者又詳其末而忘其所以然豫故曰禪與俗卒不可入者皆逺于體也聖人之言心詳于宋儒最後象山陸氏出盡去世之所謂繳繞者而直指吾人之應心曰見虗墓哀而宗廟欽者心也辨此心之真偽而聖學在是矣其于致力之功雖為稍徑而于感應之全則指之甚明而俗學以為是禪也其所未及者名數辨博也嗟乎象山指其應者使人求其涵也佛氏逆其應于無而象山指其迹于應以是為禪然則為聖人者其必在名數辨博乎以儀為心豫惡夫哀欽之無從也是集刻于金溪而歲久漫漶德安吉陽何先生撫江西之明年丕闡理學以淑士類乃改刻焉而命沐為序辭不獲因取象山言之粹者據而證之世之知者果有取焉則禪俗與儒之界將昭然若指掌而象山氏之學可知也已大明嘉靖四十年歲次辛酉五月吉賜進士出身中奉大夫江西布政司右布政使前奉勑提督江廣兩省學政刑部郎臨海後學王宗沐撰嘉靖癸丑三月宗沐既刻朱子大全私抄而稍論次朱陸二氏異同之大略以附于書間以請于兩廣巡按侍御王公曰朱書備矣陸氏書粵之士有終身不及見者其圖並存之已而廣西巡按侍御陳公始至以請曰並刻以示二三子吾道之幸也其亟圖之宗沐乃更録象山先生書文語録論學者釐為六卷冠以慈湖陽明二先生之序刻焉既成進粵之士而告之曰二先生任道開來之功傳四百年于茲其微言奧旨固已具于二書苟能玩味而深繹之而不惟習見則其旨歸之所在者可釋然而無疑矣夫原于天地以立極而通于古今以常行者道之致一而不可容或二也質有偏重而見有早晚當會其未備而銷其未融者學之相成而不可獨執也二先生偶以其一時之見相與校訂是亦不過朋友切磋之心而後世遂分别之攘斥之使不得並係于孔氏之徒焉則夫乃采聲遺實而責之太深矣乎故自今言之以彌綸宇宙為已分而以繼往開來為立心以沉迷訓詁為支離而以辨别義利為關鑰本之于收放心以開其端極之于充四端以致其力由于盡心知性而逹于禮樂政刑此象山先生之學之大也備觀先生之書而更合之于朱子得其所以同辨其所以異則知道無不合而言各有指然後指之為俗與禪者皆可得而論其概矣昔者子貢以孔子為多學而識而孔子教之曰非也豫一以貫之比其患言之多也則他日又曰子欲無言聞見為知之次者皆孔子之家法也至于禪學之旨其自私為已與絶人倫類以求免生死誠為異端固聖世之所必誅而不以聼者但其所以為教固以為實際理地不染一塵而佛事門中不舍一法心含萬象遍周法界融會精粗而至于十地五乘四教三藏傳述之多亦未嘗專以著空為修證者也夫陸子之所指以示人者既為孔子之所嘗是而世之所以怒陸子而夷之為空者又釋氏之所本非然則陸子之學謂其立論容有未罃則可而遽埒之于禪是何異鞫獄者不見兩造不求情實而但以前人之判其牘也而遂斷焉夫庸無有枉濫于其間乎顧二先生之所以致是者起于無極二字之辨夫二字之輕重未足以係斯道之絶續也若以為果道之所在而不可不辨則孔子之書如首章時習二字其所當講雖汗牛充棟猶未可了而無極二字不明胡不且置而遽若是紛紛乎此則二先生早年未定之事而陸子不執文字之教于此亦稍自背馳而愚猶憾其執之不固也而論者乃更以為禪乎嗟夫道非朱陸之所得專即今而爭焉而斥焉于二先生無加損也而獨怪夫學絶道喪門户之多而黨伐之衆則言多而道益晦此任道之士所為懼而不敢安也六經之作本以明道然聖人于易則曰作易者其有憂患乎孟子曰臣弒君子弒父孔子懼作春秋然則易與春秋固以憂患與亂賊爾苟無是焉易春秋不作也後之有言者其果有不得已焉者乎而後之求之文字者其果皆得夫作者之意乎訓詁馳騁之煩辨説爭競之衆誠可哀痛而先覺之士亦嘗有起而闢之而卒不能有所撲息者何哉蓋其所以為此者有本有源本源之地未能拔而塞之則朱陸之旨雖明而其沿習沉痼之蔽未能或破宜其流之靡而莫或救也愚請得借禪以明之瞿曇之宗其始以生死禍福之説濟其必行是以習聞其説者皆抱必得之志而來雖狂夫悍卒皆能舍其舊而從于寂寞孤苦之鄉甚或面壁投崖刎身燃指而不悔者其志誠切而其事誠專也而尚安暇于言乎雖其事誠戾于聖教而在其宗門則固為忠信篤敬之徒矣後世之言學者𥘉本非有求為聖賢之志因循前却與習相成甚或姑以是而息其馳驟之倦則其心以為詞説之不博而記聞之不多則其言不行而其上焉者始畢其力于訓注涉獵以求為功果朝移暮易而于所謂痛切身心者冝其畨有所遺而不及矣此則立志之過也為佛者其説誠冥莫迂逺而其為事則未嘗苟也付法傳衣登壇説法號稱具眼以續其師者必其真證而自得焉而猶或不敢當也後世之言學者實則不至而急于立説則固有窺之未精而見之未定者固已遂為人人之所傳矣雖其或旋覺于未妥甚或自悔于晚年而其書遂行已不可改則其言之多也雖其本意尚有未慊而况槩之于聖人之道乎此則立言之過也夫佛者屏除翳障獨懼有我增慢之病比于貪淫而強附宗言謂之毁謗其于執著是巳之戒若是乎其嚴也今學者之論誠有智者之失矣有愚者之得矣苟其言之是而足以相濟也則芻蕘鄙夫固當兼取以從于是而乃有勝心焉或原以偏倚而執之堅或耻于相屈而必其勝甚或分門異户又從而藩籬焉則亦無怪乎其言之多而説之激矣此則勝心之過也凡是三者相因為病所謂本原沉錮纒綿雖有特出之才一入其中足起足陷未能自拔則文字訓解縱其燁然譬之古人畫蛇添足而今更為之鱗爪也粉飾彌工去真彌逺凡若是者質之于禪曾有不若此孟子所謂五榖不如荑稗而孔子思欲居九夷也道之不明非吾黨之過而誰執其咎乎沐之庸下學不知方以嘗讀二先生之書而反思焉于其離合異同之際稍得一二而因以知言之多者則道轉晦故今與二三子之所從事者必其有求為聖賢之志而又有取善于人之心務礪其粗務濬其壅必不得已而後言焉言以鳴道而非以鬪靡也必有所主而後求之文字焉文字以證其精而非以執泥也而凡其畔援之説舉不得入于其中則久之必有舍筏濟岸之日而二先生之學庶乎可續其緒矣此則二公任道嘉惠之志粵之士其知所以敬承之乎陳公諱善治蜀之巴縣人王公諱紹元楚之金溪人嘉靖癸丑十二月吉臨海後學王宗沐謹識象山先生文集序
