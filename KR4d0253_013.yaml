front:
  text: 象山先生全集卷之十三書
  hash: sha256:69d27c9a60d57d7f88ae37aac0e2e5630c7277ab0c48be57f4863a7ceac37c22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_013-1a}
body:
  text: 與郭邦逸專介奉書細視緘題如揖盛德亟發讀之慰浣良劇教以大對一本尤深降歎鑿鑿精實非泛泛場屋之文也君子義以為質得義則重失義則輕由義為榮背義為辱輕重榮辱惟義與否科甲名位何加損于我豈足言哉吾人所學固如此然世俗之所謂榮辱輕重者則異于是薰染其間小有不辨則此義為不精矣當使日著日察炯然不可渾亂則善矣垂示晦翁問答良所未喻聖人與我同類此心此理誰能異之孟子曰人皆可以為堯舜又曰至于心獨無所同然乎又曰人之有是四端而自謂不能者自賊者也謂其君不能者賊其君者也今謂人不能非賊其人乎居仁由義大人之事備矣吾身不能居仁由義則謂之自棄聖人于此理不勉而中不思而得賢如顔子猶未至于不思不勉曰三月不違則猶有時而違也曰有不善未嘗不知知之未嘗復行則言其不逺而復也然則雖未至于不思不勉而思勉之工益微矣氣稟益下其工益勞此聖人賢人衆人之辨也語曰顔子三月不違仁其餘則日月至焉而已矣日月至三月不違與至誠無息則有間矣若其所至所不違所無息者豈容有二理哉古人惟見得此理故曰豫何人也舜何人也有為者亦若是道也者不可須臾離也可離非道也是故君子戒謹乎其所不覩恐懼乎其所不聞學者必已聞道然後知其不可須臾離知其不可須臾離然後能戒謹不覩恐懼不聞元晦好理會文義是故二字也不曽理會得不知指何為聖賢地位又如何為留意此等語皆是胸襟不明故撰得如此意見非唯自惑亦且惑人盛價至此偶有姪婦之喪又賤體中暑連日不得占復山間朋友雲集亦不可久孤其望勢當一往又縣宰終滿與之為别諸事紛擾亟取𥿄作復遽甚不能倫理近有復元晦書録往一觀及有史評一首又有書二本宜章學王文公祠二記併録呈得暇精觀之亦可見統紀也與郭邦瑞前此辱令弟邦逸遣人臨存復書中託拜意近亦嘗得家問否今為况如何新天子登極海內屬目而風憲之地陛黜殊乖物望非細故也山林之人但以草野輿議言之耳未知修身之內其議論又何如也良心正性人所均有不失其心不乖其性誰非正人縱有乖失思而復之何逺之有不然是自昧其心自誤其身耳及處華要而不知改是又將誤國矣有能明目張膽而紏正之者乎有能惻怛豈弟以感悟之者乎區區周婺矛牙之心猶不能無望于左右别後遷除未足為門下言也姪孫濬處太學家書戒令求見此子近亦少進于學幸與進以子弟視之可也與李信仲兩遣府中書皆不及拜丈丈書但託邵機宜趙通判道意至今欿然前者蒙丈丈教以病中所得聽之灑然今兹書中不及寓區區之意有一説煩吾友侍下逹之大抵為學不必追尋舊見此心此理昭然宇宙之間誠能得其端緒所謂一日克巳復禮天下歸仁焉又非疇昔意見所可比擬此真吾所固有非由外鑠正不必以舊見為固有也千萬以此𥿄稟之所與邵機宜書本末備矣幸復熟之與潘文叔文叔慈祥懇惻一意師慕善人服行善事友朋間所共推重與一輩依憑假託以濟其驕矜者不可同年而語矣然恐懼憂驚每每過分亦由講之未明未聞君子之大道與虞書所謂警戒無虞周書所謂克自抑畏中庸所謂戒謹乎其所不覩恐懼乎其所不聞者亦不可同年而語也蓋所謂警戒抑畏戒謹恐懼者粹然一出于正與曲肱陋巷之樂舞雩詠歸之志不相悖違若雕零窮蹙弗協于極名雖為善未得其正未離其私耳不志于學雖髙才美質博物洽聞終亦纍于其私况下才乎尹師魯氣質固自不凡其所植立可謂表表然如文叔所舉答韓資政書辭蓋不免乎其私者也觀于海者難為水遊于聖人之門者難為言文叔第未得遊聖人之門耳今日風俗已積壞人才已積衰公儲民力皆已積耗惟新之政亦良難哉某方此治登山倥􅘓占復莫究所懷何時合并以遂傾倒與朱子淵五月間拜誨劄之辱備承入夏動息尤用慰沃教以調度詳細貺以上尊兼乘仰佩眷勤感戢之至某浮食周行侵尋五六載不能為有無日負愧惕疇昔所聞頗有本末向來面對粗陳大略明主不以為狂而條貫靡竟統紀未終所以低回之久者思欲再望清光少自竭盡以致臣子之義耳往年之冬去對班才數日忽有匠丞之除遂為東省所逐患失之人素積疑畏而又屬有憸狡設辭以嗾之故冒昧出此亦可憐已然吾人之遇不遇道之行不行固有天命是區區者安能使豫不遇哉寬恩卑祠歸伏田畝日得與家庭尊幼鄉里俊彥翻古書講古道舞雩詠歸不敢多遜然此心之靈此理之明周婺之憂益所不能忘也何時合并以請教臨楮不勝馳情二稍不訊記曹日益馳鄉廬陵積弊之餘仍以旱歉調度有方無異豐歲惟竊健羡某屬方登山同志亦稍稍合集兹山之勝前書嘗槩言之此來益發其祕殆生平所未見終焉之計于是決矣唐僧有所謂馬祖者嘗廬于其隂鄉人因呼禪師山元豐間又有僧瑩者為寺其陽號曰應天乃今吾人居之每惡山名出于異教思所以易之而未得從容數日得兹山之要乃向來僧輩所未識也去冬所為堂在寺故址未愜人意方于要處草創一堂顧盻山形宛然巨象因名象山輒自號象山居士山面東南疊嶂駢羅近者數十里逺者數百里縹眇磊落爭竒競秀飛舞于簷間朝暮雨暘雲煙出沒之變不可窮極上憩層巔東望靈山龜峰特起如畫玉山之水蓋四百里而出于龜峰之下略貴溪以經兹山之左西望藐姑石鼓琵琶群峰崷崒逼人從天而下溪之源于光澤者縈紆泓澄間見山麓如青玉版北視龍虎仙巖臺山僅如培塿東西二溪窈窕如帶二溪合處百里而近然地勢卑下夷曠非甚清徹目不能辨常沒于蒼茫煙靄中矣下沿清流石澗曲折分合萬狀懸注數里蒼林隂翳巨石錯落盛夏不知有暑挾册其間可以終日造物之遺豫多矣執事方書外庸佇觀大用以究厥志異時厭飫緑野倘有意從吾遊乎世昌山陽之行錢君禮之甚厚僕夫探囊以竄摶手來歸甚哉其窮也此公趍尚甚竒天其或者竟以是成之耶今巳息肩共耕學于此矣因其遣還借兵草草寓此問訊三去冬逺辱記存尋已具復駛哉青陽行既厥事矯首南山豈勝馳遡區區之迹無異前日去臘以敝廬迫隘不得已增葺數椽然其事盡付之猶子了不相關所困者獨書問賔客亦無暇日耳用是欲嗣致尺𥿄因循逮今一春積雨近清明始得至山房古松千章環布錯立白雲往來其間遞為隱見彌旬未解頗盡竒變前峰藴秀深藏時于白銀世界中微見一二乃知退之所謂橫雲時平凝點點露數岫天宇浮修眉濃緑畫新就蓋得于親目非臆想也數日始見根底朝陽麗景明若圖畫暮燒聮光爛若綺繡楮氏更端停毫注目天君已復縹眇于薄雲踈雨間矣相望數千里憑彭澤諸君發舒及此庶幾無異于合堂同席也與薛象先閲邸報得誠心公道之章深切降歎然愛莫助之奈何近得舊同官書唯劉志甫差強人意鄭溥之似不及前然亦難得矣馮傳之氣質恢傑吾甚愛之恨向來相聚日淺不能發其大端若只如此恐終不甚濟事也每惋惜之足下尚能有方略及此乎某居山雖未久亦頗得英才臨川南城氣象蔚然其興善為刀劒者亦須好鐡吾雖屏居未必不為足下出山爐也祠祿之滿儻復卑之似亦未為空餐也舊與馮傳之一書謾録往比見太學夏季私試䇿題異哉學之不明人心之失其正一至于是山房朋友多有擬答第二篇者就中二三人之文最勝令小兒録往試覽之如何語曰不知言無以知人也孟子亦曰我知言人之言論豈可不察豈惟觀人善觀國者亦必于此決之矣荆公之學未得其正而才宏志篤適足以敗天下祠堂記中論之詳矣自謂聖人復起不易吾言當時諸賢蓋未有能及此者尚同一説最為淺陋天下之理但當論是非豈當論同異况異端之説出于孔子今人鹵莾專指佛老為異端不知孔子時固未見佛老雖有老子其説亦未甚彰著夫子之惡鄉原論孟中皆見之獨未見排其老氏則所謂異端者非指佛老明矣異字與同字為對有同而後有異孟子曰耳有同聽目有同美口有同嗜心有同然又曰若合符節又曰其揆一也此理所在豈容不同不同此理則異端矣熙寧排荆公者固多尚同之説𥙿陵固嘗以詰荆公公對以道德一風俗同之説𥙿陵乃不直排者然則荆公之説行豈獨荆公之罪哉近見臺評復尾尚同之説以胡君之淳慤無他議論猶如此他尚何望與羅春伯適聞晉二奉常鄉于柄用深為吾道慶大蠧之去四方屬目惟新之政藐未有所聞鄉來相聚不為不久不能有以相發每用自愧屬閲來示尤為惕然宇宙無際天地開闢本只一家往聖之生地之相去千有餘里世之相後千有餘歲得志行乎中國若合符節蓋一家也來書乃謂自家屋裏人不亦陋乎來書言朱林之事謂自家屋裏人自相矛盾不知孰為他家古人但問是非邪正不問自家他家君子之心未嘗不欲其去非而就是捨邪而適正至其怙終不悛則當為夬之上六矣舜于四凶孔子于少正卯亦治其家人耳妄分儔黨反使玉石俱焚此乃學不知至自用其私者之通病非直一人之過一言之失也近見臺端逐林之辭亦重嘆其陋群兒聚戲雜以狷狡尚何所望非國之福恐在此而不在彼也與鄭溥之趙仲聲歸奉書慰浣之劇竊知晉丞大府此亦未足以處賢者今當復有清切之除矣屏居者未之聞耳往年山間粗成次第便有西山之逰相繼有事役殘歲遂不得一登比來朋友復相會集後月朔除一小功報服即登山為久駐之計去冬與邵機宜一書頗究為學本末今往一觀遊仙巖題新興寺壁數語頗足以見居山之適臘月得元晦復論太極圖説書尋以一書復之今併往此老才氣英特平生志向不沒于利欲當今誠難其輩第其講學之差蔽而不解甚可念也士論方伸誠得此老大進此學豈不可慶誠者非自成已而已也所以成物也此心之靈苟無壅蔽昧沒則痛癢無不知者國之治忽民之休戚彛倫之敘斁士大夫學問之是非心術之邪正接于耳目而冥于其心則此心之靈必有壅蔽昧沒者矣在物者亦在已之驗也何往而不可以致吾反求之功此所願與同志日切磋而不舍者文藻特溥之餘事比來議論節操凛凛近古願加不息之誠日致充長之功則吾道幸甚道之行不行固有天命吾人之學安得而不自致哉某向嘗妄論賢者對事不逮奏篇蓋愚意以為但當因天變疏陳缺失以助主上修省之實不必曲推事驗如後世言災異者嘗見元祐三年吕益柔廷對有曰昔之言災異者多矣如劉向董仲舒季尋京房翼奉之徒皆通乎隂陽之理而陳于當時者非一事矣然君子無取焉者為其著事應之説也孔子書災異于春秋以為後王戒而君子有取焉者為其不著事應故也夫旁引物情曲指事類不能無偶然而合者然一有不合人君將忽焉而不懼孔子于春秋著災異不著事應者實欲人君無所不謹以答天戒而巳其言雖未精盡大槩可謂得矣如乍警乍縱不能純一之言可謂切當至以雲將族而復散雨將下而復止為天意象類而然則愚以為不必如此言也又如證以仁祖露立事亦恐于本指未相應更願精思之格君心之非引之于當道安得不用其極此責難所以為恭而不以舜之所以事堯事君者所以為不敬其君也思慮審精每及一事既舉綱領又詳其條目使立可施行此溥之所長也然其本末遍重實未一貫故言根原處雖若精純終篇讀之却覺渾亂無統臨運率之勢萬物並育而不相害道並行而不相悖小德川流大德敦化必綱舉領挈然後能及此也行百里者半九十願著鞭焉與馮傳之春末在郡城閲邸報竊知已遂改秩自此進用吾道之幸敢不贊喜吾人仕進自有大義所貴乎學者以明此義耳不學者固不足道號為學者而又牽于俗論私説則是義猶未明私猶未徹耳來教謂不可為外面擾動是矣若眄眄然顧流俗之議論則安在其為知道明義也計利害計毀譽二者之為私均也大哉聖人之道洋洋乎發育萬物峻極于天優優大哉天之所以為天者是道也故曰唯天為大天降衷于人人受中以生是道固在人矣孟子曰從其大體從此者也又曰飬其大體飬此者也又曰飬而無害無害乎此者也又曰先立乎其大者立乎此者也居之謂之廣居立之謂之正位行之謂之大道非居廣居立正位行大道則何以為大丈夫傳之氣質恢乎似道顧恐不志其大而臨深為髙加少為多耳願益勉旃無苟自畫則吾道幸甚與朱元晦朝廷以旱䁧之故復屈長者以使節儻肯俯就江西之民一何幸也冬𥘉許氏子來始得五月八日書且聞令小娘竟不起諒惟傷悼前月來又得五月二日書開慰之劇某不肖禍釁之深仲兄子儀中夏一疾不起前月末甫得襄事七月末喪一幼稚三歲乃擬為先教授兄後者比又喪一姪孫女姪壻張輔之抱病纍月亦以先兄襄事之後長往痛哉禍故重仍未有甚于此者觸緒悲摧殆所不堪某舊有血疾二三年寖劇近又轉而成痔良以為苦數日方少瘳矣傅子淵前月到此間聞其舉動言論類多狂肆渠自云聞某之歸此病頓瘳比至此亦不甚得切磋之渠自謂刋落益至友朋視之亦謂其然其長子自一二年來鄉人皆稱其敦篤循理過于子淵子淵亦甚譽其子比日不知何疾一夕奄然而逝劉定夫氣稟屈強恣睢朋儕鮮比比來退然方知自訟大抵學者病痛須得其實徒以臆想稱引先訓文致其罪斯人必不心服縱其不能辨白勢力不相當強勉誣服亦何益之有豈其無益亦以害之則有之矣二外臺之除豈所以處耆德殆新政起賢之兆耳當今輔石平時亦有物望不應徒呼唱于內庭外衢而已豈抑自此有意推賢耶金陵虎踞江上中原在目朝廷不忘春秋之義固當自此發迹今得大賢暫將使旨則軺車何啻九鼎中外倚重當增髙衡霍斯人瞻仰為之一新矣竊料辭免之章必未俞允願尊兄勉致醫藥俯慰輿情縱筋力未強但力疾卧護則精神折衝者亦不細矣若乃江東吏民善良有飬姦惡知畏而行縣之餘或能檢校山房一顧泉石此尤區區之私願也王順伯在淮間宣力甚勤然不能無莫助之患倘得長者一照映之為益又不細矣十三卷終
