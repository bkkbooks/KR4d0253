body:
  text: 與朱濟道此理在宇宙間未嘗有所隱遁天地之所以為天地者順此理而無私焉耳人與天地並立而為三極安得自私而不順此理哉孟子曰先立乎大者則其小者不能奪也人惟不立乎大者故為小者所奪以叛乎此理而與天地不相似誠能立乎其大者則區區時文之習何足以汨沒尊兄乎賢郎志向極可嘉向來供課想甚富此非不足也得勉之讀古書以涵飬此志幸甚二向辱惠書諸兄諸姪傳玩贊歎不能去手比之今此書辭反如二人甚愧前日簡忽不能悉意盡誠以相推挽遂使尊兄不能勇去餘習尚此遲回然詩却甚佳詩意書辭亦不相似詩只兩句便説盡了後兩句却成剩語文理頗不相紹續今欲易後兩句兼易前二字固不能出尊兄之意但稍次其文耳此理于人無間然昏明何事異天淵自從斷却間牽引俯仰周旋只事天尊兄平日只𬒳間牽引所以不能自立今既見得此理便宜自立此理即是大者何必使他人明指大者既見此理此理無非何緣未知今是此理非可以私智揣度傅會若能知私智之非私智廢滅此理自明若任其私智雖髙才者亦惑若不任私智雖無才者亦明顔子之學本末甚明尊兄未須泥此而求但自理會真能見得此理後日徐徐取論語讀之渙然冰釋矣某嘗令後生讀書時且精讀文義分明事節易曉者優遊諷詠使之浹洽與日用相協非但空言虗説則向來疑惑處自當渙然冰釋矣縱有未解固當候之不可強探力索久當自通所通必真實與私識揣度者天淵不足諭其逺也不在多言勉旃是望三示教日用工夫甚善尊兄氣質忠厚得于天者加人數等但向來纍外處多得日剝落之以全吾天則吾道幸甚所謂心誠求之雖不中不逺矣平居不與事接時切須鞭䇿得炯然不可昧沒對越上帝則過事時自省力矣與吳子嗣喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也此聖人之格言非天子不議禮禮亦未可輕議也欲去其不經鄙俗之甚者而略近于古則有先文正公書儀在何必他求二不以前所復書為罪又下問之不肯苟徇流俗孜孜禮法以求依據吾子之志善矣然事有輕重本末當知所先後禮文隳闕其來久矣滕文公所問孟子所答皆其大端儀節之末去其鄙俗不經者可也來書謂定之僕手此尤未宜吾子在衰絰之中不得巳次序以授執事者可也安可謂之定柏人者乃巫覡所為不經甚矣吾家未嘗用也祝稱卜􅌾虞子與夫異辭觀二孤之過可以類見喪祭當論所主不可言同也儀中除此三節諸皆無害三往歲蒙致書見問以喪禮如生年少能不徇流俗求古制又其文用字造語皆慕竒異不肯碌碌以為窮鄉下邑乃有後生能如此亦不易得故生之書辭不合律度者雖多皆不暇責獨答所以問之要務誘掖之庶幾其進既而聞生詭異其服為巫覡事深用駭怛亦頗悔初不知生而遽相對答有失言之罪兹奉書乃有悔過自訟之辭人誰無過過而不改是為過矣過而能改善莫大焉今生誠能幡然自新何幸如之雖然生家相距百里而近乃有不亟于求見長者而徒數以書來則改過之言亦未敢深信然吾今猶云云若此者望于生厚矣生其謹思之四文字之及條理􅙾然弗畔于道尤以為慶第當勉致其實毋倚于文辭不言而信存乎德行有德者必有言誠有其實必有其文實者本也文者末也今人之習所重在末豈惟喪本終將併其末而失之矣陳教授舊亦曽略相從惟其無本故其學日謬書末所紏三條屬意精切但前所取數語亦皆非是學無端緒雖依放聖賢而為言要其旨歸實已悖戾龎雜膚淺何足為據若所謂致其譽聞不泯泯碌碌者尤不可不辨人有實德則知疾沒世而名不稱者非疾無名疾無德也令聞廣譽施于身者實德之發固如是也庶幾夙夜以永終譽者欲其德之常久而不已也彼未嘗深致自克之功私意自為主宰方懵于知德則斯言殆適以附益其好名求勝之習耳此尤不可不辨五前書致其聞譽之説乃後世學者大病不能深知此病力改敝習則古人實學未易言也吾友更當深于此處觀省使舉動云為判然與曩者異轍則吾道有望矣復前書時亦欲相勉未須與陳教授往復後偶忘之至今不滿近歸自象山諸事冗擾文字亦不曽將歸旦晚亦須便登山儻能一來諸當面盡六録示仙郡首篇䇿問大旨竊所未諭新君即位曾未期月而遽曰責成無效何課效之速如此哉以夫子之聖不過曰三年有成唐虞之朝雖三載考績必三考而後黜陟幽明羽山之殛蓋在九載之後伯禹作司空猶八年于外兖州之賦作十有三載乃同古今難易縱有不同亦安有于半年之間而遽責其成效之理哉又古所謂責成者謂人君委任之道當專一不疑二而後其臣得以展布四體以任君之事悉其心力盡其才智而無不以之怨人主髙拱于上不參以已意不間以小人不維制之以區區之繩約使其臣無掣肘之患然後可以責其成功故既已任之則不苛察其所為但責其成耳此古人用責成二字之本旨也今泛課功效而用此二字則用字亦未愜當且古所謂賞罰者亦非為欲人趨事赴功而設也天命有德五脤五章哉天討有罪五刑五用哉其賞罰皆天理所以納斯民于大中躋斯世于大和者也此與後世功利之習燕越異鄉矣何時登山當究其説明日欲登雲臺瞰鬼谷究南山之所自來却扁舟浮梅潭沿醹口以歸度旬日而後可反山房也七承巳登山結茅深用嘉歎近得周元忠書謂幹伯伯珍諸人有意遣輿夫相迎且問期日吾答以霽日麗景晴雲絢文即吾就道時也是日正春分明日即大開徹輿夫至今未來豈其俟后土之乾又窘隂雨故耶昨日光風頗還舊觀乃今祁雲漫天寒颷先雨又復凄然似秋矣遐想雲臺領袖諸峰儲英育秀以相料理老子于此興復不淺行止久速在天與人而巳若此雨未止能冒之一來尤見嗜學八此理充塞宇宙天地鬼神且不能違異况于人乎誠知此理當無彼已之私善之在人猶在已也故人之有善若已有之人之彥聖其心好之不啻若自其口出胥訓告胥保惠胥教誨此人之情也理之所當然也亦何嫌何疑誠者非自成已而巳也所以成物也成已仁也成物智也性之德也合內外之道也顧恐未能成巳耳若私淑二字則出于孟子當深明其旨不當輕用于此此用字之疵不足以逹理而能為理之纍五代史政須點對來本極佳草廬在二池之間欲名以濯纓須來此當為書之與傅季魯二十四日發敝廬晚宿資國二十五日觀半山瀑由新蹊抵方丈已亭午山木益稠蟬聲益清白雲髙屯疊嶂畢露踈雨遞􅎈清風漻然不知其為夏也何時來此共之適欲國紀點對一事或未能來可先遣至與陳宰伐松之盜仰見嚴明不容逭戮比至山間具伏其罪祈免窮究論其𥘉心乖戾殊甚至以雀角之詞煩溷官府牽率縣僚喧動鄰里重費賢大夫之神明此豈可貸然斯人素狃惡習久為鄉里之害今兹適逢令尹之賢乃肯悔過效順幡然改圖亦有可喜來此自訴其悔艾遷改之意甚力儻其自此回心易慮以歸于善諒于豈弟之懷亦必喜之前日亦以周處之事反復勉之矣斯人有公狀首伏未敢自前併用封納二無似之蹤屏處是適諸公過聽録其姓名遽叨乘障之命進退惟谷荆門在重湖之北有道院之號事力優衍異時造物所以處貴遊者尤非枯稿之所宜得然蒙泉之與飛雪金蓮之與玉芝未知孰愈同志之士方此盍簮紬繹簡編商略終古粗有可樂雖品質不齊昏明異趣未能純一而開發之驗變化之證亦不可謂無其涯也儻得久于是山以既厥事是所願幸彌縫其闕而終惠撫之則惟賢大夫是望與李宰教以學記所施足認不鄙然此文之作豈為陳君設比之墓銘不有間乎貴溪安仁金溪三邑最為比鄰十餘年間不聞有賢令尹吏胥猖獗姦民以嚚訟射利者與吏相表裏公為交鬪肆行無忌柔良不得安迹陳宰所為固多未滿人意至其使此輩縮首屏迹柔良隂受其惠則亦其所長也三邑十餘年間誠未見有此視前政則優視比縣則優似未為過許嘗蒙渠見訪一聞大義誠有愧恧自失之實使此心不泯滅復遇針藥亦安知其不能幡然也在門下尤宜略于録其罪而詳于求其長恃髙明與契愛之厚不敢有隱諒不督過也二來教謂容心立異不若平心任理其説固美矣然容心二字不經見獨列子有吾何容心哉之言平心二字亦不經見其原出于莊子平者水停之盛也其可以為法也內保之而外不蕩也其説雖託之孔子實非夫子之言也彼固自謂寓言十九其書道夫子言行者往往以致其靳侮之意不然則借尊其師不然則因以逹其説皆非事實後人據之者陋矣又韓昌黎與李翊論文書有曰平心而察之自韓文盛行後學士大夫言語文章間用平心字寖多究極其理二説皆非至言吾何容心之説即無心之説也故無心二字亦不經見人非木石安得無心心于五官最尊大洪範曰思曰睿睿作聖孟子曰心之官則思思則得之不思則不得也又曰存乎人者豈無仁義之心哉又曰至于心獨無所同然乎又曰君子之所以異于人者以其存心也又曰非獨賢者有是心也人皆有之賢者能勿喪耳又曰人之所以異于禽獸者幾希庶民去之君子存之去之者去此心也故曰此之謂失其本心存之者存此心也故曰大人者不失其赤子之心四端者即此心也天之所以與我者即此心也人皆有是心心皆具是理心即理也故曰理義之恱我心猶芻豢之恱我口所貴乎學者為其欲窮此理盡此心也有所蒙蔽有所移奪有所陷溺則此心為之不靈此理為之不明是謂不得其正其見乃邪見其説乃邪説一溺于此不由講學無自而復故心當論邪正不可無也以為吾無心此即邪説矣若愚不肖之不及固未得其正賢者智者之過失亦未得其正溺于聲色貨利狃于譎詐姦宄牿于末節細行流于髙論浮説其智愚賢不肖固有間矣若是心之未得其正蔽于其私而使此道之不明不行則其為病一也周道之衰文貌日勝良心正理日就蕪沒其為吾道害者豈特聲色貨利而巳哉楊墨皆當世之英人所稱賢孟子之所排斥拒絶者其為力勞于斥儀衍輩多矣所自許以承三聖者蓋在楊墨而不在衍儀也故正理在人心乃所謂固有易而易知簡而易從𥘉非甚髙難行之事然自失正者言之必由正學以充其私而後可言也此心未正此理未明而曰平心不知所平者何心也大學言欲正其心者先誠其意欲誠其意者先致其知致知在格物物果巳格則知自至所知既至則意自誠意誠則心自正必然之勢非強致也孟子曰我亦欲正人心息邪説詎詖行放淫辭以承三聖者當是時天下之言者不歸楊則歸墨楊朱墨翟之言盈天下自孟子出後天下方指楊墨為異端然孟子既沒其道不傳天下之尊信者抑尊信其名耳不知其實也指楊墨為異端者亦指其名耳不知其實也往往口闢楊墨而身為其道者衆矣自周衰此道不行孟子沒此道不明今天下士皆溺于科舉之習觀其言往往稱道詩書論孟綜其實特借以為科舉之文耳誰實為真知其道者口誦孔孟之言身蹈楊墨之行者蓋其髙者也其下則往往為楊墨之罪人尚何言哉孟子沒此道不傳斯言不可忽也諸人交口稱道門下之賢不覺吐露至此病方起不暇櫽括其辭亦惟通人有以亮之儻有未相孚信處當遲後便與趙景昭新除極為贊喜邦之司直非兄其誰歸刑官古人所重臯陶尸陳謨論道之任而舜命作士今司直之名猶在大理又適為賢者進用之階殊令久增慕古之懷今日法制有未容人遽實其名耳然珠藏淵媚兄其必有以處之矣與王順伯某祠秩之滿𥘉欲復丐之適一二士友郵致諸公之意來促此文謂欲因是圖所以相處自度屏棄之人豈宜上纍當塗遂絶此念且甘貧餒以逃罪戾不謂竟蒙荆門之除官間境勝事力自贍無匱乏之憂又假以遲次使得既泉石之事究問學之樂為幸多矣非出推轂之素餘論之助何以逮兹敢不知自教以罷屯田收羡鑄之詳可謂恩威並立調度有方健羡健羡然在尊兄分上直餘事耳旦暮賜環入儀禁掖雍容密勿以究忠嘉使至理昭明隂氛澄廓群疑消釋衆善敷榮在位在職莫不協力同心以終大義此豈非長者之任而君子之所欲乎來教謂若要稍展所學為國為民日見難如一日此固已然之成勢然所以致此者亦人為之耳能救此者將不在人乎孟子曰責難于君謂之恭吾人平日所以自勵與朋友所以相勉者素由斯道而後能責難于君大禹所謂后克艱厥后臣克艱厥臣夫子所謂為君難為臣不易者皆欲思其艱以圖其易耳非懼其難而不為與知其難而謂其必不可為也天下固有不可為之時矣而君子之心君子之論則未嘗必之以不可為春秋戰國何如時也而夫子則曰如有用我者吾其為東周乎又曰如有用我者期月而已可也三年有成孟子則曰以齊王猶反手也又曰飢者易為食渴者易為飲故事半古之人功必倍之惟此時為然曰王猶足用為善王如用豫則豈徒齊民安天下之民舉安王庶幾改之豫日望之曰千里而見王是豫所欲也不遇故去豈豫所欲哉人之遇不遇道之行不行固有天命而難易之論非所以施于此也曩者尸位之人固為朝廷之大祟群小之根柢而往年天去之今年天殺之則天之所以愛吾君而相斯人者為力宏矣有官君子豈可不永肩一心相與勵翼以助佐吾君仰承天意乎人之才智各有分限當官守職惟力是視商之三仁亦人自獻于先王不容一槩至于此心此德則不容有不同耳沮溺接輿豈是庸人凡士然所以異乎聖人者未免自私耳來教謂既非以此要官職只是利國利民處隨力為之不敢必朝廷之從與事功之成此真長者之本心也誠能廓而充之推而廣之則髙明廣大誰得而禦由前之説將自昭白有不待區區之言者矣二使節在淮間時嘗復書薦區區幾有萬一之助後包敏道自浙歸乃知其時方得啓觀蒙復書謂為至論今三復來貺與所傳聞議論乃知實未蒙省察疇昔相與非徒親戚理有未安義不容默尊兄清修寡欲與物不競與人處似不能言者人莫不愛之獨有志之士往往有不快于尊兄向來永嘉諸人甚敬尊兄政績而又議其嚴酷無儒者氣象此固是謬論某嘗深排之矣是不足道又其間却有疑尊兄所為不免流俗或謂是鄉原之類尊兄以抗志古人為非有何以是嘐嘐之意此一論則近是向來伯兄因與尊兄論及監司之職見尊兄説不應求事但當因其至前而處之退甚不説以為如此作監司民亦何賴某亦嘗稍辨之然衆咸謂未免俗元晦又謂尊兄壞人已成之功以奉執政此乃復書未及與辨以某觀之尊兄天資極有過人處而大志不立未免同乎汙世合乎流俗獨其質剛而內明故有從善服義之長向來家庭議論與尊兄𥘉至西百官宅時窮冬踰月之集火爐中劇談皆始疑而終釋始辨而終息始之所甚不可而終乃有切當之稱此必有以當尊兄之心而以為切事合理故疑釋辨息而稱之尊兄必非苟從而見諛者自為奏邸居雖相邇而尊兄之情巳寖異于前日蓋相聚劇談時少切磋往復研核之工不繼尊兄之心復歸于毫矣况今相踈如是之久固宜不相亮之甚日與遊處議論者豈能啓尊兄之意其庸陋無知牽引尊兄相與淪胥則有之矣如謂輟育英才之真樂親朱墨之塵冗想非所好此是話作兩截好與不好此在某之心不可誣也尊兄政如老氏所譏夫子所謂明乎禮義而陋于知人心又引陳君舉之在福唐晦翁之在浙東以相警至謂親家尤更誠實不以小人待人尊兄昧于知人一至于此哉某平日誠不以小人待人但非如尊兄所謂蓋人受天地之中以生其本心無有不善吾未嘗不以其本心望之乃孟子人皆可以為堯舜齊王可以保民之義即非以為其人所為已往者皆君子也至其見人之肺肝能曲盡其情則自謂有一日之長向來火爐中與尊兄論人物所以得切當之稱者皆以此别後三生作國王來總忘之也馮傳之至今未相符合然所以相敬服者多在論人物處蓋其人與傳之甚稔而與某甚生或不相識而但見其言論事節便能知其心曲傳之以此相敬近福建一士人在此因言其鄉人事行某屢折之其人始力辨之而終屈服今其人于吾道雖未甚有得而決其相從之意者實在此也此人亦晦翁處學者某平時所望于尊兄者甚厚若以此相扞格則是無復可言矣義不應只如此姑以此為請教之端未即合併更惟節抑以遂揚名之孝與尤延之違逺三席出入五年其為傾依何可云喻退然耆儒久滯朝著當人之難晉掌奉常處事之變獨裁大典𬗟懷疇昔秪增慨嘆越自夀皇種椿重華聖上攬圖丹極而西掖北門髙文大册允屬椽筆山林之人矯首盛事欲贊一辭何可得哉講讀論思固已甚晚有識之士咸謂未足以究盛藴日遲柄用拔茅連茹使野無遺賢為吾君立太平之基而瑣瑣者自以薰蕕之不同輒肆媒蘖使人重為駭歎兹焉偃藩近甸公道其復信乎某曩者之歸得山房于龍虎山之上遊泉石之勝雲山之竒平生所鮮見其略亦屢見于朋舊書中尚欲稍記其詳亦以探討未遍猶未及也荆門之除良出望表豈推轂之賜有以致之耶幸尚遲次猶可畢草堂之役耳第私門禍故重仍五年之間尊幼之喪多于年數妻家亦復多事妻母甫及大祥昨日又聞妻弟之訃乃鄉年至都下相見乞銘者薾然之軀殆無以堪長姪煥之徑往求見將過浙東迎先兄教授家嫂與姪女歸成吳正字婚禮諸事當能面稟與豐宅之比年山居頗有泉石之趣朋來之樂每恨不得與吾宅之共此承需鄙文乏筆吏不能多録謾往數篇亦足以知山野况味逰仙巖題壁之末二姪其一名槱之者乃梭山兄之子賦質純雅少贊家政事上使下真無間言又博通經史射御筆札皆絶出等夷琴尤髙平時業此者皆在下風今年二十有六春末無疾一夕談笑間奄然長逝極為痛心亦恐欲知使人到山間又值持之疾作老夫亦苦頭痛登山未久友朋踵至應酬殊役役作復莫究所懷象山先生全集卷之十一
