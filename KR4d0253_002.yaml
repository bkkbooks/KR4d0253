  text: 象山先生全集卷二
  hash: sha256:bed69810afe20d68601ce16da70c433d866d1f7696672fd1a3eff38c25fafa4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_002-1a}
body:
  text: 書與王順伯去夏逺辱臨存甚慰積年闊别之懷執别匆匆又一歲有半瞻企不啻渴飢屢于七七哥書中蒙寄意之勤感感且知别後所學大進膏潤沾溉多矣敬仰之劇然愚意竊有願訂正于左右者不敢避凂瀆之罪大抵學術有説有實儒者有儒者之説老氏有老氏之説釋氏有釋氏之説天下之學術衆矣而大門則此三家也昔之有是説者本于有是實後之求是實者亦必由是説故凡學者之欲求其實則必先習其説既習之又有得有不得有得其實者有徒得其説而不得其實者説之中又有淺深有精粗有偏全有純駁實之中亦有之凡此皆在其一家之中而自有辨焉者也論三家之同異得失是非而相譏于得與不得説與實與夫淺深精粗偏全純駁之間而不知其為三家之所均有者則亦非其至者矣兄前兩與家兄書大槩謂儒釋同其所以相比配者蓋所謂均有之者也某嘗以義利二字判儒釋又曰公私其實即義利也儒者以人生天地之間靈于萬物貴于萬物與天地並而為三極天有天道地有地道人有人道人而不盡人道不足與天地並人有五官官有其事于是有是非得失于是有教有學其教之所從立者如此故曰義曰公釋氏以人生天地間有生死有輪回有煩惱以為甚苦而求所以免之其有得道明悟者則知本無生死本無輪回本無煩惱故其言曰生死事大如兄所謂菩薩發心者亦只為此一大事其教之所從立者如此故曰利曰私惟義惟公故經世惟利惟私故出世儒者雖至于無聲無臭無方無體皆主于經世釋氏雖盡未來際普度之皆主于出世今習釋氏者皆人也彼既為人亦安能盡棄吾儒之仁義彼雖出家亦上報四恩日用之間此理之根諸心而不可泯滅者彼固或存之也然其為教非為欲存此而起也故其存不存不足為深造其道者輕重若吾儒則曰人之所以異于禽獸者幾希庶民去之君子存之釋氏之所憐憫者為未出輪回生死相續謂之生死海裏浮沉若吾儒中聖賢豈皆只在他生死海裏浮沉也彼之所憐憫者吾之聖賢無有也然其教不為欲免此而起故其説不主此也故釋氏之所憐憫者吾儒之聖賢無之吾儒之所病者釋氏之聖賢則有之試使釋氏之聖賢而繩以春秋之法童子知其不免矣從其教之所由起者觀之則儒釋之辨公私義利之别判然截然有不可同者矣某嘗妄論尊兄之質人所難及而不滿人意者皆所習所鄉有以病之也此非今日之言蓋自𥘉拜識時已如此竊議矣舜居深山之中與木石居與鹿豕逰其所以異于深山之野人者幾希及其聞一善言見一善行若決江河沛然莫之能禦也有過而不能勇改天下之通患然今世别有一般議論以不輕改其素守為老成為持重為謹審以幡然改沛然從者為輕率為狂妄為無所守凡事理但論是非若已知吾所守所行者為非則豈可不速改若謂吾所守所行未為非則固不當改又不論速不速也智仁勇三者天下之逹德尊兄之質本有勇但從來向釋氏不從儒學故至徇流俗朋友中見尊兄有剛決過人處又有徇流俗處莫不竊怪之若某則妄論尊兄之徇流俗亦甚勇他人則容易𬒳聖賢之學聳動雖不知其實往往以其名而赴之若尊兄則雖自覺有未穩當處亦且頑忍安舊有姑自守且徐圖之意某念非尊兄無以發其狂言用忘犯分之罪猖狂而言辭不暇擇某非敢使尊兄竊儒者之名以欺世願尊兄試以有言逆于汝心必求諸道之法試思之或有可採如謂不然亦願詳以見教辨白此事期于到頭非兄尚誰望二屬者僣易陳露所見蒙教復詳至開發多矣來書有深不欲多言之語某切謂于所不當言者加一言則非矣若在所當言則唯足以逹其理意而已不可以多少限也躁人之辭多者謂其躁妄錯亂贅疣是則可刪也今方將于道術趨向之間切磋求是則又奚多之病願尊兄先除此一戒使某得悉意承教庶是非可明也尊兄所學以力行為主不專務論説所見皆行履到處非但言説而巳此不待論某固不敢以言説待尊兄交遊間亦不以此病兄獨謂兄所學不能無蔽耳楊墨告子許行之徒豈但言説其所言即其所行而孟子力闢之者以為其學非也儒釋之辨某平時亦少所與論者有相信者或以語之亦無所辨難于我無益有自立議論與我異者又多是勝心所持必欲巳説之伸不能公平求是與之反覆只成爭辨此又不可與論今之僧徒多簷夫庸人不通文理既去髮胡服又安能使之髮髠潔緇而從吾遊耶至于士大夫之好佛者雖其好佛亦只為名而已此又不足與論也至如尊兄不為名不好勝凡事皆公心求是又聰明慱洽鄉來未有自得處猶有凝滯退縮之態比來所見明白議論發越殊無疑滯退縮之態矣設有如是資質如是所到然但工一家之説則又難論今兄兩家之書已皆探討此而不與極論則只成是自簷版矣鄉來切疑于兄者以為兄之資稟質實強敏有餘宏大通逺則不足懼為平日所鄉所學所習之所攝持密制其命而不能度越擺脫操不忘本之説以為典訓拒排釋氏者于千里之外而與至則行矣趨而避之者同其介然自守之意則無間之可乘矣承來教謂若使釋果未進于儒理須進步何苦守其卑汙而不進然後知髙明之度本自宏闊而某之疑則誠淺陋矣某前書所論論其教之所從起而兄則指其所造以辨之某雖不曾看釋藏經教然而楞嚴圓覺維摩等經則嘗見之如來書所舉愛涅槃憎生死正是未免生死未出輪回不了四相者正是未免生死未出輪回四相雖有淺深精粗然其夀者相亦只是我相根本潛伏藏識謂之命根不斷故其文曰若有人讃歎彼法則生歡喜便欲濟度若有人誹謗彼所得者即生嗔恨此亦正是未免生死未出輪回又如來教因地法行亦無身心受彼生死正是免得生死出得輪回伊川先生有曰釋氏只是理會生死其他都不理會近有一前輩參禪禪叢中稱其所得一日舉伊川先生之言曰某當時若得侍坐便問道不知除生死外更有甚事不知尊兄所見與此人優劣如何若尊兄𥘉心不為生死不知因何趨向其道來書實際理地雖不受一塵而佛事門中不捨一法若論不捨一法則虎穴魔宫實為佛事淫房酒肆盡是道場維摩使須菩提置鉢欲去之地乃其極則當是時十地菩薩猶𬒳呵斥以為取舍未忘染淨心在彼其視吾詩禮春秋何啻以為緒餘土苴唯其教之所從起者如此故其道之所極亦如此故某嘗謂儒為大中釋為大偏以釋與其他百家論則百家為不及釋為過之原其始要其終則私與利而巳來教謂佛説出世非舍此世而于天地外别有樂處某本非謂其如此獨謂其不主于經世非三極之道耳又謂若衆聖所以經世者不由自心建立方可言經世異于出世而别有妙道也吾儒之道乃天下之常道豈是别有妙道謂之典常謂之彛倫蓋天下之所共由斯民之所日用此道一而巳矣不可改頭換靣前書固謂今之為釋氏者亦豈能盡捨吾道特其不主于是而其違順得失不足以為深造者之輕重耳尊兄謂行所當行尊兄日用中所行合理處自是天資之美與探討儒書之力豈是讀華嚴自省發後方始如此然尊兄豈能保其所行皆合于理乎韋編三絶而後贊易敢道尊兄未嘗從事如此工夫吾志在春秋敢道尊兄不能有此志我亦欲正人心息邪説距詖行放淫辭敢道此非尊兄之所欲如是而謂儒釋同恐無是理今尊兄將空諸所有其視硜硜擊磬者果為何事哉若謂治大國若烹小鮮不以智治國國之福或者其可以與尊兄之道並行而不悖也某方吐胸中愚見欲求訂正其辭不得不自逹願尊兄平心觀之如不以為然幸無愛辭鄉時兄弟有所論難尚蒙推挽令各極其意况在朋友彼此無他疑正宜悉意評論期歸乎一是之地某平昔愚見所到持論甚堅然人言有以服其心則不憚于幡然而改惟尊兄有以知我非執巳好勝者幸不憚盡言若鄙言可采亦願尊兄不憚改轍也周公思兼三王以施四事其有不合者仰而思之夜以繼日幸而得之坐以待旦夫子自謂其為人也發憤忘食樂以忘憂不知老之將至云耳又曰吾嘗終日不食終夜不寢以思無益不如學也又曰我學不厭而教不倦此其不可為吾人標的乎但只如此隨見在去豈便無益于天下顧有如尊兄之質不無可惜處適得張南軒與家兄書今附逹家兄處可試觀之如何家兄逼歲必歸宅上不知曾更有切磋否歲即除伏幾多為親夀以厚新祉與朱元晦黃易二生歸奉正月十四日書備承改歲動息慰浣之劇不得嗣問倐又經時日深馳鄉聞巳赴闕奏事何日對敡伏想大攄素藴為明主忠言動悟淵衷以幸天下恨未得即聞緒餘沃此傾渴外間傳聞留中講讀未知信否誠得如此豈勝慶幸鄉人彭世昌得一山在信之西境距敝廬兩舍而近實龍虎山之宗巨陵特起豗然如象名曰象山山間自為原塢良田清池無異平野山澗合為瀑流垂注數里兩崖有蟠松怪石却略偃蹇中為茂林瓊瑶冰雪傾倒激射飛灑映帶于其間春夏流壯勢如奔雷木石自為階梯可沿以觀佳處與玉淵卧龍未易優劣往歲彭子結一廬以相延某亦自為精舍于其側春間携一姪二息讀書其上又得勝處為方丈以居前挹閩山竒峰萬疊後帶二溪下赴彭蠡學子亦稍稍結茅其傍相從講習此理為之日明舞雩詠歸千載同樂某昔年兩得侍教康廬之集加欵于鵝湖然猶鹵莾淺陋未能成章無以相發甚自愧也比日少進甚思一侍函丈當有啓助以卒餘教尚此未能登高臨流每用悵惘往歲覽尊兄與梭山家兄書嘗因南豐便人僣易致區區蒙復書許以卒請不勝幸甚古之聖賢惟理是視堯舜之聖而詢于芻蕘曾子之易簀蓋得于執燭之童子蒙九二曰納婦吉苟當于理雖婦人孺子之言所不棄也孟子曰盡信書不如無書吾于武成取二三䇿而已矣或乖理致雖出古書不敢盡信也智者千慮或有一失愚者千慮或有一得人言豈可忽哉梭山兄謂太極圖説與通書不類疑非周子所為不然則或是其學未成時所作不然則或是傳他人之文後人不辨也蓋通書理性命章言中焉止矣二氣五行化生萬物五殊二實二本則一曰一曰中即太極也未嘗于其上加無極字動靜章言五行隂陽太極亦無無極之文假令太極圖説是其所傳或其少時所作則作通書時不言無極蓋已知其説之非矣此言殆未可忽也兄謂梭山急迫看人文字未能盡彼之情而欲遽申已意是以輕于立論徒為多説而未必果當于理大學曰無諸巳而後非諸人人無古今智愚賢不肖皆言也皆文字也觀兄與梭山之書巳不能酬斯言矣尚何以責梭山哉尊兄向與梭山書云不言無極則太極同于一物而不足為萬化根本不言太極則無極淪于空寂而不能為萬化根本夫太極者實有是理聖人從而發明之耳非以空言立論使後人簸㺯于頰舌𥿄筆之間也其為萬化根本固自素定其足不足能不能豈以人言不言之故耶易大傳曰易有太極聖人言有今乃言無何也作大傳時不言無極太極何嘗同于一物而不足為萬化根本耶洪範五皇極列在九疇之中不言無極太極亦何嘗同于一物而不足為萬化根本耶太極固自若也尊兄只𬋩言來言去轉加糊塗此真所謂輕于立論徒為多説而未必果當于理也兄號句句而論字字而議有年矣宜益工益密立言精確足以悟疑辨惑乃反踈脫如此宜有以自反矣後書又謂無極即是無形太極即是有理周先生恐學者錯認太極别為一物故著無極二字以明之易之大傳曰形而上者謂之道又曰一隂一陽之謂道一隂一陽已是形而上者况太極乎曉文義者舉知之矣自有大傳至今幾年未聞有錯認太極别為一物者設有愚謬至此奚啻不能以三隅反何足上煩老先生特地于太極上加無極二字以曉之乎且極字亦不可以形字釋之蓋極者中也言無極則是猶言無中也是奚可哉若懼學者泥于形器而申釋之則宜如詩言上天之載而于下贊之曰無聲無臭可也豈宜以無極字加于太極之上朱子發謂濓溪得太極圖于穆伯長伯長之傳出于陳希夷其必有考希夷之學老氏之學也無極二字出于老子知其雄章吾聖人之書所無有也老子首章言無名天地之始有名萬物之母而卒同之此老氏宗旨也無極而太極即是此旨老氏學之不正見理不明所蔽在此兄于此學用力之深為日之久曾此之不能辨何也通書中焉止矣之言與此昭然不類而兄曾不之察何也太極圖説以無極二字冠首而通書終篇未嘗一及無極字二程言論文字至多亦未嘗一及無極字假令其𥘉實有是圖觀其後來未嘗一及無極字可見其道之進而不自以為是也兄今考訂注釋表顯尊信如此其至恐未得為善祖述者也潘清逸詩文可見矣彼豈能知濂溪者明道伊川親師承濂溪當時名賢居潘右者亦復不少濓溪之志卒屬于潘可見其子孫之不能世其學也兄何據之篤乎梭山兄之言恐未宜忽也孟子與墨者夷之辨則據其愛無等差之言與許行辨則據其與民並耕之言與告子辨則據其義外與人性無分于善不善之言未嘗泛為料度之説兄之論辨則異于是如某今者所論則皆據尊兄書中要語不敢增損或稍用尊兄泛辭以相繩紏者亦差有證據抑所謂夫民今而後得反之也兄書令梭山寬心遊意反覆二家之言必使于其所説如出于吾之所為者而無纎芥之疑然後可以發言立論而斷其可否則其為辨也不煩而理之所在無不得矣彼方深疑其説之非則又安能使之如出于其所為者而無纎芥之疑哉若其如出于吾之所為者而無纎芥之疑則無不可矣尚何論之可立否之可斷哉兄之此言無乃亦少傷于急迫而未精耶兄又謂一以急迫之意求之則于察理已不能精而于彼之情又不詳盡則徒為紛紛雖欲不差不可得矣殆夫子自道也向在南康論兄所解告子不得于言勿求于心一章非是兄令某平心觀之某嘗答曰甲與乙辨方各是其説甲則曰願某乙平心也乙亦曰願某甲平心也平心之説恐難明白不若據事論理可也今此急迫之説寬心遊意之説正相類耳論事理不必以此等壓之然後可明也梭山氣稟寬緩觀書未嘗草草必優遊諷詠耐久紬繹今以急迫指之雖他人亦未喻也夫辨是非别邪正決疑似固貴于峻潔明白若乃料度羅織文致之辭願兄無易之也梭山兄所以不復致辨者蓋以兄執已之意甚固而視人之言甚忽求勝不求益也某則以為不然尊兄平日惓惓于朋友求針規切磨之益蓋亦甚至獨羣雌孤雄人非惟不敢以忠言進于左右亦未有能為忠言者言論之橫出其勢然耳向來相聚每以不能副兄所期為愧比者自謂少進方將圖合并而承教今兄為時所用進退殊路合并未可期也又蒙許其吐露輒寓此少見區區尊意不以為然幸不憚下教政逺惟為國保愛倚需柄用以澤天下二伏自夏中拜書尋聞得對方深贊喜冒疾遽興重為駭嘆賢者進退綽綽有𥙿所甚惜者為世道耳承還里第屢欲致書每以冗奪徒積傾馳江德功人至奉十一月八日書備承作止之詳慰浣良劇比閲邸報竊知召命不容辭免莫須更一出否吾人進退自有大義豈直避嫌畏譏而已哉前日靣對必不止于職守所及恨不得與聞至言後便儻可垂教否前書條析所見正以疇昔負兄所期比日少進方圖自贖耳來書誨之諄復不勝幸甚愚心有所未安義當展盡不容但已亦尊兄教之之本意也近浙間一後生貽書見規以為吾二人者所習各已成熟終不能以相為莫若置之勿論以俟天下後世之自擇鄙哉言乎此輩凡陋沉溺俗學悖戾如此亦可憐也人能弘道非道弘人此理在宇宙間固不以人之明不明行不行而加損然人之為人則抑有其職矣垂象而覆物天之職也成形而載物者地之職也裁成天地之道輔相天地之宜以左右民者人君之職也孟子曰幼而學之壯而欲行之所謂行之者行其所學以格君心之非引其君于當道與其君論道經邦燮理隂陽使斯道逹乎天下也所謂學之者從師親友讀書考古學問思辨以明此道也故少而學道壯而行道者士君子之職也吾人皆無常師周旋于羣言淆亂之中俯仰參求雖自謂其理已明安知非私見蔽説若雷同相從一唱百和莫知其非此所甚可懼也何幸而有相疑不合在同志之間正宜各盡所懷力相切磋期歸于一是之地大舜之所以為大者善與人同樂取諸人以為善聞一善言見一善行若決江河沛然莫之能禦吾人之志當何求哉惟其是巳矣疇昔明言善議拳拳服􅈾而勿失樂與天下共之者以為是也今一旦以切磋而知其非則棄前日之所習勢當如出陷穽如避荆棘惟新之念若決江河是得所欲而遂其志也此豈小智之私鄙陋之習榮勝耻負者所能知哉弗明弗措古有明訓敢悉布之尊兄平日論文甚取曾南豐之嚴健南康為别前一夕讀尊兄之文見其得意者必簡健有力每切敬服嘗謂尊兄才力如此故所取亦如此今閲來書但見文辭繳繞氣象𥚹迫其致辨處類皆遷就牽合甚費分踈終不明白無乃為無極所纍反困其才耶不然以尊兄之髙明自視其説亦當如白黑之易辨矣尊兄嘗曉陳同父云欲賢者百尺竿頭進取一步將來不作三代以下人物省得氣力為漢唐分踈即更脫灑磊落今亦欲得尊兄進取一步莫作孟子以下學術省得氣力為無極二字分踈亦更脫灑磊落古人質實不尚智巧言論未詳事實先著知之為知之不知為不知所謂先知覺後知先覺覺後覺者以其事實覺其事實故言即其事事即其言所謂言顧行行顧言周道之衰文貌日勝事實湮于意見典訓蕪于辨説揣量模寫之工依放假借之似其條畫足以自信其習熟足以自安以子貢之逹又得夫子而師承之尚不免此多學而識之之見非夫子叩之彼固晏然而無疑先行之訓豫欲無言之訓所以覺之者屢矣而終不悟顔子既沒其傳固在曾子蓋可觀已尊兄之才未知其與子貢如何今日之病則有深于子貢者尊兄誠能深知此病則來書七條之説當不待條析而自解矣然相去數百里脫或未能自克淹回舊習則不能無遺恨請卒條之來書本是主張無極二字而以明理為説其要則曰于此有以灼然實見太極之真體某竊謂尊兄未曾實見太極若實見太極上靣必不更加無極字下靣必不更著真體字上靣加無極字正是疊床上之床下靣著真體字正是架屋下之屋虗見之與實見其言固自不同也又謂極者正以其究竟至極無名可名故特謂之太極猶曰舉天下之至極無以加此云耳就令如此又何必更于上靣加無極字也若謂欲言其無方所無形狀則前書固言宜如詩言上天之載而于其下贊之曰無聲無臭可也豈宜以無極字加之太極之上繫辭言神無方矣豈可言無神言易無體矣豈可言無易老氏以無為天地之始以有為萬物之母以常無觀妙以常有觀竅直將無字搭在上靣正是老氏之學豈可諱也惟其所蔽在此故其流為任術數為無忌憚此理乃宇宙之所固有豈可言無若以為無則君不君臣不臣父不父子不子矣楊朱未遽無君而孟子以為無君墨翟未遽無父而孟子以為無父此其所以為知言也極亦此理也中亦此理也五居九疇之中而曰皇極豈非以其中而命之乎民受天地之中以生而詩言立我蒸民莫匪爾極豈非以其中命之乎中庸曰中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉此理至矣外此豈更復有太極哉以極為中則為不明理以極為形乃為明理乎字義固有一字而數義者用字則有專一義者有兼數義者而字之指歸又有虗實虗字則但當論字義實字則當論所指之實論其所指之實則有非字義所能拘者如元字有始義有長義有大義坤五之元吉屯之元亨則是虗字專為大義不可復以他義參之如乾元之元則是實字論其所指之實則文言所謂善所謂仁皆元也亦豈可以字義拘之哉極字亦如此太極皇極乃是實字所指之實豈容有二充塞宇宙無非此理豈容以字義拘之乎中即至理何嘗不兼至義大學文言皆言知至所謂至者即此理也語讀易者曰能知太極即是知至語讀洪範者曰能知皇極即是知至夫豈不可蓋同指此理則曰極曰中曰至其實一也一極備凶一極無凶此兩極字乃是虗字專為至義却使得極者至極而已于此用而已字方用得當尊兄最號為精通詁訓文義者何為尚惑于此無乃理有未明正以太泥而反失之乎至如直以隂陽為形器而不得為道此尤不敢聞命易之為道一隂一陽而已先後始終動靜晦明上下進退往來闔闢盈虛消長尊卑貴賤表裏隱顯向背順逆存亡得喪出入行藏何適而非一隂一陽哉竒偶相尋變化無窮故曰其為道也屢遷變動不居周流六虗上下無常剛柔相易不可為典要惟變所適説卦曰觀變于隂陽而立卦發揮于剛柔而生爻和順于道德而理于義窮理盡性以至于命又曰昔者聖人之作易也將以順性命之理是以立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義下繫亦曰易之為書也廣大悉備有天道焉有人道焉有地道焉兼三才而兩之故六六者非他也三才之道也今顧以隂陽為非道而直謂之形器其孰為昧于道器之分哉辨難有要領言辭有指歸為辨而失要領觀言而迷指歸皆不明也前書之辨其要領在無極二字尊兄確意主張曲為飾説既以無形釋之又謂周子恐學者錯認太極别為一物故著無極二字以明之某于此見得尊兄只是強説來由恐無是事故前書舉大傳一隂一陽之謂道形而上者謂之道兩句以見粗識文義者亦知一隂一陽即是形而上者必不至錯認太極别為一物故曰况太極乎此其指歸本自明白而兄曾不之察乃必見誣以道上别有一物為太極通書曰中者和也中節也天下之逹道也聖人之事也故聖人立教俾人自易其惡自至其中而止矣周子之言中如此亦不輕矣外此豈更别有道理乃不得比虗字乎所舉理性命章五句但欲見通書言中言一而不言無極耳中焉止矣一句不妨自是斷章兄必見誣以屬之下文兄之為辨失其指歸大率類此盡信書不如無書某實深信孟子之言前書釋此段亦多援據古書獨頗不信無極之説耳兄遽坐以直絀古書為不足信兄其深文矣哉大傳洪範毛詩周禮與太極圖説孰古以極為形而謂不得為中以一隂一陽為器而謂不得為道此無乃少絀古書為不足信而微任胸臆之所裁乎來書謂若論無極二字乃是周子灼見道體逈出常情不顧傍人是非不計自巳得失勇往直前説出人不敢説底道理又謂周子所以謂之無極正以其無方所無形狀誠令如此不知人有甚不敢道處但加之太極之上則吾聖門正不肯如此道耳夫乾確然示人易矣夫坤隤然示人簡矣太極亦曷嘗隱于人哉尊兄兩下説無説有不知漏泄得多少如所謂太極真體不傳之祕無物之前隂陽之外不屬有無不落方體逈出常情超出方外等語莫是曾學禪宗所得如此平時既私其説以自髙妙及教學者則又往往祕此而多説文義此漏泄之説所從出也以實論之兩頭都無著實彼此只是葛藤末説氣質不美者樂寄此以神其姦不知繫絆多少好氣質底學者既以病已又以病人殆非一言一行之過兄其母以久習于此而重自反也區區之忠竭盡如此流俗無知必謂不遜書曰有言逆于汝心必求諸道諒在高明正所樂聞若猶有疑願不憚下教政逺惟為國自愛三往歲經筵之除士類胥慶延跂以俟吾道之行乃復不究起賢之禮使人重為慨嘆新天子即位海內屬目然罷行升黜率多人情之所未諭者羣小駢肩而騁氣息怫然諒不能不重勤長者憂國之懷某五月晦日拜荆門之命命下之日實三月二十八日替黃元章闕尚三年半願有以教之首春借兵之還伏領賜報備承改歲動息慰沃之劇惟其不度稍獻愚忠未蒙省察反成唐突謙抑非情督過深矣不勝皇恐向蒙尊兄促其條析且有無若令兄遽斷來書之戒深以為幸别紙所謂我日斯邁而月斯征各尊所聞各行所知亦可矣無復望其必同也不謂尊兄遽作此語甚非所望君子之過也如日月之食焉過也人皆見之及其更也人皆仰之通人之過雖微針藥久當自悟諒今尊兄必渙然于此矣願依末光以卒餘教與吳顯仲屬承訪逮深見嗜學之誠顧荒繆無以塞盛意為别未幾巳有思詠便風得書承比辰進修多福為慰顯仲質朴甚可嘉為學固不可迫切亦當有窮究處乃有長進若能隨分窮究廢弛豈所患也又所依得賢主人不患無浸潤之益也凌遽占復莫既所懷惟勉學自愛二得書讀之其辭與鄉時書辭不相類儘平常妥帖無甚病痛但恐亦是偶然耳若果如此自能隨時學問不患無益縱無甚益亦不至有甚繆戾也况朝夕得親炙黃丈又得與濟先相處不可謂乏師友也包顯道歸遣此為復莫究所欲言惟勉學自愛象山先生全集卷之二
