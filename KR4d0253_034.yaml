front:
  text: 象山先生全集卷之三十四
  hash: sha256:f33ebf34384fe709c8a305d09bc4feb3015f6f3b8d26f80d8ea245800fa06348
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_034-1a}
body:
  text: 語録上道外無事事外無道先生常言之道在宇宙間何嘗有病但人自有病千古聖賢只去人病如何增損得道道理只是眼前道理雖見到聖人田地亦只是眼前道理唐虞之際道在臯陶商周之際道在箕子天之生人必有能尸明道之責者臯陶箕子是也箕子所以徉狂不死者正為欲傳其道既為武王陳洪範則居于夷狄不食周粟論語中多有無頭柄的説話如知及之仁不能守之之類不知所及所守者何事如學而時習之不知時習者何事非學有本領未易讀也苟學有本領則知之所及者及此也仁之所守者守此也時習之習此也説者説此樂者樂此如髙屋之上建瓴水矣學苟知本六經皆我注腳天理人欲之言亦自不是至論若天是理人是欲則是天人不同矣此其原蓋出于老氏樂記曰人生而靜天之性也感于物而動性之欲也物至知知而後好惡形焉不能反躬天理滅矣天理人欲之言蓋出于此樂記之言亦根于老氏且如專言靜是天性則動獨不是天性耶書云人心惟危道心惟微解者多指人心為人欲道心為天理此説非是心一也人安有二心自人而言則曰惟危自道而言則曰惟微罔念作狂克念作聖非危乎無聲無臭無形無體非微乎因言莊子云眇乎小哉以屬諸人謷乎大哉獨逰于天又曰天道之與人道也相逺矣是分明裂天人而為二也動容周旋中禮此盛德之至所以常有先後言語必信非以正行才有正其行之心已自不是了古人皆是明實理做實事近來論學者言擴而充之須于四端上逐一充焉有此理孟子當來只是發出人有是四端以明人性之善不可自暴自棄苟此心之存則此理自明當惻隱處自惻隱當羞惡當辭遜是非在前自能辨之又云當寬𥙿溫柔自寬𥙿溫柔當發強剛毅自發強剛毅所謂溥博淵泉而時出之夫子問子貢曰汝與回也孰愈子貢曰賜也何敢望回回也聞一以知十賜也聞一以知二此又是白著了夫子氣力故夫子復語之曰弗如也時有姓吳者在坐遽曰為是尚嫌少在先生因語坐間有志者曰此説與天下士人語未必能通曉而吳君通敏如此雖諸君有志然于此不能及也吳遜謝謂偶然子貢在夫子之門其才最髙夫子所以屬望磨礲之者甚至如豫一以貫之獨以語子貢與曽子二人夫子既沒三年門人歸子貢反築室于埸獨居三年然後歸蓋夫子所以磨礲子貢者極其力故子貢獨留三年報夫子深恩也當時若磨礲得子貢就則其材豈曽子之比顔子既亡而曽子以魯得之蓋子貢反為聰明所纍卒不能知德也子貢言性與天道不可得而聞此是子貢後來有所見處然謂之不可得而聞非實見也如曰豫欲無言即是言了天下之理無窮若以吾平生所經歷者言之真所謂伐南山之竹不足以受我辭然其會歸總在于此顔子為人最有精神然用力甚難仲弓精神不及顔子然用力却易顔子當𥘉仰髙鑽堅瞻前忽後博文約禮遍求力索既竭其才方如有所立卓爾逮至問仁之時夫子語之猶下克已二字曰克已復禮為仁又發露其旨曰一日克巳復禮天下歸仁焉既又復告之曰為仁由已而由人乎哉吾嘗謂此三節乃三鞭也至于仲弓之為人則或人嘗謂雍也仁而不佞仁者靜不佞無口才也想其為人沖靜寡思日用之間自然合道至其問仁夫子但答以出門如見大賔使民如承大祭已所不欲勿施于人只此便是也然顔子精神髙既磨礲得就實則非仲弓所能及也顔子問仁之後夫子許多事業皆分付顔子了故曰用之則行舍之則藏惟我與爾有是顔子沒夫子哭之曰天喪豫蓋夫子事業自是無傳矣曽子雖能傳其脈然參也魯豈能望顔子之素蓄幸曽子傳之子思子思傳之孟子夫子之道至孟子而一光然夫子所分付顔子事業亦竟不復傳也學有本末顔子聞夫子三轉語其綱既明然後請問其目夫子對以非禮勿視勿聽勿言勿動顔子于此洞然無疑故曰回雖不敏請事斯語矣本末之序蓋如此今世論學者本末先後一時顛倒錯亂曽不知詳細處未可遽責于人如非禮勿視聽言動顔子已知道夫子乃語之以此今先以此責人正是躐等視廳言動勿非禮不可于這上面看顔子須看請事斯語直是承當得過天之一字是臯陶説起夫子以仁發明斯道其言渾無罅縫孟子十字打開更無隱遁蓋時不同也自古聖賢發明此理不必盡同如箕子所言有臯陶之所未言夫子所言有文王周公之所未言孟子所言有吾夫子之所未言理之無窮如此然譬之奕然先是這般等第國手下棊後來又是這般國手下棊雖所下子不同然均是這般手假始得故曰其或繼周者雖百世可知也古人視道只如家常茶飯故漆雕開曰吾斯之未能信斯此也此道與溺于利欲之人言猶易與溺于意見之人言却難涓涓之流積成江河泉源方動雖只有涓涓之微去江河尚逺却有成江河之理若能混混不舍晝夜如今雖未盈科將來自盈科如今雖未放乎四海將來自放乎四海如今雖未會其有極歸其有極將來自會其有極歸其有極然學者不能自信見夫標末之盛者便自荒忙舍其涓涓而趨之却自壞了曽不知我之涓涓雖微却是真彼之標末雖多却是偽恰似簷水來相似其涸可立而待也故吾嘗舉俗諺教學者云一錢做單客兩錢做雙客傅子淵自此歸其家陳正巳問之曰陸先生教人何先對曰辨志正巳復問曰何辨對曰義利之辨若子淵之對可謂切要此道非爭競務進者能知惟靜退者可入又云學者不可用心太緊今之學者大抵多是好事未必有切已之志夫子曰古之學者為已今之學者為人須自省察夫民合而聽之則神離而聽之則愚故天下萬世自有公論先生與晦翁辨論或諌其不必辨者先生曰女曽知否建安亦無朱晦翁青田亦無陸子靜不曽過得私意一關終難入德未能入德則典則法度何以知之居象山多告學者云女耳自聰目自明事父自能孝事兄自能弟本無欠闕不必他求在自立而已生于末世故與學者言費許多氣力蓋為他有許多病痛若在上世只是與他説入則孝出則弟𥘉無許多事千虗不博一實吾平生學問無他只是一實或問先生何不著書對曰六經注我我注六經韓退之是倒做蓋欲因學文而學道歐公極似韓其聰明皆過人然不合𥘉頭俗了或問如何俗了曰符讀書城南三上宰相書是已至二程方不俗然聰明却有所不及正人之本難正其末則易今有人在此與之言汝適某言未是某處坐立舉動未是其人必樂從若去動他根本所在他便不肯釋氏立教本欲脫離生死惟主于成其私耳此其病根也且如世界如此忽然生一箇謂之禪已自是無風起浪平地起土堆了無它利與善之間也此是孟子見得透故如此説或問先生之學當來自何處入曰不過切已自反改過遷善有善必有惡真如反覆手然善却自本然惡却是反了方有人品在宇宙間逈然不同諸處方嘵嘵然談學問時吾在此多與後生説人品此道之明如太陽當空羣隂畢伏典憲二字甚大惟知道者能明之後世乃指其所撰苛法名之曰典憲此正所謂無忌憚朱元晦曽作書與學者云陸子靜專以尊德性誨人故遊其門者多踐履之士然于道問學處欠了某教人豈不是道問學處多了些子故遊某之門者踐履多不及之觀此則是元晦欲去兩短合兩長然吾以為不可既不知尊德性焉有所謂道問學吾之學問與諸處異者只是在我全無杜撰雖千言萬語只是覺得他底在我不曽添一些近有議吾者云除了先立乎其大者一句全無伎倆吾聞之曰誠然復齋家兄一日見問云吾弟今在何處做工夫某答云在人情事勢物理上做些工夫復齋應而已若知物價之低昂與夫辨物之美惡真偽則吾不可不謂之能然吾之所謂做工夫非此之謂也後世言學者須要立箇門户此理所在安有門户可立學者又要各護門户此尤鄙陋人共生乎天地之間無非同氣扶其善而沮其惡義所當然安得有彼我之意又安得有自為之意二程見周茂叔後吟風弄月而歸有吾與點也之意後來明道此意却存伊川已失此意吾與常人言無不感動與談學問者或至為仇舉世人大抵就私意建立做事專以做得多者為先吾却欲殄其私而會于理此所以為仇吾與人言多就血脈上感移它故人之聽之者易非若法令者之為也如孟子與齊君言只就與民同處轉移它其餘自正今之論學者只務添人底自家只是減他底此所以不同宇宙不曽限隔人人自限隔宇宙乾以易知坤以簡能先生常言之云吾知此理即乾行此理即坤知之在先故曰乾知太始行之在後故曰坤作成物夫子平生所言豈止如論語所載特當時弟子所載止此爾今觀有子曽子獨稱子或多是有若曽子門人然吾讀論語至夫子曽子之言便無疑至有子之言便不喜先生問學者云夫子自言我學不厭及子貢言多學而識之又却以為非何也因自代對云夫子只言我學不厭若子貢言多學而識之便是蔽説學者須先立志志既立却要遇明師攻乎異端斯害也已今世類指佛老為異端孔子時佛教未入中國雖有老子其説未著却指那箇為異端蓋異與同對雖同師堯舜而所學之端緒與堯舜不同即是異端何止佛老哉有人問吾異端者吾對曰子先理會得同底一端則凡異此者皆異端子不語怪力亂神夫子只是不語非謂無也若力與亂分明是有神怪豈獨無之人以變瞳之微所矚甚逺亦怪矣苟不明道則一身之間無非怪但玩而不察耳可與適道未可與立可與立未可與權棠棣之華偏其反而豈不爾思室是逺而子曰未之思也夫何逺之有上面是説階級不同夫子因舉詩中室是逺而之語因以掃上面階級蓋雖有階級未有逺而不可進者也因言李清臣云夫子刪詩固有刪去一二語者如棠棣之詩今逸此兩句乃夫子刪去也清臣又言碩人之詩無素以為絢兮一語亦是夫子刪去其説皆是當時子夏之言謂繪事以素為後乃是以禮為後乎言不可也夫子蓋因子夏之言而刪之子夏當時亦有見乎本末無間之理然後來却有所泥故其學傳之後世尤有害繪事後素若周禮言繪畫之事後素功謂既畫之後以素間别之蓋以記其目之黑白分也謂先以素為地非柴愚參魯夫子所愛故子路使子羔為費宰子曰賊夫人之子以此見夫子欲子羔來磨礲就其逺者大者後來子羔早卒故屬意于曽子叩其兩端而竭焉言極其𥘉終始末竭盡無留藏也江漢以濯之秋陽以暴之皓皓乎不可尚已此數語自曽子胸中流出咸有一德之書言惟尹躬暨湯咸有一德以此見當時只有尹湯二人可當一德臯陶論知人之道曰亦行有九德亦言其人有德乃言曰載采采乃是謂必先言其人之有是德然後乃言曰某人有某事有某事蓋德則根乎其中逹乎其氣不可偽為若事則有才智之小人可偽為之故行有九德必言其人有德乃言曰載采采然後人不可得而廋也後世言伏羲畫八卦文王始重之為六十四卦其説不然且如周禮雖未可盡信如筮人言三易其經卦皆八其别皆六十有四龜筮協從亦見于虞書必非偽説如此則卦之重久矣蓋伏羲既畫八卦即從而重之然後能通神明之德類萬物之情而扶持天下之理文王蓋因其繇辭而加詳以盡其變爾繫辭首篇二句可疑蓋近于推測之辭吾之深信者書然易繫言默而成之不言而信存乎德行此等處深可信伊川解比卦原筮作占決卜度非也一陽當世之大人其不寧方來乃自然之理勢豈在它占決卜度之中原筮乃蒙𥘉筮之義原𥘉也古人字多通用因云伊川學問未免占決卜度之失富貴不能淫貧賤不能移威武不能屈非知道者不能楊子謂文王久幽而不改其操文王居羑里而贊易夫子厄于陳蔡而弦歌豈久幽而不改其操之謂耶自周衰以來人主之職分不明堯典命羲和敬授人時是為政首後世乃付之星官曆翁蓋緣人主職分不明所致孟子曰民為貴社稷次之君為輕此却知人主職分詩大雅多是言道小雅多是言事大雅雖是言小事亦主于道小雅雖是言大事亦主于事此所以為大雅小雅之辨秦不曾壞了道脈至漢而大壞蓋秦之失甚明至漢則迹似情非故正理愈壞漢文帝藹然善意然不可與入堯舜之道僅以鄉原諸公上殿多好説格物且如人主在上便可就他身上理會何必别言格物楊子默而好深沉之思他平生為此深沉之思所誤韓退之原性却將氣質做性説了近日舉及荀子解蔽篇説得人之蔽處好梭山兄云後世之人病正在此都𬒳荀子莊子輩壞了答云今世人之通病恐不在此大槩人之通病在于居茅茨則慕棟宇衣敝衣則慕華好食粗糲則慕甘肥此乃是世人之通病春秋北杏之會獨于齊桓公稱爵蓋當時倡斯義者惟桓公管仲二人春秋于諸國稱人責之也古者風俗醇厚人雖有虗底精神自然消了後世風俗不如古故𬒳此一假精神為害難與語道因嘆學者之難得云我與學者説話精神稍髙者或走了低者至塌了吾只是如此吾𥘉不知手勢如此之甚然吾亦只有此一路人方奮立巳有消蝕則議者不罪其消蝕而尤其奮立之太過舉其進鋭者其退速以為證于是併懲其𥘉曾不知孟子之意自不在此聖人作春秋𥘉非有意于二百四十二年行事又云春秋大槩是存此理又云春秋之亡久矣説春秋之繆尤甚于諸經也嘗閲春秋纂例謂學者曰啖趙説得有好處故人謂啖趙有功于春秋又云人謂唐無理學然反有不可厚誣者後世之論春秋者多如法令非聖人之旨也千古聖賢若同堂合席必無盡合之理然此心此理萬世一揆也銖銖而稱之至石必繆寸寸而度之至丈必差石稱丈量徑而寡失此可為論人之法且如其人大槩論之在于為國為民為道義此則君子人矣大槩論之在于為私已為權勢而非忠于國徇于義者則是小人矣若銖稱寸量校其一二節目而違其大綱則小人或得為欺君子反𬒳猜疑邪正賢否未免倒置矣有學者聽言有省以書來云自聽先生之言越千里如歷塊因云吾所發明為學端緒乃是第一步所謂升髙自下陟遐自邇却不知指何處為千里若以為今日捨私小而就廣大為千里非也此只可謂之第一步不可遽謂千里吾于人情研究得到或曰察見淵中魚不祥然吾非苛察之謂研究得到有扶持之方耳後世將讓職作一禮數古人推讓皆是實情唐虞之朝可見非尚虛文以讓為美名也嘗聞王順伯云本朝百事不及唐然人物議論逺過之此議論甚闊可取嘗問王順伯曰聞尊兄精于論字畫敢問字果有定論否順伯曰有定論曰何以信此説順伯曰有一畫一拐于此使天下有兩三人曉書問之此人曰是此等第則彼二人之言亦同如此知其有定因問字畫孰為貴順伯曰本朝不及唐唐不及漢漢不及先秦古書曰如此則大抵是古得些子者為貴順伯曰大抵古人作事不苟簡尊兄試觀古器與後來者異矣此論極是傅子淵請教乞簡省一語答曰艮其背不獲其身行其庭不見其人後見其與陳君舉書中云是則全掩其非非則全掩其是此是語病中又云闊節而疏目旨髙而趣深旨髙而趣深甚佳闊節而疏目子淵好處在此病亦在此又云子淵弘大文範細密子淵能兼文範之細密文範能兼子淵之弘大則非細也朱濟道力稱贊文王謂曰文王不可輕贊須是識得文王方可稱贊濟道云文王聖人誠非某所能識曰識得朱濟道便是文王一學者自晦翁處來其拜跪語言頗怪每日出齋此學者必有陳論應之亦無他語至四日此學者所言已罄力請誨語答曰吾亦未暇詳論然此間大綱有一箇規模説與人今世人淺之為聲色臭味進之為富貴利逹又進之為文章技藝又有一般人都不理會却談學問吾總以一言斷之曰勝心此學者默然後數日其舉動言語頗復常一學者從遊閲數月一日問之云聽説話如何曰𥘉來時疑先生之顛倒既如此説了後又如彼説及至聽得兩月後方始貫通無顛倒之疑三百篇之詩周南為首周南之詩關雎為首關雎之詩好善而已興于詩人之為學貴于有所興起洙泗門人其間自有與老氏之徒相通者故記禮之書其言多原老氏之意先生在勑局日或問曰先生如見用以何藥方醫國先生曰吾有四物湯亦謂之四君子湯或問如何曰任賢使能賞功罰罪先生云後世言道理者終是粘牙嚼舌吾之言道坦然明白全無粘牙嚼舌處此所以易知易行或問先生如此談道恐人將意見來會不及釋子談禪使人無所措其意見先生云吾雖如此談道然凡有虗見虗説皆來這裏使不得所謂德行常易以知險恆簡以知阻也今之談禪者雖為艱難之説其實反可寄託其意見吾于百衆人前開口見膽先生云凡物必有本末且如就樹木觀之則其根本必差大吾之教人大槩使其本常重不為末所纍然今世論學者却不恱此有一士大夫云陸丈與他人不同却許人改過先生嘗問一學者若事多放過有寬大氣象若動輒别白似若𥚹隘不知孰是學者云若不别白則無長進處先生曰然先生云學者讀書先于易曉處沉涵熟復切已致思則他難曉者渙然氷釋矣若先看難曉處終不能達舉一學者詩云讀書切戒在荒忙涵泳工夫興味長未曉莫妨權放過切身須要急思量自家主宰常精健逐外精神徒損傷寄語同逰二三子莫將言語壞天常先生歸自臨安子雲問近來學者先生云有一人近來有省云一蔽既徹群疑盡亡先生云歐公本論固好然亦只説得皮膚看唐鑑令讀一假子雲因請曰終是説骨髓不出先生云後世亦無人知得骨髓去處劉淳叟參禪其友周姓者問之曰淳叟何故捨吾儒之道而參禪淳叟答曰譬之于手釋氏是把鋤頭儒者把斧頭所把雖不同然却皆是這手我而今只要就他明此手友答云若如淳叟所言我只就把斧頭處明此手不願就他把鋤頭處明此手先生云淳叟亦善喻周亦可謂善對先生云子夏之學傳之後世尤有害先生居象山多告學者云汝耳自聰目自明事父自能孝事兄自能弟本無少缺不必他求在乎自立而已學者于此亦多興起有立議論者先生云此是虗説或云此是時文之見學者遂云孟子闢楊墨韓子闢佛老陸先生闢時文先生云此説也好然闢楊墨佛老者猶有些氣道吾却只闢得時文因一笑先生作貴溪學記云堯舜之道不過如此此亦非有甚髙難行之事嘗舉以語學者云吾之道真所謂夫婦之愚可以與知或問讀六經當先看何人解注先生云須先精看古注如讀左傳則杜預注不可不精看大槩先須理會文義分明則讀之其理自明白然古注惟趙岐解孟子文義多略有一後生欲處郡庠先生訓之曰一擇交二隨身規矩三讀古書論語之屬程先生解易爻辭多得之彖辭却有鶻突處人之文章多似其氣質杜子美詩乃其氣質如此三代之時逺近上下皆講明扶持此理其有不然者衆從而斥之後世逺近上下皆無有及此者有一人務此衆反以為怪故古之時比屋至于可封後世雖能自立然寡固不可以敵衆非英才不能奮興有學者因事上一官員書云遏惡揚善沮姦佑良此天地之正理也此理明則治不明則亂存之則為仁不存則為不仁先生擊節稱賞先生云吾自應舉未嘗以得失為念場屋之文只是直寫胸襟故作貴溪縣學記云不徇流俗而正學以言者豈皆有司之所棄天命之所遺有學者曽看南軒文字繼從先生遊自謂有省及作書陳所見有一語云與太極同體先生復書云此語極似南軒學者不可用心太緊深山有寶無心于寶者得之有學者上執政書中間有云閣下作而待漏于金門朝而議政于黼座退而平章于中書歸而咨訪于府第不識是心能如晝日之昭晣而無薄蝕之者乎能如砥柱之屹立而無淪胥之者乎先生云此亦可以警學者曹立之有書于先生曰願先生且將孝弟忠信誨人先生云立之之謬如此孝弟忠信如何説且將惟溫故而後能知新惟敦厚而後能崇禮易繫上下篇總是贊易只將贊易看便自分明凡吾論世事皆如此必要挈其總要去處後世言易數者多只是昡惑人之説夫人幼而學之壯而欲行之今之論學者所用非所學所學非所用或有譏先生之教人專欲管歸一路者先生曰吾亦只有此一路孟子曰言人之不善當如後患何今人多失其旨蓋孟子道性善故言人無有不善今若言人之不善彼將甘為不善而以不善向汝汝將何以待之故曰當如後患何見到孟子道性善處方是見得盡退之言軻死不得其傳荀與楊擇焉而不精語焉而不詳何其説得如此端的程先生解頻復厲言過在失不在復極好先生在勑局日或勸以小人闖伺宜乞退省先生曰吾之未去以君也不遇則去豈可以彼為去就耶李白杜甫陶淵明皆有志于吾道資稟之髙者義之所在順而行之𥘉無留難其次義利交戰而利終不勝義故自立吾自幼時聽人議論似好而其實不如此者心不肯安必要求其實而後已吾于踐履未能純一然才自警䇿便與天地相似後世言寬仁者類出于姑息殊不知苟不出于文致而當其情是乃寬仁也故吾嘗曰虞舜孔子之寬仁吾于四裔兩觀之間見之有士人上詩云手抉浮翳開東明先生頗取其語因云吾與學者言真所謂取日虞淵洗光咸池右門人傅子雲季魯編録冉子退朝子曰何晏也對曰有政子曰其事也魯國無政所行者亦其事而巳政者正也志一動氣此不待論獨氣一動志未能使人無疑孟子復以蹶趨動心明之則可以無疑矣一者專一也志固為氣之帥然至于氣之專一則亦能動志故不但言持其志又戒之以無暴其氣也居處飲食適節宣之宜視聽言動嚴邪正之辨皆無暴其氣之工也古者十五而入大學大學之道在明明德在親民在止于至善此言大學指歸欲明明德于天下是入大學標的格物致知是下手處中庸言博學審問謹思明辨是格物之方讀書親師友是學思則在巳問與辨皆須即人自古聖人亦因往哲之言師友之言乃能有進况非聖人豈有任私智而能進學者然往哲之言因時乘理其指不一方册所載又有正偽純疵若不能擇則是泛觀欲取決于師友師友之言亦不一又有是非當否若不能擇則是泛從泛觀泛從何所至止如彼作室于道謀是用不潰于成欲取其一而從之則又安知非私意偏説子莫執中孟子尚以為執一廢百豈為善學後之學者顧何以處此學者規模多係其聞見孩提之童未有傳習豈能有是規模是故所習不可不謹處乎其中而能自拔者非豪傑不能劫于事勢而為之趨向者多不得其正亦理之常也古者勢與道合後世勢與道離何謂勢與道合蓋德之宜為諸侯者為諸侯宜為大夫者為大夫宜為士者為士此之謂勢與道合後世反此賢者居下不肖者居上夫是之謂勢與道離勢與道合則是治世勢與道離則是亂世如切如磋者道學也如琢如磨者自修也骨象脆切磋之工精細玉石堅琢磨之工粗大學問貴細密自修貴勇猛世人只𬋩理會利害皆自謂惺惺及他已分上事又却只是放過爭知道名利如錦覆陷穽使人貪而墮其中到頭只嬴得一箇大不惺惺去陽一君而二民君子之道也隂二君而一民小人之道也陽竒隂偶陽以竒為君一也隂以偶為君二也有一則有二第所主在一彼小人之事豈遽絶其一哉所主非是耳故君子以理制事以理觀象故曰變動不居周流六虗上下無常剛柔相易不可為典要唯變所適書疏云周天三百六十五度四分度之一天體圓如彈丸北髙南下北極出地上三十六度南極入地下三十六度南極去北極直徑一百八十二度強天體隆曲正當天之中央南北二極中等之處謂之赤道去南北極各九十一度春分日行赤道從此漸北夏至行赤道之北二十四度去北極六十七度去南極一百一十五度從夏至以後日漸南至秋分還行赤道與春分同冬至行赤道之南去南極六十七度去北極一百一十五度其日之行處謂之黃道又有月行之道與日相近交路而過半在日道之裏半在日道之表其當交則兩道相合去極逺處兩道相去六度此其日月行道之大略也黃道者日所行也冬至在斗出赤道南二十四度夏至在井出赤道北二十四度秋分交于角春分交于奎月有九道其出入黃道不過六度當交則合故曰交蝕交蝕者月道與黃道交也孟子登東山而小魯一章紬繹誦詠五六過始云皆是言學之充廣如水之有瀾日月之有光皆是本原上發得如此牛山之木嘗美矣以下常宜諷詠元晦似伊川欽夫似明道伊川蔽固深明道却通疏九疇之數一六在北水得其正三八在東木得其正唯金火易位而木生火自三上生至九自一數至于九正得二數故火在南自四數至七亦得四數故金在西一變而為七七變而為九九復變而為一者一與一為二一與二為三一與三為四一與四為五一與五為六五數之祖故至七則為二與五矣是一變也至九而極故曰七變而為九數至九則必變故至十則變為一十百為一百千為一千萬為一萬是九復變而為一也或問賈誼陸贄言論如何曰賈誼是就事上説仁義陸贄是就仁義上説事臨安四聖觀六月間傾城士女咸出禱祠或問何以致人歸鄉如此答曰只是賞罰不明一夕步月喟然而嘆包敏道侍問曰先生何嘆曰朱元晦泰山喬嶽可惜學不見道枉費精神遂自擔閣奈何包曰勢既如此莫若各自著書以待天下後世之自擇忽正色厲聲曰敏道敏道恁地沒長進乃作這般見解且道天地間有箇朱元晦陸子靜便添得些子無了後便減得些子歸自臨安湯倉因言風俗不美曰乍歸方欲與後生説些好話然此事亦由天亦由人湯云如何由天曰且如三年一次科舉萬一中者篤厚之人多浮薄之人少則風俗自此而厚不然只得一半篤厚之人或三四箇篤厚之人風俗猶自庶幾不幸篤厚之人無幾或全是浮薄之人則後生從而視效風俗日以敗壞湯云如何亦由人曰監司守令便是風俗之宗主只如院判在此毋只惟位髙爵重旗旌導前騎卒擁後者是崇是敬陋巷茅茨之間有篤敬忠信好學之士不以其微賤而知崇敬之則風俗庶幾可回矣湯再三稱善次日謂幕僚曰陸丈近至城何不去聽説話幕僚云恐陸丈門户髙峻議論非某輩所能喻湯云陸丈説話甚平正試往聽看某于張吕諸公皆相識然陸丈説話自是不同須知人情之無常方料理得人孝經十八章孔子于踐履實地上説出非虗言也莫知其苗之碩謂葉幹髼鬆而亡實者也天下之言性也則故而已矣此假人多不明首尾文義中間所惡于智者至智亦大矣文義亦自明不失孟子本旨據某所見當以莊子去故與智解之觀莊子中有此故字則知古人言語文字必常有此字易雜卦中隨無故也即是此故字當孟子時天下無能知其性者其言性者大抵據陳迹言之實非知性之本往往以利害推説耳是反以利為本也夫子贊易治曆明時在革之象蓋曆本測候常須改法觀革之義則千嵗之日至無可坐致之理明矣孟子言千歲之日至可坐而致也正是言不可坐而致以此明不可求其故也帝出乎震帝者天也震居東春也震雷也萬物得雷而萌動焉故曰出乎震齊乎巽巽是東南春夏之交也巽風也萬物得風而滋長焉新生之物齊潔精明故曰萬物之潔齊也相見乎離離南方之卦也夏也生物之形至是畢露文物粲然故曰相見致役乎坤萬物皆得地之飬將遂妊實六七月之交也萬物于是而胎實焉故曰致役乎坤説言乎兊兊正秋也八月之時萬物既已成實得雨澤而説懌故曰萬物之所説也戰乎乾乾是西北方之卦也舊榖之事將始乾不得不君乎此也十月之時隂極陽生隂陽交戰之時也龍戰乎野是也勞乎坎坎者水也至勞者也隂退陽生之時萬物之所歸也隂陽未定之時萬物歸藏之始其事獨勞故曰勞乎坎成言乎艮隂陽至是而定矣舊榖之事于是而終新榖之事于是而始故曰萬物之所成終成始也易之為書也不可逺為道也屢遷變動不居周流六虛上下無常剛柔相易不可為典要唯變所適臨深履薄參前倚衡警戒無虞小心翼翼道不可須臾離也五典天敘五禮天秩洪範九疇帝用錫禹傳在箕子武王訪之三代攸興罔不克敬典不有斯人孰足以語不可逺之書而論屢遷之道也其為道也屢遷不遷處變動不居居處周流六虗實處上下無常常處剛柔相易不易處不可為典要要處惟變所適不變處履德之基也謙德之柄也復德之本也恆德之固也損德之修也益德之𥙿也困德之辨也井德之地也巽德之制也易之興也其于中古乎作易者其有憂患乎上古淳朴人情物態未至多變易雖不作未有闕也逮乎中古情態日開詐偽日萌非明易道以示之則質之美者無以成其德天下之衆無以感而化生民之禍有不可勝言者聖人之憂患如此不得不因時而作易也易道既著則使君子身修而天下治矣是故履德之基也雜卦曰履不處也不處者行也上天下澤尊卑之義禮之本也經禮三百曲禮三千皆本諸此常行之道履德之基謂以行為德之基也基始也德自行而進也不行則德何由而積謙德之柄也有而不居為謙謙者不盈也盈則其德喪矣常執不盈之心則德乃日積故曰德之柄既能謙然後能復復者陽復為復善之義人性本善其不善者遷于物也知物之為害而能自反則知善者乃吾性之固有循吾固有而進德則沛然無他適矣故曰復德之本也知復則內外合矣然而不常則其德不固所謂雖得之必失之故曰恆德之固也君子之修德必去其害德者則德日進矣故曰損德之修也善日積則寬𥙿故曰益德之𥙿也不臨患難難處之地未足以見其德故曰困德之辨也井以飬人利物為事君子之德亦猶是也故曰井德之地也夫然可以有為有為者常順時制宜不順時制宜者一方一曲之士非盛德之事也順時制宜非隨俗合汚如禹稷顔子是已故曰巽德之制也履和而至兊以柔恱承乾之剛健故和天在上澤處下理之極至不可易故至君子所行體履之義故和而至謙尊而光不謙則必自尊自耀自尊則人必賤之自耀則德喪能謙則自卑自晦自卑則人尊之自晦則德益光顯復小而辨于物復貴不逺言動之微念慮之隱必察其為物所誘與否不辨于小則將致悔咎矣恆雜而不厭人之生動用酢酬事變非一人情于此多至厭倦是不恆其德者也能恆者雖雜而不厭損先難而後易人情逆之則難順之則易凡損抑其過必逆乎情故先難既損抑以歸于善則順乎本心故後易益長𥙿而不設益者遷善以益巳之德故其德長進而寬𥙿設者侈張也有侈大不誠實之意如是則非所以為益也困窮而通不修德者遇窮困則隕穫喪亡而已君子遇窮困則德益進道益通井居其所而遷如君子不以道徇人故曰居其所而博施濟衆無有不及故曰遷巽稱而隱巽順于理故動稱宜其所以稱宜者非有形迹可見故隱履以和行行有不和以不由禮故也能由禮則和矣謙以制禮自尊大則不能由禮卑以自牧乃能自節制以禮復以自知自克乃能復善他人無與焉恆以一德不常則二三常則一終始惟一時乃日新損以逺害如忿欲之類為德之害損者損其害德而巳能損其害德者則吾身之害固有可逺之道特君子不取必乎此也益以興利有益于已者為利天下之有益于已者莫如善君子觀易之象而遷善故曰興利能遷善則福慶之利固有自致之理在君子無加損焉有不足言者困以寡怨君子于困厄之時必推致其命吾遂吾之志何怨之有推困之義不必窮厄患難及已也凡有道而有所不可行皆困也君子于此自反而已未嘗有所怨也井以辨義君子之義在于濟物于井之義人可以明君子之義巽以行權巽順于理如權之于物隨輕重而應則動靜稱宜不以一定而悖理也九卦之列君子修身之要其序如此缺一不可也故詳復贊之所謂誠其意者無自欺也一假總是修身齊家治國平天下之要故反覆言之如惡惡臭如好好色乃是性所好惡非出于勉強也自欺是欺其心謹獨即不自欺誠者自成而道自道也自欺不可謂無人知十目所視十手所指其嚴若此惟器與名不可以假人只當説繁纓非諸侯所當用不可以與此人左氏也説差却名了是非孔子之言如孟子謂聞誅一夫紂矣乃是正名孔子于蒯瞶輒之事乃是正名至于溫公謂名者何諸侯卿大夫是也則失之矣事不可以逆料聖賢未嘗預料由也不得其死然死矣盆成括其微言如此此理塞宇宙誰能逃之順之則吉違之則凶其蒙蔽則為昏愚通徹則為明知昏愚者不見是理故多逆以致凶明知者見是理故能順以致吉説易者謂陽貴而隂賤剛明而柔暗是固然矣今晉之卦上離以六五一隂為明之主下坤以三隂順從于離明是以致吉二陽爻反皆不善蓋離之所以為明者明是理也坤之三隂能順從其明宜其吉無不利此以明理順理而善則其不盡然者亦宜其不盡善也不明此理而泥于爻畫名言之末豈可以言易哉陽貴隂賤剛明柔暗之説有時而不可泥也屯隂陽始交一索而得長男再索而得中男六三即鹿無虞惟入于林中指下卦之漸入上卦坎險之地上六乘馬班如泣血漣如正孔子曰吾末如之何也已矣雖然人當止邪于未形絶惡于未萌致治于未亂保邦于未危蒙九二一爻為發蒙之主不應更論與九五相得與否包蒙納婦即克家之事束書不觀遊談無根染習深者難得淨潔自明然後能明人復齋看伊川易傳解艮其背問某伊川説得如何某云説得鶻突遂命某説某云艮其背不獲其身無我行其庭不見其人無物或謂先生之學是道德性命形而上者晦翁之學是名物度數形而下者學者當兼二先生之學先生云足下如此説晦翁晦翁未伏晦翁之學自謂一貫但其見道不明終不足以一貫耳吾嘗與晦翁書云揣量模寫之工依放假借之似其條畫足以自信其節目足以自安此言切中晦翁之膏肓學者答堂試䇿先生云諸公答䇿皆是隨問走答䇿當如堂上人部勒堂下吏卒乃不為䇿題所纏先生于門人最屬意者唯傅子淵𥘉子淵請教先生有艮背行庭無我無物之説後子淵謂某舊登南軒晦翁之門為二説所礙十年不可先生之説及分教衡陽三年乃始信先生屢稱子淵之賢因言比陳君舉自湖南漕臺遣書幣下問來書云某老矣不復見諸事功但欲結果身分耳先生略舉答書因説近得子淵與君舉書煞好若子淵切磋不已君舉當有可望也但子淵書中有兩句云是則全掩其非非則全掩其是亦為抹出後聞先生臨終前數日有自衡陽來呈子淵與周益公論道五書先生手不釋歎曰子淵擒龍打鳳底手假邵武丘元夀聽話纍日自言少時獨喜看伊川語録先生曰一見足下知留意學問且從事伊川學者既好古如此居鄉與誰遊處元夀對以賦性冷淡與人寡合先生云莫有令嗣延師否元夀對以延師亦不相契止是託之二子耳先生云既是如此平生懷抱欲説底話分付與誰元夀對以無分付處有時按視田園老農老圃雖不識字喜其真情四時之間與之相忘酬酢居多耳先生顧學者笑曰以邵武許多士人而不能有以契元夀之心契心者乃出于農圃之人如此是士大夫儒者視農圃間人不能無愧矣先生因言世間一種恣情縱欲之人雖大狼狽其過易于拯救却是好人剗地難理會松云如丘丈之賢先生還有力及之否先生云元夀甚佳但恐其不大耳人皆可以為堯舜堯舜與人同耳但恐不能為堯舜之大也元夀連日聽教方自慶快且云天下之樂無以加于此至是忽局蹴變色而答曰荷先生教愛之篤但某自度無此力量誠不敢僣易先生云元夀道無此力量錯説了元夀平日之力量乃堯舜之力量元夀自不知耳元夀默然愈惑退松别之元夀自𫐠自聽教于先生甚樂今胸中忽如有物梗之者姑抄先生文集歸而求之再來承教先生與學者説及智聖始終條理一章忽問松云智聖是如何松曰知此之謂智盡此之謂聖先生曰智聖有優劣否松曰無優劣先生曰好無優劣然孟子云其至爾力也其中非力如此説似歸重于智松曰其至爾力也其中非爾力也巧也行文自當如此孟子不成道其至爾力也其中爾巧也先生曰是松又曰智聖雖無優劣却有先後畢竟致知在先力行在後故曰始終先生曰是先生因為子持之改所吟鶯詩云百喙吟春不暫停長疑春意未丁寧數聲緑樹黃鸝曉始笑從來著意聽繞梁餘韻散南柯爭奈無如春色何剩化玉巢金綽約深春到處為人歌先生言鶯巢以他羽成之至貼近金羽處以白鷴羽藉之所以飬其金羽也有客論詩先生誦昌黎調張籍一篇云李杜文章在光𦦨萬丈長不知羣兒愚那用故譏傷蚍蜉撼大樹可笑不自量云云乞君飛霞佩與我髙頡頏且曰讀書不到此不必言詩中心斯須不和不樂而鄙詐之心入之外貌斯須不莊不敬而慢易之心入之與告子不動心是操持堅執做孟子不動心是明道之力有行古禮于其家而其父不恱乃至父子相非不已遂來請教先生云以禮言之吾子于行古禮其名甚正以實言之則去古既逺禮文不逺吾子所行未必盡契古禮而且先得罪于尊君矣喪禮與其哀不足而禮有餘也不若禮不足而哀有餘也如世俗甚不經裁之可也其餘且可從舊有縣丞問先生赴任尚何時先生曰此來為得疾速之任之命方欲單騎即行縣丞因言及虜人有南牧之意先生遽云如此則荆門乃次邉之地某當挈家以行未免少遲若以單騎却似某有所畏避也臨川張次房于曆子賦歸去來辭棄官而歸杜門經歲來見先生先生云近聞諸公以王謙仲故推挽次房一出是否次房云極荷諸公此意愧無以當之先生曰何荷之云君子之愛人也以德細人之愛人也以姑息凡諸公欲相推挽者姑息之愛也次房𥘉歸時一二年間正氣甚盛後來寖弱先生教授極力推挽是後正氣復振比年又寖衰次房莫未至無飯喫否若今諸公此舉事勢恐亦難行反自取辱耳某今有一官不能脫去得今又令去荆門某只得去若竄去南海某便著去次房幸而無官了而今更要出來做甚麼次房云恨聞言之晚不能早謝絶之也松問先生今之學者為誰先生屈指數之以傅子淵居其首鄧文範居次傅季魯黃元吉又次之且云浙間煞有人有得之深者有得之淺者有一見而得之者有久而後得之者廣中陳去華省發偉特惜乎此人亡矣有傳黃元吉别長沙陳君舉有詩送行云荷君來意固非輕曾未深交意便傾説到七篇無欠少學從三畫已分明每嗟自昔傷標致頗欲從今近老成為謝荆門三益友何時尊酒話平生先生切聞子淵與君舉切磋又起君舉之疑得黃元吉君舉方信子淵之學松曰元吉之學却在子淵之上先生曰元吉得老夫煆煉之力元吉從老夫十五年前數年病在逐外中間數年換入一意見窼窟去又數年換入一安樂窼窟去這一二年老夫痛加煆煉似覺壁立無由近傍元吉善學不敢發問遂誘致諸處後生來授學却教諸生致問老夫一一為之問剝元吉一旦從傍忽有所省此元吉之善學先生云今世儒者類指佛老為異端孔子曰攻乎異端孔子時佛教未入中國雖有老子其説未著却指那箇為異端蓋異字與同字為對雖同師堯舜而所學異緒與堯舜不同此所以為異端也先生因警學者攻異端曰天下之理將從其簡且易者而學之乎將欲其繁且難者而學之乎若繁且難者果足以為道勞苦而為之可也其實本不足以為道學者何苦于繁難之説簡且易者又易知易從又信足以為道學者何憚而不為簡易之從乎先生言萬物森然于方寸之間滿心而發充塞宇宙無非此理孟子就四端上指示人豈是人心只有這四端而已又就乍見孺子入井皆有怵惕惻隱之心一端指示人又得此心昭然但能充此心足矣乃誦誠者自成也而道自道也誠者物之終始云云天地之道可一言而盡也先生言胡季隨從學晦翁晦翁使讀孟子他日問季隨如何解至于心獨無所同然乎一句季隨以所見解晦翁以為非且謂季隨讀書鹵莾不思後季隨思之既苦因以致疾晦翁乃言之曰然讀如雍之言然之然對上同聽同美同嗜説先生因笑曰只是如此何不早説與他先生言吾家治田每用長大钁頭兩次鋤至二尺許深一尺半許外方容秧一頭久旱時田肉深獨得不旱以他處禾穗數之每穗榖多不過八九十粒少者三五十粒而已以此中禾穗數之每穗少者尚百二十粒多者至二百餘粒每一畝所收比他處一畝不啻數倍蓋深耕易耨之法如此凡事獨不然乎時因論及士人專事速化不根之文故及之答曾宅之一書甚詳梭山一日對學者言曰文所以明道辭逹足矣意有所屬也先生正色而言曰道有變動故曰爻爻有等故曰物物相雜故曰文文不當故吉凶生焉昔者聖人之作易也幽贊于神明而生蓍參天兩地而倚數觀變于隂陽而立卦發揮于剛柔而生爻和順于道德而理于義窮理盡性以至于命這方是文文不到這裏説甚文松嘗問梭山云有問松孟子説諸侯以王道是行王道以尊周室行王道以得天位當如何對梭山云得天位松曰却如何解後世疑孟子教諸侯篡奪之罪梭山云民為貴社稷次之君為輕先生再三稱嘆曰家兄平日無此議論良久曰曠古以來無此議論松曰伯夷不見此理先生亦云松又云武王見得此理先生曰伏羲以來皆見此理或勸先生之荆門為委曲行道之計答云仲虺言湯之德曰以義制事以禮制心古人通體純是道義後世賢者處心處事亦非盡無禮義特其心先主乎利害而以禮義行之耳後世所以大異于古人者正在于此古人理會利害便是禮義後世理會禮義却只是利害先生言吳君玉自負明敏至槐堂處五日每舉書句為問隨其所問解釋其疑然後從其所曉敷廣其説每每如此其人再三稱嘆云天下皆説先生是禪學獨某見得先生是聖學然退省其私又却都無事了此人明敏只是不得久與之切磋先生言重華論莊子不及老子者三孟子不及孔子三其一不合以人比禽獸晦翁亦有此論松曰孟子言人之所以異于禽獸者幾希惟恐人之入于禽獸是禽獸也為其無君父也則其違禽獸不逺矣為其夜氣不足以存也晦翁但在氣象上理會此其所以錙銖聖人之言往往皆不可得而同也先生曰使堯舜禹湯文武周公孔子七八聖人合堂同席而居其氣象豈能盡同我這裏也説氣象但不是就外面説乃曰隂陽一大氣乾坤一大象因説孟子之言如孟施舍之守氣不如曽子之守約也此兩句却贅了人生而靜天之性也感物而動性之欲也是為不識艮背行庭之旨舜隱惡而揚善説者曰隱藏也此説非是隱伏也伏絶其惡而善自揚耳在巳在人一也為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能植則善者信矣故君子以遏惡揚善順天休命也成湯放桀于南巢惟有慙德湯到這裡却生一疑此是湯之過也故仲虺作誥曰惟天生民有欲無主乃亂惟天生聰明時乂嗚呼謹厥終惟其始殖有禮覆昏暴欽崇天道永保天命學者問荆門之政何先對曰必也正人心乎人之其所親愛而辟焉之其所賤惡而辟焉之其所畏敬而辟焉之其所哀矜而辟焉之其所敖惰而辟焉辟比量也家中以次之人以我親愛賤惡而比量之或效之或議之其弊無窮不可悉究要其終實不足以齊其家告子與孟子並駕其説于天下孟子將破其説不得不就他所見處細與他研磨一次將𣏌柳來論便就他𣏌柳上破其説一次將湍水來論便就他湍水上破其説一次將生之謂性來論又就他生之謂性上破其説一次將仁內義外來論又就他義外上破其説窮究異端要得恁地使他無語始得枚卜功臣之遜遜出于誠漢文帝即位之遜遜出于偽云云及修代來功詔稱朕狐疑唯宋昌勸朕朕已得保宗廟尊昌為衛將軍云云後世人主不知學人欲橫流安知天位非人君所可得而私夫子沒老氏之説出至漢而其術益行曹參相齊盡召長老諸先生問所以安集百姓而齊故儒以百數言人人殊參未知所定聞膠西有蓋公善治黃老言使人厚幣請之既見蓋公公為言治道貴清靜而民自定推此類具言之參于是避正堂舍蓋公焉其治要用黃老術故相齊九年齊國安集大稱賢相此見老氏之脈在此也蕭何薨參入相一遵何為之約束擇郡縣吏長木訥于文辭謹厚長者即召除為丞相史吏言文刻深欲聲名輒斥去之日夜飲酒不事事見人有細過掩匿覆蓋之府中無事漢家之治血脈在此邵堯夫詩一物其來有一身一身還有一乾坤不如聖人説乾知太始因曰堯夫只是箇間道人聖人之道有用無用便非聖人之道先生一日自歌與姪孫濬書云道之將廢自孔孟之生不能回天而易命云云又歌柏舟詩松為之涕泗沾襟少間又歌東皇太一雲中君見松悲泣不堪又歌曰蕭蕭馬鳴悠悠斾旌乃曰蕭蕭馬鳴靜中有動矣悠悠斾旌動中有靜也誠者自誠也而道自道也君子以自昭明德人之有是四端而自謂不能者自賊者也暴謂自暴棄謂自棄侮謂自侮反謂自反得謂自得禍福無不自巳求之者聖賢道一箇自字煞好嘗言年十三時復齋因看論語命某近前問云看有子一章如何某云此有子之言非夫子之言先兄云孔門除却曽子便到有子未可輕議更思之如何某曰夫子之言簡易有子之言支離吕伯恭為鵝湖之集先兄復齋謂某曰伯恭約元晦為此集正為學術異同某兄弟先自不同何以望鵝湖之同先兄遂與某議論致辨又令某自説至晚罷先兄云子靜之説是次早某請先兄説先兄云某無説夜來思之子靜之説極是方得一詩云提孩知愛長知欽古聖相傳只此心大抵有基方築室未聞無址忽成岑留情傳注翻蓁塞著意精微轉陸沉珍重友朋相切琢須知至樂在于今某云詩甚佳但第二句微有未安先兄云説得恁地又道未安更要如何某云不妨一面起行某沿途却和此詩及至鵝湖伯恭首問先兄别後新功先兄舉詩才四句元晦顧伯恭曰子夀早已上子靜船了也舉詩罷遂致辨于先兄某云途中某和得家兄此詩云墟墓興哀宗廟欽斯人千古不磨心涓流滴到滄𬈑水拳石崇成泰華岑易簡工夫終久大支離事業竟浮沉舉詩至此元晦失色至欲知自下升髙處真偽先須辨只今元晦大不懌于是各休息翌日二公商量數十折議論來莫不悉破其説繼日凡致辨其説隨屈伯恭甚有虗心相聽之意竟為元晦所尼後往南康元晦延入白鹿講説因講君子喻于義一章元晦再三云某在此不曾説到這裡負愧何言先兄復齋臨終云比來見得子靜之學甚明恨不得相與切磋見此道之大明耳吾家合族而食每輪差子弟掌庫三年某適當其職所學大進這方是執事敬徐仲誠請教使思孟子萬物皆備于我矣反身而誠樂莫大焉一章仲誠處槐堂一月一日問之云仲誠思得孟子如何仲誠答曰如鏡中觀花答云見得仲誠也是如此顧左右曰仲誠真善自述者因説與云此事不在他求只在仲誠身上既又微笑而言曰已是分明説了也少間仲誠因問中庸以何為要語答曰我與汝説內汝只管説外良久曰句句是要語梭山曰博學之審問之謹思之明辨之篤行之此是要語答曰未知學博學箇什麼審問箇什麼明辨箇什麼篤行箇什麼有學者終日聽話忽請問曰如何是窮理盡性以至于命答曰吾友是泛然問老夫却不是泛然答老夫凡今所與吾友説皆是理也窮理是窮這箇理盡性是盡這箇性至命是至這箇命稱嘆趙子新美質謂人莫不有夸示已能之心子新為人稱揚反生羞愧人莫不有好進之心子新恬淡雖推之不前人皆惡人言已之短子新惟恐人不以其失為告群居終日默然端坐隂有以律夫氣習之澆薄者多矣可謂人中之一瑞但不能進學可憂耳或云年亦未壯答云莫道未也二十嵗來一日子新至語之曰莫堆堆地須發揚車前不能令人軒車後不能令人輊何不發揚廣中一學者陳去華省發偉特某因問吾與點也一假尋常如何理會屢問之去華終以為理會不得一日又問之去華又謂理會未得某云且以去華所見言之莫也未至全然曉不得去華遂謂據某所見三子只是事上著到曽點却在這裏著到某詰之曰向道理會不得今又却理會得去華頓有省自敘聽話一月前十日聽得所言皆同後十日所言大異又後十日與前所言皆同因有十詩别後謂人曰某方是一學者在待歸後率南方之士師北方之學蓋廣中蒙欽夫之教故以此為北方耳臨川一學者𥘉見問曰每日如何觀書學者曰守規矩歡然問曰如何守規矩學者曰伊川易傳胡氏春秋上蔡論語范氏唐鑑忽呵之曰陋説良久復問曰何者為規又頃問曰何者為矩學者但唯唯次日復來方對學者誦乾知太始坤作成物乾以易知坤以簡能一章畢乃言曰乾文言云大哉乾元坤文言云至哉坤元聖人贊易却只是箇簡易字道了遍目學者曰又却不是道難知也又曰道在邇而求諸逺事在易而求諸難顧學者曰這方喚作規矩公昨日來道甚規矩一學者聽言後更七夜不寢或問曰如此莫是助長否答曰非也彼蓋乍有所聞一旦悼平昔之非正與血氣爭寨作主又顧謂學者天下之理但患不知其非既知其非便即不為君子以嚮晦入宴息也或問吾十有五而志于學三十而立既有所立矣緣何未到四十尚有惑在曰志于學矣不為富貴貧賤患難動心不為異端邪説搖奪是下工夫至三十然後能立既立矣然天下學術之異同人心趨向之差别其聲訛相似似是而非之處到這裡多少疑在是又下工夫十年然後能不惑矣又下工夫十年方渾然一片故曰五十而知天命説君子之道孰先傳一假子遊子夏皆非先生感嘆時俗汩沒未有能自拔者因歌學者劉定夫象山詩云三日觀山山愈妍錦囊收拾不勝編萬山擾擾何為者惟有雲臺山巋然又誦少時自作大人詩云從來膽大胸膈寬虎豹億萬虬龍千從頭收拾一口吞有時此輩未妥帖哮吼大嚼無毫全朝飲渤澥水暮宿崑崙巔連山以為琴長河為之絃萬古不傳音吾當為君宣又舉歐陽公贈梅聖俞詩云黃鵠刷金衣自言能逺飛擇侣異棲息終年修羽儀朝下玉池飲暮宿霜桐枝徘徊且垂翼會有秋風時有學子閲亂先生几案間文字先生曰有先生長者在却不肅容正坐收斂精神謂不敬之甚光武謂吳漢差強人意強訓起右門人嚴松松年所録象山先生全集語録上卷終
