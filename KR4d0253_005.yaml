body:
  text: 與吕伯恭往歲先判府窀穸願比于執事而卒不果既欲展慰又不果去冬因東陽郭伯清宅人嘗拜疏略申慰誠計必徹聼某前此雖得一再瞻見殊未得欵聼教誨竊惟執事聰明篤厚人人自以為不及樂教導人樂成人之美近世鮮見如某踈愚所聞于朋友間乃辱知為最深苟有所懷義不容默天下事理固有愚夫愚婦之所與知而大賢君子不能無蔽者元獻晏公尹南京日文正范公居母夫人憂元獻屈致教導諸生文正孳孳誨誘不倦從之遊者多有聞于時竊聞執事者儼然在憂服之中而户外之屨亦滿伯夷柳下惠孟子雖言其聖至所願學則孔子文正雖近世大賢至其居憂教授豈大賢君子之所蔽乎執事之所為標的者宜不在此執事天資之美學問之博此事之不安于心未契于理要不待煩説博引而後喻竊聞凡在交遊者皆不為執事安諒執事之心亦必不自安也夫苟不安何憚而不幡然改之乎于此而改其所以感發諸生亦不細矣舜聞善若決江河沛然莫之能禦君子之過及其更也人皆仰之伏願不憚改過以全紀孝之心不勝至願與吕子約學者之病隨其氣質千種萬熊何可勝窮至于各能自知有用力處其致則一唐虞三代盛時邪説詖行不作民生其間漸于聖人之化自無昏塞之氣乖薄之質其遷善逺罪之處不謀同方雖然自下升髙積小之大縱令不跌不止猶當次第而進便欲無過夫豈易有以夫子之天縱猶曰加我數年五十以學易可以無大過矣瞻之在前忽然在後顔子之粹而猶若是如有所立卓爾之地竭其才而未能進此豈可遽言乎然開端發足不可不謹養正涉邪則當早辨學之正而得所養如木日茂如泉日流誰得而禦之今之學者氣不至甚塞質不至甚薄鄉善之志號為篤切鞭勉巳至循省已熟乃日困于茫然之地而無所至止是豈非其志有所陷學有所蔽而然耶臨深履米此古人實處浴沂之詠曲肱陋巷之樂與此不相悖違豈今之學失其正無所至止謬生疑懼浪為艱難者所可同日道哉二書皆言近實似知其病考其要歸乃非實省但循此轍恐成坐玩歲月終無近實時耳愚見如此若謂不然後便幸有以見教與戴少望某銓曹報罷歸巳及秋侍親粗適無足道者向辱下問諄諄時竭愚心辱以為可語益用不敢不自盡于左右别既經時兄亦涉歷千里而歸婺女宿留龍窟卧病與凡航川輿陸者無往而非進學之地來示謂向意為學而新功殊未蒙有以見教者何耶起居食息酬酢接對辭氣容貌顔色之間當有日明日充之功如木之日茂如川之日增乃為善學古人之多多形容詠嘆者固皆吾分內然戕賊陷溺之未免則亦安得不課其進雖如顔子夫子猶曰未見其止易知易從者實有親有功可久可大豈若守株坐井然哉如中庸大學論語諸書不可不時讀之以聼其發揚告教戕賊陷溺之餘此心之存者時時發見若火之始然泉之始逹苟充養之功不繼而乍明乍滅乍流乍窒則淵淵其淵浩浩其天者何時而可復耶任重道逺繄兄是望敢布胸臆少見切磋之誠且以求教與舒西美某時下從諸兄講學不敢自棄頗有日益恨不得吐露以求教也今歲都下與朋友講切自謂尤更直截知前日今時學者悠悠不進號為知學耳實未必知學號為有志耳實未必有志若果知學有志何更悠悠不進事業固無窮盡然古先聖賢未嘗艱難其途徑支離其門户夫子曰吾道一以貫之孟子曰夫道一而已矣曰塗之人可以為禹曰人皆可以為堯舜曰人有四端而自謂不能者自賊者也人孰無心道不外索患在戕賊之耳放失之耳古人教人不過存心養心求放心此心之良人所固有人惟不知保養而反戕賊放失之耳苟知其如此而防間其戕賊放失之端日夕保養灌溉使之暢茂條逹如手足之捍頭面則豈有艱難支離之事今曰向學而又艱難支離遲回不進則是未知其心未知其戕賊放失未知所以保養灌溉此乃為學之門進德之地得其門不得其門有其地無其地兩言而決得其門有其地是謂知學是謂有志既知學既有志豈得悠悠豈得不進元英春間相聚始𥘉亦間關既而感發端的臨别時曾略針其自喜過當既過暨陽便悔所以針之者適所以病之今聞不甚進其原皆起于此别有書言之尊兄朴茂無他蹊徑苟能端的自反灼知陷溺戕賊之處特逹自奮誰得而禦之不然恐未免為不知學為無志而巳矣與髙應朝比得書知為學進進甚喜為學不當無日新易贊乾坤之簡易曰易知易從有親有功可久可大然則學無二事無二道根本苟立保養不替自然日新所謂可久可大者不出簡易而巳應朝既自知資質偏駁不廢磨礲亦復何憂亦復誰禦然當知染習未盡大體實不得為無傷也未及作子約書寫至此思子約書中有宜于靜未宜于動之説此甚不可動靜豈有二心既未宜于動則所謂宜于靜者亦未宜也先作應之書不及此成之到此講切曲折却具應之書中大抵學者各倚其資質聞見病狀雖復多端要為戕賊其本心則一而巳作書多不能詳要之詳亦未必有益苟有根本自能不懈怠不倦與同志切磋亦何患不進學如顔子猶曰未見其止惟益勉之與楊敬仲此心之良戕賊至于熟爛視聖賢幾與我異類端的自省誰實為之改過遷善固應無難為仁由巳聖人不我欺也直使存養至于無間亦分內事耳然懈怠縱弛人之通患舊習乘之捷于影響慢遊是好傲雪是作遊逸淫樂之戒大禹伯益猶進于舜盤盂几杖之銘成湯猶賴之夫子七十而從心吾曹學者省察之功其可巳乎承喻未嘗用力而舊習釋然此真善用力者也舜之孶孳文王之翼翼夫子言主忠信又言仁能守之又言用其力于仁孟子言必有事焉又言勿忘又言存心養性以事天豈無所用其力哉此中庸之戒謹恐懼而浴沂之志曲肱陋巷之樂不外是矣此其用力自應不勞若茫然而無主泛然而無歸則將有顛頓狼狽之患聖賢樂地尚安得而至乎二日新之功有可以見教者否易簡之善有親有功可久可大苟不懈怠廢放固當日新其德日遂和平之樂無復艱屯之意然怠之久為積習所乘覺其非而求復力量未宏則未免有艱屯之意誠知求復則屯不久而解矣此理勢之常非助長者比也頻復所以雖厲而無咎仁者所以先難而後獲也若于此别生疑惑則不耘助長之患必居一于此矣當和平之時小心翼翼繼而不絶日日新又日新則艱屯之意豈復論哉顧恐力量未能至此耳與項平甫孟子揠苗一段大槩治助長之病真能不忘亦不必引用耘苗凡此皆好論辭語之病然此等不講明終是為心之纍一處不穩當他時引起無限疑惑凡此皆是英爽能作文好議論者多有此病若是朴拙之人此病自少所以剛毅木訥近仁而曾子之魯乃能傳夫子之道凡人之病患不能知若真知之病自去矣亦不待費力驅除真知之却只説得勿忘兩字所以要講論者乃是辨明其未知處耳與舒元賔得書開讀殊覺未甚明快此事何必他求此心之良本非外鑠但無斧斤之伐牛羊之牧則當日以暢茂聖賢之形容詠歎者皆吾分內事日充日明誰得而禦之尊兄看到此不須低回思索特逹奮發無自沉于縈廽迂曲之處此事不借資于人人亦無著力處聖賢垂訓師友切磋但助鞭䇿耳與徐子宜某無能連黜銓寺今始以免試擬隆興靖安簿六年闕去家四百里久離侍下欲急歸文字但託淳叟取比來所得朋舊多好氣質講切端的亦自覺稍進兄為學必日新恨不證于兄也端卿蕃叟成之淳叟諸公自相講切皆自謂有益某觀之甚不謂然諸公雖各不同然學失其正一也嘗論其説均為邪説其行均為詖行淳叟最先知過成之相信甚篤然蒙滯竟未開明端卿力戰大屈而後有省蕃叟相見始恐懼而又不能翻然見李叔潤與之言惡俗交戕之處泫然流涕感激良深自此亦可以為學第恨相處不久耳此心之良人所均有自耳目之官不思而蔽于物流浪展轉戕賊陷溺之端不可勝窮最大害事名為講學其實乃物欲之大者所謂邪説誣民充塞仁義質之懿者乃使之困心疲力而小人乃以濟惡行私兄質性篤厚行已有耻不至有是然近來講學大率病此不敢不相告劉伯正嘗相聚否聞其莊整乃是有進不及作書煩為致意天民重困猶昔皆聞見駁雜之弊近嘗苦口與言稍能自反應之亦復荒唐今此相聚相欵志嚮却篤知非甚明有可喜者亦可為天民慶也端木君舉象先益之諸兄時相聚否蔡行之何以不來參部彭子復戴少望皆安在為况如何前年得少望書復書頗切磋之不知其書曾達否兄講下多秀異否劉司業在江西民甚賴之以與同官不協得綿州去矣便中特此奉記室餘祝為吾道自重二婺女之行道經上饒往往聞説其守令無狀與臨川大不相逺既而聞景明劾罷上饒南康康守方喜今時監司乃能有此差強人意劉文潛作漕江西光前絶後至其帥湖廣乃逺不如在江西時人才之難如此某人始至人甚望之舊聞先兄稱其議論意其必不碌碌乃大不然明不足以得事之實而姦黠得以肆其巧公不足以遂其所知而權勢得以為之制自用之果反害正理正士見疑忠言不入護吏而疾民陽若不任吏而實隂為所賣姦猾之謀無不得逞賄賂所在無不如志聞有一二行遣形若治吏而偽文詭辭諂順乞憐者皆可回其意下人轉移其事如轉户樞胥輩窺之審玩之熟為日久矣所欲為者如取如携不見有毫髮畏憚之意惟其正論誠意則扞格而不入乃以此自謂其明且公也良民善士疾首蹙額飲恨吞聲而無所控訴公人世界其來久矣而尤熾于今日公人之所從得志本在官人不才然向者邪説不甚盛風俗不甚壞公人未盡得顯然肆意官人未盡與公人一律官人之才者固有實益亦難得盛譽官人之不才者亦尚藉常理常心默有維持未至泯然大亂十數年來公人之化大行官人皆受其陶冶沉涵浸漬靡然一律而書生腐儒又以經術為之羽翼為之干城沮正救之勢塞懲治之路潛禦其侮隂助其瀾故官人之才者雖易以自見易得盛譽而無輔風俗無救大勢至其不才必至大亂中人無以自立皆從風而靡隨波而流守正而材術不足以自見者其心僅不泯滅而不復可伸外之驅迫流徇者亦不少矣此今時之大勢今之為善者猶持杯水救車薪之火也然持杯水者常少而抱薪者常多某竊有區區之説以為可以絶薪而致水要在于不厭詳復不忽卑近相與就實以講求至理研核其實母遽以大意粗説蓋之則至理可明詖説可破至理明詖説破則自其身逹之家國天下無不可為者君心國論亦有致力處豈直州縣官吏間哉天生民而立之君使司牧之張官置吏所以為民也民為大社稷次之君為輕民為邦本得乎丘民為天子此大義正理也今縣家親民撫字之職也縣家而害民州家得以治之州家而害民使家得以治之今州家使家壅之以胥吏塞之以僚屬所賴以通閭巷田畝之情者有𬒳害者赴訴也今乃以告訐把持之名而抑絶之近來胥吏之妙用専在抑絶赴訴者之路懲一二以威衆使之吞聲斂祍重足脅息而吾得以肆行而無忌監司太守有服其役任其怨而不得享其利者有相為相役而共享其利者與趙子直比來道路田畝皆鼓舞盛德汙吏黠胥頗亦斂戢鄉來懷疑者皆巳冰釋矣然所在積弊非一日可去要當耐久緝理想大賢之心亦未易滿也大抵益國𥙿民之心在吾人固非所乏弊之難去者多在簿書名數之間此姦貪寢食出沒之處而吾人之所踈者比嘗考究此等頗得其方蓋事節甚多難以泛考要須于一事精熟得其要領則其他却有緣通類舉之理所謂一堵墻百堵調撫之秋輸鄉者病于加合之無藝又受領官吏髙下其手輕重不均有臨川陳知縣鼎者議革其弊以為盡去之則州用軍糧名會等米皆取于此有不可闕于是約其類每斗加五十合而令兩斛輸三斛官得以足民亦不病而又無輕重不均之弊民大便之陳知縣既去後來又于三斛之上又加斛面曾有徐提舉者甚愛民一日不測入倉百姓皆訴斛面太重徐提舉方責罵受領官吏官吏輒以州用軍糧名會米為解提舉不能加詰不知先已兩斛納三斛已是算足州用軍糧名會等米矣所謂斛面者又在此外尅斂大抵不知節目名數之詳鮮有不為其所欺者斛面之弊去年趙使君稍稍正之民已大悅今歲撫雖小稔而連雨阻穫損折者巳十三四今未穫者尚多巳穫者亦未得舂造苗限自當有展而州縣殊無寬假之意稅租折變著令以納月上旬時估中價凖折而折榖折糯侵民之直至于再倍其在今歲尤為可念列具詳細數納呈幸少留意觀之亦庶幾一堵墻百堵調者世儒耻及簿書獨不思伯禹作貢成賦周公制國用孔子會計當洪範八政首食貨孟子言王政亦先制民産正經界果皆可耻乎官吏日以貪猥弊事日以衆多豈可不責之儒者張官置吏所以為民而今官吏日增術以朘削之如恐不及蹶邦本病國脈無復為君愛民之意良可歎也百姓足君孰與不足損下益上謂之損損上益下謂之益理之不易者也而至指以老生常談良可歎也大著盡公守正今世鮮麗而諸公皆議其不密議者之心固有大病而在大著不為無疵語有失言之戒易有謹密之辭不可不察也别紙所録利便不可使胥吏見之與辛幼安輒有區區欲效芹獻伏惟少留聰明賜之是正竊見近時有議論之蔽本出于小人之黨欲為容姦瘦慝之地而飾其辭説託以美名附以古訓要以利害雖資質之美心術之正者苟思之不深講之不詳亦往往為其所惑此在髙明必已洞照本末而某私憂過計未能去懷敢悉布之且以求教古人未嘗不言寬寬也者君子之德也古之賢聖未有無是心無是德者也然好善而惡不善好仁而惡不仁乃人心之用也遏惡揚善舉直錯枉乃寬德之行也君子固欲人之善而天下不能無不善者以害吾之善固欲人之仁而天下不能無不仁者以害吾之仁有不仁不善為吾之害而不有以禁之治之去之則善者不可以伸仁者不可以遂是其去不仁乃所以為仁去不善乃所以為善也故曰為國家者見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣夫五刑五用古人豈樂施此于人哉天討有罪不得不然耳是故大舜有四裔之罰孔子有兩觀之誅善觀大舜孔子寬仁之實者于四裔兩觀之間而見之矣近時之言寬仁者則異于是蓋不究夫寬仁之實而徒欲為容姦瘦慝之地殆所謂以不禁姦邪為寬大縱釋有罪為不苛者也罪疑為輕罪而有疑固宜惟輕與其殺不辜寧失不經謂罪疑者也使其不經甚明而無疑則天討所不容釋豈可失也宥過無大刑故無小使在趨走使令之間簿書期會之際偶有過誤宥之可也若其貪黷姦宄出于其心而至于傷民蠧國則何以宥為于其所不可失而失之于其所不可宥而宥之則為傷善為長惡為悖理為不順天殆非先王之政也自古張官置吏所以為民為之囹圄為之械繫為之鞭箠使長吏操之以禁民為非去其不善不仁者而成其善政仁化懲其邪惡除亂禁暴使上之德意布宣于下而無所壅底今天子愛養之方丁寧于詔旨勤恤之意焦勞于宵旰賢牧伯班宣惟勤勞來不怠列郡成風咸尚慈恕而縣邑之間貪叨矯虔之吏方且用吾君禁非懲惡之具以逞私濟欲置民于囹圄械繫鞭箠之間殘其支體竭其膏血頭會箕斂槌骨瀝髓與姦胥猾徒厭飫咆哮其上巧為文書轉移出沒以欺上府操其竒贏與上府之左右締交合黨以蔽上府之耳目田畝之民劫于刑威小吏下片紙因纍纍如驅羊劫于庭廡械繫之威心悸股栗箠楚之慘號呼籲天墮家破産質妻鬻子僅以自免而曾不得執一字之符以赴訴于上上之人或浸淫聞其髣佛欲加究治則又有庸鄙淺陋明不燭理志不守正之人為之緩頰敷陳仁愛寬厚有體之説以杜吾窮治之意遊揚其文具偽貌誕謾之事以掩其罪惡之迹遂使明天子勤恤之意牧伯班宣之誠壅底而不逹百里之宰真承宣撫字之地乃復轉而為豺狼蝎蚊之區日以益甚不可驅除豈不痛哉若是者其果可宥乎果可失乎至于是而又泛言寬仁之説以逆蔽吾窮治之途則其滋害遺毒縱惡傷和豈不甚哉其與古人寬仁之道豈不戾哉今之貪吏每以應辦財賦為辭此尤不可不辨今日邦計誠不充𥙿賦取于民者誠不能不益于舊制居計省者誠能推支費浮衍之由察收斂滲漏之處深求節約檢尼之方時行施舍已責之政以寬民力以厚國本則于今日誠為大善若未能為此則亦誠深計逺慮者之所惜然今日之苦于貪吏者則不在此使吏果不貪則因今之法循今之例以賦取于民民猶未甚病也今貪吏之所取供公上者無幾而入私囊者或相十百或相千萬矣今縣邑所謂應辦月解歲解者固多在常賦之外然考其所從出則逐處各有利源利源所在雖非著令之所許而因循為例民亦視以為常而未甚病也利源有優狹優者應辦為易狹者應辦差難然通而論之優者多狹者少若循良之吏則雖在利源狹處亦寧書下考不肯病民今之貪吏雖在利源優處亦啓無厭之心搜羅既悉而旁緣無藝張竒名以巧取持空言以橫索無所不至方且託應辦之名為缺乏之説以欺其上顧不知事實不可掩明者不可欺通數十年之間取其廉而能者與其貪之尤者而較之其為應辦則同而其賦取誅求于民者或相千萬而不啻此貪吏之所借以為説而欺上之人者最不可不察也貪吏害民害之大者而近時持寬仁之説者乃欲使監司郡守不敢按吏此愚之所謂議論之蔽而憂之未能去懷者也不識執事以為如何今江西繄安撫修撰是賴願無搖于鄙陋之説以究寬仁之實使聖天子愛養之方勤恤之意無逺不暨無幽不逹而執事之舊節素守無所屈撓不勝幸甚卷之五終
