body:
  text: 䇿問問語有之曰人之相去如九牛毛或者疑其言之過晉人有解之者曰巢許遜天下而市道小人爭半錢之利此其相去何啻九牛毛哉其言誠辨矣然嘗病其意之未廣先儒論人之量曰有天地之量有江海之量有鐘鼎之量有斗筲之量其意廣矣而嘗嘆乎言之難備生乎天地之間具人之形體均之為人也品類差等何其若是之相遼絶哉今夫天下之俗固不可以言古然蒙𬒳先王之澤士之求堯舜孔子之道者日衆而儒宫學館之間有父兄之所教有師友之所講磨而考其所向則有常人之所耻者此其與求堯舜孔子之道而期于必至何啻九牛毛哉二三子各悉究其日履之所鄉嘗試相與共評斯語母徒為場屋課試之文試言人之所以相去若是遼絶者何故已之氣質巳之趨鄉當在何地今日之用心今日之致力者其實何如將有所考焉問齊欲稱東帝鄒魯之臣妾肯死而不肯從之秦欲稱西帝魯仲連肯死而不肯從之夫以齊秦之強力足以帝天下而卒沮于匹夫之一辭固國不以山溪之險威天下不以兵革之利孟子之言于是信矣西漢不崇禮義好言時宜叔孫通陸賈之徒號稱以儒見用綜其實殆未有以殊于竒謀祕計之士也高祖寬大長者之稱見于起兵之日惟恐沛公不為秦王則長安之民所以愛戴之者亦可謂深且素矣繼以文景之仁愛武宣之政令所以維持之者亦後世所鮮儷元成哀平雖浸以微弱亦非有暴鷙淫虐之行然區區新莾舉漢鼎而移之若振稿葉天下懾然莫之敢爭東都之興光武之度不洪于高祖明帝之察慧有愧于文景多矣章帝之仁柔殆伯仲于元成之間自是而降無足譏矣然綿祀埒于西漢以曹操之強其所自致者不後于高光然終其身不敢去臣位視天下有孔北海如孺子之有嚴師傅凛然于几席之上而不敢肆也推其所自則尊禮卓茂以為太傅投戈講藝息馬論道講論經理夜分乃寐殆未可以文具而厚非之也于身于家于國于天下𥘉不可以二理觀二三子盍自其身而觀之以及于家于國于天下而備論夫固國不以山溪之險威天下不以兵革之利之道有道之世士傳言庶人謗于道商旅議于市皆朝廷之所樂聞而非所禁也有能究唐虞三代之政論兩漢之得失以及乎當世之務者其悉書之毋隱問異端之説自周以前不見于傳記後世所同信其為夫子之言而無疑者惟春秋十翼論語孝經與戴記中庸大學等篇論語有攻乎異端斯害也已之説然不知所謂異端者果何所指至孟子乃始闢楊墨闢許行闢告子後人指楊墨等為異端孟子之書亦不目以異端不知夫子所謂異端者果何等耶論語有曰鄉原德之賊也孟子亦屢言鄉原之害若鄉原者豈夫子所謂異端耶果謂此等則非止鄉原而巳也其他亦有可得而推知者乎孟子之後以儒稱于當世者荀卿楊雄王通韓愈四子最著荀子有非十二子篇子思孟軻與焉荀子去孟子未遠觀其言甚尊孔子嚴王霸之辨隆師隆禮則其學必有所傳亦必自孔氏者也而乃甚非子思孟軻何耶至言子夏子遊子張又皆斥以賤儒則其所師者果何人而所傳者果何道耶其所以排子思孟軻子夏子遊子張者果皆出其私意私説而舉無足稽耶抑亦有當考而論之者耶老莊蓋後世所謂異端者傳記所載老子篕出于夫子之前然不聞夫子有闢之之説孟子亦不闢老子獨楊朱之學考其源流則出于老氏然亦不知孟子之辭略不及于老氏何耶至楊子始言老子槌提仁義絶滅禮樂吾無取焉耳然又有取于其言道德韓愈作原道始力排老子之言道德佛入中國在楊子之後其事與其書入中國始于漢其道之行乎中國始于梁至唐而盛韓愈闢之甚力而不能勝王通則又渾三家之學而無所譏貶浮屠老氏之教遂與儒學鼎列于天下天下奔走而鄉之者蓋在彼而不在此也愚民以禍福歸鄉之者則佛老等以其道而收羅天下之英傑者則又不在于老而在于佛故近世大儒有曰昔之入人也因其迷暗今之入人也因其高明謂佛氏之學也百家滿天下入者主之出者奴之入者附之出者汚之此莊子所以有彼是相非之説也要之天下之理唯一是而巳彼其所以交攻相非而莫之統一者無乃未至于一是之地而然耶抑亦是非固自有定而惑者不可必其解蔽者不可必其開而道之行不行亦有時與命而然耶道固非𥘉學之所敢輕議而標的所在志願所向則亦不可不早辨而素定之也故願與諸君熟論而深訂之問夫子生于周末自謂文王既沒文不在兹乎當時從之遊者三千門人高弟如宰我子貢有若之徒所以推尊之者至謂賢于堯舜謂自生民以來未之有謂百世之後等百世之王莫之能違也千載之後未有以其言為過者古聖人固多至推以為斯道主則惟夫子苟有志于斯道者孰不願學夫子刪詩定書繫周易作春秋傳曽子則有孝經子思所傳則有中庸門人所記則有論語簡編雖出煨燼而西都搜求參校之詳猶足傳信凡此固夫子所以詔教後世而後世所以學夫子者亦未有捨此而能得其門者也論語載當時問答與疇昔訓詞既不得親炙于當時則視其所載亦可以如親聞于當時也然學必有業不知當時在夫子之門者業果安在由治千乘之賦求宰百乘之家赤可使與賔客言二三子蓋自謂其能而夫子亦以是許之不識其在夫子之門獨以是為業乎抑亦所學于夫子者又不在是也他日獨立伯魚過庭乃使學詩既學矣他日乃使之學禮不識伯魚之未學詩也亦有所學乎無也既學禮矣亦有所學乎無也小子何莫學夫詩又曰興于詩夫子蓋屢教人以學詩不識凡居夫子之門者舉皆以學詩為業乎陳亢固在弟子列乃問伯魚而後聞詩聞禮無乃先是未知其説乎子以四教文行忠信此固門弟子紀述之辭然亦必有所據而言所謂文行忠信者果何如而以為教也三千之中獨薦顔淵為好學而稱之則曰終日不違如愚曰三月不違仁曰不改其樂曰不遷怒不二過不識亦有可得而知者乎讀論語者固當求所以為學之方日肄之業故願與諸君論其所疑夫子之所以教人與當時門弟子之所以學于夫子者苟不在是而今日學者之所患亦不在是則亦願與諸君備論而索言之毋略問聖人備物制用立成器以為天下利是故網罟耒耜杵臼作而民不艱于食上棟下宇以待風雨而民不病于居服牛乘馬刳舟剡楫而民得以濟險弦弧剡矢重門擊柝而民得以禦暴凡聖人之所為無非以利天下也二典載堯舜之事而命羲和授民時禹平水土稷降播種為當時首政急務梁惠王問何以利吾國未有它過而孟子何遽闢之峻辨之力夫子亦曰君子喻于義小人喻于利樊遲欲學圃亦斥以為小人何也孟子曰我能為君約與國戰必克今之所謂良臣古之所謂民賊也闢土地充府庫約與國戰必克此其為國之利固亦不細而孟子顧以為民賊何也豈儒者之道將坐視土地之荒蕪府庫之空竭鄰國之侵陵而不為之計而徒以仁義自解如徐偃王宋襄公者為然耶不然則孟子之説亦不可以鹵莾觀而世俗之蔽亦不可以不深究而明辨之也世以儒者為無用仁義為空言不深究其實則無用之譏空言之誚殆未可以苟逃也願與諸君論之問古不以科舉取士天下之從事者不專于文至漢始射䇿決科然仕進者不一途習其業者未始專且重也綿延以至于唐進士為重選習其文者殆遍天下至于今不變文宜益工于古然六經之文先秦古書自漢而視之巳不可及由漢以􅑙視漢之文又不可及矣唐三百年文章宗伯惟韓退之其次栁子厚而二人皆服􅈾西漢之文章恨悼當世鮮有能共興者何耶夫文一也豈科舉之文與古之文固殊而不可同耶何其習之者益專且衆而益不如也言而不文行之不遠子以四教文與居一焉文固聖人所不廢也然夫子四科善言德行者不在言語之科而言語又不與文學自小子應對至于會同之相四方之使言語之用亦重矣而反不與文學則所謂文學者果何所習而何所用耶科舉取士未遽可變而諸公于科舉之習亦未能遽免方將朝夕從事于文其所以為文者可不深知乎願與諸君論之問盡信書不如無書理固然也然自書出煨燼千有餘年其更賢知多矣則所同尊而信之者固不可概以書不可盡信而不之信也然亦不可以人之所同信而苟信之而弗之思也觀古人之書泛然而不得其實則如弗觀而巳矣孔子惡鄉原語孟載之詳矣夫居之似忠信行之似亷潔自以為是人皆恱之此鄉原之行也夫苟自以為是而人皆恱之則必以為真忠信真亷潔者矣獨自孟子言之則以為似耳至于心獨無所同然乎此孟子之言也今鄉原者人皆恱之而夫子惡之人皆以為忠信亷潔而孟子獨以為似之此人之所同然者而夫子孟子乃不與之同何也居斯世也為斯世也善斯可矣夫居斯世為斯世而善果有不可者乎何以是嘐嘐也言不顧行行不顧言則曰古之人古之人行何為踽踽涼涼夫言不顧行行不顧言誠足病也而又不謂是何耶孟子闢楊墨蓋自比于禹之治洪水益之驅虎豹夫楊朱墨翟皆當時賢者自孟子視之則為先進孟子之後人猶曰孔曾墨子之賢墨子之賢蓋比于孔曽楊朱之道能使舍者避席煬者避竈猶以為未也進而至于爭席爭竈則其所得豈淺淺者哉而孟子闢之至曰無父無君是禽獸也又曰天下之言不歸楊而歸墨夫蒹愛之無父為我之無君由孟子之言而辨釋之雖五尺童子粗習書數者立談之頃亦可解了豈有以大賢如楊朱墨翟其操履言論足以傾天下之士而曾不知此必待孟子之深言力闢貽好辨之譏而猶未得以盡白于天下而熄其説何耶若曰此皆聖賢之事後學未敢妄措其説則孟子固曰能言距楊墨者聖人之徒必不敢少置其思措其議是不得為聖人之徒矣亦何以學為且書稱為學遜志記稱學不躐等而顔子則曰舜何人也豫何人也有為者亦若是成覸曰彼丈夫也我丈夫也吾何畏彼哉公明儀曰文王我師也周公豈欺我哉必如顔子成覸公明儀之言無乃與遜志不躐等之説悖乎苟以為必顔子成覸公明儀而後敢為此言則滕文公好馳馬試劒未嘗學問而孟子亦遽勉之以是何也願與諸君併論其説毋愛詞問欲學耕必問諸農欲學斫必問諸工天下之事非可以浪為之也業是事而不知本末則浪為之而巳唐虞商周之佐起于隱釣而登宰輔其道前定其業既修固矣陳平韓信佐高祖取天下其將相之業皆素定于困窮之時此豈偶然而成者耶又如諸葛孔明抱膝長嘯祖逖之聞雞起舞雖其功業不能大酬其志而人皆信其始志之不妄也後世豪傑之士各以其才自見于當時雖未可責以古人之學而觀其規模先定則與泛泛浪為者殊也今諸君求講古聖賢之書從事于古聖賢之學不識規模果有先定如古人者乎夫子之門如由治千乘之賦求宰百乘之家二人皆以此自許夫子亦以是許之不識諸君自知其才而人信之有如此者乎曽子鏗爾舍瑟而言志不知其所志果何事而其志果何如夫子喟然嘆而與之果何所取而然耶夫子稱顔子終日不違如愚退而省其私亦足以發回也不愚夫終日如愚可知者也而所謂終日不違者果何道而亦足以發者果何事也古人雖不可妄議然讀其書為其事可不知其説乎不然亦願聞諸君之志問知人古所難以堯之聖其知鯀蓋審及四嶽請試之猶不敢必漢高祖亡命崛起亦不知書其得天下殆有天命𥘉非盡出其智謀然其于知人亦異矣張良授書老父為它人言不省而帝能聼之陳平韓信楚不能用而帝用之至告吕后以後日將相之任掇擠其才能殆若權度雖善論人物者未必逮此世見其言之符契遂謂其得異書前知其事者非也顧不知高祖果何以能之耶文帝世稱賢君儒者之論往往以為優于七制賈生慷慨言事帝抑不用世以為非不知生獨以其壯鋭不更涉姑少抑之以老其才耳賈生姑不論當時之才豈獨止生耶然胸奴大侵邉數四帝不能堪至御鞍講武拊髀求將遠想亷頗李牧乃為馮唐所慚則平日所以收羅人才者可知矣武帝號雄才大略然終其身無一名宰相快心胡越取前世紅腐之粟貫朽之錢而空之至于海內虛耗户口減半輪臺之詔終亦自悔悼而巳未聞有一人能開悟之者豈當世獨無其人耶是又不可以厚誣也知人固所難而為天下以人為本使終于不能知則天下亦終不可為矣堯以不得舜為已憂舜以不得禹臯陶為已憂臯陶曰在知人又曰知人則哲能官人豈可以終不知之耶知人則必有道矣願併與漢三君論之問逢蒙殺羿孟子曰是亦羿有罪焉庾公之斯追子濯孺子子濯孺子知其獲免曰尹公之他端人也其取友必端矣論學取友必入學七年而後可責然自其一年辨志則所辨者即其事也取友之事亦有不得不論者矣自非聖人安能每事盡善人誰無過如以其行之有過事之不善而遂絶之則是天下皆無可教之人矣逢蒙思天下惟羿為愈巳然後萌殺羿之心將何以使羿能逆知之而不教之耶必以為不可知則子濯孺子未嘗識庾公之斯而能知其端人何也所謂端人果何如其端而知之者果何如其知之也二三子其詳言其本末而備論之亦群居之大益也問書稱堯舜禹臯陶皆曰若稽古記稱仲尼祖述堯舜憲章文武傅説告高宗曰事不師古以克永世匪説攸聞所貴乎聖人者以其寬洪慱大無自用自私之心其所施設必有稽考祖𫐠理固然也然所謂稽考祖𫐠者果獨取其無自用自私之心而然耶亦其事之施設必于古有所考而後能有所濟也如曰事必于古有所考而後能有濟則如網罟耒耜杵臼弧矢舟楫棟宇棺椁書契皆上世所無有而後世聖人創之而皆能有濟何耶若曰是事之小者因時而創制至其大者則必有所師法而後可則如堯傳天下不與子不與在朝之大臣舉舜于匹夫而授之果何所師法耶堯傳舜舜傳禹禹獨與子而傳以世此又何耶湯以諸侯有天下孔子匹夫而作春秋此事之莫大焉者而皆若此無乃與稽古之説戾乎且均之為事亦安有大小之間哉今之天下所謂古者有堯舜有三代自秦而降歷代固多而其昭昭者曰漢曰唐其君之賢者甚衆事之施設蓋有不勝其異今朝廷有祖宗故事祖宗故事尚且不一今欲建一事而必師古則將安所適從如必擇其事之與吾意合者而師之無乃有師古之名而居自用之實乎若曰吾擇其當于理者而師之則亦惟理之是從而巳師古之説無乃亦持其虛説而巳乎二三子其詳考而備論之問中庸稱隱惡而尚書載其受終巡狩之後獨汲汲于明刑自四罪而放之流之竄之殛之無乃與隱惡之意異耶孔子自言為政以德又曰道之以德齊之以禮又曰政者正也季康子問殺無道以就有道何如對曰子為政焉用殺子欲善而民善矣宜不尚刑也而其為魯司冦七日必誅少正卯于兩觀之下而後足以風動乎人此又何也夫子曰德之流行速于置郵而傳命湯德足以及禽獸而不行于葛伯必舉兵征之又東征西征不巳必十一征而天下服周世世修德莫若文王而不行于崇必再駕而後降至伐阮共伐密須伐玁狁伐昆夷蓋未始不以兵何耶七國用兵爭強攻城取地如恐不及而孟子乃遊于其間言深耕易耨修其孝弟忠信之事曰仁義而已曰仁者無敵曰強為善而已矣曰可使制挺以撻秦楚之堅甲利兵曰齊王猶反手耳曰天下莫不與也其説儻可信乎願究其説而悉言之毋略問高宗得傅説以夢文王得吕望以卜置相重事而夢卜是信可乎洪範稽疑自乃心卿士庶人而後及卜筮大舜命禹必曰朕志先定詢謀僉同鬼神其依龜筮協從夢卜似非聖賢所宜專信者高宗之知傅説文王之知吕望其必有不止于夢卜者矣儻可得而考乎鮑叔言管仲齊威公用之徐庶言諸葛孔明蜀先主用之威公先主豈惟人言是信耶管仲與威公讐也而至于一則仲父二則仲父先主既見孔明雖關張之愛將不能間至曰孤之有孔明猶魚之有水也觀此則二君二臣之所以相知者果不苟矣其相知之處果安在耶諸君其併言之將以觀其所藴問古者八歲入小學十五歲入大學小學教之射御書數大學之道則歸乎明明德于天下者今教童稚不過使之習字畫讀書稍長則教之屬文讀書則自孝經論語以及六經子史屬文則自詩對至于所謂經義詞賦論䇿者不識能有古者小學大學之遺意乎若曰今之教人者不必如古惟使之能為文應有司程度可以取科第而巳則竊有疑焉幼所誦書長必知其意義及其作文則所謂題目者又皆出于古書則必能言其義而後文可成也如孝經首章所謂立身行道論語首章言學而時習之孟子首章言何必曰利亦有仁義而已不知果何如而立身何如而行道所學所習果何道何業利與仁義何如而辨若此等類今之為文者果有不必知之者乎若曰今之教人者與古大異言之于口筆之于𥿄施之于場屋者不必有其實巧與勤者斯可矣然亦不廢仁義忠信之道兩者並行不相悖不識有是理乎夫仁義忠信之道古人汲汲學之猶懼有闕今悉力從事者𥘉不在是而曰自能不廢則是今人才質過古人遠矣不然則是父語其子兄語其弟友朋之群居相與從事者皆為欺為偽相驅入于罟獲陷穽也而可安乎諸君幸詳考備究而精言之當得其實而後可問夫子講道洙泗論語所載問仁者不一又曰子罕言仁如陳文子令尹子文之所為皆世所難得而不許以仁如子貢子路冉有之徒皆不許以仁豈仁之為道大而非常人所能遽及耶審如是則所謂罕言者是聖人之教人常祕其大者而姑以其小者語之也且以子路子貢冉有皆聖門之高弟其所自立者皆足以師表百世令尹子文陳文子皆列國之賢大夫非獨當時所難得人品如此蓋亦古今天下之所難得也然而猶皆不足以與于仁則今日之學者宜皆絶意于仁不當復有所擬議矣今世讀書者未有不先論語自童子而已誦習之矣不識學者每讀至言仁處果可置而不思乎亦可試思而不必其遂知之也今世又以科舉取士苟其題之言仁者又將纍纍而言之其為誣欺無乃已甚乎諸生方將從事于聖人之學近世言仁者亦衆而持罕言之説以排言仁者亦衆故願與諸生論之問天之生物自足以供一世之用天之生才亦猶是也古之興王未嘗借才于異代而後世常患人才之不足或者歸咎于科舉以為教之以課試之文章非獨不足以成天下之材反從而困苦毁壞之科舉固非古然觀其課試之文章則聖人之經前代之史道德仁義之宗治亂興亡得喪之故皆粹然于其中則其與古之所謂學古入官學而優則仕者何異困苦毁壞之説其信然乎不也人才之不如古其故安在抑果未嘗無才而獨上之所以取而用之者未至耶願有以究其説象山先生全集卷之二十四
