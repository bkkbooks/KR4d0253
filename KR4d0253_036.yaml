front:
  text: 象山先生全集卷之三十六
  hash: sha256:3158d6d753a5a750cd75d8801c923a6f9d08e37b5f3f718f35d8a022ee5653a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_036-1a}
body:
  text: 年譜先生諱九淵字子靜姓陸氏陸出嬀姓周武王封媯滿扵陳春秋時陳公子敬仲適齊别其氏曰田後田氏有齊至宣王時封其少子通于平原陸鄉又别其氏為陸通曽孫烈為吳令子孫避為吳郡吳縣人烈三十九世至希聲論著甚多晚嵗相唐昭宗卒謚文公生六子次子崇生徳遷五代末避地扵撫州金谿觧囊中資装置田治生貲髙閭里為金谿陸氏之祖居延福鄕之青田第四子諱有程先生髙祖也愽學扵書無所不觀曽祖諱演能世其業寛厚有容祖戬爲第四子趣尚清髙不治生産考諱賀字道鄉生有異禀端重不伐究心典籍見扵躬行酌先儒冠昏喪祭之禮行于家弗用異教家道整者著聞于州里贈宣教郎生六子長九思字子疆與鄉舉封從政郎弟梭山撰行状有家問朱子爲政畧云家問所以詞飾其子孫者不以不得科第爲病而深以不識禮義爲憂其慇懃懇切反覆暁譬說盡事理無一毫勉強縁飾之意而慈祥篤實之氣藹然諷味數四不能釋手云次九叙字子儀公正通敏時賢稱曰䖏士善治生總藥肆以足其家先生撰墓表次九臯字子昭少力學文行俱優與鄉舉晩得官終修職郎監潭州南嶽廟名齋曰庸學者號庸齋先生有文集先生撰墓表次九韶字子美不事塲屋兄弟共講古學與朱元晦友善首言太極圖說非正又因其奏立社倉之制行于鄉民甚徳之與學者講學扵近地名梭山梭山在金谿陸氏義門之東是也號曰梭山居士諸司列薦以居士應詔舉遺逸臨終自撰終禮戒不得銘墓有文集曰梭山日記中有居家正本及制用各二篇次九齡字子夀生而頴悟能歩移則容止有法少有大志浩愽無涯涘嘗與郷舉𥙷入太學已負重名知名士無不師尊之登進士第授桂陽教授以不便迎侍陳乞不赴改興國教授未滿丁艱服除授全州教授未上而卒為時儒宗道徳繋天下重望特贈朝奉郎直秘閣賜謚文逹名齋曰復學者稱復齋先生有文集行于世嘉定間撫州守髙商老刋文集于郡治自為序先生状其行吕成公銘其墓朱文公書其碑次則先生與復齋先生齊名稱為江西二陸以比河南二程謹序次家世本末大畧于此而先生之道徳事功則表年以繋之于后云髙宗紹興九年巳未二月乙亥辰時先生始生紹興十年庚申先生二嵗紹興十一年辛酉先生三嵗㓜不戯弄冬十一月十五日母孺人饒氏卒􅌾郷之楊美嶺紹興十二年壬戌先生四嵗靜重如成人常侍宣教公行遇事物必致問一日忽問天地何所窮際公笑而不答遂深思至忘寢食緫角誦經夕不寐不脫衣履有弊而無壊指甲甚脩足跡未嘗至庖厨常自灑掃林下宴坐終日立于門過者駐望稱歎以其端荘雍容異常兒紹興十三年癸亥先生五嵗入學讀書紙隅無捲摺紹興十四年甲子先生六嵗侍親㑹嘉禮衣以華好却不受季兄復齋先生年十三舉禮經以告乃受紹興十五年乙丑先生七嵗得郷譽嘗云某七八嵗時常得郷譽只是荘敬自持心不愛戲紹興十六年丙寅先生八歲讀論語學而即疑有子三章及㸔孟子到曾子不肯師事有子至江漢以濯之秋陽以暴之等語因歎曾子見得聖人髙明潔白如此又丱角時聞人誦伊川語云伊川之言奚為與孔孟之言不類蓋生而清明有如此者梭山嘗云子靜弟髙明自㓜巳不同遇事逐物皆有省發嘗聞鼓聲振動䆫櫺亦豁然有覺其進學毎如此紹興十七年丁卯先生九歲善屬文包敏道祭文云九嵗屬文能自逹紹興十八年戊辰先生十嵗復齋入郡庠侍諸兄誦講衣冠未嘗解弛先生徃侍學焉文雅雍容衆咸驚異有老儒謂前廊吳茂榮曰君有愛女欲得佳壻無踰此郎因以為婣紹興十九年已已先生十一嵗讀書有覺從㓜讀書便着意未嘗放過外視雖若閑暇實勤攷索伯兄緫家務嘗夜分起見先生觀書或秉燭檢書最㑹一見便有疑一疑便有覺後嘗語學者曰小疑則小進大疑則大進嘗云向與復齋家兄讀書踈山寺止是一部論語更無他書或問曾見先生将聖人與門人語分門各自録作一䖏㸔先生曰此是㓜小時事紹興二十年庚午先生十二歲紹興二十一年辛未先生十三歲因宇宙字義篤志聖學與李侍郎及權郡書皆云十三志古人之學先生自三四歲時思天地何所窮際不得至扵不食宣教公呵之遂姑置而胸中之疑終在後十餘歲因讀古書至宇宙二字解者曰四方上下曰宇徃古來今曰宙忽大省曰元來無窮人與天地萬物皆在無窮之中者也乃接筆書曰宇宙内事乃已分内事已分内事乃宇宙内事又曰宇宙便是吾心吾心即是宇宙東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上至千百世之下有聖人出焉此心此理亦莫不同也故其啓悟學者多及宇宙二字如曰道塞宇宙非有所隱遁在天曰隂陽在地曰剛柔在人曰仁義仁義者人之本心也又曰是理充塞宇宙天地順此而動故日月不過而四時不忒聖人順此而動故刑罰清而民服又曰此理塞宇宙誰能逃之順之則吉逆之則㓙又曰宇宙不曾限隔人人自限隔宇宙是年復齋因讀論語命先生近前問云㸔有子一章如何先生曰此有子之言非夫子之言復齋曰孔門除却曾子便到有子未可輕議先生曰夫子之言簡易有子之言支離復齋嘗扵䆫下讀程易至艮其背四句反覆誦讀不巳先生偶過其前復齋問曰汝㸔程正叔此叚如何先生曰終是不直截明白艮其背不獲其身無我行其庭不見其人無物復齋大喜紹興二十二年壬申先生十四嵗與徐任伯書曰某氣質素弱年十四五手足未嘗温暖後以稍知所向體力亦隨壮也嘗云吾扵踐履未能純一然才自警䇿便與天地相似紹興二十三年癸酉先生十五嵗𥘉夏侍長上郊行分韻得偕字詩云講習豈無樂鑚磨未有涯書非貴口誦學必到心齋酒可陶吾性詩堪述所懐誰言曾點志吾得與之偕紹興二十四年甲戌先生十六歲讀三國六朝史見夷狄亂華又聞長上道靖康間事乃剪去指爪學弓馬然胷中與人異未嘗失了嘗云做得工夫實則所說即實事所指人病即實病又云吾人讀春秋知中國夷狄之辨二聖之讐豈可不復所欲有甚扵生所惡有甚扵死今吾人髙居優㳺亦可為耻乃懐安非懷義也此皆是實理實說紹興二十五年乙亥先生十七嵗作大人詩見前卷二十五紹興二十六年丙子先生十八歲紹興二十七年丁丑先生十九歲紹興二十八年戊寅先生二十嵗紹興二十九年己卯先生二十一嵗紹興三十年庚辰先生二十二嵗紹興三十一年辛巳先生二十三嵗紹興三十二年壬午先生二十四嵗秋試以周禮郷舉𥘉先生未肯赴舉復齋素善臨川李侍郎浩毎為公言之是年春俾姪煥之侍先生同訪公公觀其贄見之書大竒之留數日力勉其赴舉歸則題秋試家状者在門閱其籍則諸家經賦咸在惟無周禮先生即以此注籍蒲節後始精考周禮求程文觀之及期三日之試寫其所學無凝滯考官王景文質批曰毫髪無遺恨波瀾獨老成拆號日先生偶過梭山方鼓琴捷吏至曲終而後問之再鼓一曲乃歸先生第四名外舅吳漸第九名見舉送官啓末云某少而慕古長欲窮源不與世俗背馳而非必将與聖賢同歸而止忘巳意之弗及引重任以自強謂先哲同是人而徃訓豈欺我窮則與山林之士約六經之㫖使孔孟之言復聞扵學者逹則與廟堂群公還五服之地使堯舜之化純𬒳扵斯民云云先生嘗云吾自應舉未嘗以得失為念塲屋之文只是直寫胸襟故作貴谿縣學記云不狥流俗而正學以言者豈皆有司之所棄天命之所遺又嘗云復齋家兄一日問曰吾弟今在何處做工夫某荅曰在人情事勢物理上做工夫復齋應之而巳若知物價之低昻與夫辨物之美惡眞偽則吾不可謂之不能然吾之所謂做工夫者非此之謂也又云吾家合族而食毎輪差子弟掌庫二年某適當其職所學大進這方是執事敬冬十月二十七日丁父宣教公憂􅌾饒州安仁縣崇徳郷之毛源孝宗隆興元年癸未先生二十五嵗隆興二年甲申先生二十六嵗乾道元年乙酉先生二十七嵗有與童伯虞書見前三卷首乾道二年丙戌先生二十八嵗乾道三年丁亥先生二十九歲冬成嘉禮孺人吳氏始大歸也乾道四年戊子先生三十歲乾道五年已丑先生三十一嵗乾道六年庚寅先生三十二嵗乾道七年辛卯先生三十三嵗秋試以易經再郷舉考官批義卷云如端人正士衣冠佩玉論䇿批如其義得觧見提舉書見前卷四八月十七日子持之生乾道八年壬辰先生三十四嵗春試南宫奏名時尤延之袤知舉吕伯恭祖謙為考官讀先生易卷至狎海上之鷗逰吕梁之水可以謂之無心不可以謂之道心以是而洗心退藏吾見其過焉而溺矣濟溱洧之車移河内之粟可以謂之仁術不可以謂之仁道以是而同乎民交乎物吾見其淺焉而膠矣擊節嘆賞又讀天地之性人為貴論至嗚呼循頂至踵皆父母之遺體俯仰乎天地之間惕然朝夕求寡乎愧怍而懼弗能倘可以庶㡬扵孟子之塞乎天地而與聞夫子人為貴之說乎愈加嘆賞至䇿文意俱髙伯恭遽以内難出院乃嘱尤公曰此卷超絶有學問者必是江西陸子靜之文此人斷不可失也又併嘱考官趙汝愚子直二公亦嘉其文遂中選他日伯恭㑹先生曰未嘗欵承足下之教一見髙文心開目明知其為江西陸子靜也徐誼子宜侍學子宜侍先生毎有省同赴南宫試論出天地之性人為貴試後先生曰某欲說底却𬒳子宜道盡但某所以自得受用底子宜却無曰雖欲自異扵天地不可得也此乃某平日得力處夏五月廷對賜同進士出身先生旣奏名聲振行都廷對考官意其必慷慨極言天下事欲取寘首列及唱第乃在末甲或問之先生曰見君之𥘉豈敢過直識者稱其得事君之體云在行都諸賢從㳺先生朝夕應酬問答學者踵至至不得寢者餘四十日所以自奉甚薄而精神益強聼其言者興起甚衆時永嘉蔡㓜學行之為省元連日無所問難似不能言者先生從容問其所志乃荅曰㓜學之志在扵為善而已先生嘉嘆而勉勵焉四明楊敬仲時主富陽簿攝事臨安府中始承教扵先生及反富陽三月二十一日先生過之問如何是本心先生曰惻隱仁之端也羞惡義之端也辭譲禮之端也是非智之端也此即是本心對曰簡兒時巳暁得畢竟如何是本心凡數問先生終不易其說敬仲亦未省偶有鬻扇者訟至于庭敬仲斷其曲直訖又問如𥘉先生曰聞適來斷扇訟是者知其為是非者知其為非此即敬仲本心敬仲忽大覺始北面納弟子禮故敬仲毎云簡發本心之問先生舉是日扇訟是非荅簡忽省此心之無始末忽省此心之無所不通先生嘗語人曰敬仲可謂一日千里復齋與學者書云子靜入浙則有楊簡敬仲石崇昭應之諸葛誠之胡拱逹才髙宗商應時孫應朝季和從之游其餘不能悉數皆亹亹篤學尊信吾道甚可喜也先生六月二十九日復如富陽七月𥘉九日舟離富陽秋七月十六日至家逺近風聞來親炙𥘉以存名讀書之齋與曽宅之書云某舊亦嘗以存名讀書之齋家之東扁曰槐堂槐堂前有古槐木至今猶存乃學徒講學之地又堂東有陋室西有髙軒北囱南囱東有隱室又曰留軒西有玉淵又近家之西有茅堂與包顯道書云貴溪桂店一族甚盛其子弟有徳輝者今夏來䖏茅屋西南有八石寺與顔子堅書云向者任八石寺嘗納區區之忠先生旣受徒即去今世所謂學䂓者而諸生善心自興容禮自荘雍雍于于后至者相觀而化蓋先生深知學者心術之㣲言中其情或至汗下有懐于中而不能自曉者為之條析其故悉如其心亦有相去千里素無雅故聞其大槩而盡得其為人嘗有言曰念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正有可以形迹觀者有不可以形迹觀者必以形迹觀人則不足以知人必以形迹繩人則不足以救人又曰今天下學者唯兩途一途朴實一途議論同里朱桴濟道弟泰卿亨道長於先生皆來問道與人書云近到陸宅先生所以誨人者深切著明大槩是令人求放心其有志扵學者數人相與講切無非此事不復以言語文字為意令人歎仰無已其有意作文者令収拾精神涵養徳性根本旣正不患不能作文陳正已劉伯文皆不爲文字也旴江傅子淵云夣泉向來只知有舉業觀書不過資意見耳後因困志知反時陳正已自槐堂歸問先生所以教人者正已曰首尾一月先生諄諄只言辨志又言古人入學一年早知離經辨志今人有終其身而不知自辨者是可哀也夣泉當時雖未領略終念念不置一日讀孟子公孫丑章忽然心與相應胷中豁然蘇醒嘆曰平生多少志念精力却一切着在功利上自是始辨其志雖然如此猶未知下手䖏及親見先生方得箇入頭䖏嘗云傅子淵自此歸其家陳正已問之曰陸先生教人何先對曰辨志復問曰何辨對曰義利之辨若子淵之對可謂切要周伯熊來學先生問學何經對曰讀禮記曾用工扵九容乎曰未也且用功扵此後徃問學于晦庵晦庵曰僊里近陸先生曾見之否曰亦嘗請教具述所言晦庵曰公來問某某亦不過如此說答諸葛受之書見前卷三答舒西美書見前卷五乾道九年癸巳先生三十五嵗春閏二月十四日荅陳正已書見前卷十二三月十七日和王弱翁銓闈中詩冬十一月送毛原善序見前卷二十淳熈元年甲午先生三十六嵗三月赴部調官過四明遊㑹稽浹兩旬復至都下授迪功郎隆興府靖安縣主簿五月二十六日訪吕伯恭于衢伯恭與汪聖錫書云陸君相聚五六日淳篤敬直流軰中少見其比又與陳同甫書云自三衢歸陸子靜相待累日又晋七八日昨日始行篤實淳直朋㳺間未易多得渠云雖未相識毎見尊兄文字開豁軒翥甚欲得相聚覺其意甚勤非論文者也與徐子宜書見前卷五秋八月十二日子循之生淳熈二年乙未先生三十七嵗吕伯恭約先生與季兄復齋㑹朱元晦諸公于信之鵝湖寺復齋云云見前卷三十四元晦歸後三年乃和前詩云徳業流風夙所欽别離三載更關心偶携藜杖出寒谷又枉藍輿度逺岑舊學商量加䆳宻新知培養轉深沉只愁說到無言䖏不信人間有古今後信州守楊汝礪建四先生祠堂于鵝湖寺勒陸子詩于石復齋與張欽夫書云某春末㑹元晦扵鉛山語三日然皆未能無疑按吕成公譜乙未四月訪朱文公于信之鵝湖寺陸子靜子夀劉子澄及江浙諸友皆㑹留止旬日鄒斌俊父錄云朱吕二公話及九卦之序先生因亹亹言之大畧謂復是本心復䖏如何列在第三卦而先之以履與謙蓋履之為卦上天下澤人生斯世須先辨得俯仰乎天地而有此一身以逹扵所履其所履有得有失又繫扵謙與不謙之分謙則精神渾収聚扵内不謙則精神渾流散扵外惟䏻辨得吾一身所以在天地間舉錯動作之由而歛藏其精神使之在内而不在外則此心斯可得而復矣次之以常固又次之以損益又次之以困蓋本心既復謹始克終曽不少廢以得其常而至扵堅固私欲日以消磨而為損天理日以澄瑩而爲益雖渉危蹈險所遭多至扵困而此心卓然不動然後扵道有得左右逄其原如鑿井取泉䖏䖏皆足蓋至扵此則順理而行無纎毫透漏如巽風之散無徃不入雖宻房奥室有一縫一罅即能入之矣二公大服朱亨道書云鵝湖講道切誠當今盛事伯恭蓋慮陸與朱議論猶有異同欲㑹歸扵一而定其所適從其意甚善伯恭蓋有志扵此語自得則未也臨川趙守景明邀劉子澄趙景昭景昭在臨安與先生相欵亦有意扵學又云鵝湖之㑹論及教人元晦之意欲令人泛觀慱覧而後歸之約二陸之意欲先發明人之本心而後使之慱覧朱以陸之教人爲太簡陸以朱之教人爲支離此頗不合先生更欲與元晦辯以爲堯舜之前何書可讀復齋止之趙劉諸公拱聼而已先發明之說未可厚誣元晦見二詩不平似不能無我元晦書云某未聞道學之懿茲幸獲奉餘論所恨匆匆别去彼此之懐皆若有未既者然警切之誨佩服不敢忘也還家無便寫此少見拳拳冬十一月十五日作敬齋記見前卷十九淳熈三年丙申先生三十八嵗與王順伯書再書俱見前卷二淳熈四年丁酉先生三十九嵗春正月十四日丁繼母太孺人鄧氏憂􅌾鄕之官山先生事繼母與諸兄曲盡孝道嘗聞孝宗皇帝聖語陸九淵滿門孝弟者也淳熈五年戊戌先生四十嵗淳熈六年巳亥先生四十一嵗服除授建寜府崇安縣主簿淳熈七年庚子先生四十二嵗在滋瀾先生因居之南五里有園林屋宇扁是名與包顯道書云今歲與朋友讀書在滋瀾春聞張欽夫卒與包顯道書見前卷六秋九月二十九日季兄復齋先生卒復齋臨終云比來見得子靜之學甚明恨不更相與切磋見此道之大明耳先生嘗曰復齋先生涵養深宻躬行篤實朱元晦與林擇之書云陸子靜兄弟其門人有相訪者氣象皆好此間學者却與渠相反𥘉謂只在此講道漸涵自能入徳不謂末流之弊只成說話至人倫日用最切近䖏都不得毫末氣力不可不深懲而痛警之也冬十一月望日作復齋行状十二月己酉􅌾于鄕之萬石塘淳熈八年辛丑先生四十三嵗春二月訪朱元晦于南康時元晦爲南康守與先生泛舟樂曰自有宇宙以來已有此溪山還有此佳客否乃請先生登白鹿洞書院講席先生講君子喻扵義小人喻扵利一章畢乃離席言曰熹當與諸生共守以無忘陸先生之訓再三云熹在此不曽說到這裏負愧何言乃復請先生書其說先生書講義見前二十三卷尋以講義刻于石先生云講義述扵當時發明精神不盡當時說得來痛快至有流涕者元晦深感動天氣㣲冷而汗出揮扇元晦又與楊道夫云曾見陸子靜義利之説否曰未也曰這是子靜來南康熹請說書却說得這義利分明是說得好如云今人只讀書便是利如取解後又要得官得官後又要改官自少至老自頂至踵無非爲利說得來痛快至有流涕者秋作祭吕伯恭文見前卷二十六丞相少師史浩薦先生六月二十三日得㫖都堂審察陞擢先生不赴薦云陸某淵源之學沉粹之行軰行推之而心理悟融出扵自得者也淳熈九年壬寅先生四十四嵗項平甫來書畧云安世聞陸先生之名言者不一徃得交扵傳子淵警發柔惰自此歸向取師之意始定奉親之官越土多見髙第及門子弟愈覺不能自已雖未得親承扵罄欬然受沾汚渥亦已多矣獨念心師之乆不可不以尺紙布萬一伏乞加察一二年來數鉅公相繼淪落任是事者獨先生與朱先生耳侍從復上薦得㫖與職事官薦辭未詳除國子正秋𥘉先生赴國學與陳倅書見前卷七始講書八月十七日講春秋六章九月享明堂為分獻官淳熈十年癸卯先生四十五嵗在國學二月七日講春秋九章七月十五日講春秋五章十一月十三日講春秋四章諸生叩請孳孳啓諭如家居教授感發良多朱元晦來書畧云比約諸葛誠之在齋中相聚極有益浙中士人賢者皆歸席下比來所得為多幸甚再書云歸來臂痛病中絶學損書却覺得身心収𬋩似有少進䖏向來汎濫真是不濟事恨未得欵曲承教盡布此懐也項平甫再書畧云某自㓜便欲爲善士今年三十一矣欲望尊慈特賜指教云云荅書不傳按朱元晦荅平甫書云所語六國正語三復爽然所以警扵昏者為厚矣大抵子思以來教人之法尊徳性道問學兩事為用力之要今子靜所說尊徳性而某平日所聞却是道問學上多所以為彼學者多持守可觀而㸔道理全不仔細而熹自覺扵義理上不亂說却扵緊要事上多不得力今當反身用力去短集長庻不墮一邉耳先生聞之曰朱元晦欲去兩短合兩長然吾以爲不可旣不知尊徳性焉有所謂道問學冬遷勅令所刪定官先生在勅局同志之士相從講切不替僚友多賢相與問辯大信服與漕使尤延之書畧云朱元晦在南康已得太嚴之聲元晦之政亦誠有病然恐不能泛然以嚴病之使罰當其罪刑故無小遽可以嚴而非之乎某嘗謂不論理之是非事之當否而汎然爲寛嚴之論者乃後世學術議論無根之弊道之不明政之不理由此其故也元晦浙東救旱之政比者屢得浙中親舊書及道途所傳頗知梗槩浙人殊頼自劾一節尤爲適宜其誕慢以僥寵禄者當少阻矣至如其間言事䖏誠如來諭所言者云嚴陵詹子南侍學阜民𥘉見先生不能盡記所言大指云凡欲學者當先識義利公私之辨今所學果為何事人生天地間爲人自當盡人道學者所以為學學為人而巳非有為也又云孔子弟子如子㳺子夏宰我子貢雖不遇聖人亦足以號名學者為萬世師然卒得聖人之傳者回之愚參之魯蓋病後世學者溺扵文義知見徼繞蔽惑愈甚不可入道耳阜民旣還邸遂屏棄諸書及後來疑其不可又問先生則曰某何嘗不許人讀書不知此後有事在又曰讀書不必窮索平易讀之識其可識者乆将自明毋恥不知先生舉孟子鈞是人也一章云須先使心官不曠其職子南因是便収此心如此半月一日下樓忽覺此心已復澄瑩中立遂見先生先生目逆而視之曰此理巳顯也淳熈十一年甲辰先生四十六嵗在勅局春祀祚徳廟為獻官記事始末書于祠下朱元晦書略云勅局時與諸公相見亦有可告語者否扵律令中極有不合道理不近人情䖏隨事改正得一二亦佳中薦程可乆扵法令甚精可以入局中然此猶是第二義不知輪對班在何時果得一見明主就緊要䖏下得數句為佳其餘屑屑不足言也謙仲甚不易得今日尚有此公差強人意元善爽快極難得更加磨琢沉浸之功乃佳機仲旣得同官乃其幸會當能得日夕親炙也浙東諸朋友想時通問亦有過來相聚者否立之墓表今作一通顯道甚不以為然不知尊意以爲如何三月十三日荅朱元晦書見前卷七編朱元晦奏立社倉事戊申嵗先生兄梭山居士欲立社倉于青田先生與趙監書見前卷首上殿輪對五劄時對期甚迫猶未入思慮所親累請乆乃下筆繕寫甫就厥明即對五劄俱見前卷十八讀劄末云見前三十五卷語録講究武畧先生少時聞靖康間事慨然有感扵復讐之義至是訪求智勇之士與之商確益知武事利病形勢要害李将使雲将家子也興國人有勇力先生竒而教之後獲用太尉畢再遇帳下其家祠事先生或問何為曰雲少時嘗欲率伍百人打刼起事一日徃見先生蒙誨翻然而改不然此身不得為人矣先生平日奨激人才類如此後守荆門奨㧞竒才亦多論醫國或問先生見用以何醫國先生曰吾有四物湯問如何曰任賢使能賞功罰罪論駁中外奏對不可行者荅蘇宰書見前卷十朱元晦書時有言奏劄差異者元晦索之先生納去一本元晦貽書云奏篇垂示得聞至論慰沃良深其䂓模宏大源流深逺豈腐儒鄙生所可窺測然區區私憂未免有萬牛回首之歎然扵我何病耶語圓意活混浩流轉益見所養之深所蓄之厚但向上一路未曽撥着荅朱元晦書畧云奏劄獨蒙長者褒揚奨譽之厚俱無以當之深慚踈愚不能回互藏匿肺肝悉以書寫而兄尚有向上一路未曽撥着之疑豈待之太重望之太過未免金注之昏耶改授承奉郎以修寛恤詔令書成與樞宻使王謙仲語及孟子辟土地充府庫一段因云方今正在求此軰而不可得謙仲為之色變又舉柳子厚捧土掲木而致之廟堂之上蒙以紱冕翼之徒隷而趨走其左右豈有𥙷扵萬事之勞苦㢤聖人之道無益扵世凡以此也謙仲為之黙然先生嘗云當時諸公見上下相安内外無事便為太平氣象獨鄭漙之有一語極好而今只要為虜人借路登泰山云耳秋九月旣望作外舅吳公行状末云某在童穉時爲公所知後妻以其女尤延之作吳公墓誌云陸君子靜數爲予道其婦翁吳公之贒居亡何有墨服踵門而求見者則吳公之子顒若也䄂子靜之状且告曰敢因子靜以請誌予不識吳公然子靜信人也其言有證乃叙而誌之夫能識子靜扵童㓜之中而䏻以子妻之其賢可知矣後敬仲作孺人吳氏墓誌云孺人諱愛卿吳公茂榮諱漸之長女也㓜有異質女工不學而能詩書過目不忘公大竒之一見先生謂可妻歸焉先生為國子正刪定勑局居中五年四方之賓滿門旁無虚宇併假扵舘中饋百需先生不一啓齒孺人調度有方舉無缺事曁先生奉祠歸嚢蕭然同僚共贐之還里之明年經理象山孺人捐奩中物助之云云作本齋記為成都郭醇仁作淳熈十二年乙巳先生四十七嵗在勑局與尢延之書畧云此間不可為乆居之計吾今終日區區豈不願少自效至不容着脚手䖏亦只得且退而俟之職事間又無可修舉覩見弊病又皆須自上靣理㑹下來方得在此但望輪對可以少展胸臆對班尚在後年欝欝度日而已或勸以小人闖伺宜乞退先生曰吾之未去以君也不遇則去豈可以彼為去就耶詹子南問學子南甞問先生之學亦有所受乎曰因讀孟子而自得之扵心也淳熈十三年丙午先生四十八嵗在勑局夏五月作格矯齋記爲三衢徐載書朱元晦通書略云傅子淵去冬相見氣質剛毅極不易得但其偏䖏亦甚害事雖嘗苦口恐未以為然近覺當時說得亦未的疑其不以為然也今想到部必巳相見亦嘗痛與砭劑否道理極精㣲然𥘉不在耳目聞見之外是非黒白只在面前此而不察乃𣣔别求玄妙扵意慮之表亦巳誤矣熹衰病日侵所幸邇來日用工夫頗覺省力無復向來支離之病甚恨未得從容面論未知異時尚復有異同否耳轉宣義郎除将作監丞給事王信䟽駁十一月二十九日得㫖主管台州崇道觀𥘉親朋謂先生乆次宜求退先生曰徃時面對粗陳大義明主不以為非思欲再望清光少自竭盡以致臣子之義距對班五日除監丞先生與李成之書見前卷十和楊萬里廷秀送行詩見前卷二十五既歸學者輻輳時鄉曲長老亦俯首聼誨毎詣城邑環坐率二三百人至不能容徙寺觀縣官為設講席扵學宫聼者貴賤老少溢塞途巷從㳺之盛未見有此與朱子淵書見前卷十三淳熈十四年丁未先生四十九嵗春如臨川先生訪倉使湯公思謙公因言風俗不美先生曰乍歸方欲與諸後生說些好話此事亦由天亦由人公曰如何由天曰且如三年一科舉中者篤厚之人多浮薄之人少則風俗自此而厚不幸篤厚無㡬或全是浮薄則後生從而視效風俗日以敗壊公曰如何亦由人曰監司守令是風俗之宗主只如判院在此無只為位髙爵重旗旄導前驅卒擁後者是崇是敬陋巷茅茨之間有篤敬忠信好學之士不以其㣲賤而知崇敬之則風俗庶㡬可回矣公再三稱善次日謂幕僚友曰陸丈至誠何不去聼說話幕僚云恐陸丈門户髙峻議論非某軰所能喻公曰陸丈說話甚平正試徃聼㸔某扵張吕諸公皆相識然如陸丈說話自是不同作朱元瑜名字說見前卷二十登貴溪應天山講學𥘉門人彭興宗世昌訪舊于貴溪應天山麓張氏因登山遊覧則陵髙而谷䆳林茂而泉清乃與諸張議結廬以迎先生講學先生登而樂之乃建精舍居焉與楊敬仲書云精舍二字出後漢包咸傳其事在建武前儒者講習之地用此名甚無歉也荅江西程帥叔逹恵新刋江西詩派劄子荅沈宰書見前卷十七包敏道䟦江泰之所収劄子墨蹟云象山先生論詩又出告徃知來以意逆志者之外蓋其精鑑如權度舉天下之輕重長短毫髮絲粟不可得而加損也豈特於詩為然㢤當程君劄送詩至時僕在席下先生顧諸生曰誰能代荅湏臾呈藁者數人先生嘆曰将紙來一筆寫就云云夏五月荅馮傳之書見前卷十三𥘉冬荅朱元晦書見前卷十三元晦荅書畧云所諭與令兄書辭費而理不明今亦不記當時作何語恐或實有此病承許條析見教何幸如之虚心以俟幸因早便見示如有未安却得細論未可便似居士兄遽㫁來章也辯無極太極始此無營齋說贈吳叔有冬十月庚辰􅌾仲兄子儀于臨川之羅首峯下作子儀墓誌十一月作宜章學記十二月與漕使宋若水書言金谿月樁之重及臺郡督積欠困民之弊見前卷八淳熈十五年戊申先生五十嵗在山間精舎春正月作荆國王文公祠堂記與薛象先書見前卷十二先生嘗云讀介甫書見前卷二十五荅倉使趙汝謙書俱見前首卷易應天山名為象山學徒結廬先生旣居精舎又得勝䖏為方丈及部勒群山閣又作圓庵學徒各來結廬相與講習與姪孫濬書云山間近來結廬者甚衆諸生始聚糧相迎今方丈前又成一閣部勒群山氣象亦偉云云居仁齋由義齋養正堂張伯強明徳張行巳志道周孚先儲雲伯强行巳佩玉張少石愈髙倪伯珍䂓齋祝才叔蕙林周元忠逹誠朱幹叔瓊芳傳季魯學徒馮泰卿𥘉名梅囱以季魯家諱先生為改今名濯纓池浸月池吳子嗣剏齋先生與之書云草廬在二池之間欲名以濯纓當爲書之封庵少石批荆先生書于世昌之堂各因山勢之髙原塢之佳處爲之三月與江西帥王謙仲書見前卷九五月與錢守伯同書見前卷九郡縣禮樂之士時相謁訪喜聞其化故四方學徒大集先生從容講道歌詠愉愉有終焉之意馮元質云先生常居方丈毎旦精舎鳴鼓則乗山簥至㑹揖陞講坐容色粹然精神烱然學者又以一小牌書姓名年甲以序掲之觀此以坐少亦不下數十百齊肅無譁首誨以収歛精神涵養徳性虚心聼講諸生皆俛首拱聼非徒講經毎啓發人之本心也間舉經語為證音吐清響聼者無不感動興起𥘉見者或欲質疑或欲致辯或以學自負或有立崖岸自髙者聞誨之後多自屈服不敢復發其有欲言而不能自逹者則代爲之說宛如其所欲言乃從而開發之至有片言半辭可取必奨進之故人皆感激奮礪平居或觀書或撫琴佳天氣則徐歩觀瀑至髙誦經訓歌楚詞及古詩文雍容自適雖盛暑衣冠必整肅望之如神諸生登方丈請誨和氣可掬隨其人有所開發或教以涵養或暁以讀書之方未嘗及閑話亦未甞令㸔先儒語録毎講說痛快則顧傅季魯曰豈不快㢤季魯齒最少坐必末嘗掛一座于側間令代說時有少之者先生曰季魯英才也先生大率二月登山九月末治歸中間亦徃來無定居山五年閱其簿來見者踰數千人與陳宰書云同志之士方此盍簮紬繹簡編商畧終古粗有可樂雖品質不齊昏明異趣未能純一而開發之驗變化之證亦不可謂無其涯也倘得乆扵是山以旣厥事是所願幸傅季魯云先生居山多告學者云汝耳自聦目自明事父自能孝事兄自能弟本無少缺不必他求在乎自立而巳學者扵此多有興起有立議論者先生云此自是虚說此是時文之見常曰今天下學者有両途惟朴實與議論耳毛剛伯必疆云先生之講學也先欲復本心以爲主宰旣得其本心從此涵養使日充月明讀書考古不過欲明此理盡此心耳其教人爲學端緒在此故聞者感動當時先生與晦翁門徒俱盛亦各徃來問學晦庵門人乍見先生教門不同不與觧說無益之文義無定本可說卒然莫知所適從無何辭去歸語師友往往又失其本㫖遂起晦翁之疑良可嘅嘆或問先生之學自何䖏入先生曰不過切已自反改過遷善又曰吾之學問與諸䖏異者只是在我全無杜撰雖千言萬語只是覺得他底在我不曾添一些且又曰吾之與人言多就血脉上感動他故人之聼之者易章仲至云先生講論終日不倦夜亦不困若法令者之爲也動是三鼓學者連日應酧勞而蚤起精神愈覺烱然問曰先生何以能然先生曰家有壬癸神能供千斛水嚴松年問今學者為誰先生屈指數之以傅子淵居其首鄧文範傅季魯黄元吉居其次且云浙間煞有人有得之深者有得之淺者有一見而得之者有乆而後得之者廣中一陳去華省發偉特惜乎此人亡矣朱元晦語録云今浙東學者多子靜門人類䏻卓然自立相見之次便毅然有不可犯之色自家一軰朋友又却覺不振又云子靜之門如楊簡軰躬行皆有可觀又與詹侍郎書云髙教授能晋意學校甚善渠從子靜學有意為巳必能開導其人也又與劉仲復書云陸丈囬書其言明當且就此持守自見功效不湏多疑多問却轉迷惑論解書南豐劉敬夫學周禮見晦庵晦庵令其精細考索後見先生問見朱先生何得敬夫述所教先生曰不可作聰明亂舊章如鄭康成注書枘鑿最多讀經只如此讀去便自心解注不可信或是諱語或是莾制傅季魯保社中議此甚明可一往見之扵是往問于季魯又嘗曰觧書只是明他大義不入巳見扵其間傷其本㫖乃為善觧書後人多以巳意其言毎有意味而失其真實以此徒支離蔓衍而轉爲藻繪也又嘗曰河圖屬象洛書屬數先天圖非聖人作易之本㫖有據之扵說易者陋矣又甞曰後世之論春秋者多如法令非聖人之㫖也觀春秋詩書易經聖人手則知編論語者亦有病顧記禮之言多原老氏之意論傳道與姪孫濬書見前首卷先生有云學者至本朝而始盛自周茂叔發之又云韓退之言軻氏之死不得其傳故不敢誣後世無賢者然直是至伊洛諸公得千載不傳之學但草創未爲光明今日若不大段光明更幹當甚事又云二程見茂叔後吟風弄月而歸有吾與點也之意後來明道此意却存伊川巳失此意又云元晦似伊川欽夫似明道伊川蔽錮深明道却䟽通又云道譬則水人之扵道譬則蹄涔則汙沱百川江海也海至大矣而四海之廣狹淺深不必齊也至其為水則蹄涔亦水也又甞以手指心曰某有積學在此惜未有承當者夏四月望日與朱元晦書辯太極圖說見前卷二與提刑應仲寔書見前卷十與趙詠道書見前卷十二秋八月逰僊巖題新興寺壁見前卷二十訪江西帥王謙仲時帥幕邵叔誼在坐聼談命者曰吾之談命異扵是伯夷叔齊餓死于首陽之下民到于今稱之此命極好齊景公有馬千駟死之日民無徳而稱焉此命極不好先生與叔誼書見前首卷作南豐黄世成及慈谿楊承奉二墓銘先生毎謂墓非古而銘多溢辭故不苟作余銘南豐慈谿二君之墓海内名識謂無愧辭十二月十四日答元晦書見前卷二又别幅云大傳曰在天成象在地成形又曰見乃謂之象形乃謂之噐見乎上者可得而見矣猶不謂之形而謂之成象必形乎下可得而用者乃始謂之噐易之言噐本扵聖人備物致用立成噐以為天下利如網罟耒耜車輿門柝杵臼弧矢棟宇棺槨之類乃所謂噐也昔者聖人之制斯器也蓋取諸易之象易有聖人之道四而制噐尚象與居一焉道者天下之所由而聖人則䏻知之噐者天下之所利而聖人則能制之由其道而利其噐在一身則為有道之人在天下則為有道之世不由其道而利其噐則為無道矣誰能出不由户何莫由斯道也然中人以下則由而不知蓋其知識卑近所見淺末形而下者所䏻由形而上者所不能知故曰民可使由之不可使知之非有知道者以長治之左右之則趨扵下惟利之見而不由其道矣上必有下下必有上上而無下何以為上下而無上何以為下道之與噐未始相無不由其道而利其噐噐者非其有矣負且乗致冦至此之謂也故惟聖人為能制噐精義入神所以致用利用安身所以崇徳百慮一致道固然也化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業非知道者孰能與扵此故道者形而上者也噐者形而下者也噐由道者也一隂一陽之謂道繼之者善也而謂其屬扵形噐不得爲道其爲昧扵道噐之分也甚矣聞朱元晦詩喜詩云川源紅緑一時新暮雨朝晴更可人書冊埋頭何日了不如抛却去㝷春先生聞之色喜曰元晦至此有覺矣是可喜也淳熈十六年已酉先生五十一嵗祠秩滿在山間方丈春正月朱元晦來書畧云老氏之言有無以有無爲二周子之言有無以有無爲一更請子細着眼未可容易譏評也無極而太極如曰無爲之爲非謂别有一物也非如皇極民極之有方所有形象而但有此理之至極耳又别紙末云如曰未然則我日斯邁而月斯征各尊所聞各行所知亦可矣無復可望其必同也題逹本庵詩梁光結廬其親塋名曰逹本求言扵予敬賦是詩以助孝徳詩云孩提無不愛其親不失其心卽大人從此勸君休外慕悅親端的在誠身夀皇内禪光宗皇帝即位詔先生知荆門軍先生始欲著書嘗言諸儒說春秋之謬尤甚扵諸經将先作傳值得守荆之命而不果覃恩轉宣教郎夏六月與黄循中書見前卷十二磨勘轉奉議郎答趙然道書見前卷十二秋七月四日與朱元晦書見前卷二七日贈踈山益侍者帖見前卷二十八月六日元晦答書云荆門之命少慰人意今日之計惟僻且逺猶或可以行志想不以是爲厭三年有半之間消長之勢又未可以預料流行坎止亦非人力所能爲也聞象山墾闢架鑿之功蓋有緒來學者亦益甚恨不得一至其間觀竒覧勝某春首之書詞氣粗率旣發即知悔之然巳不及矣論無極之辯與陶賛仲書再書俱見前卷十五論私立門户之非與唐司法書見前卷十五朱元晦論學徒競辯之非荅諸葛誠之書云示諭競辯之論三復悵然愚深欲勸同志者兼取兩家之長不輕相詆毀就有未合亦且置勿論而力勉扵吾之所急吾人所學喫緊着力處正天理人欲相去之間如今之論則彼之因而起者扵二者之間果何處乎子靜平日自任正欲身率學者扵天理不以一毫人欲雜扵其間恐決不至如賢者之所疑也包顯道侍晦庵有學者因無極之辯貽書詆先生者晦庵復其書云南渡以來八字着脚理㑹着實工夫者惟某與陸子靜二人而巳某實敬其爲人老兄未可以輕議之也秋八月十一日答趙詠道書見前卷十二答曾宅之書見前卷首與姪孫濬書見前卷十四冬十月朔作外姑黄夫人墓銘自云先丈母誌銘叙次頗復明暢云與王順伯書見前卷十一冬至前五日䟦曽裘甫答屈待舉詩後三日逰翠雲寺題名于壁先生逰翠雲寺帖見前卷二十光宗紹熈元年庚戌先生五十二嵗在山間方丈春正月與姪孫濬書見前卷十四三月二十六日與包敏道書見前卷十四夏五月作經徳堂記堂名取諸孟子經徳不囬六月旱十三日䂖灣禱雨十六日謝雨俱見前卷二十六秋八月二十六日作貴溪縣重脩學記見前卷十九與饒夀翁書見前卷十與郭邦逸書見前卷十三作玉芝歌見前卷二十五與路彦彬書畧云切不自揆區區之學自謂孟子之後至是而始一明也紹熈二年辛亥先生五十三歲在山間方丈春二月與劉伯恊書俱見前卷十二三月三日與林叔虎書見前卷九䟦資國寺雄石鎮帖寺在象山之西址隔溪之山間先生徃來必憇焉夏六月作武陵縣學記見前卷十九中澣作臨川簿廳壁記簿長季海得㫖疾速之任云云俱見前卷三十五語録嘱傅季魯居山講學先生将之荆門謂季魯曰是山繄子是頼其為我率諸友日切磋之吾適小障不得爲諸友掃浄氛穢幸有季魯在願相依親近秋七月四日啓行十一日書贈陳晋卿名時為撫州學官書見前卷二十九月三日至荆門軍舟車所經見豐城王允文祭文云南浦維舟徑浮彭蠡覧竒康廬濯纓瀑水潯陽晚薄齊安晝艤臨臯雪堂周覧遺趾長淮以西野岸曠平撰杖西風或憇柴荆桑棗䕃塗葭葦連汀笑談之間造㣲詣精黄鶴入雲芳洲在目憑髙倣古北轅西輻薄于開藩霜蕚破菊云即日親事上謝表表見前卷十八吏以故例云俱見前二十二卷與羅點春伯書見前卷十五與漕使薛象先叔似書與漕使論民間疾苦俱見前卷十五新築城荆門素無城壁先生以為此自古戰爭之塲今為次邉在江漢之間為四集之地南捍江陵北援㐮陽東䕶隋郢之脇西當光化夷陵之衝荆門固則四鄰有所恃否則有背脇腹心之虞雖四山環合易扵備禦義勇數千強壮可用而倉廩府庫之間麋鹿可至累議欲修築子城憚重費不敢輕舉先生審度决計召集義勇優給庸直躬自勸督役者樂趨竭力功倍二旬訖築𥘉計者擬費緡錢二十萬至是僅費五千而土工畢復議成砌三重置角臺増二小門上至敵樓衝天渠荷葉渠䕶險牆之制畢備纔費緡錢三萬郡學貢院及客舘官舎衆役並興𥘉習俗侑人以執役為耻吏為好衣閑觀至是此風一變督役官吏布衣雜役夫佐力相勉以義不專以威盛役如此而人情晏然郡中恬若無事革稅務之弊革弊政事俱見前卷三十三朔望及暇日詣學講誨諸生紹熈三年壬子先生五十四嵗在荆門春正月十三日郡有故事㑹吏民講洪範五皇極一章上元設醮黄堂其說曰爲民祈福先生扵是㑹吏民講洪範歛福錫民一章以代醮事發明人心之善所以自求多福者莫不暁然有感扵中或為之泣有講義仍書河圖八卦之象洛書九疇之數于後以暁後學更定圖書與今世所傳者不同所以復古圖書之舊也先生未及著書發明後學傅季魯作釋義以明之二十四日與姪煥之書畧云正月十三日以講義代醮除官員士人吏卒之外百姓聼講者不過五六百人以不曽告戒也然人皆感動其所以相孚信者又在言語之外也比間不復掛放状牌人有訴事不拘早晚接受雖入夜未閉門時亦有來訴者多立遣之壓服而去見客亦無時二月九日之夜郡火災與鄧文範書見前卷十七與吳仲時書見前卷六閱武湖北諸郡軍士多逃徙視官府如傳舎不可禁止緩急無可使者先生病之乃信捕獲之賞重奔竄之刑又數閱射中者受賞役之後加庸直無饑寒之憂相與悉心弓矢逸者絶少他日兵官按閱獨荆門整習他郡所無平時按射不止扵兵伍郡民皆得而與中亦同賞上廟堂劄子乞撥常平銀助城費畧云荆門素無城壁某去冬妄意聞于帥府請就此役尋得帥檄令委官置局徑自修築已扵十二月𥘉四日發手亦幸天氣晴霽人心齊一小壘綿薄㑹計用磚包砌猶當用緡錢三萬本軍有買名銀一萬七千餘両在常平稽之專條不可擅用欲乞鈞慈特為敷奏扵數内撥支銀五千両應付支用使城壁一新形勢益壮姦宄沮謀民心有頼實為無窮之利與章茂獻論築城書畧云有當控告廟堂者敢不布本末庶㡬一言之助去冬修築子城適值天氣晴霽民心恱懌此邦士女未嘗識城逺村僻塢携持來觀自臘至今踵係不絶答羅田宰吳斗南書論太玄見前卷十五作監嶽兄庸齋墓表夏四月十九日朱元晦來書云去嵗辱惠書慰問尋即附状致謝其後聞千騎西去相望益逺無從致問近幸㓜安經由及得湖南朋友書乃知政教並流士民化服甚慰某憂苦之餘疾病益侵形神俱瘁非復昔時歸來建陽失於計度作一小屋朞年不成勞苦百端欲罷不可李大來此備見本末必能具言也渠欲爲從戎之計因走門下撥冗附此未暇他及政逺切祈爲道自重以幸學者彼中頗有好學者否峽州郭文著書頗多悉見之否其論易數頗詳不知尊意以爲如何也近著幸示一二有委併及與總卿張體仁元善書見前卷十六答倉使書末云比來訟牒益寡終月計之不過二三紙此間平時多盗今乃絶無荆南府帥章森徳茂以先生政績上薦先生與書見前卷十六答章茂獻書云某承乏云云見前卷十五又云先生治化孚洽乆而益著旣逾年笞箠不施至扵無訟相保相愛閭里熈熈人心敬向日以加厚吏卒亦能相勉以義視官事如家事識者知其有出扵政刑號令之表者矣諸司交章論薦丞相周公必大嘗遺人書有曰荆門之政可以驗躬行之效周益公判湖南帥府復傅子淵書末云曾通象山書否荆門之政如古循吏躬行之效至矣禱雨事見前卷二十六與章帥二書俱見前卷十六秋七月薦屬縣二宰併自劾状時姦民楊彦翼萬九成素號論官社楊景春尤甚先生以其世惡奏乞施行因以自劾先生曰古者無流品之分而賢不肖之辨嚴後世有流品之分而賢不肖之辨畧贈劉季蒙見前卷二十與伯兄致政書見前卷十七冬十二月六日與姪麟之書末云此間風俗旬月浸覺變易形見大槩是非善惡䖏明人無貴賤皆向善氣質不美者亦革面政所謂脉不病雖瘠不害近來吏卒多貧而有窮快活之說七日丙午先生疾十一日庚戌禱雪郡僚問疾因言冬暖盍祈雪乃命倪巨川濟甫畫乾卦掲之黄堂設香花翌早迎徃蒙泉取水歸安奉而風雲遽興辛亥日雪驟降先是十一月語女兄曰先教授兄有志天下竟不得施以殁女兄䀌然又語家人曰吾将死矣或曰安得此不祥語骨肉将柰何先生曰亦自然又告僚屬曰某将告終先生素有血疾居旬日大作越三日疾良已接見僚屬與論政理如平時宴息靜室命灑掃焚香家事亦不掛齒雪降命具浴浴罷盡易新衣幅巾端坐家人進藥却之自是不復言十四日癸丑日中先生卒郡屬棺歛哭泣哀甚吏民哭奠充塞衢道僉判洪伋率僚屬祭文畧云斯道龎洪充塞両儀孔孟旣沒日以湮㣲頼我先生主盟正學開悟䏊瞶惟時先覺云云學録黄嶽祭文畧云先生之學正大純粹先生之教明白簡易其御民也至誠之外無餘術其使人也寸長片善未始或棄若夫憂國忘家愛人利物所謂造次扵是顛沛扵是是以先生之亡雖小夫賤隷婦人女子莫不咨嗟歎息至扵流涕父老李歛等祭文云刺史以詩書爲政待邦人如子弟百姓安之何遽驚哲人之萎也蓋刺史之賢周孔之學方将公是道扵天下慰四海蒼生之望非我民得以私之也然歛此大惠施扵一邦近者服其教逺者化其徳豈期天不憗遺而奪我父師之速也古之君子所居民愛所去民思而况賢刺史之亡其遺愛在人真有不可觧扵心者我民将子子孫孫尸而祝之社而稷之以至扵無窮也湖北帥張森祭文畧云惟公學本之經行通扵天淵源之漸伊孟之傳自本自根即聞即見見之躬行死守不變徳業培深我臯我䕫用之斯世舎公其誰湖廣總領張體仁祭文畧云儒者之學入孝出弟人言江西陸氏兄弟儒者之仕信道行志人言荆門如古循吏有修其綆汲深未旣有恢其規㳺刃餘地詞流滔滔夀考日遂豈伊斯人而俾憔悴云云江淮總領鄭湜祭文畧云聖去千載所傳者書獨公深造忘其緒餘謂心至靈可通百聖謂物雖䌓在我能鏡𣣔世知師欲人知味未之能行慨其将廢湖南漕豐誼祭文畧云公禀正氣早以道鳴叱呵非聖奔走諸生云云朱元晦聞訃帥門人徃寺中為位哭紹熈四年癸丑春正月二孤護先生柩歸沿途弔哭致祭者甚衆三月至家鄂州教授許中應祭文畧云是理流行宇宙之彌卑不間扵樵牧皆可得而與知自條理之科不續一何名世之稀蓋所以見吾夫子者未至如曾參之皜皜而詖淫邪遁不能如孟子之無疑則皆未免隨揣摩之形似困聞見之支離雖勉強以力行徒爾增附益之私公以間氣而自得師燭乎大天淵之無際洞乎㣲芒芴之無遺混混乎由源而逹委鼎鼎乎自幹而敷枝故言動無一之不實而表裏不至乎相違豈非合彼巳於一源貫幽顯而同歸者乎若乃察此理之公其謂先覺者爲後覺之資彼絶物者不仁雖狂鄙皆在扵扶持開晃耀扵蒙昧出荆棘扵平夷的然顛末之無舛二三子亦有立於斯時即所應之有證尚安得以佛老之空談而病之㢤金谿宰王有大建復齋象山二先生祠六月癸丑楊簡爲記畧云道心大同人自區别人心自善人心自靈人心自明人心即神人心卽道安覩乖殊聖賢非有餘愚鄙非不足何以證其然人皆有惻隱之心皆有羞惡之心皆有恭敬之心皆有是非之心惻隱仁羞惡義恭敬禮是非智仁義禮智愚夫愚婦咸有之豈特聖賢有之人人皆與堯舜禹湯文武周公孔子同人人皆與天地同又何以證其然人心非血氣非形體廣大無際變通無方倐焉而視又倐焉而聼倐焉而言倐焉而動倐焉而至千里之外又倐焉而窮九霄之上不疾而速不行而至非神乎不與天地同乎學者當知舉天下萬古之心皆如此也孔子之心如此七十子之心如此子思孟子之心如此復齋之心如此象山之心如此金谿王令君之心如此舉金谿一邑之心如此學者當自信無自棄意慮㣲起天地懸隔不識不知匪合匪離直心而徃自備萬善自絶百非雖無思為昭明弗遺二陸先生撫州金谿人復齋諱九齡字子夀篤志斯道窮深究㣲兢兢孜孜學者宗之象山先生其弟也諱九淵字子靜天性清明不染雜說簡甞親聞先生之言自謂其童㓜時聞人誦伊川先生語自覺若傷我者性質素明如此故長而益明破學者扵窟宅開聖道之夷逾其言甚平而或者填萬說扵胸中持萬說扵胸中以聼先生之言故或疑其深疑其峻然而海内之士聞其風而趨之如百川之東矣簡積疑二十年先生一語觸其機簡始自信其心之即道而非有二物始信天下之人心皆與堯舜禹湯文武周公孔子同皆與天地日月鬼神同王令君有大因邑人崇敬二君子以俸資設祠於學且将行禮焉屬簡為記且曰欲以昭明二君子之道簡雖無所似灼知二君子之心無以異扵天下之人心不容穿鑿其說以惑來者乃起敬起恭而書其畧云冬十一月王有大帥邑僚來祭輓詩云篤學光前哲知言衆所迷學同顔氏好功與孟軻齊獻替心彌切藩經政可稽儒宫􅌂遺像垂範自江西九日壬申奉先生之柩􅌾于延福鄉朱陂之下距妣饒氏孺人墓為近一云􅌾于郷之永興寺山門人奔哭㑹􅌾者以千數詹阜民祭文畧云天縱夫子以淑其徒爰曁子思湏臾不離孟軻親受厥緒是承卓㢤先生能自得師玩其遺編獨識其㣲探原自天立其大者操而存之造次弗舎日漑月培充實光輝奔走學徒四方如歸先生設教固亦多術其要使人反躬務實一洗世習詞說支離逹其本心使自得之善端旣著日用不窮夫然後知先生之功云楊簡祭文畧云先生之道亦旣昭昭然矣何俟乎知仰觀乎上先生確然示人易矣俯察乎下先生隤然示人簡矣垂象著明者先生之著明寒暑變化者先生之變化書者先生之政事詩者先生之詠歌禮者先生之節文春秋先生之是非易先生之變易學者之所日誦百姓之所日用何俟乎復知何俟乎復思不可復思矧可斁思袁爕祭文畧云嗟維先生任道以躬方其未得憤悱自攻一日洞然萬理俱融如天清明如日正中毫髮無差涵養日充乃號扵世曰天降衷至大至精至明至公玆焉良心萬變不窮學者𥘉來膠擾塞胸先生教之如槖鼓風弟子化之如金在鎔有蔽斯决有窒斯通手舉足履視明聽聦式全其大不淪虗空此扵斯世允矣有功云云傅子雲祭文畧云道塞宇宙而人至靈不蔽於物易知易行維天憂民篤生斯聖乃徹厥蔽俾安正性周衰文弊孟沒學絶功利横流道術分裂所見益鑿所言益支易知易行誰其覺斯千七百載乃有先生先生之徳濬哲粹英道䘮旣乆無所取證深研力索俯仰叅訂或啓于家訓或得于群籍或由省察之深或資辯白之力惟至當之不磨卒㑹歸于有極始信夫良知良能降于上帝可乆可大道實簡易倘正僞之不辨而先後之舛施則已私之是憑豈天徳之在茲逺紹孟氏之㫖極陳異說之非世之學者標末是求而吾先生自源徂流世論一切如鞭之刑而吾先生允稽其情世之於人多察鮮容而吾先生善與人同世之扵善迹似情非而吾先生誠實自持世排異端惟名是泥而吾先生即同辯異世讀古書立論紛然而吾先生先實後言嗚呼先生視古如反諸掌視民如納諸溝斯學斯志曽不一施今則已矣弧矢不去手關河不忘懐搜求忠勇義欲一伸曽不一遂今則息矣莫大扵暦夜觀星象莫神扵易畫索蓍卦考禮問樂逺稽古制曽不畢究今則墜矣間世之英㧞萃之議作扵斯世亦如此而止矣云云周清叟祭文畧云天爲斯文乃生先生指學者之膏肓示入聖之門庭不繞繳而支離誠坦然而可行暴之以秋陽之白濯之以江漢之清繼孟子之絶學舎先生其誰能云云包遜祭文云維吾先生天禀絶異洞萬古心徹先聖秘先立其大湏臾不離日累月積仁熟功熈無偏無黨不識不知一順斯理終日怡怡雖和非恵雖清非夷豈伊之任㡬聖之時包楊作先生賛云辭蔓蝕真㑹當一正剗百家僞藥千古病發人本心全人性命一洗佛老的傳孔孟紹興五年甲寅春二月十六日楊簡状先生行見前三十三卷寜宗慶元二年丙辰貴溪宰劉啓晦建翁立先生祠于象山方丈之址自立祠後春秋致祭惟謹臨江章茂獻為記宰朱文公門人也扵是先生門人約以嵗正月九日登山㑹祭開禧元年乙丑夏六月先生長子持之伯㣲編遺文為二十八卷外集六卷乙卯楊簡序畧云易曰百姓日用而不知孔子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者大戴記孔子之言謂忠信為大道忠者忠實信者誠信不詐僞而先儒求之過求之幽深故反不知道孔子又名大道曰中庸庸者常也日用平常也孟子亦謂徐行後長即堯舜之道又謂以羊易牛之心足以王先生諄諄爲學者剖白斯㫖深切著明而學子領㑹者寡簡不自揆度敢少致輔翼之力專叙如右開禧三年丁卯秋九月庚子撫州守括蒼高商老刋先生文集于郡庠䟦云洙泗之教憤悱啓發鄒魯之書困衡作喻此學乆矣無傳獨象山先生得之千載之下最爲要切是以聽其言者類多感發書曰惟文王之敬忌先生之書如黄鍾太吕發逹九地真啓洙泗鄒魯之祕其可以不傳耶商老嘗從先生游頗自奮勵今老矣學不加進為州鄭卿愧扵簿領之外效如捕風因刻之郡庠以幸後學倘有志之士伏讀其書如見其人知敬其所當敬而不忌其所不必忌其為有𥙷扵風化較然不誣也然而黙識心通豈欺我㢤嘉定五年壬申秋八月張衎季恱編遺文成傳子雲序畧云先生生扵孟子沒千有七百餘年之後當浮僞雜揉朱𬗋淆亂之時乃䏻獨信實理而不奪扵浮僞精别古書而不惑於近似深窮力踐天徳著明推以覺人不加毫末故一時趍隅以聽者莫不油然悟良知良能至明至近之實灼然知自下升髙積小以大之端躍然興堯舜可為不自棄自暴之志回視曩之蔽於支離浮偽之說者又不啻若夷猶扵九軌之路而灼見夫在荆棘泥淖者之為䧟溺也蓋先生長扵啓迪使人蔽解疑亡明所止扵片言之下有得扵天而非偶然者先生亦自以孟子旣沒斯道之任在已病浮偽之害正渝實救焚拯溺如巳隱憂撲𦦨障流厥功彌大故民彛帝則之實孔子孟子之傳頼以復闡扵世云云九月戊申江西提舉袁爕刋先生文集自爲序畧云天有北辰而衆星拱焉地有泰嶽而衆山宗焉人有師表而後學歸焉象山先生其學者之北辰㤗嶽歟自始知學講求大道不得弗措乆而寖明又乆而大明此心此理貫徹融㑹美在其中不勞外索掲諸當世曰學問之要得其本心而已心之本真未嘗不善有不善者非其𥘉然也孟子嘗言之矣鄉為身死而不受今爲宮室之美妻妾之奉所識窮乏者得我而爲之此之謂失其本心其言昭晣如是而學者不能深信謂道為隱而不知其著謂道為邈而不知其近求之愈過而愈湮鬰至先生始大發之如指迷途如藥乆病迷者悟病者愈不越扵日用之間而本心在是矣學者親承師訓向也跂望聖賢如千萬里之隔今乃知與我同本培之漑之皆足以敷榮茂遂豈不深可慶㢤嗚呼先生之惠後學弘矣先生之言悉由中出上而啓沃君心下而切磨同志又下而開曉黎庶及其他雜然著述皆此心也儒釋之所以分義利之所由别剖析至精如辨白黒遏俗學之横流援天下扵旣溺吾道之綂盟不在茲乎爕識先生扵行都親慱約者屢矣或竟日以至夜分未甞見其少有昏怠之色表裏清明神采照映得諸觀感鄙吝巳消矧復警䇿之言字字切已歟先生之沒餘二十年遺言炳炳精神猶在敬而觀之心形俱肅若親炙然臨汝嘗刋行矣尚多闕畧先生之子持之伯㣲裒而益之合三十二卷今為刋于倉司流布寖廣書滿天下而精神亦無不遍言近而指逺雖使聖人復生莫之能易嗚呼兹其所以為後學之師表也歟東澗楊文清公鵝湖祭文未詳嘉定八年乙亥冬十月二十九日奉㫖賜謚𥘉嚴滋等請謚到状云故荆門知軍監丞陸公以身任道爲世儒宗一時名流踵門問道常不下千百軰今其遺文流布海内人無智愚珍藏而傳誦之蓋其爲學者大公以㓕私昭信以息偽掲諸當世曰學問之要得其本心而已學者與聞師訓向者視聖賢若千萬里之隔乃今知與我同本培之漑之皆足以敷榮茂遂如指迷途如藥乆病先生之功宏矣縣庠郡學所至立祠雖足以致門人弟子之私敬而謚號未加識者歉焉云本州備録申聞乞指揮施行至是奉㫖賜謚嘉定九年丙子春三月十七日宣教郎太常慱士孔煒謚議見前卷一十三冬十二月十三日朝請大夫考功員外郎丁端祖覆議見前卷三十三嘉定十年丁丑春三月二十八日賜謚文安撫州州學教授林恢告祠堂賜謚文云先生振絶學扵千載之後躬行著論碩大光明播于四方所謂百世以俟聖人而不惑者属者諸生請謚郡聞于朝訂議太常謚以文安聖天子俞之嗚呼不俟百世斯文已有見矣金谿宰何䖏乆告謚文云惟公志道精專禀資超卓大揚厥㫖以覺後覺其覺維何天降之衷父慈子孝君仁臣忠列聖相傳明若斗極自軻之亡異端蓁塞公實任道手開東明排斥浮偽吾道砥平進而告后志在經邦退而牧民時稱循良天不愸遺山頽木壊惟有文辭方冊是載幸公門人佩訓不忘請謚易名逹于太常公論與賢聖朝輔徳爰賜嘉名世世烜赫象山之學萬古洋洋匪公之榮吾道之光秋九月甲子袁爕作金谿邑庠止善堂記畧云乾道淳熈間象山先生以深造自得之學師表後進其道甚粹而明其言甚平而切凡所以啓告學者皆日用常行之理而毫髮無差昭晣無疑故天下翕然推尊而其教尤著扵所居之金谿今邑之善士趍向不迷有志斯道而恥爲世俗之學蓋其源逺矣理宗紹定三年巳丑夏四月江東提刑趙彦悈重修象山精舎云道在篤行不在空言道在反求不在外􅕽彦悈壮嵗從慈湖㳺慈湖實師象山陸先生甞聞或謂陸先生云胡不註六經先生云六經當註我我何註六經又觀先生與學子帖有反思自得反而求之之訓有朴實一途之說人見其直易或疑以禪學是未之思也誠意正心以至治國平天下原扵致知二字禪矣乎象山蓋學者講肄之地先生沒山空屋傾将遂湮沒載新以存先生之故蹟使人因先生之故蹟思先生之學思先生之教孜孜日思乃不勉不思從容中道是謂大成若夫山林之峻秀景物之幽深棟宇之多寡廢興之源流非學者志不暇盡記之耳紹定四年辛卯夏六月已亥江東提刑袁甫廣㣲建象山書院于貴溪之徐巖先生祠侑以楊敬仲袁和叔𥘉先生本欲剏書院于山間拜命守荆而不果至是袁憲奏建書院以山間不近通道乃命洪季陽相地得徐巖近邑而境勝坐已向亥傅季魯聞而譏之曰書院為講古習禮之所而先聖先師北面學者南面而拜之非禮也宜擇南面之地季陽悚然然巳申聞不復更卜是日祝文云先生之精神其在金谿之故廬優游而容與耶其在象山之精舎言言而語語耶抑周流扵上下四方與天地游與四時序耶甫将指江東聿興正學山之旁近爰咨爰度得勝景扵徐巖離象山而非邈山峰環峙兮髙可仰大溪横陳兮清可濯殆天造而地設匪人謀之攸作是可宅先生之精神無在無不在也先生之道精一匪二掲本心以示人此學門之大致嗣先生之遺響警一世之聾瞶平易切近明白光粹至今讀其遺書人人識我良貴由仁義行與行仁義者昭昭乎易判也集義所生與義襲而取之者截截乎不可亂也宇宙内事已分内事渾渾乎一貫也議論一途朴實一途極天下之䏻言者斯言不可賛也嗚呼先生之學如此先生之精神如此然則在金谿之故廬者如此在象山精舎者如此周流乎上下四方者亦如此孰謂徐巖而獨非如此耶工役俶興禮宜䖍告先生精神淵淵浩浩又作上梁文云盡其心知其性見先生存養之皆天在則人亡則書豈後學講明之無地云云是冬書院落成買田養士冬十月己未袁甫刋先生文集畧云象山先生文集先君子甞刋于江右甫将指江左新建象山書院復摹舊本以惠後學先生發明本心上接古聖下垂萬世偉矣㢤此心神明無體無方日用平夷莫非大道是謂精一是謂彛倫是謂乾徤坤順是謂日月星辰風雨霜露山川草木之變化是謂鬼神之情状先生甞言千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也學者之心即先生之心甫藐焉晚出景慕先生戰兢自勉寡過未能先生之道大矣奚庸賛述姑誦所聞附于卷末十一月朔袁甫遣池州屬官韓祥至書院告先聖文云仰惟先聖之道昭掲萬世後學昏蒙不知吾心即道有宋知荆門軍陸某獨能奮乎百世之下指示道心明白的切闡教象山學者師尊之而歲乆祠圯有司弗葺𬒳命茲來惕然大懼遂卜地扵貴溪之徐巖鼎建書院招延山長俾承學之士相與嚴事先聖朝夕兢惕道心融明所以懋昭象山之教而上繼先聖之綂緒也甫職守攸縻弗皇躬詣祠下心以告矣紹定五年壬辰春三月袁甫至書院釋菜告文云先生之學得諸孟子我之本心先明如此未識本心如雲翳日旣識本心元無一物先生立言本末具備不墮一偏萬世無弊書院肇建躬致一奠可聞非聞可見非見禮畢乃講書貴賤咸集溢塞堂廡以聽講畢續說曰象山先生家學有原一門少長恊力同心所以敬養其親者旣巳恪供子職而伯叔之間自爲師友梭山復齋皆爲一時聞人而先生又傑出其中陋三代以下人物而奮然必以古聖人爲師發明本心嗣續遺響以大警後學之聾聵天下以為真孟子復出也言儒釋之異趨謂釋氏為私吾儒為公釋氏出世吾儒經世故扵綱常所關尤為之反覆致意洎班朝列直道而行不阿世好格心事業斯世深望焉而􅎱嫉者沮之雖一斥不復浩如也乃禮慈湖門人錢時為堂長主教逺近學者聞風雲集至無齋以容之則又修書院之外左方廢寺之法堂以處之也秋閏九月八日賜象山書院額以尚書省劄夀諸石後浙憲陳塤和仲䟦云象山文安先生明本心之㫖啓千古之秘開警群迷迓續道綂如日月之昭掲太嶽之表鎮也于是四方儒彦從者如雲其尤碩大光明者則有慈湖文元楊先生潔齋正獻袁先生淵澄峻發木鐸鏗鍧于以昌我宋文明之治云云紹定六年癸巳春清明日袁甫作象山書院記畧曰寜宗皇帝更化之末年興崇正學尊禮老臣慨念先朝碩儒咸賜嘉謚風厲四方謂象山先生發明本心之學有大功扵世教易名文安庸示褒美扵時慈湖楊先生我先人潔齋先生有位扵朝直道不阿交進讜論寜考動容天下學士想聞風采推考學問淵源所自而象山先生之道益大光明甫承學小子将指江東築室百楹旣壮且安士遐邇咸集齋曰志道明徳居仁由義精舍曰儲雲佩土又皆象山先生之心畫也秋七月辛未日金谿宰天台陳詠之建象山書院于邑治之西傅子雲記𥘉二陸先生祠堂旣立宰以祠右有隙地髙爽乃連甍建書院買田養士申䑓郡禮請傅季魯主教以發明先生之學始至講道聽者甚衆士風翕然向善記畧云象山先生禀特異之資篤信孟子之傳虚見僞說不得以殽其真奪其正故推而訓廸後學大抵簡易明白開其固有無支離繳繞之失而有中㣲起痼之妙士民㑹聼沉迷利慾者惕焉改圖蔽惑浮末者翻然就說膠溺意見者凝然反正莫不知足自知仁足自守勇足自立猶出珠璧扵泥淖而濯之清泉脫鴻鵠扵宻網而㳺之天衢抉浮雲之翳日以開東明而有目者快幽隱纎㣲之覩也豈天以啓悟斯人之徒俾先生㣲覺其天與之善非有識知之私加其間則感速之效固若是耶惜乎天嗇之年志旣不遂而遺文垂世又特見徃來論學之書與夫奏對記序贈說等作然扵著誠息僞興起人心亦可謂有光于孟氏矣理宗皇帝嘉熈元年丁酉秋七月旣望泉使陳塤刋先生語録自爲序云孟子殁千五百餘年宋有象山文安陸先生挺然而興卓然而立昭然而知毅然而行指本心之清明斯道之簡易以啓群心詔後學其教不務繁而本末備其辭不務多而論要明洗章句之塵破意見之窟使聞者渙如躍如知心之即道而不疑其所行茲非晦㝠之日月崖險之津塗丘阜之嵩華歟塤生晩不逮事先生而登慈湖之門固甞服􅈾遺文矣蒙恩司治道由書院瞻謁祠像如獲執經升堂見同門所録訓語編未入梓咸以為請再拜三復乃授工鋟勒焉或謂塤曰近世儒生闡說其徒競出紀録後來者搜拾摹傳雖汗牛充棟且未厭止也子之所得不甚觧約乎塤語之曰先生之道如青天白日何庸語先生之語如震雷驚霆何庸録錄而刋猶以為贅也而今而後有誦斯録能扵數千言之中見一言焉又於其中見無言焉則先生之道明矣敢拱以俟來者淳祐元年辛丑冬十月金谿進義居表青田陸氏來自邯郡其四世諱道卿酌先儒冠婚喪祭之禮行于家家道整肅著聞州里生六子以子貴贈宣教郎素無田産𬞞畦不盈十畆而食指千餘長九思總家務次九叙治藥療次九臯授徒扵家塾以束饈之具𥙷不足率其弟九韶九齡九淵相與講論聖道九淵以其道聚徒講于貴溪之應天山山形類象故學者號稱象山先生彬彬乎儒門州縣以其義聚謹具表進淳祐二年壬寅秋九月勑旌陸氏義門皇帝制曰青田陸氏代有名儒在謚典籍聚食踰千指合㸑二百年一門翕然十世曩㣲惟爾能睦族之道副朕理國之懐宜特褒異勑旌爾門光扵閭里以勵風化欽㢤青田義門家長陸冲進謝恩表十世義居旌表巳頒於廊廟九天申命勑書復卑扵門閭乾坤之露澤新承里宅之風聲益振叨塵過分榮耀下懐臣誠惶誠恐稽首頓首臣聞脩身齊家乃大學之根本化民成俗實聖治之權輿自唐有張公藝以來至我宋彭氏程而下懐終始群居之義乃荷蒙聖典之褒眷念儒門尤加篤愛疇茲二老乃先知先覺之民政奉両朝賜文逹文安之謚旣以千餘指宗枝之衆聚扵二百年古屋之間詩禮相傳饔飱合㸑祗謂閭閻之共䖏詎期綸綍之昭垂郡邑爭先而快覩室家相慶以騰歡自愧深恩孰茲報稱茲蓋恭遇皇帝陛下化民長乆霈澤豐隆中三極以作君奄四海以光澤人䖏唐虞之治比屋可封士遵洙泗之傳里仁爲美遂令瑣末亦𬒳寵榮臣敢不仰體聖恩俯察族類聖益聖明益明長藉照臨之徳老吾老㓜吾㓜盡叨孝弟之誠臣無任瞻天激切屏營之至云淳祐六年丙午春正月二日奉旨旌表門閭𥘉淳祐五年九月漕使江萬里奏撫州金谿青田陸氏義居十世閨門雍肅著于江右是爲淳熈名儒文逹文安之家揆之令典盍表宅里以厲風化里士合詞以請于郡郡下之邑耆老子弟具以實對越三嵗未報後漕使曾頴茂再剡上事下有司考状諏律僉謂宜俞所請扵是丞相白上可其奏是日命始下撫州守趙時煥大書曰道義男曰旌表名儒之家令刻石于門淳祐八年戊申夏五月朔包恢撰旌表門閭記畧云門閭之髙不惟其人此古今所尤難者惟陸氏五世而有文逹文安二大儒以人品之高道術之明特起東南上續道綂實以師表四海非僅以師表一家大學致知誠意正心脩身齊家治國平天下之全體大用具在是矣陸氏所以名家由二先生之名世也淳祐十年庚戌夏五月撫州守葉夣得命金谿宰立更剏祠堂增葺書院𥘉二先生祠與槐堂異處乃命王宰以七月六日鼎剏新祠于槐堂之前翼以四齋環以門廡自是規制悉出扵郡焉記畧云山川炳靈儒英並出美適鍾扵一門教可埀扵百世若金谿三陸先生之祠于學宮者其風化之所係歟三先生學問宏深智識超卓以斯道而任諸身以先知而覺乎後其生也海宇仰而宗之其沒也郡邑尸而祝之朝廷又從而褒之非偶然也秋九月葉夣得建梭山復齋象山三先生祠堂于郡學之東以袁爕和叔傅子雲季魯侑淳祐十一年辛亥春三月望日包恢撰三陸先生祠堂記云以正學名天下而有三先生焉萃在一郡一家若臨川陸氏昆弟者可謂絶無而僅有歟梭山寛和凝重復齋深沉周謹象山光明俊偉此其資也固皆近道矣若其學之淺深則自有能辨之者梭山篤信聖經見之言行推之家法具有典刑雖服先儒之訓而扵理有不可於心者决不苟狥惜其終扵獨善而不及見諸行事之著明爾復齋少有大志浩慱無涯涘觀書無滯碍繙閱百家晝夜不倦自爲士時已有稱其得子思孟子之㫖者其後入太學一時知名士咸師尊之則其學可知矣又惜其在家在鄉僅可見者輔成家道之脩整備禦湖冦之侵軌紀綱肅而蠧弊之悉革誠意孚而人心興起然而爲海内儒宗繫天下之望而恨未得施其一二耳若夫象山先生之言論風㫖發揮施設則有多於二兄者蓋自其㓜時已如成人淵乎似道有定能靜實自天出不待勉強故其知若生知其行若安行粹然純如也蓋學之正而非他以其實而非虗也故先生嘗曰宇宙間自有實理此理苟明則自有實行有實事實行之人所謂不言而信又自謂平生學問惟有一實一實則萬虗皆碎嗚呼彼世之以虚識見虚議論習成風化而未甞一反巳就實以課日進日新之功者觀此亦甞有所警而悟其非乎夫道不虗行若大路然苟得實地而實履之則起自足下之近可逹千里之逺故自仁之實推而至扵樂之實自有樂生惡可巳之妙其實可欲者善也實有諸巳者信也由善信而充實有光輝焉則其實将益美而大是誠之者人之道也由大而化則爲聖而入扵不可知之之神是誠者天之道也此乃孟子之實學可漸進而馴至者然而無有乎爾則亦乆矣先生嘗論學者之知至必其智識能超岀千五百年間名世之士而自以未嘗少避為善之任者非敢奮一旦之决信不敏之意而徒為無忌憚大言也蓋以其𥘉實因深切自反灼見善非外鑠徒以交物有蔽淪胥以亡自此不敢自棄是其深造自得實自孟子故曰孟子之後至是始一明其誰曰不然四方聞其風來學者輻輳先生明扵知人凡所剖决必洞見其肺肝所箴砭必的中其膏肓有感動覺其良心而知其正性者為多然則其學真可質鬼神而無疑俟聖人而不惑者矣昭昭如是豈其間有所疑惑焉殆若不可暁者是又烏得不因以致其辯歟且道義之門自開闢以來一也豈容私立門户乎故其說曰宇宙即是吾心吾心即是宇宙曰學者惟理是從理乃天下之公理心乃天下之同心顔曾傳夫子之道不私夫子之門戸夫子亦無私門戸與人爲私商也曰此理在宇宙間未甞有所隱遁天地所以為天地者順此理而已人與天地並立為三極安得自私而不順此理㢤是先生之學乃宇宙之逹道明矣而或者乃斥以别爲一門何耶釋氏之說自開闢以來無有也豈非横出異端乎故其說曰取釋氏之聖賢而繩以春秋之法童子知其不免曰今若徒自形迹詞語間辨之乃彼所謂職業要其為不守正道無復有毫髪之近是者矣曰方士禪伯真為太祟無此迷惑則無偏無黨王道蕩蕩其樂可量㢤是先生之學非釋氏之邪說亦明矣而或者指以爲禪學又何邪其窮理也則曰積日累月考䆒磨練嘗終日不食而欲究天地之窮際終夜不寝而灼見極樞之不動由積候以考暦數因笛聲以知律吕復齋甞問其用功之䖏則對以在人情物理事勢之間甞曰吾今一日所明之理凡七十餘條曰天下之理無窮以吾之所歴經者言之真所謂伐南山之竹不足以受我辭然其㑹歸總在於此則與徒研窮於方冊文字之中者不同何不知者反謂其不以窮理爲學㢤其讀書也則曰古人爲學即是讀書而以何必讀書然後爲學之反說為證以束書不觀㳺談無根之虗說為病平昔精勤人所不知惟伯兄毎夜必見其觀覧檢閱之不輟嘗明燭至四更而不寐欲沉涵熟復而切已致思欲平淡玩味而氷釋理順此則與徒乾沒扵訓詁章句之末者大異何不知者反妄議其不以讀書為教㢤抑或謂其惟務超悟而不加涵養不求精進也曽不知其有曰惟精惟一涵養湏如是學之正而得所養如木日茂泉日逹孰得而禦之曰雖如顔子未見其止易知易從者實有親有功可乆可大豈若守株坐井然者則如彼或者之所謂者誤矣又或謂其惟尚㨗徑而若無次第若太髙也曽不知其有曰學有本末先後其進有序不容躐等吾所發明端緒乃第一歩所謂升髙自下也曰天所與我至平至直此道本日用常行近乃張大虗聲當無尚虗見無貪髙務逺至有一二問學者惟指其嘗主持何人詞訟開通何人賄賂以折之曰即此是實學如或者之所謂者又誤矣獨所大恨者道明而未盛行爾故上而致君之志僅畧見扵奏對惟其直欲進扵唐虞復乎三代超越乎漢唐此乃朱文公稱其規模宏大源流深逺非腐儒鄙生之所能窺測而語意圓活混浩流轉見其所造深而所養厚也下而澤民之意亦粗見扵荆門惟其以正人心為本而䏻使治化孚洽人相保愛至扵無訟笞箠不施雖如吏卒亦勉以義此乃識者知其有出扵刑政號令之表而周文忠以為荆門之政可驗躬行之效者也然其所用者有限而其所未用者無窮先生以道之廣大悉備悠乆不息而人之得扵道者有多寡乆暫之殊是極其所志非多且乆未巳也故自志學而至從心常言之志所期也嗚呼假之以年聖域固其優入而過化存神上下天地同流之功用非曰小𥙷者亦其所優爲也孰謂其年僅踰中身而止知命㢤遡其㫖與梭山未同者自不嫌於如二三子之不同而有同若復齋則𥘉巳是其說扵鵝湖之㑹終又指言其學之明扵易簀之時則亦無間然矣逮論其文則嘗語學者以窮理實則文皆實又以凡文之不進者由學之不進先生之文即理與學也故精明透徹且多發明前人之所未發炳蔚如也梭山諱九韶字子美復齋諱九齡字子夀謚文逹象山諱九淵字子靜謚文安郡學舊有祠未稱也今郡守國之秘書葉公夣得下車之𥘉士友請易而新之公即慨然曰果非所以嚴事也乃命郡慱士趙與輈相與謀之旋得隙地扵學之西遂肇造祠廟三間翼以両廡前為一堂外為四直舎又外爲書樓下列四齋横開方地地外有竹竹間結亭内外畢備祠貌甚設皆前所未有也庶幾嚴事之禮歟左侑以袁公爕以其爲先生之學而嘗司庾扵是邦且教行扵一道次侑以傅公子雲以其為先生之所與而甞掌正扵是學且師表於後進葉公得傅公之傳而自象山者也祠實經始扵淳祐庚戌之季秋至仲冬而落成云象山先生全集卷之三十六終
