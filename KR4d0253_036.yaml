front:
  text: 象山先生全集卷之三十六
  hash: sha256:3158d6d753a5a750cd75d8801c923a6f9d08e37b5f3f718f35d8a022ee5653a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_036-1a}
body:
  text: 年譜先生諱九淵字子靜姓陸氏陸出媯姓周武王封媯滿于陳春秋時陳公子敬仲適齊别其氏曰田後田氏有齊至宣王時封其少子通于平原陸鄉又别其氏為陸通曽孫烈為吳令子孫避為吳郡吳縣人烈三十九世至希聲論著甚多晚嵗相唐昭宗卒諡文公生六子次子崇生德遷五代末避地于撫州金溪解囊中資裝置田治生資髙閭里為金溪陸氏之祖居延福鄉之青田第四子諱有程先生髙祖也博學于書無所不觀曽祖諱演能世其業寬厚有容祖戬為第四子趣尚清髙不治生産考諱賀字道鄉生有異稟端重不伐究心典籍見于躬行酌先儒冠昏喪祭之禮行于家弗用異教家道整者著聞于州里贈宣教郎生六子長九思字子疆與鄉舉封從政郎弟梭山撰行狀有家問朱子為政略云家問所以詞飾其子孫者不以不得科第為病而深以不識禮義為憂其殷勤懇切反覆曉譬説盡事理無一毫勉強緣飾之意而慈祥篤實之氣藹然諷味數四不能釋手云次九敘字子儀公正通敏時賢稱曰處士善治生總藥肆以足其家先生撰墓表次九臯字子昭少力學文行俱優與鄉舉晚得官終修職郎監潭州南嶽廟名齋曰庸學者號庸齋先生有文集先生撰墓表次九韶字子美不事場屋兄弟共講古學與朱元晦友善首言太極圖説非正又因其奏立社倉之制行于鄉民甚德之與學者講學于近地名梭山梭山在金溪陸氏義門之東是也號曰梭山居士諸司列薦以居士應詔舉遺逸臨終自撰終禮戒不得銘墓有文集曰梭山日記中有居家正本及制用各二篇次九齡字子夀生而頴悟能步移則容止有法少有大志浩博無涯涘嘗與鄉舉輔入太學已負重名知名士無不師尊之登進士第授桂陽教授以不便迎侍陳乞不赴改興國教授未滿丁艱服除授全州教授未上而卒為時儒宗道德繫天下重望特贈朝奉郎直祕閣賜諡文逹名齋曰復學者稱復齋先生有文集行于世嘉定間撫州守髙商老刋文集于郡治自為序先生狀其行吕成公銘其墓朱文公書其碑次則先生與復齋先生齊名稱為江西二陸以比河南二程謹序次家世本末大略于此而先生之道德事功則表年以繫之于后云髙宗紹興九年巳未二月乙亥辰時先生始生紹興十年庚申先生二嵗紹興十一年辛酉先生三嵗幼不戲弄冬十一月十五日母孺人饒氏卒􅌾鄉之楊美嶺紹興十二年壬戌先生四嵗靜重如成人常侍宣教公行遇事物必致問一日忽問天地何所窮際公笑而不答遂深思至忘寢食總角誦經夕不寐不脫衣履有弊而無壞指甲甚修足迹未嘗至庖厨常自灑掃林下宴坐終日立于門過者駐望稱歎以其端莊雍容異常兒紹興十三年癸亥先生五嵗入學讀書紙隅無捲摺紹興十四年甲子先生六嵗侍親會嘉禮衣以華好却不受季兄復齋先生年十三舉禮經以告乃受紹興十五年乙丑先生七嵗得鄉譽嘗云某七八嵗時常得鄉譽只是莊敬自持心不愛戲紹興十六年丙寅先生八歲讀論語學而即疑有子三章及看孟子到曾子不肯師事有子至江漢以濯之秋陽以暴之等語因歎曾子見得聖人髙明潔白如此又丱角時聞人誦伊川語云伊川之言奚為與孔孟之言不類蓋生而清明有如此者梭山嘗云子靜弟髙明自幼巳不同遇事逐物皆有省發嘗聞鼓聲振動窗櫺亦豁然有覺其進學每如此紹興十七年丁卯先生九歲善屬文包敏道祭文云九嵗屬文能自逹紹興十八年戊辰先生十嵗復齋入郡庠侍諸兄誦講衣冠未嘗解弛先生往侍學焉文雅雍容衆咸驚異有老儒謂前廊吳茂榮曰君有愛女欲得佳壻無踰此郎因以為姻紹興十九年已已先生十一嵗讀書有覺從幼讀書便著意未嘗放過外視雖若間暇實勤考索伯兄總家務嘗夜分起見先生觀書或秉燭檢書最會一見便有疑一疑便有覺後嘗語學者曰小疑則小進大疑則大進嘗云向與復齋家兄讀書踈山寺止是一部論語更無他書或問曾見先生將聖人與門人語分門各自録作一處看先生曰此是幼小時事紹興二十年庚午先生十二歲紹興二十一年辛未先生十三歲因宇宙字義篤志聖學與李侍郎及權郡書皆云十三志古人之學先生自三四歲時思天地何所窮際不得至于不食宣教公呵之遂姑置而胸中之疑終在後十餘歲因讀古書至宇宙二字解者曰四方上下曰宇往古來今曰宙忽大省曰元來無窮人與天地萬物皆在無窮之中者也乃接筆書曰宇宙內事乃已分內事已分內事乃宇宙內事又曰宇宙便是吾心吾心即是宇宙東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上至千百世之下有聖人出焉此心此理亦莫不同也故其啓悟學者多及宇宙二字如曰道塞宇宙非有所隱遁在天曰隂陽在地曰剛柔在人曰仁義仁義者人之本心也又曰是理充塞宇宙天地順此而動故日月不過而四時不忒聖人順此而動故刑罰清而民服又曰此理塞宇宙誰能逃之順之則吉逆之則凶又曰宇宙不曾限隔人人自限隔宇宙是年復齋因讀論語命先生近前問云看有子一章如何先生曰此有子之言非夫子之言復齋曰孔門除却曾子便到有子未可輕議先生曰夫子之言簡易有子之言支離復齋嘗于窗下讀程易至艮其背四句反覆誦讀不巳先生偶過其前復齋問曰汝看程正叔此假如何先生曰終是不直截明白艮其背不獲其身無我行其庭不見其人無物復齋大喜紹興二十二年壬申先生十四嵗與徐任伯書曰某氣質素弱年十四五手足未嘗溫暖後以稍知所向體力亦隨壯也嘗云吾于踐履未能純一然才自警䇿便與天地相似紹興二十三年癸酉先生十五嵗𥘉夏侍長上郊行分韻得偕字詩云講習豈無樂鑽磨未有涯書非貴口誦學必到心齋酒可陶吾性詩堪述所懷誰言曾點志吾得與之偕紹興二十四年甲戌先生十六歲讀三國六朝史見夷狄亂華又聞長上道靖康間事乃剪去指爪學弓馬然胸中與人異未嘗失了嘗云做得工夫實則所説即實事所指人病即實病又云吾人讀春秋知中國夷狄之辨二聖之讐豈可不復所欲有甚于生所惡有甚于死今吾人髙居優遊亦可為耻乃懷安非懷義也此皆是實理實説紹興二十五年乙亥先生十七嵗作大人詩見前卷二十五紹興二十六年丙子先生十八歲紹興二十七年丁丑先生十九歲紹興二十八年戊寅先生二十嵗紹興二十九年己卯先生二十一嵗紹興三十年庚辰先生二十二嵗紹興三十一年辛巳先生二十三嵗紹興三十二年壬午先生二十四嵗秋試以周禮鄉舉𥘉先生未肯赴舉復齋素善臨川李侍郎浩每為公言之是年春俾姪煥之侍先生同訪公公觀其贄見之書大竒之留數日力勉其赴舉歸則題秋試家狀者在門閲其籍則諸家經賦咸在惟無周禮先生即以此注籍蒲節後始精考周禮求程文觀之及期三日之試寫其所學無凝滯考官王景文質批曰毫髮無遺恨波瀾獨老成拆號日先生偶過梭山方鼓琴捷吏至曲終而後問之再鼓一曲乃歸先生第四名外舅吳漸第九名見舉送官啓末云某少而慕古長欲窮源不與世俗背馳而非必將與聖賢同歸而止忘巳意之弗及引重任以自強謂先哲同是人而往訓豈欺我窮則與山林之士約六經之旨使孔孟之言復聞于學者逹則與廟堂群公還五服之地使堯舜之化純𬒳于斯民云云先生嘗云吾自應舉未嘗以得失為念場屋之文只是直寫胸襟故作貴溪縣學記云不徇流俗而正學以言者豈皆有司之所棄天命之所遺又嘗云復齋家兄一日問曰吾弟今在何處做工夫某答曰在人情事勢物理上做工夫復齋應之而巳若知物價之低昻與夫辨物之美惡真偽則吾不可謂之不能然吾之所謂做工夫者非此之謂也又云吾家合族而食每輪差子弟掌庫二年某適當其職所學大進這方是執事敬冬十月二十七日丁父宣教公憂􅌾饒州安仁縣崇德鄉之毛源孝宗隆興元年癸未先生二十五嵗隆興二年甲申先生二十六嵗乾道元年乙酉先生二十七嵗有與童伯虞書見前三卷首乾道二年丙戌先生二十八嵗乾道三年丁亥先生二十九歲冬成嘉禮孺人吳氏始大歸也乾道四年戊子先生三十歲乾道五年已丑先生三十一嵗乾道六年庚寅先生三十二嵗乾道七年辛卯先生三十三嵗秋試以易經再鄉舉考官批義卷云如端人正士衣冠佩玉論䇿批如其義得解見提舉書見前卷四八月十七日子持之生乾道八年壬辰先生三十四嵗春試南宫奏名時尤延之袤知舉吕伯恭祖謙為考官讀先生易卷至狎海上之鷗逰吕梁之水可以謂之無心不可以謂之道心以是而洗心退藏吾見其過焉而溺矣濟溱洧之車移河內之粟可以謂之仁術不可以謂之仁道以是而同乎民交乎物吾見其淺焉而膠矣擊節嘆賞又讀天地之性人為貴論至嗚呼循頂至踵皆父母之遺體俯仰乎天地之間惕然朝夕求寡乎愧怍而懼弗能倘可以庶幾于孟子之塞乎天地而與聞夫子人為貴之説乎愈加嘆賞至䇿文意俱髙伯恭遽以內難出院乃囑尤公曰此卷超絶有學問者必是江西陸子靜之文此人斷不可失也又併囑考官趙汝愚子直二公亦嘉其文遂中選他日伯恭會先生曰未嘗欵承足下之教一見髙文心開目明知其為江西陸子靜也徐誼子宜侍學子宜侍先生每有省同赴南宫試論出天地之性人為貴試後先生曰某欲説底却𬒳子宜道盡但某所以自得受用底子宜却無曰雖欲自異于天地不可得也此乃某平日得力處夏五月廷對賜同進士出身先生既奏名聲振行都廷對考官意其必慷慨極言天下事欲取置首列及唱第乃在末甲或問之先生曰見君之𥘉豈敢過直識者稱其得事君之體云在行都諸賢從遊先生朝夕應酬問答學者踵至至不得寢者餘四十日所以自奉甚薄而精神益強聼其言者興起甚衆時永嘉蔡幼學行之為省元連日無所問難似不能言者先生從容問其所志乃答曰幼學之志在于為善而已先生嘉嘆而勉勵焉四明楊敬仲時主富陽簿攝事臨安府中始承教于先生及反富陽三月二十一日先生過之問如何是本心先生曰惻隱仁之端也羞惡義之端也辭讓禮之端也是非智之端也此即是本心對曰簡兒時巳曉得畢竟如何是本心凡數問先生終不易其説敬仲亦未省偶有鬻扇者訟至于庭敬仲斷其曲直訖又問如𥘉先生曰聞適來斷扇訟是者知其為是非者知其為非此即敬仲本心敬仲忽大覺始北面納弟子禮故敬仲每云簡發本心之問先生舉是日扇訟是非答簡忽省此心之無始末忽省此心之無所不通先生嘗語人曰敬仲可謂一日千里復齋與學者書云子靜入浙則有楊簡敬仲石崇昭應之諸葛誠之胡拱逹才髙宗商應時孫應朝季和從之遊其餘不能悉數皆亹亹篤學尊信吾道甚可喜也先生六月二十九日復如富陽七月𥘉九日舟離富陽秋七月十六日至家逺近風聞來親炙𥘉以存名讀書之齋與曽宅之書云某舊亦嘗以存名讀書之齋家之東扁曰槐堂槐堂前有古槐木至今猶存乃學徒講學之地又堂東有陋室西有髙軒北囱南囱東有隱室又曰留軒西有玉淵又近家之西有茅堂與包顯道書云貴溪桂店一族甚盛其子弟有德輝者今夏來處茅屋西南有八石寺與顔子堅書云向者任八石寺嘗納區區之忠先生既受徒即去今世所謂學規者而諸生善心自興容禮自莊雍雍于于后至者相觀而化蓋先生深知學者心術之微言中其情或至汗下有懷于中而不能自曉者為之條析其故悉如其心亦有相去千里素無雅故聞其大槩而盡得其為人嘗有言曰念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正有可以形迹觀者有不可以形迹觀者必以形迹觀人則不足以知人必以形迹繩人則不足以救人又曰今天下學者唯兩途一途朴實一途議論同里朱桴濟道弟泰卿亨道長於先生皆來問道與人書云近到陸宅先生所以誨人者深切著明大槩是令人求放心其有志于學者數人相與講切無非此事不復以言語文字為意令人歎仰無已其有意作文者令收拾精神涵養德性根本既正不患不能作文陳正已劉伯文皆不為文字也旴江傅子淵云夢泉向來只知有舉業觀書不過資意見耳後因困志知反時陳正已自槐堂歸問先生所以教人者正已曰首尾一月先生諄諄只言辨志又言古人入學一年早知離經辨志今人有終其身而不知自辨者是可哀也夢泉當時雖未領略終念念不置一日讀孟子公孫丑章忽然心與相應胸中豁然蘇醒嘆曰平生多少志念精力却一切著在功利上自是始辨其志雖然如此猶未知下手處及親見先生方得箇入頭處嘗云傅子淵自此歸其家陳正已問之曰陸先生教人何先對曰辨志復問曰何辨對曰義利之辨若子淵之對可謂切要周伯熊來學先生問學何經對曰讀禮記曾用工于九容乎曰未也且用功于此後往問學于晦庵晦庵曰仙里近陸先生曾見之否曰亦嘗請教具述所言晦庵曰公來問某某亦不過如此説答諸葛受之書見前卷三答舒西美書見前卷五乾道九年癸巳先生三十五嵗春閏二月十四日答陳正已書見前卷十二三月十七日和王弱翁銓闈中詩冬十一月送毛原善序見前卷二十淳熙元年甲午先生三十六嵗三月赴部調官過四明遊會稽浹兩旬復至都下授迪功郎隆興府靖安縣主簿五月二十六日訪吕伯恭于衢伯恭與汪聖錫書云陸君相聚五六日淳篤敬直流輩中少見其比又與陳同甫書云自三衢歸陸子靜相待纍日又晉七八日昨日始行篤實淳直朋遊間未易多得渠云雖未相識每見尊兄文字開豁軒翥甚欲得相聚覺其意甚勤非論文者也與徐子宜書見前卷五秋八月十二日子循之生淳熙二年乙未先生三十七嵗吕伯恭約先生與季兄復齋會朱元晦諸公于信之鵝湖寺復齋云云見前卷三十四元晦歸後三年乃和前詩云德業流風夙所欽别離三載更關心偶携藜杖出寒谷又枉藍輿度逺岑舊學商量加邃密新知培養轉深沉只愁説到無言處不信人間有古今後信州守楊汝礪建四先生祠堂于鵝湖寺勒陸子詩于石復齋與張欽夫書云某春末會元晦于鉛山語三日然皆未能無疑按吕成公譜乙未四月訪朱文公于信之鵝湖寺陸子靜子夀劉子澄及江浙諸友皆會留止旬日鄒斌俊父録云朱吕二公話及九卦之序先生因亹亹言之大略謂復是本心復處如何列在第三卦而先之以履與謙蓋履之為卦上天下澤人生斯世須先辨得俯仰乎天地而有此一身以逹于所履其所履有得有失又繫于謙與不謙之分謙則精神渾收聚于內不謙則精神渾流散于外惟能辨得吾一身所以在天地間舉錯動作之由而斂藏其精神使之在內而不在外則此心斯可得而復矣次之以常固又次之以損益又次之以困蓋本心既復謹始克終曽不少廢以得其常而至于堅固私欲日以消磨而為損天理日以澄瑩而為益雖涉危蹈險所遭多至于困而此心卓然不動然後于道有得左右逄其原如鑿井取泉處處皆足蓋至于此則順理而行無纎毫透漏如巽風之散無往不入雖密房奧室有一縫一罅即能入之矣二公大服朱亨道書云鵝湖講道切誠當今盛事伯恭蓋慮陸與朱議論猶有異同欲會歸于一而定其所適從其意甚善伯恭蓋有志于此語自得則未也臨川趙守景明邀劉子澄趙景昭景昭在臨安與先生相欵亦有意于學又云鵝湖之會論及教人元晦之意欲令人泛觀慱覽而後歸之約二陸之意欲先發明人之本心而後使之慱覽朱以陸之教人為太簡陸以朱之教人為支離此頗不合先生更欲與元晦辨以為堯舜之前何書可讀復齋止之趙劉諸公拱聼而已先發明之説未可厚誣元晦見二詩不平似不能無我元晦書云某未聞道學之懿茲幸獲奉餘論所恨匆匆别去彼此之懷皆若有未既者然警切之誨佩服不敢忘也還家無便寫此少見拳拳冬十一月十五日作敬齋記見前卷十九淳熙三年丙申先生三十八嵗與王順伯書再書俱見前卷二淳熙四年丁酉先生三十九嵗春正月十四日丁繼母太孺人鄧氏憂􅌾鄉之官山先生事繼母與諸兄曲盡孝道嘗聞孝宗皇帝聖語陸九淵滿門孝弟者也淳熙五年戊戌先生四十嵗淳熙六年巳亥先生四十一嵗服除授建寧府崇安縣主簿淳熙七年庚子先生四十二嵗在滋瀾先生因居之南五里有園林屋宇扁是名與包顯道書云今歲與朋友讀書在滋瀾春聞張欽夫卒與包顯道書見前卷六秋九月二十九日季兄復齋先生卒復齋臨終云比來見得子靜之學甚明恨不更相與切磋見此道之大明耳先生嘗曰復齋先生涵養深密躬行篤實朱元晦與林擇之書云陸子靜兄弟其門人有相訪者氣象皆好此間學者却與渠相反𥘉謂只在此講道漸涵自能入德不謂末流之弊只成説話至人倫日用最切近處都不得毫末氣力不可不深懲而痛警之也冬十一月望日作復齋行狀十二月己酉􅌾于鄉之萬石塘淳熙八年辛丑先生四十三嵗春二月訪朱元晦于南康時元晦為南康守與先生泛舟樂曰自有宇宙以來已有此溪山還有此佳客否乃請先生登白鹿洞書院講席先生講君子喻于義小人喻于利一章畢乃離席言曰熹當與諸生共守以無忘陸先生之訓再三云熹在此不曽説到這裏負愧何言乃復請先生書其説先生書講義見前二十三卷尋以講義刻于石先生云講義述于當時發明精神不盡當時説得來痛快至有流涕者元晦深感動天氣微冷而汗出揮扇元晦又與楊道夫云曾見陸子靜義利之説否曰未也曰這是子靜來南康熹請説書却説得這義利分明是説得好如云今人只讀書便是利如取解後又要得官得官後又要改官自少至老自頂至踵無非為利説得來痛快至有流涕者秋作祭吕伯恭文見前卷二十六丞相少師史浩薦先生六月二十三日得旨都堂審察升擢先生不赴薦云陸某淵源之學沉粹之行輩行推之而心理悟融出于自得者也淳熙九年壬寅先生四十四嵗項平甫來書略云安世聞陸先生之名言者不一往得交于傳子淵警發柔惰自此歸向取師之意始定奉親之官越土多見髙第及門子弟愈覺不能自已雖未得親承于罄咳然受沾汚渥亦已多矣獨念心師之久不可不以尺紙布萬一伏乞加察一二年來數巨公相繼淪落任是事者獨先生與朱先生耳侍從復上薦得旨與職事官薦辭未詳除國子正秋𥘉先生赴國學與陳倅書見前卷七始講書八月十七日講春秋六章九月享明堂為分獻官淳熙十年癸卯先生四十五嵗在國學二月七日講春秋九章七月十五日講春秋五章十一月十三日講春秋四章諸生叩請孳孳啓諭如家居教授感發良多朱元晦來書略云比約諸葛誠之在齋中相聚極有益浙中士人賢者皆歸席下比來所得為多幸甚再書云歸來臂痛病中絶學損書却覺得身心收𬋩似有少進處向來泛濫真是不濟事恨未得欵曲承教盡布此懷也項平甫再書略云某自幼便欲為善士今年三十一矣欲望尊慈特賜指教云云答書不傳按朱元晦答平甫書云所語六國正語三復爽然所以警于昏者為厚矣大抵子思以來教人之法尊德性道問學兩事為用力之要今子靜所説尊德性而某平日所聞却是道問學上多所以為彼學者多持守可觀而看道理全不仔細而熹自覺于義理上不亂説却于緊要事上多不得力今當反身用力去短集長庶不墮一邉耳先生聞之曰朱元晦欲去兩短合兩長然吾以為不可既不知尊德性焉有所謂道問學冬遷敕令所刪定官先生在敕局同志之士相從講切不替僚友多賢相與問辨大信服與漕使尤延之書略云朱元晦在南康已得太嚴之聲元晦之政亦誠有病然恐不能泛然以嚴病之使罰當其罪刑故無小遽可以嚴而非之乎某嘗謂不論理之是非事之當否而泛然為寬嚴之論者乃後世學術議論無根之弊道之不明政之不理由此其故也元晦浙東救旱之政比者屢得浙中親舊書及道途所傳頗知梗槩浙人殊賴自劾一節尤為適宜其誕慢以僥寵祿者當少阻矣至如其間言事處誠如來諭所言者云嚴陵詹子南侍學阜民𥘉見先生不能盡記所言大指云凡欲學者當先識義利公私之辨今所學果為何事人生天地間為人自當盡人道學者所以為學學為人而巳非有為也又云孔子弟子如子遊子夏宰我子貢雖不遇聖人亦足以號名學者為萬世師然卒得聖人之傳者回之愚參之魯蓋病後世學者溺于文義知見徼繞蔽惑愈甚不可入道耳阜民既還邸遂屏棄諸書及後來疑其不可又問先生則曰某何嘗不許人讀書不知此後有事在又曰讀書不必窮索平易讀之識其可識者久將自明毋恥不知先生舉孟子鈞是人也一章云須先使心官不曠其職子南因是便收此心如此半月一日下樓忽覺此心已復澄瑩中立遂見先生先生目逆而視之曰此理巳顯也淳熙十一年甲辰先生四十六嵗在敕局春祀祚德廟為獻官記事始末書于祠下朱元晦書略云敕局時與諸公相見亦有可告語者否于律令中極有不合道理不近人情處隨事改正得一二亦佳中薦程可久于法令甚精可以入局中然此猶是第二義不知輪對班在何時果得一見明主就緊要處下得數句為佳其餘屑屑不足言也謙仲甚不易得今日尚有此公差強人意元善爽快極難得更加磨琢沉浸之功乃佳機仲既得同官乃其幸會當能得日夕親炙也浙東諸朋友想時通問亦有過來相聚者否立之墓表今作一通顯道甚不以為然不知尊意以為如何三月十三日答朱元晦書見前卷七編朱元晦奏立社倉事戊申嵗先生兄梭山居士欲立社倉于青田先生與趙監書見前卷首上殿輪對五劄時對期甚迫猶未入思慮所親纍請久乃下筆繕寫甫就厥明即對五劄俱見前卷十八讀劄末云見前三十五卷語録講究武略先生少時聞靖康間事慨然有感于復讐之義至是訪求智勇之士與之商確益知武事利病形勢要害李將使雲將家子也興國人有勇力先生竒而教之後獲用太尉畢再遇帳下其家祠事先生或問何為曰雲少時嘗欲率伍百人打劫起事一日往見先生蒙誨翻然而改不然此身不得為人矣先生平日奬激人才類如此後守荆門奬拔竒才亦多論醫國或問先生見用以何醫國先生曰吾有四物湯問如何曰任賢使能賞功罰罪論駁中外奏對不可行者答蘇宰書見前卷十朱元晦書時有言奏劄差異者元晦索之先生納去一本元晦貽書云奏篇垂示得聞至論慰沃良深其規模宏大源流深逺豈腐儒鄙生所可窺測然區區私憂未免有萬牛回首之歎然于我何病耶語圓意活混浩流轉益見所養之深所蓄之厚但向上一路未曽撥著答朱元晦書略云奏劄獨蒙長者褒揚奬譽之厚俱無以當之深慚踈愚不能回互藏匿肺肝悉以書寫而兄尚有向上一路未曽撥著之疑豈待之太重望之太過未免金注之昏耶改授承奉郎以修寬恤詔令書成與樞密使王謙仲語及孟子辟土地充府庫一段因云方今正在求此輩而不可得謙仲為之色變又舉柳子厚捧土揭木而致之廟堂之上蒙以紱冕翼之徒隸而趨走其左右豈有輔于萬事之勞苦哉聖人之道無益于世凡以此也謙仲為之默然先生嘗云當時諸公見上下相安內外無事便為太平氣象獨鄭漙之有一語極好而今只要為虜人借路登泰山云耳秋九月既望作外舅吳公行狀末云某在童稚時為公所知後妻以其女尤延之作吳公墓志云陸君子靜數為豫道其婦翁吳公之賢居亡何有墨服踵門而求見者則吳公之子顒若也袖子靜之狀且告曰敢因子靜以請志豫不識吳公然子靜信人也其言有證乃敘而志之夫能識子靜于童幼之中而能以子妻之其賢可知矣後敬仲作孺人吳氏墓志云孺人諱愛卿吳公茂榮諱漸之長女也幼有異質女工不學而能詩書過目不忘公大竒之一見先生謂可妻歸焉先生為國子正刪定勑局居中五年四方之賓滿門旁無虛宇併假于館中饋百需先生不一啓齒孺人調度有方舉無缺事暨先生奉祠歸囊蕭然同僚共贐之還里之明年經理象山孺人捐奩中物助之云云作本齋記為成都郭醇仁作淳熙十二年乙巳先生四十七嵗在勑局與尢延之書略云此間不可為久居之計吾今終日區區豈不願少自效至不容著腳手處亦只得且退而俟之職事間又無可修舉覩見弊病又皆須自上靣理會下來方得在此但望輪對可以少展胸臆對班尚在後年鬱鬱度日而已或勸以小人闖伺宜乞退先生曰吾之未去以君也不遇則去豈可以彼為去就耶詹子南問學子南嘗問先生之學亦有所受乎曰因讀孟子而自得之于心也淳熙十三年丙午先生四十八嵗在勑局夏五月作格矯齋記為三衢徐載書朱元晦通書略云傅子淵去冬相見氣質剛毅極不易得但其偏處亦甚害事雖嘗苦口恐未以為然近覺當時説得亦未的疑其不以為然也今想到部必巳相見亦嘗痛與砭劑否道理極精微然𥘉不在耳目聞見之外是非黑白只在面前此而不察乃𣣔别求玄妙于意慮之表亦巳誤矣熹衰病日侵所幸邇來日用工夫頗覺省力無復向來支離之病甚恨未得從容面論未知異時尚復有異同否耳轉宣義郎除將作監丞給事王信疏駁十一月二十九日得旨主管台州崇道觀𥘉親朋謂先生久次宜求退先生曰往時面對粗陳大義明主不以為非思欲再望清光少自竭盡以致臣子之義距對班五日除監丞先生與李成之書見前卷十和楊萬里廷秀送行詩見前卷二十五既歸學者輻輳時鄉曲長老亦俯首聼誨每詣城邑環坐率二三百人至不能容徙寺觀縣官為設講席于學宫聼者貴賤老少溢塞途巷從遊之盛未見有此與朱子淵書見前卷十三淳熙十四年丁未先生四十九嵗春如臨川先生訪倉使湯公思謙公因言風俗不美先生曰乍歸方欲與諸後生説些好話此事亦由天亦由人公曰如何由天曰且如三年一科舉中者篤厚之人多浮薄之人少則風俗自此而厚不幸篤厚無幾或全是浮薄則後生從而視效風俗日以敗壞公曰如何亦由人曰監司守令是風俗之宗主只如判院在此無只為位髙爵重旗旄導前驅卒擁後者是崇是敬陋巷茅茨之間有篤敬忠信好學之士不以其微賤而知崇敬之則風俗庶幾可回矣公再三稱善次日謂幕僚友曰陸丈至誠何不去聼説話幕僚云恐陸丈門户髙峻議論非某輩所能喻公曰陸丈説話甚平正試往聼看某于張吕諸公皆相識然如陸丈説話自是不同作朱元瑜名字説見前卷二十登貴溪應天山講學𥘉門人彭興宗世昌訪舊于貴溪應天山麓張氏因登山遊覽則陵髙而谷邃林茂而泉清乃與諸張議結廬以迎先生講學先生登而樂之乃建精舍居焉與楊敬仲書云精舍二字出後漢包咸傳其事在建武前儒者講習之地用此名甚無歉也答江西程帥叔逹惠新刋江西詩派劄子答沈宰書見前卷十七包敏道跋江泰之所收劄子墨迹云象山先生論詩又出告往知來以意逆志者之外蓋其精鑑如權度舉天下之輕重長短毫髮絲粟不可得而加損也豈特於詩為然哉當程君劄送詩至時僕在席下先生顧諸生曰誰能代答須臾呈藁者數人先生嘆曰將紙來一筆寫就云云夏五月答馮傳之書見前卷十三𥘉冬答朱元晦書見前卷十三元晦答書略云所諭與令兄書辭費而理不明今亦不記當時作何語恐或實有此病承許條析見教何幸如之虛心以俟幸因早便見示如有未安却得細論未可便似居士兄遽斷來章也辨無極太極始此無營齋説贈吳叔有冬十月庚辰􅌾仲兄子儀于臨川之羅首峯下作子儀墓志十一月作宜章學記十二月與漕使宋若水書言金溪月樁之重及臺郡督積欠困民之弊見前卷八淳熙十五年戊申先生五十嵗在山間精舍春正月作荆國王文公祠堂記與薛象先書見前卷十二先生嘗云讀介甫書見前卷二十五答倉使趙汝謙書俱見前首卷易應天山名為象山學徒結廬先生既居精舍又得勝處為方丈及部勒群山閣又作圓庵學徒各來結廬相與講習與姪孫濬書云山間近來結廬者甚衆諸生始聚糧相迎今方丈前又成一閣部勒群山氣象亦偉云云居仁齋由義齋養正堂張伯強明德張行巳志道周孚先儲雲伯強行巳佩玉張少石愈髙倪伯珍規齋祝才叔蕙林周元忠逹誠朱幹叔瓊芳傳季魯學徒馮泰卿𥘉名梅囱以季魯家諱先生為改今名濯纓池浸月池吳子嗣創齋先生與之書云草廬在二池之間欲名以濯纓當為書之封庵少石批荆先生書于世昌之堂各因山勢之髙原塢之佳處為之三月與江西帥王謙仲書見前卷九五月與錢守伯同書見前卷九郡縣禮樂之士時相謁訪喜聞其化故四方學徒大集先生從容講道歌詠愈愈有終焉之意馮元質云先生常居方丈每旦精舍鳴鼓則乘山簥至會揖升講坐容色粹然精神炯然學者又以一小牌書姓名年甲以序揭之觀此以坐少亦不下數十百齊肅無譁首誨以收斂精神涵養德性虛心聼講諸生皆俯首拱聼非徒講經每啓發人之本心也間舉經語為證音吐清響聼者無不感動興起𥘉見者或欲質疑或欲致辨或以學自負或有立崖岸自髙者聞誨之後多自屈服不敢復發其有欲言而不能自逹者則代為之説宛如其所欲言乃從而開發之至有片言半辭可取必奬進之故人皆感激奮礪平居或觀書或撫琴佳天氣則徐步觀瀑至髙誦經訓歌楚詞及古詩文雍容自適雖盛暑衣冠必整肅望之如神諸生登方丈請誨和氣可掬隨其人有所開發或教以涵養或曉以讀書之方未嘗及間話亦未嘗令看先儒語録每講説痛快則顧傅季魯曰豈不快哉季魯齒最少坐必末嘗挂一座于側間令代説時有少之者先生曰季魯英才也先生大率二月登山九月末治歸中間亦往來無定居山五年閲其簿來見者踰數千人與陳宰書云同志之士方此盍簮紬繹簡編商略終古粗有可樂雖品質不齊昏明異趣未能純一而開發之驗變化之證亦不可謂無其涯也倘得久于是山以既厥事是所願幸傅季魯云先生居山多告學者云汝耳自聰目自明事父自能孝事兄自能弟本無少缺不必他求在乎自立而巳學者于此多有興起有立議論者先生云此自是虛説此是時文之見常曰今天下學者有兩途惟朴實與議論耳毛剛伯必疆云先生之講學也先欲復本心以為主宰既得其本心從此涵養使日充月明讀書考古不過欲明此理盡此心耳其教人為學端緒在此故聞者感動當時先生與晦翁門徒俱盛亦各往來問學晦庵門人乍見先生教門不同不與解説無益之文義無定本可説卒然莫知所適從無何辭去歸語師友往往又失其本旨遂起晦翁之疑良可慨嘆或問先生之學自何處入先生曰不過切已自反改過遷善又曰吾之學問與諸處異者只是在我全無杜撰雖千言萬語只是覺得他底在我不曾添一些且又曰吾之與人言多就血脈上感動他故人之聼之者易章仲至云先生講論終日不倦夜亦不困若法令者之為也動是三鼓學者連日應酬勞而蚤起精神愈覺炯然問曰先生何以能然先生曰家有壬癸神能供千斛水嚴松年問今學者為誰先生屈指數之以傅子淵居其首鄧文範傅季魯黃元吉居其次且云浙間煞有人有得之深者有得之淺者有一見而得之者有久而後得之者廣中一陳去華省發偉特惜乎此人亡矣朱元晦語録云今浙東學者多子靜門人類能卓然自立相見之次便毅然有不可犯之色自家一輩朋友又却覺不振又云子靜之門如楊簡輩躬行皆有可觀又與詹侍郎書云髙教授能晉意學校甚善渠從子靜學有意為巳必能開導其人也又與劉仲復書云陸丈回書其言明當且就此持守自見功效不須多疑多問却轉迷惑論解書南豐劉敬夫學周禮見晦庵晦庵令其精細考索後見先生問見朱先生何得敬夫述所教先生曰不可作聰明亂舊章如鄭康成注書枘鑿最多讀經只如此讀去便自心解注不可信或是諱語或是莾制傅季魯保社中議此甚明可一往見之于是往問于季魯又嘗曰解書只是明他大義不入巳見于其間傷其本旨乃為善解書後人多以巳意其言每有意味而失其真實以此徒支離蔓衍而轉為藻繪也又嘗曰河圖屬象洛書屬數先天圖非聖人作易之本旨有據之于説易者陋矣又嘗曰後世之論春秋者多如法令非聖人之旨也觀春秋詩書易經聖人手則知編論語者亦有病顧記禮之言多原老氏之意論傳道與姪孫濬書見前首卷先生有云學者至本朝而始盛自周茂叔發之又云韓退之言軻氏之死不得其傳故不敢誣後世無賢者然直是至伊洛諸公得千載不傳之學但草創未為光明今日若不大段光明更幹當甚事又云二程見茂叔後吟風弄月而歸有吾與點也之意後來明道此意却存伊川巳失此意又云元晦似伊川欽夫似明道伊川蔽錮深明道却疏通又云道譬則水人之于道譬則蹄涔則汙沱百川江海也海至大矣而四海之廣狹淺深不必齊也至其為水則蹄涔亦水也又嘗以手指心曰某有積學在此惜未有承當者夏四月望日與朱元晦書辨太極圖説見前卷二與提刑應仲實書見前卷十與趙詠道書見前卷十二秋八月逰仙巖題新興寺壁見前卷二十訪江西帥王謙仲時帥幕邵叔誼在坐聼談命者曰吾之談命異于是伯夷叔齊餓死于首陽之下民到于今稱之此命極好齊景公有馬千駟死之日民無德而稱焉此命極不好先生與叔誼書見前首卷作南豐黃世成及慈溪楊承奉二墓銘先生每謂墓非古而銘多溢辭故不苟作余銘南豐慈溪二君之墓海內名識謂無愧辭十二月十四日答元晦書見前卷二又别幅云大傳曰在天成象在地成形又曰見乃謂之象形乃謂之器見乎上者可得而見矣猶不謂之形而謂之成象必形乎下可得而用者乃始謂之器易之言器本于聖人備物致用立成器以為天下利如網罟耒耜車輿門柝杵臼弧矢棟宇棺槨之類乃所謂器也昔者聖人之制斯器也蓋取諸易之象易有聖人之道四而制器尚象與居一焉道者天下之所由而聖人則能知之器者天下之所利而聖人則能制之由其道而利其器在一身則為有道之人在天下則為有道之世不由其道而利其器則為無道矣誰能出不由户何莫由斯道也然中人以下則由而不知蓋其知識卑近所見淺末形而下者所能由形而上者所不能知故曰民可使由之不可使知之非有知道者以長治之左右之則趨于下惟利之見而不由其道矣上必有下下必有上上而無下何以為上下而無上何以為下道之與器未始相無不由其道而利其器器者非其有矣負且乘致冦至此之謂也故惟聖人為能制器精義入神所以致用利用安身所以崇德百慮一致道固然也化而裁之謂之變推而行之謂之通舉而措之天下之民謂之事業非知道者孰能與于此故道者形而上者也器者形而下者也器由道者也一隂一陽之謂道繼之者善也而謂其屬于形器不得為道其為昧于道器之分也甚矣聞朱元晦詩喜詩云川源紅緑一時新暮雨朝晴更可人書册埋頭何日了不如拋却去尋春先生聞之色喜曰元晦至此有覺矣是可喜也淳熙十六年已酉先生五十一嵗祠秩滿在山間方丈春正月朱元晦來書略云老氏之言有無以有無為二周子之言有無以有無為一更請子細著眼未可容易譏評也無極而太極如曰無為之為非謂别有一物也非如皇極民極之有方所有形象而但有此理之至極耳又别紙末云如曰未然則我日斯邁而月斯征各尊所聞各行所知亦可矣無復可望其必同也題逹本庵詩梁光結廬其親塋名曰逹本求言于豫敬賦是詩以助孝德詩云孩提無不愛其親不失其心即大人從此勸君休外慕悅親端的在誠身夀皇內禪光宗皇帝即位詔先生知荆門軍先生始欲著書嘗言諸儒説春秋之謬尤甚于諸經將先作傳值得守荆之命而不果覃恩轉宣教郎夏六月與黃循中書見前卷十二磨勘轉奉議郎答趙然道書見前卷十二秋七月四日與朱元晦書見前卷二七日贈踈山益侍者帖見前卷二十八月六日元晦答書云荆門之命少慰人意今日之計惟僻且逺猶或可以行志想不以是為厭三年有半之間消長之勢又未可以預料流行坎止亦非人力所能為也聞象山墾闢架鑿之功蓋有緒來學者亦益甚恨不得一至其間觀竒覽勝某春首之書詞氣粗率既發即知悔之然巳不及矣論無極之辨與陶贊仲書再書俱見前卷十五論私立門户之非與唐司法書見前卷十五朱元晦論學徒競辨之非答諸葛誠之書云示諭競辨之論三復悵然愚深欲勸同志者兼取兩家之長不輕相詆毀就有未合亦且置勿論而力勉于吾之所急吾人所學喫緊著力處正天理人欲相去之間如今之論則彼之因而起者于二者之間果何處乎子靜平日自任正欲身率學者于天理不以一毫人欲雜于其間恐決不至如賢者之所疑也包顯道侍晦庵有學者因無極之辨貽書詆先生者晦庵復其書云南渡以來八字著腳理會著實工夫者惟某與陸子靜二人而巳某實敬其為人老兄未可以輕議之也秋八月十一日答趙詠道書見前卷十二答曾宅之書見前卷首與姪孫濬書見前卷十四冬十月朔作外姑黃夫人墓銘自云先丈母志銘敘次頗復明暢云與王順伯書見前卷十一冬至前五日跋曽裘甫答屈待舉詩後三日逰翠雲寺題名于壁先生逰翠雲寺帖見前卷二十光宗紹熙元年庚戌先生五十二嵗在山間方丈春正月與姪孫濬書見前卷十四三月二十六日與包敏道書見前卷十四夏五月作經德堂記堂名取諸孟子經德不回六月旱十三日石灣禱雨十六日謝雨俱見前卷二十六秋八月二十六日作貴溪縣重修學記見前卷十九與饒夀翁書見前卷十與郭邦逸書見前卷十三作玉芝歌見前卷二十五與路彥彬書略云切不自揆區區之學自謂孟子之後至是而始一明也紹熙二年辛亥先生五十三歲在山間方丈春二月與劉伯協書俱見前卷十二三月三日與林叔虎書見前卷九跋資國寺雄石鎮帖寺在象山之西址隔溪之山間先生往來必憩焉夏六月作武陵縣學記見前卷十九中浣作臨川簿廳壁記簿長季海得旨疾速之任云云俱見前卷三十五語録囑傅季魯居山講學先生將之荆門謂季魯曰是山繄子是賴其為我率諸友日切磋之吾適小障不得為諸友掃淨氛穢幸有季魯在願相依親近秋七月四日啓行十一日書贈陳晉卿名時為撫州學官書見前卷二十九月三日至荆門軍舟車所經見豐城王允文祭文云南浦維舟徑浮彭蠡覽竒康廬濯纓瀑水潯陽晚薄齊安晝艤臨臯雪堂周覽遺趾長淮以西野岸曠平撰杖西風或憩柴荆桑棗蔭塗葭葦連汀笑談之間造微詣精黃鶴入雲芳洲在目憑髙倣古北轅西輻薄于開藩霜蕚破菊云即日親事上謝表表見前卷十八吏以故例云俱見前二十二卷與羅點春伯書見前卷十五與漕使薛象先叔似書與漕使論民間疾苦俱見前卷十五新築城荆門素無城壁先生以為此自古戰爭之場今為次邉在江漢之間為四集之地南捍江陵北援襄陽東護隋郢之脅西當光化夷陵之衝荆門固則四鄰有所恃否則有背脅腹心之虞雖四山環合易于備禦義勇數千強壯可用而倉廩府庫之間麋鹿可至纍議欲修築子城憚重費不敢輕舉先生審度決計召集義勇優給庸直躬自勸督役者樂趨竭力功倍二旬訖築𥘉計者擬費緡錢二十萬至是僅費五千而土工畢復議成砌三重置角臺增二小門上至敵樓衝天渠荷葉渠護險牆之制畢備才費緡錢三萬郡學貢院及客館官舍衆役並興𥘉習俗侑人以執役為耻吏為好衣間觀至是此風一變督役官吏布衣雜役夫佐力相勉以義不專以威盛役如此而人情晏然郡中恬若無事革稅務之弊革弊政事俱見前卷三十三朔望及暇日詣學講誨諸生紹熙三年壬子先生五十四嵗在荆門春正月十三日郡有故事會吏民講洪範五皇極一章上元設醮黃堂其説曰為民祈福先生于是會吏民講洪範斂福錫民一章以代醮事發明人心之善所以自求多福者莫不曉然有感于中或為之泣有講義仍書河圖八卦之象洛書九疇之數于後以曉後學更定圖書與今世所傳者不同所以復古圖書之舊也先生未及著書發明後學傅季魯作釋義以明之二十四日與姪煥之書略云正月十三日以講義代醮除官員士人吏卒之外百姓聼講者不過五六百人以不曽告戒也然人皆感動其所以相孚信者又在言語之外也比間不復挂放狀牌人有訴事不拘早晚接受雖入夜未閉門時亦有來訴者多立遣之壓服而去見客亦無時二月九日之夜郡火災與鄧文範書見前卷十七與吳仲時書見前卷六閲武湖北諸郡軍士多逃徙視官府如傳舍不可禁止緩急無可使者先生病之乃信捕獲之賞重奔竄之刑又數閲射中者受賞役之後加庸直無飢寒之憂相與悉心弓矢逸者絶少他日兵官按閲獨荆門整習他郡所無平時按射不止于兵伍郡民皆得而與中亦同賞上廟堂劄子乞撥常平銀助城費略云荆門素無城壁某去冬妄意聞于帥府請就此役尋得帥檄令委官置局徑自修築已于十二月𥘉四日發手亦幸天氣晴霽人心齊一小壘綿薄會計用磚包砌猶當用緡錢三萬本軍有買名銀一萬七千餘兩在常平稽之專條不可擅用欲乞鈞慈特為敷奏于數內撥支銀五千兩應付支用使城壁一新形勢益壯姦宄沮謀民心有賴實為無窮之利與章茂獻論築城書略云有當控告廟堂者敢不布本末庶幾一言之助去冬修築子城適值天氣晴霽民心恱懌此邦士女未嘗識城逺村僻塢携持來觀自臘至今踵係不絶答羅田宰吳斗南書論太玄見前卷十五作監嶽兄庸齋墓表夏四月十九日朱元晦來書云去嵗辱惠書慰問尋即附狀致謝其後聞千騎西去相望益逺無從致問近幸幼安經由及得湖南朋友書乃知政教並流士民化服甚慰某憂苦之餘疾病益侵形神俱瘁非復昔時歸來建陽失於計度作一小屋期年不成勞苦百端欲罷不可李大來此備見本末必能具言也渠欲為從戎之計因走門下撥冗附此未暇他及政逺切祈為道自重以幸學者彼中頗有好學者否峽州郭文著書頗多悉見之否其論易數頗詳不知尊意以為如何也近著幸示一二有委併及與總卿張體仁元善書見前卷十六答倉使書末云比來訟牒益寡終月計之不過二三紙此間平時多盜今乃絶無荆南府帥章森德茂以先生政績上薦先生與書見前卷十六答章茂獻書云某承乏云云見前卷十五又云先生治化孚洽久而益著既逾年笞箠不施至于無訟相保相愛閭里熙熙人心敬向日以加厚吏卒亦能相勉以義視官事如家事識者知其有出于政刑號令之表者矣諸司交章論薦丞相周公必大嘗遺人書有曰荆門之政可以驗躬行之效周益公判湖南帥府復傅子淵書末云曾通象山書否荆門之政如古循吏躬行之效至矣禱雨事見前卷二十六與章帥二書俱見前卷十六秋七月薦屬縣二宰併自劾狀時姦民楊彥翼萬九成素號論官社楊景春尤甚先生以其世惡奏乞施行因以自劾先生曰古者無流品之分而賢不肖之辨嚴後世有流品之分而賢不肖之辨略贈劉季蒙見前卷二十與伯兄致政書見前卷十七冬十二月六日與姪麟之書末云此間風俗旬月浸覺變易形見大槩是非善惡處明人無貴賤皆向善氣質不美者亦革面政所謂脈不病雖瘠不害近來吏卒多貧而有窮快活之説七日丙午先生疾十一日庚戌禱雪郡僚問疾因言冬暖盍祈雪乃命倪巨川濟甫畫乾卦揭之黃堂設香花翌早迎往蒙泉取水歸安奉而風雲遽興辛亥日雪驟降先是十一月語女兄曰先教授兄有志天下竟不得施以殁女兄䀌然又語家人曰吾將死矣或曰安得此不祥語骨肉將奈何先生曰亦自然又告僚屬曰某將告終先生素有血疾居旬日大作越三日疾良已接見僚屬與論政理如平時宴息靜室命灑掃焚香家事亦不挂齒雪降命具浴浴罷盡易新衣幅巾端坐家人進藥却之自是不復言十四日癸丑日中先生卒郡屬棺斂哭泣哀甚吏民哭奠充塞衢道僉判洪伋率僚屬祭文略云斯道龎洪充塞兩儀孔孟既沒日以湮微賴我先生主盟正學開悟聾瞶惟時先覺云云學録黃嶽祭文略云先生之學正大純粹先生之教明白簡易其御民也至誠之外無餘術其使人也寸長片善未始或棄若夫憂國忘家愛人利物所謂造次于是顛沛于是是以先生之亡雖小夫賤隸婦人女子莫不咨嗟歎息至于流涕父老李斂等祭文云刺史以詩書為政待邦人如子弟百姓安之何遽驚哲人之萎也蓋刺史之賢周孔之學方將公是道于天下慰四海蒼生之望非我民得以私之也然斂此大惠施于一邦近者服其教逺者化其德豈期天不憗遺而奪我父師之速也古之君子所居民愛所去民思而况賢刺史之亡其遺愛在人真有不可解于心者我民將子子孫孫尸而祝之社而稷之以至于無窮也湖北帥張森祭文略云惟公學本之經行通于天淵源之漸伊孟之傳自本自根即聞即見見之躬行死守不變德業培深我臯我夔用之斯世舍公其誰湖廣總領張體仁祭文略云儒者之學入孝出弟人言江西陸氏兄弟儒者之仕信道行志人言荆門如古循吏有修其綆汲深未既有恢其規遊刃餘地詞流滔滔夀考日遂豈伊斯人而俾憔悴云云江淮總領鄭湜祭文略云聖去千載所傳者書獨公深造忘其緒餘謂心至靈可通百聖謂物雖繁在我能鏡𣣔世知師欲人知味未之能行慨其將廢湖南漕豐誼祭文略云公稟正氣早以道鳴叱呵非聖奔走諸生云云朱元晦聞訃帥門人往寺中為位哭紹熙四年癸丑春正月二孤護先生柩歸沿途弔哭致祭者甚衆三月至家鄂州教授許中應祭文略云是理流行宇宙之彌卑不間于樵牧皆可得而與知自條理之科不續一何名世之稀蓋所以見吾夫子者未至如曾參之皓皓而詖淫邪遁不能如孟子之無疑則皆未免隨揣摩之形似困聞見之支離雖勉強以力行徒爾增附益之私公以間氣而自得師燭乎大天淵之無際洞乎微芒芴之無遺混混乎由源而逹委鼎鼎乎自幹而敷枝故言動無一之不實而表裏不至乎相違豈非合彼巳於一源貫幽顯而同歸者乎若乃察此理之公其謂先覺者為後覺之資彼絶物者不仁雖狂鄙皆在于扶持開晃耀于蒙昧出荆棘于平夷的然顛末之無舛二三子亦有立於斯時即所應之有證尚安得以佛老之空談而病之哉金溪宰王有大建復齋象山二先生祠六月癸丑楊簡為記略云道心大同人自區别人心自善人心自靈人心自明人心即神人心即道安覩乖殊聖賢非有餘愚鄙非不足何以證其然人皆有惻隱之心皆有羞惡之心皆有恭敬之心皆有是非之心惻隱仁羞惡義恭敬禮是非智仁義禮智愚夫愚婦咸有之豈特聖賢有之人人皆與堯舜禹湯文武周公孔子同人人皆與天地同又何以證其然人心非血氣非形體廣大無際變通無方倐焉而視又倐焉而聼倐焉而言倐焉而動倐焉而至千里之外又倐焉而窮九霄之上不疾而速不行而至非神乎不與天地同乎學者當知舉天下萬古之心皆如此也孔子之心如此七十子之心如此子思孟子之心如此復齋之心如此象山之心如此金溪王令君之心如此舉金溪一邑之心如此學者當自信無自棄意慮微起天地懸隔不識不知匪合匪離直心而往自備萬善自絶百非雖無思為昭明弗遺二陸先生撫州金溪人復齋諱九齡字子夀篤志斯道窮深究微兢兢孜孜學者宗之象山先生其弟也諱九淵字子靜天性清明不染雜説簡嘗親聞先生之言自謂其童幼時聞人誦伊川先生語自覺若傷我者性質素明如此故長而益明破學者于窟宅開聖道之夷逾其言甚平而或者填萬説于胸中持萬説于胸中以聼先生之言故或疑其深疑其峻然而海內之士聞其風而趨之如百川之東矣簡積疑二十年先生一語觸其機簡始自信其心之即道而非有二物始信天下之人心皆與堯舜禹湯文武周公孔子同皆與天地日月鬼神同王令君有大因邑人崇敬二君子以俸資設祠於學且將行禮焉屬簡為記且曰欲以昭明二君子之道簡雖無所似灼知二君子之心無以異于天下之人心不容穿鑿其説以惑來者乃起敬起恭而書其略云冬十一月王有大帥邑僚來祭挽詩云篤學光前哲知言衆所迷學同顔氏好功與孟軻齊獻替心彌切藩經政可稽儒宫􅌂遺像垂範自江西九日壬申奉先生之柩􅌾于延福鄉朱陂之下距妣饒氏孺人墓為近一云􅌾于鄉之永興寺山門人奔哭會􅌾者以千數詹阜民祭文略云天縱夫子以淑其徒爰暨子思須臾不離孟軻親受厥緒是承卓哉先生能自得師玩其遺編獨識其微探原自天立其大者操而存之造次弗舍日溉月培充實光輝奔走學徒四方如歸先生設教固亦多術其要使人反躬務實一洗世習詞説支離逹其本心使自得之善端既著日用不窮夫然後知先生之功云楊簡祭文略云先生之道亦既昭昭然矣何俟乎知仰觀乎上先生確然示人易矣俯察乎下先生隤然示人簡矣垂象著明者先生之著明寒暑變化者先生之變化書者先生之政事詩者先生之詠歌禮者先生之節文春秋先生之是非易先生之變易學者之所日誦百姓之所日用何俟乎復知何俟乎復思不可復思矧可斁思袁燮祭文略云嗟維先生任道以躬方其未得憤悱自攻一日洞然萬理俱融如天清明如日正中毫髮無差涵養日充乃號于世曰天降衷至大至精至明至公茲焉良心萬變不窮學者𥘉來膠擾塞胸先生教之如槖鼓風弟子化之如金在鎔有蔽斯決有窒斯通手舉足履視明聽聰式全其大不淪虗空此于斯世允矣有功云云傅子雲祭文略云道塞宇宙而人至靈不蔽於物易知易行維天憂民篤生斯聖乃徹厥蔽俾安正性周衰文弊孟沒學絶功利橫流道術分裂所見益鑿所言益支易知易行誰其覺斯千七百載乃有先生先生之德濬哲粹英道喪既久無所取證深研力索俯仰參訂或啓于家訓或得于群籍或由省察之深或資辨白之力惟至當之不磨卒會歸于有極始信夫良知良能降于上帝可久可大道實簡易倘正偽之不辨而先後之舛施則已私之是憑豈天德之在茲逺紹孟氏之旨極陳異説之非世之學者標末是求而吾先生自源徂流世論一切如鞭之刑而吾先生允稽其情世之於人多察鮮容而吾先生善與人同世之于善迹似情非而吾先生誠實自持世排異端惟名是泥而吾先生即同辨異世讀古書立論紛然而吾先生先實後言嗚呼先生視古如反諸掌視民如納諸溝斯學斯志曽不一施今則已矣弧矢不去手關河不忘懷搜求忠勇義欲一伸曽不一遂今則息矣莫大于曆夜觀星象莫神于易畫索蓍卦考禮問樂逺稽古制曽不畢究今則墜矣間世之英拔萃之議作于斯世亦如此而止矣云云周清叟祭文略云天為斯文乃生先生指學者之膏肓示入聖之門庭不繞繳而支離誠坦然而可行暴之以秋陽之白濯之以江漢之清繼孟子之絶學舍先生其誰能云云包遜祭文云維吾先生天稟絶異洞萬古心徹先聖祕先立其大須臾不離日纍月積仁熟功熙無偏無黨不識不知一順斯理終日怡怡雖和非惠雖清非夷豈伊之任幾聖之時包楊作先生贊云辭蔓蝕真會當一正剗百家偽藥千古病發人本心全人性命一洗佛老的傳孔孟紹興五年甲寅春二月十六日楊簡狀先生行見前三十三卷寧宗慶元二年丙辰貴溪宰劉啓晦建翁立先生祠于象山方丈之址自立祠後春秋致祭惟謹臨江章茂獻為記宰朱文公門人也于是先生門人約以嵗正月九日登山會祭開禧元年乙丑夏六月先生長子持之伯微編遺文為二十八卷外集六卷乙卯楊簡序略云易曰百姓日用而不知孔子曰二三子以我為隱乎吾無隱乎爾吾無行而不與二三子者大戴記孔子之言謂忠信為大道忠者忠實信者誠信不詐偽而先儒求之過求之幽深故反不知道孔子又名大道曰中庸庸者常也日用平常也孟子亦謂徐行後長即堯舜之道又謂以羊易牛之心足以王先生諄諄為學者剖白斯旨深切著明而學子領會者寡簡不自揆度敢少致輔翼之力專敘如右開禧三年丁卯秋九月庚子撫州守括蒼高商老刋先生文集于郡庠跋云洙泗之教憤悱啓發鄒魯之書困衡作喻此學久矣無傳獨象山先生得之千載之下最為要切是以聽其言者類多感發書曰惟文王之敬忌先生之書如黃鍾太吕發逹九地真啓洙泗鄒魯之祕其可以不傳耶商老嘗從先生遊頗自奮勵今老矣學不加進為州鄭卿愧于簿領之外效如捕風因刻之郡庠以幸後學倘有志之士伏讀其書如見其人知敬其所當敬而不忌其所不必忌其為有輔于風化較然不誣也然而默識心通豈欺我哉嘉定五年壬申秋八月張衎季恱編遺文成傳子雲序略云先生生于孟子沒千有七百餘年之後當浮偽雜揉朱𬗋淆亂之時乃能獨信實理而不奪于浮偽精别古書而不惑於近似深窮力踐天德著明推以覺人不加毫末故一時趍隅以聽者莫不油然悟良知良能至明至近之實灼然知自下升髙積小以大之端躍然興堯舜可為不自棄自暴之志回視曩之蔽於支離浮偽之説者又不啻若夷猶于九軌之路而灼見夫在荆棘泥淖者之為陷溺也蓋先生長于啓迪使人蔽解疑亡明所止于片言之下有得于天而非偶然者先生亦自以孟子既沒斯道之任在已病浮偽之害正渝實救焚拯溺如巳隱憂撲𦦨障流厥功彌大故民彛帝則之實孔子孟子之傳賴以復闡于世云云九月戊申江西提舉袁燮刋先生文集自為序略云天有北辰而衆星拱焉地有泰嶽而衆山宗焉人有師表而後學歸焉象山先生其學者之北辰泰嶽歟自始知學講求大道不得弗措久而寖明又久而大明此心此理貫徹融會美在其中不勞外索揭諸當世曰學問之要得其本心而已心之本真未嘗不善有不善者非其𥘉然也孟子嘗言之矣鄉為身死而不受今為宮室之美妻妾之奉所識窮乏者得我而為之此之謂失其本心其言昭晣如是而學者不能深信謂道為隱而不知其著謂道為邈而不知其近求之愈過而愈湮鬱至先生始大發之如指迷途如藥久病迷者悟病者愈不越于日用之間而本心在是矣學者親承師訓向也跂望聖賢如千萬里之隔今乃知與我同本培之溉之皆足以敷榮茂遂豈不深可慶哉嗚呼先生之惠後學弘矣先生之言悉由中出上而啓沃君心下而切磨同志又下而開曉黎庶及其他雜然著述皆此心也儒釋之所以分義利之所由别剖析至精如辨白黑遏俗學之橫流援天下于既溺吾道之統盟不在茲乎燮識先生于行都親慱約者屢矣或竟日以至夜分未嘗見其少有昏怠之色表裏清明神采照映得諸觀感鄙吝巳消矧復警䇿之言字字切已歟先生之沒餘二十年遺言炳炳精神猶在敬而觀之心形俱肅若親炙然臨汝嘗刋行矣尚多闕略先生之子持之伯微裒而益之合三十二卷今為刋于倉司流布寖廣書滿天下而精神亦無不遍言近而指逺雖使聖人復生莫之能易嗚呼兹其所以為後學之師表也歟東澗楊文清公鵝湖祭文未詳嘉定八年乙亥冬十月二十九日奉旨賜諡𥘉嚴滋等請諡到狀云故荆門知軍監丞陸公以身任道為世儒宗一時名流踵門問道常不下千百輩今其遺文流布海內人無智愚珍藏而傳誦之蓋其為學者大公以滅私昭信以息偽揭諸當世曰學問之要得其本心而已學者與聞師訓向者視聖賢若千萬里之隔乃今知與我同本培之溉之皆足以敷榮茂遂如指迷途如藥久病先生之功宏矣縣庠郡學所至立祠雖足以致門人弟子之私敬而諡號未加識者歉焉云本州備録申聞乞指揮施行至是奉旨賜諡嘉定九年丙子春三月十七日宣教郎太常慱士孔煒諡議見前卷一十三冬十二月十三日朝請大夫考功員外郎丁端祖覆議見前卷三十三嘉定十年丁丑春三月二十八日賜諡文安撫州州學教授林恢告祠堂賜諡文云先生振絶學于千載之後躬行著論碩大光明播于四方所謂百世以俟聖人而不惑者屬者諸生請諡郡聞于朝訂議太常諡以文安聖天子俞之嗚呼不俟百世斯文已有見矣金溪宰何處久告諡文云惟公志道精專稟資超卓大揚厥旨以覺後覺其覺維何天降之衷父慈子孝君仁臣忠列聖相傳明若斗極自軻之亡異端蓁塞公實任道手開東明排斥浮偽吾道砥平進而告后志在經邦退而牧民時稱循良天不愸遺山頽木壞惟有文辭方册是載幸公門人佩訓不忘請諡易名逹于太常公論與賢聖朝輔德爰賜嘉名世世烜赫象山之學萬古洋洋匪公之榮吾道之光秋九月甲子袁燮作金溪邑庠止善堂記略云乾道淳熙間象山先生以深造自得之學師表後進其道甚粹而明其言甚平而切凡所以啓告學者皆日用常行之理而毫髮無差昭晣無疑故天下翕然推尊而其教尤著于所居之金溪今邑之善士趍向不迷有志斯道而恥為世俗之學蓋其源逺矣理宗紹定三年巳丑夏四月江東提刑趙彥悈重修象山精舍云道在篤行不在空言道在反求不在外􅕽彥悈壯嵗從慈湖遊慈湖實師象山陸先生嘗聞或謂陸先生云胡不注六經先生云六經當注我我何注六經又觀先生與學子帖有反思自得反而求之之訓有朴實一途之説人見其直易或疑以禪學是未之思也誠意正心以至治國平天下原于致知二字禪矣乎象山蓋學者講肄之地先生沒山空屋傾將遂湮沒載新以存先生之故迹使人因先生之故迹思先生之學思先生之教孜孜日思乃不勉不思從容中道是謂大成若夫山林之峻秀景物之幽深棟宇之多寡廢興之源流非學者志不暇盡記之耳紹定四年辛卯夏六月已亥江東提刑袁甫廣微建象山書院于貴溪之徐巖先生祠侑以楊敬仲袁和叔𥘉先生本欲創書院于山間拜命守荆而不果至是袁憲奏建書院以山間不近通道乃命洪季陽相地得徐巖近邑而境勝坐已向亥傅季魯聞而譏之曰書院為講古習禮之所而先聖先師北面學者南面而拜之非禮也宜擇南面之地季陽悚然然巳申聞不復更卜是日祝文云先生之精神其在金溪之故廬優遊而容與耶其在象山之精舍言言而語語耶抑周流于上下四方與天地遊與四時序耶甫將指江東聿興正學山之旁近爰咨爰度得勝景于徐巖離象山而非邈山峰環峙兮髙可仰大溪橫陳兮清可濯殆天造而地設匪人謀之攸作是可宅先生之精神無在無不在也先生之道精一匪二揭本心以示人此學門之大致嗣先生之遺響警一世之聾瞶平易切近明白光粹至今讀其遺書人人識我良貴由仁義行與行仁義者昭昭乎易判也集義所生與義襲而取之者截截乎不可亂也宇宙內事已分內事渾渾乎一貫也議論一途朴實一途極天下之能言者斯言不可贊也嗚呼先生之學如此先生之精神如此然則在金溪之故廬者如此在象山精舍者如此周流乎上下四方者亦如此孰謂徐巖而獨非如此耶工役俶興禮宜虔告先生精神淵淵浩浩又作上梁文云盡其心知其性見先生存養之皆天在則人亡則書豈後學講明之無地云云是冬書院落成買田養士冬十月己未袁甫刋先生文集略云象山先生文集先君子嘗刋于江右甫將指江左新建象山書院復摹舊本以惠後學先生發明本心上接古聖下垂萬世偉矣哉此心神明無體無方日用平夷莫非大道是謂精一是謂彛倫是謂乾健坤順是謂日月星辰風雨霜露山川草木之變化是謂鬼神之情狀先生嘗言千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也學者之心即先生之心甫藐焉晚出景慕先生戰兢自勉寡過未能先生之道大矣奚庸贊述姑誦所聞附于卷末十一月朔袁甫遣池州屬官韓祥至書院告先聖文云仰惟先聖之道昭揭萬世後學昏蒙不知吾心即道有宋知荆門軍陸某獨能奮乎百世之下指示道心明白的切闡教象山學者師尊之而歲久祠圯有司弗葺𬒳命茲來惕然大懼遂卜地于貴溪之徐巖鼎建書院招延山長俾承學之士相與嚴事先聖朝夕兢惕道心融明所以懋昭象山之教而上繼先聖之統緒也甫職守攸縻弗皇躬詣祠下心以告矣紹定五年壬辰春三月袁甫至書院釋菜告文云先生之學得諸孟子我之本心先明如此未識本心如雲翳日既識本心元無一物先生立言本末具備不墮一偏萬世無弊書院肇建躬致一奠可聞非聞可見非見禮畢乃講書貴賤咸集溢塞堂廡以聽講畢續説曰象山先生家學有原一門少長協力同心所以敬養其親者既巳恪供子職而伯叔之間自為師友梭山復齋皆為一時聞人而先生又傑出其中陋三代以下人物而奮然必以古聖人為師發明本心嗣續遺響以大警後學之聾聵天下以為真孟子復出也言儒釋之異趨謂釋氏為私吾儒為公釋氏出世吾儒經世故于綱常所關尤為之反覆致意洎班朝列直道而行不阿世好格心事業斯世深望焉而􅎱嫉者沮之雖一斥不復浩如也乃禮慈湖門人錢時為堂長主教逺近學者聞風雲集至無齋以容之則又修書院之外左方廢寺之法堂以處之也秋閏九月八日賜象山書院額以尚書省劄夀諸石後浙憲陳塤和仲跋云象山文安先生明本心之旨啓千古之祕開警群迷迓續道統如日月之昭揭太嶽之表鎮也于是四方儒彥從者如雲其尤碩大光明者則有慈湖文元楊先生潔齋正獻袁先生淵澄峻發木鐸鏗鍧于以昌我宋文明之治云云紹定六年癸巳春清明日袁甫作象山書院記略曰寧宗皇帝更化之末年興崇正學尊禮老臣慨念先朝碩儒咸賜嘉諡風厲四方謂象山先生發明本心之學有大功于世教易名文安庸示褒美于時慈湖楊先生我先人潔齋先生有位于朝直道不阿交進讜論寧考動容天下學士想聞風采推考學問淵源所自而象山先生之道益大光明甫承學小子將指江東築室百楹既壯且安士遐邇咸集齋曰志道明德居仁由義精舍曰儲雲佩土又皆象山先生之心畫也秋七月辛未日金溪宰天台陳詠之建象山書院于邑治之西傅子雲記𥘉二陸先生祠堂既立宰以祠右有隙地髙爽乃連甍建書院買田養士申臺郡禮請傅季魯主教以發明先生之學始至講道聽者甚衆士風翕然向善記略云象山先生稟特異之資篤信孟子之傳虛見偽説不得以殽其真奪其正故推而訓迪後學大抵簡易明白開其固有無支離繳繞之失而有中微起痼之妙士民會聼沉迷利欲者惕焉改圖蔽惑浮末者翻然就説膠溺意見者凝然反正莫不知足自知仁足自守勇足自立猶出珠璧于泥淖而濯之清泉脫鴻鵠于密網而遊之天衢抉浮雲之翳日以開東明而有目者快幽隱纎微之覩也豈天以啓悟斯人之徒俾先生微覺其天與之善非有識知之私加其間則感速之效固若是耶惜乎天嗇之年志既不遂而遺文垂世又特見往來論學之書與夫奏對記序贈説等作然于著誠息偽興起人心亦可謂有光于孟氏矣理宗皇帝嘉熙元年丁酉秋七月既望泉使陳塤刋先生語録自為序云孟子殁千五百餘年宋有象山文安陸先生挺然而興卓然而立昭然而知毅然而行指本心之清明斯道之簡易以啓群心詔後學其教不務繁而本末備其辭不務多而論要明洗章句之塵破意見之窟使聞者渙如躍如知心之即道而不疑其所行茲非晦冥之日月崖險之津塗丘阜之嵩華歟塤生晚不逮事先生而登慈湖之門固嘗服􅈾遺文矣蒙恩司治道由書院瞻謁祠像如獲執經升堂見同門所録訓語編未入梓咸以為請再拜三復乃授工鋟勒焉或謂塤曰近世儒生闡説其徒競出紀録後來者搜拾摹傳雖汗牛充棟且未厭止也子之所得不甚解約乎塤語之曰先生之道如青天白日何庸語先生之語如震雷驚霆何庸録録而刋猶以為贅也而今而後有誦斯録能于數千言之中見一言焉又於其中見無言焉則先生之道明矣敢拱以俟來者淳祐元年辛丑冬十月金溪進義居表青田陸氏來自邯郡其四世諱道卿酌先儒冠婚喪祭之禮行于家家道整肅著聞州里生六子以子貴贈宣教郎素無田産𬞞畦不盈十畝而食指千餘長九思總家務次九敘治藥療次九臯授徒于家孰以束饈之具輔不足率其弟九韶九齡九淵相與講論聖道九淵以其道聚徒講于貴溪之應天山山形類象故學者號稱象山先生彬彬乎儒門州縣以其義聚謹具表進淳祐二年壬寅秋九月勑旌陸氏義門皇帝制曰青田陸氏代有名儒在諡典籍聚食踰千指合㸑二百年一門翕然十世曩微惟爾能睦族之道副朕理國之懷宜特褒異勑旌爾門光于閭里以勵風化欽哉青田義門家長陸沖進謝恩表十世義居旌表巳頒於廊廟九天申命勑書復卑于門閭乾坤之露澤新承里宅之風聲益振叨塵過分榮耀下懷臣誠惶誠恐稽首頓首臣聞修身齊家乃大學之根本化民成俗實聖治之權輿自唐有張公藝以來至我宋彭氏程而下懷終始群居之義乃荷蒙聖典之褒眷念儒門尤加篤愛疇茲二老乃先知先覺之民政奉兩朝賜文逹文安之諡既以千餘指宗枝之衆聚于二百年古屋之間詩禮相傳饔飱合㸑祗謂閭閻之共處詎期綸綍之昭垂郡邑爭先而快覩室家相慶以騰歡自愧深恩孰茲報稱茲蓋恭遇皇帝陛下化民長久霈澤豐隆中三極以作君奄四海以光澤人處唐虞之治比屋可封士遵洙泗之傳里仁為美遂令瑣末亦𬒳寵榮臣敢不仰體聖恩俯察族類聖益聖明益明長藉照臨之德老吾老幼吾幼盡叨孝弟之誠臣無任瞻天激切屏營之至云淳祐六年丙午春正月二日奉旨旌表門閭𥘉淳祐五年九月漕使江萬里奏撫州金溪青田陸氏義居十世閨門雍肅著于江右是為淳熙名儒文逹文安之家揆之令典盍表宅里以厲風化里士合詞以請于郡郡下之邑耆老子弟具以實對越三嵗未報後漕使曾頴茂再剡上事下有司考狀諏律僉謂宜俞所請于是丞相白上可其奏是日命始下撫州守趙時煥大書曰道義男曰旌表名儒之家令刻石于門淳祐八年戊申夏五月朔包恢撰旌表門閭記略云門閭之髙不惟其人此古今所尤難者惟陸氏五世而有文逹文安二大儒以人品之高道術之明特起東南上續道統實以師表四海非僅以師表一家大學致知誠意正心修身齊家治國平天下之全體大用具在是矣陸氏所以名家由二先生之名世也淳祐十年庚戌夏五月撫州守葉夢得命金溪宰立更創祠堂增葺書院𥘉二先生祠與槐堂異處乃命王宰以七月六日鼎創新祠于槐堂之前翼以四齋環以門廡自是規制悉出于郡焉記略云山川炳靈儒英並出美適鍾于一門教可埀于百世若金溪三陸先生之祠于學宮者其風化之所係歟三先生學問宏深智識超卓以斯道而任諸身以先知而覺乎後其生也海宇仰而宗之其沒也郡邑尸而祝之朝廷又從而褒之非偶然也秋九月葉夢得建梭山復齋象山三先生祠堂于郡學之東以袁燮和叔傅子雲季魯侑淳祐十一年辛亥春三月望日包恢撰三陸先生祠堂記云以正學名天下而有三先生焉萃在一郡一家若臨川陸氏昆弟者可謂絶無而僅有歟梭山寬和凝重復齋深沉周謹象山光明俊偉此其資也固皆近道矣若其學之淺深則自有能辨之者梭山篤信聖經見之言行推之家法具有典刑雖服先儒之訓而于理有不可於心者決不苟徇惜其終于獨善而不及見諸行事之著明爾復齋少有大志浩慱無涯涘觀書無滯礙翻閲百家晝夜不倦自為士時已有稱其得子思孟子之旨者其後入太學一時知名士咸師尊之則其學可知矣又惜其在家在鄉僅可見者輔成家道之修整備禦湖冦之侵軌紀綱肅而蠧弊之悉革誠意孚而人心興起然而為海內儒宗繫天下之望而恨未得施其一二耳若夫象山先生之言論風旨發揮施設則有多於二兄者蓋自其幼時已如成人淵乎似道有定能靜實自天出不待勉強故其知若生知其行若安行粹然純如也蓋學之正而非他以其實而非虗也故先生嘗曰宇宙間自有實理此理苟明則自有實行有實事實行之人所謂不言而信又自謂平生學問惟有一實一實則萬虗皆碎嗚呼彼世之以虛識見虛議論習成風化而未嘗一反巳就實以課日進日新之功者觀此亦嘗有所警而悟其非乎夫道不虗行若大路然苟得實地而實履之則起自足下之近可逹千里之逺故自仁之實推而至于樂之實自有樂生惡可巳之妙其實可欲者善也實有諸巳者信也由善信而充實有光輝焉則其實將益美而大是誠之者人之道也由大而化則為聖而入于不可知之之神是誠者天之道也此乃孟子之實學可漸進而馴至者然而無有乎爾則亦久矣先生嘗論學者之知至必其智識能超出千五百年間名世之士而自以未嘗少避為善之任者非敢奮一旦之決信不敏之意而徒為無忌憚大言也蓋以其𥘉實因深切自反灼見善非外鑠徒以交物有蔽淪胥以亡自此不敢自棄是其深造自得實自孟子故曰孟子之後至是始一明其誰曰不然四方聞其風來學者輻輳先生明于知人凡所剖決必洞見其肺肝所針砭必的中其膏肓有感動覺其良心而知其正性者為多然則其學真可質鬼神而無疑俟聖人而不惑者矣昭昭如是豈其間有所疑惑焉殆若不可曉者是又烏得不因以致其辨歟且道義之門自開闢以來一也豈容私立門户乎故其説曰宇宙即是吾心吾心即是宇宙曰學者惟理是從理乃天下之公理心乃天下之同心顔曾傳夫子之道不私夫子之門戶夫子亦無私門戶與人為私商也曰此理在宇宙間未嘗有所隱遁天地所以為天地者順此理而已人與天地並立為三極安得自私而不順此理哉是先生之學乃宇宙之逹道明矣而或者乃斥以别為一門何耶釋氏之説自開闢以來無有也豈非橫出異端乎故其説曰取釋氏之聖賢而繩以春秋之法童子知其不免曰今若徒自形迹詞語間辨之乃彼所謂職業要其為不守正道無復有毫髮之近是者矣曰方士禪伯真為太祟無此迷惑則無偏無黨王道蕩蕩其樂可量哉是先生之學非釋氏之邪説亦明矣而或者指以為禪學又何邪其窮理也則曰積日纍月考究磨練嘗終日不食而欲究天地之窮際終夜不寢而灼見極樞之不動由積候以考曆數因笛聲以知律吕復齋嘗問其用功之處則對以在人情物理事勢之間嘗曰吾今一日所明之理凡七十餘條曰天下之理無窮以吾之所歷經者言之真所謂伐南山之竹不足以受我辭然其會歸總在於此則與徒研窮於方册文字之中者不同何不知者反謂其不以窮理為學哉其讀書也則曰古人為學即是讀書而以何必讀書然後為學之反説為證以束書不觀遊談無根之虗説為病平昔精勤人所不知惟伯兄每夜必見其觀覽檢閲之不輟嘗明燭至四更而不寐欲沉涵熟復而切已致思欲平淡玩味而氷釋理順此則與徒乾沒于訓詁章句之末者大異何不知者反妄議其不以讀書為教哉抑或謂其惟務超悟而不加涵養不求精進也曽不知其有曰惟精惟一涵養須如是學之正而得所養如木日茂泉日逹孰得而禦之曰雖如顔子未見其止易知易從者實有親有功可久可大豈若守株坐井然者則如彼或者之所謂者誤矣又或謂其惟尚捷徑而若無次第若太髙也曽不知其有曰學有本末先後其進有序不容躐等吾所發明端緒乃第一步所謂升髙自下也曰天所與我至平至直此道本日用常行近乃張大虗聲當無尚虗見無貪髙務逺至有一二問學者惟指其嘗主持何人詞訟開通何人賄賂以折之曰即此是實學如或者之所謂者又誤矣獨所大恨者道明而未盛行爾故上而致君之志僅略見于奏對惟其直欲進于唐虞復乎三代超越乎漢唐此乃朱文公稱其規模宏大源流深逺非腐儒鄙生之所能窺測而語意圓活混浩流轉見其所造深而所養厚也下而澤民之意亦粗見于荆門惟其以正人心為本而能使治化孚洽人相保愛至于無訟笞箠不施雖如吏卒亦勉以義此乃識者知其有出于刑政號令之表而周文忠以為荆門之政可驗躬行之效者也然其所用者有限而其所未用者無窮先生以道之廣大悉備悠久不息而人之得于道者有多寡久暫之殊是極其所志非多且久未巳也故自志學而至從心常言之志所期也嗚呼假之以年聖域固其優入而過化存神上下天地同流之功用非曰小輔者亦其所優為也孰謂其年僅踰中身而止知命哉遡其旨與梭山未同者自不嫌於如二三子之不同而有同若復齋則𥘉巳是其説于鵝湖之會終又指言其學之明于易簀之時則亦無間然矣逮論其文則嘗語學者以窮理實則文皆實又以凡文之不進者由學之不進先生之文即理與學也故精明透徹且多發明前人之所未發炳蔚如也梭山諱九韶字子美復齋諱九齡字子夀諡文逹象山諱九淵字子靜諡文安郡學舊有祠未稱也今郡守國之祕書葉公夢得下車之𥘉士友請易而新之公即慨然曰果非所以嚴事也乃命郡慱士趙與輈相與謀之旋得隙地于學之西遂肇造祠廟三間翼以兩廡前為一堂外為四直舍又外為書樓下列四齋橫開方地地外有竹竹間結亭內外畢備祠貌甚設皆前所未有也庶幾嚴事之禮歟左侑以袁公燮以其為先生之學而嘗司庾于是邦且教行于一道次侑以傅公子雲以其為先生之所與而嘗掌正于是學且師表於後進葉公得傅公之傳而自象山者也祠實經始于淳祐庚戌之季秋至仲冬而落成云象山先生全集卷之三十六終
