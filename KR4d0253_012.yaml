body:
  text: 與趙然道某驚蟄前乘晴登山尋復積雨二十四日少霽始得一訪風練飛雪之狀方念不得與賢昆仲共之是晚來書適至喜可知也去非從善勇決如此沛然之壯在胸中矣又何以觀瀑為哉狂聖之相去逺矣而罔念克念之端頃刻而分人心之危豈不甚可畏哉有虞之朝克艱之説從逆之戒伯禹進之警戒無虞之説逸樂怠荒之戒伯益又進之明明穆穆聚精會神其切磋琢磨之功如此若已汨于利欲蔽于異端逞志遂非往而不反雖復雞鳴而起夜分乃寐其為害益深而去道愈逺矣奚足以言此哉今然道方耻利欲之習知異端之非願益致擴充之功則吾道幸甚二兹閲來書知此志不替有加夫道一而已相去千里相後千歲者猶若合符節况其近者乎然古人所以汲汲于師友博學審問謹思明辨之者深懼此道不明耳于其大端大旨知其邪正是非形有相近而實有相逺則知精微之處亦猶是也夫子十五而志學則既得其端緒矣然必三十而立四十而不惑五十而後曰知天命及其老也猶曰我學不厭今學者誠知端緒則亹亹翼翼自致日新之效者其能自已乎秋涼過我當究是言時事第可永歎良難言也王參恐未至如傳者之言回書不見情實此其常態其所以不如古人者蓋在于此然道之言可謂切中其病矣三昔循中不無尊師重道之誠而家庭牽制不克自遂其質固自通爽而殊乏剛強深懼其汨沒于世習而不能以自立故前書稍振翼之耳富貴利逹之不足慕此非難知者仙佛之徒拘曲之士亦往往優于斷棄而弗顧視之彼既自有所溺一切斷棄亦有何難但一切斷棄則非道矣知道之士自不溺于此耳𥘉未嘗斷棄之也故曰素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉所謂自得者得其道也夫子曰富與貴是人之所欲也不以其道得之不處也然則以其道而得焉君子處之矣曷嘗斷棄之哉孟子之答彭更亦曰非其道則一簞食不可受于人如其道則舜受堯之天下不以為泰子以為泰乎君子亦惟其道而已矣所謂居天下之廣居立天下之正位行天下之大道得志與民由之不得志獨行其道富貴不能淫貧賤不能移威武不能屈非虗言也學者所造縱未及此苟志于道便當與俗趣燕越矣志鄉一立即無二事此首重則彼尾輕其勢然也作意立説以排遣外物者吾知其非真志于道義者矣所欲有甚于生所惡有甚于死死生大矣而不足以易此况富貴乎富貴之足慕不足慕豈足多較于學者之前哉前與循中書所以云云者懼其弱植孤立于橫流之中而此志不能以自拔耳雖然姬周之衰此道不行孟子之沒此道不明千有五百餘年之間格言至訓熟爛于浮文外飾功利之習泛濫于天下氣質之美天常之厚者固知病其未流矣而莫知病其源立言制行之間抱薪救火揚湯止沸者多矣當今之世誰實為有志之士也求真實學者于斯世亦誠難哉非道之難知也非人之難得也其勢則然也有志之士其肯自恕于此而弗求其志哉今粗有其志而實不能以自拔則所謂講學者遂為空言以滋偽習豈唯無益其害又大矣若其善利之間嘗知決擇大端巳明大志已立而日用踐履未能常于清明剛健一有緩懈舊習乘之捷于影響應答之際念慮之間隂流密陷不自省覺益積益深或遇針藥勝心持之反加文飾因不能以自還者有矣甚可畏也况其大端未嘗實明大志未嘗實立有外強中乾之證而無心廣體胖之樂者可不深致其思以省其過求其實乎略此不察而苟為大言以蓋謬習偷以自便嚚以自勝豈惟不足以欺人平居靜慮亦寧能以自欺乎至是而又自欺其心則所謂下愚不移者矣誠能于此深切著明則自成自道自求多福者權在我矣前言往訓真先得我心之所同然耳引翼勉勵惟日不足何暇與章句儒譊譊玩愒歲月于無用之空言哉别𥿄所問多是古人憫憐後學詳為注釋以曉告之可謂昭若日星煥然無少蒙蔽但當從容紬繹以滋其涵飬鞭䇿之實豈宜復為蛇畫足重為贅疣乎四吾心苟無所陷溺無所蒙蔽則舒慘之變當如四序之推遷自適其宜記之所謂亡于禮者之禮也其動也中蓋近之矣夫子所謂克已復禮為仁誠能無毫髮巳私之纍則自復于禮矣禮者理也此理豈不在我使此志不替則日明日著如川日增如木日茂矣必求外鑠則是自湮其源自伐其根也侍旁千萬致意適旅應酬之冗不及拜書與趙詠道至當歸一精義無二誠得精當則若網在綱有條而不紊故自本諸身徴諸庶民至于百世俟聖人而不惑者誠精當之不容二也令兄謂諸公傷于著書而其心反有所蔽此理甚不精此言甚不當矣彼學不至道其心不能無蔽故其言支離彼惟不自知其學不至道不自以為蔽故敢于著書耳豈可言由其著書而反有所蔽當言其心有蔽故其言亦蔽則可也故親師友于當世固當論其學求師往聖尚友方册亦當論其學二為學有講明有踐履大學致知格物中庸博學審問謹思明辨孟子始條理者智之事此講明也大學修身正心中庸篤行之孟子終條理者聖之事此踐履也物有本末事有終始知所先後則近道矣欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物自大學言之固先乎講明矣自中庸言之學之弗能問之弗知思之弗得辨之弗明則亦何所行哉未嘗學問思辨而曰吾唯篤行之而已是冥行者也自孟子言之則事蓋未有無始而有終者講明之未至而徒恃其能力行是猶射者不習于教法之巧而徒恃其有力謂吾能至于百步之外而不計其未嘗中也故曰其至爾力也其中非爾力也講明有所未至則雖材質之卓異踐行之純篤如伊尹之任伯夷之清柳下惠之和不思不勉從容而然可以謂之聖矣而孟子顧有所不願學拘儒瞽生又安可以其硜硜之必為而傲知學之士哉然必一意實學不事空言然後可以謂之講明若謂口耳之學為講明則又非聖人之徒矣三奉此月十日書方知有叔氏之戚撫𥿄驚嘆怛焉痛心不能已巳向見此令弟氣質淳美志向專篤聽言之次殊無凝滯深用慰喜胡為遽有斯疾竟棄斯世哀哉有如賢伯仲情義之篤信不易堪也天命既如此亦無可奈何况在慶侍之側只得寬釋以安庭闈之心此即理也秋試失利亦蘭菊有時耳詠道之才一第豈足為道此尤不足置懷學力不究此等真正畫春氷耳逮天之未隂雨徹彼桑土綢繆牗户今此下民或敢侮豫事豫則立不豫則廢故書曰致治于未亂保邦于未危古人所以造次必于是顛沛必于是無有師保如臨父母戰戰兢兢如臨深淵如履薄氷若平居一有緩懈一有凝滯則精神立見凌奪事至物來固宜有困敗之憂雖然到此若能深省痛鞭何困之有夫子曰仁逺乎哉我欲仁斯仁至矣又曰為仁由已而由人乎哉孟子曰人病不求耳又曰亦為之而已矣于此用力而又不能使聖賢之言如符契則是平日之言皆妄言平日之意皆妄意矣果如是故不可自欺却當力加省察必使不待傅會而沛然有以信聖賢為先得我心之所同然而後可也四塞宇宙一理耳學者之所以學欲明此理耳此理之大豈有限量程明道所謂有憾于天地則大于天地者矣謂此理也三極皆同此理而天為尊故曰惟天為大惟堯則之五典乃天敘五禮乃天秩五服所彰乃天命五刑所用乃天討今學者能盡心知性則是知天存心飬性則是事天人乃天之所生性乃天之所命自理而言而曰大于天地猶之可也自人而言則豈可言大于天地乾坤同一理也孔子于乾曰大哉乾元于坤則曰至哉坤元堯舜同一理也孔子于堯曰大哉堯之為君于舜則曰君哉舜也此乃尊卑自然之序如子不可同父之席弟不可先兄而行非人私意可差排杜撰也與陳正已開歲得報書切承體中尚未脫然比日不審調護如何亦已平復否足下不獨體病亦有心病足下之體病亦心病有以重之足下近日謂所學與曩者異直去遼入薊耳向在都下見足下行步瞻視若忘若遺夜卧多寐語肢體屈伸不常皆由足下才氣邁往而學失其道凡所經營馳騖者皆適以病其心耳古之學者以飬心今之學者以病心古之學者以成事今之學者以敗事足下嘗言事外無道道外無事足下今日智慮非知此者特習聞其説附會其私意耳如此讀書殆將食蟛蜞矣前言往行所當博識古今興亡治亂是非得失亦所當廣覽而詳究之顧其心苟病則于此等事業奚啻聾者之想鍾鼓盲者之測日月耗氣勞體喪其本心非徒無益所傷實多他日敗人事如房琯之車戰荆公之均輸者可勝既乎向言排遣排遣亦安能有濟足下固大丈夫今責足下以大丈夫事足下之過非一節一事之小過乃平日害心之大過天地之閉日月之蝕其他尚復何言足下性本孝弟惟病此過故遷徙展轉所存無復真純此董生所謂以善為之而不知其義者也能頓棄勇改無復回翔戀戀于故意舊習則本心之善乃始著明營營馳騖之私憂思抑鬱之意當冰釋霧晴矣喜進參苓等藥輔助氣血俟體力強健乃博觀前言往行詳考古今興亡治亂是非得失苟不懈怠自當循循以進不至左見背馳矣某後日即東上輒布此少見切磋之誠飬心成事之效是所望于足下二近聞與淳叟同為踈山之行想甚得意二公前日頗有不相能之病比來道同志合相與羽翼光𥘉隙末昔賢猶或蹈之今二公亦加于人一等矣雖儒者好闢釋氏絶不與交談亦未為全是假令其説邪妄亦必能洞照底藴知其所蔽然後可得而絶之今于其説漫不知其涯涘而徒以名斥之固未為儒者之善第不知其與棲棲乞憐于其門者其優劣又如何耶雖然誠使能大進其道出得隂界猶為常人之私利不細政恐隂界亦未易出耳如淳叟正巳輩恐時僧牢籠誘掖來作渠法門外護耳若著實理會雖渠亦未必不知其非所敢望于公等也與正已相處之久不敢不直言與張誠子泰之出所惠字知書劒已東躊蹰仙巖之下而不得進亦為子不滿傳聞鎖院如許之亟殆未必然第從容以進當無不及也友朋自仙鄉來者斷斷不可光祿勳何耶吾嘗謂是非之決于其明不于其暗衆寡非所決也夫子有栖栖倀倀之疑而鄉原無所往而不為原人楊朱墨翟之言至盈天下誠內省不疚無惡于志則亦何必鄉人皆稱原人也然誠子氣質之偏云為之過多在于迫切紏急以此為學安能壞積私之植以底蕩蕩平平之地狷忿潛為厲階雖加鞭勉益傷宇宙之和矣與張輔之此理塞宇宙古先聖賢常在目前蓋他不曽用私智不識不知順帝之則此理豈容識知哉吾有知乎哉此理豈容有知哉吾書此非敢以贈輔之亦聊以自警耳與饒夀翁是心有不得其正想不知耳知之斯正矣為仁由巳而由人乎哉物有本末事有終始知所先後則近道矣是心誠得其正斯知之矣存乎人者莫良于眸子眸子不能掩其惡胸中正則眸子瞭焉胸中不正則眸子眊焉所謂不正者不必有邪僻之念凡有係纍蒙蔽使吾不能自昭自逹者皆不得其正也比來諸姪見夀翁狀貌深歎其塵俗昏弱是乃心有不得其正之明驗也宜深省痛鞭無遲回以自取湮沒二一種恣情縱欲之人血氣盛強精力贍敏淫朋醜徒狎比成勢其逞志快意之時目睛有光筋力越徑步趍舉動莫不便利此時視之豈有眊然之驗及其見君子聞正言見正事無淫朋之助而孤立于正人之中神裭氣奪情有所格勢有所禁則眊然之説時或有證若夫徒言之人不能自明自逹有所抑壓有所蒙蔽有所滯礙至于顛躓而不能自起昏弱而不能自奮沉溺而不能自拔困憊而不能自持疑惑而不能自解此時乃眊然之明驗也此心之精明湮沒沉淪一至于此豈不甚可憐哉行不失其居居不違其道是故經綸酬酢變通不窮無須臾或離其位也此吾新得試參之三夀翁日對雲山坐擁書史造物者時鋪張瓊瑶以照映宜其胸襟明快氣宇軒豁翰墨餘事嶽聳川增中昨于兒姪處竊覽詩什簡尺鄙習塵言時刺人眼殊未厭所望豈離群索居綱弛棟撓市井群兒之態復得為祟于吾象山之顛耶幸深省痛鞭毋貽雲臺羞也四德固夀翁二友居山想至可樂也夀翁氣質自佳而比來學力未知其進此理未能昭徹外纍圍繞殊無摧鋒陷陳之功而有蓄縮巽懦之態昏昏默默為苟免之計此亦安能自免哉但其智不明不能自勉耳德固頗聞是非明白幸為我斷之五得信承居山安適甚慰近詩尤佳真有陶韋氣韻可見所學之進來書著察磨礪四字不可連用若云磨礪不敢懈日有著察之驗則可蓋著察二字是效驗察字尚有兩用如省察加察熟察則是我致察于事理人物若事母孝故事地察舜察于人倫易言察于民之故史言其境關之政盡察此皆是言其智識之明察物無能逃者非是言我致察于彼也孟子之行矣而不著焉習矣而不察焉此乃著察字出處其義尤分明若同著字使則其為效驗明甚此用字之疵也德固不别𥿄本末先後之序切不可使倒置也六閲人之多益知人材之難蕃姪平日一家賴之事無巨細皆經其心手而間雅沉靜琴書之致深造自得比一二月間所整葺事務至多間翻選粹晉書皆盡帙無遺材力優贍誠難其輩詩文下筆皆非泛泛所到而其涵泳儲蓄不肯輕發理道精明見于事上使下處事御物可謂有證矣而甚不自足若射之有志不中不止凡此皆其有以自處非或使之然也此其為難得也至矣天何奪之遽耶痛哉冤乎鄉黨鄰里莫不傷怛况吾夀翁乎今已為立嗣子名曰紹孫乃百九姪第五子也見擇􅌾地未有􅌾期恐欲知之耳七近見與持之書及詩文其間粗存大旨雖不及詳看耍亦不必詳看詩似有一篇稍佳餘無足采大抵文理未通散文字句窒礙極多吾少時學文未嘗如此此等可以立曉比見後生作文多有此患竊所未喻居山必須有暇讀書何為未能曉此其文既如此則安能知古人文字工拙鄉來見此等皆歸之大體不振精神昏弱故觀書下筆皆不得力比數書又粗存大旨或恐所謂粗存者但習聞之熟姑存故事非胸襟流出之辭決矣與倪九成春間承訪恨不及欵其時見九成精神意向皆已汨沒追念向時從遊之意無復髣佛矣遂獻愚衷或冀自此幡然為益不細來書乃有但説病狀未説病源之疑此乃俗見膠固俗習深重雖聞正言未肯頓舍自以曲折之意為曲折之説亦其勢然也譬如小兒懶讀書多説懶方未肯便入書院耳要知病源即此是也以九成之質直誠能深思俗見俗習之可惡能埋沒人靈蒙蔽正理思之既明幡然而改奮然而興如出陷穽如決網羅如去荆棘而舞蹈乎康莊翶翔乎青冥豈不快哉豈不偉哉尚誰得而禦之哉誠能于此自決則名方乃在九成肘後良劑乃在九成囊中反而求之沛然甚足尚何事觀我朵頥云哉與張季恱盛僕凌雲致書發緘快讀辭旨煥然深見進學之驗何慰如之比來三日乃濟登滋雨意叔怠而登車輒霽獨垂至而值雨至此踰四日矣白雲繾綣日相周旋猶未即安雲臺僅一再見南山亦時至于玉田中縹渺呈露數峰風練諸瀑淙淙自振猶未及一顧之也應朱二公書未及即治更三四日可遣盛僕來取盛親賢德如此此所樂為二公言者傳來之文誠如雅諭宜不逃所見觀其首尾皆竊用山翁平日言辭獨其旨趣乖違繆陋覽之深有假寇兵資盜糧之愧然六藝聖人作也小人猶假之以文姦言天下無小人異類則已誠未能絶去小人異類何言而不可假也惟此道之明善人之衆彼無所施則自熄絶矣城狐社鼠託夜以神其姦使遇正人自無所施惑之者必其心之素邪所謂物各從其類也雖然彼其心之本然豈其然哉惟其陷溺而不能以自還故至于此要當開其改過之門懇惻而開導之凡陷溺之未深而自以其聲氣相求應者尤當懇惻而開導之發明剖折使是非邪正判無所疑則小人異類妖狐孽鼠無所逃其形而陷溺之未深者安知不幡然回心而鄉道哉昔大禹既平水土貢金九牧鑄鼎象物百物而為之備使民知神姦以入山林川澤魑魅魍魎莫能逢之古人所貴于博學審問謹思明辨者政欲究知人情物理使之通逹而無所蒙蔽窒礙小人異類無所竄其姦于其言論施設如見肺肝則彼亦安得而不熄絶乎季恱所到其于大槩可謂明矣政當益盡精微使蒙蔽者有所賴是所望也二承諭新工但覺健羡第流俗凡鄙之習謬妄之説止可哀憐傷悼當有開導扶掖摧陷廓清之功乃為進學之驗若視之如讐方敵國苟以不為所搖為吾效驗恐未可也與劉伯協區區之志素願扶持此理竊謂理勢二字當辨賔主天下何嘗無勢勢出于理則理為之主勢為之賔天下如此則為有道之世國如此則為有道之國家如此則為有道之家人如此則為有道之人反是則為無道當無道時小人在位君子在野小人志得意滿君子厄窮禍患甚者在囹圄伏刀鋸投荒裔當此之時則勢專為主群小熾然但論勢不論理故平昔深惡論勢之人今門下誠肯相與扶持此理洗濯流俗之習以理處心以理論事何幸如之敬虗心以俟教二人家之興替在義理不在富貴假令貴為公相富等崇愷而人無義理正為家替若簞食瓢飲肘見纓絶而人有義理正為家興吾人為身謀為子孫謀為親戚謀皆當如此然後為忠其自謀者或不然亦是不忠于吾身矣某向來區區之志素有不在利害間之語正為此耳來示所謂輕犯名分之語甚未當理名分之説自先儒尚未能窮究某素欲著論以明之流及近時為弊益甚至有郡守貪黷庸繆為厲民之事縣令以義理爭之郡守輒以犯名分劾令朝廷肉食者不能明辨其事令竟以罪去此何理也理之所在匹夫不可犯也犯理之人雖窮富極貴世莫能難當受春秋之誅矣當此道不明不行之時群小席勢以從事亦何嘗不假借道理以為説顧不知彼之所言道理者皆非道理也儻不以斯言為罪敢傾倒以畢其説某之説正吾人大趍向大旨歸所當先辨者此之不辨而規規然以聲音笑貌為道真放飯流啜而問無齒決飬其一指而失其肩背孟子所謂不知務不知類與黃循中某山居講習粗適素懷荆門之命固出廟朝不忘之意然雅未有為吏之興幸尚遲次可徐決去就耳人之不可以不學猶魚之不可以無水而世至視若贅疣豈不甚可歎哉穹壤間竊取富貴者何限惟庸人鄙夫羡之耳識者視之方深憐甚憫傷其賦人之形而不求盡人之道至與蟻蟲同其飽適好惡虗生浪死其在髙位者適足以播惡遺臭貽君子監戒而已此固循中所宜深曉第居今之世不得不申言之諒亦不厭于此也二江德功質本庸暗加以所學之謬豈復有可論者所惜吾友為其所引辨于其不足辨耳古書有明理之言有教人用工之言如中庸首章惟戒謹不覩恐懼不聞及謹其獨是用工處次章惟致中和是用工處他辭皆明理之言推此可類見與晦翁往復書録往伯珍舜輔會次幸示之象山先生全集卷之十二
