front:
  text: 象山先生全集卷之十六書
  hash: sha256:43472ef3eb64650a6bf13da8a3acfb4bb8d84759dc9c463d0e0cd9187718ba81
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_016-1a}
body:
  text: 與章德茂此月兩拜手翰如奉談麈慰浣之劇伯兄以老病不獲進謁為恨重蒙致禮之勤豈勝感戢小兒持之獲侍尊爼所以待遇者皆過其分尤切悚愧如聞屬有手足之戚諒深追悼後時修慰不專尚幸裁恕小兒頗能道餘教萬一警䇿多矣荆州逃卒視州郡為逆旅周流自如莫知禁戢平日若此緩急安能防間比方稍修其籍革頂名之弊圖致請于大府丐與鄰郡為約以絶逃逸之患適得公移甚愜下意即已行下巡尉義勇等嚴其迹捕近有襄陽逃卒投募在此捕者尋至即令擒去矣敝邑自某入境逃卒亦不少有未獲者恐在府下徑差人迹捕或恐此輩群黨欲丐移文兵官巡尉義勇等為之應援倘蒙捕獲亦可懲後也干冒威尊不勝惶恐二某備數屬壘倐閲半祀名雖北鄙實帶嚴城光潤所蒙最為親切粗謹職守未至􅘃敗無非大府之賜尺箋闕焉不干記史是猶陟嵩華而忘山泳江湖而忘水揆之常情宜獲罪戾比得邸吏别報乃知姓名首塵薦剡所以奬借之辭寵甚聞之惕然弗稱是懼治古公道還于盛世前輩典刑蔚乎斯在敢不益勵素志勉竭駑朽蘄無負斯言世俗私謝之禮則不敢以纍門下伏冀髙明必垂洞察職事所當控聞者雖有公狀亦合更具稟劄慮勤聽覽且恃照臨之密邇皆缺弗致今受知之深乃如此尢不容以言謝三奉十八日手誨愛民閔雨之誠尚賢戢姦之旨可謂兩盡而兼著豈勝歎仰公道之任歸門下久矣非適今日某區區之志粗知所擇雷同苟合竊亦所耻同官相與當何求哉事惟其宜理惟其當議論設施不必在已相期相勉大抵以此平居論事始有未合各獻其宜仇然自竭反復之久是非已明伏義如響人得所欲殆莫知𥘉説為誰主之也仰視滅私之訓妄謂或庶幾焉核實之命不容不以情報今茲旱勢可畏殊甚襄鄂之間沂漢之舟鱗積灘底曠旬淹月而不得進漢上雨晹可見于此矣江流增減大府具知之瀕淮並江諸郡屬嘗具稟續加詢訪舉亡異辭敝邑𥘉六日致禱雖未即得霈澤壇遺之所朝莫致敬祠官未常不沾濕也惟望日終日晴徹四無纎雲既望之朝率郡官迎致上泉復冒雨而歸自是日及今隂雨無曠日境內獨襄水西鄉先得大雨七日八日之夕自城上望雨色如黛震霆為之逹旦十二三間襄水東鄉如獨山等處亦得大雨至十七八間沿江鄉及與安樂東鄉往往得大雨矣比日郡城乃始雱霈南鄉最旱處亦且得雨雨意至今未怠當陽亦十七八以來雨始加大江東西田土較之此間相去甚遠江東西無曠土此間曠土甚多江東西田分早晚早田者種占早禾晚田種晚大禾此間田不分早晚但分水陸陸田者只種麥豆麻粟或蒔𬞞栽桑不復種禾水田乃種禾此間陸田若在江東西十八九為早田矣水田者大率仰泉在兩山之間謂之浴田實谷字俗書從水江東西謂之源田瀦水處曰堰仰溪流者亦謂之浴蓋為多在低下其港陂亦謂之堰江東西陂水多及髙平處此間則不能蓋其為陂不能如江東西之多且善也惟南鄉去山既遠且近江髙平之地多又邇大府居民差衆故多不仰泉石之田此田最下歲入甚多白楊一鄉此田居十五以匕梨陂柘陂等鄉不下十二惟西北東鄉分則無此田矣然所謂水田者不善治堰則並髙處亦與平田相類矣少者不十一多者不十三通之不過十二上泉距郡城幾三十里迎泉之日迂視其田計其龜坼者十一二外此皆尚有水然堰中已乾而不繼必大敗今得雨可無害也惟白楊鄉等處髙平田全未種者見施行今種晚榖及可助食者今歲亦幸有湖北平時水浸有不可種禾者民皆種禾若復無水患又得時雨或者可輔未種之田耳小兒歸就試經從大府輒布此令進謁竊惟軫憂斯民之深所欲亟聞故詳及之伏幸台察四屬奉手誨益深佩服小子持之再望道德之光蒙接遇之寵為幸厚矣家問中備述餘教尤深感激傳有聞民有姓易者為乏食户強以錢取去倉粟或云在長林境中及物色之乃無此事又云在當陽境內方此詢究尚未報也俟得其實續當布聞比來雨澤無不霑足但次第有過多之患十三日偶天隂與僉判教授知縣人以一馬數卒行視田間苗甚秀發水皆盈溢向曾龜坼者今得水茂暢過于不缺水者髙坡未插秧者今插已過半秧田甚多尚往往成群插秧問何以能備此秧則曰年例如此若其不修陂池不事耘耨則皆枯死此地惰習未易空言勸之今冬欲措置革此習又未知果能革否陸地耕種粟豆者却多中稔為有餘矣前書所謂湖田者雖未及物色勢不能不病水耳襄陽唯南漳宜城間得雨外此皆久無雨是間舟泊襄水灘下者𥘉七八間得信猶言水澀不能前進𥘉七日有微雨不成水十二三間自北來者却云襄陽得雨成水但未通洽未知此後如何久傳北界旱甚河之南北至相食𥘉未敢信今東自承楚西自均房來者其言若一恐或有是竊惟長者愛民之心追配禹稷無間于遠邇內外獨恨華夷首足之分未克大正皇朝德施仁風獨有限隔君子之憂未容遽釋旦晚召還兩地以究設施則樂民之樂為有日矣春間趙路分良弼來閲禁旅介然如古節士尋有孟正將通成統領和因事相繼過此適值同官習射率然延至其間以觀其技馳射精熟議論慷慨異時所見武辨不多其比陶冶下風者人材如此推而廣之何事不可為哉長林汪宰𥘉甚不堪姦民之訟既見某薄治其吏亦不能無疑因曉以吾人無他于此輩行法以防微不得不爾即遂釋然姦民肆其欺罔以快私忿真大蠧也長林具析申狀皆是事實併用備申伏幸過目昨日得公移聞二縣以酒折鋪兵糧長林斷無此矣長林鋪兵皆在軍倉請米軍庫請錢皆是一色白米好錢未嘗有折支也當陽方此詢之然以理揆之沈宰處事極有理不至如所聞或恐有疑似又當有曲折須其報即具申也近日以所獲劫盜中有二人是攫客稍以榜約束之兼聞此輩群黨擾寺觀與鄉村民户頗甚故不得不裁之亦不敢以稟聞也西蜀之飢淮浙之蝗皆令人不能置懷處州豪民為盜猶可憐也此上雖雨澤粗足尚用凛凛日俟教誨以免罪戾伏幸終惠五稍踈記室之詢徒積傾仰今歲之旱諸鄉皆有少損而南鄉頗甚𥘉擬瀕江湖下鄉常歲所不種者今歲可種謂可以輔近兩月間江漢之流無雨而漲溢者凡三所種之田與𬞞茄麻粟皆為烏有同官赴試與𬒳檄而出者皆親目其事歸言其狀為之怛然比已分委同官四出檢視前數日方歸所得尤詳旱潦之餘米榖自少而諸處糴米之舟皆鱗次岸下如都統司至使人于鄉村攔截載負米者本軍今歲以民艱食逐時發常平以賑之所糶幾二千石見樁糶過常平錢二千緡倉臺公移踵至催以此錢趂時糴米以備來年賑濟雖分差人於熟鄉收糴而來糶者絶少比數日以來米不出市民復艱食見出常平賑糶近來屢謀出賞榜禁米舟下河而吏輩輒以恐有遏糴之嫌為言𥘉以其有理亦與同官熟論而從之近日事勢尤逼又見郢州以百千之賞禁米舟下河此間新發舉人親戚之家犯其禁用朱漕之言免其罪竟納賞錢試以問吏吏復為遏糴之説昨日同官相聚復有議泄米之禁因評吏言果出於公乎抑有私意乎同官皆謂此輩必有親故厚善之人商販米者故以此為地耳豈有公心哉疑未決間忽𬒳使臺公牒深怪事未施行已蒙止絶殆所謂止邪于未形絶惡于未萌雖然此事乃如吏輩之意敝邑元無是事不知誰敢致此説于大府疑必有交鬪其間者有不可不察也某平時不能飾説况在門下尤不敢不用其情鄉來襄陽遏米價米舟至者皆困不能前然卒以賂津吏有夜竊過者常謂法禁往往不足恃比年場務益艱商旅多行私路私路舊微小少所知者今皆坦途通行北境連年不熟今歲尤甚近聞米過唐鄧間多不以舟小民趍目前之急不暇為後日計况肯為鄉曲計為州縣計乎使米粟有餘無禁其泄可也今方甚不足以坐視其泄恐亦未宜敝邑𥚹小今歲才數旬不雨市輒無米鄉民素無蓋藏同官出入村塢者皆謂未常見囷倉人家多茅茨其室廬不能深奧大率可窺其有者乃儋石之儲耳風俗所自來非一日今日不為之計後將益弊今所謂泄米非泄于南之患泄于北之患也已若有餘或能粗給則推以與人乃所願也此方有旦暮之憂而不為後日計者方纍纍舉所恃以泄恐不容坐視薄遽亟此布稟丐察言者之姦續容商議所以處之之宜别當具稟伏幸台察與張元善漕臺數有便郵其發多值冗不克附問纍託象先致意會次當必及之嚴山蓋倉其説未善若謂以舟致之襄陽則江漢湍淺曠日持久當漲溢時風濤險悍類不可行陸運則自嚴山至班竹號六十五里山路阻隘﨑嶇其實不止此數又類有水隔春夏之間每用阻絶本軍至班竹八十五里乃坦塗又嚴山非市井去處人煙踈闊儲草則可儲粟則難于看守莫若葺軍倉以儲粟今子城既固如在枕上矣長林巡視小路常親歷其地敘説甚詳已備在公狀中幸裁之九江德化丞鄧約禮字文範階為文林今冬當代其家世建昌乃臨川李侍郎德遠之壻其居舊遭回祿未赴德化時寓居李氏今其妻兄官滿歸臨川鄧丞欲及未代前一歸建昌營居舍願丐使臺一檄若蒙垂允但付此間旦晚即附往也亦嘗託象先轉凂諒必無阻此公鄉里之秀端慤純正甚有宦業比年攝兩邑當事之難拯其敝壞更使為佳地民之戴之不忍其去無愧史册所書異時真可備藥籠中物韓昌黎字戒以在得人卒章要哉言乎敝邑兩令皆賢教官時有禆輔自簽以下皆悉心營職無有異志唯稅官頗謬近得一指使佐之其職頓舉拙者不過扶持勸勉使其善意不替有加庶幾蒙成以免戾今農賈安帖吏卒抑畏盜賊衰息作則輒獲訟牒之少乃至曠旬械笞塵委五刑植立試用希濶用必聚觀此豈迂拙所能坐致竊自幸者亦同官適逢其人耳方至此時積訟頗多非其俗惡乃不能無敗群者耳此輩遨逰城市持吏長短無理致爭期于必勝敵不能甘遂成長訟諸司不止乃至臺部𥘉既精求案牘辨其曲直既又曉以義理使得自新能自伏義願改者固十八九至于怙終之人雖稍柔服于一時尚圗復逞于他日同惡亦視此為消長所大幸者諸司皆賢明此輩無所復逞今訟之日少俗之日厚亦正以此向來得書謂未識張監張監趍向甚正議論有典刑到任以來文移條理每每可服張憲在九江時假道識之蒙渠約飯亦自道其政大抵亦有家法聞到常德多病少見賔客公文亦多傳入宅書押若無所孰何引大體卧護政亦何傷雖曰德星聚可也稽之事實乃有大謬不然者今敗群之人皆走憲臺此輩不之他司而之憲臺殆必有侮而動今不問宜可動輒索案案之往也又不知所處動輒可怪聞憲臺之吏最無禮而又能觀其文移行遣似皆出吏輩敝邑亦有數事他郡可推而知之未欲盡述其本末若欲知之後便稟聞也聞象先與之相善不知能有道以已之乎姦吏猾民託以擾郡縣害良民傷政敗俗亦不細矣官之不可非其人如此哉久不奉問引筆輒纍纍如此可一笑也二併啓三函良佩謙眷備承作止足慰傾馳事皆得請尤用感服近日得雨稍大境內頗周遍唯傍江陵界上多未種此恐無及耳和糴一事得不及敝邑可謂大惠屬者不雨曾未踰月民已艱食亟發常平之粟四散賑之僅免狼狽繼此雨澤霑足倘得中下熟敝邑欲自措置私糴少米貯之鄉間以為異時之備此謀或遂皆門下之賜也修城會子甚濟空乏餘會若便得乃幸望示其期交納銀綱處免苛留之患皆藉餘庇兊換會子二萬貫其數甚少聞之去年換會子時官府行之滅裂細民又不善觀揭示誤認下文立限三月之內有不及之數並仍舊流轉交易買賣遂收不損壞者不赴場換易及至限滿既行使不得悔之無及今此懲前日之害叢湊來換官吏見發到會子不多遂人限其數日限其人來者頗以為病前日令其限數日換三四千緡來者原原後又將不止又以商人以會子難得滯留于此所積或三四百千或七八百千官吏見其數多又是商旅又限其數不肯換與來訴淹留折閲之狀勢不容不換與之所發會子不供數日耳公移再求五萬勢恐未止此數若覺未足又當上凂前日得新漕臺復書見其辭氣溫厚有前輩典刑甚為之喜第前此不相識未欲遽以片𥿄輸腹心象先書中屢言林幹之賢欲通書偶亦未及漕臺會次得借一言之重使獲區區牧飬之志不勝幸甚郡縣非得使家相知聞相假借則吏文之能掣肘者多矣切幸介念汪長林真愛民如子近有姦民楊汝翼方九成者嗾其黨類十餘人擁帥庭訴其虐民詞中有云欲訴本軍又恐知軍刪定太慈若只送縣愈起讐民之意某在此𥘉未嘗以姑息從事猾吏姦民為柔良害者屢繩治之矣單辭虛偽或不待兩造而得其情尋問根本與之反覆頃刻之間有姦露辭屈伏罪而去者區區於此自謂有一日之長訟爭之少盜賊之衰殆亦以此愚民但見械笞塵委試用希闊往往有慈仁之説其姦黠駔儈者實有所憚且惡其不便于已他未有可以中傷且倡和其間加大慈等語以為媒蘖之地帥庭之訟此其驗也帥方禱雨未應此輩乘時投辭帥舊知長林方得書稱歎其美見規某不能拈出此牒尋至亦不能不疑觀其判辭不止于疑遂至盛怒章文賢甚某即以書解之渙若氷釋此等尤令人敬服王謙仲在隆興時曾傳間一事即以書告之政與此相類謾録往一觀此等亦不可不知也後見謙仲報書云果有是事但所判甚平却不至于長姦也此間號民淳但細民淳耳至其豪猾則尤陸梁于江浙也因筆不覺忉忉象山先生全集卷十六
