body:
  text: 程文孝文大功數十論頌人之美者必增重乎其人頌人之美而不足以增重乎其人則其非為無疑矣立言之非者必貽譏于後世立言之非而不足以貽譏于後世則其非又有大焉者矣孝文漢之賢君也眺錯大廷之對枚數其興利除害變法易故之事而凡之曰大功數十其美亦巳至矣其言亦已夸矣而後世稱文帝之賢者𥘉不以斯言而增重蓋文帝以直言極諌求人而錯亦以直言極諌充詔不聞條疏闕失輔帝不逮而猥用稱述功烈其辭諄復駸駸乎侫譽誣諛之風勞于附會粉飾而無中情當理之實其非無足疑矣然自昔公明通方之士于錯之對未嘗深致意于斯言非以為然而或取之也蓋以其言之非有大過于是者而不必以斯言輕重之也君子一言以為智一言以為不智此一言之失者也若錯之對無非遷就牽合之説如五帝三王五伯之説一篇之襟領而悖理尤甚要其歸獨欲以自親事一説勸帝而又大乖乎帝王之道此孝文大功數十之説宜昔人之無譏焉耳雖然言心聲也錯以大廷對䇿豈徒為是繆戾不根之説以塞詔而已耶蓋其刑名慘刻之學深欲其君廢放股肱之臣身履叢脞之任智憊力竭欲已不可欲進不能則勢必委之于我而我之辨智得伸焉其機如此則亦不得不盛稱其功烈能事以聳動其欲為之心激發其敢為之氣使之樂吾之説而不自知焉然則大功數十之説豈可謂之不足輕重而置之乎孟子曰長君之惡其罪小逢君之惡其罪大錯之斯言其逢君之惡者矣為錯解者曰將順其美亦事君之道而何過之深乎嗚呼不知言無以知人也彼其終身之所學平日之所存發之于言者雖欲掩匿蔽覆由君子觀之如見其肺肝况其處心積慮旁求曲取以附致其邪説而有所不知則不可謂之知言者矣説春秋者以為言之重辭之復其中必有大美惡焉聖人之情猶可以辭見蓋聖愚邪正雖異而情見乎辭則同目動言肆懼我之情見矣幣重言甘誘我之情見矣錯述文帝之功其目數十如躬親本事廢去淫末農民不租親耕節用示民不奢此五者特一事也如絶秦之迹除苛解嬈寬大愛人肉刑不用罪人不拏誹謗不治除去隂刑此七者亦一事也其餘事同而條異者亦又有之號之以大功凡之以數十則其意亦可見矣蓋將以夸許聳動文帝之心而作其自任之意投之膠擾之地隂拱以窺其困而乘其隙以申辨智焉肇端于文帝之日而遂申于景帝之朝卒然歡于七國之變而山東幾非漢有袁盎從容一説而要領竟分于東市世莫不有讒忌之惜而愚獨喜其少足以正逢君之罪天地之性人為貴論聖人所以曉天下者甚至天下所以聼聖人者甚藐人生天地之間稟隂陽之和抱五行之秀其為貴孰得而加焉使能因其本然全其固有則所謂貴者固自有之自知之自享之而奚以聖人之言為惟夫陷溺于物欲而不能自拔則其所貴者類出于利欲而良貴由是以寖微聖人憫焉告之以天地之性人為貴則所以曉之者亦甚至矣誦其書聼其言乃類不能惕然有所感發獨膠膠乎辭説議論之間則其所以聼之者不既藐矣乎天地之性人為貴吾甚感夫聖人所以曉人者至而人之聼之者藐也孟子言知天必曰知其性則知天矣言事天必曰養其性所以事天也中庸言贊天地之化育而必本之能盡其性人之形體與天地甚藐而孟子中庸則云然者豈固為是闊誕以欺天下哉誠以吾一性之外無餘理能盡其性者雖欲自異于天地有不可得也自夫子告曾子以孝曰事父孝故事天明事母孝故事地察舉所以事天地者而必之于事父母之間蓋至此益切而益明截然無辭説議論之蹊徑至因其有無以加于孝乎之問又告之以天地之性人為貴有篤敬之心踐履之實者聼斯言也獨不有感于心乎于此而猶膠膠于辭説議論之間亦奚啻不以三隅反者哉雖然愚豈敢以是殫責天下獨以為古之性説約而性之存焉者類多後之性説費而性之存焉者類寡告子湍水之論君子之所必辨荀卿性惡之説君子之所甚疾然告子之不動心實先于孟子荀卿之論由禮由血氣智慮容貌態度之間推而及于天下國家其論甚美要非有篤敬之心有踐履之實者未易至乎此也今而未有篤敬之心踐履之實拾孟子性善之遺説與夫近世先逹之緒言以盜名干澤者豈可與二子同日道哉故必有二子之質而學失其道此君子之所宜力辨深詆挽將傾之轅于九折之坂指迷途而示之歸也若夫未有篤敬之心踐履之實而遽為之廣性命之説愚切以為病而已耳嗚呼循頂至踵皆父母之遺體俯仰乎天地之間惕然朝夕求寡乎愧怍而懼弗能儻可以庶幾于孟子之塞乎天地而與聞吾夫子人為貴之説乎智者術之原論實亡莫甚于名之尊道弊莫甚于説之詳自學之不明人爭售其私術而智之名益尊説益詳矣且誰獨無是非之心哉聖人之智非有喬桀卓異不可知者也直先得人心之同然耳其見于施設則合物理稱事情犂然當乎人心夫婦之愚可以與知焉奚名之尊奚説之詳哉逮夫智失而私術興則向之良心日馳騖乎詭譎姦詐之場實不足以欺天下也將竊智者之名以售其詭故名不得不尊名不可以徒尊也將文近似之説以實其名故説不得不詳名尊説詳而智之實益亡弊益甚矣此則智之賊也漢公孫弘謂智者術之原其賊智之誅固不可逭而愚又幸智之説由是而益明也世之罪弘者常以其飯脫粟為布𬒳殺主父偃徙董仲舒膠西此雖其挾術之明驗而特一人之過一時之害而常情之所易知者多詐不情汲黯能詰其不忠外寬內深班固能知其意忌蓋有不足深誅者至于竊智之名以售已之術要之以利害之效文之以近似之辭使聼之者誠以為治天下不可以無術而聖人之智亦不過如此而已此吾所謂智之賊而不可逭之誅也然墨之賊仁楊之賊義鄉原之賊德皆以近似之亂真其罪正與弘之言智等耳及孟子辭而闢之而曰仁曰義曰德由楊墨鄉原而其説益明有能因弘説而闢之使天下曉然知夫私術之賊智則弘之説亦智之幸也弘之説曰擅殺生之柄通壅塞之塗權輕重之數論得失之迹使逺近情偽畢見于上謂之術此所謂要之以利害之效文之以近似之辭使聼之者誠以為聖人之智亦不過如此而已也且聖人之智明徹洞逹無一毫私意芥蒂于其間其于是非利害不啻如權之于輕重度之于長短鑑之于妍醜有不加思而得之者故其處大疑定大論亦若飢食渴飲夏葛冬裘焉已耳雖酬酢萬變無非因其固然行其所無事有不加毫末于其間者夫如是可謂之術乎果必若弘之説乎鑠金為刃凝土為器為網罟為耒耜為宫室棺槨為舟車弧矢杵臼之利此皆上世之所無有創物以教天下者也而夫子則以為皆取諸易之卦畫是聖人之智見于創立者猶皆因其固然而無容私焉况于生殺通塞輕重得失之常而弘欲以其私術為之乎語稱舜禹之有天下而不與焉詩稱文王不識不知順帝之則夫生殺通塞輕重得失之理昔非有異于今也必欲以私術為之則舜禹文王誠不公孫氏若也自學之不明而聖人之智不復見矣世之人往往以謂凡所以經綸天下創立法制致利成順應變不窮者皆聖人之所自為而不知夫蓋因其固然行其所無事而未嘗加毫末于其間彼役役者方且各以其私術求逞于天下而曰此聖人之所謂智也故老氏出于春秋而有棄智之説孟子生于戰國而有惡鑿之言是皆見夫逞私術之失也然終至于縱橫如儀秦刑名如鞅斯者雜然四出而天下遂以分裂潰散至秦則燼然矣公孫氏生于漢而以儒名當世此溺待拯焚待救之時也乃復尊智之名詳智之説以售其私術世之人雖欲聞先生之智孰從而聼之故曰智之賊也孟子者聖學之所由傳也故其言發明聖人之智而指當時所謂智者以為鑿老氏者得其一不得其二而聖學之異端也故幸夫私術之失因欲申己之學而其言則曰絶聖棄智又曰以智治國國之賊是直泛舉智而排之世之君子常病其汚吾道而不知其皆售私術者之過也使術之説破則為老氏者將失其口實而奔走吾門墻之不暇其又何汚焉嗚呼觀老氏之説孟子之言與儀秦鞅斯之所為則術之害智所從來久矣非直至漢而然也然昔之為私術者名未甚尊説未甚詳故辨之者不力罪之者不深若孟子者不過曰行其所無事惡夫鑿而已至于公孫以黠中辨吻發䇿人主之前陳智之名益尊而術之説甚詳非明于道者有不能不為其疑似所惑故辨之不得不力罪之不得不深辨之力罪之深而智之説不明者不也故曰弘之説亦智之幸房杜謀斷如何論事之要者無二機計之得者無二説然而得于積思者其意疑得于忽悟者其意決此謀之與斷所以異任而同功殊稱而一致者也天下之事惟其要而難處也于是乎有賴于謀彼其以善謀稱而不足與斷者豈無得于其機而嘗試為之説也哉顧特以其旁推曲考原始要終紬繹復熟而得之則謹重之心勝而剛決之意微故不能不自疑其有所未善至于善斷者因其謀而遂斷之其始之為謀雖不出于已而亦豈無得乎其心而徒徇人之説以勇于必行而已哉蓋其權竒倜儻方鬱于紬繹復熟之久而聞言輒契覩機忽悟如雷蟄而忽驚日曀而忽明其勢不能不決然則謀之與斷雖所任各異所稱各殊而要其實豈不同功而一致也哉唐房杜佐太宗取天下而史稱元齡善謀如晦長于斷愚請以是而論之甚哉機事之可畏而謀斷之任不可以非其人也嘗觀漢髙祖聼􅐱生之謀刻印立六國後髙祖方食以告張良良借前箸籌之髙祖至輟飯吐哺怒罵令趣銷印石勒去髙祖五六百載以奴虜之身據有中原𥘉不知書一旦聼讀漢史至刻印事駭曰此法當失何以得天下及讀至張良之籌乃曰賴有此人嗚呼使酈生佩印已行數舍之逺則髙祖之天下幾已去矣知天下之機事率如是之可畏而張良之籌髙祖之罵石勒之駭皆機緘互發如聲響相應非直偶然而已則知凡所謂謀者斷者皆不可以或非其人而房杜之才智可得而論之矣雖然元齡謀事帝所必曰非如晦莫與籌之及如晦至則卒用元齡䇿自常情觀之元齡不失為謙抑謹重而如晦則為無謀而因人成事者耳嗚呼以此論房杜此與兒童之見何異奕秋中枰而輟奕少下于奕秋者必不能以舉其棊矣王良中道而弭輿少下于王良者必不能以振其䇿矣天下之機事而可以非其人而與于其間哉或謀或斷必其機緘識略之相符者而後可也韓信破趙之後發使使燕而燕人從風而靡其䇿乃不出於韓信而出于李左車然天下不以韓信為不知兵鄒陽受梁之謝入見王長君而梁罪竟解其計乃不出于鄒陽而出于王先生然天下不以鄒陽為非辨士蓋因其善而用之與夫發悟于心者實機緘識略之相符而非苟從之者也如此則知房杜之謀斷如宫商之相應而同于成聲如斤斧之迭用而同于成器𥘉不可以差殊觀而優劣論也抑嘗言之太宗以弓矢定天下其智略之出于已者班班見于紀傳大焉制勝千里之外小焉決機兩陳之間超逸神變不可窮極及天下既定談治道論政理則老師宿儒詘其辨此亦難乎其為臣矣然而自渭北一見之𥘉秦府表留之後謀必于房斷必于杜則夫二公之才智豈淺淺者所可得而窺議哉及考之傳紀則夫謀斷之迹有不可得而見焉嗚呼此二公之才智所以為不可及歟史臣取柳芳之言曰帝定禍亂而房杜不言功王魏善諌而房杜遜其直英衛善兵而房杜濟以文此真足以知房杜謀斷之本矣若乃謀之不善而強欲以辨屈人之異已如徐湛之于沈慶之者又有嫉其謀之善而必為沮格撓敗之計如牛僧孺之于李德𥙿者其視房杜之謀斷奚啻天淵之相遼哉雖然法律之書詳而望之以禮樂則缺功利之意篤而槩之以道義則踈此雖不足以是責之而亦不能不使人歎息也劉晏知取豫論天下之事不兩得知其説者斯兩得之矣取豫之説事之不兩得焉者也民有餘而取國有餘而豫此夫人而能知之者也至于國之匱方有待乎吾之取而濟民之困方有待乎吾之與而蘇當是時顧國之匱而取之乎必不恤民焉而後可也顧民之困而豫之乎必不恤國焉而後可也事之不兩得孰有甚于此哉使終于不兩得則終無一得焉爾矣故取豫之説不可謂易知也取而傷民非知取者也豫而傷國非知豫者也操開闔斂散之權總多寡盈縮之數振弊舉廢挹盈注虗索之于人之所不見圖之于人之所不慮取焉而不傷民豫焉而不傷國豈夫人而能知之者哉必有其才而後知其説也非唐之劉晏吾誰與歸史氏以知取豫許之真知晏者哉夫所病夫取豫之難者非一不足之難而皆不足之難也下有餘而取之可也彼方不足也而何以取之上有餘而豫之可也此方不足也而何以豫之天下有皆不足之病矣而有皆不足之理乎聞之曰川竭而谷盈丘夷而淵實天下蓋未始皆不足也方其上之不足也不必求之下也其可以足之者固有存乎其上焉者矣下之不足也不必求之上也其可以足之者固有存乎其下焉者矣將輸之利害不明則費廣于舟車之徭儲藏之利害不悉則公困于腐蠧之弊物苦道逺則尋以輸尺斛以輸斗吏汚法弊則私良公害私盈公虗此所謂不必求之下焉者也富賈乘急而騰息豪民困弱而兼并貪胥旁公而侵漁繩甕不立而連阡陌者猶未已也糟粳不厭而餘芻豢者猶爭侈也此所謂不必求之上焉者也由是言之有餘不足之數可得而見而取豫之説可得而知也然狃于常者變之則駭便于私者奪之則爭黨繁勢厚則扞格而難勝謀工計深則詭祕而不可察圖利而害愈繁趨省而費益廣則夫天下之才果不易得而取豫之説果不易知也支左屈右夫射者舉知之也至于中秋毫于百步之外左右前後惟的之從知之者惟后羿而已攬轡執䇿夫御者舉知之也至于致六馬于千里之逺周旋曲折惟意所適知之者惟造父而已國不足而取民不足而豫夫人而能知之也至于取不傷民豫不傷國知之者惟晏而已利病具于元載之書而轉漕之説詳鼓吹出于東渭之橋而轉漕之功著輔辟之選精也干請者寧奉以廩入故趨督倚辦而功成教令之出嚴也數千里無異于目前至嚬呻諧戲不敢隱鹽法密于第五琦而地無遺入鼓鑄興于淮楚間而貨有餘緡彼其所以取之者豈盡出乎下哉是以取之而民不傷駛足募而商賈不得制物價之低昻賑救行而豪植不得乘細民之困溺檢核出內一委之士而吏無所竄巧督漕主驛一出之官而民得以息肩無名之斂雖罷而鹽榷實行米粟之賑雖出而雜貨則入彼其所以豫之者豈盡出乎上哉是以豫之而國不乏嗚呼創殘之餘而嚮敵之甲未解也飢疫之後而饋軍之輸未艾也上方宵旰而民且囂囂而晏也遑遑于其間深計密畫推羡輔闕國不增役而民力紓民不加賦而國用足非夫知取豫之説妙取豫之術疇克濟哉若夫頭會箕斂剝膚椎髓疲民力而徼便漕之功于難成之渠捨吏欺而責負逋之租于已輸之民竭下以益上困民以恱君此則韋堅王鉷楊國忠之倫無恥敗國甘處乎晏之下而人皆憤焉者也至于談仁義述禮樂既古人之文而不既古人之實大言侈説而不適于用如裴光庭之暴宇文融之惡而不能任國用不足之責房琯知惡第五琦而不能對何所取財之問此則不知堯舜孔孟之學雖自處不在晏之下而天下皆笑之者也甘處乎下者如彼欲出乎上者如此則夫知取豫者非晏之與而誰與也雖然論之以聖人之道照之以君子之智則堅鉷國忠雖晏所不為而愚恐其有時而同科琯光庭雖不足以詆晏而愚恐晏未免于可詆何則晏之取豫出于才而不出于學根乎術而不根乎道出于才而根于術則世主之忠臣而聖君之罪人也上有道揆而責以有司之事焉可也人君恱而尊寵之鮮有不弊焉者也易之理財周官之制國用孟子之正經界其取不傷民豫不傷國者未始不與晏同而綱條法度使官有所守民有所賴致天下之大利而人知有義而不知有利此則與晏異故曰出于才而不出于學根于術而不根于道晏之治財未能過管商氏仲尼之門五尺童子羞稱管商曾西之不為孟子之不願至于商君則後世篤論以為帝秦者商君也而亡秦者亦商君也今晏之所為如茗橘珍貢常冠諸府要官華使多出其門畏權貴而稟其人默其口而啖以利為國家者亦何利于此哉使不死于楊炎之擠則其汚身敗國者將不止此人莫不以楊炎之擠為晏惜而愚獨以為晏之幸故曰論之以聖人之道照之以君子之智蓋未免于可詆亦未必不與堅鉷國忠等同科雖然才之難也久矣道不稽諸堯舜學無窺于孔孟母徒為侈説以輕議焉可也政之寬猛孰先論君不可以有二心政不可以有二本君之心政之本不可以有二而後世二之者不根之説有以病之也寬猛之説其論政之不根者歟岐君之心撓政之本其害有不可勝言者惜乎未之辨也唐憲宗問權德輿政之寬猛孰先當時德輿之對似亦有得乎吾所謂君之心政之本者矣惜乎其不能伸之長之而寬猛之説未及辨也寬者美辭也猛者惡辭也寬猛可以美惡論不可以先後言也強弗友之世至于頑嚚疾狠傲逆不遜不可以誨化懷服則聖人亦必以刑而治之然謂之剛克可也謂之猛不可也五刑之用謂之天討以其罪在所當討而不可以免于刑而非聖人之刑之也而可以猛云乎哉蠻夷猾夏冦賊姦宄舜必命臯陶以明五刑然其命之之辭曰以弼五教期于無刑臯陶受士師之任固以詰姦慝刑暴亂為事也然其復于舜者曰御衆以寬曰罰弗及嗣曰罪疑惟輕曰與其殺不辜寧失不經好生之德洽于民心茲用不犯于有司嗚呼此吾所謂君之心而政之本也而可以猛云乎哉寬猛之説古無有也特出于左氏載子産告子太叔之辭又有寬以濟猛猛以濟寬之説而託以為夫子之言嗚呼是非孔子之言也且其辭曰政寬則民慢慢則紏之以猛猛則民殘殘則施之以寬使人君之為政寬而猛猛而寬而其為之民者慢而殘殘而慢則亦非人之所願矣嗚呼是非夫子之言也語載夫子之形容曰威而不猛書數羲和之罪曰烈于猛火記載夫子之言曰苛政猛于虎也故曰猛者惡辭也非美辭也是豈獨非所先而已耶是不可一日而有之者也故曰可以美惡論不可以先後言也左氏之傳經説春秋者病其失之誣柳宗元非其國語以為用文錦覆陷穽彼其寬猛之説其為誣而設陷穽也大矣左氏不足道也吾觀西漢董生三䇿不能無恨三䇿之辭大抵粹然有臯夔伊傅周召之風使人增敬加慕其首篇有王者宜求端于天任德不任刑之説尤切時病至武帝再䇿之有所謂商人執五刑以督姦傷肌膚以懲惡之説且繼以周秦之事為問嘗謂當時待詔者百有餘人至于此語未必非仲舒任德不任刑之言有以激之也此其説蓋亦有所自來而仲舒乃不之辨特推周家刑措之效以為由于教化之漸仁義之流非獨傷肌膚之效也殆若無以加答而遷就其説者然若夫周措刑之美秦用刑之非武帝固自言之矣彼之所問者特以商人執五刑以督姦傷肌膚以懲惡有異于周之措而秦之用此則武帝之所據以遂其任法之意者也此其説蓋出于戴記商人先罰後賞之言嗚呼盡信書不如無書戰國之君爭城以戰殺人盈城爭地以戰殺人盈野孟子必力辨血流漂杵之言以為非是武成周書也戰國周之世也書者又夫子所定去孟子未久也至其言有害理非實而足以病人君之心術亦必力辨而無嫌武帝之時經籍出于秦火灰燼之餘而記禮之書特傳于二戴之口其非聖人之全書明甚其所謂執五刑傷肌膚之説又背理非實亦彰彰明甚仲舒胡不稽克寬克仁之言敷政優優之言后來其蘇后來其無罰之言以告之且申戴記先罰後賞之説明辨其非是以祛武帝之惑顧乃遷就其説而不之辨亦異于吾孟子矣張湯之徒竟以任職稱意公卿之間往往繫獄具罪知見之法興繡衣之使出罔密文峻而姦宄愈不勝吾于仲舒之䇿不能無遺恨焉至再傳而為宣帝之雜霸又轉而為元帝之優柔皆此説之不明也嘗謂古先帝王未嘗廢刑刑亦誠不可廢于天下特其非君之心非政之本焉耳夫惟于用刑之際而見其寬仁之心此則古先帝王之所以為政者也堯舉舜舜一起而誅四凶魯用孔子孔子一起而誅少正卯是二聖人者以至仁之心恭行天討致斯民無邪慝之害惡懲善勸咸得遊泳乎洋溢之澤則夫大舜孔子寬仁之心吾于四裔兩觀之間而見之矣然則君人者豈可以頃刻而無是心而所謂政者亦何適而不出于此也故曰君不可以有二心政不可以有二本唐李吉甫嘗言于憲宗曰刑賞國之二柄不可偏廢今恩惠洽矣而刑威未振中外懈怠願加嚴以振之當時帝顧問李綘綘雖能以尚德不尚刑之説折之然終未能盡愜于理盍亦曰吉甫為宰相若中外誠有傲逆淫縱敗常亂俗麗于法而不可逭者盍亦明論其罪告主上以行天討乎何乃泛言刑威不振勸人主以加嚴此豈大舜明刑之心而臯陶所以告舜之意乎如此則不墮于偏廢之説而吉甫之失自著矣噫吉甫斯言可謂失其本心者也其後于頔勸帝峻刑帝乃告諸朝而推論其意吉甫退而抑首不言笑竟日則吉甫亦可謂知耻者矣後之欲以險刻苛猛之説復其君者尚鑒于此哉善哉德輿之所以告其君者乎蓋亦有合乎吾孟子告君之機惜乎其無以終之也人君之所以進于先王之政者蓋始于仁心之一興爾然而事物之至利害之交此心常危而易蔽况夫水溺火烈之説載于左氏嚴理寬亂之論著于崔實而世莫之非一旦而君有寬猛孰先之問安知其不有所蔽而然乎德輿首告以太宗觀明堂圖以罷鞭背之罪此與孟子以見牛之説告齊宣王何異真足以興其仁心矣宜乎憲宗然之無疑其後不惑于吉甫于頔之説而能顧問李綘推論于朝者未必非德輿斯言力也雖然有仁心仁聞而民不𬒳其澤者不行先王之政也仁心之興固未足以言政孟子之興其仁心者固將告之以先王之政也若德輿則不復進于是矣此吾所以惜其無以終之也嗚呼是説之難久矣自堯以是而哀鰥寡之辭舜以是而稱臯陶之休禹以是拜伯益之言湯以是優代虐之政文王以是明丕顯之德武王以是釋箕子之囚至于穆王猶能以是而作吕侯之命三代降斯道其不行矣孟子沒斯道其不明矣夫自漢儒之純如仲舒猶不能使人無恨則吾于德輿乎奚責常勝之道曰柔論人情之所甚欲常出于其所甚不欲處天下之勝而舉天下常無以勝之者此固人情之所甚欲也若乃暴之而有勝人之形張之而有勝人之勢嶤嶤然與物為敵而未始少屈者此則快于常人之情而以為可以致勝焉者也然而天下之取敗者常出于此而幸勝者不萬一焉至于窺之而無勝人之形抗之而無勝人之勢退然自守𥘉若無以加乎人者此則常情之所甚不欲而以為無足以致勝焉者也然而勇者于此喪其力智者于此喪其謀舉天下之所謂若可以勝人者皆于此而喪其強則夫常勝之道蓋無越于此者然則其所甚不欲者乃所以致其所甚欲者而人或未之知也常勝之道曰柔列禦冦之所以言也切嘗論之禦冦是説固不可以苟訾亦不可以苟贊何者論勝之勢而不及理則勝有不出于柔語柔之體而不及用則柔有不可以致勝悉楚甲以奔鄒之陳則鄒之將必俘楚之庭掃齊境以臨薛之城則薛之君必惟齊之命是勝未始出乎柔也然周以岐山之邑而興王業越以會稽之棲而成伯圖蜀漢足以斃項昆陽足以死莾是勝未始不出乎柔也蓋不出乎柔者勢也出乎柔者理也理可常也而勢不可常也是勢果不足論而勝果出于柔也蒙鳩之巢不足以當嵩衡之遺石枯楊之稊不足以試鏌鎁之餘鋒是柔未始可以致勝也然天下之至柔者莫若水而攻堅強者莫之能先洞庭彭蠡之瀦是汪然者非犀兕之堅金石之郛也有賤丈夫焉奮劒而裂之力則疲而水則不可裂也投石而破之石則墜而水則不可破也則是柔未始不可以致勝也蓋不可以致勝者其體也可以致勝者其用也體者徒柔也而用者不徒柔也是體果不足論而柔果可以致勝也論勝之勢而不及勝之理語柔之體而不及柔之用然而贊之者是不明而苟于徇人也然而訾之者是愚而果于自任也訾之之弊往往徒恃其有勝之勢而不知其無勝之理六國并而秦以破南北混而隋以亡此恃勝之勢而不知勢之不可常也贊之之弊往往徒以其有柔之體而不知其無柔之用元帝以優柔而微漢德宗以姑息而弱唐此有柔之體而不知徒柔之無用也尺蠖之屈以求伸也龍蛇之蟄以存身也猛虎伏于深谷而其威愈不可玩翠虬蟠于深淵而其靈愈不可狎使勝之勢而若此則烏有不可常也哉是其勢固出乎柔而非向之所謂勢者也泊然而無勝人之形寂然而無震人之聲誘之不可得而喜激之不可得而怒使柔之體而若此則亦何往而不勝哉是其體固有所用而非向之所謂徒柔也嗚呼天下之言勝者每快于秦之并吞隋之混一而言柔者又多溺于漢之優柔唐之姑息則吾又安得夫知柔之説者而與之論常勝之道哉雖然登華嶽則衆山不能不迤邐浮滄海則江漢不能不汙沱明聖人之道則禦冦之學幾不能立其門墻蓋正已之學𥘉無心于求勝大中之道𥘉不偏于剛柔沉潛剛克髙明柔克德之中也強弗友剛克燮友柔克時之中也時乎剛而剛非剛也中也時乎柔而柔非柔也中也其為道也內外合體用備與天地相似與神明為一又安有求勝之心于其間哉屈伸視乎時勝否惟其德湯嘗事葛矣而仇餉之師竟舉文王嘗事昆夷矣而柞棫之道終兌非求勝也時也虞干舞而苗格周壘因而崇降非用柔也德也且南方之強在于寬柔以教而申棖之欲則不可謂之剛蓋剛之中有至柔之德而柔之中有至剛之用安得以一偏而名之哉彼靡靡而言柔行行而言勝固無議焉耳矣顧為禦冦之説者于此非羞汙反走則亦將舍所學而問聖道之津矣故明聖人之道則禦冦之學幾不能立于門墻雖然禦冦之學得之于老氏者也老氏駕善勝之説于不爭而禦冦托常勝之道于柔其致一也是雖聖學之異端君子所不取然其為學固有見乎無死之説而其為術又有得于翕張取豫之妙殆未可以淺見窺也其道之流于説者為蘇張之縱橫流于法者為申韓之刑名流于兵者為孫吳之攻戰髙祖得于張良而創漢業曹參得于蓋公而守漢法逮光武有見乎苞桑之説遂以興漢而理天下今苞苴竿牘之智弊精神乎蹇淺者其于蘇張申韓之倫無論為役而欲肆其胸臆以妄議老氏禦冦之學多見其不知量也故曰不可以苟訾亦不可以苟贊象山先生全集卷之三十
