front:
  text: 象山先生全集卷之二十
  hash: sha256:167376f57f8f2243ead477f7ce3d55a352b535dace17560a96abd0153703abf5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_020-1a}
body:
  text: 序贈送毛元善序無常産而有常心者惟士爲能古之時士無科舉之累朝夕所講皆吾身吾心之事而逹之天下者也夫是以不䘮其常心後世弊扵科舉所鄕日陋疾其驅扵利欲之塗吾身吾心之事漫不復講曠安宅而弗居舎正路而弗由扵是有常心者不可以責士非豪傑特立雖其質之僅羙者蓋徃徃波蕩扵流俗而不知其所歸斯可哀也南城毛君惠然訪余余未之前識也贄余以文余視其貌温然儒人也觀其文則從事扵塲屋者也問其聚族則有父兄在問其貲産則有負郭之田問其室廬則不至䋲甕之陋視其衣裳冠履則皆楚楚鮮明非所謂纓絶肘見者也詰其所以來之志則悼科舉之不偶耻甘㫖之不充將變其業以逰扵四方者也且決去就扵余余觀毛君雖朴直淳厚而辭㫖趨鄕大槩龎雜豈所謂質之僅羙而波蕩扵流俗而不知其所歸者耶扵是申前之說與之言義命之歸固窮之道毛君色動情變矍然謝余曰乃今廓然如發蒙請從此歸矣余固羙其質又甚賢其改過之敏因勉之曰君歸矣古人事親貧則啜菽飮水盡其歡君父兄皆儒冠貲業又足以自飬歸而共講先王之道以全復其常心居廣居由正路此其所得視疾其驅扵利欲之途者何如耶毛君甚然余言扵其行遂書以贈送宜黄何尉序民甚宜其尉甚不宜其令吏甚宜其令甚不冝其尉是令尉之賢否不難知也尉以是不善扵其令令以是不善扵其尉是令尉之曲直不難知也東陽何君坦尉宜黄與其令臧氏子不相善其賢否曲直蓋不難知者二夫人之爭至于有司有司不置白黒扵其間遂以俱罷縣之士民謂臧之罪不止扵罷而幸其去謂何之過不至于罷而惜其去臧貪而富且自知得罪扵民式遄其歸矣何亷而貧無以振其行李縣之士民哀其窮而爲之裏􅌩以餞之思其賢而爲之歌詩以送之何之歸亦榮矣比干剖心惡來知政子胥鴟夷宰嚭謀國爵刑舛施徳業倒植若此者班班見扵書傳今有司所以處臧何之賢否曲直者雖未當乎人心然揆之舛施倒植之事豈不逺哉况其民心士論有以慰薦扶持如此其盛者乎何君尚何憾魯士師如柳下惠楚令尹如子文其平獄治理之善當不可勝紀三黜三已之間其爲曲直多矣而語孟所稱獨在扵遺逸不怨阨窮不憫仕無喜色巳無愠色况今天子重明麗正光輝日新大臣如德星禦隂輔陽以却氛祲下邑一尉悉力衞其民以迕墨令適用吏文與令俱罷是豈終遺逸阨窮而已者乎何君尚何憾雖然何君譽處若此其盛者臧氏子實爲之也何君之志何君之學遽可如是而已乎何君是舉亦勇矣誠率是勇以志乎道進乎學必居廣居立正位行大道使富貴不能淫貧賤不能移威武不能屈此吾所望扵何君者不然何君固無憾吾將有憾扵何君矣送彭子夀序臨江彭君子夀來行都當改秩有司以苛文滯留之輒欲棄去朋舊慰勉乃肯留有司以名上又以疑似之嫌欲棄去朋舊又相與解釋而留之既改秩欲便親飬奉祠而歸人皆稱彭君恬扵進取如此余謂此未足爲彭君言也彭君當官無不盡力政有不便扵民未嘗不盡意爲上官言之雖見挫抑不爲衰止此人所難然亦未足爲彭君言也余與彭君同爲江西人聞其賢乆矣比來始識其面直諒之氣固可得之眉宇間以彭君之賢疇昔擇交必善士取舎向背不畔于善惡是非之大歸不必過求自可不失爲今世賢士大夫然自視欿然若有所甚不足者嘗相與講求古聖賢格物致知之說自謂不能無疑扵此而不肯自安扵其所已知者此吾所以竒彭君而有望扵彭君者也扵其歸書以贈之送楊通老學所以開人之蔽而致其知學而不知其方則反以滋其蔽諸子百家徃徃以仁義道徳爲說然而卒為異端而畔扵皇極者以其不能無蔽焉耳長溪楊楫通老忠實懇到有志扵學相見雖未乆而其切磋扵此甚力扵其歸書以勉之贈呉叔有人生天地間抱五常之性爲庶類之最靈者汩其靈則有罪全其靈則適其分耳誠全其靈則爲人子盡子道爲人臣盡臣道豈曰無營乎哉蔡邕之說是殆饑甘食渇甘飲未得飲食之正也孟子嘗勉人以求在我者誠能求在我者則無營之說不足道矣贈俞文學吾觀俞君大篆用筆勁快而體致閑雅與和氣浹洽聽其論當世字畫必推及氣質豈其所自得者在此耶至其考訂偏旁叅稽模範有根據來歷殊不苟也自謂少所賞識及觀其所得澹庵詩則蓋有識之者又問其得官獲罪本末異哉其言之也余扵是所感益深俞君䟦履南北歷歷能談其山川風俗余所叩未十二三然已多矣惜其遂將東上余未有以留之因書以贈贈二趙書契既造文字日多六經既作傳註日繁其勢然也苟得其實本末始終較然甚明知所先後則是非邪正知所擇矣雖多且繁非以爲病秪以爲益不得其實而蔽扵其末則非以爲益秪以爲病二昆其謹所以致其實哉贈僧允懷子弟之扵家士大夫之扵國其扵父兄君上之事所謂無所逃扵天地之間者顧乃不能竭力致身以供其職甚者至爲蠧害懐上人學佛者也尊其法教崇其門庭建藏之役精誠勤苦經營未幾駸駸鄕乎有成何其能哉使家之子弟國之士大夫舉能如此則父兄君上可以不詔而仰成豈不羙乎懐本陸出是役也過余余扵是有感因書以贈二隆冬盛寒冰霜嚴厲民之病渉威扵搒掠上能擇吏吏能陳力則徒杠輿梁可以觀政茲事之不論乆矣楊林溪者貴溪之要津他日溺焉者衆矣鄕之善士以允懷勤誠使爲石橋以便行者懷陸出而學佛余嘗因其所爲有所感矣今於是役又重嘉之懷勉之哉贈曾友文德成而上藝成而下生占辭論理稱道經史未見牴牾乃獨業相人之術藝藝雖精下矣生書又能自悼疇昔之顛頓稱引孟子無以小害大無以賤害貴之言年又尚少則舎其舊而新是圗此其時也生其勉之贈汪堅老五行書以人始生年月日時所值日辰推貴賤貧富夭夀禍福詳矣乃獨略扵智愚賢不肖曰純粹清明則歸之貴富夀福曰駁雜濁晦則歸之賤貧夭禍關龍逢誅死比干剖心箕子囚奴夷齊爲饑夫仲尼覊旅絶糧扵陳卒窮死扵其家顔冉夭疾又皆貧賤孟子亦老扵奔走聖賢所遭若此者衆闒茸委瑣朋比以致尊顯負君之責孤民之望懷禄躭寵惡直醜正尸肆䜛慝莫知紀極又或夀老死簀立閥閱蒙爵謚以厚累世道術之純駁氣禀之清濁識鑑之明晦將安歸乎易有否㤗君子小人之道迭相消長各有盛衰純駁清濁明晦之辨不在盛衰而在君子小人今顧略扵智愚賢不肖而必以純粹清明歸之貴富夀福駁雜濁晦歸之賤貧夭禍則吾扵五行書誠有所不解生盍爲我言之贈丁潤父道之將行也與命也道之將廢也與命也公伯寮其如命何吾之不遇魯侯天也臧氏之子焉能使予不遇哉聖賢之知命如此今之知命者幸其知貧賤富貴之有定數也而無爲小人以害其心斯可矣雖然吾所謂心天之所予我者也彼其險詖頗側悉精畢力以遂其私而不肯以入堯舜之道豈亦天之所予我者乎吾嘗有說以贈汪堅老而未及扵此子既見之矣今子所逰又多賢士大夫盍兼爲我言之贈黄舜咨陳正已以書導黄舜咨見吾家阿咸甚譽其命術吾嘗聞當世鉅公言命余答之曰道之將行也歟命也道之將廢也歟命也鉅公矍然曰足下所言者大命也吾所言小命耳此其說出扵蒙莊余因嘆鉅公慱洽出言有稽據如此小命之術其來乆矣扵今尤盛余又聞近時府第呼召術士有一日之間而使人旁午扵道者舜咨術既精何爲不導之扵彼陳廣文非忠扵黄舜咨者也贈汪彦常番陽汪君彦常挾太乙數逰諸公間實有竒驗然汪君本知書一旦以老人之言廢其業從受此術今又以其效驗自喜吾觀汪君精神有不宜止扵是者後日過我當與汪君究其說贈陳晋卿君子所不可及者其唯人之所不見乎古人之所以大過者無他焉善推其所爲而已人所不見此心昭然善推所爲充是心而已紹熈辛亥立秋後二日臨川陸某子静爲福唐陳綰晋卿書示象山學者道不遠人顧人離道耳古人謂宿道鄕方二三君子母徒宿吾方丈日鄕群山得無愧扵宿道鄕方之言斯可矣吾方以此自省因書此以奉警藝之進不進亦各視其才雖無損益扵其道然至扵有棄日有遺力與未知其方而不能問扵知者則其道亦可知矣幸勉旃母忽五月朔某白象山諸同志足下贈金谿砌街者爲善爲公心之正也爲惡爲私心之邪也爲善爲公則有和恊輯睦之風是之謂福爲惡爲私則有乖爭陵犯之風是之謂禍和恊輯睦人所願也乖爭陵犯人所惡也吾邑街道不治乆矣行者疾之乃有肯出心力捐貨財辛勤而爲之者此真爲善爲公而出扵其心之正者也有是心者豈得不翕然相應而助成之乎將見和恊輯睦之風興而乖爭陵犯之事息履是街者皆唐虞成周之人也諸君勉之贈湯謨舉清江湯謨舉徃年見過占辭甚文爲禮甚恭而挾地理之術登象山圖其形殊不失實相從之乆温然慈祥不少異其𥘉此來又以啓事見余多經史全句首尾詳整類從事塲屋間者問之則曰舊亦應舉屡不中乃舎之地理乃先世之傳姑業之以爲生又出謝中丞詩詩得謨舉素懐既别求余言因覈書以贈贈陸唐卿貴溪醹口陸堯臣唐卿今徙居望姑世其家醫學傳之二子又曰吾所傳大方脉也吾扵小方脉雖嘗學之而不能精郭中有精扵此者在浮屠氏今老矣吾將使少子學焉若陸君者可謂不自用矣學必有師豈唯醫哉因其求言遂書以勉之贈踈山益侍者淳熈已酉孟秋中氣在月之𥘉填星復順入龍氐直二大星之間比下星如心大星之扵前星二日之夕㣲出其西三日之夕㣲出其東四日益東如朔之在西則其正隱扵三日之朝矣古羲和之官甚重堯典獨詳其職後世星翁曆官爲賤有司人庸識暗安能舉其職哉因循廢弛莫董正之是等或有所記後有治其事者不無所助是月也余將視吾外姑之宅兆于東漕之龍岡朔之夕發象山三日而抵余家四日之夕發余家次夕抵大原觀六日抵龍岡事既遂抵踈山與同行昭武呉大年里中胥必先言曰五緯次舎有經宿可凖如此者得之扵所見不可不記之治曆湏積候以稽合否官之不宿其業爲日乆矣是亦可以備其搜訪也越翼日因益侍者出此𥿄求余言甚力且曰當寳藏之余扵是得所託矣他日拈出當有賞音七夕月下象山翁書贈劉季蒙明德在我何必他求方士禪伯真爲大祟無世俗之䧟溺無二祟之迷惑所謂無偏無黨王道蕩蕩浩然宇宙之間其樂孰可量也壬子月日蒙泉守陸某書贈劉季蒙題新興寺壁木在龍氐金先填于亢著雍涒灘月望東壁時雨新霽西風增凉閒雲未歸悠然垂隂黍粒登塲稻花盈疇菽粟粲然桑麻沃然象山翁觀瀑半山登舟水南宿上清信龍虎次于新興究仙巖之勝石瀬激雪澄潭漬藍鷺翹鳬飛恍若圗畫踈松翠篠蒼苔茂草之間石蘐呈黄金橙舒紅𬒳崖縁坡爛若錦繡輕舟危檣笑歌相聞聚如魚鱗列如鴈行至其㝷幽探竒更泊互進迭爲後先有若偶然而相從老者蒼顔皓髯語髙領深少者整襟肅容視微聽冲莫不各適其適予亦不知夫小大精粗剛柔緩急之不齊也乃俾猶子謙之槱之子持之分書同逰者七十有八人邑姓名字于左方題翠雲寺壁淳熈已酉長至後二日余寓許昌朝家約逰翠雲明日劉伯恊戒余朝餐許昌朝胡無相與焉伯恊又誇翠雲泉石謂不减廬阜飯餘乗興一行不期而㑹者盈翠雲之堂翠雲五題始扵王文公父子六詠増扵吾家庸齋梭山二兄之逰乃今始得親目昔年嘗東逰㑹稽探禹穴西登五老窺玉淵比歲又開象山扵龍虎之上㳺啓丰山譚風練飛雪氷簾栀子諸瀑今秋之杪登雲臺瞰鬼谷窮石人之龍湫觀千㝷之玉帶乃獨未覩躍馬鳴玉之竒可謂道在近而求之逺然則斯逰之得亦已多矣盛冬水泉既縮又值乆晴長老敏公俾畦丁决田間蓄水大作水供陳師淵作飯供胡無相作茶供成此一叚竒事在㑹長少爲善之意如川方増不可不紀㑹者姓字具列于後童子書名象山翁書朱氏子更名字說淳熈丁未暮春之𥘉予抵城闉後生學子來從余㳺者日以益衆余與之悼時俗之通病啓人心之固有莫不惕然以懲躍然以興前軰長者徃往辱臨教之舉無異辭余扵是益信此心此理充塞宇宙誰能間之一日朱伯虎進而請曰虞書有朱虎伯虎㓜未知學蓋不知其名之不可得侍凾丈乃始自覺背若負芒願賜更之余扵是名以元瑜字以忠甫取諸瑕不掩瑜瑜不掩瑕忠也夫玉之瑕終瑕瑜終瑜人則不然學則瑕者瑜不學則瑜者瑕天之所以予我者固皆瑜也惟不思而蔽扵物而後瑜者瑕今子既覺之則瑕者瑜矣故曰元瑜能覺而更是謂不揜不揜之謂忠氣禀之所蒙習尚之所梏豈遽能盡免扵瑕哉繼是而不替其忠則信乎其爲元瑜也故曰忠甫余始名字之未及告之以其說余留踰月而後東還吾廬朱子又篋書旅于吾廬之傍以求講益秋七月朔歸覲其親始書以遺之二張名字說番昜張季海見二子求名名其一曰槐卿冠之日宜告賔字以清父其二曰樾卿字以宏父暑氣之清莫如槐字槐卿曰清父取清暑也夏日之䕃莫如樾字樾卿曰宏父取宏䕃也時六月中澣予方有行役因以是祝云格矯齋說格至也與窮字究字同義皆研磨攷索以求其至耳學者孰不曰我將求至理顧未知其所知果至與否耳所當辨所當察者此也強哉矯古註以爲矯亦強貌甚當若以爲矯揉則章㫖文義皆不通和而不流中立而不倚豈矯揉所能居廣居立正位行大道乃能和而不流中立而不倚此天下之至強也故曰強哉矯跋資國寺雄石鎮帖象山西址瀕溪溪有渡曰石龜夾溪之山曰西山西山之北有山峭峙與西山同出曰徴君山故老相傳古有隱者在其上累徴不就人號徴君因以名山山麓有寺曰資國猶藏其立寺時帖乃雄石鎮帖也字體結宻行筆有法非今時吏書所及年曰龍紀元年仍書歲次已酉亦不類今時文侈官曰鎮遏使侍御史簽書者曰押衙兼副将印曰信州雄石鎮本末記文乃正篆不繆疊今其地屬貴溪史傳所記故老所傳皆未嘗知有雄石鎮鄕人常言永㤗二年置貴溪考之唐史貴溪之建在永㤗元年而次年爲大暦元年然大暦改號在長至日是永㤗嘗有二年矣建議至巳立渉两年亦事勢之常置縣之年尚傳至今龍紀後永泰百餘年而人不復知有雄石鎮何也唐六典鎮有鎮將鎮副掌鎮捍防守兵部條中又曰凡鎮皆有使一人副使一人今曰鎮遏使曰副將蓋互見矣又曰凡諸軍鎮五百人置押官一人今曰押衙者豈幾是歟施其地者曰周丞鄴丞鄴之官曰押衙兼都監似亦鎮官然則此鎮有两押衙又有都監唐百官志本六典六典乃明皇所撰史臣固曰永㤗後諸鎮官頗增减開元之舊制固宜不可盡考丞鄴稱鎮長曰中丞而其官實侍御史唐供奉官御史中丞與侍御史聮班此尤足以知非後人所能僞也其地則曰丞鄴宅西面東坑徴山脚𥘉無君字然山上有井其深無底旱時禱雨率多靈應謂之望井水流出爲石坑謂之君坑實析徴君二字云耳寺僧海瓊乃周氏子丞鄴之後也好文學詩懼此帖之磨㓕將刋諸石求予爲䟦予觀唐扵今爲近其季尤近龍紀之元距今纔三百有三年史傳所述故老所傳已不復知雄石鎮之髣髴則是帖之傳亦足爲考古者之監故傋論而書之記祚徳廟始末甲辰春爲𥘉献官書于祠下元豐中皇嗣未育呉處厚上書言宜祠程嬰公孫杵臼扵是下詔搜訪遺迹得其家扵綘州太平縣趙村立廟祠之曰祚徳廟封嬰爲誠信侯杵臼爲忠智侯擢處厚將作監丞徽廟朝又封韓厥爲義成侯紹興十三年建州王朝倚上封事乞祠三侯扵行都其後詔立行廟加謚四字嬰爲忠勇誠信侯杵臼爲通勇忠智侯厥爲忠定義成侯𥘉立廟在棘寺基上後建棘寺徙于元貞觀二十二年臣寮上言廟在委巷中湫隘卑陋郡歲遣從事草具酒脯祠之弗䖍宜崇其廟貌超六字八字侯加封二字公升爲中祠扵是嬰封爲強濟公杵臼爲英累公厥爲啓佑公徙廟于青蓮寺側秩于祀典掌于太常歲差官行事作樂祠之廟貌始嚴肅封告寺僧主之鄧文苑求言徃中都義理所在人心同然縱有蒙蔽移奪豈能終泯患人之不能反求深思耳此心苟存則修身齊家治國平天下一也處貧賤富貴死生禍福亦一也故君子素其位而行不願乎其外唐虞之時黎民扵變比屋可封之人此心存也周道之行人皆有士君子之行兎罝可以干城可以好仇可以腹心者此心存也自戰國以䧏權謀功利之說盛行者先王之澤竭此心放失䧟溺而然也當今聖明天子在上所願上而王公大人下而奔走服役之人皆不失其本心以信大義成大業則吾人可以灌畦耕田爲唐虞成周之民不亦樂乎又何必挈挈而東哉鄧君逺告予以有行予敬書是以勸其反而求之象山全集卷之二十
