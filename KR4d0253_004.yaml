body:
  text: 見李德逺古之學者汲汲焉惟君子之見非以其位華要之地可以賁已也非以其積祿邑之贏可以惠已也非以其妙速化之術可以授已也然而人宜之後世反此凡有僕僕于人者必其位華要之地者也不然則積祿邑之贏者也不然則妙速化之術者也非以是三者雖君子無見焉有不是三者之為而惟君子之從必相與群而耶俞之以為狂且怪某生七歲讀書十三志古人之學今二十有四矣而漫刺未嘗有所投乃汲汲焉登閣下之門固衆人之所耶俞以為狂且怪然而甘心犯之惟以古人自慰爾教而進之于閣下固宜得解見提舉古之見者必以贄今世之贄以文文之作所以道進見之意當介紹之辭而其弊至于苟為之説恭敬者君子之道非是無以為禮而反之者夷倨慢媟失之者恭至于足敬至于謬夫無根苟作之説叢雜綵繡之文則僕之所不能夷倨慢媟足恭謬敬則僕之所不敢欲聞名于將命者而介紹之辭不先羔鴈之禮不講用捧咫尺之書以道其進見之意而巳某七歲讀書十三志古人之學亦時習舉子之文不好也二十四以書見先逹李公今經略廣西者書辭才百餘言而李公嘉之是歲實今天子新即位頒科詔而某獨殊無應書之意李公以為不可乃以向為舉子業云李公亦謂為能其秋竟就試中選習俗之禮凡官于是者無問其與舉選之事與否中選者均往謝焉退又為啓以授之曰大謝某竊以為舉送公也從而謝焉私也謝之號固不可求其所謂謝之文讀之于心甚不安故獨不敢謝見太守以其舉送也見二車以其涖試也是時王公為使于此某亦慕其賢而欲見焉而王公適以召去不及見今某後在舉送之列而執事為使于此其賢尤為人之所敬服用列前之所為與今之所以進見者為贄焉爾惟執事進而教之得解見權郡某聞君子行不貴苟異然習俗之弊害義違禮非法制之所拘而必曰不苟異而局局然不敢少違至于禮義之所在非法制之所禁乃曰不苟異而不敢行則亦非君子之道矣今之舉送古賔興理也其著之令甲行之官府者皆所以防姦偽待薄俗聖人之不得巳也六籍所載雖不能無脫亂訛誤然前聖之格言先王之善政其存固多較然可考明天子固以此望天下之賢牧守習俗之弊害義違禮而非法制之所拘者能徹而新之六籍所載義禮所在而非法制之所禁者能率而行之此豈非明天子之所欲賢牧守之所當講而儒衣冠者之所願也且法制之未善朝廷猶有望于縉紳之講明而况非法制之所拘者乎今之與舉送者獨觀揭示各為文辭羣聚而往謝舉送者舉送者乃為之禮然則斯禮也蓋出于與舉送者之所求而非先王之時所謂以禮禮賔之意也况古者以名舉人猶所舉者不謝而舉之者不受謝今之舉以糊名其説以為尤公則亦奚以謝為舉者進謝之禮蓋習俗之弊而以禮禮賔之意蓋先王之禮而賢牧守之所宜率行于今日者也故某之進見不敢謝而獨以是為贄進越之罪惟執事察而恕之得解見通判子遊稱淡臺子羽非公事未嘗至其室非公事而至公庭不可也某旅試塗棘之間而執事實臨涖之既覩揭示獲與其選用此聞名于將命者不為不可習俗有進謝之禮公舉而私謝僕以為未安適以書言于攝使君甚詳且謂舉送者俟中選之士謝焉而後禮之非所謂以禮禮賔之之意意之未究者敢布之執事幸垂聼而察焉嘗觀漢朱博逆折儒掾之辭竊嘆俗吏取必三尺俗儒妄説經籍蕪穢大道汙玷前哲罪不容于誅博折掾曰且持此道歸俟堯舜君出為陳説之而掾辭不復博蓋知其不能捨為掾而去夫言聖人之道而為人折辱如此乃獨不能捨為掾而去則當時所陳與今日所養所學可知矣科舉之法唐楊綰欲變之而不克變今日堯舜之君在上天下之好古樂道者莫不以為必變法僕以為不必遽及于變也大冬之與大夏寒暑之相去逺矣而其運未始頓異毫末之與合抱小大之相去逺矣而其生未始頓進病法之未善而悻然曰必變非所謂包荒之量神而化之之道矣幾何而不敗乃事哉然狃故常而莫之改偷安便而不肯為因循苟且棄玩歲月則是大冬之不復夏而毫末之不復進而可乎故必變而通之然後可以言化之之神而貴包荒之量者以其有馮河之勇可以革弊去蠧有變通之利而無矯激之難也今某之所陳于攝使君者乃先王之禮明天子之所望于賢牧守者所謂有變通之利而無矯激之難者也贊而成之惟執事是賴若乃頌巳效之德美述前日之能事則非事大賢君子之道故不敢以進與諸葛誠之誠之嗜學甚篤又有筋力朋友間尤所賴者訊後曾與淳叟欵曲否既見其過義不宜默承諭惟知頓身于規矩凖繩中而痛鋤狂妄之根誠使心不狂妄而身中規矩凖繩不亦善乎縱未能如此但狂妄日減日就規矩凖繩日以純熟亦為難得以誠之之勤篤從事于規矩凖繩中此亦其所長也但不知所謂狂妄之根者果何如將何如而鋤之不知下手鋤時便鋤得去也無若鋤得去自後却遂無此矣為復此根非若草木之根一鋤去後便無雖鋤得去又復生耶為復雖鋤之而不能盡去之耶又不知此狂妄之根與常人同不與常人同是素來有此是後來起得若後來起得却是因何而起凡此皆當辨明又誠之所愧惕者為復只是狂妄未息未中規矩凖繩而愧惕為復别有未足處後愧惕為復二者兼之此一節亦須明白古人不自滿假克自抑畏戒謹不覩恐懼不聞戰戰兢兢如臨深淵如履薄冰取善求益如恐不及者乃其踐履之常也誠若此者非如桎梏陷阱然也中庸言恐懼乎其所不聞而大學言有所恐懼則不得其正此其辨也講學固無窮然須頭項分明方可講辨若自交加糊塗則須理會得交加糊塗處分明方可講辨如楊朱墨翟老莊申韓其道雖不正其説自分明若是自分明雖不是亦可商確理會大抵講學有同道中鞭䇿切磨者有道不同而相與辨明者如孟子與楊墨告子辨此是道不同而與之辨明者也如舜禹益臯陶相與都俞吁咈夫子與顔淵仲弓關子騫相與問答是同道中發明浸灌鞭䇿切磨者也如子夏子遊之論門人小子子張子夏之言交道雖同師夫子各有所得亦是有不同處當時子夏子遊子張各知其有不同乃有商量處縱未能會通亦各自分明若更要理會盡不糊塗承合并之期不逺且欲得誠之自理會得頭項分明庶幾相見有可理會也二承諭學術更不費力永無懈怠自然常不離道若至從心所欲不踰矩之地矣此理固無阻顧恐公未有此力量爾中人之質戕賊之餘以講磨之力暫息斧斤浸灌于聖賢之訓本心非外鑠當時豈不和平安泰更無艱難繼續之不善防間之不嚴昏氣惡習乘懈而熾喪其本心覺之而來復豈得遂無艱屯一意自勉更無他疑則屯自解矣此頻復所以雖厲而無咎仁者所以先難而後獲也繼續之善防間之嚴中人之質亦恐未能免昏氣惡習之間作然辨之于早絶之于微則易為力耳鄉見誠之未夜而睡非有疾病非委頓不能支持但氣昏體倦欲睡而遂縱之耳誠之不能于此時少加勉強誅而勿縱而欲别求道術别起疑惑不亦左乎鄭子産曰君子有四時朝以聼政晝以訪問夕以修令夜以安身所以節宣其氣而勿使壅閉湫底以露其體兹心不爽而昏亂百度此語殆不可以易之也此一節無疑方能課怠與敬辨義與利本心之善乃始明著而不習無不利矣三承諭為學與曩時異觀書辭誠有用工處但如懊惜亦甚害事臨淵羡魚不如退而結網懈怠流浪患不覺耳覺即改之何暇懊惜大丈夫精神豈可自埋沒如此于此遲疑不便著鞭宜其在巳未得平泰于事有不照燭子細觀察有何滯礙為仁由巳有能一日用其力于仁我未見力不足者聖人豈欺後世誠之于此不決然獨進豈不忍去其鄙吝之習邪飯疏食飲水曲肱而枕之樂亦在其中矣在陋巷簞食瓢飲不改其樂者亦人耳誠之欲自棄耶所示書藁三通西美深甫書辭甚暢至子宜書則窘束有病此乃楊子嘉所謂屈于勝巳者而伸于不巳若者也與王德修銓曹報罷卒然以歸竟不及附致數字六月十九離都下與諸葛誠之同訪敬仲二十九日至富陽七月三日始離既望抵侍下諸幸安穩皆庇所逮兄倡道于彼善類響應便使慈祥愷悌和協輯睦之風鬱然興于父子兄弟宗族鄉黨之間此孟子所謂其子弟從之則孝悌忠信者也健羡健羡郭氏欲見延使繼賢者之後亦蒙鐫諭詳復深感厚誠第槩之愚心甚不安此如兄旅處逺方彼能館寓師事之于理則順某家居乃欲坐致于千里之外古之尊師重道者其禮際似不如此儲子得之平陸而孟子不見某雖不肖而彼之所以相求者以古之學如遂獨行千里而赴其招則亦非彼之所求者矣前輩親師求友蓋不憚勞苦飢寒褁糧千里固其宜也今婺號鄉學者多乃無一人遡江而西者學者不能往而教者能往非所聞也兄之所以為彼慮者至詳且曲也而顧不及此豈亦智者之一失乎與劉淳叟承諭為學無他疑但却不得如江下感發時其他朋友亦無甚進學固不欲速欲速固學者大患然改過遷善亦不可遲回向來與諸公講切處正是為學之門進德之地誠有志者何忍復塗塞其門榛蕪其地哉平時所喜于淳叟者徒以志向亹亹有進無退今反遲回若此何耶向時謬妄工夫其勇往如彼今云知過乃反如此則抑悖于用勇矣聞一善言見一善行若決江河沛然莫之能禦此舜所以為舜學如不及猶恐失之蓋夫子之明訓亹亹以進非淳叟之過也其過顧在于進之非其道耳誠知其過頓棄勇改則亹亹以進者乃舜之莫能禦夫子之所謂如不及而又何病乎今淳叟不然而自曰知過吾不信也惟即改之無待來年夫道若大路朋友相聚不相與勉勵䇿而進之而自作艱難自作節目乃是未肯頓棄謬妄之習為遷延苟免之計如今時冦盜已在囹圄不肯分明伏罪遷延歲月僥覬降赦苟得脫免之後必復為亂矣宜勇改之毋蹈此轍二淳叟平日聞言輒喜遇事輒詢有聼納之體然親朋間未肯歸以取善之實豈似逆而順情者喜聼而真實苦口者之未能無齟齬耶抑從悅者多而改繹之未至也此雖據前日而論然今亦未能無疑于淳叟也秋試禮記義破題誠佳然或者謂所出題乃淳叟意旨而作義者適爾投合苟當于理豈厭其同不稽諸理而苟異以求致益之名則固非也場屋之弊固久然有志者持文衡將此理是責謂彼善于此則可謂理固如此則不知言甚矣申公曰為治不在多言顧力行何如耳今曰道不在多言學貴乎自得明理者觀之二語之間其病昭矣摩頂放踵利天下為之墨子非不力行也其往也使人讓竈讓席其反也人與之爭竈爭席楊子非不自得也二氏不至多言而為異端顔閔侍側夫子無言可也楊墨交亂告子許行之徒又各以其説肆行于天下則孟子之辨豈得巳哉或默或語各有攸當以言餂人以不言餂人均為穿窬之類夫子之于顔子蓋博之以文夫博學於文豈害自得顓臾之不必伐衛政之必正名冉有季路不能無蔽夫子不得不申言之夷之陳相告子之徒必執其説以害正理則孟子與之反覆不得不致其詳必曰不在多言問之弗知弗措辨之弗明弗措皆可削也自得之説本于孟子而當世稱其好辨自謂博學而詳説之將以反説約也中庸固言力行而在學問思辨之後今淳叟所取自得力行之説與中庸孟子之旨異矣仁智信直勇剛皆可以力行皆可以自得然好之而不好學則各有所蔽倚于一説一行而玩之孰無其味不考諸其正則人各以其私説而傅于近似之言者豈有窮巳哉淳叟之氣稟固自有異于人者往時朋舊相親鮮不服其粹和醇美以為無疵獨淳叟之心往往有不敢自欺者求他人之明如淳叟之心不可欺則亦鮮矣至如晚寢早作躬親細事筋力日強精神日敏則自去冬以來其效甚著縱有荒怠勉之斯復所不足者恐不獨在是也麟之姪近頗精進論事儘有根據至如説淳叟輒欲以一言斷之此亦是其病處固嘗闢之矣然在淳叟不可不察宏父德器言論皆有餘味誠有其仁亦焉用佞然光明所燭波瀾所及不已于學者當有充長之驗以大禹之聖聞在知人在安民之言則吁而致其問仁有所未宏智有所未足勇有所未至而欲斂然自安于弒父與君亦不從也之列則亦偷矣館學之官非費宰比能相勉以進無苟自安則吾道有望道之異端人之異志古書之正偽固不易辨然理之在天下至不可誣也有志于學者亦豈得不任其責如射者之于的雖未能遽中豈得而不志于是哉間先聖之道闢邪説放淫辭于今當有任其責者而多言是病此公孫弘禁民挾弓弩之䇿也與趙宰竊惟執事天潢之派桂籍之英回翔仕途縶驥百里下車之𥘉政譽藹然凡在封疆莫不鼓舞旬月之間歌頌未厭道途之傳䆮異前日駸尋至今良所未喻執事之仁明豈其或疚母乃胥吏之姦有以熒惑視聼而致然邪金溪為邑雖陋而財賦𥘉不至甚窘求之異政得失巳事可見九重勤恤民隱無所不用其極其在荒歉之餘尤軫宵旰之慮吏胥貪鄙旁公侵漁惟利是見豈恤公上士大夫之得交于下風者固宜陳忠進諫以輔聰明顧乃下與吏胥為黨貢諛獻佞以陷執事大抵吏胥獻科斂之計者其名為官其實為私官未得一二而私獲八九矣比者數吏魁田連阡陌樓觀岧嶤服食燕設擬于貴近非朘民脂膏而何以取之願執事深察其姦痛懲其弊斷然革之使百里之內知執事之仁心𬒳執事之仁政則日月之更人皆仰之矣某修敬之始巳欲少效區區逄執事之不間不獲展露既而患難困苦莫遂朝夕于將命以究所懷徒切負愧兹蒙下問之及輒薦其愚與胡逹材承示以所進所疑深見嗜學之誠但逹材所進乃害心之大者所謂若有神明在上在左右乃是妄見此見不息善何由明宜其事物之擾即不相續酬酢之繁即不相似若本心之善豈有動靜語默之間哉今逹材資質美處乃不自知所謂日用而不知也如前所云乃害此心者心害苟除其善自著不勞推測才有推測即是心害與聲色臭味利害得喪等耳孟子所謂斧斤伐之牛羊牧之者也夫道若大路然豈難知哉道不逺人自逺之耳若的實自息妄見良心善性乃逹材固有何須他人模寫但養之不害可也作此不暇詳楷然説得多亦徒説要逹材自省耳二逹材資質甚美天常亦厚但前此講學用心多馳􅕽于外而未知自反喻如年少子弟居一故宅棟宇宏麗寢廟堂室廄庫廩庾百爾器用莫不備具甚安且廣而其人乃不自知不能自作主宰不能汛掃堂室修完墻屋續先世之業而不替而日與飲博者遨逰市肆雖不能不時時寢處于故宅亦不復能享其安且廣者矣及一旦知飲博之非又求長生不死之藥悅妄人之言從事于丹砂青芝煆爐山屐之間冀蓬萊瑶池可至則亦終苦身亡家伶仃而後已惟聲色臭味富貴利逹之求而不知為學者其説由前有意為學而不知自反者其説由後其實皆馳􅕽于外也昨相聚時覺逹材精神日漸收拾不甚馳散但收拾之𥘉未甚清明蒙然未有所向雖講切之次感而必應此乃逹材本心非由外鑠故如此耳至于蒙而未發則是馳􅕽昏擾之久大體未能頓清明耳若不寧耐復放而他馳入妄人之説以求長生不死之術則恐蓬萊瑶池終不可至而蕞爾之身將斃于煆爐山屐之間矣蒙見信之篤輒此以助進修向時曾説將孟子告子一篇及論語中庸大學中切已分明易曉處朝夕諷詠接事時但隨力依本分不忽不執見善則遷有過則改若江海之浸膏澤之潤久當渙然冰釋怡然理順矣不知曾如此作工夫否與潘文叔得書知為學有進甚慰但所謂怠墮急迫兩偏此人之通患若得平穩之地不以動靜而變若動靜不能如一是未得平穩也涵泳之久馳擾暫殺所謂飢者甘食渴者甘飲本心若未發明終然無益若自謂已得靜中工夫又别作動中工夫恐只增擾擾耳何適而非此心心正則靜亦正動亦正心不正則雖靜亦不正矣若動靜異心是有二心也此事非有真實朋友不可與彭世昌堯舜之盛詢于芻蕘夫子之聖以子夏為啓豫顔淵為非助我孔文子之所以為文者在于不耻下問人之取善豈有定方善之所在雖路人之言臧獲之智皆當取之世昌相信之意甚篤而鄙意每欲世昌降意與元忠講切元忠之學固未可謂便是然其篤實躬行之日久有非泛泛所能及者其所長處如某亦欲就而取決焉在世昌未易全輕之也與人商論固不貴苟從然亦須先虗心乃至聼其言若其所言與吾有未安處亦須平心思之思之而未安又須平心定氣與之辨論辨論之間雖貴伸巳意不可自屈不可附會而亦須有惟恐我見未盡而他須别有所長之心乃可與曽敬之為學日進為慰讀書作文亦是吾人事但讀書本不為作文作文其末也有其本必有其末未聞有本盛而末不茂者若本末倒置則所謂文亦可知矣適出書不時復與符舜功靜惟來辱之意非鄙人之所敢當下問之及時薦其愚非能有崇論宏議驚世駭俗之説得之朋舊以足下望之太髙待之太過𥘉間未以為然及曽得廣人至連收兩書禮意勤厚非所宜得見喻進修之工始信傳者之不妄揆之愚心恐成過當詳細巳嘗道于幾先相會幸詢之二某自𥘉與舜功相見即進性格太緊之説此在愚見頗為不苟蓋事無大小道無淺深皆不可強探力索人患無志而世乃有有志不如無志者往往皆強探力索之病也若無此病譬如行千里自一步積之苟不已無不至但患不行耳子淵大槩甚正然甚欲得渠一相聚書間所言要不能盡心曲也三見諭新工足見嗜學吾嘗謂楊子雲韓退之雖未知道而識度非常人所及其言時有所到而不可易者楊子雲謂務學不如務求師師者人之模範也模不模範不範為不少矣韓退之謂古之學者必有師師者所以傳道授業解惑也人非生而知之孰能無惑惑而不求師其為惑也終不解矣近世諸儒皆不及此然後知二公之識不易及也吾亦謂論學不如論師侍師而不能虗心委巳則又不可以罪師乘便遽甚遺此不他及與符復仲蒙示進學不替尤以為喜常俗汩沒于貧富貴賤利害得喪聲色嗜欲之間喪失其良心不顧義理極為可哀今學者但能專意一志于道理事事要覩是不肯徇情縱欲識見雖未通明行事雖未中節亦不失為善人正士之徒更得師友講磨何患不進未親師友亦只得隨分自理會但得不陷于邪惡亦自可貴若妄意強説道理又無益也與周廉夫處家之道古聖人格言具在易之家人詩之二南是也今人縱能言亦何以加也若情勝禮恩勝義之説竊以為未然處家自有禮自有義禮義所在豈可勝也此言非但不知處家之道亦不知禮義矣商君説孝公以帝道王道與今人言禮義相似其實是講貫得一項必不可行之説耳帝道王道之實其果如是乎要看其實王道則孟子告齊宣梁惠者是矣後來只是齊宣梁惠不能捨巳私以從孟子耳孟子之説安有不可行者哉廉夫資稟隱約却不甚英特從事于學問之日又淺今日之困固宜平時固滯不通處其在爐錘之門雖或有未開豁然稟受之偏循習之久豈能終廓然乎非磨之以學問其為害未有已也象山先生全集卷之四
