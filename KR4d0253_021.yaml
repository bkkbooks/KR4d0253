front:
  text: 象山先生全集卷之二十一
  hash: sha256:33ee442f10b8c98025e92c6b536ddf883c42a169590372eac272b27ccb0a6b30
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_021-1a}
body:
  text: 雜著易說此理塞宇宙誰能逃之順之則吉逆之則凶其蒙蔽則為昏愚通徹則為明智昏愚者不見是理故多逆以致凶明智者見是理故能順以致吉說易者謂陽貴而隂賤剛明而柔暗是固然矣今晉之為卦上離六五一隂為明之主下坤以三隂順從扵離明是以致吉二陽爻反皆不善蓋離之所以為明者明是理也坤之三隂能順從其明宜其吉無不利此以明理順理而善則其不盡然者亦宜其不盡善也不明此理而泥扵爻畫名言之末豈可與言易哉陽貴隂賤剛明柔暗之說有時而不可泥也雷在天上大壮君子以非禮弗履非禮弗履人孰不以為美亦孰不欲其然然善意之㣲正氣之弱雖或欲之而未必能也今四陽方長雷在天上正大之壯如此以是而從事扵非禮弗履優為之矣此顔子請事斯語時也㤗之九二言包荒包荒者包含荒穢也當㤗之時宜無荒穢蓋物極則反上極則下盈極則虧人情安肆則怠忽隨之故荒穢之事常在扵積安之後也易之為書也不可遠其為道也屢遷變動不居周流六虚上下無常剛柔相易不可為典要唯變所適臨深履氷參前倚衡儆戒無虞小心翼翼道不可須臾離也五典天叙五禮天秩洪範九疇帝用錫禹傳在箕子武王訪之三代攸興罔不克敬典不有斯人孰足以語不可逺之書而論屢遷之道也易數為張權叔書一得五合而成六天一生水地六成之故一得六合而成水二得五合而為七地二生火天七成之故二得七合而成火三得五合而為八天三生木地八成之故三得八合而成木四得五合而為九地四生金天九成之故四得九合而成金五得五合而成十天五生土地十成之故五得十合而成土論五行生成水合在一六火合在二七木合在三八金合在四九土合在五十數至四而五在其中矣一與四自為五二與三自為五二與三少隂少陽之裏也一與四老陽老隂之表也五數旣見二得五為七三得五為八故七為少陽八為少隂一得五為六四得五為九故六為老隂九為老陽故七與八合其數十五六與九合其數亦十五少隂少陽老隂老陽是謂四象論四象則隂陽之少合在七八隂陽之老合在九六四象成列七八在裏九六在表隂陽之分先裏後表故七八為少九六為老四七二十八故二十八者少陽之䇿四八三十二故三十二者少隂之䇿也易之為書也不可逺其為道也屢遷變動不居周流六虚上下無常剛柔相易不可為典要惟變所適吾甞言天下有不易之理是理有不窮之變誠得其理則變之不窮者皆理之不易者也水生數一成數六其卦為坎坎陽裏而隂表水形柔弱蓋隂表也然本生扵陽故道家謂水隂根陽火生數二成數七其卦爲離離隂裏而陽表火形剛烈蓋陽表也然本生扵隂故道家謂火陽根隂自水火之成數而言則水六也火七也水則爲隂火則爲陽自水火之卦而言之水坎也火離也坎則陽卦離則隂卦自坎離之卦而言之則坎月也離日也拘儒扵此將如何而言隂陽哉五行相得而各有合蓋不止乎前二合而巳又爲連叔廣書三竒者四四四也三偶者八八八也此老隂老陽也卽乾坤之象故不容有二若少隂少陽則各有三變此六子之象也兩偶一竒則四八八為震之象八四八為坎之象八八四為艮之象兩竒一偶則八四四為巽之象四八四為離之象四四八為兊之象四象生八卦亦可見扵此三竒四為老陽變三偶八為老隂變兩偶八一竒四為少陽不變兩竒四一偶八為少隂不變一二三四五五行生數六七八九十五行成數天一生水地六成之地二生火天七成之天三生木地八成之地四生金天九成之天五生土地十成之生而未成不可用故用其成數三者變之始五者變之終故數至扵五而變化具矣天地之數五十有五莫非五也天數五一三五七九也地數五二四六八十也生數五一二三四五也成數五六七八九十也三象著扵三才五象上著五星下著五嶽緫為五方五方之形正分之亦四隅分之亦四五無分界故天有四時春木夏火秋金冬水而土寄旺四季孟子言四端不言信孔子甞獨言信曰自古皆有死民無信不立又曰人而無信不知其可也又屢言主忠信醫家言六脉皆有胃脉人無胃脉則死亦此理也故四爲數之大紀五在其中矣四營成易亦此義也易有太極是生兩儀兩儀生四象四象生八卦四象者隂陽有老少謂老陽少陽老隂少隂也或曰六七八九爲四象即是老陽少陽老隂少隂也四者一體七八爲裏隂陽之分自裏始故七爲少陽八爲少隂六九爲表裏常少表常老故六爲老隂九爲老陽四者其本數也以四積之則乾坤之䇿見矣四六二十四毎爻二十四䇿六爻積之則百四十有四故坤之䇿百四十有四四九三十六毎爻爲三十六䇿六爻積之則二百一十有六故乾之䇿二百一十有六一三五七九則天之五竒也而其中為五故五為天中數二四六八十此則地之五偶也而其中為六故六為地中數十日者陽也乃二五之數十二辰者隂也乃二六之數天中數為十日地中數為十二辰五音六律亦由是也十日十二辰相配至六十而周故甲子六十四六二十四四九三十六二十四是老隂之䇿三十六是老陽之䇿老隂老陽相配而為六十四七二十八是少陽之䇿四八三十二是少隂之䇿二十八與三十二相配亦得六十者隂陽相配之數也三五以變錯綜其數數偶則齊數竒則不齊唯不齊而後有變故主變者竒也一三五七九數之竒也一者數之始未可以言變自一而三自三而五而其變不可勝窮矣故三五者數之所以為變者也有一物必有上下有左右有前後有首尾有背靣有内外有表裏故有一必有二故曰一生二有上下左右首尾前後表裏則必有中中與兩端則為三矣故曰二生三故太極不得不判為兩儀兩儀之分天地旣位則人在其中矣三極之道豈作易者所能自為之哉錯之則一二三四五總之則為數十五三居其中以三紀之則三五十五三其十五則為洛書九章四十有五之數九章奠位縱橫數之皆十五此可見三五者數之所以為變者也九章自一至九而無十然一與九為十三與七為十二與八為十四與六為十則所謂十者固在一二三四五六七八九之間矣雖無十而十固在其間所謂十五者五即土之生數十即土之成數然則九章之數雖四十有五而其天地五十有五之數已在其中矣由是觀之三五之變可勝窮哉天地人為三才日月星為三辰卦三畫而成鼎三足而立為老氏之說者亦曰一生二二生三三生萬物蓋三者變之始也天有五行地有五方一二三四五則五行生數六七八九十則五行成數一三五七九為天數二四六八十為地數易大傳曰天數五地數五五位相得而各有合一與六為合蓋一與五為六故一六為合二與七為合蓋二與五為七故二七為合三與八四與九五與十皆然故天地之數五十有五而五為小衍五十為大衍蓋五者變之終也參五以變而天下之數不能外乎此矣天地旣位人居其中鄕明而立則左右前後為四方天以氣運而為春夏秋冬地以形處而為東西南北四數扵是乎見矣然後有四方中與四方扵是為五故一生水而水居北二生火而火居南三生木而木居東四生金而金居西而五生土而土居中央學說古者十五入大學大學曰大學之道在明明德在新民在止扵至善此言大學指歸欲明明德扵天下是入大學標的格物致知是下手處中庸言慱學審問謹思明辨是格物之方讀書親師友是學思則在已問與辨皆須在人自古聖人亦因徃哲之言師友之言乃能有進况非聖人豈有自任私知而能進學者然徃哲之言因時乘理其指不一方冊所載又有正偽純疵若不能擇則是泛觀欲取决扵師友師友之言亦不一又有是非當否若不能擇則是泛從泛觀泛從何所至止如彼作室于道是用不潰于成欲取其一而從之則又安知非私意偏說子莫執中孟子尚以為執一廢百執一廢百豈為善學後之學者顧何以處此論語說苟志扵仁矣無惡也惡與過不同惡可以遽免過不可以遽免賢如遽伯玉欲寡其過而未能聖如夫子猶曰加我數年五十而學易可以無大過矣况扵學者豈可遽責其無過哉至扵邪惡所在則君子之所甚疾是不可毫髮存而斯須犯者也苟一旦而志扵仁斯無是矣志扵道據扵德依扵仁游扵藝道者天下萬世之公理而斯人之所共由者也君有君道臣有臣道父有父道子有子道莫不有道惟聖人惟能備道故爲君盡君道爲臣盡臣道爲父盡父道爲子盡子道無所處而不盡其道常人固不能備道亦豈能盡亡其道夫子曰誰能出不由户何莫由斯道也田野隴畆之人未甞無尊君愛親之心亦未甞無尊君愛親之事臣子之道其端在是矣然上無敎下無學非獨不能推其所為以至扵全備物蔽欲汨推移之極則所謂不能盡亡者殆有時而亡矣弑父與君乃盡亡之時也民之扵道係乎上之敎士之扵道由乎巳之學然無志則不能學不學則不知道故所以致道者在乎學所以為學者在乎志夫子曰吾十有五而志扵學又曰士志扵道而耻惡衣惡食者未足與議也孟子曰士尚志與志扵道一也小德川流大德敦化此聖人之全德也臯陶謨之九德日嚴祗敬六德則可以有邦日宣三德則可以有家德之在人固不可皆責其全下焉又不必其三苟有一焉卽德也一德之中亦不必其全苟其性質之中有㣲善小美之可取而近扵一者亦其德也苟能據之而不失亦必日積日進日著日盛日廣日大矣惟其不能據也故其所有者亦且日失日喪矣尚何望其日積日進日著日盛日廣日大哉士志扵道豈能無其德故夫子誨之以據扵德仁人心也從心所欲不踰矩此聖人之盡仁孔門高弟如子路冉有之徒夫子皆曰不知其仁必如顔淵仲弓然後許之以仁常人固未可望之以仁然亦豈皆頑然而不仁聖人之所爲常人固不能盡爲然亦有爲之者聖人之所不爲常人固不能皆不爲然亦有不爲者扵其爲聖人之所爲與不爲聖人之所不爲者觀之則皆受天地之中根一心之靈而不能冺㓕者也使能扵其所不能冺㓕者而充之則仁豈逺乎哉仁之在人固不能冺然而盡亡惟其不能依乎此以進扵仁而常違乎此而沒扵不仁之地故亦有頑然而不仁者耳士志扵道豈能無其仁故夫子誨之以依扵仁藝者天下之所用人之所不能不習者也游扵其間固無害其志道據德依仁而其道其德其仁亦扵是而有可見者矣故曰游扵藝孟子說志壹動氣此不待論獨氣壹動志未能使人無疑孟子復以蹶趨動心明之則可以無疑矣壹者專一也志固為氣之帥然至扵氣之專壹則亦能動志故不但言持其志又戒之以無暴其氣也居處飲食適節宣之宜視聼言動嚴邪正之辨皆無暴其氣之工也必有事焉而勿正心是一句勿忘勿助長也是一句下句是解上句孟子中有兩正字同義必有事焉而勿正心一也言語必信非以正行也二也勿正字下有心字則辭不虧勿忘字上無心字則辭不贅此但工扵文者亦能知之必有事焉字義與小心翼翼昭事上帝事字義同孟子知言一叚後人旣不明其道因不曉其文强將詖淫邪遁扵楊墨佛老上差排曰何者是詖辭何者是淫辭何者是邪辭何者是遁辭不知此四字不可分諸子百家所字乃是分諸子百家處蔽䧟離窮是其實詖淫邪遁是其名有其實而後有其名若欲曉詖滛邪遁之名須先曉蔽䧟離窮之實蔽䧟離窮是終始淺深之辨非是四家學有所蔽則非其正故曰詖辭蔽而不解必深䧟其中其說必淫故曰淫辭受蔽之𥘉其言猶附著扵正其實非正故深䧟之後其言不能不離扵其所附著故曰邪辭離則必窮窮則必宛轉逃遁而為言故曰遁辭故蔽而不解必䧟䧟而不已必離離則必窮窮而不反扵正則不復可救藥矣孟子之闢楊墨但泛言息邪說距詖行放淫辭𥘉不向楊墨上分孰為詖孰為淫孰為邪所以論語有六言六蔽論後世學者之蔽豈止六而巳哉所以貴扵知其所蔽也總而論之一蔽字可盡之矣荀子解蔽篇却通蔽字之義觀論語六言六蔽與荀子解蔽篇便可見當扵所字上分諸子百家皜皜潔白也濯以江漢暴以秋陽其潔白不復可加矣言夫子之道如此非有若私智杜撰者所可糊塗也象山先生全集卷之二十一
