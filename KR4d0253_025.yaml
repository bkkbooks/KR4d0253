front:
  text: 象山先生全集卷之二十五
  hash: sha256:225c25f938fc64b8cb30abe1f83e97290eda5d2a03edb5df43add6b7258404f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_025-1a}
body:
  text: 詩少時作從來膽大胸膈寬虎豹億萬虬龍千從頭收拾一口吞有時此輩未妥帖哮吼大嚼無毫全朝飲渤澥水暮宿崑崙巔連山以為琴長河為之弦萬古不傳音吾當為君宣聞鶯百喙吟春不暫停長疑春意未丁寧數聲緑樹黃鸝曉始笑從前著意聼鶯六言巧囀風臺急管清逾石澗回溪好去枝枝驚夢無人心到遼西晚春出箭溪二首晴雲冉冉薄斜暉春靜衡門半掩扉風入墻頭丹杏晚高枝頻颭亂花飛又長蹊窈窕晴沙暖緑樹交加細草香歸去不緣吾興盡月明應得更褰裳子規六言柳院竹齋茅店雲蕪風樹煙溪聼徹殘陽曉月不論巴蜀東西蟬風露枯腸裏宫商兩翼頭壯號森木晚清嘯茂林秋贈化主學佛居山林往往儀狀野道人翩然來禮節何爾雅職事方惛惛言論翻灑灑安得冠其顛公材豈云寡踈山道中村靜蛙聲幽林芳鳥語警山樊紛皓葩隴麥搖青頴離懷付西江歸心薄東嶺忽忘飢歉憂翻令發深省鵝湖和教授兄韻墟墓興哀宗廟欽斯人千古不磨心涓流積至滄𬈑水拳石崇成泰華岑易簡工夫終久大支離事業竟浮沉欲知自下升高處真偽先須辨只今挽石子重古重百里長寄命謀託孤今以京秩授麋至無賢愚州家督版帳殿最視所輸况乃積弊久宿負堆文符老姦乘倉皇隂拱為師模民窮斂愈急吏飽官自癯天子為焦勞宵旰思良圖高選部使者庶使德意敷石君在薦剡聞者皆歡愈不知何方民凋瘵遲君蘇君丞同安日歲旱當蠲租縣白如故事守怒牢睢旴賴君爭之力意得所請俞揭數授里正俾後不可渝又嘗宰尤溪吏輩𥘉窺𨵦首以財匱告欲闢侵民途君乃治稅籍弊蠧窮根株簡易以便民上下交相孚民自不忍負豈復煩催驅關征且損數孰謂儒術迂使家得此人黃屋何憂虞惜哉不及用重使吾嗟吁挽張正應海門晝夜吼奔雷却立吳山亦壯哉前殿神仙三島邃正陽閶闔九天開玉階恭授太官賜象簡親承御墨回多少簞瓢蓬甕士輸君留宿兩宫來和黃司業喜雪疇昔詩囊未破慳瓊瑰益自倍枵然才華甘落諸公後誠實徒居野老前臘雪晚成春雪早梅花靜對雪花妍從今長作豐登瑞廩庾家家贍九年遊湖分韻得西字命駕不辭春徑泥少蓬高會帝城西物非我輩終無賴書笑蒙莊只強齊天入湖光隨廣狹山藏雲氣互高低誰憐極目茭芻裏隱隱蒼龍卧古堤和楊廷秀送行學粗知方耻為人敢崇文貌蝕誠真義難阿世非忘世志不謀身豈誤身逐遇寬恩猶得祿歸衝臘雪自生春君詩正似清風快及我征帆故起蘋送德麟監院歸天童和楊廷秀韻二首盡道吾廬登陟難上人得得到相看莫言無物堪延待也有茶澆舌本乾又聞説淮民未免飢春頭巳掘草根歸羡君稇載還山去更挾星郎大字詩送勾熙載赴浙西鹽平分浙江流東境浮海角其民仰魚鹽久巳困征槯麥禾與桑麻耕鋤到磽確往歲比不登埸圃幾濯濯荒政勞廟謀賑廩聞數數飢羸不待飽共感君澤渥仁哉覆育恩所惡吏齷齪教詔彌諄諄聼受祗藐藐何知國與民足已肆貪濁流離且未還已復事椎剝按察殊未曾聖主獨先覺重貽宵旰憂顧盻求卓犖君固岷峨英懷抱富荆璞邇來奏對語朝陽鳴鷟鸑鏘然歷帝聰簡記諒巳確外臺適虗席妙選出親擢此節豈輕授委寄重山嶽除音九天下衆論靡瑕駁攬轡首越山青萍方在握送君無雜言當不負所學題慧照寺春日重來慧照山經年詩債不曾還請君細數題名客更有何人似我頑贈畫梅王文顯子作寒稍巳逼真不須向上更稱神由來絶藝知音少只恐今人過古人簡朱幹叔諸友利名風浪日相催青眼難于世上開何事諸君冒艱險杖藜來入白雲堆書劉定夫詩軸人生不更涉何由知險艱觀君一巨軸奚啻百廬山玉芝歌靈華兮英英芝質兮蘭形瓊葩兮瑶實氷葉兮雪莖石室兮宛宛苔茵兮菁菁蔭長松之偃蹇帶飛瀑之琮琤實青端而黃表眇中藏而不矜匪自昭其明德羌無愧兮疇能淳熙戊申余居是山夏𥘉與二三子相羊瀑流間得芝草三偶相比如卦畫成華如蘭玉明氷瑩洞徹照眼乃悟芝蘭者非二物也巳酉上已復覩瑶芽迫歸拜掃不及見其華是日訪風練飛雪始得一華方掇至案間時雲庵僧適至且求余言為鄉道余方作是歌因謂之曰當為子書之第持此以往會當有賞音者紹熙元年三月二十六日象山翁書象山先生全集卷之二十五
