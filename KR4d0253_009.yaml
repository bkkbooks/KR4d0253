front:
  text: 象山先生全集卷之九書
  hash: sha256:0a6382b508175fedaa0bb0c2eba8eecb48cbe6c9327bc946d223ab9caf012dd6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_009-1a}
body:
  text: 與王謙仲某違遠誨言三換歲矣區區瞻企何可云喻去冬拜手翰之辱大義煥然豈勝慰沃江鄉何幸得大賢出鎮然自朝廷而言則輕重緩急亦巳舛矣明天子注倚豈其或疾執事者之不便計必出此亦識者之所前料殆無足怪獨隂氛重重殊未廓清葵藿之心不能不為大明惜之心去冬不願著足閙籃只欲休去歇去之語尤非所望竊料執事此蔽未能遽解則此行殆為私便某占籍江西以私言之亦惟恐彼人之計有所不行也開府用何日傳聞下車十連胥慶此非尺牘虛辭也元晦聞巳起行入奏事江西可謂德星聚也某去夏拜書後不旬日即有仲兄子儀之喪秋𥘉又哭一殤子乃將為先兄子壽後者薄德鮮祐如此舊有拙疾哀苦中大作幾至于斃臘月頓愈今頑健復如去春時矣鄉人彭世昌新得一山在信之貴溪西境距敝廬兩舍而近唐僧有所謂馬祖者廬于其隂鄉人因呼禪師山元豐中有僧瑩者為寺其陽名曰應天寺廢久矣屋廬毀撤無餘故址埋于荆榛良田清池沒于茅葦彭子竭力開闢結一廬以相延去冬嘗一登山見其隘復建一草堂于其東山間亦粗有田可耕社日後携二息偕數友朋登山盤旋數日盡發兹山之祕要領之處眼界勝絶乃向來僧輩所未識也去冬之堂在寺故址未愜人意方于勝處為方丈以居顧視山形宛然巨象遂名以象山草堂則扁曰象山精舍鄉人蓋素恨此山之名辱于異教今皆翕然以象山為稱故侍郎張南仲之居實在山下南仲諱運其諸子鄙徙居鄱陽其諸姪咸在故里皆尊尚儒術舊亦多逰從者彭世昌極貧開山之役諸張實欣助之其經營之𥘉亦張為之地今張氏子弟咸來相從一家結廬于東塢之上比方丈為少高名之曰儲雲兹山常出雲雲之自出常在其高故也一家結廬于前山之右石澗飛瀑縈紆帶其側因名曰佩玉相繼而來結廬者未巳未及名也方丈簷間層巒疊嶂奔騰飛動近者數十里遠者數百里爭竒兢秀朝暮雨暘雲煙出沒之變千狀萬態不可名模兩山回合其前如兩臂環拱臂間之田不下百畝沿流而下懸注數里因石賦形小者如線大者如練蒼林隂翳巨石錯落盛夏不知有暑挾册其間可以終日東山之崖有翻經石可憩十許人西山之崖有歇石可坐五六人皆有蒼松蟠覆其上其下壁立萬仞山之隂有塵湖在其巔天成一池泓然如鑑大旱不竭可以結廬居之自塵湖而北數山之外有馬祖庵其處亦勝有風洞有浸月池有東壠有樺木壠有東西塢有第一峰凡此皆舊名嘉者此山大勢南來折而東又折而南其高在西北堂之西最高九峰聮絡如屏名曰翠屏其上皆林木也北峰之高者如蓋可以登望南望羣山益遠溪谷原野畢露東望靈山特起凌霄縹眇如畫山形端方亷利吳越所未見有也下見龜峰昂首穹背形狀逼真玉山之水蓋四百里而出于龜峰之下略貴溪以經兹山之左西望藐姑石琵琶諸峰崷崒逼人從天而下溪之源于光澤者間見山麓如青玉版北視上清仙巖臺山僅如培塿東西二溪窈窕如帶二溪合處百里而近然地勢卑下夷曠非甚清徹嘗沒于蒼茫煙靄中矣彭世昌去冬亦嘗至無為求見挾梭山之書聞治行之忙不及瞻望今巳息肩共學耕于此矣此公志向不肯碌碌人皆謂之狂生然其平生所為甚異流俗為私者嘗少而為義者嘗多惜其前日不甚得從師友擇之未精耳自此當有可望二彭世昌歸適領教翰專人荐至連奉好音慰浣何可言喻時事一新隂氛頓釋良心之所共快繼是而無以新之則後之視今猶今之視昔誠如來教前月之雨雱霈連日山溪暴漲平野渺如湖海積年所無幸不甚為害水落之後禾黍暢茂倍于常歲旬日更得一雨早田十分成熟矣陂池皆有蓄水縱有秋旱晚稻亦有可救不至如去年也江西之民當藉大府之德而望一穩矣近聞饒之浮梁負郭一寺中井泉湧溢而地陷漂廬浮尸不可勝數水後舟行者見沿流居民收積漂材往往如堵所敗傷不少矣如聞臨江筠袁亦有水患大府當知其詳今風俗積壞人材積衰郡縣積弊事力積耗民心積搖和氣積傷上虛下竭雖得一稔未敢多慶如人形貌未改而臟氣積傷此和扁之所憂也比日所去之蠧可謂大矣燮調康濟政爾惟難非君臣同德洞見本末豈易言此海內之責當有在矣願得從容以究此意不啻飢渴秋深佳天氣當求一扣亟丈第恐前此促召亦賴遣介相聞告以起行之日水陸所由定當前途求一見耳善政日有所聞聞夏稅甚便于民恨未知其詳秋苗利病想已討論甚悉為郡者只能于此二節去其害而致其利則及物巳廣矣某去冬有與宋漕劄子言金溪月樁惜其不及施行謾録呈倘有餘力及之幸甚與錢伯同不訊記漕又復逾時然蚤作晚寢渴飲飢食皆涵泳邦君之澤尺牘疏數尚奚足言荆公英才蓋世平日所學未嘗不以堯舜為標的及遭逢神廟君臣議論未嘗不以堯舜相期獨其學不造本原而悉精畢力于其末故至于敗去古既逺雖當世君子往往不免安常習故之患故荆公一切指為流俗于是排者蜂起極詆訾之言不復折之以至理既不足以解荆公之蔽反堅神廟信用之心故新法之行當時詆排之人當與荆公共分其罪此學不明至今吠聲者日以益衆是奚足以病荆公哉祠宇隳敗為日之久莫有敢一舉手者亦習俗使然耳執事慨然而一新之非特見超卓其何能如是比得倅車書謂執事欲以記文下委不覺喜溢支體蓋兹事湮鬱深願自是一發舒之遣人臨存適越在他境不即奉答姑以此謝緩報之罪記文尚遲旬日當成就其説馳納求教二居山逾一甲子益飽雲山之變飯稻羔魚無復在陳之厄籍庇宏矣兹山之勝尤在瀑流東有磜潭西有半山磜潭不下玉淵半山可亞卧龍精舍之前兩山回合又自為一澗垂注數里噴薄飛灑于茂林之間一曰風練二曰噴玉三曰翻濤四曰踈珠五曰冰簾六曰雙練七曰飛雪木石自為階梯可沿以觀兩崖有蟠松怪石却略偃蹇隱見于林杪時相管領令人忘歸日與二三子詠歌其間懷吾賢使君之德何有窮已故亦樂為執事道之王弱翁力酣于緑尊紅妓安能作字哉文公祠記某當併書之遲旬日納去與楊守鄉邦凋弊方深遊釡之憂遽得賢師帥振起而撫摩之欣幸之私不在田夫野老之後矣屬者修敬數獲欵晤深慰積年傾渴之懷至蒙禮遇之寵每踰涯分尤深感怍抵家欲具謝尺𥿄以不敏因循逮今然文華日勝情實日薄此後世公患吾人相與以信義苛文非所計故不敢深以自訟諒惟高明必不以是督過之某此月七日始得束書登山九日始遂逹山房金溪與饒之安仁信之貴溪為鄰二境皆有盜賊之患金溪獨不然相去跬步之間事體便相遼絶晉國之盜逃奔于秦乃今見之賢使君之效乃如此是事乃得之親見非傳聞也金溪今歲旱處亦多通縣計之可作六分熟敝居左右獨多得雨頗有粒米狼戾之興但前數日南風亦頗傷稻目今雨意甚濃此去却要速晴以便收穫萬一成積雨則又有可憂者切窺賢者用心未嘗不在于民不敢不告近日頗從倉臺需糴本為平糴一倉以輔向來趙丈所建社倉其詳教授知之得就渠索某劄子一觀幸甚二教之緒餘不勝降嘆從容平易惟理是求稽諸前古千載一轍周道之衰民尚機巧溺意功利失其本心將以沽名名亦終滅將以徼利利亦終亡惟其君子終古不磨不見知于庸人而見知于識者不見容于羣小而無愧于古人俯仰浩然進退有𥙿在巳之貴潤身之富輝光日新有無窮之聞其視懷璧負乘之人何啻蚊蚋蟻蟲哉三復來貺益厲此心敢悉布之永以為好惟執事終惠顧之三違遠色笑倐爾經時洽聞謳謡益用鄉德某自省事以來五十年矣不知幾易太守其賢而可稱者惟張安國趙景明陳時中錢伯同四人殆如晨星之相望可謂難得矣今執事臨之又光于諸公邦人何幸雖然屬者郡政不競巳甚積弊宿蠧殆難驅除猾吏豪家相為表裏根盤節錯為民蟊賊質之淳黠勢之強弱相去懸絶本非對偶吏胥居府廷司文案宿留于邦君之側以間劇勞逸嘗吾之喜愠以日月淹速嘗吾之忘憶為之先後緩急開闔損益以蔽吾聰明亂吾是非而行其計豪家擁高資厚黨與附會左右之人創端緒于事外以亂本旨結左證于黨中以實偽事工為節目以與吏符合而成其説吾以異鄉之人一旦而聼之非素諳其俗而府中深崇閭里之事不接于吾之目塗巷之言不聞于吾之耳𬒳害者又淳厚柔弱類不能自明自逹聼斷之際欲必得其情而不為所欺此甚明者之所難也吾雖得其情彼尚或能為之牽制以格吾之施行吾斷之速則文踈事漏而無以絶其辭吾求之詳則日引月長適以生其姦况其是非曲直之未分而常有以二吾之心疑吾之見變亂其事實而其情亦未易得也一墮其計姦惡失所畏善良失所恃矣豈不難哉善惡之習猶隂陽之相為消長無兩大之理一人之身善習長而惡習消則為賢人反是則為愚一國之俗善習長而惡習消則為治國反是則為亂時之所以為否泰者亦在此而巳開闢以來羲皇而降聖君賢相名卿良大大相與扶持封植者善也其所防間杜絶者惡也明明在上者明此而巳火在天上大有明之至也象曰君子以遏惡揚善順天休命傳亦有之為國家者見惡如農夫之務去草焉芟荑藴崇之絶其本根勿使能植則善者信矣夫子曰聼訟吾猶人也必也使無訟乎使夫子生今之世為今之吏亦豈遽使人無訟哉易有訟卦其來久矣不能無訟豈唯今日若其聼訟之間是非易位善惡倒置而曰自有使人無訟之道無是理也舜之受終必流共工于幽州放歡兜于崇山竄三苗于三危殛鯀于羽山而後天下咸服夫子之得魯政必誅少正卯于兩觀之下而後沈猶氏不敢朝飲其羊公鎮氏出其妻鎮潰氏踰境而徙魯之鬻牛馬者不豫價遏惡揚善順天休命前聖後聖其揆一也必使無訟之道當于聼訟之間見之矣君子之所以異于人者以其存心也遏惡揚善順天休命此其存心也與後世苟且以逃吏責鉤距以立威者豈可同年而語哉舉斯心以加諸彼使善習日長惡習日消惡者屈善者信其無訟也必矣蒙照知之素輒效區區以禆萬一與黃監某切見鄉來趙丈舉行社倉敝里亦立一倉委梭山家兄主其事某頗有所未安者昨亦嘗稟聞愚見以為莫若為平糴一倉以輔之乃可長久平糴則可獨行社倉未必可獨行也杜倉施于常熟鄉乃可久田不常熟則歉歲之後無輔于賑恤平糴則豐時可以受農民之粟無價賤傷農之患歉時可以摧富民閉廪騰價之計政使獨行亦為長利今以輔社倉之所不及而彌縫其缺又兩盡善矣其詳巳嘗託陳教授布稟與林叔虎叔虎才美試于一縣真遊刃有餘地矣顧其志義文采鬱未盡施行且觀騰驤耳學宫之壯恨不得即一拭目記文見委義當效力第非倉卒所能成耳去冬為陳貴溪作重修學記謾往其刻一觀向為仲權作宜章學記莫曾見否今竟未刻豈其有不當仲權之意者耶近觀仲權所向亦有可念者淳叟身後事亦粗辦然極可憐晚節與仲權正巳為莫逆友死者巳矣生者顧未知其所終又可憐也壽夭貧富貴賤皆不足多為學者道古之聖賢如關龍逢之誅王子比干之剖心顔閔之夭疾孔孟之厄窮至今煌煌在宇宙間庸何傷哉某去年春尾在山間聞伯蕃姪訃以歸親舊家庭撫棺視窆之役相尋以卒歲今猶有姪婦之喪未􅌾然更閲涉歷此道益明益不敢不勉數年間書問文記頗多不能盡録令小兒録經德堂記往此文頗有輔于吾道荆公祠堂記刻併往此是斷百餘年未了底大公案聖人復起不易吾言矣刻中第六行內義當與之戮力字下脫若虛捐歲月是自棄也九字好議論字下羡人一字若令人寫出增損而讀之乃無遺恨當時錢伯同託弱翁書弱翁臂痛不能書伯同逼替復送來某自書恃有前本碎𥿄寫去偶有此脫羡伯同恐是意欲增損遂依後本刻至今不滿後當更書小本敘此曲直跋其後置諸壁間也與晦翁往復書因得發明其平生學問之病近得盡朋友之義遠則破後學之疑為後世之益若夫志卑識暗居斯世為斯世之徒固不足以論此長沙胡季隨乃五峰之幼子師事張南軒又妻其女南軒沒後又講學于晦翁之門亦嘗至臨安相聚此人操行甚謹慤志學亦甚篤但學不得其方大困而不知反去年亦有書來此今録所答渠書併所復陳漕君舉書往世固有甘心為小人者此無可言矣有不肯為小人而甘心為常人者又未足言也有不肯為常人而墮于流俗中力不能自拔又無賢師友提掖之此可念也又有非其力不能自拔其所為往往不類流俗堅篤精勤無須臾間暇又有徒黨傳習日不暇給又其書汗牛充楝而迷惑浸溺流痼纏綿有甚于甘心為小人甘心為常人者此豈不重可憐哉上古聖賢先知此道以此道覺此民後世學絶道喪邪説蜂起熟爛以至今日斯民無所歸命士人憑私臆決大抵可憐矣而號稱學者又復如此道何由而明哉復晦翁第二書多是提此學之綱非獨為辨無極之説而巳可更熟復之與陳君舉丁未之冬失于一見尺書往復莫遂輸寫比年山居益左知舊消息往往闊絶徒積傾馳遣人臨存辱以書幣備承近日動息慰浣可量以尊兄之才之美下問之勤懇然情實真以能問于不能以多問于寡尤用降嘆世習靡敝固無可言以學自命者又復封于私見蔽于私説却針拒砭厚自黨與假先訓刲形似以自附益顧不知其實背馳久矣天以是理卑人而舉世莫任其責則人極殆不立矣永思及此益切悼懼忘其駑蹇以自效竭此某所不敢不勉著大公以滅私昭至信以熄偽非尊兄尚望誰老矣之論未敢聞也傅子淵巳至衡陽得其書謂亦已相聞矣子淵人品甚高非餘子比也劉淳叟前月𥘉冒暑歸自臨江病痢踰旬竟不起可哀可哀此郎年來避逺師友倒行逆施極可悼念春夏之間適有困折某近抵城闉見其卧病方將俟其有瘳大拯拔之不謂遂成長往念之尤用傷歎淳叟正巳𥘉向學時自厲之意蔚然可觀鄉里子弟因之以感動興起者甚衆曾未半塗各有異志淳叟歸依佛乘正巳暮用才術所託雖殊其趣則一此其為蔽與前所謂以學自命者又大不侔矣正巳比來相與禮貌然視其朋遊觀其文辭驗之瞻視容色以考其指歸未之有改此尤可念也象山先生全集卷之九
