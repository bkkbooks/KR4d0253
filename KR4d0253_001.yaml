body:
  text: 與邵叔誼前日竊聞嘗以夫子所論齊景公伯夷叔齊之説斷命以祛俗惑至今嘆服不能弭忘笑談之間度越如此輔之切磋何可當也充其所見推其所為勿怠勿畫益著益察日躋于純一之地是所望于君子夷齊未足言也此天之所以豫我者非由外鑠我也思則得之得此者也先立乎其大者立此者也積善者積此者也集義者集此者也知德者知此者也進德者進此者也同此之謂同德異此之謂異端心逸日休心勞日拙德偽之辨也豈唯辨諸其身人之賢否書之正偽舉將不逃于此矣自有諸已至于大而化之其寬𥙿溫柔足以有容發強剛毅足以有執齊莊中正足以有敬文理密察足以有别增加馴積水漸木升固月異而歲不同然由萌蘖之生而至于枝葉扶踈由源泉混混而至于放乎四海豈二物哉中庸曰誠者物之終始不誠無物又曰其為物不二此之謂也學問固無窮巳然端緒得失則當早辨是非向背可以立決顔子之好學夫子實亟稱之而未見其止蓋惜之于既亡其後曽子亦無疑于夫子之道然且謂為魯在柴愚師辟之間素所蓄積又安敢望顔子哉曽之于顔顔之于夫子固自有次第然而江漢以濯之秋陽以暴之雖夫子不能逃于曽子矣豈唯曽子哉君子之道夫婦之愚不肖可以與知能行唐周之時康衢擊壤之民中林施罝之夫亦帝堯文王所不能逃也故孟子曰人皆可以為堯舜病其自暴自棄則為之發四端曰人之有是而自謂不能者自賊者也謂其君不能者賊其君者也夫子曰一日克巳復禮天下歸仁焉此復之𥘉也鈞是人也已私安有不可克者顧不能自知其非則不知自克耳王澤之竭利欲日熾先覺不作民心橫奔浮文異端轉相熒惑往聖話言徒為藩飾而為機變之巧者又復魑魅虺蜴其間耻非其耻而耻心亡矣今謂之學問思辨而于此不能深切著明依憑空言傅著意見增疣益贅助勝崇私重其狷忿長其負恃蒙蔽至理扞格至言自以為是沒世不復此其為罪浮于自暴自棄之人矣此人之過其𥘉甚小其後乃大人之救之其𥘉則易其後則難亦其勢然也物有本末事有終始知所先後則近道矣于其端緒知之不至悉精畢力求多于末溝澮皆盈涸可立待要之其終本末俱失夫子曰知之為知之不知為不知是知也後世耻一物之不知者亦耻非其耻矣人情物理之變何可勝窮若其標末雖古聖人不能盡知也稷之不能審于八音夔之不能詳于五種可以理揆夫子之聖自以少賤而多能然稼不如老農圃不如老圃雖其老于論道亦曰學而不厭啓助之益需于後學伏羲之時未有堯之文章唐虞之時未有成周之禮樂非伏羲之智不如堯而堯舜之智不如周公古之聖賢更續緝熙之際尚可考也學未知至自用其私者乃至于亂原委之倫顛萌蘖之序窮年卒歲靡所底麗猶焦焦然思以易天下豈不謬哉與曾宅之曩蒙訪逮切磋未究足下以親庭之命不能留臨别有來歲相過之約日望書劒至止竟墮渺茫何耶某自去年春尾在山間聞猶子槱之之訃以歸內外撫棺視窆之役相尋以卒歲近者始得復至山房山間泉石頗多適值瀑流方壯噴玉湧雪處處爭竒經年之别不容不遍撫勞之旁郡朋友往往輳集應酬殊不少暇頗復勞勩既而霖霪不解遂以感疾山間不便醫藥扶病出山半山遇盛價致書越數日抵家病又增劇比日少蘇始得發視氣力倦憊又未能作復稽留盛價皇恐示諭與章太博問答其義甚正其前述某之説又自援據反覆此則是足下病處所述某之言亦失其實記録人言語極難非心邇意解往往多不得其實前輩多戒門人無妄録其語言為其不能通解乃自以巳意聼之必失其實也相去之逺不得靣言不若將平時書問與所作文字講習稽考差有據依若據此為辨則有案底不至大訛舛也且如存誠持敬二語自不同豈可合説存誠字于古有考持敬字乃後來杜撰易曰間邪存其誠孟子曰存其心某舊亦嘗以存名齋孟子曰庶民去之君子存之又曰其為人也寡欲雖有不存焉者寡矣其為人也多欲雖有存焉者寡矣只存一字自可使人明得此理此理本天所以與我非由外鑠明得此理即是主宰真能為主則外物不能移邪説不能惑所病于吾友者正謂此理不明內無所主一向縈絆于浮論虗説終日只依藉外説以為主天之所與我者反為客主客倒置迷而不反惑而不解坦然明白之理可使婦人童子聽之而喻勤學之士反為之迷惑自為支離之説以自縈纏窮年卒歲靡所底麗豈不重可憐哉使生在治古盛時蒙𬒳先聖王之澤必無此病惟其生于後世學絶道喪異端邪説充塞彌滿遂使有志之士罹此患害乃與世間凡庸恣情縱欲之人均其陷溺此豈非以學術殺天下哉後世言易者以為易道至幽至深學者皆不敢輕言然聖人贊易則曰乾以易知坤以簡能易則易知簡則易從易知則有親易從則有功有親則可久有功則可大可久則賢人之德可大則賢人之業易簡而天下之理得矣孟子曰夫道若大路然豈難知哉夫子曰仁逺乎哉我欲仁斯仁至矣又曰一日克巳復禮天下歸仁焉又曰未之思也夫何逺之有孟子曰道在邇而求諸逺事在易而求諸難又曰堯舜之道孝弟而巳矣徐行後長者謂之弟疾行先長者謂之不弟夫徐行者豈人所不能哉不為耳又曰人能充無欲害人之心而仁不可勝用也人能充無穿窬之心而義不可勝用也又曰人之有是四端而自謂不能者自賊者也謂其君不能者賊其君者也又曰吾身不能居仁由義謂之自棄古聖賢之言大抵若合符節蓋心一心也理一理也至當歸一精義無二此心此理實不容有二故夫子曰吾道一以貫之孟子曰夫道一而已矣又曰道二仁與不仁而已矣如是則為仁反是則為不仁仁即此心也此理也求則得之得此理也先知者知此理也先覺者覺此理也愛其親者此理也敬其兄者此理也見孺子將入井而有怵惕惻隱之心者此理也可羞之事則羞之可惡之事則惡之者此理也是知其為是非知其為非此理也宜辭而辭宜遜而遜者此理也敬此理也義亦此理也內此理也外亦此理也故曰直方大不習無不利孟子曰所不慮而知者其良知也所不學而能者其良能也此天之所與我者我固有之非由外鑠我也故曰萬物皆備于我矣反身而誠樂莫大焉此吾之本心也所謂安宅正路者此也所謂廣居正位大道者此也古人自得之故有其實言理則是實理言事則是實事德則實德行則實行吾與晦翁書所謂古人質實不尚智巧言論未詳事實先著知之為知之不知為不知所謂先知覺後知先覺覺後覺者以其事實覺其事實故言即其事事即其言所謂言顧行行顧言周道之衰文貌日勝事實湮于意見典訓蕪于辨説揣量模寫之工依倣假借之似其條畫足以自信其習熟足以自安以子貢之逹又得夫子而師承之尚不免此多學而識之之見非夫子叩之彼固晏然而無疑先行之訓豫欲無言之訓所以覺之者屢矣而終不悟夫子既殁其傳固在曽子蓋可觀矣况其不工不似不足以自信不足以自安者乎雖然彼其工且似足以自信足以自安則有終身不反之患有不可救藥之勢乃若未工未似未足以自信未足以自安則舍其邪而歸于正猶易為力也來書蕩而無歸之説大謬今足下終日依靠人言語又未有定論如在逆旅乃所謂無所歸今使足下復其本心居安宅由正路立正位行大道乃反為無所歸足下之不智亦甚矣今已私未克之人如在陷穽如在荆棘如在泥塗如在囹圄械繫之中見先知先覺其言廣大髙明與巳不類反疑恐一旦如此則無所歸不亦鄙哉不亦謬哉不知此乃是廣居正位大道欲得所歸何以易此欲有所主何以易此今拘攣舊習不肯棄捨乃狃其狹而懼于廣狃其邪而懼于正狃其小而懼于大尚得為智乎夫子曰汝為君子儒無為小人儒古之所謂小人儒者亦不過依據末節細行以自律未至如今人有如許浮論虗説謬悠無根之甚夫子猶以為門人之戒又况如今日謬悠無根而可安乎吾友能棄去謬習復其本心使此一陽為主于內造次必于是顛沛必于是無終食之間而違于是此乃所謂有事焉乃所謂勿忘乃所謂敬果能不替不息乃是積善乃是積義乃是善飬浩然之氣真能如此則不愧古人其引用經語乃是聖人先得我心之所同然則不為侮聖言矣今終日營營如無根之木無源之水有採摘汲引之勞而盈涸榮枯無常豈所謂源泉混混不舍晝夜盈科而後進者哉終日簸弄經語以自傅益真所謂侮聖言者矣書言日嚴祗敬六德又言文王之敬忌又曰罔不克敬典詩言敬天之渝又言敬之敬之又言聖敬日躋論語言敬事而信又言修已以敬孟子言敬王敬兄未嘗有言持敬者觀此二字可見其不明道矣吾與足下言者必因足下之及此而後言其旨只欲足下知古人事實而不纍于無根之説足下謂得此説而思之足下以此為説其不明吾言甚矣宜其不能記憶附以已意而失其本真也又如脫灑二字亦不正足下何不言吾之見邪不如古人之見正吾之説虗不如古人之説實如此自訟則有省發之理若只𬋩從脫灑等處思之終不能得其正此理甚明具在人心足下不幸受蔽于謬妄之習今日乃費人許多氣力此事若不明白不應安安而居遲遲而來病倦不能􅕍括文辭使之簡約信手直書大槩幸三復而頓棄其舊則當知聖賢之言真不我欺也與胡季隨辛丑之春在南康見所與晦菴書深服邁往丙午之夏吳山廨舍相從越月以識靣為喜以欵集為幸然區區之懷終不能孚逹于左右每用自愧大學言明明德之序先于致知孟子言誠身之道在于明善今善之未明知之未至而循誦習傳隂儲密積厪身以從事喻諸登山而陷谷愈入而愈深適越而北轅愈騖而愈逺不知開端發足大指之非而日與澤虞燕賈課逺近計枉直于其間是必沒身于大澤窮老于幽都而巳來書所舉某與元晦論太極書辭皆至理誠言左右能徹私去蔽當無疑于此矣不然今之為欣厭者皆其私也豈可遽操以為驗稽以為決哉二王文公祀記乃是斷百餘年未了底大公案自謂聖人復起不易吾言餘子未嘗學問妄肆指議此無足多怪同志之士猶或未能盡察此良可慨嘆足下獨謂使荆公復生亦將無以自解精識如此吾道之幸傅項黃三士人品固有不同其為學亦不相似若望其致知明善雖子淵亦不能無離索之患元吉今在此雖稍若知過要未特逹學者之難得所從來久矣道不逺人人自逺之耳人心不能無蒙蔽蒙蔽之未徹則日以陷溺諸子百家往往以聖賢自期仁義道德自命然其所以卒畔于皇極而不能自拔者蓋蒙蔽而不自覺陷溺而不自知耳顔子之賢夫子所屢歎氣質之美固絶人甚逺子貢非能知顔子者然亦自知非儔偶論語所載顔淵喟然之嘆當在問仁之前為邦之問當在問仁之後請事斯語之時乃其知之始至善之始明時也以顔子之賢雖其知之未至善之未明亦必不至有聲色貨利之纍忿狠縱肆之失夫子答其問仁乃有克巳復禮之説所謂已私者非必如常人所見之過惡而後為己私也已之未克雖自命以仁義道德自期以可至聖賢之地者皆其私也顔子之所以異乎衆人者為其不安乎此極鑽仰之力而不能自已故卒能踐克已復禮之言而知遂以至善遂以明也若子貢之明逹固居遊夏之右見禮知政聞樂知德之識絶凡民逺矣從夫子遊如彼其久尊信夫子之道如彼其至夫子既沒其傳乃不在子貢顧在曽子私見之錮人難于自知如此曽子得之以魯子貢失之以逹天德已見消長之驗莫著于此矣學問之𥘉切磋之次必有自疑之兆及其至也必有自克之實此古人物格知至之功也已實未能自克而不以自疑方憑之以決是非定可否縱其標末如子貢之屢中適重夫子之憂耳况又未能也物則所在非逹天德未易輕言也所惡于智者為其鑿也如智者若禹之行水也則無惡于智矣禹之行水也行其所無事也如智者亦行其所無事則智亦大矣宰我子貢有若智足以知聖人三子之智蓋其英爽足以有所精别異乎陳子禽叔孫武叔之流耳若責之以大智望之以真知聖人非其任也顔子請事斯語之後真知聖人矣曽子雖未及顔子若其真知聖人則與顔子同學未知止則其知必不能至知之未至聖賢地位未易輕言也何時合并以究此理與趙監垂諭新工尤慰勤企道塞宇宙非有所隱遁在天曰隂陽在地曰柔剛在人曰仁義故仁義者人之本心也孟子曰存乎人者豈無仁義之心哉又曰我固有之非由外鑠我也愚不肖者不及焉則蔽于物欲而失其本心賢者智者過之則蔽于意見而失其本心故易大傳曰仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣徇物欲者既馳而不知止徇意見者又馳而不知止故道在邇而求之逺事在易而求之難道豈逺而事豈難意見不實自作艱難耳深知其非則蔽解惑去而得所止矣道本自若豈如以手取物必有得于外然後為得哉鄧丞于此深知端緒幸與進而圖之二社倉事自元晦建請幾年于此矣有司不復挂之墻壁逺方至無知者某在勑局時因編寬恤詔令得見此文與同官咨歎者纍日遂編入廣賑恤門今乃得執事發明之此梭山兄所以樂就下風也其間瑣細敢不自竭需公移之至續得布稟道外無事事外無道向嘗以智愚賢不肖過不及之説布復想洞然無疑于此矣詩稱文王不識不知順帝之則康衢之歌堯亦不過如此論語之稱舜禹曰巍巍乎有天下而不與焉人能知與焉之過無識知之病則此心炯然此理坦然物各付物會其有極歸其有極矣所過者化所存者神上下與天地同流豈曰小輔之哉不然則作好作惡之私偏黨反側之患雖賢者智者有所未免中固未易執和固未易致也深欲一至函丈而冗擾未能輒此薦其區區尊意以為何如幸有以教之與鄧文範昨晚得倉臺書謂别後稍棄舊而圖新了然未有所得殆似寬心了不可得者此乃欲有所得之心耶𥘉信欲歸此意極佳但能不忘此意更使深厚則雖不歸猶歸也古人學如不及尊德樂道親師求友之心不啻飢渴豈虗也哉是必務實之士真知不足者然後能如此也此與自任私智好勝爭強竊近似以為外飾者天淵不侔燕越異鄉察之不可不精辨之不可不明于此不精明便是不識路頭終汨沒于形似而無所至止綿蠻黃鳥止于丘隅于止知其所止可以人而不如鳥乎知止而後有定定而後能靜靜而後能安安而後能慮慮而後能得學不知止而謂其能慮能得吾不信也人不自知其為私意私説而反致疑于知學之士者亦其勢然也人誠知止即有定論靜安慮得乃必然之勢非可強致之也此集義所生與義襲而取之者之所由辨由仁義行與行仁義者之所由分而曽子子夏之勇孟子告子之不動心所以背而馳者也書曰欽厥止不知所止豈能欽厥止哉又曰安汝止不欽厥止豈能安汝止哉汝𥘉信問讀易之法誠知所止則其于往訓如歸吾家而入吾門矣聞秋試一中亦為之喜試中試不中有校定無校定本不足深計所可喜者得失之心未去未釋然耳此心猶未釋然則所謂棄舊者特棄其末未棄其本也宜其謂之稍棄此乃害心之本非本心也是所以蔽其本心者也愚不肖者之蔽在于物欲賢者智者之蔽在于意見高下汙潔雖不同其為蔽理溺心而不得其正則一也然蔽溺在汙下者往往易解而患其安焉而不求解自暴自棄者是也蔽溺在高潔者大抵自是而難解諸子百家是也今倉臺雖未免有高潔之蔽然不自是當不難解矣復書已啓其端幸即求見而究其説萬一尚且遲回春晚當為一行也二道喪之久異端邪説充塞天下自非上知誰能不惑人之難得亦其理然也鳥獸不可與同羣吾非斯人之徒與而誰與當其扞格支離只得精求方略庶幾或悟耳與姪孫濬夏末得汝陳官人到後信胸襟頓别辭理明暢甚為喜慰乃知汝質性本不昏滯獨以不親講益故為俗見俗説牽制埋沒耳其後二三信雖是倉卒終覺不如𥘉信豈非困于獨學無朋友之助而然得失之心未去則不得得失之心去則得之時文之説未破則不得時文之説破則得之不惟可使汝日進于學而無魔祟因是亦可以解流俗之深惑也山間近來結廬者甚衆吾祠祿既滿無以為糧諸生始聚糧相迎今方丈前又成一閣部勒羣山氣象益偉第諸生中有力者寡為此亦良不易未能多供人耳今夏更去迭來常不下百人若一時俱來亦未有著處貴溪宰甚有政聲邑人以為久無此人其致禮于山間甚厚屢欲躬至問道而未果夏末有復其一書録往汝觀之非虛辭也道之將墜自孔孟之生不能回天而易命然聖賢豈以其時之如此而廢其業墮其志哉慟哭于顔淵之亡喟嘆于曽點之志此豈梏于蕞然之形體者所能知哉孔氏之轍環于天下長沮桀溺楚狂接輿負蕢植杖之流刺譏玩慢見于論語者如此耳如當時之俗揆之理勢則其陵藉侵侮豈遽止是哉宋衛陳蔡之間伐木絶糧之事則又幾危其身然其行道之心豈以此等而為之衰止文不在茲期月而可此夫子之志也春秋之作殆不得巳焉耳然而無有乎爾則亦無有乎爾此又孟子之志也故曰當今天下舍我其誰哉至所以祛尹士充虞之惑者其自述至詳且明由孟子而來干有五百餘年之間以儒名者甚衆而荀楊王韓獨著專傷蓋代天下歸之非止朋逰黨與之私也若曰傳堯舜之道續孔孟之統則不容以形似假借天下萬世之公亦終不可厚誣也至于近時伊洛諸賢研道益深講道益詳志向之專踐行之篤乃漢唐所無有其所植立成就可謂盛矣然江漢以濯之秋陽以暴之未見其如曽子之能信其皓皓肫肫其仁淵淵其淵未見其如子思之能逹其浩浩正人心息邪説距詖行放淫辭未見其如孟子之長于知言而有以承三聖也故道之不明天下雖有美材厚德而不能以自成自逹困于聞見之支離窮年卒歲而無所至止若其氣質之不美志念之不正而假竊傳會蠧食蛆長于經傳文字之間者何可勝道方今熟爛敗壞如齊威秦皇之尸誠有大學之志者敢不少自強乎于此有志于此有勇于此有立然後能克巳復禮遜志時敏真地中有山謙也不然則凡為謙遜者亦徒為假竊緣飾而其實崇私務勝而巳比有一輩沉吟堅忍以師心婉孌夸毗以媚世朝四暮三以恱衆狙尤可惡也不為此等所眩則自求多福何逺之有道非難知亦非難行患人無志耳及其有志又患無真實師友反相眩惑則為可惜耳凡今所以為汝言者為此耳蔽解惑去此心此理我固有之所謂萬物皆備于我昔之聖賢先得我心之所同然者耳故曰周公豈欺我哉與李省幹某試吏于此頗益自信此學之不可須臾離也有朋自逺方來乃所大願承有意相與切磋乎此敬延跂俟之平甫舊相從恨其端緒未明未知所以用力今此又交一臂而去每為平甫不滿此學之不明千有五百餘年矣異端充塞聖經榛蕪質美志篤者尤為可惜何時共講以快此懷未相見間儻有所疑以片紙寓諸郵筒可也二古先聖賢無不由學伏羲尚矣猶以天地萬物為師俯仰逺近觀取備矣于是始作八卦夫子生于晚周麟逰鳯翥出類拔萃謂天縱之將聖非溢辭也然而自謂我非生而知之者好古敏以求之者也中庸稱之亦曰祖述堯舜憲章文武堯舜相繼以臨天下而臯陶矢謨其間曰朕言惠可底行武王纘太王王季文王之緒以有天下未及下車訪于箕子俾陳洪範高宗曰台小子舊學于甘盤既乃遁于荒野入宅于河自河徂亳暨厥終罔顯爾惟訓于朕志若作酒醴爾為麴蘖若作和羔爾為鹽梅人生而不知學學而不求師其可乎哉秦漢以來學絶道喪世不復有師以至于唐曰師曰弟子云者反以為笑韓退之柳子厚猶為之屢歎惟本朝理學逺過漢唐始復有師道雖然學者不求師與求而不能虛心不能退聼此固學者之罪學者知求師矣能退聼矣所以導之者乃非其道此則師之罪也學于夫子者多矣顔淵閔子騫冉伯牛仲弓固無可疵外此則有南宫適宓子賤􅃮雕開近于四子三人之外最後出如高子羔曽子雖有愚魯之號其實皆夫子所喜于二人中尤屬意于子羔不幸前夫子而死不見其所成就卒之傳夫子之道者乃在曽子伯魚死子思乃夫子適孫夫子之門人光耀于當世者甚多而子思獨師事曽子則平日夫子為子思擇師者可知矣宰我子貢有若其才智最高子夏子遊子張又下一等然遊夏已擅文學之場而堂堂乎子張子遊猶以為難能其言論足以動人光華足以耀俗誠非以愚魯得號者所可比擬至其傳道授業不謬于聖人宰我子貢有若猶不在此位况遊夏乎故自曽子傳之子思子思傳之孟子乃得其傳者外此則不可以言道居今之時而尚友方册取友當世亦已難矣足下求友之意切矣顧不知迂拙之人果足以副足下所期否乎鄙文數篇録往幸熟復而審思之母徒徇其名而不察其實乃所願望未相見間或有未當于足下之意者願索言之亦惟其是而已矣愚見所到固當傾倒正不必以世俗相期也象山先生全集卷之一
