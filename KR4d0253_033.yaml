front:
  text: 象山先生全集卷之三十三謚議嘉定十年三月二十八日聖㫖時賜謚
  hash: sha256:d50d4fa47199183804603f5ea8ba52b4e4380006ed6db05ce4318a245c4fcf72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_033-1a}
body:
  text: 宣教郎大常博士孔煒撰議曰學道以聖賢為師聖賢遺書萬世標的也孟軻氏有言曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逄其原故君子欲其自得之也甚矣古人之講學其端緒源委誠未易言學而未至扵安難與議聖賢之閫域矣傳記所載如曰安而行安則乆恭而安皆取諸此也自軻既沒逮今千有五百餘年學者狥口耳之末昧性天之真凡軻之所以詔來世者卒付扵空言有䏻尊信其書修明其學反求諸已私淑諸人如監丞陸公者其䏻自㧞扵流俗而有功扵名教者歟公生而頴悟器識絶人與季兄復齋講貫理學號江西二陸其學務窮本原不為章句訓詁其持論雄傑卓立不苟隨聲趋和唯孟軻氏書是崇是信盖謂此心之良人所均有天所予我非由外鑠先立乎其大者則其小者莫䏻奪信䏻知此則宇宙無非至理聖賢與我同類大端既立趋嚮既定明善充類以求之强力勇敢以行之如木有根如水有源逮其乆也此心之靈此理之明将渙然釋怡然順真有見夫居廣居立正位行大道皆吾分内事所謂操存求得盛行不加窮居不損者端不我誣也公惟見理昭徹加以涵飬踐履之功故䏻自得扵心有餘扵身即其成已用以成物四方才俊之士風動雲集至無舘舎以容公榘彠端嚴對之者非心邪念自然消沮論說爽厲聽之者如指迷塗如出荆棘質諸遺編義利之分王覇之别天理人欲凡介扵毫芒疑似之間者辨之弗措叩之弗竭自非學本正大充乎自然安䏻如是之周流貫通動與理㑹也哉繇其推是學以爲文則辭逹而不争乎雕鐫理勝而無用乎繚繞無意扵文而文自爾工施是學扵有政則視吾民如子弟遇僚属如朋友誠心所孚自有不言之教當時元臣碩輔或薦進其心悟理融出扵自得或稱美其治郡善政可驗躬行夫理而造扵自得政而本扵躬行則君子之所飬可知矣使天假之年上之得君行道次之立言明道俾獲盡宣其用則以利生民以恵後學可勝既哉謹按謚法敏而好古曰文貌肅辭定曰安公天禀純明學無凝滯服膺先哲發揮憲言非敏而好古乎抗志洪毅師道尊嚴記乆傳逺言皆可復非貌肅辭定乎謚曰文安扵義為稱謹議覆謚朝請大夫行尚書考功員外郎丁端祖撰議曰儒學之盛自三代以來未有如我本朝者也夫六經厄扵秦而士以權謀相傾漢尚申韓晋尚荘老唐惟辭章是誇先王之道陵遲甚矣至我本朝伊洛諸公未出之時易之一書猶晦蝕扵虗無之談書之皇極詩之二南記禮中庸大學之㫖春秋尊王之義皆未有䏻發明其指歸者也自濂溪明道伊川義理之學為諸儒倡而窮理盡性之說致知格物之要凡尭舜禹湯文武周公孔子相傳之大原始暴白扵天下其後又得南軒張氏晦庵朱氏東萊吕氏續濓溪明道伊川㡬絶之緒而振起之六經之道晦而復明是三君子奉常既已命謚矣又有象山陸氏者自丱角時聞誦伊川語甞曰伊川之言奚為與孔子孟子之言不類𥘉讀論語即疑有子之言支離及長而與朋友講學因論及太極圖㫁然以太極之上不復更有無極其他特立之見超絶之論不一而足要皆本扵自得天分既髙學力亦到盖自三四嵗時請問扵親庭其立論已不凡真所謂少成若天性者惜乎不䏻盡以所學見之事業立朝僅丞匠監旋即奉祠以歸恵政所加止荆門小壘而已世固有能言而不䏻行内若明了而外實迂闊不中事情者公言行相符表裏一致其吐辭發論既卓立乎古今之見至扵臨政䖏事實平易而不迂詳審而不躁當乎人情而循乎至理而無一毫蹈常襲故之迹若公者在吾儒中真千百人一人而巳奉常謚以文安誠未為過愽士議是謹議象山先生行状先生姓陸諱九淵字子静其先嬀姓至齊宣王少子元侯諱通始封平原般縣陸鄉因以為氏曽孫諱烈為吳令子孫遂為吴郡吳縣人自吳公四十世為唐宰相文公諱希聲是為先生八世祖七世祖諱崇六世祖諱徳遷五代末避地于撫州金谿髙祖諱有程曽祖諱演並以學行重扵鄉里祖諱戬父贈宣教郎諱賀生有異禀端重不伐究心典籍見扵躬行酌先儒冠昏䘮祭之禮行之家家道之整著聞州里母孺人饒氏生六子先生其季也先生㓜不戯弄静重如成人三四嵗時常侍宣教公行遇事物必致問一日忽問天地何所窮際宣教公笑而不荅遂深思至忘寢食角緫經夕不脫衣履有弊而無壊韈至三接手甲甚修足跡未甞至庖厨常自掃􅎈林下宴坐終日立于門過者駐望稱歎以其端荘雍容異常兒也五歲讀書𥿄隅無捲摺六嵗侍親㑹嘉禮衣以華好却不受季兄復齋年十三舉禮經以告先生廼受與人粹然樂易然惡無禮者讀書不苟簡外視雖若閒暇而實勤扵攷索伯兄緫家務常夜分起必見先生秉燭檢書伊川近世大儒言垂于後至今學者尊敬講習之不替先生獨謂簡曰丱角時聞人誦伊川語自覺若傷我者亦甞謂人曰伊川之言奚為與孔子孟子之言不類𥘉讀論語即疑有子之言支離先生生而清明不可企及有如此者他日讀古書至宇宙二字解者曰四方上下曰宇徃古來今曰宙忽大省曰宇宙内事乃巳分内事已分内事乃宇宙内事又甞曰東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也乾道八年登進士第時考官吕祖謙能識先生之文扵數千人之中他日謂先生曰未甞欵承足下之教僅得之傳聞一見髙文心開目明知其為江西陸子静也其始至行都一時俊傑咸從之㳺先生朝夕應酬荅問學者踵至至不得寐者餘四十日所以自奉甚薄而精神益强聽其言興起者甚衆還里逺邇聞風而至求親炙問道者益盛先生既受徒即去今世所謂學規者而諸生善心自興容體自荘雍雍于于後至者相觀而化猗歟盛㢤真三代時學校也有一生飯次㣲交足飯既先生從容問之曰汝適有過知之乎生略思曰巳省先生曰何過對曰中食覺交足雖即改正即放逸也其嚴如此先生深知學者心術之㣲言中其情或至汗下有懐扵中而不䏻自暁者為之條析其故悉如其心亦有相去千里素無雅故聞其大槩而盡得其為人甞有言曰念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正有可以形迹觀者有不可以形迹觀者必以形迹觀人則不足以知人必以形迹繩人則不足以救人又曰今天下學者唯有兩途一途朴實一途議論嗚呼至㢤足以明人心之邪正破學者之窟宅矣甞攻切問者之疵問者不領惡聲輙至旁觀不䏻堪而先生悠然從容乃及他事淳熈元年授迪功郎隆興府靖安縣主簿未上丁繼母太孺人鄧氏憂服闋調延寧府崇安縣主簿八年少師史公浩薦先生之辭曰淵源之學沉粹之行輩行推之而心悟理融出扵自得得㫖都堂審察陞擢不赴九年侍從復上薦除國子正諸生叩請孳孳啓諭如家居教授感發良多十年冬遷勑令所刪定官同志之士相從講切不替僚友多賢相與問辯大信服先生自少時聞長上道靖康間事慨然有感扵復讐之義至是遂訪求智勇之士與之商確益知武事利病形勢要害人物短長十一年當輪對期迫甚猶未入思慮所親累請乆乃下筆繕寫甫就厥明即對上屢俞所奏修寛恤詔令書成有㫖改承奉郎十三年轉宣義郎親朋謂先生乆次宜求去先生曰徃時面對粗陳大義明主不以為非然條貫靡竟統紀未終思欲再望清光少自竭盡以致臣子之義距對五日除将作監丞後省䟽駁得㫖主管台州崇道觀先生既歸學者輻輳愈盛雖鄉曲老長亦俯首聽誨言稱先生先生悼時俗之通病啓人心之固有咸惕然以懲躍然以興毎詣城邑環坐率一二百人至不䏻容徙觀寺縣大夫為設講坐扵學宫聽者貴賤老少溢塞塗巷從遊之盛未見有此貴溪有山實龍虎之本岡先生登而樂之結茆其上山髙五里其形如象遂名之曰象山自號象山翁四方學徒復大集至數百人從容講道詠歌怡愉有終焉之意扵是人號象山先生十六年祠秩滿今上登極除知荆門軍是年轉宣教郎又轉奉議郎紹熈二年九月𥘉領郡事吏以故例白内諸局務外諸縣必有揭示約束接賔受詞分日先生曰安用是延見僚屬如朋友推心豁然論事惟理是從先生家書有云毎一同官禀事衆有所見皆得展其所懐辯争利害扵前太守唯黙聽候其是非既明乃從賛歎以飬其狥公之意太守所判僚屬却囬者常有之先生教民如子弟雖賤隷走卒亦諭以理義接賔受詞無早暮下情盡逹無壅故郡境之内官吏之貪㢘民俗之習尚忠良材武與猾吏暴强先生皆得之扵無事之日徃時郡有追逮皆特遣人先生唯令訴者自執状以追以地近逺立限皆如期即日䖏决輕罪多酌人情暁令解釋至人倫之訟既明多使領元詞自毀之以厚其俗唯怙終不可誨化乃始㫁治詳其文状以防後日反覆乆之民情益孚兩造有不持状唯對辯求决亦有證者不召自至問其故曰事乆不白共約求明或既伏俾各持甚状去不復留案甞夜與僚屬坐吏白有老者訴甚急呼問之體戰言不可解俾吏状之謂其子為羣卒所殺先生判翌日呈僚屬難之先生曰子安知不至是凌晨追究其子盖無恙也人益服先生之明有訴遭竊脫而不知其人先生自出二人姓名使捕至訊之伏辜盡得所竊物還訴者且宥其罪使自新因語吏曰某所某人尤暴吏亦莫知翌日有訴遭奪掠者即其人也乃加追治吏大驚郡人以為神𥘉保伍之制州縣以非急務多不檢覈盗賊得匿藏其間近邉尤以為患先生首申嚴之姦無所蔽有刼僧廬鄰伍遽集擒獲不逸一人至是羣盗屏息荆門素無城壁先生以為此自古戰争之埸今為次邉在江漢之間為四集之地南捍江陵北援㐮陽東護隨郢之脇西當光化夷陵之衝荆門固則四隣有所恃否則有背脇腹心之虞由唐之湖陽以趋山則其渉漢之徑已在荆門之脇由鄧之鄧城以渉漢則其趋山之道已在荆門之腹餘有間途淺津陂陁不能以限馬灘瀬不能以濡軌者所在尚多自我出竒制勝徼敵兵之腹脇者亦正在此雖四山環合易扵備禦義勇四千疆壮可用而倉廩藏庫之間麋鹿可至累議欲修築子城憚重費不敢輕舉先生審度决計召集義勇優給庸直躬自勸督役者樂趋竭力工倍二旬訖築𥘉計者擬費緡錢二十萬至是僅費緡五千而土工畢後復議成砌三重置角䑓増二小門上置敵樓衝天渠荷葉渠護險墻之制畢備纔費緡錢三萬又郡學貢院客舘官舎衆役並興𥘉俗習惰人以執役為耻吏惟好衣閒觀至是此風一變督役官吏布衣雜役夫佐力相勉以義不專以威盛役如此而人情晏然郡中恬若無事荆門兩縣置壘事力綿薄連嵗困扵送迎藏庫空竭調度倚辦商稅先是日差使臣暨小吏伺商人于門檢貨給引然後至務務唯據引入稅出門又覆視官收無㡬而出入其費巳多𥘉謂以嚴禁榷杜奸弊而門吏取賄多所藏覆禁物亦或通行商苦重費多由僻途務入日縮先生罷去之或曰門譏所以防奸列郡行之以為常一旦罷廢商冐利必有不至務者先生曰是非爾所知即日揭示俾徑至務復减正稅援例是日稅入立増有一巨商巳遵僻途忽聞新令復出正路廵尉卒扵岐捕之先生詰得其實勞而釋之巨商感涕行旅聞者莫不以手加額誓以母欺私相轉告必由荆門旁觀者詰其故商曰罷三門引减援例去我輩大害不可不報徳稅收増倍酒課亦如之荆門故用銅錢後以近邉以鐡錢易之銅錢有禁而民之輸扵公者尚容貼納先生曰既禁之矣又使之輸不可即蠲之又减鈔錢罷比較不遣人詣縣給吏札置醫院官吏民咸恱而郡吏亦貧而樂獄卒無以自給多告罷先生以僚屬訪察得其實遂廩給之朔望及暇日詣學講誨諸生郡有故事上元設齋醮黄堂其說曰為民祈福先生扵是㑹吏民講洪範歛福錫民一章以代醮事發明人心之善所以自求多福者莫不曉然有感扵中或為之泣湖北諸郡軍士多迯徙視官府如傳舎不可禁止緩急無可使者先生病之乃信捕獲之賞重奔竄之刑又數閱射中者受賞役之加庸直無饑寒之憂相與悉心弓矢逸者絶少他日兵官按閱獨荆門整習他郡所無先生平時按射不止扵兵伍郡民皆得而與中亦同賞薦舉其屬不限流品甞曰古者無流品之分而賢不肖之辨嚴後世有流品之分而賢不肖之辨略先生之家居也鄉人苦旱群禱莫應有請扵先生乃除壇山巔隂雲已乆及致禱大雨隨至荆門亦旱先生毎有祈必踈雨隨車郡民異之治化孚洽乆而益著既踰年笞箠不施至扵無訟相保相愛閭里熈熈人心敬向日以加厚吏卒亦能相勉以義視官事如其家事識者知其為郡有出扵政刑號令之表者矣諸司交章論薦丞相周公必大甞遺人書有曰荆門之政于以驗躬行之效三年冬十一月語女兄曰先教授兄有志天下竟不得施以沒女兄䀌然又甞謂家人曰吾将死矣或曰安得此不祥語骨肉将柰何先生曰亦自然又告僚屬曰某将告終先生素有血疾居旬日大作實十二月丙午越三日疾良已接見屬僚與論政理如平時宴息静室命掃􅎈焚香家事一不掛齒庚戌禱雪辛亥雪驟降命具浴浴罷盡易新衣幅巾端坐家人進藥先生却之自是不復言癸丑日中奄然而卒郡屬棺歛竭誠哭哀甚吏民哭奠充塞衢道各有辭以叙陳痛戀之情柩歸門人奔哭㑹葬以千數郡縣扵其講學之地為立祠先生遺文諸生已次第編紀先生生扵紹興九年二月乙亥享年五十有四娶吳氏封孺人二子持之循之女一明年十有一月壬申葬于鄉之永興寺山距妣饒氏孺人墓為近先生之道至矣大矣簡安得而知之惟簡主富陽簿時攝事臨安府中始承教扵先生及反富陽又獲從容侍誨偶一夕簡發本心之問先生舉是日扇訟是非以荅簡忽省此心之清明忽省此心之無始末忽省此心之無所不通簡雖凡下不足以識先生而扵是亦知先生之心非口說所能賛述所略可得而言者日月之明先生之明也四時之變化先生之變化也天地之廣大先生之廣大也鬼神之不可測先生之不可測也欲盡言之雖窮萬古不可得而盡也雖然先生之心與萬古之人心一貫無二致學者不可自棄謹状紹熈五年二月十有六日門人奉議郎知饒州樂平縣主管勸農公事楊簡状象山先生全集卷之三十三
