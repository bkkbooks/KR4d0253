front:
  text: 象山先生全集卷之三十三諡議嘉定十年三月二十八日聖旨時賜諡
  hash: sha256:11623fa6bea40448765691fc6ad386d0ea65af5bb4757136030c4dec8a011893
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_033-1a}
body:
  text: 宣教郎大常博士孔煒撰議曰學道以聖賢為師聖賢遺書萬世標的也孟軻氏有言曰君子深造之以道欲其自得之也自得之則居之安居之安則資之深資之深則取之左右逄其原故君子欲其自得之也甚矣古人之講學其端緒源委誠未易言學而未至于安難與議聖賢之閫域矣傳記所載如曰安而行安則久恭而安皆取諸此也自軻既沒逮今千有五百餘年學者徇口耳之末昧性天之真凡軻之所以詔來世者卒付于空言有能尊信其書修明其學反求諸已私淑諸人如監丞陸公者其能自拔于流俗而有功于名教者歟公生而頴悟器識絶人與季兄復齋講貫理學號江西二陸其學務窮本原不為章句訓詁其持論雄傑卓立不苟隨聲趨和唯孟軻氏書是崇是信蓋謂此心之良人所均有天所豫我非由外鑠先立乎其大者則其小者莫能奪信能知此則宇宙無非至理聖賢與我同類大端既立趨嚮既定明善充類以求之強力勇敢以行之如木有根如水有源逮其久也此心之靈此理之明將渙然釋怡然順真有見夫居廣居立正位行大道皆吾分內事所謂操存求得盛行不加窮居不損者端不我誣也公惟見理昭徹加以涵飬踐履之功故能自得于心有餘于身即其成已用以成物四方才俊之士風動雲集至無館舍以容公矩彠端嚴對之者非心邪念自然消沮論説爽厲聽之者如指迷塗如出荆棘質諸遺編義利之分王霸之别天理人欲凡介于毫芒疑似之間者辨之弗措叩之弗竭自非學本正大充乎自然安能如是之周流貫通動與理會也哉繇其推是學以為文則辭逹而不爭乎雕鐫理勝而無用乎繚繞無意于文而文自爾工施是學于有政則視吾民如子弟遇僚屬如朋友誠心所孚自有不言之教當時元臣碩輔或薦進其心悟理融出于自得或稱美其治郡善政可驗躬行夫理而造于自得政而本于躬行則君子之所飬可知矣使天假之年上之得君行道次之立言明道俾獲盡宣其用則以利生民以惠後學可勝既哉謹按諡法敏而好古曰文貌肅辭定曰安公天稟純明學無凝滯服膺先哲發揮憲言非敏而好古乎抗志洪毅師道尊嚴記久傳逺言皆可復非貌肅辭定乎諡曰文安于義為稱謹議覆諡朝請大夫行尚書考功員外郎丁端祖撰議曰儒學之盛自三代以來未有如我本朝者也夫六經厄于秦而士以權謀相傾漢尚申韓晉尚莊老唐惟辭章是誇先王之道陵遲甚矣至我本朝伊洛諸公未出之時易之一書猶晦蝕于虗無之談書之皇極詩之二南記禮中庸大學之旨春秋尊王之義皆未有能發明其指歸者也自濂溪明道伊川義理之學為諸儒倡而窮理盡性之説致知格物之要凡堯舜禹湯文武周公孔子相傳之大原始暴白于天下其後又得南軒張氏晦庵朱氏東萊吕氏續濓溪明道伊川幾絶之緒而振起之六經之道晦而復明是三君子奉常既已命諡矣又有象山陸氏者自丱角時聞誦伊川語嘗曰伊川之言奚為與孔子孟子之言不類𥘉讀論語即疑有子之言支離及長而與朋友講學因論及太極圖斷然以太極之上不復更有無極其他特立之見超絶之論不一而足要皆本于自得天分既髙學力亦到蓋自三四嵗時請問于親庭其立論已不凡真所謂少成若天性者惜乎不能盡以所學見之事業立朝僅丞匠監旋即奉祠以歸惠政所加止荆門小壘而已世固有能言而不能行內若明了而外實迂闊不中事情者公言行相符表裏一致其吐辭發論既卓立乎古今之見至于臨政處事實平易而不迂詳審而不躁當乎人情而循乎至理而無一毫蹈常襲故之迹若公者在吾儒中真千百人一人而巳奉常諡以文安誠未為過博士議是謹議象山先生行狀先生姓陸諱九淵字子靜其先媯姓至齊宣王少子元侯諱通始封平原般縣陸鄉因以為氏曽孫諱烈為吳令子孫遂為吳郡吳縣人自吳公四十世為唐宰相文公諱希聲是為先生八世祖七世祖諱崇六世祖諱德遷五代末避地于撫州金溪髙祖諱有程曽祖諱演並以學行重于鄉里祖諱戬父贈宣教郎諱賀生有異稟端重不伐究心典籍見于躬行酌先儒冠昏喪祭之禮行之家家道之整著聞州里母孺人饒氏生六子先生其季也先生幼不戲弄靜重如成人三四嵗時常侍宣教公行遇事物必致問一日忽問天地何所窮際宣教公笑而不答遂深思至忘寢食角總經夕不脫衣履有弊而無壞襪至三接手甲甚修足迹未嘗至庖厨常自掃􅎈林下宴坐終日立于門過者駐望稱歎以其端莊雍容異常兒也五歲讀書𥿄隅無捲摺六嵗侍親會嘉禮衣以華好却不受季兄復齋年十三舉禮經以告先生乃受與人粹然樂易然惡無禮者讀書不苟簡外視雖若間暇而實勤于考索伯兄總家務常夜分起必見先生秉燭檢書伊川近世大儒言垂于後至今學者尊敬講習之不替先生獨謂簡曰丱角時聞人誦伊川語自覺若傷我者亦嘗謂人曰伊川之言奚為與孔子孟子之言不類𥘉讀論語即疑有子之言支離先生生而清明不可企及有如此者他日讀古書至宇宙二字解者曰四方上下曰宇往古來今曰宙忽大省曰宇宙內事乃巳分內事已分內事乃宇宙內事又嘗曰東海有聖人出焉此心同也此理同也西海有聖人出焉此心同也此理同也南海北海有聖人出焉此心同也此理同也千百世之上有聖人出焉此心同也此理同也千百世之下有聖人出焉此心同也此理同也乾道八年登進士第時考官吕祖謙能識先生之文于數千人之中他日謂先生曰未嘗欵承足下之教僅得之傳聞一見髙文心開目明知其為江西陸子靜也其始至行都一時俊傑咸從之遊先生朝夕應酬答問學者踵至至不得寐者餘四十日所以自奉甚薄而精神益強聽其言興起者甚衆還里逺邇聞風而至求親炙問道者益盛先生既受徒即去今世所謂學規者而諸生善心自興容體自莊雍雍于于後至者相觀而化猗歟盛哉真三代時學校也有一生飯次微交足飯既先生從容問之曰汝適有過知之乎生略思曰巳省先生曰何過對曰中食覺交足雖即改正即放逸也其嚴如此先生深知學者心術之微言中其情或至汗下有懷于中而不能自曉者為之條析其故悉如其心亦有相去千里素無雅故聞其大槩而盡得其為人嘗有言曰念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即為不正有可以形迹觀者有不可以形迹觀者必以形迹觀人則不足以知人必以形迹繩人則不足以救人又曰今天下學者唯有兩途一途朴實一途議論嗚呼至哉足以明人心之邪正破學者之窟宅矣嘗攻切問者之疵問者不領惡聲輒至旁觀不能堪而先生悠然從容乃及他事淳熙元年授迪功郎隆興府靖安縣主簿未上丁繼母太孺人鄧氏憂服闋調延寧府崇安縣主簿八年少師史公浩薦先生之辭曰淵源之學沉粹之行輩行推之而心悟理融出于自得得旨都堂審察升擢不赴九年侍從復上薦除國子正諸生叩請孳孳啓諭如家居教授感發良多十年冬遷勑令所刪定官同志之士相從講切不替僚友多賢相與問辨大信服先生自少時聞長上道靖康間事慨然有感于復讐之義至是遂訪求智勇之士與之商確益知武事利病形勢要害人物短長十一年當輪對期迫甚猶未入思慮所親纍請久乃下筆繕寫甫就厥明即對上屢俞所奏修寬恤詔令書成有旨改承奉郎十三年轉宣義郎親朋謂先生久次宜求去先生曰往時面對粗陳大義明主不以為非然條貫靡竟統紀未終思欲再望清光少自竭盡以致臣子之義距對五日除將作監丞後省疏駁得旨主管台州崇道觀先生既歸學者輻輳愈盛雖鄉曲老長亦俯首聽誨言稱先生先生悼時俗之通病啓人心之固有咸惕然以懲躍然以興每詣城邑環坐率一二百人至不能容徙觀寺縣大夫為設講坐于學宫聽者貴賤老少溢塞塗巷從遊之盛未見有此貴溪有山實龍虎之本岡先生登而樂之結茆其上山髙五里其形如象遂名之曰象山自號象山翁四方學徒復大集至數百人從容講道詠歌怡愈有終焉之意于是人號象山先生十六年祠秩滿今上登極除知荆門軍是年轉宣教郎又轉奉議郎紹熙二年九月𥘉領郡事吏以故例白內諸局務外諸縣必有揭示約束接賔受詞分日先生曰安用是延見僚屬如朋友推心豁然論事惟理是從先生家書有云每一同官稟事衆有所見皆得展其所懷辨爭利害于前太守唯默聽候其是非既明乃從贊歎以飬其徇公之意太守所判僚屬却回者常有之先生教民如子弟雖賤隸走卒亦諭以理義接賔受詞無早暮下情盡逹無壅故郡境之內官吏之貪廉民俗之習尚忠良材武與猾吏暴強先生皆得之于無事之日往時郡有追逮皆特遣人先生唯令訴者自執狀以追以地近逺立限皆如期即日處決輕罪多酌人情曉令解釋至人倫之訟既明多使領元詞自毀之以厚其俗唯怙終不可誨化乃始斷治詳其文狀以防後日反覆久之民情益孚兩造有不持狀唯對辨求決亦有證者不召自至問其故曰事久不白共約求明或既伏俾各持甚狀去不復留案嘗夜與僚屬坐吏白有老者訴甚急呼問之體戰言不可解俾吏狀之謂其子為羣卒所殺先生判翌日呈僚屬難之先生曰子安知不至是凌晨追究其子蓋無恙也人益服先生之明有訴遭竊脫而不知其人先生自出二人姓名使捕至訊之伏辜盡得所竊物還訴者且宥其罪使自新因語吏曰某所某人尤暴吏亦莫知翌日有訴遭奪掠者即其人也乃加追治吏大驚郡人以為神𥘉保伍之制州縣以非急務多不檢核盜賊得匿藏其間近邉尤以為患先生首申嚴之姦無所蔽有劫僧廬鄰伍遽集擒獲不逸一人至是羣盜屏息荆門素無城壁先生以為此自古戰爭之埸今為次邉在江漢之間為四集之地南捍江陵北援襄陽東護隨郢之脅西當光化夷陵之衝荆門固則四鄰有所恃否則有背脅腹心之虞由唐之湖陽以趨山則其涉漢之徑已在荆門之脅由鄧之鄧城以涉漢則其趨山之道已在荆門之腹餘有間途淺津陂陀不能以限馬灘瀨不能以濡軌者所在尚多自我出竒制勝徼敵兵之腹脅者亦正在此雖四山環合易于備禦義勇四千疆壯可用而倉廩藏庫之間麋鹿可至纍議欲修築子城憚重費不敢輕舉先生審度決計召集義勇優給庸直躬自勸督役者樂趨竭力工倍二旬訖築𥘉計者擬費緡錢二十萬至是僅費緡五千而土工畢後復議成砌三重置角臺增二小門上置敵樓衝天渠荷葉渠護險墻之制畢備才費緡錢三萬又郡學貢院客館官舍衆役並興𥘉俗習惰人以執役為耻吏惟好衣間觀至是此風一變督役官吏布衣雜役夫佐力相勉以義不專以威盛役如此而人情晏然郡中恬若無事荆門兩縣置壘事力綿薄連嵗困于送迎藏庫空竭調度倚辦商稅先是日差使臣暨小吏伺商人于門檢貨給引然後至務務唯據引入稅出門又覆視官收無幾而出入其費巳多𥘉謂以嚴禁榷杜姦弊而門吏取賄多所藏覆禁物亦或通行商苦重費多由僻途務入日縮先生罷去之或曰門譏所以防姦列郡行之以為常一旦罷廢商冒利必有不至務者先生曰是非爾所知即日揭示俾徑至務復減正稅援例是日稅入立增有一巨商巳遵僻途忽聞新令復出正路巡尉卒于岐捕之先生詰得其實勞而釋之巨商感涕行旅聞者莫不以手加額誓以母欺私相轉告必由荆門旁觀者詰其故商曰罷三門引減援例去我輩大害不可不報德稅收增倍酒課亦如之荆門故用銅錢後以近邉以鐡錢易之銅錢有禁而民之輸于公者尚容貼納先生曰既禁之矣又使之輸不可即蠲之又減鈔錢罷比較不遣人詣縣給吏札置醫院官吏民咸恱而郡吏亦貧而樂獄卒無以自給多告罷先生以僚屬訪察得其實遂廩給之朔望及暇日詣學講誨諸生郡有故事上元設齋醮黃堂其説曰為民祈福先生于是會吏民講洪範斂福錫民一章以代醮事發明人心之善所以自求多福者莫不曉然有感于中或為之泣湖北諸郡軍士多逃徙視官府如傳舍不可禁止緩急無可使者先生病之乃信捕獲之賞重奔竄之刑又數閲射中者受賞役之加庸直無飢寒之憂相與悉心弓矢逸者絶少他日兵官按閲獨荆門整習他郡所無先生平時按射不止于兵伍郡民皆得而與中亦同賞薦舉其屬不限流品嘗曰古者無流品之分而賢不肖之辨嚴後世有流品之分而賢不肖之辨略先生之家居也鄉人苦旱群禱莫應有請于先生乃除壇山巔隂雲已久及致禱大雨隨至荆門亦旱先生每有祈必踈雨隨車郡民異之治化孚洽久而益著既踰年笞箠不施至于無訟相保相愛閭里熙熙人心敬向日以加厚吏卒亦能相勉以義視官事如其家事識者知其為郡有出于政刑號令之表者矣諸司交章論薦丞相周公必大嘗遺人書有曰荆門之政于以驗躬行之效三年冬十一月語女兄曰先教授兄有志天下竟不得施以沒女兄䀌然又嘗謂家人曰吾將死矣或曰安得此不祥語骨肉將奈何先生曰亦自然又告僚屬曰某將告終先生素有血疾居旬日大作實十二月丙午越三日疾良已接見屬僚與論政理如平時宴息靜室命掃􅎈焚香家事一不挂齒庚戌禱雪辛亥雪驟降命具浴浴罷盡易新衣幅巾端坐家人進藥先生却之自是不復言癸丑日中奄然而卒郡屬棺斂竭誠哭哀甚吏民哭奠充塞衢道各有辭以敘陳痛戀之情柩歸門人奔哭會葬以千數郡縣于其講學之地為立祠先生遺文諸生已次第編紀先生生于紹興九年二月乙亥享年五十有四娶吳氏封孺人二子持之循之女一明年十有一月壬申葬于鄉之永興寺山距妣饒氏孺人墓為近先生之道至矣大矣簡安得而知之惟簡主富陽簿時攝事臨安府中始承教于先生及反富陽又獲從容侍誨偶一夕簡發本心之問先生舉是日扇訟是非以答簡忽省此心之清明忽省此心之無始末忽省此心之無所不通簡雖凡下不足以識先生而于是亦知先生之心非口説所能贊述所略可得而言者日月之明先生之明也四時之變化先生之變化也天地之廣大先生之廣大也鬼神之不可測先生之不可測也欲盡言之雖窮萬古不可得而盡也雖然先生之心與萬古之人心一貫無二致學者不可自棄謹狀紹熙五年二月十有六日門人奉議郎知饒州樂平縣主管勸農公事楊簡狀象山先生全集卷之三十三
