front:
  text: 象山先生全集卷之十四書
  hash: sha256:c2d2fad31768c54645aadd2dadbedabb31d8b6a47c211a13acf30914cf77ba00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_014-1a}
body:
  text: 與包詳道宇宙間自有實理所貴乎學者為能明此理耳此理苟明則自有實行有實事實行之人所謂不言而信與近時一種事唇吻閑圖度者天淵不侔燕越異向事唇吻閑圖度之人本扵質之不美識之不明重以相習而成風反不如隨世習者其過惡易扵整救圖度不已其失心愈甚省後看來真登龍㫁之賤丈夫實可慚耻若能猛省勇改則天之所以予我者非由外鑠不俟他求能敬保謹飬學問思辯而篤行之誰得而禦與包敏道為學無他謬巧但要理明義精動皆聽扵義理不任已私耳此理誠明踐履不替則氣質不美者無不變化此乃至理不言而信詩曰奏假無言時靡有争此之謂也來書所述未能臻此平時氣質復浮溢扵𥿄筆間矣幸益勉之至望二賢兄比來皆非復吳下阿蒙矣二私意與公理利欲與道義其勢不兩立從其大體與從其小體亦在人耳勉旃勉旃母多談潜雖伏矣亦孔之昭不可揜也不可誣也二賢兄亦不及荅書意不殊此大人之事至公至正至廣大至平直剖蠡管之見蕩其私曲則天自大地自廣日月自昭明人之生也本直豈不快㢤豈不樂㢤若諸公所可喜者皆是專扵向道與溺私欲不同耳固是各有病痛須索商量但比之足下則相懸耳如㡬先所謂萬事隨縁者政所謂習氣使然也吾人居廣居立正位行大道得志與民由之不得志獨行其道豈肯作此等語也不及荅諸公書幸以此示之與嚴泰伯學之不講乆矣吾人相與扶持扵熟爛之餘何敢以戯論參之古人謂戒謹乎其所不睹恐懼乎其所不聞十目所視十手所指庸敢有戯論乎勉思而謹之是願是望二宋無悔來得書知彼時消息甚慰荅君玉書極佳足見新功度今又當日進文範必數得徃還此公明白可喜未易得也宋秀才志向可喜而氣習中多病今雖小愈要未必能一成平復針藥盖已備甞亦在其自曉了耳若善自思者亦有何難但恐繆習深重毎毎反用以滋其繆耳真不狥名慕外好誇求勝道實不難知也君子之道淡而不厭簡而文温而理又何必大聲色也但人不知非則不能安乎此耳今歲科舉相從者既多恐難離城某𥘉有入城之意今亦以山上朋友之多不欲乆曠遂止其行未得相見千萬為此道勉旃三道理無竒特乃人心所固有天下所共由豈難知㢤但俗習繆見不能痛省勇改則為隔礙耳古人所謂一慚之不忍忍終身慚乎此乃實事非戯論也古人不求名聲不較勝負不恃才智不矜功能通身純是道義平日議論平日行業皆同兒戯不足復置胸臆天降之衷在我乆矣特逹自立誰得而禦勉自奮㧞不必他求來早得暇見過以觀新功與傳子淵比來居山良有日新之證惜不得與子淵共之以朋友講習而說有朋自逺方來而樂不可以泛觀料想而解當有事實吾人不幸生扵後世不得親見聖人而師承之故氣血向衰而後至此雖然朝聞道夕死可矣今能至此其𬒳聖人之澤豈不厚而其為幸豈不大哉何時一來快此傾倒與羅章夫著是去非改過遷善此經語也非不去安能著是過不改安能遷善不知其非安能去非不知其過安能改過自謂知非而不能去非是不知非也自謂知過而不能改過是不知過也真知非則無不能去真知過則無不能改人之患在不知其非不知其過而已所貴乎學者在致其知改其過與廖㓜卿適聞傅仲昭語及懋卿坐間假寐仲昭以爲此必未能自㧞此殆不然仲昭未知此理非但仲昭未知此理料㓜卿亦未知此理人未知學其精神心術之運皆與此道背馳一旦聞正言而知非則向來蹊徑爲之杜絶若勇扵惟新固當精神筋力皆勝其舊然如此者難得但得不安其舊雖未有日新亦勝頑然不知與主張舊習者逺矣今懋卿雖未有日新之功若其困睡則是巳知舊見舊習之非不復就其上主張運用故如此耳此不爲深害但少俟之徐觀其幡然則大善矣朋友間不深知此理迫之太甚罪之太切則又反爲害矣與傅齊賢義理未甞不廣大能惟義理之歸則尚何窠穴之私㢤心苟不蔽扵物欲則義理其固有也亦何爲而茫然㢤蔽不真徹則區區之意殆虗設也幸勉旃母乆自屈與胥必先劉徳固須尚留山間前此未得與渠同讀書但說得比卦稍詳書亦政不必遽爾多讀讀書最以精熟為貴煩喻徳固且熟讀比卦為佳徳固前此扵文義間多未通曉近所以開發之者非在文義毎為徳固解說必令文義明暢欲不勞其思索不起其疑惑使末不害本文不妨實常令文義輕而事實重扵事實則不可須臾離扵文義則曉不暁不足為重輕此吾解說文義之妙㫖必先亦不可不知也然此亦豈可强為之㢤非明實理有實事實行之人徃徃乾沒扵文義間為蛆虫識見以自喜而巳安能任重道逺自立扵聖賢之門墻㢤二得書甚有奮㧞之意良以爲慶然譬諸田疇荒穢之乆雖粗加墾闢若畬耨不繼則茅立塞之矣用工深切至到則通暢茂恱當又與今不侔願勉旃毋忽何以聚糧爲肯來是幸三蒲稍緑耳尚可想見駑駘傷吻弊䇿而不進扵行誠可厭也馬之精神骨榦得之扵天不可損益今爲人而坐使古人雖愚必明雖柔必强之言棄而不驗豈不甚可痛㢤與蔡公辯所録諸書已逐一點對末後復趙然道書甚多脫誤可子細将所録本添改庶可讀也書字畫甚無法度如傅字須向上着一點不着點便成傳字古刻傳字專中不着厶字但以不着點與傅字爲别所録書其前尚稍可看向後數篇甚刺人眼結字既不端正畫之長短皆顛倒失宜向來盖甞說及此等處何爲都不省記來書辭語病痛極多讀之甚不滿人意用助字不當律令尤爲缺典老夫平時最檢點後生言辭書尺文字要令入規矩如吾兒持之甚懶讀書絶不曽作文然觀其不得已書尺與為塲屋之文其助字未甞有病造語亦勁徤不至冗長此亦是稍聞老夫平日語故能然且今觀吾子之文乃如未甞登吾門者即此便可自省安詳沉靜心神自應日靈輕浮馳騖則自難省覺心靈則事事有長進不自省覺即所為動皆乖繆適足以貽羞取誚而巳與張徳清積年聞季恱元忠諸友稱道盛徳比歲屢得欵集益有以信諸賢之言又聞非乆有退居自飬之舉尤切歎仰近者忽又聞有不肖道士以淫侈不軌之事誘引小子徤訟以相誣毀深用不平然在左右正宜髙舉以遂𥘉志何必與此軰較勝負扵流俗之中㢤流俗之所謂勝者豈足為勝流俗之所謂負者豈足為負左右平時與諸賢交㳺當問道之勝負不當問流俗之勝負又聞季恱言徳清其𥘉浩然有引退之文且欲别求賢者以嗣其事而盛族乃有茅不可試火之語此可謂不勝俗陋鄙猥之言切不宜以此等語虧損盛徳更願深思追還素志他日同來象山頂頭共談大道此乃真天師非俗天師也與髙應朝前月併收兩書備知近况慰浣良劇山房比年况味想盡得之帥漕書中矣春尾以猶子之訃出山房至今未得復登此乃梭山之子文行皆髙家庭所頼年未及壮無疾而逝所以傷之者又不止骨肉之情也聚族既廣患故如此類多今日方除一姪女之服所幸諸兄皆能安之以命不至過傷也此理日明鄉里朋友寖有能共此者每思應朝應之未甞不興懐應之一跌不復中間見其祭吕郎中文迷繆之甚急扵舊書問中㝷得其向時書數𥿄封之題曰石應之公案擬相聚時發此以啓之後在臨安𪠘舎中相㑹見其事役匆匆神志不定不欲出示却語及之渠力索觀略出示之渠欲持去吾曰不可觀足下神思今不能辦此此書非吾親自與汝剖决亦長物耳觀其容貌言論與曩者判然如二人使人不忍視之今遂居䑓閣益令人憐之耳閱應朝二書葺齋記亦甚念足下有茅塞之患帥漕處皆有吾文一編此乃韓將領親張氏朱氏所録聞亦有一編在韓將領處想必從韓處見之矣第帥漕處本却經山間友朋點對無錯誤可從帥處借本點對却精觀熟考當有所發也與姪孫濬家間逓至汝三信甚念汝文字意㫖皆不長進如所謂士論翕然宗之所謂盡公樂善人無間言斯世何幸乃有斯人耶此人么麽姦宄謟事權貴隂為䜛慝媒蘖善類自吾在朝時物論固已籍籍徃者擢為少司成又進而為大負乗之醜海内羞之今賢關之論乃復如彼何耶豈汝所交之士皆不足以為士而所見之人皆非其人耶沈鷙二字史家多以稱人之長關雎亦鷙非惡辭也向來家書中亦時有此等㫖趣此非特辭語之病甚可畏也其他用字下語差錯不安者甚多已令汝尊後便逐一告汝塲屋得失有命不足計後生作文却要是當若只如此未可便道時文不難辦安得不勤厥尊之慮也新政雖未甚滿人意且得輔道儲君者得人甚有方略誠如是國本立矣實宗社無疆之休何幸如之人心至靈惟受蔽者失其靈耳群兒聚戯䄂少果實與之見樵牧而與為禮見市井不逞與村農輸納者邀入酒肆犒之則稱頌賛美士大夫即據此以為評裁可乎雲從龍風從虎水流濕火就燥物各從其類也天下曷甞無人况賢關乎在所以召之者如何耳二吾春末歸自象山瓶無儲粟囊無留錢不能復入山近諸生聚糧除道益發泉石遣輿夫相迎始復為一登兹山廢乆田萊墾未及半今食之者甚衆作之者甚寡結廬之人事力有限頻歲供役頼其相向之篤無倦志耳儻得乆扵是山何樂如之未知造物者卒能相之乎梭山所與汝言真至言也第致之當有道耳此道之不明乆矣群小則固背馳君子扵此徃徃亦未得平土而居之所報時事又如此此皆不可易言之也紛紛之說但可憐憫豈復有可商校者近閱舊藁中有一叚文字汝可精觀相識見問但出此書及此文可也三學者之不能知至乆矣非其志其識能度越千有五伯餘年間名世之士則詩書易春秋論語孟子中庸大學之篇正為陸沉真柳子厚所謂獨遺好事者藻繪以矜世取譽而已尭舜禹湯文武周公孔子孟子之心将誰使屬之夫子曰三人行必有我師焉擇其善者而從之其不善者而改之又曰見賢思齊焉見不賢而内自省誠得斯言之㫖則凡悠悠泛泛者皆吾師也汝氣質外柔弱而中實不弱自向者㫖趣未得其正時固已有隱然不可揺撓之勢矣能扵此深思痛省大决其私毅然特立直以古聖賢為的必居廣居立正位行大道則誰能禦之扵此不具大勇却放過一着姑欲庶㡬扵常人則非吾之所知也真孟子所謂終亦必亡而已矣仁者先難後獲夫道豈難知㢤所謂難者乃已私難克習俗難度越耳吾所謂深思痛省者正欲思其艱以圖其易耳仁者必有勇顔子聞一日克已復禮之言而遽能請問其目可謂大勇矣汝能以其隱然不可揺撓之勢用力扵此則仁智勇三徳皆備扵我當知為仁由已而由人乎㢤之言不我欺也國家閒暇及是時明其政刑雖大國必畏之矣豈獨爲國爲然㢤爲家爲身一也逮天之未隂雨徹彼桑土綢繆牗户今此下民或敢侮予汝其念之人臣之扵國猶其家也扵君猶其親也雖不吾以而問安寢門之心所不能忘也黜陟施設時欲聞之便信毋略乎此見羅中舎致吾意四人非木石不能無好惡然好惡須得其正乃始無咎故曰惟仁者能好人能惡人惡之得其正則不至扵忿嫉夫子曰我未見好仁者惡不仁者盖好人者非好其人也好其仁也惡人者非惡其人也惡其不仁也惟好仁故欲人之皆仁惟惡不仁故必有以藥人之不仁中也飬不中才也飬不才豈但是賢父兄之心賢子弟之心亦豈得異扵其父兄㢤故凡棄人絶物之心皆不仁也比吉也比輔也此乃仁也人道也吾非斯人之徒與而誰與澤上有地臨君子以教思無窮容保民無疆後生晚進苟無異趣當與先生長者同心同徳先生長者亦須賢子弟為先後䟽附吾甞謂唐虞盛時田畆之民竭力耕田出什一以供公上者亦是與尭舜臯䕫同心同徳故曰比屋可封此和氣之所以充塞宇宙謂之扵變時雍處末世弊俗當使憐憫扶持救藥之心勝其憎嫉嫌惡乃為近正汝當以此言深思毋忽其為已曉則當有進益有書與胡學録問曽盡見去年吾所與汝書否若有未見汝當盡以示之雖汝亦當時一閱之毋謂已盡知之矣觀汝前一書亦未深解吾說若有疑不妨吐露當盡為汝剖白也象山先生全集卷之十四
