front:
  text: 象山先生全集卷之二十二
  hash: sha256:3ca662873caffe61460ecfbadf7d14a696502e8f2068b12bd9b50d6be0eddc29
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_022-1a}
body:
  text: 雜著武帝謂汲黯無學汲黯進積薪之言武帝為之默然是必有所中矣已而曰人果不可以無學觀黯之言也日益甚人將求勝乎人以自信何患無辭謂黯無學未必不可武帝亦安取學而議人哉太史氏推原其故謂黯𥚹心不能無少望果足以知黯之心乎始遷榮陽令病歸田里後拜淮陽太守伏謝不受印及召見則曰臣願為中郎出入禁闥輔過拾遺卒不得請過李息曰黯棄居郡不得與朝廷議勉息早言張湯後之人誰實為知黯者必信𥚹心之言此與兒童之見何異使視東越相攻不至而還曰不足以辱天子之使使視河內失火曰家人失火比屋延燒不足憂河南貧民傷水旱便宜持節發粟以賑之請歸節伏矯制之罪天子招文學儒者告廷臣以所欲為則對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上默然怒變色而罷朝群臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主于不義乎且已在其位縱愛身奈辱朝廷何渾邪降漢漢發車二千乘從民貰馬民匿馬馬不具欲斬長安令則爭之渾邪至賈人與市者坐當死五百人則爭之弊中國以事夷狄庇其葉而傷其枝之言誰能易之謂公孫弘徒懷詐飾智以阿人主取容謂張湯深文巧詆陷人于罪使不得反其真以勝為功淮南謀反説公孫弘等如發蒙振落耳獨憚黯好直諌守節死義難惑以非卒以不敢若黯雖曰未學吾必謂之學矣雖然張湯更定律令可斥也何必曰高皇帝約束為哉武帝之事四夷非也何必曰與胡和親為哉此等皆黃老言誤之也學絶道喪老氏之説盛行于漢黯不幸生乎其時亦沒于是雖然學老氏者多矣如黯之質固自有老氏所不能沒者惜哉其生弗逢時也放飯流啜而問無齒決是之謂不知務末哉武帝之所以求勝于黯者乎帝自為太子時固巳憚其嚴矣即位既久大將軍青侍中帝踞厠而視之丞相弘燕見或時不冠至黯見不冠不見也嘗坐武帳不冠黯奏事避而使人可之莊助為黯請告論黯之長帝然之且曰古有社稷臣黯近之矣為中大夫固以切諌不得久留出守東海大治帝聞而召之列于九卿湯敗帝聞黯與息言則抵息罪令以諸侯相秩居淮陽其卒也官其弟至九卿官其子至諸侯相武帝之不能自克不樂于黯之切直固也然其心之靈不能掩沒有以知黯者未必不愈于後世吠聲之人也及其遂非而求勝則是心之靈或幾乎熄矣此孟子所謂終亦必亡而巳者也然則生弗逢時者豈不大可惜過而求勝者豈不大可畏哉張釋之謂今法如是張廷尉當渭橋下驚乘輿馬者以罰金文帝怒張廷尉爭以為不可更重是也然謂法者天子所與天下公共也今法如是而更重之是法不信于民也方其時上使立誅之則巳今既下廷尉廷尉天下平也一傾天下用法皆為輕重則非也廷尉固天下平也天子獨可不平乎法固所與天下公共也苟法有不當為廷尉者豈可不請之天子而修之而獨曰今法如是可乎虞書曰宥過無大周書曰乃有大罪非終乃為青災適爾既道極厥辜時乃不可殺縣人聞蹕匿橋下久謂乘輿巳過而出至于驚馬假令有敗傷亦所謂有大罪非終乃為青災適爾是固不可殺釋之不能推明此義以祛文帝之惑乃徒曰法如是此後世所以有任法之弊而三代政刑所從而亡也雜説皇極之建彛倫之敘反是則非終古不易是極是彛根乎人心而塞乎天地居其室出其言善則千里之外應之出其言不善則千里之外違之是非之致其可誣哉雖然苗民之弗用靈當堯之時則然矣逮舜受終而未有格心乃竄之于三危又數十載而禹始受命爰有徂征之師夫以堯舜之聖相繼而臨天下可謂盛矣蕭韶九成鳯凰來儀而蠢兹有苗侮慢自若不要諸舞干七旬之後而論于其不恭自賢之日則違應之理殆無證于此矣周自后稷積仁修德其來遠矣武王纘太王王季文王之緒以有天下而商之頑民乃至三世而弗化天之所以與人者豈獨缺于是乎苗頑之于唐虞商頑之于成周可諉曰寡鄉原夫子所惡也而人皆恱之楊墨孟子所闢也而言者歸之夫子受徒久矣而顔淵獨為好學其後無疑于夫子之道者僅有曾子夫子沒而子夏子遊子張乃欲強之以事有若自夫子不能喻之于其徒曾子不能喻之于其友則道之所存亦孤矣嗚呼是非之決于其明不于其暗衆寡非所決也苗民之未格商民之未化鄉原之未知其非楊墨之未歸于儒子夏子遊子張之徒未能克巳而復禮彼其私説詖論可勝聼哉揆之至理則是所謂不善者也是所謂不明者也是其所以為非者也苗民之格商民之化鄉原而知其非楊墨而歸于儒子夏子遊子張之徒一日克巳而復禮則是非之辨判然明矣是理之在天下無間然也然非先知先覺為之開導則人固未免于暗故惟至明而後可以言理學未至于明而臆決天下之是非多見其不知量也純乎其善純乎其不善夫人而能知之也人非至聖至愚時非至泰至否固有所不純有所不純則其大小本末輕重多寡表裏隱顯始卒久近劇易幸不幸之變非至明誰能辨之有善于此至大至重宜在所師宜在所尊而以其有不善焉而其善不遂其事不濟舉世莫辨而反以為非反以為懲豈不甚可歎哉念慮之正不正在頃刻之間念慮之不正者頃刻而知之即可以正念慮之正者頃刻而失之即是不正此事皆在其心書曰惟聖罔念作狂惟狂克念作聖然心念之過有可以形迹指者有不可以形迹指者今人有慢侮人之心則有慢侮之容慢侮之色慢侮之言此可以形迹指者也又有慢侮人之心而偽為恭敬容色言語反若莊重此則不可以形迹指者也深情厚貌色厲而內荏者是也可以形迹指者其淺者也不可以形迹指者其深者也必以形迹觀人則不足以知人必以形迹繩人則不足以救人非惟念慮之不正者有著于形迹有不著于形迹雖念慮之正者亦有著有不著亦有事理之變而不可以形迹觀者亦有善不善雜出者如比干之忠則可見如箕子佯狂微子適周不可謂之不忠如曾子之孝則可見如舜不告而娶不可謂之不孝此是事理之變而不可以形迹觀者如匡章之得罪于其父乃在于責善此是善不善雜出者通國皆稱不孝則便見匡章不得孟子乃見得他善不善處分明故與之遊又從而禮貌之常人不能知此等處又未足論世固有兩賢相值而不相知者亦是此處如老泉之于王臨川東坡之于伊川先生是也堯舜文王孔子四聖人聖之盛者也二典之形容堯舜詩書之形容文王論語中庸之形容孔子辭各不同誠使聖人者並時而生同堂而學同朝而用其氣稟德性所造所飬亦豈能盡同至其同者則禹益湯武亦同也夫子之門惟顔曾得其傳以顔子之賢夫子猶曰未見其止孟子曰具體而微曾子則又不敢望顔子然顔曾之道固與聖人同也非特顔曾與聖人同雖其他門弟子亦固有與聖人同者不獨當時之門弟子雖後世之賢固有與聖人同者非獨士大夫之明有與聖人同者雖田畝之人良心之不泯發見于事親從兄應事接物之際亦固有與聖人同者指其同者而言之則不容強異然道之廣大悉備悠久不息而人之得于道者有多寡久暫之殊而長短之代勝得失之互居此小大廣狹淺深高卑優劣之所從分而流輩等級之所由辨也書疏云周天三百六十五度四分度之一天體圎如彈丸北高南下北極出地上三十六度南極入地下三十六度南極去北極直徑一百八十二度強天體隆曲正當天之中央南北二極中等之處謂之赤道去南北極各九十一度春分日行赤道從此漸北夏至行赤道之北二十四度去北極六十七度去南極一百一十五度從夏至以後日漸南至秋分還行赤道與春分同冬至行赤道之南二十四度去南極六十七度去北極一百一十五度其日之行處謂之黃道又有月行之道與日相近交路而過半在日道之裏半在日道之表其當交則兩道相合去極逺處兩道相去六度此其日月行道之大略也黃道者日所行也冬至在斗出赤道南二十四度夏至在井出赤道北二十四度秋分交于角春分交于奎月有九道其出入黃道不過六度當交則合故曰交蝕交蝕者月道與黃道交也苟無所蔽必無所窮苟有所蔽必有所窮學必無所蔽而後可學不親師友則太玄可使勝易主于道則欲消而藝亦可進主于藝則欲熾而道亡藝亦不進以道制欲則樂而不厭以欲忘道則惑而不樂有有志有無志有同志有異志觀雞與彘可以辨志縶猿檻虎可以論志謹微不務小志大堅強有力沉重善思四方上下曰宇往古來今曰宙宇宙便是吾心吾心即是宇宙千萬世之前有聖人出焉同此心同此理也千萬世之後有聖人出焉同此心同此理也東南西北海有聖人出焉同此心同此理也近世尚同之説甚非理之所在安得不同古之聖賢道同志合成有一德乃可共事然所不同者以理之所在有不能盡見雖夫子之聖而曰回非助我啓豫者商又曰我學不厭舜曰豫違汝弼其稱堯曰舍巳從人惟帝時克故不惟都俞而有吁咈誠君子也不能不害為君子誠小人也雖能不失為小人宇宙內事是巳分內事已分內事是宇宙內事人心至靈此理至明人皆有是心心皆具是理聖人固言仁矣天下之言仁者每不類聖人之言仁聖人固言義矣天下之言義者每不類聖人之言義聖人之言知道之言也天下之言不知道之言也知道之言無所陷溺不知道之言斯陷溺矣右賢而左能德成而上藝成而下道行道明則耻尚得所不行不明則耻尚失所耻得所者本心也耻失所者非本心也聖賢所貴乎耻者得所耻者也耻存則心存耻忘則心忘于寶晉論有耻尚失所之説求處情求處厚求下賢欲行浮于名耻名浮于行先生因讀表記書此語邪正純雜係念慮清濁強弱係血氣朱均管蔡志不變也非質不可變也苗格崇降聖人有以變其志也後世知有事而不知有政知責詳于法而不知責詳于人學者規模多係其聞見孩提之童未有傳習豈能有是規模是故所習不可不謹處乎其中而能自拔者非豪傑不能劫于事勢而為之趨向者多不得其正亦理之常也道譬則水人之于道譬則蹄涔汚沱百川江海也海至大矣而四海之廣狹深淺不必齊也至其為水則蹄涔亦水也常人所欲在富君子所貴在德士庶人有德能保其身卿大夫有德能保其家諸侯有德能保其國天子有德能保其天下無德而富徒增其過惡重後日之禍患今日雖富豈能長保又况天生民而立之君使司牧之故君者所以為民也書曰德惟善政政在飬民行仁政者所以飬民君不行仁政而反為之聚斂以富之是助君虐民也宜為君子之所棄絶當戰國之時皆矜富國強兵以相侵伐爭城以戰殺人盈城爭地以戰殺人盈野故孟子推明孔子之言以為率土地而食人肉罪不容于死推論既明又斷之曰人臣善戰者服上刑連諸侯者次之辟草萊任土地者次之孟子在當時所陳者皆堯舜之道勉其君修德行仁勸之以間暇之時明其政刑自謂以齊王猶反手耳使孟子得用必能使天下仕者皆欲立于其朝耕者皆欲耕于其野商賈皆欲藏于其市行旅皆欲出于其塗天下之民盡歸之則無敵于天下矣此理甚明效可必至當時之君徇俗自安不能聼用其説乃反謂之迂闊可謂不明之甚也象山先生全集卷之二十二
