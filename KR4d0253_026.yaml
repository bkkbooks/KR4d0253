front:
  text: 象山先生全集卷之二十六
  hash: sha256:19f1f4dfa99e7b38553a0be0bb7aca1dd62622f4c09289589473359c4773f624
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_026-1a}
body:
  text: 祭文祭吕伯恭文玉在山輝珠存川媚邦家之光繄人是寄惟公之生度越流輩前作見之靡不異待外朴如愚中敏鮮儷晦嘗致侮彰或招忌纎芥不懷惟以自治侮者終敬忌者終愧逺識宏量英才偉器孤騫無朋獨立誰配屬思紆徐摛辭綺麗少日文章固其餘事顔曾其學伊吕其志久而益專窮而益厲約偏持平棄疵養粹玩心黃中處身白賁停澄衍溢不見涯涘豈伊人豪無乃國瑞往年之疾人已􅌓眙逮其向痊全安是冀詩傳之集大事之記先儒是禆麟經是嗣杜門養痾素業不廢訃音一馳聞者隕涕主盟斯文在數君子纍纍奪之天乎何意荆州云亡吾兄既逝曾未期年公又棄世死者何限人有巨細斯人之亡匪躬之瘁嗚呼天乎胡不是計竭川夷陵忍不少俟辛卯之冬行都幸會僅一往復揖讓而退既而以公將與考試不獲朝夕以吐肝肺公素與我不交一字糊名謄書幾千萬紙一見吾文知非他士公之藻鏡斯已竒矣公遭大故余忝末第迫歸覲親徒以書慰甲午之夏公尚居里余自錢塘遡江以詣值公適衢浹日至止一見歡然如獲大利我坐狂愚幅尺殊侈言不知權或以取戾雖訟其非每不自制公賜良針始痛懲艾問我如傾告我如祕教之以身抑又有此惟其不肖往往失墜竟勤公憂抱以沒地鵝湖之集已後一歲輒復妄發宛爾故態公雖未言意已獨至方將優遊以受砭劑潢池之兵警及郡界亟還親庭志不克遂先兄復齋比一二歲兩獲從欵言符心契冉疾顔夭古有是比嗚呼天乎胡嗇於是復齋之葬不可無紀幽鐫之重豈敢他委道同志合惟公不二拜書乞銘公即揮賜琅琅之音河奔嶽峙嗚呼斯文何千萬祀我固罷駑重以奔踶惟不自休強勉希驥比年以來日覺少異更嘗差多觀省加細追惟曩昔粗心浮氣徒致參辰豈足酬義期此秋冬以親講肄庶幾十駕可以近理有疑未決有懷未既訃音東來心裂神碎與二三子慟哭蕭寺即拜一書以慰令弟惟是窀穸祈厠未肂繼聞其期不後日至躡屩擔簦宵不能寐所痛其來棺藏幃蔽誰謂及門紼翣已邁足趼塗泥追之不逮矯首蒼茫涕零如霈不敏不武將以誰罪及其既虞几筵進拜觴酒豆肉哀辭以載聞乎不聞神其如在代致政祭姪槱之文吾年七十有六闔門且將千指田僅充數月之糧卒歲之計每用凛凛汝在同行十餘人之下獨能任吾事以紓吾憂彌縫輔苴於缺絶迫窄之中如霈然者不動聲色而中外巨細靡不整辦使吾有以安之然吾念汝獨勞久矣顧難於代汝者耳去年雖令諸子與汝輪幹以遂汝學問之志而事之本末繄汝是賴籬落之未葺舂揄之未便皆在隱處汝死之日猶悉為吾治之吾平日見為人臣而不恤君之民不任君之事者每竊憤之有盡瘁者必喜而愛之况汝在子弟之中而服勤於至難之事若此者乎如汝之賢或夀而死人猶傷之况於未壯而亡乎而天遽奪乎汝汝其有以知我之哀也命也奈何莫非命也吾既以紹孫環孫為汝後髙選之山真佳城也吾見之矣翌日維吉汝其行乎代教授祭神文孔子曰非其鬼而祭之諂也禮曰非所祭而祭之名曰淫祀惟爾神稽諸禮典非士庶所當祭於家者鄉者因循舊俗未適厥正夫聰明正直之謂神非所當祭而祭之固非所以祀神非所以當祭而欲人之祭之亦非所以為神今將革舊俗之失以爾神之祀而歸諸正惟爾有神鑒之石灣禱雨文惟皇宋紹熙元年歲次庚戌六月甲申朔十有三日丙申奉議郎新權發遣荆門軍事兼𬋩內勸農營田事陸某謹以元酒茗飲蓬萊之香清陂之蓮就所居青田石灣山頂除地為壇昭告于是鄉五方山川神祗蓋聞天子祭天地諸侯祭其境內名山大川雩禜祭水旱山林川谷丘陵能出雲為風雨則祭之國有常典掌在有司非其職守誰敢姦焉然輔相不任燮調以吏事為責守令無暇撫字以催科為政論道經邦承流宣化徒為空言簿書期會獄訟財計斯為實事為日久矣况今日輿圖未歸東南事力有限而朝廷百官有司城郭宮室郊社宗廟諸費事大體重未易損削東西𬒳邉殆幾萬里養兵之費乃十八九公卿大臣寬厚有體日以靖恭謹重相告誡方重改作惡紛更服膺仍舊貫之旨則民力日屈郡縣日困守令救過不給其勢然也旱雩水禜雖欲竭精盡誠而本職常務所分過半矣故祈禱散在庶民遍滿天下久以為常法有其文官無其禁亦其勢然也今不雨彌月龜坼已深水泉頓縮陂池鄉涸車聲塞耳而浸不終畝憂色在面而歎不成聲民心自危日加一日客有病某者曰居是鄉者莫不憂一鄉之事今人所常行而法所不禁乃獨守區區古説坐視旱䁧之災不一出心力以祈神明以輔郡縣以慰鄉里以分父兄之憂無乃類刻舟求劒嫂溺不援者乎某因念今天下一家郡守再期縣令三期而易之矣今日事體又有如前所陳者某嘗備員朝著之末列今又分符荆壘待次于家郡縣不鄙其愚禮以上客父兄子弟往往過而問以所長誠無以分父兄之憂慰子弟之望則客之所病不為過矣是用齋戒以祈于爾有神是鄉之東有象山雲臺仙巖龍虎湖嶺豪嶺侯棟仙鶴中山南有崖山雲林白馬頭陀麻姑軍峰余源清江南山登髙西有大嶺崇嶺靈谷何嶺明珠觀原翁塘火源官山箭溪四集北有柘岡金峯禪嶺積煙吉嶺萬石塘斗門石瀨沙岡三牛桂枝駢羅環繞韜竒藴秀炳靈兆異歲享鄉民禱祈祭祀者多矣旱魃如此不為一出雲為風雨以殺其虐而惠斯民則父兄子弟之責望恐不獨在某也惟爾有神裁之尚饗謝雨文維皇宋紹熙元年歲次庚戌六月甲申朔十有六日巳亥具位陸某謹以元酒茗飲蓬香蓮花登石灣之壇致謝于是鄉五方山川神祗除壇之日隂雲交覆致告之辰涼雨遞灑旋而風雨四作神祗參會連日未巳諸鄉周洽靈應特逹惠澤優渥惟神正直盡道舉職以贊上帝以蘇下民安肯論功望報然感而應祈焉而遂在吾民之心豈其敢忘用敢率茲前儀以致虔謝惟神其鑒之以母替德惠尚饗荆門禱雨文荆門故楚國也江漢為疆沮漳在境東有百頃南有龜山西有玉泉北有上泉中為蒙泉皆炳靈效異為此土之望旱乾水溢實與守臣同其責往歲之冬茲歲之春霈澤殊嗇今既立夏矣陂池涸絶種未入土斯民凛凛有無年之憂守臣不德當身受其咎斯民何辜謹卜日為壇於蒙泉山頂刑鵝薦血瘞于茲壇之右庸敬告于爾有神其尚鑒于茲望壇謝雨文蠲吉為壇以元酒茗飲禱雨于是邦山川神祗曾不崇朝雷動雲合甘澤隨降雱霈浹洽冬春所無靈應響答民情大慰謹率官寮望壇祗謝惟茲積暘陂池久涸泉源未動是安得無數願無愛威靈尚終惠之是用卒請又屬以是邦經冬涉春雨澤殊少啓蟄之後雷震不作已踰立夏陂池尚涸創茲為壇用祈于爾有神為壇之辰油雲四興踈雨為兆致禱之日先以震雷從以膏雨雱霈周浹連日不怠靈應昭然凡厥吏民孰不感動謹率郡寮詣壇祗謝繼是雨暘時若百榖順成民戴神惠其有窮哉東山禱雨文謹率闔郡官僚以元酒茗飲致告于山川之神荆門為郡大抵在江漢之間正南為江陵而江實在焉唯沮漳由當陽以入江在郡之西正北為襄陽而漢實略襄陽而後南折為長林東境故荆門之山發於嶓冢止於西山蒙泉原其下以在郡之西故曰西山其支山沿溪而東以繞郡治有峰峨峨然曰東山有浮圖在其上於西山為賔季春之月以不雨之久為壇西山之巔以致其禱靈應響答沛然為霖比日又以不雨申致其請連三日皆詣壇致請有雲油然有雨瀟然而竟未雱霈正晝間開霽二日三日之夕西北境有雷雨甚久電光密邇而不及郡城東南土田至廣仰雨尤急殊不霑及竊惟所以事神者未至古之祠山川者皆為壇望其所祠今西山之壇既獲靈應不敢廢也然觀東山正為西山之賔西望則山川之本原皆森列在前宜為壇以致禱是用於此申致前請惟神其鑒之東山刑鵝禱雨文謹率闔郡官僚詣東山新壇以望西山敢告于茲土五方山川之神自九月庚辰致禱之後境內每有雨澤凡詣壇之時雲氣必變雨澤雖未霑洽可見靈應然郡城至今未得大雨諸鄉亦未周遍竊懼所以事神之禮未至春季致禱西山之時刑鵝薦血瘞于壇側用著厥誠茲月之禱此禮未講惟神恕其不逮而許其自新其尚鑒茲誠上泉龍潭取水禱雨文茲歲不雨之久是月六日於蒙泉山頂為壇致禱十有二日又於東山望壇申致厥請自六日之朝有雲油然有雨祈然由郡城以及諸鄉是故諸鄉循環得雨但未雱霈浹洽雖蒙靈應未終大惠是用竭誠致
