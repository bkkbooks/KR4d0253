front:
  text: 象山先生全集卷之十七書
  hash: sha256:084d28a7910548ec9685d49e72a0a11d4a60b661f2399832a45c9f7cad1a8e98
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0253_SBCK_017-1a}
body:
  text: 與張監某效職如昨皆依大庇子城土工歳前畢事包砌東北一隅猶未周浹見甎已盡鄕蒙台㫖令自致買名銀之請今方圖之俟得消息當逐一禀聞也通廟堂朝士書更望一言之賜此事之就可壯邊城之勢常平倉庫如在枕上矣計必蒙垂念也去冬少雨此間幸得雪頗大麥今甚秀正月尾又得薄雪比來殊未有雨意園𬞞甚渇髙田亦需水而耕不無可慮者去冬得家書謂江東西秋穫稻皆虚耗民多流移此間却無是患目今皆熈熈但和糴與租米亦皆不如常歲以此知米榖不能無耗折但人不覺耳商稅榷酤皆虧扵徃時稍詢旁郡徃徃皆如此凡事自十數年來細校之大抵益難易曰窮則變變則通通則乆是以自天佑之吉無不利所謂變而通之者必有其道斷願承教不敢爲累牘之禮以溷記史當蒙亮恕二屬承手翰風誼凛然三復之餘益深䧏歎魯欲使樂正子爲政孟子曰吾聞之喜而不寐孟子所喜亦曰君將蒙其益民將𬒳其澤道將行扵時而已某前日賛喜之牘竊自附扵此固知外物不足爲賢者輕重也歸正人伊信者常至庭備諭以賢監司宣布聖朝恩德之意見其衣服藍縷因薄賙之今不復呌呼矣其類有二三人相次陳乞計次第關聞也使華過此時有一陳狀者乃長林係官畫匠後自知理曲復藏避不欲迫追以開其自新之路近方出頭喻之以理令下當陽與其嫂行踏田界旦晚即申聞其詳簿書捐絶官府通弊是間僻左忽略尤甚公私文書類難稽考鄕來郡中公案只寄收軍資庫中間甞置架閣庫元無成規殆爲虚說近方令諸案就軍資庫各檢㝷本案文字收附架閣庫隨在亡登諸其籍庶有稽考若去秋以來文案全不容漏脫矣使臺所索屈彦誠公案申發已乆續索所毁公據斷由以不曾啓縣封不知在不㝷呼縣吏問之果不在其中責令搜求累日不得即追薛諒劉習問之薛諒老病扶杖出頭勢必擡輿而後可前劉習自陳𥘉不與事薛諒亦云省憶追屈氏公據斷由時里正是呉文海非是劉習後追到呉文海果無異辭然謂當時已追到官薛諒亦云省憶得當時二文公據斷由皆已附案今若不在乃是案中漏失長林見其事如此重扵發人親監縣吏倒架搜㝷得斷由一截然情理尚可考公據則竟不在今且發斷由去一二人皆知責俟命若不妨裁斷得免解其人尤幸比來訟牒益寡有無以旬計終月計之不過二三𥿄第積年之訟尚有六七事未竟此數事日已决三事勢不復起矣如蘄榮屈彦誠二事旦莫必决餘二事亦皆諭之以理使自和解未知能從否要亦在旬日當决過社節來屢得雨髙田皆可耕每多夜雨農者之占以爲必稔未知果驗否此間平時多盗今乃絶無有則立獲前政有二盗未獲今廵尉亦皆是後任者憲臺督責常文乆已因循近乃押至其辭加峻此盗在當時即已逺迯今固無可得之理當時廵尉已迯責罷去乆矣今廵尉一人且將滿一人且書考矣一旦責以前任不可得之賊行移如此似亦非宜此間平時爲害之盗今盡捕獲能爲盗之人與常停盗之家皆以宻籍在此苟有盗亦不容不獲也平時剽奪扵道路者近獲二人已斷配一人一人見在獄鄕來禀聞當陽界内有六七軰打奪人錢物縳之扵深林中而去者皆已斷配今日之無盗大抵以此憲臺輙駁下此案令檢斷去析其所駁之說無道理比間檢斷官具析之文條理粲然謾令錄呈得一過目幸甚又有大囚其犯乃在某未到任時到此未乆即見一人來投牒乃𬒳人殺之家訟當陽勘囚情節未盡觀其辭即知其爲徤訟者已而聞之果無状之人以好訟不已常遭徒刑矣即判送當陽縣令從公盡情根勘不得稍有鹵莾沈宰亦在郡某亦常摘其詞中所訟與相反覆沈宰謂大囚在獄只得盡情出入皆不可其事皆親自研勘不在吏手觀沈宰序說本末果皆不苟及其解本軍軍院猶研究有節目未盡者竟追縣吏斷遣今奏案上矣徤訟之人自憲使之至即投牒扵憲臺計其投牒之日乃在此間奏上之後憲臺遂索案比既奏又先申憲矣然既索案只合發徃前月方得牒改送司理院且言已專人發案下然其案逮今未至司理院亦無從照勘本軍相㝷有両奏案一後奏者下已乆矣此案獨未下豈憲臺致疑扵其問以上聞也此事本末甚詳當時憲臺但以其詞與所疑令本軍具析則其事渙然矣刑獄淹延亦憲臺之任其囚已扵絞刑上定斷獨以殺人無證法當奏裁縱令别勘其情與其刑皆不能有所加張丈老成前軰近自鄕里過九江時亦常侍尊爼未必有心相困近物色之乃今憲臺法司黄亮者乃此間人吏鄭守窘王守之時此人多不用事今聞自孔目已下多與之有隙或謂其人爲此以報私怨萬一出此所簽􅈦官與撿法官亦唯黄亮是聼而已張丈前軰某本欲作書又恐不暇省錄敢借一言之重以調護之幸甚鄕來張丈有公劄問人材某常以両縣宰與教官爲對以沈爲宰某備員守臣莫不至甚有冤濫也張丈尊年諸事未可直致恐反致疑也幹官檢法者不知何等人品幸有以調護之恃契愛凂瀆伏幸恕察與豐叔賈某迂踈置之泉石問甚宜一行作吏强其所劣欲罷不能前者所聞荆門郡計不至窘束至此大異所聞蕞爾小壘頻歲迎送勢不能堪疆土雖稍廣濶然山童田蕪人踵希少户口不能當江浙小縣始至妄意創築子城今幸向畢春間𪠘舎適有回祿之災不容不新之在官亭宇以數政皆不乆積壊幾不可支吾只得隨宜修葺不習扵吏當此匱乏重以百役今歲漢江岷江皆無雨暴溢瀕水下地所傷甚多分委同官四出檢視從實與之蠲租常賦殆虧其半廪焉未知所以善後倘有以督而振掖之是所望扵長者唯無愛是幸與鄧文範某在此士民日相安所爲不至齟齬第二月九日之夜宅堂有回祿之災大屋十餘間頃刻成燼私居行李幾爲一空幸不曾延燒官府文書印記等無毫髪損失骨肉間一時不至甚驚恐過後循省乃生驚怖旬日乃定然比之常人之情相去亦遠持循二子與姪孫濬當火起時頗見力量他日或可望苐目今二子終未肯進學耳近以田間缺水登蒙泉山頂禱兩靈應甚著三祝文薛漕處有之是間民益相安士人亦有向學者郡無迯卒境内盗賊絶少有則立獲訟牒有無以旬計然太守自無暇此間有積年之訟皆盤錯外郡之訟諸司亦時遣至此又有築城造屋之役適連年送迎之後計財匱乏頗費調度近以商稅虧額之甚遂自料理頓有增羡乃知事無不可爲者始至即修煙火保伍賊盗之少多頼其力近忽有刼盗九人刼南境村中軟堰寺長生庫遲明爲煙火隊所捕敵殺一人生擒九人皆勇悍之盗義勇之外煙火隊今亦可恃凡事薛漕必能言之凌遽遣此更須續致與致政兄某拙鈍不敏豈不自知然物莫不各有所長各有所短若其深思力考究事理之精詳造扵昭然而不可昧確然而不可移則竊自信其有一日之長家信中詳言事爲者非是矜誇政欲以情實逹扵長上耳某常謂三代而下有唐虞三代遺風者唯漢趙充國一人而已宣帝問曰誰可使者則曰無踰老臣其客勸其歸功朝廷與諸臣則曰兵之利害當爲後世法老臣豈嫌伐一時事以欺明主哉臯陶曰朕言惠可底行禹曰予曁益播庶鮮食艱食蒸民乃粒萬邦作乂又曰予决九州距四海濬畎澮距川又曰予創若時娶于塗山辛壬癸甲啓􅈱􅈱而泣予弗子惟荒度土功䕫曰予擊石拊石百獸率舞庶尹允諧此等皆非矜誇其功能但直言其事以著其事理之當然故君子所爲不問其在人在已當爲而爲當言而言人言之與吾言一也後世爲不情之詞者其實不能不自恃古之君臣朋友之間猶無飾辭况父兄間乎唐虞三代盛時言論行事洞然無彼已之間至其叔末徳衰然後有爾有嘉謀嘉猷入告爾后于内爾乃順之于外曰斯謀斯猷惟我后之徳前軰之論以爲太甲卒爲商太宗追配成湯無愧而有光以其善惡是非灼然明白非成王比也成王卒爲中才之主以流言疑周公此難以言智自此而降周德不競矣入告出順之言德不競之驗也後世儒者之論不足以著太公昭至信適足以附人之私增人䧟溺耳銖銖而稱之至石必繆寸寸而度之至丈必差石稱丈量徑而寡失後世人君亦未嘗不欲辨君子小人然卒以君子爲小人以小人爲君子者寸寸而度銖銖而稱之過也以銖稱寸量之法䋲古聖賢則皆有不可勝誅之罪况今人乎今同官皆盡心力相助人莫不有才至其良心固有更不待言但人之見理不明自爲蒙蔽自爲艱難亦蒙蔽他人艱難他人善端不得通暢人心不亨人材不得自逹阻碍隔塞處多但增尤怨非所以致和消異今時人逢君之惡長君之惡則有之矣所以格君心之非引君當道邈乎逺哉重可嘆哉與張伯信屬者伏承使華臨賁侍坐陪吟日飽德義慰喜可知至如風露凄清星河錯落月在林杪泉鳴石間薫鑪前引茶鼎後殿方池爲鑑廻溪爲佩氷玉明瑩雪霜騰耀則噴玉新亭真蓬壺􅌡洲已方士徒爾幻恠安知真仙在此而不在彼也竒石悉已如教置之作者屹立瀑間瀕池四軰聳然相望如五老後有三峰跬歩之間便使人應接不暇如聞玉泉亦蒙點化光價十倍其𥘉此邦何幸自此天下名勝皆有望扵門下矣與似清九月八日蒙泉守陸某書復明珠菴清長老禪師侍者自從臨安一别直至如今談詠髙風便同覿面去年百八姪姪歸自南嶽得書又承惠藥足慰别懐道人家信縁信脚到處爲家可也明珠菴幸有諸貴人賢士相愛得住且住若是名山大刹更尚有縁頂笠便行亦且無碍不須擬議不勞擘劃在在處處皆是道塲何處轉不得法輪何人續不得慧命事忙來人索書草草奉此想蒙道照與沈宰回祿之災獨中居室此某不德之譴也慰唁勤至益重悚惻臧張二孽𥘉欲以聞上而終治者以其有自新之意姑從末减小示懲戒恐欲知之築室之役豫蒙軫念尤佩厚意長林艱得竹木不免以累治下旋令納去百緡煩令計費續當奉償郡中以子城之役殊覺空竭更頼調護之方振翼而成就之是願是幸承欲一來諸遲面既二荐領詩文皆豪徤有力徤羡徤羡某鄕有復程帥惠江西詩派書曾見之否其間頗述詩之源流非一時之說愚見大槩如此國風雅頌固已本扵道風之變也亦皆發乎情止乎禮義此所以與後世異若乃後世之詩則亦有當代之英氣禀識趣不同凡流故其模寫物態陶冶情性或清或壯或婉或嚴品類不一而皆條然各成一家不可與衆作渾亂字句音節之間皆有律吕皆詩家所以自異者曾子固文章如此而見謂不能詩其人品髙者又借義理以自勝此不能不與古異今若但以古詩爲師一意扵道則後之作者又當左次矣何時合併以究此理象山先生全集卷之十七
